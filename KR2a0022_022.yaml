body:
  text: 周書卷二十二唐令狐德棻等撰列傳第十四周惠逹馮景楊寬兄穆儉柳慶子璣帶宏鷟子韋兄鷟周惠逹字懷文章武文安人也父信少仕州郡歷樂鄉平舒平成三縣令皆以亷能稱惠逹幼有志操好讀書美容貌進退可觀見者莫不重之魏齊王蕭寶夤為瀛州刺史召惠達及河間馮景同在閣中甚禮之及寶夤還朝惠逹隨入洛陽領軍元義勢傾海內惠逹嘗因寶夤與義言論義歎重之於座遺惠逹衣物孝昌初魏臨淮王彧北討以惠逹為府長流參軍及万俟醜奴等搆亂蕭寶夤西征惠逹復隨入關寶夤後與賊戰不利退還仍除雍州刺史令惠逹使洛陽未還而寶夤反謀聞於京師有司以惠逹是其行人將執之乃私馳還至潼關遇大使楊侃侃謂惠逹曰蕭氏逆謀已成何為故入獸口惠逹曰蕭王為左右所誤今往庶其改圖及至寶夤反形已露不可彌縫遂用惠逹為光祿勳中書舍人寶夤既敗人悉逃散唯惠逹等數人從之寶夤語惠逹曰人生富貴左右咸言盡節及遭厄難乃知嵗寒也賀拔嶽獲寶夤送洛留惠逹為府祭酒給其衣馬即與參議嶽為關中大行臺以惠逹為從事中郎嘗使至洛魏孝武與惠逹語及世難惠逹陳天下事勢述嶽有誠節唯以憂國定亂為事言辭激切帝甚嘉之及還具以白嶽嶽曰人生於天受命於君豈有利人榮祿而不憂其禍難卿之所奏實獲吾心自是更被親禮嶽每征討恆命惠逹居守又轉嶽府屬嶽為侯莫陳悅所害悅得惠逹欲官之惠逹辭以疾不見許乃遁入漢陽之麥積崖悅平惠逹歸於太祖即用秦州司馬安輯隴右及太祖為大都督總管兵起雍復以惠逹為府司馬便委任焉魏孝武詔太祖尚馮翊長公主以惠逹為長史赴洛陽奉迎至潼關遇孝武已西即令惠逹先太祖謂惠逹曰昔周之東遷晉鄭是依今乘輿播越降臨關右吾雖猥當其任而才愧昔人卿宜勠力共成功業以取富貴也對曰惠逹宦遊有年屬明公一匡之運富貴之事非所敢望但願明公威德加於天下惠逹得效其尺寸則志願畢矣太祖為大將軍大行臺以惠逹為行臺尚書大將軍府司馬封文安縣子邑三百户太祖出鎮華州留惠逹知後事于時既承喪亂庶事多闕惠逹營造戎仗儲積食糧簡閲士馬以濟軍國之務時甚賴焉為安東將軍拜太子少傅進爵為伯增邑三百户尋除中書令進爵為公增邑通前九百户加衛大將軍左光祿大夫四年兼尚書右僕射其年太祖與魏文帝東征惠逹輔魏太子居守總留臺事惠逹前後辭讓帝手詔答曰西顧無憂唯公是屬蕭寇之重深所寄懷及邙山失律人情駭動趙青雀率東人據長安子城反惠逹奉太子出渭橋北以禦之軍還青雀等伏誅拜吏部尚書久之復為右僕射自關右草創禮樂缺然惠逹與禮官損益舊章至是儀軌稍備魏文帝因朝奏樂顧謂惠逹曰此卿之功也尋拜儀同三司惠逹雖居顯職性謙退善下人盡心勤公進拔良士以此人皆敬而附之十年薨子題嗣隋開皇初以惠逹著績前代追封蕭國公馮景字長明少與惠逹同志相友延景中梁人寇抄徐揚景謂蕭寶夤曰今梁寇憑凌朝廷思靖邉之將王若能先驅效命非唯雪家國之恥亦是保身之長䇿也寶夤深然之及寶夤為大都督以景為功曹參軍後為右僕射引景入省領尚書都令史正光中寶夤為關西大行臺又假景陵江將軍領大行臺都令史從寶夤征討寶夤將舉兵反景固諫不從寶夤敗後景還洛朝廷先聞景有諫言故免之除奉車都尉汝陽王元叔昭為隴右大行臺啓景為行臺郎中賀拔嶽為大都督又以景為從事中郎太祖平侯莫陳悅除景洛陽郡守尋兼行臺左丞留守原州魏孝武西遷封髙陽縣伯邑三百户遷散騎常侍行臺尚書加瀛州刺史大統初行涇州事後以疾卒揚寬字景仁𢎞農華隂人也祖恩魏鎮逺將軍河間內史父鈞博學彊識舉秀才拜大理平轉廷尉正纍遷歷洛陽令在中郎將軍華州大中正河南尹廷尉卿安北將軍七兵尚書北道大行臺恆州刺史懷朔鎮將軍卒於鎮贈侍中司空公追封臨貞縣伯諡曰恭寬少有大志每與諸兒童遊處必擇髙大之物而坐之見者咸異焉及長頗解屬文尤尚武藝弱冠除奉朝請屬鈞出鎮恆州請從展效乃改授將軍髙闕戍主時茹茹既亂其主阿那瓌來奔魏帝遣使納之詔鈞率兵衛送寬亦從以功拜行臺郎中時北邉賊攻圍鎮城鈞卒城民等推寬守禦尋而城陷寬乃北走茹茹後討鎮賊破之寬始得還朝魏廣陽王深與寬素相委昵深犯法得罪寬被逮捕魏孝莊時為侍中與寬有舊藏之於宅遇赦得免除宗正丞北海王皓少相器重時為大行臺北征葛榮欲啓寬為左右丞與參謀議寬辭以孝莊厚恩未報義不見利而動皓未之許皓妹壻李神軌謂皓曰揚寬義士也匹夫猶不可奪志况義士乎王今彊之以行亦恐不為人用皓乃止孝莊踐阼拜通直散騎侍郎領河南尹丞行洛陽令邢杲反寬以都督從太宰上黨王元天穆討平之就拜通直散騎常侍師未還屬元皓自梁入洛孝莊出居河內天穆懼計無所出集諸將謀之寬曰吳人輕跳非王之敵况懸軍深入師老兵疲彊弩之末何能為也願徑取成臯㑹兵伊洛戮帶定襄於是乎在此事易同摧朽王何疑焉天穆然之乃引軍趣成臯令寬與爾朱能為後拒尋以衆議不可乃回赴石濟寬夜行失道後期諸將咸言寬少與北海周旋今不來矣天穆答曰揚寬非輕於去就者也其所逗留必有他故吾當為諸君保明之語訖候騎白寬至天穆撫髀而笑曰吾固知其必來遽出帳迎之握其手曰是所望也即給牛三十頭車五乘綿絹一十五車羊五十口與天穆俱謁孝莊於太行拜散騎常侍安東將軍仍為都督從平河內進圍北中時梁將陳慶之為皓兵守北門天穆駐馬圍外遣寬至城下說慶之寬先自稱姓名然後與語備陳利害勸令早降慶之不答久之乃曰賢兄撫軍在此頗欲相見寬答曰僕兄既力屈凶威迹淪逆黨人臣之理何煩相見向所以先申姓名者豈不知兄在彼乎直以信不見疑忠為令德耳僕之昆季幸不待言但當議良圖自求多福天穆聞之謂左右曰揚寬大異人何至不惜形便如此自是彌敬重之孝莊反正拜中軍將軍太府卿華州大中正封澄城縣伯邑三百户爾朱榮被誅其從弟世隆等擁部曲燒城門出據河橋還逼京師進寬鎮北將軍使持節大都督隨機扞禦世隆謂寬曰豈忘太宰相知之深也寬答曰太宰見愛以禮人臣之交耳今日之事事君常節世隆北走寬追至河內俄而爾朱兆陷洛陽囚執孝莊帝寬還洛不可遂自成臯奔梁至建業聞孝莊帝弒崩寬發哀盡禮梁武義之待之甚厚尋而禮送還朝至下邳爾朱仲逺啓復寬官爵留為大行臺吏部尚書孝武初改授散騎常侍驃騎將軍給事黃門侍郎監內典書事時夏州戍兵數千人據兗州反詔寬兼侍中節度諸軍討平之中尉綦擕與寬有宿憾誣以他罪劾之孝武謂侍臣等曰揚寬清直朕極知其無罪但不能杜法官之奏耳事下廷尉尋得申釋又除黃門侍郎兼武衛將軍孝武與齊神武有隙遂召募騎勇廣增宿衛以寬為閣內大都督專總禁旅從孝武入關兼吏部尚書録從駕勳進爵華山郡公邑一千二百户大統初遷車騎大將軍太子太傅儀同三司三年使茹茹迎魏文悼后還拜侍中都督涇州諸軍事涇州刺史五年除驃騎大將軍開府儀同三司都督東雍州諸軍事東雍州刺史即本州也十年轉河州刺史十六年兼大丞相府司馬朝議欲經略漢川而梁宜豐侯蕭循固守南鄭十七年寬從大將軍逹奚武討之梁武陵王蕭紀遣將楊乾運率兵萬餘人救循武令寬督開府王傑賀蘭願德等邀擊之軍至白馬與乾運合戰破之俘斬數千人軍還除南豳州刺史魏廢帝初入為尚書左僕射將作大監坐事免魏恭帝二年除廷尉卿世宗初拜大將軍增邑一千二百户從賀蘭祥討吐谷渾破之别封宜陽縣公邑一千户除小冡宰轉御正中大夫武成二年詔寬與麟趾學士參定經籍寬性通敏有器識頻牧數州號為清簡歷居臺閣有當官之譽然與栁慶不協欲按成其罪時論頗以此譏之保定元年除總管梁興等十九州諸軍事梁州刺史其年薨於州贈華陜虞上潞五州刺史諡曰元子紀嗣大象末官至上儀同大將軍虞部下大夫寬二兄穆儉穆字紹叔魏永安中除華州别駕孝武末寬請以澄城縣伯讓穆詔許之仍拜中軍將軍金紫光祿大夫除車騎將軍都督并州諸軍事并州刺史卒於家贈驃騎大將軍開府儀同三司華州刺史儉字景則偉容儀有才行魏正始中起家侍御史加奉朝請遷員外散騎侍郎孝昌中除鎮逺將軍頓邱太守未及述職元皓啓請隨軍建義初兼給事黃門侍郎左將軍太府少卿元皓入洛授撫軍將軍孝莊反正廢於家尋拜散騎常侍都督潁州諸軍事潁州刺史建明中加征南將軍金紫光祿大夫孝武初除衛將軍北雍州刺史政尚寬惠夷夏安之孝武西遷除侍中驃騎將軍大統初以本官行東秦州事加使持節當州大都督從破齊神武於沙苑封夏陽縣侯邑八百户七年領大丞相府咨議參軍出為都督東雍華二州諸軍事驃騎大將軍開府儀同三司華州刺史八年卒於家贈本官諡曰靜柳慶字更興解人也五世祖恭仕後趙為河東郡守後以秦趙喪亂乃率民南徙居於汝潁之間故世仕江表祖縃宋同州别駕宋安郡守父僧習齊奉朝請魏景明中與豫州刺史裴叔業據州歸魏歷北地潁川二郡守揚州大中正慶幼聰敏有器量博涉羣書不治章句好飲酒間於占對年十三因曝書僧習謂慶曰汝雖聰敏吾未經特試乃令慶於雜賦集中取賦一篇千有餘言慶立讀三遍便即誦之無所遺漏時僧習為潁川郡地接都畿民多豪右將選鄉官皆依倚貴勢競來請託選用未定僧習謂諸子曰權貴請託吾並不用其使欲還皆須有答汝等各以意為吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷恆典僧習讀書歎曰此兒有意氣丈夫理當如是即依慶所草以報起家奉朝請慶出後第四叔及遭父憂議者不許為服重慶泣而言曰禮者蓋緣人情若於出後之家更有苴斬之服可奪此從彼今四叔薨背已久情事不追豈容奪禮乖違天性時論不能抑遂以苫凷終喪既葬乃與諸兄負土成墳服闋除中堅將軍魏孝武將西還除慶散騎侍郎馳𫝊入關慶至髙平見太祖共論時事太祖即請奉迎輿駕仍命慶先還復命時賀拔勝在荆州帝屏左右謂慶曰髙歡已屯河北關中兵既未至朕欲往荆州卿意何如慶對曰關中金城千里天下之彊國也宇文泰忠誠奮發朝廷之良臣也以陛下之聖明仗宇文泰之力用進可以東向而制羣雄退可以閉關而固天府此萬全之計也荆州地非要害衆又寡弱外迫梁寇內拒歡黨斯乃危亡是懼寧足以固鴻基以臣斷之未見其可帝深納之及帝西遷慶以母老不從獨孤信之鎮洛陽乃得入關除相府東閣祭酒領記室轉户曹參軍八年遷大行臺郎中領北華州長史十年除尚書都兵郎中如故并領記室時北雍州獻白鹿羣臣欲草表陳賀尚書蘇綽謂慶曰近代以來文章華靡逮於江左彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移况才子也尋以本官兼雍州别駕廣陵王元欣魏之懿親其甥孟氏屢為胸橫或有告其盜牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今若加以桎梏後復何以脫之欣亦遣使辨其無罪孟氏由此益驕慶於是大集僚吏盛言孟氏依倚權戚侵虐之狀言畢便令笞殺之此後貴戚斂手不敢侵暴有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恆置何處對曰恆自帶之慶曰頗與人同宿乎曰無與人同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金十二年改三十六曹為十二部詔以慶為計部郎中别駕如故有胡家被劫郡縣按察莫知賊所鄰近被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之乃作匿名書多榜官門曰我等共劫胡家徒侣混雜終恐泄露今欲首懼不免誅若聼先首免罪便欲來告慶乃復施免罪之榜居二日廣陽王欣家奴靣縛自告榜下因此推窮盡獲黨與慶之守正明察皆此類也每歎曰昔于公斷獄無私闢髙門可以待封儻斯言有驗吾其庶幾乎十三年封清河縣男邑二百户兼尚書右丞攝計部十四年正右丞太祖嘗怒安定國臣王茂將殺之而非其罪朝臣咸知而莫敢諌慶乃進曰王茂無罪奈何殺之太祖愈怒聲色甚厲謂慶曰王茂當死卿若明其無罪亦須坐之乃執慶於前慶辭氣不撓抗聲曰竊聞君有不逹者為不明臣有不爭者為不忠慶謹竭愚誠實不敢愛死但懼公為不明之君耳願深察之太祖乃悟而赦茂已不及矣太祖默然明日謂慶曰吾不用卿言遂令王茂冤死可賜茂家錢帛以旌吾過尋進爵為子增邑三百户十五年加平南將軍十六年太祖東討以慶為大行臺右丞加撫軍將軍還轉尚書右丞加通直散騎常侍魏廢帝初除民部尚書慶威儀端肅樞機明辨太祖每發號令常使慶宣之天性抗直無所回避太祖亦以此深委仗焉二年授車騎大將軍儀同三司魏恭帝初進位驃騎大將軍開府儀同三司尚書右僕射轉左僕射領著作六官建拜司會中大夫孝閔帝踐祚賜姓宇文氏進爵平齊縣公增邑通前一千五百户晉公護初攝政欲引為腹心慶辭之頗忤旨又與楊寬有隙及寬參知政事慶遂見踈忌出為萬州刺史世宗尋悟留為雍州别駕領京兆尹武成二年除宜州刺史慶自為郎迄於司㑹府庫倉儲並其職也及在宜州寬為小冡宰乃囚慶故吏求其罪失按驗積六十餘日吏或有死於獄者終無所言唯得剩錦數匹時人服其亷慎保定三年又入為司㑹先是慶兄檜為魏興郡守為賊黃寶所害檜子三人皆幼弱慶撫養甚篤後寶率衆歸朝朝廷待以優禮居數年檜次子雄亮白日手刃寶於長安城中晉公護聞而大怒執慶及諸子姪皆囚之讓慶曰國家憲綱皆君等所為雖有私怨寧得擅殺人也對曰慶聞父母之讐不同天兄弟之讐不同國明公以孝治天下何乃責於此乎護愈怒慶辭色無所屈卒以此免天和元年十二月薨時年五十贈鄜綏丹三州刺史諡曰景子機嗣機字匡時少有令譽風儀辭令為當世所推歷小納言開府儀同三司司宗中大夫大象中御正上大夫華州刺史機弟𢎞字匡道少聰頴亦善草𨽻博涉群書辭彩雅贍與𢎞農楊素為莫逆之交解巾中外府記室參軍建德初除內史上士厯小宫尹御正上士陳遣王偃民來聘髙祖令𢎞勞之偃民謂𢎞曰來日至於藍田正逢滋水暴長所齎國信溺而從流今所進者假之從吏請勒下流人見為追尋此物也𢎞曰昔淳于之獻空籠前史稱以為美足下假物而進詎是陳君之命乎偃民慙不能對髙祖聞而嘉之盡以偃民所進之物賜𢎞乃令報聘占對詳敏見稱於時使還拜內史都上士遷御正下大夫尋卒於官時年三十一髙祖甚惜之贈晉州刺史楊素誄之曰山陽王弼風流長逝潁川荀粲零落無時修竹夾池永絶梁園之賦長楊映沼無復洛川之文其為士友所痛惜如此有文集行於世慶三兄鷟虯檜虯檜並自有𫝊鷟好學善屬文魏臨淮王記室參軍事早卒子帶韋字孝孫深沉有度量少好學身長八尺三寸美風儀善占對韓賢素為洛州刺史召為主簿後與諸父歸朝太祖辟為參軍時侯景作亂江右太祖令帶韋使江郢二州與梁邵陵南平二王通好行至安州值假寶等反帶韋乃矯為太祖書以撫定之並即降伏既至郢見邵陵具申太祖意邵陵即時隨帶韋報命以奉使稱旨授轉輔國將軍中散大夫十七年太祖遣大將軍逹奚武經略漢川以帶韋為治行臺左丞從軍南討時梁宜豐侯蕭循守南鄭武攻之未拔乃令帶韋入城說循曰足下所固者險所恃者援所守者民今王師深入棧道長驅漢川此則所憑之險不足固也武興陷沒於前白馬破亡於後自餘川谷酋豪路阻而不敢進此則所望之援不可恃也夫顧親戚懼誅夷貪榮慕利此生人常也今大兵總至長圍四合戮逃亡以勸安居賞先降以招後服人人懷轉禍之計家家圖安堵之謀此則所部之民不可守也且足下本朝喪亂社稷無主盡忠將何所託死節不足成名竊為足下不取也僕聞賢者相時而動智者因變立功當今為足下計者莫若肉袒軍門歸命下吏免生民於塗炭全髮膚於孝道必當紆青拖紫裂土分圭名重當時業光後嗣豈若進退無據身名俱滅者哉循然之後乃降魏廢帝元年出為解縣令二年加授驃騎將軍左光祿大夫明年轉汾隂令發摘姧伏百姓畏而懷之世宗初入為地官上士武成元年授帥都督治御伯下大夫遷武藏下大夫保定三年授大都督四年加儀同三司中外府掾天和六年封康城縣男邑五百户轉職方中大夫三年授兵部中大夫雖頻徙職仍領武藏尋丁母憂起為職方中大夫五年轉武藏中大夫俄遷驃騎大將軍開府儀同三司凡居劇職十有餘年處斷無滯官曹清肅時譙王儉為益州總管漢王贊為益州刺史髙祖乃以帶韋為益州總管府長史領益州别駕輔弼二王總知軍民事建德中大軍東討徴帶韋為前軍總管齊王憲府長史齊平以功授上開府儀同大將軍進爵為公增邑一千户陳王純出并州以帶韋為并州司㑹并州總管府長史六年卒於位時年五十五諡曰愷子祚嗣少有名譽大象末宣納上士史臣曰周惠達見禮於寶夤揚寬荷恩於晉泰既而蕭氏獲罪莊帝出居遂能契闊寇戎不以興王革慮﨑嶇危難不以夷險易心斯固篤終之士栁慶束帶立朝懷匪躬之節蒞官從政著清白之美並遭逢興運各展志能譽重搢紳望隆端揆非虗云也然慶畏避權寵違忤宰臣雖取詘於一時實獲申於千載矣周書卷二十二周書卷二十二考證揚寬𫝊子紀嗣北史作子文紀嗣穆字紹叔穆與儉係寬之兄自此以下至華州刺史句當另自成𫝊柳慶𫝊今欲首懼不免誅首字下脫一伏字周書卷二十二考證
