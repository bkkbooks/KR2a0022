body:
  text: 周書卷二十唐令狐德棻等撰列傳第十二王盟賀蘭祥尉遲綱叱列伏龜閻慶王盟字子仵明德皇后之兄也其先樂浪入六世祖波前燕太宰祖珍魏黃門侍郎贈并州刺史樂浪公父羆伏波將軍以良家子鎮武川因家焉魏正光中破六汗拔陵攻陷諸鎮盟亦為其所擁拔陵破後流寓中山孝昌初除積射將軍從蕭寶夤西征寶夤僭逆盟遂逃匿民間以觀其變及爾朱天光入關盟出從之隨賀拔嶽為前鋒擒万俟醜奴平秦隴常先登力戰拜征西將軍平秦郡守太祖將討侯莫陳悅徴盟赴原州以為留後大都督鎮髙平悅平除原州刺史魏孝武至長安封魏昌縣公邑一千戶大統初復加車騎大將軍儀同三司三年徴拜司空尋轉司徒迎魏文帝悼后於茹茹加侍中遷太尉魏文帝東征以留後大都督行雍州事節度關中諸軍趙青雀之亂盟與開府李虎輔魏太子出頓渭北事平進爵長樂郡公增邑并前二千戶賜姓拓拔氏東魏侵汾川圍玊壁盟以左軍大都督守蒲坂軍還遷太保九年進位太傅加開府儀同三司盟姿度宏雅仁而泛愛雖位居師傅禮冠羣后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之及有疾數幸其第親問所欲其見禮如此大統十一年薨贈本官諡曰孝定子勵字醜興性忠果有才幹年十七從太祖入關及太祖平秦隴定關中勵常侍從太祖嘗謂之曰為將坐見成敗者上也被堅執鋭者次也勵曰意欲兼之太祖大笑尋拜平東將軍散騎常侍賜爵梁甫縣公大統初為千牛備身直長領左右出入卧內小心謹肅魏文帝嘗曰王勵可謂不二心之臣也沙苑之役勵以都督領禁兵從太祖勵居左翼與帳下數十人用短兵接戰當其前者死傷甚衆勵亦被傷重遂卒於行間時年二十六太祖深悼焉贈使持節太尉領尚書令十州諸軍事雍州刺史追封咸陽郡公諡曰忠武子弼襲爵尚魏安樂公主官至撫軍將軍大都督通直散騎常侍勵弟懋字小興盟之征西以懋尚幼留在山東永安中始入關與盟相見遂從征伐大統初賜爵安平縣子授揚烈將軍從盟迎魏悼后還拜城門校尉魏文帝東征以撫軍將軍兼太子左率留守俄轉右率歷尚食典御領左右武衛將軍録前後功進爵為公增邑千戶遷右衛將軍于時疆場交兵未申喪紀服齊斬者並墨縗從事及盟薨懋上表辭位乞終喪制魏文帝不許纍遷大都督散騎常侍使持節車騎大將軍儀同三司驃騎大將軍開府儀同三司侍中左衛將軍領軍將軍懋性溫和小心敬慎宿衛宫禁十有餘年勤恪當官未嘗有過魏文帝甚嘉之廢帝二年除南岐州刺史進爵安寧郡公增邑并前二千戶魏恭帝二年遷大將軍大都督後拜小司寇卒于官子悅嗣官至大將軍同州刺史改封濟南郡公盟兄子顯幼而敏悟沉靜少言初為太祖帳內都督纍遷奉車都尉寧朔將軍車騎大將軍儀同三司燕朔顯蔚四州諸軍事燕州刺史驃騎大將軍開府儀同三司光祿卿鳳州刺史賜爵洛邑縣公進位大將軍卒子誼嗣誼倜儻有大志深為髙祖所親委少歷顯職見重於時位至柱國平陽郡公宣帝即位進封揚國公拜大司空大象末襄州總管上柱國賀蘭祥字盛樂其先與魏俱起有紇伏者為賀蘭莫何弗因以為氏其後有以良家子鎮武川者遂家焉父初真少知名為鄉閭所重尚太祖姊建安長公主保定二年追贈太傅柱國常山郡公祥年十一而孤居喪合禮長於舅氏特為太祖所愛雖在戎旅常博延儒士教以書傳太祖初入關祥與晉公護俱在晉陽後乃遣使迎致之語在護傳年十七解褐奉朝請加威烈將軍祥少有膽氣志在立功尋擢補都督恆在帳下從平侯莫陳悅又迎魏孝武以前後功封撫夷縣伯邑五百戶仍從擊潼關獲東魏將薛長孺又攻回洛城拔之還拜左右直長進爵為公增邑并前一千三百戶大統三年從儀同于謹攻楊氏壁祥先登克之遷右衛將軍加持節征虜將軍沙苑之役詔祥留衛京師後以留守功增邑八百戶尋除鎮西將軍四年魏文帝東伐祥領軍從戰河橋以功加使持節大都督八年遷車騎大將軍儀同三司散騎常侍九年從太祖與東魏戰於邙山進位驃騎大將軍開府儀同三司加侍中十四年除都督三荆南襄南雍平信江隨二郢浙十二州諸軍事荆州刺史進爵博陵郡公先是祥嘗行荆州事雖未朞月頗有惠政至是重往百姓安之由是漢南流民襁負而至者日有千數逺近蠻夷莫不欵附祥隨機撫納咸得其歡心時盛夏亢陽祥乃親巡境內觀政得失見有發掘古冡暴露骸骨者乃謂守令曰此豈仁者之為政耶於是命所在收葬之即日澍雨是嵗大有年州境先多古墓其俗好行發掘至是遂息祥雖太祖密戚性甚清素州境南接襄陽西通岷蜀物産所出多諸珍異時既與梁通好行李往來公私贈遺一無所受梁雍州刺史嶽陽王蕭察欽其節儉乃以竹屛風絺綌之屬及以經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥尋被徴還十六年拜大將軍太祖以涇渭溉灌之處渠堰廢毁乃命祥修造富平堰開渠引水東注於洛功用既畢民獲其利魏廢帝二年行華州事後改華州為同州仍以祥為刺史尋拜尚書左僕射六官建授小司馬孝閔帝踐祚進位柱國遷大司馬時晉公護執政祥與護中表少相親愛軍國之事護皆與祥參謀及誅趙貴廢孝閔帝祥有力焉武成初吐谷渾侵凉州詔祥與宇文貴總兵討之祥乃遣其軍司檄吐谷渾曰夫二氣既分三才定位樹之以君本為黔首豈使悖義違道肆於民上昔魏氏不綱羣方幅裂豺狼橫噬龜玊已毁喁喁黔黎咸墜塗炭我先皇神武應期一匡天下東戡南剪無思不服天鑑有周世篤英聖遂廓洪基奄荒萬㝢固則神臯西嶽險則百二猶在卿士師師羣后率職故知三靈之所眷集四隩之所來蘇也彼國世在西垂作藩於魏值中原政亂遂阻皇風首鼠兩端伺我邉隙先皇含垢藏疾仍存聘享欲睦之以鄰好申之以婚姻彼國苞藏禍心屢違盟約外結仇讐自貽近患是故往年致突厥之師也自爾迄今蜂蠆彌毒入我姑臧俘我河縣芟夷我菽麥䖍劉我蒼生我皇武以止戈文以懷逺德覃四海化溢八荒以彼惡稔禍盈故命龔行九伐武臣猛將天張雷動皆六郡良家三秦精鋭揮戈擐甲同萃龍沙柱國博陵公祥貴戚重望乃文乃武受脤廟堂元戎啓路太傅燕國公于謹英猷不世應變無窮仗旄指麾為其謀主柱國化政公貴早播威聲竒正兼設直取龍涸濟自南河突厥與國睦親同恥反道驅引弓之民總穹廬之衆解鞍成山雲蒸霧合往嵗王師西伐成都不守桴鼓南臨江陵底定鑿空萬里闢地千都荒服畏威膜拜厥角成敗之機較然可見若能轉禍為福深識事宜君臣相率輿櫬稽顙則爵等顯除永蕃西服如其徘徊危邦覬延時漏覆宇湮祀良助寒心幸思嘉謀以圖去就遂與吐谷渾廣定王鍾留王等戰破之因拔其洮陽洪和二城以其地為洮州撫安西土振旅而還進封凉國公邑萬户保定四年薨年四十八贈使持節太師同岐等十二州諸軍事同州刺史諡曰景有七子敬讓璨師寬知名敬少歷顯職封化隆縣侯後襲封凉國公位至柱國大將軍華州刺史讓大將軍鄜州刺史河東郡公璨開府儀同三司宜陽縣公隋文帝與祥有舊開皇初追贈上柱國尉遲綱字婆羅蜀國公迥之弟也少孤與兄迥依託舅氏太祖西討關隴迥綱與母昌樂大長公主留守晉陽後方入關從太祖征伐常陪侍帷幄出入卧內後以迎魏孝武功拜殿中將軍大統元年授帳內都督從儀同李虎討曹泥破之又從破竇泰以功封廣宗縣伯邑五百戶仍從復宏農克河北郡戰沙苑皆有功綱驍果有膂力善騎射太祖甚寵之委以心膂河橋之戰太祖馬中流矢因而驚奔綱與李穆等左右力戰衆皆披靡太祖方得乘馬以前後功增邑八百戶進爵為公仍拜平逺將軍步兵校尉八年加通直散騎常侍太子武衛率前將軍轉帥都督東魏圍玉壁綱從太祖救之九年春太祖復與東魏戰於邙山大軍不利人心離解綱勵將士盡心翊衛遷大都督十四年拜車騎大將軍儀同三司加散騎常侍增邑三百户俄遷驃騎大將軍開府儀同三司加侍中進爵昌平郡公十七年出為華州刺史魏廢帝二年拜大將軍兼領軍將軍及帝有異謀言頗漏泄太祖以綱職典禁旅使密為之備俄而廢帝立齊王仍以綱為中領軍總宿衛綱兄迥率衆伐蜀綱從太祖送之於城西見一走兔太祖命綱射之誓曰若獲此兔必當破蜀俄而綱獲兔而反太祖喜曰事平之日當賞汝佳口及克蜀賜綱侍婢二人又常從太祖北狩雲陽值五鹿俱起綱獲其三每從遊宴太祖以珍異之物令諸功臣射而取之綱所獲輒多孝閔帝踐阼綱以親戚掌禁兵除小司馬又與晉公護廢帝語在護傳世宗即位進位柱國大將軍武成元年進封吳國公邑萬户除涇州總管五州十一防諸軍事涇州刺史是嵗大長公主薨于京師綱去職尋起復本官保定元年拜少傅俄而授大司空二年出為陜州總管七州十三防諸軍事陜州刺史四年晉公護東討乃配綱甲士留鎮京師綱以天子在宫必無內慮乃請出外頓於咸陽大軍還綱復歸鎮天和二年以綱政績可稱賜帛千假穀六千斛錢二十萬增邑四百户陳公純等以皇后阿史那氏自突厥將入塞詔徴綱與大將軍王傑率衆迎衛於境首三年追論河橋之功封一子縣公邑一千户四年五月薨于京師時年五十三贈太保十二州諸軍事同州刺史諡曰武第三子安以嫡嗣大象末位至柱國安兄運别有𫝊運弟勤少歷顯位大象末青州總管起兵應伯父迥事在迥𫝊安弟敬尚世宗女河南公主位至儀同三司叱列伏龜字摩頭陀代郡西部人也世為部落大人魏初入附遂世為第一領民酋長至龜容貌瓌偉腰帶十圍進止詳雅兼有武藝嗣父業復為領民酋長魏正光五年廣陽王深北征請龜為寧朔將軍委以帳內兵事尋除善無郡守孝昌三年又除别將從長孫稚西征以戰功纍遷征西將軍金紫光祿大夫後還洛授都督遂為齊神武所寵任加授大都督沙苑之敗隨例來降太祖以其豪門解縛禮之仍以邵惠公女妻之大統四年封長樂縣公邑一千户自此常從太祖征討亟有戰功八年出為北雍州刺史加大都督尋進位車騎大將軍儀同三司散騎常侍十四年徴拜侍中加驃騎大將軍開府儀同三司除恆州刺史增邑通前一千四百户十七年卒子椿嗣椿字千年世宗時拜車騎大將軍儀同三司尋遷驃騎大將軍開府儀同三司改封永世縣公邑一千二百户保定二年授幽州刺史天和初除左宫伯進位大將軍閻慶字仁慶河南河隂人也曾祖善仕魏歷龍􅋮將軍雲州鎮將因家於雲州之盛樂郡祖提使持節車騎大將軍燉煌鎮都大將父進有謀略勇冠當時正光中拜龍驤將軍屬衛可孤作亂攻圍盛樂進率衆拒守綿歷三載晝夜交戰未嘗休息以少擊衆城竟獲全以功拜盛樂郡守慶幼聰敏重然諾風儀端肅望之儼然及衛可孤侵逼盛樂慶隨父固守頗有力焉拜别將稍遷輕車將軍加給事中後以軍功拜步兵校尉中堅將軍既而齊神武舉兵入洛魏孝武西遷慶謂所親曰髙歡跋扈將有篡逆之謀豈可茍安目前受其控制也遂以大統三年自宜陽歸闕太祖謂慶曰髙歡逆亂宇內分崩羣盜競興人皆徇已卿遂能盡忠貞之節重君臣之義背逆歸順捨危就安雖古人所稱何以加也即拜中堅將軍奉車都尉河橋之役以功拜前將軍太中大夫遷後將軍封安次縣子邑四百户及邙山之戰先登陷陳拜撫軍將軍大都督進爵為伯增邑五百户慶善於綏撫士卒未休未嘗先舍故能盡其死力屢展勳勞纍遷使持節車騎大將軍儀同三司散騎常侍驃騎大將軍開府儀同三司雲州大中正加侍中賜姓大野氏孝閔帝踐祚出為河州刺史進爵石保縣公增邑千户州居河外地接戎夷慶留心撫納頗稱簡惠就拜大將軍進爵大安郡公邑户如舊入為小司空除雲州刺史轉寧州刺史慶性寬和不苛察百姓悅之天和六年進位柱國晉公護母慶之姑也護雖擅朝而慶未嘗阿附及護誅髙祖以此重之乃詔慶第十二子毗尚帝女清都公主慶雖位望隆重婚連帝室常以謙慎自守時人以此稱之建德二年抗表致仕優詔許焉慶既衰老恆嬰沉痼宣帝以其先朝耆舊特異常倫乃詔靜帝至第問疾賜布帛千假醫藥所須令有司供給大象二年拜上柱國隋文帝踐極又令皇太子就第問疾仍供醫藥之費開皇二年薨時年七十七贈司空荆譙浙湖澧廣蒙七州諸軍事荆州刺史諡曰成長子常先慶卒次子毗嗣大象末位至大將軍史臣曰中陽御歷沛邑多封侯白水配天南陽皆貴戚是知階緣近屬以取寵榮其來尚矣王盟等始以親黨升朝終以才能進逹勤宣運始位列周行實參迹於功臣蓋弗由於恩澤也周書卷二十周書卷二十考證王盟𫝊王盟字子仵子仵北史作子什子勵勵北史作勱及後諸勵字同賀蘭祥𫝊賀蘭祥字盛樂北史同臣文淳按晉蕩公護𫝊作盛洛北史亦同樂與洛未知孰是閻慶傳次子毗嗣嗣監本訛稚今從北史周書卷二十考證
