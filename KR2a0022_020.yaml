body:
  text: 周書卷二十唐令狐徳棻等撰列傳第十二王盟賀蘭祥尉遲綱叱列伏龜閻慶王盟字子仵明徳皇后之兄也其先樂浪入六世祖波前燕太宰祖珍魏黄門侍郎贈并州刺史樂浪公父羆伏波将軍以良家子鎮武川因家焉魏正光中破六汗拔陵攻陷諸鎮盟亦為其所擁拔陵破後流寓中山孝昌初除積射将軍從蕭寳夤西征寳夤僭逆盟遂逃匿民間以觀其變及爾朱天光入闗盟出從之随賀拔岳為前鋒擒万俟醜奴平秦隴常先登力戰拜征西将軍平秦郡守太祖将討侯莫陳悦徴盟赴原州以為留後大都督鎮髙平悦平除原州刺史魏孝武至長安封魏昌縣公邑一千戸大統初復加車騎大将軍儀同三司三年徴拜司空尋轉司徒迎魏文帝悼后於茹茹加侍中遷太尉魏文帝東征以留後大都督行雍州事節度闗中諸軍趙青雀之亂盟與開府李虎輔魏太子出頓渭北事平進爵長樂郡公增邑并前二千戸賜姓拓㧞氏東魏侵汾川圍玊壁盟以左軍大都督守蒲坂軍還遷太保九年進位太傅加開府儀同三司盟姿度宏雅仁而汎愛雖位居師傅禮冠羣后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之及有疾數幸其第親問所欲其見禮如此大統十一年薨贈本官諡曰孝定子勵字醜興性忠果有才幹年十七從太祖入闗及太祖平秦隴定闗中勵常侍從太祖嘗謂之曰為将坐見成敗者上也被堅執鋭者次也勵曰意欲兼之太祖大笑尋拜平東将軍散騎常侍賜爵梁甫縣公大統初為千牛備身直長領左右出入卧内小心謹肅魏文帝嘗曰王勵可謂不二心之臣也沙苑之役勵以都督領禁兵從太祖勵居左翼與帳下數十人用短兵接戰當其前者死傷甚衆勵亦被傷重遂卒於行間時年二十六太祖深悼焉贈使持節太尉領尚書令十州諸軍事雍州刺史追封咸陽郡公諡曰忠武子弼襲爵尚魏安樂公主官至撫軍将軍大都督通直散騎常侍勵弟懋字小興盟之征西以懋尚㓜留在山東永安中始入闗與盟相見遂從征伐大統初賜爵安平縣子授揚烈将軍從盟迎魏悼后還拜城門校尉魏文帝東征以撫軍将軍兼太子左率留守俄轉右率歴尚食典御領左右武衛将軍錄前後功進爵為公增邑千戸遷右衛将軍于時疆場交兵未申喪紀服齊斬者並墨縗從事及盟薨懋上表辭位乞終喪制魏文帝不許累遷大都督散騎常侍使持節車騎大将軍儀同三司驃騎大将軍開府儀同三司侍中左衛将軍領軍将軍懋性温和小心敬慎宿衛宫禁十有餘年勤恪當官未嘗有過魏文帝甚嘉之廢帝二年除南岐州刺史進爵安寧郡公増邑并前二千戸魏恭帝二年遷大将軍大都督後拜小司宼卒于官子悦嗣官至大将軍同州刺史改封濟南郡公盟兄子顯㓜而敏悟沉靜少言初為太祖帳内都督累遷奉車都尉寜朔将軍車騎大将軍儀同三司燕朔顯蔚四州諸軍事燕州刺史驃騎大将軍開府儀同三司光祿卿鳳州刺史賜爵洛邑縣公進位大将軍卒子誼嗣誼倜儻有大志深為髙祖所親委少歴顯職見重於時位至柱國平陽郡公宣帝即位進封揚國公拜大司空大象末襄州總管上柱國賀蘭祥字盛樂其先與魏俱起有紇伏者為賀蘭莫何弗因以為氏其後有以良家子鎮武川者遂家焉父初真少知名為鄉閭所重尚太祖姊建安長公主保定二年追贈太傅柱國常山郡公祥年十一而孤居喪合禮長於舅氏特為太祖所愛雖在戎旅常博延儒士教以書傳太祖初入闗祥與晉公䕶俱在晉陽後乃遣使迎致之語在䕶傳年十七解褐奉朝請加威烈将軍祥少有膽氣志在立功尋擢補都督恒在帳下從平侯莫陳悦又迎魏孝武以前後功封撫夷縣伯邑五百戸仍從擊潼闗𫉬東魏将薛長孺又攻回洛城拔之還拜左右直長進爵為公增邑并前一千三百戸大統三年從儀同于謹攻楊氏壁祥先登克之遷右衛将軍加持節征虜将軍沙苑之役詔祥留衛京師後以留守功増邑八百戸尋除鎮西将軍四年魏文帝東伐祥領軍從戰河橋以功加使持節大都督八年遷車騎大将軍儀同三司㪚騎常侍九年從太祖與東魏戰於邙山進位驃騎大将軍開府儀同三司加侍中十四年除都督三荆南襄南雍平信江随二郢浙十二州諸軍事荆州刺史進爵博陵郡公先是祥嘗行荆州事雖未朞月頗有惠政至是重往百姓安之由是漢南流民襁負而至者日有千數逺近蠻夷莫不欵附祥随機撫納咸得其歡心時盛夏亢陽祥乃親巡境内觀政得失見有發掘古冡暴露骸骨者乃謂守令曰此豈仁者之為政耶於是命所在收葬之即日澍雨是嵗大有年州境先多古墓其俗好行發掘至是遂息祥雖太祖密戚性甚清素州境南接襄陽西通岷蜀物産所出多諸珍異時既與梁通好行李徃來公私贈遺一無所受梁雍州刺史岳陽王蕭察欽其節儉乃以竹屛風絺綌之屬及以經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥尋被徴還十六年拜大将軍太祖以涇渭溉灌之處渠堰廢毁乃命祥修造富平堰開渠引水東注於洛功用既畢民獲其利魏廢帝二年行華州事後改華州為同州仍以祥為刺史尋拜尚書左僕射六官建授小司馬孝閔帝踐祚進位柱國遷大司馬時晉公䕶執政祥與䕶中表少相親愛軍國之事䕶皆與祥叅謀及誅趙貴廢孝閔帝祥有力焉武成初吐谷渾侵凉州詔祥與宇文貴總兵討之祥乃遣其軍司檄吐谷渾曰夫二氣既分三才定位樹之以君本為黔首豈使悖義違道肆於民上昔魏氏不綱羣方幅裂犲狼横噬龜玊已毁喁喁黔黎咸墜塗炭我先皇神武應期一匡天下東戡南剪無思不服天鑑有周世篤英聖遂廓洪基奄荒萬㝢固則神臯西嶽險則百二猶在卿士師師羣后率職故知三靈之所睠集四隩之所來蘇也彼國世在西垂作藩於魏值中原政亂遂阻皇風首䑕两端伺我邉隙先皇含垢藏疾仍存聘享欲睦之以隣好申之以婚姻彼國苞藏禍心屢違盟約外結仇讐自貽近患是故徃年致突厥之師也自爾迄今蜂蠆彌毒入我姑臧俘我河縣芟夷我菽麥䖍劉我蒼生我皇武以止戈文以懐逺徳覃四海化溢八荒以彼惡稔禍盈故命龔行九伐武臣猛将天張雷動皆六郡良家三秦精鋭揮戈擐甲同萃龍沙柱國博陵公祥貴戚重望乃文乃武受脤廟堂元戎啓路太傅燕國公于謹英猷不世應變無窮仗旄指麾為其謀主柱國化政公貴早播威聲竒正兼設直取龍涸濟自南河突厥與國睦親同恥反道驅引弓之民總穹廬之衆解鞍成山雲蒸霧合徃嵗王師西伐成都不守桴鼓南臨江陵底定鑿空萬里闢地千都荒服畏威膜拜厥角成敗之機較然可見若能轉禍為福深識事宜君臣相率輿櫬稽顙則爵等顯除永蕃西服如其徘徊危邦覬延時漏覆宇湮祀良助寒心幸思嘉謀以圖去就遂與吐谷渾廣定王鍾留王等戰破之因拔其洮陽洪和二城以其地為洮州撫安西土振旅而還進封凉國公邑萬户保定四年薨年四十八贈使持節太師同岐等十二州諸軍事同州刺史諡曰景有七子敬讓璨師寛知名敬少歴顯職封化隆縣侯後襲封凉國公位至柱國大将軍華州刺史讓大将軍鄜州刺史河東郡公璨開府儀同三司宜陽縣公隋文帝與祥有舊開皇初追贈上柱國尉遲綱字婆羅蜀國公迥之弟也少孤與兄迥依託舅氏太祖西討闗隴迥綱與母昌樂大長公主留守晉陽後方入闗從太祖征伐常陪侍帷幄出入卧内後以迎魏孝武功拜殿中将軍大統元年授帳内都督從儀同李虎討曹泥破之又從破竇泰以功封廣宗縣伯邑五百戸仍從復宏農克河北郡戰沙苑皆有功綱驍果有膂力善騎射太祖甚寵之委以心膂河橋之戰太祖馬中流矢因而驚奔綱與李穆等左右力戰衆皆披靡太祖方得乗馬以前後功増邑八百戸進爵為公仍拜平逺将軍歩兵校尉八年加通直㪚騎常侍太子武衛率前将軍轉帥都督東魏圍玉壁綱從太祖救之九年春太祖復與東魏戰於邙山大軍不利人心離解綱勵将士盡心翊衛遷大都督十四年拜車騎大将軍儀同三司加㪚騎常侍増邑三百户俄遷驃騎大将軍開府儀同三司加侍中進爵昌平郡公十七年出為華州刺史魏廢帝二年拜大将軍兼領軍将軍及帝有異謀言頗漏泄太祖以綱職典禁旅使宻為之備俄而廢帝立齊王仍以綱為中領軍總宿衛綱兄迥率衆伐蜀綱從太祖送之於城西見一走兎太祖命綱射之誓曰若獲此兎必當破蜀俄而綱𫉬兔而反太祖喜曰事平之日當賞汝佳口及克蜀賜綱侍婢二人又常從太祖北狩雲陽値五鹿俱起綱獲其三每從遊宴太祖以珍異之物令諸功臣射而取之綱所獲輙多孝閔帝踐阼綱以親戚掌禁兵除小司馬又與晉公䕶廢帝語在䕶傳世宗即位進位柱國大将軍武成元年進封吳國公邑萬户除涇州總管五州十一防諸軍事涇州刺史是嵗大長公主薨于京師綱去職尋起復本官保定元年拜少傅俄而授大司空二年出為陜州總管七州十三防諸軍事陜州刺史四年晉公䕶東討乃配綱甲士留鎮京師綱以天子在宫必無内慮乃請出外頓於咸陽大軍還綱復歸鎮天和二年以綱政績可稱賜帛千叚糓六千斛錢二十萬増邑四百户陳公純等以皇后阿史那氏自突厥将入塞詔徴綱與大将軍王傑率衆迎衛於境首三年追論河橋之功封一子縣公邑一千户四年五月薨于京師時年五十三贈太保十二州諸軍事同州刺史諡曰武第三子安以嫡嗣大象末位至柱國安兄運别有𫝊運弟勤少歴顯位大象末青州總管起兵應伯父迥事在迥𫝊安弟敬尚世宗女河南公主位至儀同三司叱列伏龜字摩頭陁代郡西部人也世為部落大人魏初入附遂世為第一領民酋長至龜容貎瓌偉腰帶十圍進止詳雅兼有武藝嗣父業復為領民酋長魏正光五年廣陽王深北征請龜為寜朔将軍委以帳内兵事尋除善無郡守孝昌三年又除别将從長孫稚西征以戰功累遷征西将軍金紫光祿大夫後還洛授都督遂為齊神武所寵任加授大都督沙苑之敗随例來降太祖以其豪門解縛禮之仍以邵惠公女妻之大統四年封長樂縣公邑一千户自此常從太祖征討亟有戰功八年出為北雍州刺史加大都督尋進位車騎大将軍儀同三司散騎常侍十四年徴拜侍中加驃騎大将軍開府儀同三司除恒州刺史増邑通前一千四百户十七年卒子椿嗣椿字千年世宗時拜車騎大将軍儀同三司尋遷驃騎大将軍開府儀同三司改封永世縣公邑一千二百户保定二年授幽州刺史天和初除左宫伯進位大将軍閻慶字仁慶河南河隂人也曾祖善仕魏歴龍􅋮将軍雲州鎮将因家於雲州之盛樂郡祖提使持節車騎大将軍燉煌鎮都大将父進有謀畧勇冠當時正光中拜龍驤将軍屬衛可孤作亂攻圍盛樂進率衆拒守緜歴三載晝夜交戰未嘗休息以少擊衆城竟獲全以功拜盛樂郡守慶㓜聰敏重然諾風儀端肅望之儼然及衛可孤侵逼盛樂慶随父固守頗有力焉拜别将稍遷輕車将軍加給事中後以軍功拜歩兵校尉中堅将軍既而齊神武舉兵入洛魏孝武西遷慶謂所親曰髙歡跋扈将有簒逆之謀豈可茍安目前受其控制也遂以大統三年自宜陽歸闕太祖謂慶曰髙歡逆亂宇内分崩羣盗競興人皆徇已卿遂能盡忠貞之節重君臣之義背逆歸順捨危就安雖古人所稱何以加也即拜中堅将軍奉車都尉河橋之役以功拜前将軍太中大夫遷後将軍封安次縣子邑四百户及邙山之戰先登陷陳拜撫軍将軍大都督進爵為伯増邑五百户慶善於綏撫士卒未休未嘗先舍故能盡其死力屢展勲勞累遷使持節車騎大将軍儀同三司散騎常侍驃騎大将軍開府儀同三司雲州大中正加侍中賜姓大野氏孝閔帝踐祚出為河州刺史進爵石保縣公増邑千户州居河外地接戎夷慶留心撫納頗稱簡惠就拜大将軍進爵大安郡公邑户如舊入為小司空除雲州刺史轉寜州刺史慶性寛和不苛察百姓悦之天和六年進位柱國晉公護母慶之姑也䕶雖擅朝而慶未嘗阿附及䕶誅髙祖以此重之乃詔慶第十二子毗尚帝女清都公主慶雖位望隆重婚連帝室常以謙慎自守時人以此稱之建徳二年抗表致仕優詔許焉慶既衰老恒嬰沉痼宣帝以其先朝耆舊特異常倫乃詔靜帝至第問疾賜布帛千叚醫藥所須令有司供給大象二年拜上柱國隋文帝踐極又令皇太子就第問疾仍供醫藥之費開皇二年薨時年七十七贈司空荆譙浙湖澧廣蒙七州諸軍事荆州刺史諡曰成長子常先慶卒次子毗嗣大象末位至大将軍史臣曰中陽御歴沛邑多封侯白水配天南陽皆貴戚是知階縁近屬以取寵榮其來尚矣王盟等始以親黨升朝終以才能進逹勤宣運始位列周行實參迹於功臣盖弗由於恩澤也周書卷二十周書卷二十考證王盟𫝊王盟字子仵子仵北史作子什子勵勵北史作勱及後諸勵字同賀蘭祥𫝊賀蘭祥字盛樂北史同臣文淳按晉蕩公䕶𫝊作盛洛北史亦同樂與洛未知孰是閻慶傳次子毗嗣嗣監本訛稚今從北史周書卷二十考證
