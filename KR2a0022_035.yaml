body:
  text: 周書卷三十五唐令狐德棻等撰列傳第二十七鄭孝穆子譯崔謙弟諶崔猷裴俠薛端子胄弟裕薛善弟慎敬珍敬祥鄭孝穆字道和榮陽開封人魏將作大匠渾之十一世孫祖敬叔魏潁川濮陽郡守本邑中正父瓊范陽郡守贈安東將軍青州刺史孝穆幼而謹厚以清約自居年未弱冠涉獵經史父叔四人並早歿昆季之中孝穆居長撫訓諸弟有如同生閨庭之中怡怡如也魏孝昌初解褐太尉行參軍轉司徒主簿屬盜賊蜂起除假節龍驤將軍别將屢有戰功永安中遷冠軍將軍持節都督從元天穆討平邢杲進驃騎將軍左光祿大夫太師咸陽王長史及魏孝武西遷從入關除司徒左長史領臨洮王友賜爵永寧縣侯大統五年行武功郡事遷使持節大將軍行岐州刺史當州都督在任未幾有能名就加通直散騎常侍王羆時為雍州刺史欽其善政遣使貽書盛相稱述先是所部百姓久遭離亂飢饉相仍逃散殆盡孝穆下車之日户止三千留情綏撫逺近咸至數年之內有四萬家每嵗考績為天下最太祖嘉之賜書曰知卿蒞職近畿留心治術凋弊之俗禮教興行厭亂之民襁負而至昔郭伋政成并部賈琮譽重冀方以古方今彼有慙德於是徴拜京兆尹十五年梁雍州刺史嶽陽王蕭察稱藩來附時議欲遣使盛選行人太祖歷觀內外無逾孝穆者十六年乃假孝穆散騎常侍持節䇿拜察為梁王使還稱旨進車騎大將軍儀同三司加散騎常侍是年太祖總戎東討除大丞相府右長史封金鄉縣男邑二百户軍次潼關命孝穆與左長史長孫儉司馬楊寬尚書蘇亮咨議劉孟良等分掌衆務仍令孝穆引接關東歸附人士并品藻才行而任用之孝穆撫納銓敘咸得其宜大將軍達奚武率衆經略漢中以孝穆為梁州刺史以疾不之部拜中書令賜姓宇文氏尋以疾免孝閔帝踐阼加驃騎大將軍開府儀同三司進爵為子增邑通一千户普公護為雍州牧辟為别駕又以疾固辭武城二年徴拜御伯中大夫徙授御正保定三年出為宜州刺史轉華州刺史五年除虞州刺史轉陜州刺史頻歷數州皆有政績復以疾篤屢乞骸骨入為少司空卒於位時年六十贈本官加鄭梁北豫三州刺史諡曰貞子詡嗣歷位納言為聘陳使後至開府儀同三司大將軍邵州刺史詡弟譯於隋文帝有翊贊功開皇初又追贈孝穆大將軍徐兗等六州刺史改諡曰文譯幼聰敏涉獵羣書尤善音樂有名於時世宗詔令事輔城公及髙祖即位除都督稍遷御正下大夫頗被顧待東宮建以譯為宮尹下大夫特被太子親愛建德二年為聘齊使副及太子西征多有失德王䡄宇文孝伯等以聞髙祖大怒宮臣親幸者咸被譴責譯坐除名後例復官仍拜吏部下大夫宣帝嗣位授開府儀同大將軍內史中大夫封歸昌縣公邑千户既以恩舊任遇甚重朝政機密並得參詳尋遷內史上大夫進爵沛國公上大夫之官自譯始也及宣帝大漸御正下大夫劉昉乃與譯謀以隋公受遺輔少主隋文帝執政拜柱國大丞相府長史內史如故尋進位上柱國崔謙字士遜博陵安平人也祖辨魏平逺將軍武邑郡守父楷散騎常侍光祿大夫殷州刺史贈侍中都督冀定相三州諸軍事驃騎大將軍儀同三司冀州刺史謙幼聰敏神彩嶷然及長深沉有識量歷觀經史不持章句志在博聞而已每覽經國緯民之事心常好之未嘗不撫卷歎息孝昌中解褐著作佐郎從太宰元天穆討邢杲破之以功授輔國將軍太中大夫遷平東將軍尚書殿中郎賀拔勝出鎮荆州以謙為行臺左丞勝雖居方嶽之任至於安輯夷夏綱紀衆務皆委謙焉謙亦盡其智能以相匡弼勝有聲南州謙之力也及魏孝武將備齊神武之逼乃詔勝引兵赴洛軍至廣州帝已西遷勝乃遲疑將旋所鎮謙謂勝曰昔周室不造諸侯釋位漢道中微列藩盡節今皇家多故主上蒙塵實忠臣枕戈之時義士立功之日也公受方面之重總宛葉之衆若杖義而動首唱勤王天下聞風孰不感激誠宜順義勇之志副遐邇之心倍道兼行謁帝關右然後與宇文行臺同心協力電討不庭則桓文之勳復興於兹日矣捨此不為中道而退便恐人皆解體士各有心一失事機後悔何及勝不能用而人情果大騷動還未至州州民鄧誕引侯景軍奄至勝與戰敗績遂將麾下數百騎南奔於梁謙亦與勝俱行及至梁每乞師赴援梁武帝雖不為出軍而嘉勝等志節並許其還國乃令謙先還且通鄰好魏文帝見謙甚悅謂之曰卿出萬死之中投身江外今得生還本朝豈非忠貞之報也太祖素聞謙名甚禮之乃授征西將軍金紫光祿大夫賜爵千乘縣男及勝至拜太師以謙有毗輔之功又授太師長史大統三年從太祖擒竇泰戰沙苑並有功進爵為子遷車騎大將軍右光祿大夫拜尚書右丞謙明練時事及居樞轄時論以為得人四年從太祖解洛陽圍仍經河橋戰加定州大中正瀛州刺史十五年授車騎大將軍儀同三司又破柳仲禮於隨郡討平李遷哲於魏興並有功進驃騎大將軍開府儀同三司直州刺史賜姓宇文氏魏恭帝初轉利州刺史謙性明悟深曉政術又勤於理務民訟雖繁未嘗有懈倦之色吏民以是敬而愛之時有蜀人賈晃遷舉兵作亂率其黨圍逼州城謙倉卒分部才得千許人便率拒戰會梁州援兵至遂擒晃遷餘人乃散謙誅其渠帥餘並原之旬日之間遂得安輯世宗初進爵作唐縣公保定二年遷安州總管隨應等十一州甑山上明魯山三鎮諸軍事安州刺史四年加大將軍進爵武康郡公天和元年授江陵總管三年遷荆州總管荆浙等十四州南陽平陽等八防諸軍事荆州刺史州既統攝遐長俗兼夷夏又南接陳境東鄰齊寇謙外禦強敵內撫軍民風化大行號稱良牧每年考績常為天下最屢有詔褒美焉謙隨賀拔勝之在荆州也雖被親遇而名位未顯及踐其位朝野以為榮四年卒於州闔境痛惜之乃共立祠堂四時祭饗子曠嗣謙性至孝少喪父殆將滅性與弟諶特相友愛雖復年事並髙名位各重所有資産皆無私焉其居家嚴肅動遵禮度曠與諶子𢎞度等並奉其遺訓云曠少溫雅仁而泛愛釋褐中外府記室大象末位至開府儀同大將軍浙州刺史諶本名士約少鯁直有節槩膂力過人尤工騎射釋褐領軍府録事轉咨議參軍及賀拔勝出牧荆州以諶為假節冠軍將軍防城都督又隨勝奔梁復自梁歸國授衛將軍都督封安昌縣子邑三百戶從太祖復𢎞農戰沙苑皆有功進爵為侯增邑八百户除京兆郡守纍遷帥都督撫軍將軍通直散騎常侍大都督車騎大將軍儀同三司都官尚書定州大中正改封安固縣侯增邑三百戶賜姓宇文氏并賜名諶焉進爵驃騎大將軍開府儀同三司加侍中進爵萬年縣公增邑通前二千四百户除隴州刺史遷總管涼甘瓜三州諸軍事涼州刺史諶蒞政強毅百姓畏之齊王憲東征以諶為行軍長史軍還除使持節崇德安義等十三防熊和忠等三州諸軍事崇德防主加授大將軍改封安平縣公建德四年卒時年六十四贈鄜延丹綏長五州刺史諡曰壯子𢎞度猛毅有父風大象末上柱國武鄉郡公崔猷字宣猷博陵安平人漢尚書實之十二世孫也祖挺魏光州刺史泰昌縣子贈輔國將軍幽州刺史諡曰景父孝芬左光祿大夫儀同三司兼吏部尚書為齊神武所害猷少好學風度間雅性鯁正有軍國籌略釋褐員外散騎侍郎領大行臺郎中尋為吏部尚書李神􅖡所薦拜通直散騎侍郎攝尚書駕部郎中普泰初除征虜將軍司徒從事中郎既遭家難遂間行入關及謁魏孝武哀動左右帝為之改容既退帝目送之曰忠孝之道萃此一門即以本官奏門下事大統初兼給事黃門侍郎封平原縣伯邑八百户二年除正黃門加中軍將軍擒竇泰復𢎞農破沙苑猷常以本官從軍典文翰五年除司徒左長史加驃騎將軍時太廟初成四時祭祀猶設俳優角抵之戲其郊廟祭官多有假兼猷屢上疏諫書奏並納焉遷京兆尹時婚姻禮廢嫁娶之辰多舉音樂又門里里富室衣服奢淫乃有織成文繡者猷又請禁斷事亦施行與盧辨等創修六官十二年除大都督驃騎將軍浙州刺史加車騎大將軍儀同三司十四年侯景據河南歸款遣行臺王思政赴之太祖與思政書曰崔宣猷智略明贍有應變之才若有所疑宜與量其可不思政初領兵襄城後欲於潁川為行臺治所遣使人魏仲奉啓陳之并致書於猷論將移之意猷復書曰夫兵者務在先聲後實故能百戰百勝以弱為強也但襄城控帶京洛實當今之要地如有動靜易相應接潁川既鄰寇境又無山川之固賊若充斥徑至城下輒以愚情權其利害莫若頓兵襄城為行臺治所潁川置州遣郭賢鎮守則表裏膠固人心易安縱有不虞豈能為患仲見太祖具以啓聞太祖即遣仲還令依猷之策思政重啓求與朝廷立約賊若水攻乞一周為斷陸攻請三歲為期限內有事不煩赴援過此以往惟朝廷所裁太祖以思政既親其事兼復固請遂許之及潁川沒後太祖深追悔焉十六年以疾去職屬大軍東征太祖賜以馬輿命隨軍與之籌議十七年進侍中驃騎大將軍開府儀同三司本州大中正賜姓宇文氏魏恭帝元年太祖欲開梁漢舊路乃命猷督儀同劉道通陸騰等五人率衆開通車路鑿山堙谷五百餘里至于梁州即以猷為都督梁利等十二州白馬儻城二防諸軍事梁州刺史及太祖崩始利沙興等諸州阻兵為逆信合開楚四州亦叛唯梁州境內民無二心利州刺史崔謙請援猷遣兵六千赴之信州糧盡猷又送米四千斛二鎮獲全猷之力也進爵固安縣公邑二千戶猷深為晉公護所重護乃養猷第三女為己女封富平公主世宗即位徴拜御正中大夫時依周禮稱天王又不建年號猷以為世有澆淳運有治亂故帝王以之沿革聖哲因時制宜今天子稱王不足以威天下請遵秦漢稱皇帝建年號朝議從之武成二年除司會中大夫御正如故世宗崩遺詔立髙祖晉公護謂猷曰魯國公稟性寬仁太祖諸子之中年又居長今奉遵遺旨翊戴為主君以為何如猷對曰殷道尊尊周道親親今朝廷既遵周禮無容輒違此義護曰天下事大但恐畢公沖幼耳猷曰昔周公輔成王以朝諸侯况明公親賢莫二若行周公之事方為不負顧託事雖不行當時稱其守正保定元年重授總管梁利開等十四州白馬儻成二防諸軍事梁州刺史尋復為司會天和二年陳將華皎來附晉公護議欲南伐公卿莫敢正言猷獨進曰前歲東征死傷過半比雖加撫循而瘡痍未復近者長星為災乃上玄所以垂鑒誡也誠宜修德以禳天變豈可窮兵極武而重其譴負哉今陳氏保境息民共敦鄰好無容違盟約之重納其叛臣興無名之師利其土地詳觀前載非所聞也護不從其後水軍果敗而禆將元定等遂沒江南建德四年出為同州司會六年徴拜小司徒加上開府儀同大將軍隋文帝踐極以猷前代舊齒授大將軍進爵汲郡公增邑通前三千户開皇四年卒諡曰明子仲方字不齊早知名機神穎悟文學優敏大象末儀同大將軍司玉下大夫裴俠字嵩和河東解人也祖思齊舉秀才拜議郎父欣博涉經史魏昌樂王府司馬西河郡守贈晉州刺史俠幼而聰慧有異常童年十三遭父憂哀毁有若成人州辟主簿舉秀才魏正光中解巾奉朝請稍遷員外散騎侍郎義陽郡守元皓入洛俠執其使人焚其赦書魏孝莊嘉之授輕車將軍東郡太守帶防城别將及魏孝武與齊神武有隙徴河南兵以備之俠率所部赴洛陽授建威將軍左中郎將俄而孝武西遷俠將行而妻子猶在東郡滎陽鄭偉謂俠曰天下方亂未知烏之所集何如東就妻子徐擇木焉俠曰忠義之道庸可忽乎吾既食人之祿寧以妻子易圖也遂從入關賜爵清河縣伯除丞相府士曹參軍大統三年領鄉兵從戰沙苑先鋒陷陳俠本名協至是太祖嘉其勇決乃曰仁者必有勇因命改焉以功進爵為侯邑八百戶拜行臺郎中王思政鎮玉壁以俠為長史未幾為齊神武所攻神武以書招思政思政令俠草報辭甚壯烈太祖善之曰雖魯連無以加也除河北郡守俠躬履儉素愛民如子所食唯菽麥鹽菜而已吏民莫不懷之此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾所不為也乃悉罷之又有丁三十人供郡守役使俠亦不以入私並收庸直為官市馬歲月既積馬遂成羣去職之日一無所取民歌之曰肥鮮不食丁庸不取裴公貞惠為世規矩俠嘗與諸牧守俱謁太祖太祖命俠别立謂諸牧守曰裴俠清慎奉公為天下之最今衆中有如俠者可與之俱立衆皆默然無敢應者太祖乃厚賜俠朝野歎服號為獨立君俠又撰九世伯祖貞侯潛傳以為裴氏清公自此始也欲使後生奉而行之宗室中知名者咸付一通從弟伯鳯世彥時並為丞相府佐笑曰人生仕進須身名並裕清苦若此竟欲何為俠曰夫清者蒞職之本儉者持身之基况我大宗世濟其美故能存見稱於朝廷沒流芳於典策今吾幸以凡庸濫蒙殊遇固其窮困非慕名也志在自修懼辱先也翻被嗤笑知復何言伯鳯等慙而退九年入為大行臺郎中居數載出為郢州刺史加儀同三司尋轉祏州刺史徴拜雍州别駕孝閔帝踐阼除司邑下大夫加驃騎大將軍開府儀同三司進爵為公增邑通前一千六百戶遷民部中大夫時有姦吏主守倉儲積年隱沒至千萬者及俠在官勵精發摘數旬之內姦盜略盡轉工部中大夫有大司空掌錢物典李貴乃於府中悲泣或問其故對曰所掌官物多有費用裴公清嚴有名懼遭罪責所以泣耳俠聞之許其自首貴言隱費錢五百萬俠之肅遏姦伏皆此類也初俠嘗遇疾沉頓大司空許國公宇文貴小司空北海公申徽並來伺候俠俠所居第屋不免風霜貴等還言之於帝帝矜其貧苦乃為起宅并賜良田十頃奴隸耕牛糧粟莫不備足搢紳咸以為榮武成元年卒於位贈太子少師蒲州刺史諡曰貞河北郡前功曹張回及吏民等感俠遺愛乃作頌紀其清德焉子祥性忠謹有治劇才少為成都令清不及俠斷決過之後除長安令為權貴所憚遷司倉下大夫俠之終也遂以毁卒祥弟肅貞亮有才藝天和中舉秀才拜給事中士稍遷御正大夫賜爵胡原縣子薛端字仁直河東汾隂人也本名沙陀魏雍州刺史汾隂侯辨之六世孫代為河東著姓髙祖謹秦州刺史內都坐大官涪陵公曾祖洪隆河東太守以隆兄洪阼尚魏文帝女西河公主有賜田在馮翊洪隆子麟駒徙居之遂家於馮翊之夏陽焉麟駒舉秀才拜中書博士兼主客郎中贈河東太守父英集通直散騎常侍端少有志操遭父憂居喪合禮與弟裕勵精篤學不交人事年十七司空髙乾辟為參軍賜爵汾隂縣男端以天下擾亂遂棄官歸鄉里魏孝武西遷太祖令大都督薛崇禮據龍門引端同行崇禮尋失守遂降東魏東魏遣行臺薛循義都督乙干貴率衆數千西度據楊氏壁端與宗親及家僮等先在壁中循義乃令其兵逼端等東度方欲濟河會日暮端密與宗室及家僮等叛之循義遣騎追端且戰且馳遂入石城柵得免柵中先有百家端與并力固守貴等數來慰喻知端無降意遂拔還河東東魏又遣其將賀蘭懿南汾州刺史薛琰逵守楊氏壁端率其屬并招喻村民等多設竒以臨之懿等疑有大軍便即東遁爭船溺死者數千人端收其器械復還楊氏壁太祖遣南汾州刺史蘇景恕鎮之降書勞問徴端赴闕以為大丞相府户曹參軍從擒竇泰復𢎞農戰沙苑並有功加冠軍將軍中散大夫進爵為伯轉丞相東閣祭酒加本州大中正遷兵部郎中改封文城縣伯加使持節平東將軍吏部郎中端性強直每有奏請不避權貴太祖嘉之故賜名端欲令名質相副自居選曹先盡賢能雖貴逰子弟才劣行薄者未嘗升擢之每啓太祖云設官分職本康時務茍非其人不如曠職太祖深然之大統十六年大軍東討柱國李弼為别道元帥妙簡首僚數日不定太祖謂弼曰為公思得一長史無過薛端弼對曰真其才也乃遣之加授車騎大將軍儀同三司轉尚書左丞仍掌選事進授吏部尚書賜姓宇文氏端久處選曹雅有人倫之鑒其所擢用咸得其才六官建拜軍司馬加侍中驃騎大將軍開府儀同三司進爵為侯孝閔帝踐阼除工部中大夫轉民部中大夫進爵為公增邑通前一千八百户晉公護將廢帝召羣官議之端頗有同異護不悅出為蔡州刺史為政寬惠民吏愛之尋轉基州刺史基州地接梁陳事藉鎮撫總管史寧遣司馬梁榮催令赴任蔡州父老訴榮請留端者千餘人至基州未幾卒時年四十三遺誡薄葬府州贈遺勿有所受贈本官加大將軍追封文城郡公諡曰質子胄字紹玄幼聰敏涉獵羣書雅逹政事起家帥都督纍遷上儀同歷司金中大夫徐州總管府長史合州刺史大象中位至開府儀同大將軍端弟裕字仁友少以孝悌聞於州里初為太學生時黌中多是貴遊好學者少唯裕耽玩不倦弱冠辟丞相參軍事是時京兆韋敻志安放逸不干世務裕慕其恬靜數載酒肴候之談宴終日敻遂以從孫女妻之裕嘗謂親友曰大丈夫當聖明之運而無灼然文武之用為世所知雖復栖栖遑遑徒為勞苦耳至如韋居士退不丘壑進不市朝怡然守道榮辱不及何其樂也尋遇疾而卒時年四十一文章之士誄之者數人太祖傷惜之贈洛州刺史薛善字仲良河東汾隂人也祖瑚魏河東郡守父和南青州刺史善少為司空府參軍事遷儻城郡守轉鹽池都將魏孝武西遷東魏攻河東圍秦州以善為别駕善家素富僮僕數百人兄元信仗氣豪侈每食方丈坐客恆滿絃歌不絶而善獨供已率素愛樂間靜大統三年齊神武敗於沙苑留善族兄崇禮守河東太祖遣李弼圍之崇禮固守不下善密謂崇禮曰髙氏戎車犯順致令主上播越與兄忝是衣冠緒餘荷國榮寵今大軍已臨而兄尚欲為髙氏盡力若城陷之日送首長安云逆賊某甲之首死而有靈豈不殁有餘愧不如早歸誠款雖未足以表竒節庶獲全首領而崇禮猶持疑不決會善從弟馥妹夫髙子信為防城都督守城南面遣馥來詣善云意欲應接西軍但恐力所不制善即令弟濟將門生數十人與信馥等斬關引弼軍入時預謀者並賞五等爵善以背逆歸順臣子常情豈容闔門大小俱叨封邑遂與弟慎並固辭不受太祖嘉之以善為汾隂令善幹用強明一郡稱最太守王羆美之令善兼督六縣事尋徴為行臺郎中時欲廣置屯田以供軍費乃除司農少卿領同州夏陽縣二十屯監又於夏陽諸山置鐵冶復令善為冶監每月役八千人營造軍器善親自督課兼加慰撫甲兵精利而皆忘其勞苦焉加通直散騎常侍遷大丞相府從事中郎追論屯田功賜爵龍門縣子遷黃門侍郎加車騎大將軍儀同三司除河東郡守進驃騎大將軍開府儀同三司賜姓宇文氏六官建拜工部中大夫進爵博平縣公尋除御正中大夫轉民部中大夫時晉公護執政儀同齊䡄語善云兵馬萬機須歸天子何因猶在權門善白之護乃殺䡄以善忠於已引為中外府司馬遷司會中大夫副總六府事加授京兆尹仍治司會出為隆州刺史兼治益州總管府長史徴拜少傅卒於位時年六十七贈蒲虞勳三州刺史髙祖以善告齊䡄事諡曰繆公子褒嗣官至髙陽守善弟慎慎字佛護好學能屬文善草書少與同郡裴叔逸裴諏之桞虬范陽盧柔隴西李璨並相友善起家丞相府墨曹參軍太祖於行臺省置學取丞郎及府佐德行明敏者充生悉令旦理公務晚就講習先六經後子史又於諸生中簡德行淳懿者侍太祖讀書慎與李璨及隴西李伯良辛韶武功蘇衡譙郡夏侯裕安定梁曠梁禮河南長孫璋河東裴舉薛同滎陽鄭朝等十二人並應其選又以慎為學師以知諸生課業太祖雅好談論并簡名僧深識玄宗者一百人於第內講説又命慎等十二人兼學佛義使內外俱通由是四方競為大乘之學數年復以慎為宜都公侍讀轉丞相府記室魏東宮建除太子舍人遷庶子仍領舍人加通直散騎常侍兼中書舍人轉禮部郎中六官建拜膳部下大夫慎兄善又任工部並居清顯時人榮之孝閔帝踐阼除御正下大夫進車騎大將軍儀同三司封淮南縣子邑八百户歷師氏御伯中大夫保定初出為湖州刺史州界既雜蠻左恆以劫掠為務慎乃集諸豪帥具宣朝旨仍令首領每月一參或須言事者不限時節慎每引見必殷勤勸誡及賜酒食一年之間翕然從化諸蠻乃相謂曰今日始知刺史真民父母也莫不欣悅自是襁負而至者千有餘户蠻俗婚娶之後父母雖在即與别居慎謂守令曰牧守令長是化民者也豈有其子娶妻便與父母離析非唯氓俗之失亦是牧守之罪慎乃親自誘導示以孝慈并遣守令各喻所部有數户蠻别居數年遂還侍養及行得果膳歸奉父母慎感其從善之速具以狀聞有詔蠲其賦役於是風化大行有同華俗尋入為蕃部中大夫以疾去職卒於家有文集頗為世所傅薛善之以河東應李弼也敬珍敬祥亦率屬縣歸附敬珍字國寶河東蒲坂人也漢楊州刺史韶之十世孫父伯樂州主簿安邑令珍偉容儀有氣俠學業騎射俱為當時所稱祥即珍從祖兄也亦慷慨有大志唯以交結英豪為務珍與之深相友愛每同遊處及齊神武趨沙苑珍謂祥曰髙歡迫逐乘輿播遷關右有識之士孰不欲推刃於其腹中但力未能制耳今復稱兵內侮將逞凶逆此誠志士效命之日當與兄圖之祥聞其言甚悅曰計將安出珍曰宇文丞相寬仁大度有霸王之略挾天子而令諸侯已數年矣觀其政刑備舉將士用命歡雖有衆固非其儔况逆順理殊將不戰而自潰矣我若招集義勇斷其歸路殲馘凶徒使隻輪不反非直雪朝廷之恥亦壯士封侯之業祥深然之遂與同郡豪右張小白樊昭賢王玄略等舉兵數日之中衆至萬餘將襲歡後軍兵未進而齊神武已敗珍與祥邀之多所剋獲及李弼軍至河東珍與小白等率猗氏南解北解安邑溫泉虞鄉等六縣户十餘萬歸附太祖嘉之即拜珍平陽太守領永寧防主祥龍驤將軍行臺郎中領相里防主並賜鼓吹以寵異之太祖仍執珍手曰國家有河東之地者卿兄弟之力還以此地付卿我無東顧之憂矣久之遷綘州刺史以疾免卒於家子元約性貞正有識學位至布憲中大夫小白等既與珍歸闕太祖嘉其立效並任用之後咸至郡守刺史史臣曰鄭孝穆撫寧離散豳岐多襁負之人崔謙鎮禦邊陲江漢流載清之詠崔諶居家理治以嚴肅見稱蒞職當官以猛毅為政崔猷立朝贊務則嘉謀屢陳出撫宣條則威恩具舉裴俠忠勤奉上廉約治身吏不能欺民懷其惠薛端歷居顯要以強直知名薛善任惟繁劇以𢎞益流譽並當時之良將也而善陷齊諂護以要權寵易名為繆斯不謬乎周書卷三十五周書卷三十五考證崔謙傳崔謙字士遜北史作崔士謙薛端傳司空髙乾北史作髙乾雍周書卷三十五考證
