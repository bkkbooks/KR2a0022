body:
  text: 周書卷四十二唐令狐德棻等撰列傳第三十四蕭撝子濟蕭世怡蕭圓肅蕭大圜宗懍劉璠子祥柳霞子靖莊蕭撝字智遐蘭陵人也梁武帝弟安成王秀之子也性溫裕有儀表年十二入國學博觀經史雅好屬文在梁封永豐縣侯邑一千戶初為給事中歷太子洗馬中舍人東魏遣李諧廬元明使於梁梁武帝以撝辭令可觀令兼中書侍郎受幣於賓館尋遷黃門侍郎出為寧逺將軍宋寧宋興二郡守轉輕車將軍巴西梓潼二郡守及侯景作亂武陵王紀承制授撝使持節忠武將軍又遷平北將軍散騎常侍領益州刺史軍防事紀稱尊號於成都除侍中中書令封秦郡王邑三千户給鼓吹一部紀率衆東下以撝為中書令征西大將軍都督益梁秦潼安瀘青戎寧華信渠萬江新邑楚義十八州諸軍事益州刺史守成都又令梁州刺史楊乾運守潼州太祖知蜀兵寡弱遣大將軍尉遲迥總衆討之及迥入劔閣乾運以州降蜀中因是大駭無復抗拒之志迥長驅至成都撝見兵不滿萬人而倉庫空竭軍無所資遂為城守之計迥圍之五旬撝屢遣其將出城挑戰多被殺傷外援雖至又為迥所破語在迥傳撝遂請降迥許之撝於是率文武於益州城北共迥升壇歃血立盟以城歸國魏恭帝元年授侍中驃騎大將軍開府儀同三司封歸善縣公邑一千户孝閔帝踐阼進爵黃臺郡公增邑一千户武成中世宗令諸文儒於麟趾殿校定經史仍撰世譜撝亦預焉尋以母老兼有疾疹五日番上便隔晨昏請在外著書有詔許焉保定元年授禮部中大夫又以撝有歸款之功别賜食多陵縣五百户收其租賦三年出為上州刺史為政仁恕以禮讓為本嘗至元日獄中所有囚繫悉放歸家聽三日然後赴獄主者固執不可撝曰昔王長虞延見稱前史吾雖寡德竊懷景行導民以信方自此始以之獲罪彌所甘心幸勿慮也諸囚荷恩並依限而至吏民稱其惠化秩滿當還部民李􅃮等三百餘人上表乞更留兩載詔雖弗許甚嘉美之及撝入朝屬置露門學高祖以撝與唐瑾元偉王褒等四人俱為文學博士撝以母老表請歸飬私門曰臣聞出忠入孝理深人紀昏定晨省事切天經伏惟陛下握鎮臨朝垂衣御宇孝治天下仁覃草木是以微臣冒陳至願臣母妾褚年過飬禮乞解今職侍奉私庭伏願天慈特垂矜許臣披款歸朝十有六載恩深海嶽報淺涓埃肆師掌禮竟無稱職浙隈督察空妨能官方辭違闕庭屏迹閭里低佪係慕戀悚兼深高祖未許詔曰開府梁之宗英今則任等三事所謂楚雖有材周實用之方藉謀猷匡朕不逮然進思盡忠退安侍飬者義在公私兼濟豈容全欲徇已虧此至公乖所望也尋以母憂去職天和六年授少保建德元年轉少傅後改封蔡陽郡公增邑通前三千四百户二年卒時年五十九高祖舉哀於正武殿賜穀麥三百石布帛三百匹贈使持節大將軍大都督少傅益新始信四州諸軍事益州刺史諡曰襄撝善草隸名亞於王褒算數醫方咸亦留意所著詩賦雜文數萬言頗行于世子濟嗣濟字德成少仁厚頗好屬文蕭紀承制授貞威將軍蜀郡太守遷東中郎將從紀東下至巴東聞迥圍成都紀命濟率所部赴援比至撝已降仍從撝入朝孝閔帝踐阼除中外府記室參軍後至蒲陽郡守車騎大將軍儀同三司蕭世怡梁武帝弟鄱陽王恢之子也以名犯太祖諱故稱字焉幼而聰慧頗涉經史梁大同元年封豐城縣侯邑五百户除給事中轉太子洗馬尋入直殿省轉太子中舍人出為持節仁威將軍譙州刺史及侯景為亂路由城下襲而陷之世怡遂被執尋遁逃得免至于江陵梁元帝承制授侍中及平侯景以世怡為兼太宰太常卿與中衛長史樂子雲拜謁山陵承聖二年授使持節平西將軍臨川內史既以陸納據湘川道路擁塞改授平南將軍桂陽內史未至郡屬于謹平江陵遂隨兄修在郢州及修卒即以世怡為刺史湘州刺史王琳率舟師襲世怡世怡以州輸琳時陳武帝執政徴為侍中世怡疑而不就乃奔于齊除車騎大將軍散騎常侍尋出為永州刺史保定四年晉公護東伐大將軍權景宣略地河南世怡聞豫州刺史王士良已降遂來歸款五年拜使持節驃騎大將軍開府儀同三司封義興郡公邑一千三百户天和二年授蔡州刺史政存簡惠不尚苛察深為吏民所安三年卒於州贈本官加並洛永三州刺史子子寶嗣子寶美風儀善談笑年未弱冠名重一時隋文帝輔政引為丞相府典籖深被識遇開皇中官至吏部侍郎後坐事被誅蕭圓肅字明恭梁武帝之孫武陵王紀之子也風度淹雅敏而好學紀稱尊號封宜都郡王邑三千户除侍中寧遠將軍紀率兵下峽令蕭撝守成都以圓肅為之副及尉遲迥至圓肅與撝俱降授驃騎大將軍開府儀同三司侍中封安化縣公邑一千户世宗初進封棘城郡公增邑一千户以圓肅有歸款之勳别賜食思君縣五百户收其租賦保定三年除畿伯中大夫五年拜咸陽郡守圓肅寬猛相濟甚有政績天和四年遷陵州刺史尋詔令隨衛國公直鎮襄陽遂不之部建德三年授太子少傅增邑九百户圓肅以任當師傅調護是職乃作少傅針曰惟王建國辨方正位左史記言右史記事莫不援立太子為皇之二是以易稱明兩禮云上嗣東序飬德震方主器束髮就學宵雅更肄朝讀百篇乙夜乃寐愛日惜力寸隂無棄視膳再飯寢門三至小心翼翼大孝蒸蒸謀謨計慮問對疑丞安樂必敬無忘戰兢夫天道益謙人道惡盈漢嗣不絶乎馳道魏儲回環於鄴城前史攸載後世揚名三善既備萬國以貞姬周長久實賴元良嬴秦短祚誠由少陽雖卜年七百有德過歷而昌數世萬一無德不及而亡敬之敬之天惟顯思光副皇極永固洪基觀德審諭授告職司太子見而悅之致書勞問六年授豐州刺史增邑通前三千七百户尋進位上開府儀同大將軍宣政元年入為司宗中大夫俄授洛州刺史大象末進位大將軍隋開皇初授貝州刺史以母老請歸就飬隋文帝許之四年卒時年四十六有文集十卷又撰時人詩筆為文海四十卷廣堪十卷淮海亂離志四卷行於世蕭大圜字仁顯梁簡文帝之子也幼而聰敏神情俊悟年四歲能誦三都賦及孝經論語七歲居母喪便有成人之性梁大寶元年封樂梁郡王邑二千户除宣惠將軍丹陽尹屬侯景肆虐簡文見弒大圜潛遁獲免明年景平大圜歸建康時既喪亂之後無所依託乃寓居善覺佛寺人有以告王僧辨者僧辨乃給船餼得往江陵梁元帝見之甚悅賜以越衫胡帶等改封晉熙郡王邑二千户除寧遠將軍琅邪彭城二郡太守時梁元帝既有克復之功而大圜兄汝南王大封等猶未通謁梁元帝性既忌刻甚恨望之乃謂大圜曰汝兩兄久不出汝可以意召之大圜即日曉諭兩兄相繼出謁元帝乃安之大圜以世多故恐讒訴生焉乃屏絶人事門客左右不過三兩人不妄遊狎兄姊之間止箋疏而已恆以讀詩禮書易為事元帝嘗自問五經要事數十條大圜辭約指明應答無滯元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然有東平為善彌高前載吾重之愛之爾當效焉及于謹軍至元帝乃令大封充使請和大圜副焉其實質也出至軍所信宿元帝降魏恭帝二年客長安太祖以客禮待之保定二年詔曰梁汝南王蕭大封晉熙王蕭大圜等梁國子孫宜存優禮式遣茅土實允舊章大封可封晉陵縣公大圜封始寧縣公邑各一千户尋加大圜車騎大將軍儀同三司並賜田宅奴婢牛馬粟帛等俄而開麟趾殿招集學士大圜預焉梁武帝集四十卷簡文集九十卷各止一本江陵平後並藏祕閣大圜既入麟趾方得見之乃手寫二集一年並畢識者稱歎之大圜深信因果心安間放嘗言之曰拂衣褰裳無吞舟之漏網挂冠懸節慮我志之未從儻獲展禽之免有美慈明之進如蒙北叟之放實勝濟南之徵其故何哉夫閭閻者有優遊之美朝廷者有簪佩之纍蓋由來久矣留侯追蹤於松子陶朱成術於辛文良有以焉況乎智不逸羣行不高物而欲辛苦一生何其僻也豈如知足知止蕭然無纍北山之北棄絶人間南山之南超踰世網面修原而帶流水倚郊甸而枕平臯築蝸舍於叢林構環堵於幽薄近瞻煙霧逺睇風雲藉纎草以蔭長松結幽蘭而援芳桂仰翔禽於百仞俯泳鱗於千潯果園在後開窗以臨花卉蔬圃居前坐簷而看灌甽二頃以供饘粥十畝以給絲麻侍兒五三可充絍織家僮數四足代耕耘沽酪牧羊協潘生之志畜雞種黍應莊叟之言穫菽尋汜氏之書露葵徵尹君之録烹羔豚而介春酒迎伏臘而候歲時披良書探至賾歌纂纂唱烏烏可以娛神可以散慮有朋自遠揚榷古今田畯相過劇談稼穡斯亦足矣樂不可支永保性命何畏憂責豈若蹙足入絆申脰就羈遊帝王之門趨宰衡之勢不知飄塵之少選寧覺年祀之斯須萬物營營靡存其意天道昧昧安可問哉嗟乎人生若浮雲朝露寧俟長繩繫景實不願之執燭夜遊驚其迅邁百年何幾擎跽曲拳四時如流俯眉躡足出處無成語默奚當非直丘明所恥抑亦宣尼恥之建德四年除滕王逌友逌嘗問大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隱則非實記則攘羊對曰言者之妄也如使有之亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鑒不遠足為成例且君子之過如日月之蝕彰於四海安得而隱之如有不彰亦安得而不隱蓋子為父隱直在其中諱國之惡抑又禮也逌乃大笑其後大軍東討攻拔晉州或問大圜曰齊遂克不對曰高歡昔以晉州肇基偽迹今本既拔矣能無亡乎所謂以此始者必以此終也居數日齊氏果滅聞者以為知言宣政元年增邑通前二千二百户隋開皇初拜內史侍郎出為西河郡守尋卒大圜性好學務於著述撰梁舊事三十卷寓記三卷士喪儀注五卷要決兩卷並文集二十卷大封位至開府儀同三司大象末為陳州刺史宗懍字元懍南陽涅陽人也八世祖承永嘉之亂討陳敏有功封柴桑縣侯除宜都郡守尋卒官子孫因居江陵父高之梁山隂令凛少聰敏好讀書晝夜不倦語輒引古事鄉里呼為小兒學士梁普通六年舉秀才以不及二宮元會例不對䇿及梁元帝鎮荆州謂長史劉之遴曰貴鄉多士為舉一有志少年之遴以懍應命即日引見令兼記室嘗夕被召宿省使制龍川廟碑一夜便就哲朝呈上梁元帝歎美之及移鎮江州以凛為刑獄參軍兼掌書記歷臨汝建成廣晉三縣令遭母憂去職哭輒歐血兩旬之內絶而復蘇者三每有羣烏數千集於廬舍候哭而來哭止而去時論稱之以為孝感所致梁元帝重牧荆州以懍為别駕江陵令及帝即位擢為尚書侍郎又手詔曰昔扶柳開國止曰故人西鄉胙土本由賓客況事涉勳庸而無爵賞尚書侍郎宗懍亟有帷幄之謀誠深股肱之寄從我於邁多歷歲時可封信安縣侯邑一千户纍遷吏部郎中五兵尚書吏部尚書初侯景平後梁元帝議還建業唯懍勸都渚宮以其鄉里在荆州故也及江陵平與王褒等入關太祖以懍名重南土甚禮之孝閔帝踐阼拜車騎大將軍儀同三司世宗即位又與王褒等在麟趾殿刋定羣書數蒙宴賜保定中卒年六十四有集二十卷行於世劉璠字寶義沛國沛人也六世祖敏以永嘉喪亂徙居廣陵父臧性方正篤志好學居家以孝聞梁天監初為著作郎璠九歲而孤居喪合禮少好讀書兼善文筆年十七為上黃侯蕭曄所器重范陽張綰梁之外戚才高口辨見推於世以曄之懿貴亦假借之璠年少未仕而負才使氣不為之屈綰嘗於新渝侯坐因酒後詬京兆杜騫曰寒士不遜璠厲色曰此坐誰非寒士璠本意在綰而曄以為屬已辭色不平璠曰何王之門不可曵長裾也遂拂衣而去曄辭謝之乃止後隨曄在淮南璠母在建康遘疾璠弗之知嘗忽一日舉身楚痛尋而家信至云其母病璠即號泣戒道絶而又蘇當身痛之辰即母死之日也居喪毁瘠遂感風氣服闋後一年猶杖而後起及曄終於毗陵故吏多分散璠獨奉曄喪還都墳成乃退梁簡文時在東宮遇曄素重諸不送者皆被劾責唯璠獨被優賞解褐王國常侍非其好也璠少慷慨好功名志欲立事邊城不樂隨牒平進會宜豐侯蕭循出為北徐州刺史即請為其輕車府主簿兼記室參軍又領刑獄循為梁州除信武府記室參軍領南鄭令又板為中記室補華陽太守屬侯景度江梁室大亂循以璠有才略甚親委之時寇難繁興未有所定璠乃喟然賦詩以見志其末章曰隨會平王室夷吾匡霸功虛薄無時用徒然慕昔風循開府置佐史以璠為咨議參軍仍領記室梁元帝承制授樹功將軍鎮西府咨議參軍賜書曰鄧禹文學尚或執戈葛洪書生且云破賊前修無逺屬望良深梁元帝尋又以循紹鄱陽之封且為雍州刺史復以璠為循平北府司馬及武陵王紀稱制於蜀以璠為中書侍郎屢遣召璠使者八返乃至蜀又以為黃門侍郎令長史劉孝勝深布腹心使工畫陳平度河歸漢圖以遺之璠苦求還中記室韋登私曰殿下忍而蓄憾足下不留將至大禍脫使盜遮於葭萌則卿殆矣孰若共構大厦使身名俱美哉璠正色曰卿欲緩頰於我耶我與府侯分義已定豈以寵辱夷險易其心乎丈夫立志當死生以之耳殿下方布大義於天下終不逞志於一人紀知必不為已用乃厚其贈而遣之臨别紀又解其佩刀贈璠曰想見物思人璠對曰敢不奉揚威靈尅剪姦宄紀於是遣使就拜循為益州刺史封隋郡王以璠為循府長史加蜀郡太守還至白馬西屬逹奚武軍已至南鄭璠不得入城遂降於武太祖素聞其名先誡武曰勿使劉璠死也故武先令璠赴闕璠至太祖見之如舊謂僕射申徽曰劉璠佳士古人何以過之徽曰昔晉主滅吳利在二陸明公今平梁漢得一劉璠也時南鄭尚拒守未下逹奚武請屠之太祖將許焉唯令全璠一家而已璠乃請之於朝太祖怒而不許璠泣而固請移時不退栁仲禮侍側曰此烈士也太祖曰事人當如此遂許之城竟獲全璠之力也太祖既納蕭循之降又許其反國循至長安纍月未之遣也璠因侍宴太祖曰我於古誰比對曰常以公命世英主湯武莫逮今日所見曾齊桓晉文之不若太祖曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終太祖撫掌曰我解爾意欲激我耳於是即命遣循循請與璠俱還太祖不許以璠為中外府記室尋遷黃門侍郎儀同三司嘗臥疾居家對雪興感乃作雪賦以遂志云其詞曰天地否閉凝而成雪應乎玄冬之辰在於沍寒之節蒼雲暮同嚴風曉别散亂徘徊氛霏皎潔違朝陽之暄照就陵陰之慘烈若乃雪山峙於流沙之右雪宮建於碣石之東混二儀而並色覆萬有而皆空埋沒河山之上籠罩寰宇之中日馭潛於濛泛地險失於華嵩既奪朱而成素實矯異而為同始飄颻而稍落遂紛糅而無窮縈回兮瑣散皓皓兮溟濛綏綏兮颯颯瀌瀌兮渢渢因高兮纍仭藉少兮成豐曉分光而映淨夜合影而通朧似北荒之明月若西崑之閬風爾乃憑集異區遭隨所適遇物淪形觸途湮迹何淨穢之可分豈高卑之能擇體不常消質無定白深谷夏凝小山春積偶仙宮而為絳值河濱而成赤廣則彌綸而交四海小則淅瀝而緣間隙淺則不過二寸大則平地一尺乃為五谷之精實長衆川之魄大壑所以朝宗洪波資其消釋家有趙王之璧人聚漢帝之金既藏牛而沒馬又冰木而凋林已墮白登之指實愴黃竹之心楚客埋魂於樹裏漢使遷飢於海隂斃雲中之狡獸落海上之驚禽庚辰有七尺之厚甲子有一丈之深無復垂霙與雲合唯有變白作泥沉本為白雪唱翻作白頭吟吟曰昔從天山來忽與狂風閲遡河隂而散漫望衡陽而委絶朝朝自消盡夜夜自凝結徒云雪之可賦竟何賦之能雪初蕭循在漢中與蕭紀箋及答國家書移襄陽文皆璠之辭也世宗初授內史中大夫掌綸誥尋封平陽縣子邑九百户在職清白簡亮不合於時左遷同和郡守璠善於撫御蒞職未期生羌降附者五百餘家前後郡守多經營以致資産唯璠秋毫無所取妻子並隨羌俗食麥衣皮始終不改洮陽洪和二郡羌民常越境詣璠訟理焉其德化為他界所歸仰如此蔡公廣時鎮隴右嘉璠善政及遷鎮陜州欲取璠自隨羌人樂從者七百人聞者莫不歎異陳公純作鎮隴右引為總管府司録甚禮敬之天和三年卒時年五十九著梁典三十卷有集二十卷行於世子祥嗣祥字休徵幼而聰慧占對俊辨賓客見者皆號神童事嫡母以至孝聞其伯父黃門郎璆有名江左在嶺南聞而奇之乃令名祥字休徵後以字行於世年十歲能屬文十二通五經解褐梁宜豐侯主簿遷記室參軍江陵平隨例入國齊公憲以其善於詞令召為記室府中書記皆令掌之尋授都督封漢安縣子食邑七百户轉從事中郎憲進爵為王以休徵為王友俄除內史上士高祖東征休徵陪侍帷幄平齊露布即休徵之文也纍遷車騎大將軍儀同大將軍尋以去官領萬年令未期月轉長安令頻宰二縣頗獲時譽大象二年卒於官時年四十七初璠所撰梁典始就未及刋定而卒臨終謂休徵曰能成我志其在此書乎休徵修定繕寫勒成一家行於世柳霞字子升河東解人也曾祖卓晉汝南太守始自本郡徙居襄陽祖叔珍宋員外散騎常侍義陽內史父季逺梁臨川王咨議參軍宜都太守霞幼而爽邁神彩嶷然髫歲便有成人之量篤好文學動合規矩其世父慶逺特器異之謂霞曰吾昔逮事伯父太尉公嘗語吾云我昨夢汝登一樓樓甚峻麗吾以坐席與汝汝後名宦必逹恨吾不及見耳吾向聊復晝寢又夢將昔時座席還以賜汝汝之官位當復及吾特宜勉勵以應嘉祥也梁西昌侯深藻鎮雍州霞時年十二以民禮修謁風儀端肅進止詳雅深藻美之試遣左右踐霞衣裾欲觀其舉措霞徐步稍前曾不顧眄廬陵王續為雍州刺史辟霞為主簿起家平西邵陵王綸府法曹參軍仍轉外兵除尚書工部郎謝舉時為僕射引霞與語甚嘉之顧謂人曰江漢英靈見於此矣嶽陽王蕭察蒞雍州選為治中尋遷别駕及察於襄陽承制授霞吏部郎員外散騎常侍俄遷車騎大將軍儀同三司大都督賜爵聞喜縣公尋進位持節侍中驃騎大將軍開府儀同三司及蕭察踐帝位於江陵以襄陽歸于我霞乃辭察曰陛下中興鼎運龍飛舊楚臣昔因幸會早奉名節理當以身許國期之始終自晉氏南遷臣宗族蓋寡從祖太尉世父儀同從父司空並以位望隆重遂家于金陵唯留先臣獨守墳柏常誡臣等使不違此志今襄陽既入北朝臣若陪隨鑾蹕進則無益塵露退則有虧先旨伏願曲垂照鑒亮臣此心察重違其志遂許之因留鄉里以經籍自娛太祖世宗頻有徵命霞固辭以疾及察殂霞舉哀行舊君之服保定中又徵之霞始入朝授使持節驃騎大將軍開府儀同三司霍州諸軍事霍州刺史霞導民務先以德再三不用命者乃微加貶異示之耻而已其下感而化之不復為過咸曰我君仁惠如此其可欺乎天和中卒時年七十二宣政初贈金安二州刺史霞有志行初為州主簿其父卒於揚州霞自襄陽奔赴六日而至哀感行路毁瘁殆不可識後奉喪泝江西歸中流風起舟中之人相顧失色霞抱棺號慟訴天求哀俄頃之間風浪止息其母嘗乳間發疽醫云此病無可救之理唯得人吮膿或望微止其痛霞應聲即吮旬日遂瘳咸以為孝感所致性又溫裕略無喜愠之容𢎞奬名教未嘗論人之短尤好施與家無餘財臨終遺誡薄葬其子等並奉行之有十子靖莊最知名靖字思休少方雅博覽墳籍梁大同末釋褐武陵王國左常侍轉法曹行參軍大定初除尚書度支郎遷正員郎隨霞入朝授大都督歷河南德廣二郡守靖雅逹政事所居皆有治術吏民畏而愛之然性愛間素其於名利淡如也及秩滿還便有終焉之志隋文帝踐極特詔徵之靖遂以疾固辭優遊不仕閉門自守所對惟琴書而已足不歷園庭殆將十載子弟等奉之若嚴君焉其有過者靖必下帷自責於是長幼相率拜謝於庭靖然後見之朂以禮法鄉里亦慕而化之或有不善者皆曰唯恐栁德廣知也時論方之王烈前後總管到官皆親至靖家問疾遂以為故事秦王俊臨州賚以几杖並致衣物靖唯受几杖餘並固辭其為當時所重如此開皇中以夀終莊字思敬器量貞固有經世之才初仕梁歷中書舍人尚書右丞給事黃門侍郎尚書吏部郎中鴻臚太府卿入隋位至開府儀同三司給事黃門侍郎饒州刺史史臣曰蕭撝世怡圓肅大圜並有梁之令望也雖羈旅異國而終享榮名非有兹基夙懷文質亦何能至於此乎方武陵擁衆東下任撝以蕭何之事君臣之道既篤家國之情亦隆金石不足比其心河山不足盟其誓及魏安之至城下旬日而智力俱竭委金湯而不守舉庸蜀而來王若乃見機而作誠有之矣守節沒齒則未可焉宗懍幹局才辭見稱於梁元之世逮乎俘囚楚甸播越秦中屬太祖思治之辰遇世宗好士之日在朝不預政事就列才忝戎章豈懷道圖全優遊卒歲將用與不用留滯當年乎梁氏據有江東五十餘載挾䇿紀事勒成不朽者非一家焉劉璠學思通博有著述之譽雖傳疑傳信頗有詳略而屬辭比事足為清典蓋近代之佳史歟柳霞立身之道進退有節觀其眷戀墳隴其孝可移於朝廷盡禮舊王其忠可事於新君夫能推此類以求賢則知人幾於易矣周書卷四十二周書卷四十二考證宗懍傳梁普通六年普通北史作大同柳霞傳柳霞北史作柳遐梁西昌侯深藻北史無深字周書卷四十二考證
