body:
  text: 周書卷三十一唐令狐德棻等撰列傳第二十三韋孝寬韋敻梁士彥韋叔裕字孝寬京兆杜陵人也少以字行世為三輔著姓祖直善魏馮翊扶風二郡守父旭武威郡守建義初為大行臺右丞加輔國將軍雍州大中正永安二年拜右將軍南幽州刺史時氐賊數為抄竊旭隨機招撫並即歸附尋卒官贈司空冀州刺史諡曰文惠孝寬沉敏和正涉獵經史弱冠屬蕭寶夤作亂關右乃詣闕請為軍前驅朝廷嘉之即拜統軍隨馮翊公長孫承業西征每戰有功拜國子博士行華隂郡事屬侍中楊侃為大都督出鎮潼關引孝寬為司馬侃竒其才以女妻之永安中授宣威將軍給事中尋賜爵山北縣男普泰中以都督從荆州刺史源子恭鎮襄城以功除浙陽郡守時獨孤信為新野郡守司荆州與孝寬情好款密政術俱美荆部吏人號為聨璧孝武初以都督鎮城文帝自原州赴雍州命孝寬隨軍及剋潼關即授𢎞農郡守從擒竇泰兼左丞節度宜陽兵馬事仍與獨孤信入洛陽城守復與宇文貴怡峯應接潁州義徒破東魏將任祥堯雄於潁川孝寬又進平樂口下豫州獲刺史馮雍又從戰於河橋時大軍不利邊境騷然乃令孝寬以大將軍行宜陽郡事尋遷南兗州刺史是嵗東魏將假琛堯傑復據宜陽遣其揚州刺史牛道恆扇誘邊民孝寬深患之乃遣諜人訪獲道恆手迹令善學書者偽作道恆與孝寬書論歸款意又為落燼燒迹若火下書者還令諜人送於琛營琛得書果疑道恆其所欲經略皆不見用孝寬知其離阻日出竒兵掩襲擒道恆及琛等崤澠遂清大統五年進爵為侯八年轉晉州刺史尋移鎮玉壁兼攝南汾州事先是山胡負險屢為劫盜孝寬示以威信州境肅然進授大都督十二年齊神武傾山東之衆志圖西入以玉壁衝要先命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩髙樓孝寬更縳木接之命極髙峻多積戰具以禦之齊神武使謂城中曰縱爾縳樓至天我會穿城取爾遂於城南鑿地道又於城北起土山攻具晝夜不息孝寬復掘長塹要其地道仍飭戰士屯塹城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有伏地道內者便下柴火以皮韛吹之火氣一衝咸即灼爛城外又造攻車車之所及莫不摧毁雖有排楯莫之能抗孝寬乃縫布為縵隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松於竿灌油加火規以燒布并欲焚樓孝寬復長作鐵鈎利其鋒刃火竿來以鈎遙割之松麻俱落外又於城四面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寬又隨崩處堅木柵以扞之敵不得入城外盡其攻擊之術孝寬咸拒破之神武無如之何乃遣倉曹參軍祖孝徴謂曰未聞救兵何不降也孝寬報云我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間已須救援適憂爾衆有不反之危孝寬關西男子必不為降將軍也俄而孝徴復謂城中人曰韋城主受彼榮祿或復可爾自外軍士何事相隨入湯火中耶乃射募格於城中云能斬城主降者拜太尉封開國郡公邑萬戶賞帛萬匹孝寬手題書背反射城外云若有斬髙歡者一依此賞孝寬弟子遷先在山東又鎖至城下臨以白刃云若不早降便行大戮孝寬慷慨激揚略無顧意士卒莫不感勵人有死難之心神武苦戰六旬傷及病死者十四五智力俱困因而發疾其夜遁去後因此忿恚遂殂魏文帝嘉孝寬功令殿中尚書長孫紹逺左丞王悅至玉壁勞問授驃騎大將軍開府儀同三司進爵建忠郡公廢帝二年為雍州刺史先是路側一里置一土候經雨頽毁每須修之自孝寬臨州乃勒部內當候處植槐樹代之既免修復行旅又得庇廕周文後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州夾道一里種一樹十里種三樹百里種五樹焉恭帝元年以大將軍與燕國公于謹伐江陵平之以功封穰縣公還拜尚書右僕射賜姓宇文氏二年周文北巡命孝寬還鎮玉壁周孝閔帝踐阼拜小司徒眀帝初參麟趾殿學士考校圖籍保定初以孝寬立勳玉壁遂於玉壁置勳州仍授勳州刺史齊人遣使至玉壁求通互市晉公護以其相持日久絶無使命一日忽來求交易疑别有故又以皇姑皇世母先沒在彼因其請和之際或可致之遂令司門下大夫尹公正至玉壁共孝寬詳議孝寬乃於郊盛設供帳令公正接對使人兼論皇家親屬在東之意使者辭色甚悅時又有汾州胡抄得關東人孝寬復放東還並致書一牘具陳朝廷欲敦鄰好遂以禮送皇姑及護母等孝寬善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寬金貨遙通書疏故齊動靜朝廷皆先知時有主帥許盆孝寬托以心膂命守一戍盆乃以城東入孝寬怒遣諜取之俄而斬首而還其能致物情如此汾州之北離石以南悉是生胡抄掠居人阻斷河路孝寬深患之而地入於齊無方誅剪欲當其要處置一大城乃於河西徴役徒十萬甲士百人遣開府姚嶽監築之嶽色懼以兵少為難孝寬曰計成此城十日即畢既去晉州四百餘里一日創手二日偽境始知設令晉州徴兵二日方集謀議之間自稽三日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至南首疑有大軍乃停留不進其夜又令汾水以南傍介山稷山諸村所在縱火齊人謂是軍營遂收兵自固版築克就卒如其言四年進位柱國時晉公護將東討孝寬遣長史辛道憲啓陳不可護不納既而大軍果不利後孔城遂陷宜陽被圍孝寬乃謂其將帥曰宜陽一城之地未能損益然兩國爭之勞師數載彼多君子寧乏謀猷若棄崤東來圖汾北我之疆界必見侵擾今宜於華谷及長秋速築城以杜賊志脫其先我圖之實難於是畫地形具陳其狀晉公護令長史叱羅協謂使人曰韋公子孫雖多數不滿百汾北築城遣誰固守事遂不行天和五年進爵鄖國公增邑通前一萬户是嵗齊人果解宜陽之圍經略汾北遂築城守之其丞相斛律眀月至汾東請與孝寬相見眀月云宜陽小城久勞戰爭今既入彼欲於汾北取償幸勿怪也孝寬答曰宜陽彼之要衝汾北我之所棄我棄彼圖取償安在且君輔翼幼主位重望隆理宜調隂陽撫百姓焉用極武窮兵搆怨連禍且滄瀛大水千里無煙復欲使汾普之間橫尸暴骨茍貪尋常之地塗炭疲弊之人竊為君不取孝寬參軍曲巖頗知卜筮謂孝寬曰來年東朝必大相殺戮孝寬因令巖作謠歌曰百升飛上天眀月照長安百升斛也又言髙山不摧自崩槲樹不扶自𥪡令諜人多齎此文遺之於鄴祖孝徴既聞更潤色之眀月竟以此誅建德之後武帝志在平齊孝寬乃上疏陳三䇿其第一䇿曰臣在邊積年頗見間隙不因際會難以成功是以往嵗出軍徒有勞費功績不立由失機會何者長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之齊人歷年赴救喪敗而反內離外叛計盡力窮傳不云乎讐有釁焉不可失也今大軍若出軹關方軌而進兼與陳氏共為掎角并令廣州義旅出自三鴉又募山南驍鋭沿河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募關河之外徑勇之士厚其爵賞使為前驅嶽動川移雷駭電激百道俱進並趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其第二䇿曰若國家更為後圖未即大舉宜與陳人分其兵勢三鴉以北萬春以南廣事屯田預為貯積募其驍悍立為部伍彼既東南有敵戎馬相持我出竒兵破其疆場彼若興師赴援我則堅壁清野待其去遠還復出師常以邊外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境熬然不勝其弊以此而觀覆亡可待然後乘間電掃事等摧枯其第三䇿曰竊以大周土宇跨據關河蓄席卷之威持建瓴之勢太祖受天明命與物更新是以二紀之中大功克舉南清江漢西龕巴蜀塞表無虞河右底定唯彼趙魏獨為榛梗者正以有事三方未遑東略遂使漳滏遊魂更存餘晷昔勾踐亡吳尚期十載武王取亂猶煩再舉今若更存遵養且復相時臣謂宜還崇鄰好申其盟約安人和衆通商惠工蓄鋭養威觀釁而動斯則長策逺馭坐自兼并也書奏武帝遣小司寇淮南公元衛開府伊婁謙等重幣聘齊爾後遂大舉再駕而定山東卒如孝寬之策孝寬每以年迫懸車屢請致仕帝以海內未平優詔弗許至是復稱疾乞骸骨帝曰往已面申本懷何煩重請也五年帝東伐過幸玉壁觀禦敵之所深歎羡之移時乃去孝寬自以習練齊人虛實請為先驅帝以玉壁要衝非孝寬無以鎮之乃不許及趙王招率兵出稽胡與大軍掎角乃􅎁孝寬為行軍總管圍守華谷以應接之孝寬克其四城武帝平晉州復令孝寬還舊鎮及帝凱還復幸玉壁從容謂孝寬曰世稱老人多智善為軍謀然朕唯共少年一舉平賊公以為何如孝寬對曰臣今衰耄唯有誠心而已然昔在少壯亦曾輸力先朝以定關右帝大笑曰實如公言乃詔孝寬隨駕還京拜大司空出為延州總管進位上柱國大象元年除徐兗等十一州十五鎮諸軍事徐州總管又為行軍元帥徇地淮南乃分遣杞公宇文亮攻黃城郕公梁士彥攻廣陵孝寬率衆攻壽陽並拔之初孝寬到淮南所在皆密送誠款然彼五門尤為險要陳人若開塘放水即津濟路絶孝寬遽令分兵據守之陳刺史吳文育果遣決堰已無及於是陳人退走江北悉平軍還至豫州宇文亮舉兵反潛以數百騎襲孝寬營時亮圉官茹寬密白其狀孝寬有備亮不得入遁走孝寬追獲之詔以平淮南之功别封一子滑國公及宣帝崩隋文帝輔政時尉遲迥先為相州總管詔孝寬代之又以小司徒叱列長文為相州刺史先令赴鄴孝寬續進至朝歌迥遣大都督賀蘭貴齎書候孝寬孝寬留貴與語以察之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之既到湯隂逢長文奔還孝寬兄子魏郡守藝又棄郡南走孝寬審訐其狀乃馳還所經橋道皆令毁撤驛馬悉擁以自隨又勒騎將曰蜀公將至可多備肴酒及芻粟以待之迥果遣儀同梁子康將數百騎追孝寬驛司供設豐厚所經之處皆輒停留由是不及時或勸孝寬以為洛京虛弱素無守備河陽鎮防悉是關東鮮卑迥若先往據之則為禍不小乃入保河陽河陽城內舊有鮮卑八百人家並在鄴見孝寬輕來謀欲應迥孝寬知之遂密造東京官司詐稱遣行分人詣洛陽受賜既至洛陽並留不遣因此離解其謀不成六月詔發關中兵以孝寬為元帥東伐七月軍次河陽迥所署儀同薛公禮等圍逼懷州孝寬遣兵擊破之進次懷縣永城橋之東南其城既在要衝雉堞牢固迥已遣兵據之諸將士以此城當路請先攻取孝寬曰城小而固若攻而不拔損我兵威今破其大軍此亦何能為也於是引軍次于武陟大破迥子惇惇輕騎奔鄴軍次於鄴西門豹祠之南迥自出戰又破之迥窮迫自殺兵士在小城中者盡坑於遊豫園諸有未服皆隨機討之關東悉平十月凱還京師十一月薨時年七十二贈太傅十二州諸軍事雍州牧諡曰襄孝寬在邊多載屢抗強敵所有經略布置之初人莫之解見其成事方乃驚服雖在軍中篤意文史政事之餘每自披閲末年患眼猶令學士讀而聼之又早喪父母事兄嫂甚謹所得俸祿不入私房親族有孤遺者必加振贍朝野以此稱焉長子諶年已十嵗魏文帝欲以女妻之孝寬辭以兄子世康年長帝嘉之遂以妻世康孝寬有六子總壽霽津知名韋敻字敬逺志尚夷簡淡於榮利弱冠被召拜雍州中從事非其好也遂謝疾去職前後十見徴辟皆不應命屬太祖經綸王業側席求賢聞敻養髙不仕虛心敬悅遣使辟之備加禮命雖情諭甚至而竟不能屈彌以重之亦弗之奪也所居之宅枕帶林泉敻對玩琴書蕭然自樂時人號為居士焉至有慕其間素者或載酒從之敻亦為之盡歡接對忘倦明帝即位禮敬逾厚乃為詩以貽之曰六爻貞遁世三辰光少微潁陽讓逾逺滄州去不歸香動秋蘭佩風飄蓮葉衣坐石窺仙洞乘槎下釣磯嶺松千仞直巖泉百丈飛聊登平樂觀逺望首陽薇詎能同四隱來參余萬機敻答帝詩願時朝謁帝大悅敕有司日給河東酒一斗號之曰逍遙公時晉公護執政廣營第宅嘗召敻至宅訪以政事敻仰視其堂徐而歎曰酣酒嗜音峻宇雕牆有一於此未或弗亡護不悅有識者以為知言陳遣其尚書周𢎞正來聘素聞敻名請與相見朝廷許之𢎞正乃造敻談謔盈日恨相遇之晚後請敻至賓館敻時赴𢎞正仍贈詩曰德星猶未動真車詎肯來其為時所欽挹如此武帝嘗與敻夜宴大賜之縑帛令侍臣數人負以送出敻唯取一匹示承恩旨而已帝以此益重之孝寬為延州總管敻至州與孝寬相見將還孝寬以所乘馬及轡勒與敻敻以其華飾心弗欲之笑謂孝寬曰昔人不棄遺簪墜屨者惡與之同出不與同歸吾雖不逮前烈然捨舊録新亦非吾志也於是乃乘舊馬以歸武帝又以佛道儒三教不同詔敻辨其優劣敻以三教雖殊同歸於善其迹似有深淺其致理殆無等級乃著三教序奏之帝覽而稱善時宣帝在東宮亦遺敻書并令以帝所乘馬迎之問以立身之道敻對曰傳不云乎儉為德之恭侈為惡之大欲不可縱志不可滿並聖人之訓也願殿下察之敻子瓘行隨州刺史因疾物故孝寬子總復於并州戰歿一日之中凶問俱至家人相對悲慟而敻神色自若謂之曰死生命也去來常事亦何足悲援琴撫之如舊敻又雅好名義虛襟善誘雖耕夫牧竪有一介可稱者皆接引之特與族人處玄及安定梁曠為放逸之友少愛文史留情著述手自抄録數十萬言晚年虛靜唯以體道會真為務舊所製述咸削其藁故文筆多並不存建德中敻以年老預戒其子等曰昔士安以蘧蒢束體王孫以布囊繞尸二賢髙達非庸才能繼吾死之日可斂舊衣勿更新造使棺足周尸牛車載柩墳髙四尺壙深一丈其餘煩雜悉無用也朝晡奠食於事彌煩吾不能頓絶汝輩之情可朔望一奠而已仍薦素蔬勿設牲牢親友欲以物弔祭者並不得為受吾常恐臨終恍惚故以此言預戒汝輩瞑目之日勿違吾志也宣政元年二月卒於家時年七十七武帝遣使祭賻賵有加其喪制葬禮諸子等並遵其遺戒子世康梁士彥字相如安定烏氏人也少任俠好讀兵書頗涉經史周武帝將平東夏聞其勇決自扶風郡守除為九曲鎮將進位上開府封建威縣公齊人甚憚之後以熊州刺史從武帝拔晉州進位大將軍除晉州刺史及帝還齊後主親攻圍之樓堞皆盡短兵相接士彥慷慨自若謂將士曰死在今日吾為爾先於是勇猛齊奮號聲動天無不一當百齊兵少却乃令妻及軍人子女晝夜修城三日而就武帝大軍亦至齊師圍解士彥見帝捋帝鬚泣帝亦為之流涕時帝欲班師士彥叩馬諌帝從之執其手曰朕有晉州為平齊之基宜善守之及齊平封郕國公位上柱國雍州總管宣帝即位除徐州總管與烏丸軌禽陳將吳明徹裴忌於呂梁略定淮南地隋文帝作相轉亳州總管尉遲迥反為行軍總管及韋孝寬擊之令家僮梁默等為前鋒士彥繼之所當皆破及迥平除相州刺史深見忌乃代還京師間居無事恃功懷怨與宇文欣劉昉等謀反將率僮僕候上享廟之際以發機復欲於蒲州起事略取河北捉黎陽關塞河陽路劫調布為牟甲募盜賊為戰士其甥裴通知而奏之帝未發其事授晉州刺史欲觀其志士彥欣然謂昉等曰天也又請儀同薛摩兒為長史帝從之後與公卿朝謁帝令執士彥欣昉等於行間詰之狀猶不伏捕薛摩兒至對之摩兒具論始末云第二子剛垂泣苦諌第三子叔諧曰作猛獸須成班士彥失色顧曰汝殺我於是伏誅年七十二有子五人操字孟德位上開府義鄉縣公早卒剛字永固位大將軍通政縣公涇州刺史以諌父獲免徙瓜州叔諧坐士彥誅梁默者士彥之蒼頭也驍武絶人士彥每從征伐常與默陷陳仕周位開府開皇末以行軍總管從楊素征突厥進位大將軍又從平楊諒授柱國大業五年從煬帝征吐谷渾力戰死之贈光祿大夫周書卷三十一周書卷三十一考證韋孝寬傳時獨孤信為新野郡守司荆州北史云同隸荆川司字疑同字之訛并脫一隸字城外又縳松於竿通鑑云縳松麻于竿臣文淳按下文有松麻俱落句知此脫一麻字北史亦脫周文後見下文云周文北巡又云周孝閔帝踐阼臣文淳按北史總記數代之事故皆書國號以别之此書祗紀北周不應復加周字周書卷三十一考證
