body:
  text: 周書卷四十六唐令狐德棻等撰列傳第三十八孝義李棠桞檜杜叔毗荆可秦族弟榮先皇甫遐張元夫塞天地而橫四海者其唯孝乎奏大功而立顯名者其唯義乎何則孝始事親惟后資於致治義在合宜惟人賴以成德上智稟自然之性中庸有企及之美其大也則隆家光國盛烈與河海爭流授命滅親峻節與竹帛俱茂其小也則溫枕扇席無替於晨昏損己利物有助於名教是以堯舜湯武居帝王之位垂至德以敦其風孔墨荀孟稟聖賢之資𢎞正道以勵其俗觀其所由在此而已矣然而淳源既往澆風愈扇禮義不樹亷讓莫修若乃綰銀黃列鐘鼎立於朝廷之間非一族也其出忠入孝輕生蹈節者則蓋寡焉積龜貝實倉廩居於閭巷之內非一家也其悅禮敦詩守死善道者則又鮮焉斯固仁人君子所以興歎哲后賢宰所宜屬心如令明教化以救其弊優爵賞以勸其善布懇誠以誘其進積歲月以求其終則今之所謂少者可以為多矣古之所謂為難者可以為易矣故博採異聞網羅遺逸録其可以垂範方來者為孝義篇云李棠字長卿勃海蓨人也祖伯貴魏宣武時官至魯郡守有孝行居父喪哀戚過禮遂以毁卒宣武嘉之贈勃海相父元胄員外散騎侍郎棠幼孤好學有志操年十七屬爾朱之亂與司空髙乾兄弟舉兵信都魏中興𥘉辟衛軍府功曹參軍太昌中以軍功除征虜將軍行東萊郡事魏孝武西遷棠時在凹北遂仕東魏及髙仲密為北豫州刺史請棠為掾先是仲密與吏部郎中崔暹有隙暹時被齊文襄委任仲密恐其搆已每不自安將圖來附時東魏又遣鎮城奚壽興典兵事仲密但知民務而已既至州遂與棠謀執壽興以成其計仲密乃置酒延壽興陰伏壯士欲因此執之壽興辭而不赴棠遂往見之曰君與高公義符昆季今日之席以公為首豈有賔客總萃而公無事不行將恐逺近聞之竊有疑怪壽興遂與俱赴便發伏執之乃帥其士衆據城遣棠詣闕歸欵太祖嘉之拜棠衛將軍右光祿大夫封廣宗縣公邑一千户棠固辭曰臣世荷朝恩義當奉國而往者見拘逆命不獲陪駕西巡今日之來免罪為幸何敢以此微庸冒受天爵如此者再三優詔不許俄遷給事黃門侍郎加車騎大將軍儀同三司散騎常侍魏廢帝二年從魏安公尉遲迥伐蜀蜀人未即降棠乃應募先使諭之既入成都蕭撝問迥軍中委曲棠不對撝乃苦笞辱之冀獲其實棠曰爾亡國餘燼不識安危奉命諭爾反見躓頓我王者忠臣有死而已義不為爾移志也撝不能得其要指遂害之子敞嗣柳檜字季華祕書監虬之次弟也性剛簡任氣少文善騎射果於斷決年十八起家奉朝請居父喪毁瘠骨立服闋除陽城郡丞防城都督大統四年從太祖戰於河橋先登有功授都督鎮鄯州八年拜湟河郡守仍典軍事尋加平東將軍太中大夫吐谷渾入冦郡境時檜兵少人懷憂懼檜撫而勉之衆心乃安因率數十人先擊之潰亂餘衆乘之遂大敗而走以功封萬年縣子邑三百户時吐谷渾強盛數侵疆場自檜鎮鄯州屢戰必破之數年之後不敢為寇十四年遷河州别駕轉帥都督俄拜使持節撫軍將軍大都督居三載徵還京師時檜兄虬為祕書丞弟慶為尚書左丞檜嘗謂兄弟曰兄則職典簡牘褒貶人倫弟則管轄羣司股肱朝廷可謂榮寵矣然而四方未靜車書不一檜唯當蒙矢石履危難以報國恩耳頃之太祖謂檜曰卿昔在鄯州忠勇顯著今西境肅清無勞經略九曲國之東鄙當勞君守之遂令檜鎮九曲尋從大將軍王雄討上津魏興平之即除魏興華陽二郡守安康人黃衆寶謀反連結黨與攻圍州城乃相謂曰嘗聞柳府君勇悍其鋒不可當今既在外方為吾徒腹心之疾也不如先擊之遂圍檜郡郡城卑下士衆寡弱又無守禦之備連戰積十餘日士卒僅有存者於是力屈城陷身被十數創遂為賊所獲既而衆寶等進圍東梁州乃縛檜置城下欲令檜誘説城中檜乃大呼曰羣賊烏合糧食已罄行即退散各宜勉之衆寶大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄尸水中城中人皆為之流涕衆寶解圍之後檜兄子止戈方收檜尸還長安贈東梁州刺史子斌嗣斌字伯逹年十七齊公憲召為記室早卒斌弟雄亮字信誠幼有志節好學不倦年十二遭父艱幾至滅性終喪之後志在復讎柱國蔡國公廣欽其名行引為記室參軍年始弱冠府中文筆頗亦委之後竟手刃衆寶於京城朝野咸重其志節髙祖特恕之由是知名大象末位至賔部下大夫杜叔毗字子弼其先京兆杜陵人也徙居襄陽祖乾光齊司徒右長史父漸梁邊城太守叔毗早嵗而孤事母以孝聞性慷慨有志節勵精好學尤善左氏春秋仕梁為宜豐侯蕭循府中直兵參軍大統十七年太祖令大將軍逹奚武經略漢州明年武圍循於南鄭循令叔毗詣闕請和太祖見而禮之使未反而循中直兵參軍曹策參軍劉曉謀以城降武時叔毗兄君錫為循中記室參軍從子映録事參軍映弟晰中直兵參軍並有文武材略各領部曲數百人策等忌之懼不同已遂誣以謀叛擅加害焉循尋討策等擒之斬曉而免策及循降策至長安叔毗朝夕號泣具申冤狀朝議以事在歸附之前不可追罪叔毗內懷憤惋志在復讎然恐違朝憲坐及其母遂沉吟積時母知其意謂叔毗曰汝兄橫罹禍酷痛切骨髓若曹策朝死吾以夕殁亦所甘心汝何疑焉叔毗拜受母言愈更感勵後遂白日手刃策於京城斷首刳腹解其肢體然後靣縛請就戮焉太祖嘉其志氣特命赦之尋拜都督輔國將軍中散大夫遭母憂哀毁骨立殆不勝喪服闋晉公護辟為中外府樂曹參軍加授大都督遷使持節車騎大將軍儀同三司行義歸郡守自君錫及宗室等為曹策所害猶殯梁州至是表請迎喪歸葬髙祖許之葬事所須詔令官給在梁舊田宅經外配者並追還之仍賜田二百頃尋除陜州刺史天和二年從衛國公直南討軍敗為陳人所擒陳人將降之叔毗辭色不撓遂被害子廉卿荆可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘旨終無匱乏及母喪水漿不入口三日悲號劈踊絶而復蘇者數四葬母之後遂廬於墓側晝夜悲哭負土成墳蓬髮不櫛沭菜食飲水而已然可家舊墓塋域極大榛蕪至深去家十餘里而可獨宿其中與禽獸雜處哀感逺近邑里稱之大統中鄉人以可孝行之至足以勸勵風俗乃上言焉太祖令州縣表異之及服終之後猶若居喪大冢宰晉公護聞可孝行特引見焉與可言論時有會於護意而護亦至孝其母閻氏沒於敵境不測存亡每見可自傷久乖膝下重可至性及可卒之後護猶思其純孝收可妻子於京城恆給其衣食秦族上郡洛川人也祖白父雚並有至性聞於閭里魏太和中板白潁州刺史大統中板雚鄜城郡守族性至孝事親竭力為鄉里所稱及其父喪哀毁過禮每一痛哭酸感行路既以母在恆抑割哀情以慰其母意四時珍羞未嘗匱乏與弟榮先復相友愛閨門之中怡怡如也尋而其母又沒哭泣無時唯飲水食菜而已終喪之後猶蔬食不入房室二十許年鄉里咸歎異之其邑人王元逹等七十餘人上其狀有詔表其門閭榮先亦至孝遭母喪哀慕不已遂以毁卒邑里化其孝行世宗嘉之乃下詔曰孝為政本德乃化先既表天經又明地義榮先居喪致疾至感過人窮號不反迄乎滅性行標當世理鏡幽明此而不顯道將何述可贈滄洲刺史以旌厥異皇甫遐字永覽河東汾隂人也纍世寒微而鄉里稱其和睦遐性純至少喪父事母以孝聞保定末又遭母喪乃廬於墓側負土為墳後於墓南作一禪窟陰雨則穿窟晴霽則營墓曉夕勤力未嘗暫停積以歲年墳髙數丈周回五十餘步禪窟重臺兩匝總成十有二室中間行道可容百人遐食粥枕􅤓櫛風沭雨形容枯悴家人不識當其營墓之初乃有鴟鳥各一徘徊悲鳴不離墓側若助遐者經月餘日乃去逺近聞其至孝競以米麵遺之遐皆受而不食悉以營佛齋焉郡縣表上其狀有詔旌異之張元字孝始河北芮城人也祖成假平陽郡守父延俊仕州郡纍為功曹主簿並以純至為鄉里所推元性謙謹有孝行微涉經史然精修釋典年六歲其祖以夏中熱甚欲將元就井浴元固不肯從祖謂其貪戲乃以杖擊其頭曰汝何為不肯洗浴元對曰衣以蓋形為覆其褻元不能褻露其體於白日之下祖異而捨之南鄰有二杏樹杏熟多落元園中諸小兒競取而食之元所得者送還其主村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將欲更棄之元對曰有生之類莫不重其性命若天生天殺自然之理今為人所棄而死非其道也若見而不收養無仁心也是以收而養之叔父感其言遂許焉未幾乃有狗母銜一死兔置元前而去及元年十六其祖喪明三年元恆憂泣晝夜讀佛經禮拜以祈福祐後讀藥師經見盲者得視之言遂請七僧然七燈七日七夜轉藥師經行道每言天人師乎元為孫不孝使祖喪明今以燈光普施法界願祖目見明元求代暗如此經七日其夜夢見一老公以金鎞治其祖目謂元曰勿憂悲也三日之後汝祖目必差元於夢中喜躍遂即驚覺乃遍告家人居三日祖果目明其後祖臥疾再周元恆隨祖所食多少衣冠不解旦夕扶侍及祖殁號踴絶而復蘇復喪其父水漿不入口三日鄉里咸歎異之縣博士楊軌等二百餘人上其狀有詔表其門閭史臣曰李棠柳檜並臨危不撓視死如歸其壯志貞情可與青松白玉比質也然檜恩隆加等棠禮闕飾終有周之政於是乎偏矣雄亮銜戴天之痛叔毗切同氣之悲援白刃而不顧雪家冤於輦轂觀其志節處死固為易也荆可秦族之徒生自隴畝曾無師資之訓因心而成孝友乘理而蹈禮節如使舉世若兹則羲農何逺之有若乃誠感天地孝通神明見之於張元矣周書卷四十六
