body:
  text: 周書卷四十九唐令狐德棻等撰列傳第四十一異域上高麗百濟蠻獠宕昌鄧至白蘭氐稽胡厙莫奚蓋天地之所覆載至大矣日月之所照臨至廣矣然則萬物之內民人寡而禽獸多兩儀之間中土局而殊俗曠求之鄒説詭怪之迹實繁考之山經竒譎之詞匪一周孔存而不論是非紛而莫辨秦皇鞭笞天下黷武於遐方漢武士馬強盛肆志於逺略胸奴既却其國已虛犬馬既來其民亦困是知鴈海龍堆天所以絶夷夏也炎方朔漠地所以限內外也况乎時非秦漢志甚嬴劉違天道以求其功殫民力而從所欲顛墜之釁固不旋踵是以先王設教內諸夏而外夷狄往哲垂範美樹德而鄙廣地雖禹迹之東漸西被不過海及流沙王制之自北徂南裁稱穴居交趾豈非道貫三古義髙百代者乎有周承喪亂之後屬戰爭之日定四表以武功安三邊以權道趙魏尚梗則結姻於北狄廄庫未實則通好於西戎由是德刑具舉聲名遐洎卉服氊裘輻輳於屬國商胡販客填委於旗亭雖東略漏三吳之地南巡阻百越之境而國威之所肅服風化之所覃被亦足為𢎞矣其四夷來朝聘者今並紀之於後至於道路逺近物産風俗詳諸前史或有不同斯皆録其當時所記以備遺闕云爾髙麗者其先出於夫餘自言始祖曰朱蒙河伯女感日影所孕也朱蒙長而有材略夫餘人惡而逐之土于紇斗骨城自號曰髙句麗仍以髙為氏其孫莫來漸盛擊夫餘而臣之莫來裔孫璉始通使於後魏其地東至新羅西渡遼水二千里南接百濟北鄰靺鞨千餘里治平壤城其城東西六里南臨浿水城內唯積倉儲器備寇賊至日方入固守王則别為宅於其側不常居之其外有國內城及漢城亦别都也復有遼東玄莬等數十城皆置官司以相統攝大官有大對盧次有太大兄大兄小兄意俟奢烏拙太大使者大使者小使者褥奢翳屬仙人並褥薩凡十三等分掌內外事焉其大對盧則以強弱相陵奪而自為之不由王之署置也其刑法謀反及叛者先以火焚爇然後斬首籍沒其家盜者十餘倍徴贓若貧不能備及負公私債者皆聽評其子女為奴婢以償之丈夫衣同袖衫大口袴白韋帶黃革履其冠曰骨蘇多以紫羅為之雜以金銀為飾其有官品者又插二鳥羽於其上以顯異之婦人服裙襦裾袖皆為襈書籍有五經三史三國志晉陽秋兵器有甲弩弓箭戟矟矛鋌賦稅則絹布及粟隨其所有量貧冨差等輸之土田塉薄居處節儉然尚容止多詐偽言辭鄙穢不簡親踈乃至同川而浴共室而寢風俗好淫不以為愧有遊女者夫無常人婚娶之禮略無財幣若受財者謂之賣婢俗甚恥之父母及夫喪其服制同於華夏兄弟則限以三月敬信佛法尤好淫祀又有神廟二所一曰夫餘神刻木作婦人之象一曰登髙神云是其始祖夫餘神之子並置官司遣人守護蓋河伯女與朱蒙云璉五世孫成大統十二年遣使獻其方物成死子湯立建德六年湯又遣使來貢高祖拜湯為上開府儀同大將軍遼東郡開國公遼東王百濟者其先蓋馬韓之屬國夫餘之别種有仇台者始國於帶方故其地界東極新羅北接髙句麗西南俱限大海東西四百五十里南北九百餘里治固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城王姓夫餘氏號於羅瑕民呼為鞬吉支夏言並王也妻號於陸夏言妃也官有十六品左平五人一品逹率三十人二品恩率三品德率四品扞率五品奈率六品六品已上冠飾銀華將德七品紫帶施德八品皂帶固德九品赤𢃄李德十品青帶對德十一品文督十二品皆黃帶武督十三品佐軍十四品振武十五品克虞十六品皆白帶自恩率以下官無常員各有部司分掌衆務內官有前內部穀部肉部內掠部外掠部馬部刀部功德部藥部木部法部後官部外官有司軍部司徒部司空部司寇部點口部客部外舍部綢部日官部都市部都下有萬家分為五部曰上部前部中部下部後部統兵五百人五方各有方領一人以逹率為之郡將三人以德率為之方統兵一千二百人以下七百人以上城之內外民庶及餘小城咸分隸焉其衣服男子略同於髙麗若朝拜祭祀其冠兩廂加翅戎事則不拜謁之禮以兩手據地為敬婦人衣以袍而袖微大在室者編髮盤於首後垂一道為飾出嫁者乃分為兩道焉兵有弓箭刀矟俗重騎射兼愛墳史其秀異者頗解屬文又解陰陽五行用宋元嘉厯以建寅月為嵗首亦解醫藥卜筮占相之術有投壺樗蒲等雜戲然尤尚奕棊僧尼寺塔甚多而無道士賦稅以布絹絲麻及米等量歲豐儉差等輸之其刑罰反叛退軍及殺人者斬盜者流其贓兩倍徵之婦人犯姦者沒入夫家為婢婚娶之禮略同華俗父母及夫死者三年治服餘親則葬訖除之土田下濕氣候溫暖五穀雜果菜蔬及酒醴肴饌藥品之屬多同於內地唯無駝驢騾羊鵝鴨等其王以四仲之月祭天及五帝之神又每歲四祠其始祖仇台之廟自晉宋齊梁據江左後魏宅中原並遣使稱藩兼受封拜齊氏擅東夏其王隆亦通使焉隆死子昌立建德六年齊滅昌始遣使獻方物宣政元年又遣使來獻蠻者盤瓠之後族類蕃衍散處江淮之間汝豫之郡憑險作梗世為寇亂逮魏人失馭其暴滋甚有冉氏向氏田氏者陬落尤盛餘則大者萬家小者千户更相崇樹僭稱王侯屯據三峽斷遏水路荆蜀行人至有假道者太祖略定伊瀍聲教南被諸蠻畏威靡然向風矣大統五年蔡陽蠻王魯超明內屬以為南雍州刺史仍世襲焉十一年蠻首梅勒特來貢其方物尋而蠻帥田杜清及沔漢諸蠻擾動大將軍楊忠擊破之其後蠻帥杜青和自稱巴州刺史以州入附朝廷因其所稱而授之青和後遂反攻圍東梁州其唐州蠻田魯嘉亦叛自號豫州伯王雄權景宣等前後討平之語在泉仲遵及景宣傳魏廢帝初蠻酋樊舍舉落內附以為淮北三州諸軍事淮州刺史淮安郡公于謹等平江陵諸蠻騷動詔豆盧寧蔡祐等討破之魏恭帝二年蠻酋宜民王田興彥北荆州刺史梅季昌等相繼款附以興彥季昌並為開府儀同三司加季昌洛州刺史賜爵石臺縣公其後巴西人譙淹扇動羣蠻以附於梁蠻帥向鎮侯向日彪等應之向五子王又攻陷信州田烏度田都唐等抄斷江路文子榮復據荊州之汶陽郡自稱仁州刺史并鄰州刺史蒲微亦舉兵逆命詔田𢎞賀若敦潘招李遷哲討破之語在敦及遷哲陽雄等傳武成初文州蠻叛州選軍討定之尋而冉令賢向五子王等又攻陷白帝殺開府楊長華遂相率作亂前後遣開府元契趙剛等總兵出討雖頗剪其族類而元惡未除天和元年詔開府陸騰督王亮司馬裔等討之騰水陸俱進次于湯口先遣喻之而令賢方增浚城池嚴設扞禦遣其長子西黎次子南王領其支屬於江南險要之地置立十城逺結涔陽蠻為其聲援令賢率其精卒固守水邏城騰乃總集將帥謀其進趣咸欲先取水邏然後經略江南騰言於衆曰令賢內恃水邏金湯之險外託涔陽輔車之援兼復資糧充實器械精新以我懸軍攻其嚴壘脫一戰不尅更成其氣不如頓軍湯口先取江南剪其羽毛然後進軍水邏此制勝之計也衆皆然之乃遣開府王亮率衆渡江旬日攻拔其八城凶黨奔散獲賊帥冉承公并生口三千人降其部衆一千户遂簡募驍勇數道入攻水邏路經石壁城此城峻嶮四靣壁立故以名焉唯有一小路緣梯而上蠻蛋以為峭絶非兵衆所行騰被甲先登衆軍繼進備經危阻纍月乃得舊路且騰先任隆州總管雅知蠻帥冉伯犁冉安西與令賢有隙騰乃招誘伯犂等結為父子又多遺其金帛伯犁等悅遂為鄉導水邏側又有石勝城者亦是險要令賢使兄子龍真據之騰又密誘龍真云若平水邏使其代令賢處龍真大悅密遣其子詣騰騰乃厚加禮接賜以金帛蠻貪利既深仍請立效乃謂騰曰欲翻所據城恐人力寡少騰許以三百兵助之既而遣二千人銜枚夜進龍真力不能禦遂平石勝城晨至水邏蠻衆大潰斬首萬餘級虜獲一萬口令賢遁走追而獲之并其子弟等皆斬之司馬裔又别下其二十餘城獲蠻帥冉三公等騰乃積其骸骨於水邏城側為京觀後蠻蛋望見輒大號哭自此狼戾之心輟矣時向五子王據石默城令其子寶勝據雙城水邏平後頻遣喻之而五子王猶不從命騰又遣王亮屯牢坪司馬裔屯雙城以圖之騰慮雙城孤峭攻未易拔賊若委城奔散又難追討乃令諸軍周回立柵遏其走路賊乃大駭於是縱兵擊破之擒五子王於石默獲寶勝於雙城悉斬諸向首領生擒萬餘口信州舊治白帝騰更於劉備故宫城南八陳之北臨江岸築城移置信州又以巫縣信陵秭歸並是硤中要險於是築城置防以為襟帶焉天和六年蠻渠冉祖喜冉龍驤又反詔大將軍趙誾討平之自此羣蠻懾息不復為寇矣獠者蓋南蠻之别種自漢中逹于卭笮川洞之間在所皆有之俗多不辨姓氏又無名字所生男女唯以長幼次第呼之其丈夫稱阿謨阿假婦人阿夷阿第之類皆其語之次第稱謂也喜則羣聚怒則相殺雖父子兄弟亦手刃之遞相掠賣不避親戚被賣者號呌不服逃竄避之乃將買人指撝捕逐若追亡叛獲便縛之但經被縛者即服為賤𨽻不敢更稱良矣俗畏鬼神尤尚淫祀巫祝至有賣其昆季妻孥盡者乃自賣以祭祀焉往往推一酋帥為王亦不能逺相統攝自江左及中州遞有巴蜀多恃險不賔太祖平梁益之後令所在撫慰其與華民雜居者亦頗從賦役然天性暴亂旋至擾動每歲命隨近州鎮出兵討之獲其口以充賤𨽻謂之為壓獠焉後有商旅往來者亦資以為貨公卿逮于民庶之家有獠口者多矣魏恭帝三年陵州木籠獠反詔開府陸騰討破之俘斬萬五千人保定二年鐵山獠又反抄斷江路陸騰復攻拔其三城虜獲三千人降其種三萬落語在騰傳天和三年梁州恆稜獠叛總管長史趙文表討之軍次巴州文表欲率衆徑進軍吏等曰此獠旅拒日久部衆甚強討之者皆四靣攻之以分其勢今若大軍直進不遣竒兵恐併力於我未可制勝文表曰往者既不能制之今須别為進趣若四面遣兵則獠降走路絶理當相率以死拒戰如從一道則吾得示威恩分遣使人以理曉諭為惡者討之歸善者撫之善惡既分易為經略事有變通奈何欲遵前轍也文表遂以此意遍令軍中時有從軍熟獠多與恆稜親識即以實報之恆稜獠相與聚議猶豫之間文表軍已至其界獠中先有二路一路稍平一路極險俄有生獠酋帥數人來見文表曰我恐官軍不悉山川請為鄉導文表謂之曰此路寬平不須導引卿但先去好慰諭子弟也乃遣之文表謂其衆曰向者獠帥語吾從寬路而行必當設伏要我若從險路出其不虞獠衆自離散矣於是勒兵從險道進其有不通之處隨即治之乘高而望果見其伏兵獠既失計爭携妻子退保險要文表頓軍大蓬山下示以禍福遂相率來降文表皆慰撫之仍徴其稅租無敢動者後除文表為蓬州刺史又大得獠和建德𥘉李暉為梁州總管諸獠亦並從附然其種類滋蔓保據巖壑依林走險若履平地雖屢加兵弗可窮討性又無知殆同禽獸諸夷之中最難以道義招懷者也宕昌羌者其先蓋三苗之胤周時與庸蜀微盧等八國從武王滅商漢有先零燒當等世為邊患其地東接中華西通西域南北數千里姓别自為部落各立酋帥皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織犛牛尾及羖羊毛覆之國無法令又無徭賦唯征伐之時乃相屯聚不然則各事生業不相往來皆衣裘褐牧養犛牛羊豕以供其食父子伯叔兄弟死者即以其繼母世叔母及嫂姊妹等為妻俗無文字但候草木榮落以記嵗時三年一相聚殺牛羊以祭天有梁勒者世為酋帥得羌豪心乃自稱王焉其界自仇池以西東西千里帶水以南南北八百里地多山阜部衆二萬餘落勒孫彌忽始通使於後魏太武因其所稱而授之自彌忽至仚定九世每修職貢不絶後見兩魏分隔遂懷背誕永熙末仚定乃引吐谷渾寇金城大統初又率其種人入寇詔行臺趙貴督儀同侯莫陳順等擊破之仚定懼稱藩請罪太祖捨之拜撫軍將軍四年以仚定為南洮州刺史要安蕃王後改洮州為岷州仍以仚定為刺史是歲秦州濁水羌反州軍討平之七年仚定又舉兵入寇獨孤信時鎮隴右詔信率衆便討之軍未至而仚定為其下所殺信進兵破其餘黨朝廷方欲招懷殊俗乃更以其弟彌定為宕昌王十六年彌定宗人獠甘襲奪其位彌定來奔先是羌酋傍乞鐵忽等因仚定反叛之際遂擁衆據渠林川與渭州民鄭五醜扇動諸羌阻兵逆命至是詔大將軍宇文貴豆盧寧涼州刺史史寧等率兵討獠甘等並擒斬之納彌定而還語在貴等傳其後羌酋東念姐鞏亷俱和等反大將軍豆盧寧王勇等前後討平之保定𥘉彌定遣使獻方物三年又遣使獻生猛獸四年彌定寇洮州總管李賢擊走之是歲彌定又引吐谷渾寇石門戍賢復破之高祖怒詔大將軍田𢎞討滅之以其地為宕州鄧至羌者羌之别種也有像舒治者世為白水酋帥自稱王焉其地北與宕昌相接風俗物産亦與宕昌略同自舒治至簷桁十一世魏恭帝元年簷桁失國來奔太祖令章武公導率兵送復之白蘭者羌之别種也其地東北接吐谷渾西北至利模徒南界那鄂風俗物産與宕昌略同保定元年遣使獻犀甲鐵鎧氐者西夷之别種三代之際蓋自有君長而世一朝見故詩稱自彼氐羌莫敢不來王也漢武帝滅之以其地為武都郡自汧渭抵於巴蜀種類實繁漢末有氐帥楊駒始據仇池百頃最為強族其後漸盛乃自稱王至裔孫纂為符堅所滅堅敗其族人定又自稱王定為乞伏乾歸所殺定從弟盛代有其國世受魏氏封拜亦通使於江左然其種落分散叛服不恆隴漢之間屢被其害盛之苗裔曰集始魏封為武興王集始死子紹先立遂僭稱大號魏將傅豎眼滅之執紹先歸諸京師以其地為武興鎮魏氏洛京未定天下亂紹先奔還武興復自立為王太祖定秦隴紹先稱藩送妻子為質大統元年紹先請其妻女太祖奏魏帝還之紹先死子辟邪立四年南岐州氐符安夀反攻陷武都自號太白王詔大都督侯莫陳順與渭州刺史長孫澄討破之安夀以其衆降九年清水氐酋李鼠仁據險作亂氐帥梁道顯叛攻南由太祖遣典籤趙昶慰諭之鼠仁等相繼歸附語在昶傳十一年於武興置東益州以辟邪為刺史十五年安夷氐復叛趙昶時為郡守收其首逆者二十餘人斬之餘衆乃定於是以昶行南秦州事氐帥蓋閙等相率作亂閙據北谷其黨覃洛聚洮中楊興德符雙圍平氐城薑樊噲亂武階西結宕昌羌獠甘共推蓋閙為主昶分道遣使宣示禍福然後出兵討之擒蓋閙散其餘黨興州叛氐復侵逼南岐州刺史叱羅協遣使告急昶率兵赴救又大破之先是氐首楊法深據陰平自稱亦盛之苗裔也魏孝昌中舉衆內附自是職貢不絶廢帝元年以法深為黎州刺史二年楊辟邪據州反羣氐復與同逆詔叱羅協與趙昶討平之太祖乃以大將軍宇文貴為大都督六州諸軍事興州刺史貴威名先著羣氐頗畏服之是歲楊法深從尉遲回平蜀軍回法深旋鎮尋與其宗人楊崇集楊陳侳各擁其衆遞相攻討趙昶時督成武沙三州諸軍事成州刺史遣使和解之法深等從命乃分其部落更置州郡以處之魏恭帝末武興氐反圍利州鳯州固道氐魏天王等亦聚衆響應大將軍豆盧寧等討平之世宗時興州人假吒及下辨柏樹二縣民反相率破蘭臯戍氐酋薑多復率厨中氐蜀攻陷落叢郡以應之趙昶率衆討平二縣并斬假吒而隂平盧北二郡氐復往往屯聚與厨中相應昶乃簡擇精騎出其不意徑入厨中至大竹坪連破七柵誅其渠率二郡並降及昶還厨中主氐復為寇掠昶又遣儀同劉崇義宇文琦率兵入厨中討之大破氐衆斬薑多及符肆王等於是羣氐並平及王謙舉兵沙州氐帥開府楊永安又據州應謙大將軍逹奚儒討平之稽胡一曰步落稽蓋胸奴别種劉元海五部之苗裔也或云山戎赤狄之後自離石以西安定以東方七八百里居山谷間種落繁熾其俗土著亦知種田地少桑蠶多麻布其丈夫衣服及死亡殯葬與中夏略同婦人則多貫蜃貝以為耳及頸飾又與華民錯居其渠帥頗識文字然語類夷狄因譯乃通蹲踞無禮貪而忍害俗好淫穢處女尤甚將嫁之夕方與淫者敘離夫氏聞之以多為貴既嫁之後頗亦防間有犯姦者隨事懲罰又兄弟死皆納其妻雖分統郡縣列於編户然輕其徭賦有異齊民山谷阻深者又未盡役屬而凶悍恃險數為寇亂魏孝昌中有劉蠡升者居雲陽谷自稱天子立年號署百官屬魏氏政亂力不能討蠡升遂分遣部衆抄掠居民汾晉之間略無寧歲齊神武遷鄴後始密圖之偽許以女妻蠡升太子蠡升信之遂遣其子詣鄴齊神武厚為之禮緩以婚期蠡升既恃和親不為之備大統元年三月齊神武潛師襲之蠡升率輕騎出外徴兵為其北部王所殺斬首送於齊神武其衆復立蠡升第三子南海王為主率兵拒戰齊神武擊滅之獲其偽主及其弟西海王并皇后夫人王公以下四百餘人歸於鄴居河西者多恃險不賔時方與齊神武爭衡未遑經略太祖乃遣黃門郎楊忠就安撫之五年黑水部衆先叛七年别帥夏州刺史劉平伏又據上郡反自是北山諸部連歲寇暴太祖前後遣李逺于謹侯莫陳崇李弼等相繼討平之武成𥘉延州稽胡郝阿保郝狼皮率其種人附於齊氏阿保自署丞相狼皮自署柱國并與其别部劉桑德共為影響柱國豆盧寧督諸軍與延州刺史高琳擊破之二年狼皮等餘黨復叛詔大將軍韓杲討之俘斬甚衆保定中離石生胡數寇汾北勳州刺史韋孝寬於險要築城置兵糧以遏其路及楊忠與突厥伐齊稽胡等復懷旅拒不供糧餼忠乃詐其酋帥云與突厥欲回兵討之酋帥等懼乃相率供饋焉語在忠傳其後丹州綏州銀州等部內諸胡與蒲川别帥郝三郎等又頻年逆命復詔逹奚震辛威于實等前後窮討散其種落天和二年延州總管宇文盛率衆城銀州稽胡白郁久同喬是羅等欲邀襲盛軍盛並討斬之又破其别帥喬三勿同等五年開府劉雄出綏州巡檢北邊川路稽胡帥喬白郎喬素勿同等渡河逆戰雄復破之建德五年高祖敗齊師於晉州乘勝逐北齊人所棄甲仗未暇收斂稽胡乘間竊出並盜而有之乃立蠡升孫沒鐸為主號聖武皇帝年曰石平六年高祖定東夏將討之議欲窮其巢穴齊王憲以為種類既多又山谷阻絶王師一舉未可盡除且當剪其魁首餘加慰撫高祖然之乃以憲為行軍元帥督行軍總管趙王招譙王儉滕王逌等討之憲軍次馬邑乃分道俱進沒鐸遣其黨天柱守河東又遣其大帥穆支據河西規欲分守險要犄角憲軍憲命譙王儉攻天柱滕王逌擊穆支並破之斬首萬餘級趙王招又擒沒鐸餘衆盡降宣政元年汾州稽胡帥劉受羅千復反越王盛督諸軍討擒之自是寇盜頗息厙莫奚鮮卑之别種也其先為慕容晃所破竄於松漠之間後種類漸多分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木昆五曰室得每部置俟斥一人有阿會氏者最為豪帥五部皆受其節度役屬於突厥而數與契丹相攻虜獲財畜因而行賞死者則以葦薄裹尸懸之樹上大統五年遣使獻其方物史臣曰凡民肖形天地稟靈陰陽愚智本於自然剛柔繫於水土故雨露所會風流所通九川為紀五嶽作鎮此之謂諸夏生其地者則仁義出焉昧谷嵎夷孤竹北户限以丹徼紫塞隔以滄海交河此之謂荒裔感其氣者則凶德成焉若夫九夷八狄種落繁熾七戎六蠻充牣邊鄙雖風土殊俗嗜欲不同至於貪而無厭狠而好亂強則旅拒弱則稽服其揆一也斯蓋天之所命使其然乎周書卷四十九周書卷四十九考證高麗傳土于紇斗骨城魏書作紇升骨城宕昌羌傳有梁勒者世為酋帥勒魏書作勤氐傳有氐帥楊駒始據仇池百頃楊駒魏書作楊騰周書卷四十九考證
