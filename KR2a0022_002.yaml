body:
  text: 周書卷二唐令狐德棻等撰帝紀第二文帝下魏大統元年春正月己酉進太祖督中外諸軍事録尚書事大行臺改封安定郡王太祖固讓王及録尚書事魏帝許之乃改封安定郡公東魏遣其將司馬子如寇潼關太祖軍霸上子如乃回軍自蒲津寇華州刺史王羆擊走之三月太祖以戎役屢興民吏勞弊乃命所司斟酌今古參考變通可以益國利民便時適治者為二十四條新制奏魏帝行之二年春三月東魏襲陷夏州留其將張瓊許和守之夏五月秦州刺史建中王万俟普撥率所部叛入東魏太祖勒輕騎追之至河北千餘里不及而還三年春正月東魏寇龍門屯軍蒲坂造三道浮橋度河又遣其將竇泰趣潼關髙敖曹圍洛州太祖出軍廣陽召諸將曰賊今犄吾三面又造橋於河示欲必渡是欲綴吾軍使竇泰得西入耳久與相持其計得行非良䇿也且歡起兵以來泰每為先驅其下多鋭卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而遠襲事若蹉跌悔無及也太祖曰歡前再襲潼關吾軍不過霸上今者大兵來未出郊賊顧謂吾但自守耳無遠鬭意又狃於得志有輕我之心乘此擊之何往不克賊雖造橋不能徑渡此五日中吾取竇泰必矣公等勿疑庚戍太祖率騎六千還長安聲言欲保隴右辛亥謁帝而潛出軍癸丑旦至小關竇泰卒聞軍至惶懼依山為陳未及成列太祖縱兵擊破之盡俘其衆萬餘人斬泰傳首長安髙敖曹適陷洛州執刺史泉企聞泰之殁焚輜重棄城走齊神武亦撤橋而退企子元禮尋復洛州斬東魏刺史杜密太祖還軍長安六月遣儀同于謹取楊氏壁太祖請罷行臺帝復申前命太祖受録尚書事餘固讓乃止秋七月徴兵會咸陽八月丁丑太祖率李弼獨孤信梁禦趙貴于謹若干惠怡峯劉亮王德侯莫陳崇李遠逹奚武等十二將東伐至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣于謹居軍前徇地至槃豆東魏將髙叔禮守柵不下謹急攻之乃降獲其戍卒一千送叔禮於長安戊子至𢎞農東魏將髙干陜州刺史李徽伯拒守於時連雨太祖乃命諸軍冒雨攻之庚寅城潰斬徽伯虜其戰士八千髙干走渡河令賀拔勝追擒之並送長安於是宜陽邵郡皆來歸附先是河南豪傑多聚兵應東魏至是各率所部來降齊神武懼率衆十萬出壺口趨蒲坂將自后土濟又遣其將髙敖曹以三萬人出河南是嵗關中飢太祖既平𢎞農因館榖五十餘日時戰士不滿萬人聞齊神武將度乃引軍入關齊神武遂度河逼華州刺史王羆嚴守知不可攻乃涉洛軍於許原西太祖據渭南徴諸州兵皆會乃召諸將謂之曰髙歡越山度河遠來至此天亡之時也吾欲擊之何如諸將咸以衆寡不敵請待歡更西以觀其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎度渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里齊神武聞太祖至引軍來會癸巳旦候騎告齊神武軍且至太祖召諸將謀之李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之遂進軍至渭曲背水東西為陳李弼為右拒趙貴為左拒命將士皆偃戈於葭蘆中聞鼓聲而起申時齊神武至望太祖軍少競馳而進不為行列總萃於左軍兵將交太祖鳴鼓士皆奮起于謹等六軍與之合戰李弼等率鐵騎橫擊之絶其軍為二隊大破之斬六千餘級臨陳降者二萬餘人齊神武夜遁追至河上復大克獲前後虜其卒七萬留其甲士二萬餘迷縱歸收其輜重兵甲獻俘長安還軍渭南於是所徴諸州兵始至乃於戰所準當時兵士人種樹一株以旌武功進太祖柱國大將軍增邑并前五千戶李弼等十二將亦進爵增邑并其下將士賞各有差遣左僕射馮翊王元季海為行臺與開府獨孤信率步騎二萬向洛陽洛州刺史李顯趨荆州賀拔勝李弼渡河圍蒲坂牙門將髙子信開門納勝軍東魏將薛崇禮棄城走勝等追獲之太祖進軍蒲坂略定汾絳於是許和殺張瓊以夏州降初太祖自𢎞農入關後東魏將髙敖曹圍𢎞農聞其軍敗退守洛陽獨孤信至新安敖曹復走度河信遂入洛陽東魏潁川長史賀若統與密縣人張儉執刺史田迅舉城降滎陽鄭榮業鄭偉等攻梁州擒其刺史鹿永吉清河人崔彥穆檀琛攻滎陽擒其郡守蘇定皆來附自梁陳已西將吏降者相屬於是東魏將堯雄趙育是云寶出潁川欲復降地太祖遣儀同宇文貴梁遷等逆擊大破之趙育來降東魏復遣將任祥率河南兵與雄合儀同怡峯與貴遷等復擊破之又遣都督韋孝寬取豫州是云寶殺其東揚州刺史那椿以州來附四年春三月太祖率諸將入朝禮畢還華州七月東魏遣其將侯景厙狄干髙敖曹元軌可朱渾元莫多婁貸文等圍獨孤信於洛陽齊神武繼其後先是魏帝將幸洛陽拜園陵會信被圍詔太祖率軍救信魏帝亦東八月庚寅太祖至榖城莫多婁貸文可朱渾元來逆臨陳斬貸文元單騎遁免迷虜其衆送𢎞農遂進軍瀍東是夕魏帝幸太祖營於是景等夜解圍去及旦太祖率輕騎追之至於河上景等北據河橋南屬邙山為陳與諸軍合戰太祖馬中流矢驚逸遂失所之因此軍中擾亂都督李穆下馬授太祖軍以復振於是大捷斬髙敖曹及其儀同李猛西兖州刺史宋顯等虜其甲士一萬五千赴河死者以萬數是日置陳既大首尾懸遠從旦至未戰數十合氛霧四塞莫能相知獨孤信李遠居右趙貴怡峯居左戰並不利又未知魏帝及太祖所在皆棄其卒先歸開府李虎念賢等為後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至𢎞農守將皆已棄城西走所虜降卒在𢎞農者因相與閉門拒守進攻拔之誅其魁首數百人大軍之東伐也關中留守兵少而前後所虜東魏士卒皆散在民間乃謀為亂及李虎等至長安計無所出乃與公卿輔魏太子出次渭北關中大震恐百姓相剽劫於是沙苑所俘軍人趙青雀雍州民于伏德等遂反青雀據長安子城伏德保咸陽與太守慕容思慶各收降卒以拒還師長安大城民皆相率拒青雀每日接戰魏帝留止閿鄉遣太祖討之長安父老見太祖至悲且喜曰不意今日復得見公士女咸相賀華州刺史導率軍襲咸陽斬思慶擒伏德南度渭與太祖會攻青雀破之太傅梁景睿先以疾留長安遂與青雀通謀至是亦伏誅關中於是乃定魏帝還長安太祖復屯華州冬十一月東魏將侯景攻陷廣州十二月是云寶襲洛陽東魏將王元軌棄城走都督趙剛襲廣州拔之自襄廣以西城鎮復內屬五年冬大閲於華陰六年春東魏將侯景出三鴉將侵荆州太祖遣開府李弼獨孤信各率騎五千出武關景乃退還夏茹茹度河至夏州太祖召諸軍屯沙苑以備之七年春三月稽胡帥夏州刺史劉平伏據上郡叛遣開府于謹討平之冬十一月太祖奏行十二條制恐百官不勉於職事又下令申明之八月夏四月大會諸軍於馬牧冬十月齊神武侵汾絳圍玉壁太祖出軍蒲坂將擊之軍至皂莢齊神武退太祖度汾追之遂遁去十二月魏帝狩於華隂大饗將士太祖率諸將朝於行在所九年春東魏北豫州刺史髙仲密舉州來附太祖帥師迎之令開府李遠為前軍至洛陽遣開府于謹攻柏谷塢拔之三月齊神武至河北太祖還軍瀍上以引之齊神武果度河據邙山為陳不進者數日太祖留輜重於瀍曲士皆銜枚夜登邙山未明擊之齊神武單騎為賀拔勝所逐僅而獲免太祖率右軍若干惠等大破齊神武軍迷虜其步卒趙貴等五將軍居左戰不利齊神武軍復合太祖又不利夜乃引還既入關屯渭上齊神武進至陜開府逹奚武等率軍禦之乃退太祖以邙山之戰諸將失律上表請自貶魏帝報曰公膺期作宰義髙匡合仗鉞專征舉無遺算朕所以垂拱九載實資元輔之力俾九服寧謐誠賴翊贊之功今大寇未殄而以諸將失律便欲自貶深虧體國之誠宜抑此謙光恤豫一人於是廣募關隴豪右以增軍旅冬十月大閲於櫟陽還屯華州十年夏五月太祖入朝秋七月魏帝以太祖前後所上二十四條及十二條新制定為中興永式乃命尚書蘇綽更損益之總為五卷班於天下於是搜簡賢才以為牧守令長皆依新制而遣焉數年之間百姓便之冬十月大閲於白水十一年春三月令曰古之帝王所以外建諸侯內立百官者非欲富貴其身而尊榮之蓋以天下至廣非一人所能獨治是以博訪賢才助已為治若其知賢也則以禮命之其人聞命之日則慘然曰凡受人之事任人之勞何捨已而從人又自勉曰天生俊士所以利時彼人主者欲與我為治安可茍辭於是降心而受命及居官也則晝不甘食夜不甘寢思所以上匡人主下安百姓不遑恤其私而憂其家故妻子或有飢寒之弊而不顧也於是人主賜之以俸祿尊之以軒冕而不以為惠也賢臣受之亦不以為德也位不虛加祿不妄賜為人君者誠能以此道授官為人臣者誠能以此情受位則天下之大可不言而治矣昔堯舜之為君稷契之為臣用此道也及後世衰微此道遂廢乃以官職為私恩爵祿為榮惠人君之命官也親則授之愛則任之人臣之受位也可以尊身而潤屋者則迃道而求之損身而利物者則巧言而辭之於是至公之道沒而姦詐之萌生天下不治正為此矣今聖主中興思去澆偽諸在朝之士當念職事之艱難負闕之招纍夙夜兢兢如臨深履薄才堪者則審已而當之不堪者則收短而避之使天官不妄加王爵不妄受則淳素之風庶幾可反冬十月大閲於白水遂西狩岐陽十二年春涼州刺史宇文仲和據州反瓜州民張保害刺史成慶以州應仲和太祖遣開府獨孤信討之東魏遣其將侯景侵襄州太祖遣開府若干惠率輕騎擊之至穰景遁去夏五月獨孤信平涼州擒仲和遷其民六千餘家於長安瓜州都督令狐延起義誅張保瓜州平七月太祖大會諸軍於咸陽九月齊神武圍玊壁大都督韋孝寬力戰拒守齊神武攻圍六旬不能下其士卒死者什二三會齊神武有疾燒營而退十三年春正月茹茹寇髙平至於方城是月齊神武薨其子澄嗣是為文襄帝與其河南大行臺侯景有隙景不自安遣使請舉河南六州來附齊文襄遣其將韓軌厙狄千等圍景於潁川三月太祖遣開府李弼率軍援之軌等遁去景請留收輯河南遂徙鎮豫州於是遣開府王思政據潁川弼引軍還秋七月侯景密圖附梁太祖知其謀悉追還前後所配景將士景懼遂叛冬太祖奉魏帝西狩於岐陽十四年春魏帝詔封太祖長子育為寧都郡公食邑三千戶初太祖以平元皓納孝莊帝之功封寧都縣子至是改縣為郡而以封育用彰勤王之始也夏五月進授太祖太師太祖奉魏太子巡撫西境自新平出安定登隴刻石紀事下安陽至原州厯北長城大狩將東趣五原至蒲川聞魏帝不豫遂還既至帝疾已愈於是還華州是嵗東魏遣其將髙嶽慕容紹宗劉豐生等率衆十餘萬圍王思政於潁川十五年春太祖遣大將軍趙貴帥軍至穰兼督東南諸州兵以援思政髙嶽起堰引洧水以灌城自潁川以北皆為陂澤救兵不得至夏六月潁川陷初侯景自豫州附梁後遂度江圍建業梁司州刺史柳仲禮以本朝有難帥兵援之梁竟陵郡守孫皓舉郡來附太祖使大都督符貴往鎮之及景克建業仲禮還司州率衆來寇皓以郡叛太祖大怒冬十一月遣開府楊忠率兵與行臺僕射長孫儉討之攻克隨郡忠進圍仲禮長史馬岫於安陸是嵗盜殺齊文襄於鄴其弟洋討賊擒之仍嗣其事是為文宣帝十六年春正月栁仲禮率衆來援安陸楊忠逆擊於漴頭大破之擒仲禮悉虜其衆馬岫以城降三月魏帝封太祖第二子震為武邑公邑二千戶先是梁雍州刺史嶽陽王察與其叔父荆州刺史湘東王繹不睦乃稱蕃來附遣其世子嶚為質及楊忠擒仲禮繹懼復遣其子方平來朝夏五月齊文宣廢其主元善見而自立秋七月太祖率諸軍東伐拜章武公導為大將軍總督留守諸軍事屯涇北以鎮關中九月丁巳軍出長安時連雨自秋及冬諸軍馬驢多死遂於𢎞農北造橋濟河自蒲坂還於是河南自洛陽河北自平陽以東遂入於齊矣十七年春三月魏文帝崩皇太子嗣位太祖以冢宰總百揆梁邵陵王蕭綸侵安陸大將軍楊忠討擒之冬十月太祖遣大將軍王雄出子午伐上津魏興大將軍逹奚武出散關伐南鄭魏廢帝元年春王雄平上津魏興以其地置東梁州夏四月逹奚武圍南鄭月餘梁州刺史宜豐侯蕭循以州降武執循還長安秋八月東梁州民叛率衆圍州城太祖復遣王雄討之侯景之克建業也還奉梁武帝為主居數旬梁武以憤恚薨景又立其子綱尋而廢綱自立嵗餘綱弟繹討景擒之遣其舍人魏彥來告仍嗣位於江陵是為元帝二年春魏帝詔太祖去丞相大行臺為都督中外諸軍事二月東梁州平遷其豪帥於雍州三月太祖遣大將軍魏安公尉遲迥率衆伐梁武陵王蕭紀於蜀夏四月太祖勒鋭騎三萬西踰隴度金城河至姑臧吐谷渾震懼遣使獻其方物五月蕭紀潼州刺史楊乾運以州降引迥軍向成都秋七月太祖自姑臧至於長安八月克成都劍南平冬十一月尚書元烈謀作亂事發伏誅三年春正月始作九命之典以敘內外官爵以第一品為九命第九品為一命改流外品為九秩亦以九為上又改置州郡及縣改東雍為華州北雍為宜州南雍為蔡州華州為同州北華為鄜州東秦為隴州南秦為成州北秦為交州東荆為淮州南荆為昌州東夏為延州南夏為長州東梁為金州南梁為隆州北梁為靜州陽都為汾州南汾為勳州汾州為丹州南豳為寧州南岐為鳯州南洛為上州南廣為淯州南襄為湖州西涼為甘州西郢為鴻州西益為利州東巴為集州北應為輔州恆州為均州沙州為深州寧州為麓州義州為巖州新州為溫州江州為沔州西安為鹽州安州為始州并州為隨州肆州為塘州兾州為順州淮州為純州揚州為潁州司州為憲州南平為升州南郢為歸州青州為眉州凡改州四十六置州一改郡一百六改縣二百三十自元烈誅魏帝有怨言魏淮安王育廣平王贊等埀泣諫之帝不聽於是太祖與公卿定議廢帝尊立齊王廓是為恭帝魏恭帝元年夏四月帝大饗羣臣魏史柳虬執簡書於朝曰廢帝文皇帝之嗣子年七嵗文皇帝託於安定公曰是子才由於公不才亦由於公宜勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付屬之意此咎非安定公而誰太祖乃令太常盧辨作誥諭公卿曰嗚呼我羣后暨衆士維文皇帝以襁褓之嗣託於豫訓之誨之庶厥有成而豫罔能革變厥心庸暨乎廢墜我文皇帝之志嗚呼兹咎豫其焉避豫實知之矧爾衆人之心哉惟豫之顔豈惟今厚將恐來世以豫為口實乙亥詔封太祖子雍為輔城公憲為安城公邑各二千户茹茹乙旃逹官寇廣武五月遣柱國趙貴追擊之斬首數千級收其輜重而還秋七月太祖西狩至於原州梁元帝遣使請據舊圗以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護大將軍楊忠韋孝寬等步騎五萬討之十一月癸未師濟於漢中山公護與楊忠率鋭騎先屯其城下據江津以備其逸丙申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸沒為奴婢者十餘萬其免者二百餘家立蕭察為梁主居江陵為魏附庸梁將王僧辨陳霸先於丹陽立梁元帝第九子方智為主魏氏之初統國三十六大姓九十九後多絶滅至是以諸將功髙者為三十六國後次功者為九十九姓後所統軍人亦改從其姓二年梁廣州刺史王琳寇邊冬十一月遣大將軍豆盧寧帥師討之三年春正月丁丑初行周禮建六官以太祖為太師大冢宰柱國李弼為太傅大司徒趙貴為太保大宗伯獨孤信為大司馬于謹為大司寇侯莫陳崇為大司空初太祖以漢魏官繁思革前弊大統中乃命蘇綽盧辨依周制改創其事尋亦置六卿官然為撰次未成衆務猶歸臺閣至是始畢乃命行之夏四月太祖北巡狩秋七月度北河王琳遣使來附以琳為大將軍長沙郡公魏帝封太祖子直為秦郡公招為正平公邑各一千户九月太祖有疾還至雲陽命中山公護受遺輔嗣子冬十月乙亥崩於雲陽宮還長安發喪時年五十二甲申葬於成陵諡曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追尊為文皇帝太祖知人善任使從諫如流崇尚儒術明逹政事恩信被物能駕馭英豪一見之者咸思用命沙苑所獲囚俘釋而用之河橋之役率以擊戰皆得其死力諸將出征授以方略無不制勝性好朴素不尚虗飾恆以反風俗復古始為心史臣曰水厯將終羣凶放命或威權震主或釁逆滔天咸謂大寶可以力征神物可以求得莫不窺𨵦九鼎睥睨兩宮而誅夷繼及亡不旋踵是知巨君篡盜終成建武之資仲潁凶殘實啓當塗之業天命有底庸可滔乎太祖田無一成衆無一旅驅馳戎馬之際躡足行伍之間屬與能之時應啓聖之運鳩集義勇糾合同盟一舉而殄仇讐再駕而匡帝室於是內詢帷幄外仗材雄推至誠以待人𢎞大順以訓物髙氏籍甲兵之衆恃戎馬之強屢入近畿志圖吞噬及英謀電發神斾風馳𢎞農建城濮之勳沙苑有昆陽之捷取威定霸以弱為強紹元宗之衰緒創隆周之景命南清江漢西舉巴蜀北控沙漠東據伊瀍乃擯落魏晉憲章古昔修六官之廢典成一代之鴻規德刑並用勳賢兼敘遠安邇悅俗阜民和億兆之望有歸揖讓之期允集功業若此人臣以終盛矣哉非夫雄略冠時英姿不世天與神授緯武經文者孰能與於此乎昔者漢獻蒙塵曹公成夾輔之業晉安播蕩宋武建匡合之勳校德論功綽有餘裕至於渚宮制勝闔城孥戮茹茹歸命盡種誅夷雖事出於權道而用乖於德教周祚之不永或此之由乎周書卷二周書卷二考證文帝紀下魏大統元年通鑑有五月魏加丞相泰柱國九字東魏襲陷夏州通鑑有魏靈州刺史曹尼與其壻涼州刺史普樂劉豐復叛降東魏二十三字東魏潁州長史賀若統與密縣人張儉執刺史田迅迅通鑑作迄清河人崔彥穆檀琛攻滎陽擒其郡守蘇定定通鑑作淑於是太祖與公卿定議廢帝尊立齊王廓是為恭帝臣文淳按通鑑云去年號稱元年復姓拓跋氏周書卷二考證
