body:
  text: 周書卷三十六唐令狐德棻等撰列傳第二十八鄭偉族人頂楊纂假永王士良崔彥穆令狐整子熙弟休司馬裔子侃裴果劉志鄭偉字子直榮陽開封人也小名闍提魏將作大匠渾之十一世孫祖思明少勇悍仕魏至直閣將軍贈濟州刺史父先護亦以武勇聞起家員外散騎侍郎魏孝莊帝在藩先護早自結託及即位歷通直散騎常侍平南將軍廣州刺史賜爵平昌縣侯元皓入洛以禦扞之功纍遷都督二豫郢雍四州諸軍征東將軍豫州刺史兼尚書右僕射進爵郡公尋入為車騎將軍左衛將軍及爾朱榮死徐州刺史爾朱仲逺擁兵將入洛詔先護以本官假驃騎將軍大都督率所部與行臺蕩昱及都督賀拔勝同討之勝於陳降仲逺又聞京師不守衆遂潰先護奔梁尋自梁歸為仲逺所害魏孝武初贈使持節都督青齊兖豫四州刺史偉少倜儻有大志每以功名自許善騎射膽力過人爾朱氏滅後自梁歸魏起家通直散騎侍郎及孝武西遷偉亦歸鄉里不求仕進大統三年河內公獨孤信既復洛陽偉乃謂其親族曰今嗣主中興鼎業據有崤函河內公親董衆軍克復瀍洛率土之內孰不延首望風况吾等世荷朝恩家傳忠義誠宜以此時效臣子之節成富貴之資豈可碌碌為懦夫之事也於是與宗人榮業糾合州里建義於陳留信宿間衆有萬餘人遂攻拔梁州擒東魏刺史鹿永吉及鎮城令狐德並獲陳留郡守趙季和乃率衆來附因是梁陳之間相次降欵偉馳入朝太祖與語歎美之拜龍驤將軍北徐州刺史封武陽縣伯邑六百户從戰河橋及解玉壁圍偉常先鋒陷陳侯景歸欵太祖命偉率所部應接之及景後叛偉亦全軍而還録前後功除中軍將軍滎陽郡守加散騎常侍大都督進爵襄城郡公邑二千户加車騎大將軍開府儀同三司魏恭帝二年進位大將軍除江陵防主都督十五州諸軍事偉性粗獷不遵法度睚眦之間便行殺戮朝廷以其有立義之效每優容之及在江陵乃專戮副防主把賓王坐除名保定元年詔復官爵仍除宜州刺史天和六年轉華州刺史偉前後蒞職皆以威猛為治吏民莫敢犯禁盜賊亦為之休止雖無仁政然頗以此見稱其年卒於州時年五十七贈本官加少傅都督司豫洛相冀五州諸軍事司州刺史諡曰肅偉性吃少時嘗逐鹿於野失之遇牧豎而問焉牧豎答之其言亦吃偉怒謂其效已遂射殺之其忍暴如此子大士嗣偉族人頂字寧伯少有幹用起家員外散騎侍郎稍遷行臺左丞陽城陳留二郡守與偉同謀立義後隨偉入朝賜爵魏昌縣伯除太府少卿出為扶風郡守復為太府少卿轉衛尉少卿歷職內外竝有恪勤之稱尋卒官贈儀同三司豫州刺史子常字子元頗涉學有當官譽歷撫軍將軍通直𣪚騎常侍司皮下大夫遷信東徐南兖三州刺史以立義及纍戰功授上開府儀同大將軍賜爵饒陽侯卒贈本官加郢鄯陕三州諸軍事郢州刺史子神符楊纂廣寧人也父安仁魏北道都督朔州鎮將纂少習軍旅慷慨有志略尤工騎射勇力兼人年二十從齊神武起兵於信都以軍功稍遷安西將軍武州刺史自以功髙賞薄志懷怨憤每歎曰大丈夫富貴何必故鄉若以妻子撓懷豈不沮人雄志大統初乃間行歸欵太祖執纂手曰人所貴者忠義也所懼者危亡也其能不憚危亡蹈兹忠義者今方見之於卿耳即授征南將軍大都督封永興縣侯邑八百户加通直散騎常侍從太祖解洛陽圍經河橋邙山之戰纂每先登軍中咸推其敢勇纍遷使持節車騎大將軍儀同三司散騎常侍驃騎大將軍開府儀同三司加侍中進爵為公增邑通前一千户賜姓莫胡盧氏俄授岐州刺史孝閔帝踐阼進爵宋熙郡公保定元年進位大將軍改封隴東郡公除隴州刺史三年從隋公楊忠東伐至並州而還天和六年進授柱國大將軍轉華州刺史纂性質朴又不識文字前後蒞職但推誠信而已吏以其忠恕頗亦懷之尋卒於州時年六十七子睿嗣位至上柱國漁陽郡公假永字永賓其先遼西石城人晉幽州刺史匹磾之後也曾祖愄仕魏黃龍鎮將因徙髙陸之河陽焉永幼有志操閭里稱之魏正光末六鎮擾亂遂擕老幼避地中山後赴洛陽拜殿中將軍稍遷平東將軍封沃陽縣伯邑五百户青州人崔社客舉兵反永討平之進爵為侯除左光祿大夫時有賊魁元伯生率數百騎西自崤潼東至鞏洛屠陷塢壁所在為患魏孝武遣京畿大都督匹婁昭討之昭請以五千人行永進曰此賊既無城柵唯以寇抄為資安則蟻聚窮則鳥散取之在速不在衆也若星馳電發出其不虞精騎五百自足平殄若徴兵而後往彼必逺竄雖有大衆無所用之帝然其計於是命永代昭以五百騎討之永覘知所在倍道兼進遂破平之帝西遷永時不及從大統初乃結宗人潛謀歸欵密與都督趙業等襲斬西中郎將慕容顯和傳首京師以功别封昌平縣子邑三百户除北徐州刺史從擒竇泰復𢎞農破沙苑竝有戰功進爵為公河橋之役永力戰先登授南汾州刺史纍遷大都督車騎大將軍儀同三司散騎常侍驃騎大將軍開府儀同三司賜姓爾綿氏魏廢帝元年授恆州刺史于時朝貴多其部人謁永之日冠蓋盈路當時榮之孝閔帝踐阼進爵廣城郡公轉文州刺史入為工部中大夫遷軍司馬保定四年拜大將軍永歷任內外所在頗有聲稱輕財好士朝野以此重焉前後纍增凡三千九百户天和四年授小司寇尋為右二軍總管率兵北道講武遇疾卒於賀葛城年六十八喪還髙祖親臨贈使持節柱國大將軍同華等五州刺史諡曰基子岌嗣官至儀同三司兵部下大夫王士良字君明其先太原晉陽人也後因晉亂避地凉州魏太武平沮渠氏曾祖景仁歸魏為燉煌鎮將祖公禮平城鎮司馬因家於代父延蘭陵郡守士良少修謹不妄交遊魏建明初爾朱仲逺啓為府參軍事歷大行臺郎中諫議大夫封石門縣男邑二百户後與紇豆陵步藩交戰軍敗為步藩所擒遂居河右僞行臺紇豆陵伊利欽其才擢授右丞妻以孫女士良既為姻好便得盡言遂曉以禍福伊利等竝即歸附朝廷嘉之太昌初進爵晉陽縣子邑四百户尋進爵琅邪縣侯授太中大夫右將軍出為殷州車騎府司馬東魏徙鄴之後置京畿府專典兵馬時齊文襄為大都督以士良為司馬領外兵參軍尋遷長史加安西將軍徙封符壘縣侯增邑七百户武定初除行臺左中兵郎中又轉大將軍府屬從事中郎仍攝外兵事王思政鎮潁川齊文襄率衆攻之授士良大行臺右丞加鎮西將軍增邑一千户進爵為公令輔其弟演於并州居守齊文宣即位入為給事黃門侍郎領中書舍人仍總知并州兵馬事加征西將軍别封新豐縣子邑三百户俄除驃騎將軍尚書吏部郎中齊文宣自晉陽赴鄴宫復士良為尚書左丞統留後事仍遷御史中丞轉七兵尚書未幾入為侍中轉殿中尚書項之復為侍中除吏部尚書士良頓首固讓文宣不許久之還為侍中又攝度支五兵二曹尚書士良少孤事繼母梁氏以孝聞及卒居喪合禮文宣尋起令視事士良屢表陳誠再三不許方應命文宣見其毁瘠乃許之因此卧疾歷年文宣每自臨視疾愈除滄州刺史乾明初徴還鄴授儀同三司孝昭即位遣三道使搜揚人物士良與尚書令趙郡王髙睿太常卿崔昻分行郡國但有一介之善者無不以聞齊武成初除太子少傅少師復除侍中轉太常卿尋加開府儀同三司出為豫州道行臺豫州刺史保定四年晉公護東伐權景宣以山南兵圍豫州士良舉城降授大將軍小司徒賜爵廣昌郡公尋除荆州總管行荆州刺史復入為小司徒俄除鄜州刺史轉金州總管七州諸軍事金州刺史建德六年授并州刺史士良去鄉既久忽臨本州耆舊故人猶有存者逺近咸以為榮加授上大將軍以老疾乞骸骨優詔許之隋開皇元年卒時年八十二子德衡大象末儀同大將軍崔彥穆字彥穆清河東武城人也魏司空安陽侯林之九世孫曾祖顗魏平東府咨議祖蔚遭從兄司徒浩之難南奔江左仕宋為給事黃門侍郎汝南義陽二郡守延興初復歸於魏拜潁川郡守因家焉後終於郢州刺史父稚篤志經史不以世事嬰心起家祕書郎稍遷永昌郡守隋開皇初以獻后外曾祖追贈上開府儀同三司新州刺史彥穆幼明悟神彩卓然年十五與河間邢子才京兆韋孝寬俱入中書學偏相友愛伏膺儒業為時輩所稱魏吏部尚書隴西李神俊有知人之鍳見而歎曰王佐才也永安末除司徒府參軍事轉記室遷大司馬從事中郎魏孝武西遷彥穆時不得從大統三年乃與兄彥珍於成臯舉義因攻拔滎陽擒東魏郡守蘇淑仍與鄉郡王元洪威攻潁川斬其刺史李景道孝武嘉之拜鎮東將軍金紫光祿大夫滎陽郡守四年兼行右民郎中潁川邑中正賜爵千乘縣侯十四年加使持節車騎大將軍儀同三司散騎常侍司農卿時軍國草創衆務殷繁太祖乃詔彥穆入幕府兼掌文翰及于謹平江陵彥穆以本官從平之世宗初進驃騎大將軍開府儀同三司俄拜安州總管十一州諸軍事安州刺史入為御正中大夫陳氏請敦鄰好詔彥穆使焉彥穆風韻間曠器度方雅善𤣥言解談謔甚為江陵所稱轉民部中大夫進爵為公天和三年復為使主聘於齊使還除金州總管七州諸軍事金州刺史進位大將軍尋徴拜小司徒大象二年宣帝崩隋文帝輔政三方兵起以彥穆為行軍總管率兵與襄州總管王誼討司馬消難軍次荆州彥穆疑荆州總管獨孤永業有異志遂收而戮之及事平隋文帝徴王誼入朝即以彥穆為襄州總管六州諸軍事襄州刺史加授上大將軍進爵東郡公邑二千户頃之永業家自理得雪彥穆坐除名尋復官爵隋開皇元年卒子君綽嗣君綽性夷簡博覽經史有父風大象末丞相府賔曹參軍君綽弟君肅解巾為道王侍讀大象末潁川郡守令狐整字延保燉煌人也本名延世為西土冠冕曾祖嗣祖詔安竝官至郡守咸為良二千石父虬早以名德著聞仕歷瓜州司馬燉煌郡守郢州刺史封長城縣子大統末卒於家太祖傷悼之遣使者監護喪事又敕鄉人為營墳壟贈龍驤將軍瓜州刺史整幼聰敏沉深有識量學藝騎射竝為河右所推刺史魏東陽王元榮辟整為主簿加蕩寇將軍整進趨詳雅對揚辨暢謁見之際州府傾目榮器整德望嘗謂僚屬曰令狐延保西州令望方城重器豈州郡之職所可縶維但一日千里必基武步寡人當委以庶務書諾而巳頃之魏孝武西遷河右擾亂榮仗整防扞州境獲寧及鄧彥竊瓜州拒不受代整與開府張穆等密應使者申徽執彥送京師太祖嘉其忠節表為都督尋而城民張保又殺刺史成慶與凉州刺史宇文仲和搆逆規據河西晉昌人吕興等復害郡守郭肆以郡應保初保等將圖為亂慮整守義不從既殺成慶因欲及整以整人之望也復恐其下叛之遂不敢害雖外加禮敬內甚忌整整亦僞若親附而密欲圖之隂令所親說保曰君與仲和結為脣齒今東軍漸逼凉州彼勢孤危恐不能敵若或摧衄則禍及此土宜分遣鋭師星言救援二州合勢則東軍可圖然後保境息人計之上者保然之而未知所任整又令說保曰歷觀成敗在於任使所擇不善旋致傾危令狐延保兼資文武才堪統御若使為將蔑不濟矣保納其計具以整父兄等竝在城中弗之疑也遂令整行整至玉門郡召集豪傑說保罪逆馳還襲之先定晉昌斬吕興進軍擊保州人素服整威名竝棄保來附保遂奔吐谷渾衆議推整為刺史整曰本以張保肆逆毒害無辜闔州之人俱陷不義今者同心戮力務在除凶若其自相推薦復恐效尤致禍於是乃推波斯使主張道義行州事具以狀聞詔以申徽為刺史徴整赴闕授夀昌郡守封驤武縣男邑二百户太祖謂整曰卿少懷英略早建殊勳今者官位未足酬賞方當與卿共平天下同取富貴遂立為瓜州義首仍除持節撫軍將軍通直散騎常侍大都督整以國難未寧常願舉宗效力遂率鄉親二千餘人入朝隨軍征討整善於撫馭躬同豐約是以人衆竝忘羈旅盡其力用遷使持節車騎將軍儀同三司散騎常侍太祖常從容謂整曰卿逺祖立忠而去卿今立忠而來可謂積善餘慶世濟其美者也整逺祖漢建威將軍邁不為王莽屈其子稱避地河右故太祖稱之云尋除驃騎大將軍開府儀同三司加侍中太祖又謂整曰卿勳同婁項義等骨肉立身敦雅可以範人遂賜姓宇文氏并賜名整焉宗人二百餘户竝列屬籍孝閔帝踐祚拜司憲中大夫處法平允為當時所稱進爵彭陽縣公增邑一千户初梁興州刺史席固以州來附太祖以固為豐州刺史固蒞職既久猶習梁法凡所施為多虧治典朝議密欲代之而難其選遂令整權鎮豐州委以代固之略整廣布威恩傾身撫接數月之間化洽州府於是除整豐州刺史以固為湖州豐州舊治不居人民賦役參集勞逸不均整請移治武當詔可其奏奬勵撫導遷者如歸旬月之間城府周備固之遷也其部曲多願留為整左右整諭以朝制弗之許也流涕而去及整秩滿代至民吏戀之老幼送整逺近畢集數日停留方得出界其得人心如此拜御正中大夫出為中華郡守轉同州司㑹遷始州刺史整雅識情僞尤明政術恭謹廉慎常懼盈滿故歷居內外所在見稱天和六年進位大將軍增邑通前二千一百户晉公護之初執政也欲委整以腹心整辭不敢當頗忤其意護以此疏之及護誅附㑹者咸伏法而整獨保全時人稱其先覺建德二年卒時年六十一贈本官加鄜宜豳鹽四州諸軍事鄜州刺史諡曰襄子熙嗣熙字長熙性方雅有度量雖在私室容止儼然非一時賢俊未嘗與之遊處善騎射解音律涉羣書尤明三禮纍遷居職任竝有能名大象中位至吏部中大夫儀同大將軍整弟休幼聰敏有文武材起家太學生後與整同起兵逐張保授都督纍遷大都督樂安郡守入為中外府樂曹參軍時諸功臣多為本州刺史晉公護謂整曰以公勳望應得本州但朝廷藉公委任無容逺出然公門之內須有衣錦之榮乃以休為燉煌郡守在郡十餘年甚有政績進位儀同三司遷合州刺史尋卒官司馬裔字遵𦙍河內溫人也晉宣帝弟太常馗之後曾祖楚之屬宋武帝誅晉氏戚屬避難歸魏位至使持節侍中鎮西大將軍開府儀同三司朔州刺史封琅邪王裔少孤有志操州郡辟召竝不應命起家司徒府參軍事後以軍功授中堅將軍員外散騎常侍及魏孝武西遷裔時在鄴潛歸鄉里志在立功大統三年大軍復𢎞農乃於溫城起義遣使送欵與東魏將髙永洛王陵等晝夜交戰衆寡不敵義徒死傷過半及大軍東征裔率所部從戰河橋又别攻懷縣獲其將吳輔叔自此頻與東魏交戰每有克獲六年授河內郡守尋加持節平東將軍北徐州刺史八年率其義衆入朝太祖嘉之特蒙賞勞頃之河內有四千餘家歸附竝裔之鄉舊乃授前將軍太中大夫領河內郡守令安集流民十三年攻拔東魏平齊栁泉蓼塢三城獲其鎮將李熙之加授都督十五年太祖令山東立義諸將等能率衆入關者竝加重賞裔領户千室先至太祖欲以封裔裔固辭曰立義之士辭鄉里捐親戚逺歸皇化者皆是誠心內發豈裔能率之乎今以封裔便是賣義士以求榮非所願也太祖善而從之授帥都督拜其妻元為襄城郡公主十六年大軍東伐裔請為前鋒遂入建州破東魏將劉雅興拔其五城魏廢帝元年徴裔令以本兵鎮漢中除白馬城主帶華陽郡守加授撫軍將軍大都督通直散騎常侍二年轉鎮宋熙郡尋率所部兵從尉遲迥伐蜀與叱羅協破叛兵趙雄傑於槐林平鄧朏於梓潼以功賜爵龍門縣子行蒲州刺史尋行新城郡事魏恭帝元年授使持節車騎大將軍儀同三司散騎常侍本郡中正孝閔帝踐阼除巴州刺史進使持節驃騎大將軍開府儀同三司進爵琅邪縣伯邑五百户保定二年入為御伯中大夫增邑通前一千五百户四年轉御正中大夫進爵為公大軍東討裔率義兵與少師楊􅋆守軹關即授懷州刺史東道慰勞大使五年轉始州刺史天和初信州蠻酋冉令賢等反連結二千餘里裔隨上庸公陸勝討之裔自開州道入先遣使宣示禍福蠻酋冉三公等三十餘城皆來降附進次雙城蠻酋向寶勝等率其種落據險自固向天王之徒為其外援裔晝夜攻圍腹背受敵自春至秋五十餘戰寶勝糧仗俱竭力屈乃降時尚有籠東一城未下尋亦拔之又獲賊帥冉西梨向天王等出師再朞羣蠻率服拜信州刺史五年遷潼州刺史六年徴拜大將軍除西寧州刺史未及之部卒於京師裔性清約不事生業所得俸祿竝散之親戚身死之日家無餘財宅宇卑陋喪庭無所有詔為起祠堂焉贈大將軍加懷邵汾晉四州刺史諡曰定子侃嗣侃字道遷少敢勇未弱冠便從戎旅保定四年隨少師楊􅋆東征與齊人交戰􅋆為敵所擒侃力戰得免天和二年授右侍上士加都督進大都督從大軍攻晉州以功授使持節車騎將軍儀同三司又從平並鄴除樂安郡守後更論晉州及平齊勳加驃騎大將軍開府儀同三司遷兖州刺史未之部而卒贈本官加豫州刺史諡曰惠子運嗣裴果字戎昭河東聞喜人也祖思賢魏青州刺史父遵齊州刺史果少慷慨有志略魏太昌初起家前將軍乾河軍主除陽平郡丞太祖曾使並州與果相遇果知非常人密託附焉永安末盜賊蜂起果從軍征討乘黃驄馬衣青袍每先登陷陳時人號為黃驄年少永熙中授河北郡守及齊神武敗於沙苑果乃率其宗黨歸闕太祖嘉之賜田宅奴婢牛馬衣服什物等從戰河橋解玉壁圍竝摧鋒奮擊所向披靡大統九年又從戰邙山於太祖前挺身陷陳生擒東魏都督賀婁烏蘭勇冠當時人莫不歎服以此太祖愈親待之補帳內都督遷平東將軍後從開府楊忠平隨郡安陸以功加大都督除正平郡守正平果本郡也以威猛為政百姓畏之盜賊亦為之屛息遷使持節車騎大將軍儀同三司散騎常侍司農卿又從大將軍尉遲迥伐蜀果率所部為前軍開劍閣破李慶保降楊乾運皆有功魏廢帝三年授龍州刺史封冠軍縣侯邑五百户俄而州民張道李拓驅率百姓圍逼州城時糧仗皆闕兵士又寡果設方略以拒之賊便退走於是出兵追擊纍戰破之旬月之間州境清晏轉陵州刺史孝閔帝踐阼除隆州刺史加使持節驃騎大將軍開府儀同三司進爵為公增邑一千户武成末轉眉州刺史保定五年授復州刺史果性嚴猛能斷决每抑挫豪右申理屈滯歷牧數州號為稱職天和二年卒於位贈本官加絳晉建三州刺史諡曰質子孝仁嗣孝仁幼聰敏涉獵經史有譽於時起家舍人上士纍遷大都督儀同三司出為長寧鎮將扞禦齊人甚有威邊之略建德末遷建州刺史轉譙州刺史大象末又遷亳州刺史鄭偉等之以梁州歸欵時劉志亦以廣州來附志𢎞農華隂人本名思漢太尉寬之十世孫也髙祖隆宋武帝平姚泓以宗室首望召拜馮翊郡守後屬赫連氏入寇避地河洛因家於汝潁祖善魏大安中舉秀才拜中書博士後至𢎞農郡守北雍州刺史父瓌汝南郡守贈徐州刺史志少好學博涉羣書植性方重兼有武略魏正光中以明經徴拜國子助教除行臺郎中永安初加宣威將軍給事中二年轉東中郎府司馬征虜將軍永熙二年除安北將軍銀青光祿大夫廣州别駕三年齊神武舉兵入洛魏孝武西遷志據城不從東魏潛遣間使奉表長安魏孝武嘉之授缺二字長史襄城郡守後齊神武遣兵攻圍志力屈城陷潛遁得免大統三年太祖遣領軍將軍獨孤信復洛陽志糾合義徒舉廣州歸國拜大丞相府墨曹參軍封華隂縣男邑二百户加大都督撫軍將軍轉中外府屬遷國子祭酒世宗出牧宜州太祖以志為幕府司録世宗雅愛儒學特欽重之事無大小咸委於志志亦忠恕謹慎甚得匡贊之體太祖嘉之嘗謂之曰卿之所為每㑹吾志於是遂賜名志焉仍於宜州賜田宅令徙居之世宗遷蒞岐州又令志以本官翊從及世宗即位除右金紫光祿大夫車騎大將軍儀同三司進爵武鄉縣公增邑通前一千户仍賜姓宇文氏髙祖時為魯公詔又以志為其府司馬髙祖嗣位進授驃騎大將軍開府儀同三司拜刑部中大夫志執法平允甚得時譽蓮芍界內數有羣盜攻劫行旅郡縣不能制乃以志為延夀郡守以督之志示以恩信羣盜相率請罪志表陳其狀詔竝免之自是郡界肅清寇盜屏息遷使持節成州諸軍事成州刺史政存寬恕民吏愛之天和五年卒贈大將軍揚州刺史諡曰文子子明嗣子明𢎞雅有父風歷官右侍上士大都督絳州别駕隋文帝踐極除行臺郎中順陽郡守子明弟子陵司右中士帥都督凉州别駕隋開皇初拜姑臧郡守尋加儀同三司歷衛州蔚州長史幽州總管府長史史臣曰昔陽貨外叛庶其竊邑而春秋譏之韓信背項陳平歸漢而史遷美之蓋以運屬既安君道已著則狥利忘德者罪也時逢擾攘臣禮未備則轉禍為福者可也鄭偉崔彥穆等之在山東竝以不羈之才邅回於燕雀終能翻然豹變自致龜組其知機之士歟王士良之仕于齊班職上卿出為牧伯而臨危茍免失忠與義其背叛之徒歟令狐整器幹確然雅望重於河右處州里則勳著方隅升朝廷則績宣中外而畏避權寵克保終吉不如是亦何以立韙名取髙位乎周書卷三十六周書卷三十六考證王士良傳復士良為尚書左丞北史復以士良為尚書左丞此脫以字裴果傳俄而州民張道北史作張遁臣文淳按本書宇文貴傳作張遁北史又作張道未知孰是周書卷三十六考證
