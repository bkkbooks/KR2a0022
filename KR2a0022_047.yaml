body:
  text: 周書卷四十七唐令狐德棻等撰列傳第三十九藝術異俊蔣升姚僧垣子最黎景熙趙文深褚該强練衛元嵩太祖受命之始屬天下分崩于時戎馬交馳而學術之士蓋寡故曲藝末技咸見引納至若兾俊蔣升趙文深之徒雖才愧昔人而名著當世及剋定鄢郢俊異畢集樂茂雅蕭吉以隂陽顯庾季才以天官稱史元華相術擅竒許奭姚僧垣方藥特妙斯皆一時之美也茂雅元華許奭史失其傳季才蕭吉官成於隋自餘紀於此篇以備遺闕云爾兾俊字僧俊太原陽邑人也性沉謹善隸書特工模寫魏太昌初為賀拔嶽墨曹參軍及嶽被害太祖引為記室時侯莫陳悅阻兵隴右太祖志在平之乃令俊僞為魏帝敕書與費也頭令將兵助太祖討悅俊依舊敕模寫及代舍人主書等署與真無異太祖大悅費也頭已曾得魏帝敕書及見此敕不以為疑遂遣步騎一千受太祖節度大統𥘉除丞相府城局參軍封長安縣男邑二百户從復𢎞農戰沙苑進爵為子出為華州中正十三年遷襄樂郡守尋徵教世宗及宋獻公等隸書時俗入書學者亦行束修之禮謂之謝章俊以書字所興起自蒼頡若同常俗未為合禮遂啓太祖釋奠蒼頡及先聖先師除黃門侍郎本州大中正纍遷撫軍將軍右金紫光祿大夫都督通直散騎常侍車騎大將軍儀同三司世宗二年以本官為大使巡歷州郡察風俗理冤滯還拜小御正尋出為湖州刺史性退靜每以清約自處前後所歷頗有聲稱尋加驃騎大將軍開府儀同三司改封昌樂縣伯又進爵為侯增邑并前一千六百户後以疾卒蔣升字鳯起楚國平河人也父俊魏南平王府從事中郎趙興郡守升性恬靜少好天文𤣥象之學太祖雅信待之常侍左右以備顧問大統二年東魏將竇泰入冦濟自風陵頓軍潼關太祖出師馬牧澤時西南有黃紫氣抱日從未至酉太祖謂升曰此何祥也升曰西南未地主土土王四季秦之分也今大軍既出喜氣下臨必有大慶於是進軍與竇泰戰擒之自後遂降河東剋𢎞農破沙苑由此愈被親禮九年高仲密以北豫州來附太祖欲遣兵援之又以問升升對曰春王在東熒惑又在井鬼之分行軍非便太祖不從軍遂東行至邙山不利而還太師賀拔勝怒白太祖曰蔣升罪合萬死太祖曰蔣升固諫云出師不利此敗也孤自取之非升過也魏恭帝元年以前後功授車騎大將軍儀同三司封高城縣子邑五百户保定二年增邑三百户除河東郡守尋入為太史中大夫以老請致仕詔許之加定州刺史卒於家姚僧垣字法衛吳興武康人吳太常信之八世孫也曾祖郢宋員外散騎常侍五城侯父菩提梁高平令嘗嬰疾歷年乃留心醫藥梁武帝性又好之每召菩提討論方術言多會意由是頗禮之僧垣幼通洽居喪盡禮年二十四即傳家業梁武帝召入禁中面加討試僧垣酬對無滯梁武帝甚竒之大通六年解褐臨川嗣王國左常侍大同五年除驃騎廬陵王府田曹參軍九年還領殿中醫師時武陵王所生葛修華宿患積時方術莫效梁武帝乃令僧垣視之還具說其狀并記增損時候梁武帝歎曰卿用意綿密乃至於此以此候疾何疾可逃朕常以前代名人多好此術是以每恆留情願識治體今聞卿說益開人意十一年轉領大醫正加文德主帥直閣將軍梁武帝嘗因發熱欲服大黃僧垣曰大黃乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁簡文帝在東宫甚禮之四時伏臘每有賞賜太清元年轉鎮西湘東王府中記室參軍僧垣少好文史不留意於章句時商略今古則為學者所稱及侯景圍建業僧垣乃棄妻子赴難梁武帝嘉之授戎昭將軍湘東王府記室參軍及宫城陷百官逃散僧垣假道歸至吳興謁郡守張嶸嶸見僧垣流涕曰吾過荷朝恩今報之以死君是此邦大族又朝廷舊臣今日得君吾事辦矣俄而景兵大至攻戰纍日郡城遂陷僧垣竄避久之乃被拘執景將侯子鑒素聞其名深相器遇因此獲免及梁簡文嗣位僧垣還建業以本官兼中書舍人子鑒尋鎮廣陵僧垣又隨至江北梁元帝平侯景召僧垣赴荆州改授晉安王府咨議其時雖剋平大亂而任用非才朝政混淆無復綱紀僧垣每深憂之謂故人曰吾觀此形勢禍敗不久今時上策莫若近關聞者皆掩口竊笑梁元帝嘗有心腹疾乃召諸醫議治療之方咸謂至尊至貴不可輕脫宜用平藥可漸宣通僧垣曰脉洪而實此有宿食非用大黃必無差理梁元帝從之進湯訖果下宿食因而疾愈梁元帝大喜時初鑄錢一當十乃賜錢十萬實百萬也及大軍剋荆州僧垣猶侍梁元帝不離左右為軍人所止方泣涕而去尋而中山公護使人求僧垣僧垣至其營復為燕公于謹所召大相禮接太祖又遣使馳驛徵僧垣謹固留不遣謂使人曰吾年時衰暮疹疾嬰沉今得此人望與之偕老太祖以謹勳德隆重乃止焉明年隨謹至長安武成元年授小畿伯下大夫金州刺史伊婁穆以疾還京請僧垣省疾乃云自腰至臍似有三縛兩腳緩縱不復自持僧垣為診脉處湯三劑穆初服一劑上縛即解次服一劑中縛復解又服一劑三縛悉除而兩腳疼痺猶自攣弱更為合散一劑稍得屈申僧垣曰終待霜降此患當愈及至九月遂能起行大將軍襄樂公賀蘭隆先有氣疾加以水腫喘息奔急坐卧不安或有勸其服决命大散者其家疑未能決乃問僧垣僧垣曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時抑屈今日始來竟不可治意實未盡僧垣知其可差即為處方勸使急服便即氣通更服一劑諸患悉愈天和元年加授車騎大將軍儀同三司大將軍樂平公竇集暴感風疾精神瞀亂無所覺知諸醫先視者皆云已不可救僧垣後至曰困則困矣終當不死若專以見付相為治之其家欣然請受方術僧垣為合湯散所患即瘳大將軍永世公叱伏列椿苦利積時而不廢朝謁燕公謹嘗問僧垣曰樂平永世俱有痼疾若如僕意永世差輕對曰夫患有深淺時有剋殺樂平雖困終當保全永世雖輕必不免死謹曰君言必死當在何時對曰不出四月果如其言謹歎異之六年遷遂伯中大夫建德三年文宣太后寢疾醫巫雜說各有異同高祖御內殿引僧垣同坐曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隱公謂何如對曰臣無聽聲視色之妙特以經事已多准之常人竊以憂懼帝泣曰公既決之矣知復何言尋而太后崩其後復因召見帝問僧垣曰姚公為儀同幾年對曰臣忝荷朝恩於兹九載帝曰勤勞有日朝命宜隆乃授驃騎大將軍開府儀同三司又敕曰公年過縣車可停朝謁若非别敕不勞入見四年高祖親戎東討至河陰遇疾口不能言臉垂覆目不復瞻視一足短縮又不得行僧垣以為諸藏俱病不可並治軍中之要莫先於語乃處方進藥帝遂得言次又治目目疾便愈末乃治足足疾亦瘳比至華州帝已痊復即除華州刺史仍詔隨入京不令在鎮宣政元年表請致仕優詔許之是嵗高祖行幸雲陽遂寢疾乃詔僧垣赴行在所內史栁升私問曰至尊貶膳日久脉候何如對曰天子上應天心或當非愚所及若凡庶如此萬無一全尋而帝崩宣帝初在東宫常苦心痛乃令僧垣治之其疾即愈帝甚悅及即位恩禮彌隆常從容謂僧垣曰常聞先帝呼公為姚公有之乎對曰臣曲荷殊私實如聖㫖帝曰此是尚齒之辭非為貴爵之號朕當為公建國開家為子孫永業乃封長壽縣公邑一千户册命之日又賜以金帶及衣服等大象二年除太醫下大夫帝尋有疾至于大漸僧垣宿直侍帝謂隋公曰今日性命唯委此人僧垣知帝診候危殆必不全濟乃對曰臣荷恩既重思在效力但恐庸短不逮敢不盡心帝頷之及靜帝嗣位遷上開府儀同大將軍隋開皇初進爵北絳郡公三年卒時年八十五遺誡衣白帢入棺朝服勿斂靈上唯置香奩每日設清水而已贈本官加荆湖三州刺史僧垣醫術高妙為當世所推前後效驗不可勝記聲譽既盛逺聞邊服至於諸蕃外域咸請託之僧垣乃搜採竒異參校徵效者為集驗方十二卷又撰行記三卷行於世長子察在江南次子最字士㑹幼而聰敏及長博通經史尤好著述年十九隨僧垣入關世宗盛聚學徒校書於麟趾殿最亦預為學士俄授齊王憲府水曹參軍掌記室事特為憲所禮接賞賜隆厚宣帝嗣位憲以嫌疑被誅隋文帝作相追復官爵最以陪遊積歲恩顧過隆乃録憲功績為傳送上史局最幼在江左迄于入關未習醫術天和中齊王憲奏高祖遣最習之憲又謂最曰爾博學高才何如王褒庾信王庾名重兩國吾視之蔑如接待資給非爾家比也爾宜深識此意勿不存心且天子有敕彌須勉勵最於是始受家業十許年中略盡其妙每有人造請效驗甚多隋文帝踐極除太子門大夫以父憂去官哀毁骨立既免喪襲爵北絳郡公復為太子門大夫俄轉蜀王秀友秀鎮益州遷秀府司馬及平陳察至最自以非嫡讓封於察隋文帝許之秀後隂有異謀隋文帝令公卿窮治其事開府慶整郝偉等並推過於秀最獨曰凡有不法皆最所為王實不知也搒訊數百卒無異辭最竟坐誅時年六十七論者義之撰梁後略十卷行於世黎景熙字季明河間鄚人也少以字行於世曾祖嶷魏太武時從破平凉有功賜爵容城縣男加鷹揚將軍後為燕郡守祖鎮襲爵為員外散騎侍郎父瓊太和中襲爵歷員外郎魏縣令後至鄜城郡守季明少好讀書性强記默識而無應對之能其從祖廣太武時為尚書郎善古學嘗從吏部尚書清河崔𤣥伯受字義又從司徒崔浩學楷篆自是家傳其法季明亦傳習之頗與許氏有異又好占𤣥象頗知術數而落魄不事生業有書千餘卷雖窮居獨處不以飢寒易操與范陽盧道源為莫逆之友永安中道源勸令入仕始為威烈將軍魏孝武初遷鎮逺將軍尋除步兵校尉及孝武西遷季明乃寓居伊洛侯景徇地河外召季明從軍尋授銀青光祿大夫加中軍將軍拜行臺郎中除黎陽郡守季明從至懸瓠察景終不足恃遂去之客於潁川以世路未清欲優遊卒歲時王思政鎮潁川纍使召季明不得已出與相見留於內館月餘太祖又徵之遂入關乃令季明正定古今文字於東閣大統末除安西將軍尋拜著作佐郎於時倫輩皆位兼常伯車服華盛唯季明獨以貧素居之而無愧色又勤於所職著述不怠然性尤專固不合於時是以一為史官遂十年不調魏恭帝元年進號平南將軍右銀青光祿大夫六官建為外史上士孝閔帝踐阼加征南將軍右金紫光祿大夫時大司馬賀蘭祥討吐谷渾詔季明從軍還除驃騎將軍右光祿大夫武成末遷外史下大夫保定三年盛營宫室春夏大旱詔公卿百寮極言得失季明上書曰臣聞成湯遭旱以六事自陳宣王太甚而圭璧斯竭豈非逺慮元元俯哀兆庶方今農要之月時雨猶愆率土之心有懷渴仰陛下垂情萬類子愛羣生覲禮百神猶未豐洽者豈或作事不節有違時令舉措失中儻邀斯旱春秋君舉必書動為典禮水旱隂陽莫不應行而至孔子曰言行君子之所以動天地可不愼乎春秋莊公三十一年冬不雨五行傳以為是歲一年而三築臺奢侈不恤民也僖公二十一年夏大旱五行傳以為時作南門勞民興役漢惠帝二年夏大旱五年夏大旱江河水少溪澗水絶五行傳以為先是發民十四萬六千人城長安漢武帝元狩三年夏大旱五行傳以為是歲發天下故吏穿昆明池然則土木之功動民興役天輒應之以異典籍作誡儻或可思上天譴告改之則善今若息民省役以答天譴庶靈澤時降嘉穀有成則年登可覬子來非晚詩云民亦勞止迄可小康惠此中國以綏四方或恐極陽生隂秋多雨水年復不登民將無覬如又薦飢為慮更甚時豪富之家競為奢麗季明又上書曰臣聞寬大所以兼覆慈愛可以懷衆故天地稱其高厚者萬物得其容飬焉四時著其寒暑者庶類資其忠信焉是以帝王者寬大象天地忠信則四時招搖東指天下識其春人君布德率土懷其惠伏惟陛下資乾御㝢品物咸亨時乘六龍自强不息好問受規天下幸甚自古至治之君亦皆廣延博訪詢採芻蕘置鼓樹木以求其過頃年亢旱踰時人懷望歲陛下爰發明詔廣求人瘼同禹湯之罪已高宋景之守正澍雨應時年穀斯稔剋已節用慕質惡華此則尚矣然而朱紫仍耀於衢路綺縠猶侈於豪家裋褐未充於細民糟糠未厭於編户此則勸導之理有所未周故也今雖導之以政齊之以刑風俗固難以一矣昔文帝集上書之囊以作帷帳惜十家之産不造露臺後宫所幸衣不曵地方之今日富室之飾曾不如婢隸之服然而以身率下國富刑清廟稱太宗良有以也臣聞聖人久於其道而天下化成今承魏氏喪亂之後貞信未興宜先遵五美屏四惡革浮華之俗抑流競之風察鴻都之小藝焚雉頭之異服無益之貨勿重於時虧德之器勿陳於側則民知德矣臣又聞之為治之要在於選舉若差之毫釐則有千里之失後來居上則致積薪之譏是以古之善為治者貫魚以次任必以能爵人於朝不以私愛簡材以授其官量能以任其用官得其材用當其器六轡既調坐致千里虞舜選衆不仁者逺則庶事康哉民知其化矣帝覽而嘉之時外史廨宇屢移未有定所季明又上言曰外史之職漢之東觀儀等石渠司同天祿是乃廣內祕府藏言之奧帝王所寶此焉攸在自魏及周公館不立臣雖愚瞽猶知其非是以去年十一月中敢冒陳奏將降中㫖即遣修營荏苒一周未加功力臣職思其憂敢不重請帝納焉於是廨宇方立天和三年進車騎大將軍儀同三司後以疾卒趙文深字德本南陽宛人也父遐以醫術進仕魏為尚藥典御文深少學楷隸年十一獻書於魏帝立義歸朝除大丞相府法曹參軍文深雅有鍾王之則筆勢可觀當時碑榜唯文深及兾俊而已大統十年追論立義功封白石縣男邑二百户太祖以隸書紕繆命文深與黎季明沈遐等依說文及字林刋定六體成一萬餘言行於世及平江陵之後王褒入關貴遊等翕然並學褒書文深之書遂被遐棄文深慙恨形於言色後知好尚難反亦攻習褒書然竟無所成轉被譏議謂之學步邯鄲焉至於碑榜餘人猶莫之逮王褒亦每推先之宫殿樓閣皆其迹也遷縣伯下大夫加儀同三司世宗令至江陵書景福寺碑漢南人士亦以為工梁主蕭察觀而美之賞遺甚厚天和元年露寢等初成文深以題榜之功增邑二百户除趙興郡守文深雖外任每須題榜輒復追之後以疾卒褚該字孝通河南陽翟人也晉末遷居江左祖長樂齊竟陵王録事參軍父義昌梁鄱陽王中記室該幼而謹厚有譽鄉曲尤善醫術見稱於時仕梁歷武陵王府參軍隨府西上後與蕭撝同歸國授平東將軍左銀青光祿大夫轉驃騎將軍右光祿大夫武成元年除醫正上士自許奭死後該稍為時人所重賔客迎候亞於姚僧垣天和初遷縣伯下大夫五年進授車騎大將軍儀同三司該性淹和不自矜尚但有請之者皆為盡其藝術時論稱其長者焉後以疾卒子士則亦傳其家業時有强練不知何許人亦不知其名字魏時有李順興者語默不恆好言未然之事當時號為李練世人以强類練故亦呼為練焉容貌長壯有異於人神精敞恍莫之能測意欲有所論說逄人輒言若值其不欲言縱苦加祈請亦不相酬答𥘉聞其言略不可解事過之後往往有驗恆寄住諸佛寺好遊行民家兼歷造王公邸第所至之處人皆敬而信之晉公護未誅之前曾手持一大瓠到護第門外抵而破之乃大言曰瓠破子苦時柱國平高公侯伏侯龍恩早依隨護深被任委强練至龍恩宅呼其妻元氏及其妾媵並婢僕等並令連席而坐諸人以逼夫人苦辭不肻强練曰汝等一例人耳何有貴賤遂逼就坐未幾而護誅諸子並死龍恩亦伏法仍籍沒其家建德中每夜上街衢邊樹大哭釋迦牟尼佛或至申旦如此者纍日聲甚哀憐俄而廢佛道二教大象末又以一無底囊歷長安市肆告乞市人爭以米麥遺之强練張囊投之隨即漏之於地人或問之曰汝何為也强練曰此亦無餘但欲使諸人見盛空耳至隋開皇初果移都於龍首山長安城遂空廢後亦莫知其所終又有蜀郡衛元嵩者亦好言將來之事蓋江左寶志之流天和中著詩預論周隋廢興及皇家受命並有徵驗性尤不信釋教嘗上疏極論之史失其事故不為傳史臣曰仁義之於教大矣術藝之於用博矣狥於是者不能無非厚於利者必有其害詩書禮樂所失也淺故先王重其德方術技巧所失也深故往哲輕其藝夫能通方術而不詭於俗習技巧而必蹈於禮者豈非大雅君子乎姚僧垣診候精審名冠於一代其所全濟固亦多焉而𢎞兹義方皆為令器故能享眉壽縻好爵老𣆀云天道無親常與善人於是信矣周書卷四十七
