body:
  text: 周書卷三十九唐令狐德棻等撰列傳第三十一韋瑱梁昕弟榮皇甫璠辛慶之族子昂族人仲景王子直杜杲韋瑱字世珍京兆杜陵人也世為三輔著姓曾祖惠度姚泓尚書郎隨劉義真過江仕宋為鎮西府司馬順陽太守行南雍州事後於襄陽歸魏拜中書侍郎贈安西將軍洛州刺史祖千雄略陽郡守父英代郡守贈兖州刺史瑱幼聰敏有夙成之量閭里咸敬異之篤志好學兼善騎射魏孝昌三年起家太尉府法曹參軍稍遷直後除明威將軍雍州治中假鎮逺將軍防城州將纍遷諫議大夫冠軍將軍太祖為丞相加前將軍太中大夫封長安縣男食邑三百户轉行臺左丞加撫軍將軍銀青光祿大夫遷使持節都督南郢州諸軍事南郢州刺史復入為行臺左丞瑱明察有幹局再居左轄時論榮之從復𢎞農戰沙苑加衛大將軍左光祿大夫又從戰河橋進爵為子增邑二百户大統八年齊神武侵汾絳瑱從太祖禦之軍還令瑱以本官鎮蒲津關帶中灘城主尋除蒲州總管府長史頃之徵拜鴻臚卿以望族兼領鄉兵加帥都督遷大都督通直散騎常侍行京兆郡事進車騎大將軍儀同三司散騎常侍魏恭帝二年賜姓宇文氏三年除瓜州諸軍事瓜州刺史州通西域蕃夷往來前後刺史多受賂遺胡寇犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢為寇公私安靜夷夏懷之孝閔帝踐阼進爵平齊縣伯增邑五百户秩滿還京吏民戀慕老幼追送留連十數日方得出境世宗嘉之進授侍中驃騎大將軍開府儀同三司武成三年卒時年六十一贈岐宜二州刺史諡曰惠天和二年又追封為公增邑通前三千户仍詔其子峻襲峻後位至車騎大將軍儀同三司峻弟師起家中外府記室歷兵部小府下大夫建德末蒲州總管府中郎行河東郡事梁昕字元明安定烏氏人也世為關中著姓其先因官徙居京兆之盩厔焉祖重耳漳縣令父勸儒州主簿冠軍將軍中散大夫贈涇州刺史昕少溫恭見稱州里正光五年秦隴搆亂蕭寶夤為大都督統兵出討以昕為行臺參軍孝昌初拜蕩寇將軍稍遷驤威將軍給事中仍從寶夤征万俟醜奴相持二年前後數十戰以功封征西將軍爾朱天光入關復引為外兵參軍從天光征討拜右將軍太中大夫太祖迎魏孝武軍次雍州昕以三輔望族上謁太祖見昕容貌瓌偉深賞異之即授右府長流參軍大統初加鎮南將軍金紫光祿大夫轉丞相府户曹參軍從復𢎞農戰沙苑皆有功除車騎將軍丞相府主簿出為洛安郡守徵拜大將軍行臺兵部郎中加帥都督十二年除河南郡守鎮大塢尋又移鎮閻韓式遏邊壘甚著誠信遷東荆州刺史昕撫以仁惠蠻夷悅之流民歸附者相繼而至封安定縣子邑三百户纍遷大都督車騎大將軍散騎常侍儀同三司孝閔帝踐阼進位驃騎大將軍開府儀同三司世宗初進爵胡城縣伯邑五百户三年除九曲城主保定元年遷中州刺史增邑八百户轉邵州刺史二年以母喪去職尋起復本任天和初徵拜工部中大夫出為陜西總管府長史昕性溫裕有幹能歷官內外咸著聲稱尋卒於位贈大將軍諡曰貞昕弟榮歷位匠師下大夫中外府中郎蕃部郡伯司倉計部下大夫開府儀同三司朝那縣伯贈涇寧豳三州刺史諡曰靜皇甫璠字景瑜安定三水人也世為西州著姓後徙居京兆焉父和本州治中大統末追贈散騎常侍儀同三司涇州刺史璠少忠謹有幹略永安中辟州都督太祖為牧補主簿以勤事被知每蒙褒賞大統四年引為丞相府行參軍尋轉田曹參軍東閣祭酒加散騎侍郎稍遷兼太常少卿都水使者歷蕃部兵部虞部民部吏部等諸曹郎中六官建拜計部下大夫孝閔帝踐阼轉守廟下大夫以選為東道大使撫巡州防尋加車騎大將軍儀同三司封長樂縣子邑五百户出為玉壁總管府長史保定中遷鴻州刺史入為小納言俄除隴右總管府司馬轉陜州總管府長史徵拜蕃部中大夫進驃騎大將軍開府儀同三司復出為隴右總管府長史璠性平和小心奉法安分守志恆以清白自處當時號為善人建德元年除民部中大夫三年授隨州刺史政存簡惠百姓安之其年增邑並前二千户六年卒於位贈交渭二州刺史諡曰恭子諒少知名大象中位至吏部下大夫辛慶之字慶之隴西狄道人也世為隴右著姓父顯崇馮翊郡守贈雍州刺史慶之少以文學徵詣洛陽對䇿第一除祕書郎屬爾朱氏作亂魏孝莊帝令司空楊津為北道行臺節度山東諸軍以討之津啓慶之為行臺左丞典參謀議至鄴聞孝莊帝暴崩遂出兖冀間謀結義徒以赴國難尋而節閔帝立乃還洛陽普泰二年遷平北將軍太中大夫及賀拔嶽為行臺復啓慶之為行臺吏部郎中開府掾尋除雍州别駕大統初加車騎將軍俄遷衛大將軍左光祿大夫後太祖東討為行臺左丞時初復河東以本官兼鹽池都將四年東魏攻正平郡陷之遂欲經略鹽池慶之守禦有備乃引軍退河橋之役大軍不利河北守令棄城走慶之獨因鹽池抗拒強敵時論稱其仁勇六年行河東郡事九年入為丞相府右長史兼給事黃門侍郎除度支尚書復行河東郡事遷通直散騎常侍南荆州刺史加儀同三司慶之位遇雖隆而率性儉素車馬衣服亦不尚華侈志量淹和有儒者風度特為當時所重又以其經明行修令與盧誕等教授諸王魏廢帝二年拜祕書監尋卒於位子加陵主寢上士慶之族子昂昂字進君年數歲便有成人志行有善相人者謂其父仲略曰公家雖世載冠冕然名德富貴莫有及此兒者仲略亦重昂志氣深以為然年十八侯景辟為行臺郎中加鎮逺將軍景後來附昂遂入朝除丞相府行參軍大統十四年追論歸朝之勳封襄城縣男邑二百户轉丞相府田曹參軍及尉遲迥伐蜀昂召募從軍蜀平以功授輔國將軍魏都督迥仍表昂為龍州長史領龍安郡事州帶山谷舊俗生梗昂威惠洽著吏民畏而愛之成都一方之會風俗舛雜迥以昂逹於從政復表昂行成都令昂到縣即與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名各宜自勉克成令譽昂言切理至諸生等並深感悟歸而告其父老曰辛君教誡如此不可違之於是井邑肅然咸從其化遷梓潼郡守進位帥都督加通直散騎常侍六官建入為司隸上士襲爵繁昌縣公世宗初授天官府上士加大都督武成二年授小職方下大夫治小兵部保定二年進車騎大將軍儀同三司轉小吏部四年大軍東討昂與大將軍權景宣下豫州以功賞布帛二百匹時益州殷阜軍國所資經塗艱險每苦劫盜詔昂使於梁益軍民之務皆委決焉昂撫導荒梗安置城鎮數年之中頗得寧靜天和初陸騰討信州羣蠻歷時未克高祖詔昂便於通渠等諸州運糧饋之時臨信楚合等諸州民庶亦多從逆昂諭以禍福赴者如歸乃令老弱負糧壯夫拒戰咸願為用莫有怨者使還屬巴州萬榮郡民反叛攻圍郡城遏絶山路昂謂其同侶曰凶奴狂悖一至於此若待上聞或淹旬月孤城無援必淪寇黨欲救近溺寧暇逺求越人茍利百姓專之可也於是遂募開通二州得三千人倍道兼行出其不意又令其衆皆作中國歌直趣賊壘賊既不以為虞謂有大軍赴救於是望風瓦解郡境獲寧朝廷嘉其權以濟事詔梁州總管杞國公亮即於軍中賞昂奴婢二十口繒綵四百匹亮又以昂威信布於宕渠遂表為渠州刺史俄轉通州刺史昂推誠布信甚得夷獠歡心秩滿還京首領皆隨昂詣闕朝覲以昂化洽夷華進位驃騎大將軍開府儀同三司時晉公護執政昂稍被護親待高祖以是頗銜之及護誅加之捶楚因此遂卒昂族人仲景好學有雅量其高祖欽後趙吏部尚書雍州刺史子孫因家焉父歡魏隴州刺史宋陽公仲景年十八舉文學對䇿高第拜司空府主簿遷員外散騎侍郎建德中位至內史下大夫開府儀同三司卒於官子衡王子直字孝正京兆杜陵人也世為郡右族父琳州主簿東雍州長史子直性節儉有幹能魏正光中州辟主簿起家奉朝請除太尉府水曹行參軍加明威將軍時梁人圍壽春臨淮王元彧率軍赴援子直以本官參彧軍事與梁人戰斬其軍主夏侯景超梁人乃退淮南民庶因兵寇之後猶聚為盜彧令子直招撫之旬日之間咸來復業自合肥以北安堵如舊永安初拜員外散騎常侍鴻臚少卿普泰初進後軍將軍大中大夫賀拔嶽入關以子直為開府主簿遷行臺郎中魏孝武西遷封山北縣男邑二百户大統初漢熾屠各阻兵於南山與隴東屠各共為脣齒太祖令子直率涇州步騎五千討破之南山平太祖嘉之賜書勞問除尚書左外兵郎中三年進車騎將軍兼中書舍人四年從太祖解洛陽圍經河橋戰兼尚書左丞出為秦州總管府司馬時涼州刺史宇文仲和據州逆命子直從隴右大都督獨孤信討平之復入為大行臺郎中兼丞相府記室吐谷渾寇西平以子直兼尚書兵部郎中出隴右經略之大破渾衆於長寧川渾賊遁走十五年進車騎將軍左光祿大夫除太子中庶子領齊王友尋行馮翊郡事十六年魏齊王廓出牧秦隴復以子直為秦州别駕仍領王友隨陸初平授安州長史領别駕加帥都督轉並州長史魏廢帝元年拜使持節大都督行瓜州事子直性清靜務以德政化民西土悅附魏恭帝初徵拜黃門侍郎卒於位子宣禮柱國府參軍事杜杲字子暉京兆杜陵人也祖建魏輔國將軍贈豫州刺史父皎儀同三司武都郡守杲學涉經史有當世幹略其族父瓚清貞有識鑒深器重之常曰吾家千里駒也瓚時仕魏為黃門侍郎兼度支尚書衛大將軍西道行臺尚孝武妹新豐公主因薦之於朝廷永熙二年起家奉朝請纍遷輔國將軍成州長史漢陽郡守世宗初轉修城郡守屬鳳州人仇周貢等搆亂攻逼修城杲信洽於民部內遂無叛者尋而開府趙昶諸軍進討杲率郡兵與昶合勢遂破平之入為司會上士初陳文帝弟安成王頊為質於梁及江陵平頊隨例遷長安陳人請之太祖許而未遣至是帝欲歸之命杲使焉陳文帝大悅即遣使報聘並賂黔中數州之地仍請畫野分疆永敦鄰好以杲奉使稱旨進授都督治小御伯更往分界焉陳人於是以魯山歸我帝乃拜頊柱國大將軍詔杲送之還國陳文帝謂杲曰家弟今蒙禮遣實是周朝之惠然不還彼魯山亦恐未能及此杲答曰安成之在關中乃咸陽一布衣耳然是陳之介弟其價豈止一城本朝親睦九族恕己及物上遵太祖遺旨下思繼好之義所以發德音者蓋為此也若知止侔魯山固當不貪一鎮況魯山梁之舊地梁即本朝蕃臣若以始末言之魯山自合歸國云以尋常之土易已骨肉之親使臣猶謂不可何以聞諸朝廷陳文帝慚恧久之乃曰前言戲之耳自是接遇有加常禮及杲還命引升殿親降御座執手以别朝廷嘉之授大都督小載師下大夫治小納言復聘於陳中山公訓為蒲州總管以杲為府司馬州治中兼知州府事加使持節車騎大將軍儀同三司及華皎來附詔令衛公直督元定等援之與陳人交戰我師不利元定等並沒自是連兵不息東南騷動高祖患之乃授杲御正中大夫後四年遷溫州刺史賜爵義興縣伯大象元年徵拜御正中大夫復使於陳二年除申州刺史加開府儀同大將軍進爵為侯邑一千三百户除同州司會隋開皇元年以杲為同州總管進爵為公俄遷工部尚書二年除西南道行臺兵部尚書尋以疾卒子運大象末宣納上士杲兄長暉位至儀同三司史臣曰韋辛皇甫之徒並關右之舊族也或紆組登朝獲當官之譽或張旃出境有專對之才既茂國猷克隆家業美矣夫周書卷三十九周書卷三十九考證辛慶之傳辛慶之字慶之北史云字餘慶周書卷三十九考證
