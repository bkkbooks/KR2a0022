  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_003-1a, image: WYG0263/WYG0263-0421a.png}
body:
  text: 周書卷三唐令狐德棻等撰帝紀第三孝閔帝孝閔皇帝諱覺字陀羅尼太祖第三子也母曰元皇后大統八年生於同州官舍九嵗封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之耳魏恭帝三年三月命為安定公世子四月拜大將軍十月乙􅕀太祖崩丙子嗣位太師大冢宰十二月丁􅕀魏帝詔以岐陽之地封帝為周公庚子禪位於帝詔曰豫聞皇天之命不於常惟歸於德故堯授舜舜授禹時其宜也天厭我魏邦垂變以告惟爾罔弗知豫雖不明敢弗龔天命格有德哉今踵唐虞舊典禪位於周庸布告遐邇焉使大宗伯趙貴持節奉冊書曰咨爾周公帝王之位弗有常有德者受命時乃天道豫式時庸荒求於唐虞之彜踵曰我魏德之終舊矣我邦小大罔弗知今其可久怫於天道而不歸有德歟時用詢謀僉曰公昭考文公格勳德於天地丕濟生民洎公躬又宣重光故𤣥象徴見於上謳訟奔走於下天之歷數用實在焉豫安敢弗若是以欽祇聖典遜位於公公其享兹大命保有萬國可不慎歟魏帝臨朝遣民部中大夫濟北公元迪致皇帝璽紱固辭公卿百辟勸進太史陳祥瑞乃從之是日魏帝遜于大司馬府元年春正月辛丑即天王位柴燎告天朝百官於路門追尊皇考文公為文王皇妣為文后大赦天下封魏帝為宋公是日槐里獻赤雀四百官奏議云帝王之興罔弗更正朔明受之於天革民視聽也逮於尼父稽諸隂陽云行夏之時後王所不易今魏歷告終周室受命以木承水實當行録正用夏時式遵聖道惟文王誕𤣥氣之祥有黑水之讖服色宜烏制曰可以大司徒趙郡公李弼為太師大宗伯南陽公趙貴為太傅大冢宰大司馬河內公獨孤信為太保大宗伯柱國中山公護為大司馬以大將軍寧都公育髙陽公達奚武武陽公豆盧寧小司寇陽平公李逺小司馬博陵公賀蘭祥小宗伯魏安公尉遲迥等並柱國壬寅祠圓丘詔曰豫本自神農其於二丘宜作厥主始祖獻侯啓土遼海肇有國基配南非郊文考德符五運受天明命祖于明堂以配上帝廟為太祖癸卯祠方丘甲辰祠太社初除市門稅乙巳祠太廟丁未㑹百官於乾安殿班賞各有差戊申詔曰上天有命革魏於周致豫一人受兹大號豫惟古先聖王罔弗先於省視風俗以求民瘼然後充治矧豫眇眇又當草昧若弗尚于逹四聰明四目之訓者其有聞知哉有司宜分命方别之使所在巡撫五教何者不宣時政有何不便得無修身潔已才堪佐世之人而不為上所知冤枉受罰幽辱于下之徒而不為上所理孝義貞節不為有司所中鰥寡孤窮不為有司所恤暨黎庶衣食豐約賦役繁省災厲所興水旱之處並宜具聞若有年八十已上所在就加禮餼辛亥祠南郊壬子立王后元氏乙卯詔曰惟天地草昧建邦以寧今可大啓諸國為周藩屏於是封太師李弼為趙國公太傅趙貴為楚國公太保獨孤信為衛國公大司寇于謹為燕國公大司空侯莫陳崇為梁國公大司馬中山公護為晉國公邑各萬戶辛酉祠太廟癸􅕀親耕籍田丙寅於劍南陵井置陵州武康郡置資州遂寧郡置遂州二月癸酉朝日於東郊乙􅕀改封永昌郡公廣為天水郡公戊寅祠太社丁􅕀楚國公趙貴謀反伏誅詔曰朕文考昔與羣公洎列將衆官同心戮力共治天下自始及終二十三載迭相匡弼上下無怨是以羣公等用升余於大位朕雖不德豈不識此是以朕於羣公同姓者如弟兄異姓者如甥舅冀此一心平定宇內各令子孫享祀百世而朕不明不能輯睦致使楚公貴不悅于朕與万俟幾通叱奴興王龍仁長孫僧衍等隂相假署圗危社稷事不克行為開府宇文盛等所告及其推究咸伏厥辜興言及此心焉如痗但法者天下之法朕既為天下守法安敢以私情廢之書曰善善及後世惡惡止其身其貴通興龍仁罪止一家僧衍止一房餘皆不問惟爾文武咸知時事太保獨孤信有罪免甲午以大司空梁國公侯莫陳崇為太保大司馬晉國公護為大冢宰柱國博陵公賀蘭祥為大司馬髙陽公逹奚武為大司寇大將軍化政公宇文貴為柱國己􅕀秦州涇州各獻木連理嵗星守少微經六十日三月庚子㑹文武百官班賜各有差己酉柱國衛國公獨孤信賜死壬子詔曰浙州去嵗不登厥民饑饉朕用慜焉其當州租輸未畢者悉宜免之兼遣使巡檢有窮餒者並加賑給癸亥省六府士貟三分减一夏四月己巳以少師平原公侯莫陳順為柱國壬申詔死罪以下各降一等壬午謁成陵乙酉還宮丁􅕀祠太廟五月癸卯嵗星犯太微上將太白犯軒轅己酉槐里獻白䴏帝欲觀漁於昆明池博土姜須諫乃止秋七月壬寅帝聽訟於右寢多所哀宥甲辰月掩心後星辛􅕀祠太廟熒惑犯東井北端第二星八月戊辰祠太社辛未詔曰朕甫臨大位政教未孚使我民農多陷刑網今秋律已應將行大戮言念羣生責在於朕宜從肆眚與其更新其犯者宜降從流流以下各降一等不在赦限者不從此降甲午詔曰帝王之治天下罔弗博求衆才以乂厥民今二十四軍宜舉賢良堪治民者軍列九人被舉之人於後不稱厥任者所舉官司皆治其罪九月庚申詔曰朕聞君臨天下者非由一人時乃上下同心所致今文武之官及諸軍人不霑爵封者宜各授兩大階改太守為郡守帝性剛果見晉公護執政深忌之司㑹李植軍司馬孫恆以先朝佐命入侍左右亦疾護之專乃與宫伯乙弗鳳賀拔提等潛謀請帝誅護帝然之又引宮伯張光洛同謀光洛密白護護乃出植為梁州刺史恆為潼州刺史鳳等遂不自安更奏帝將召羣公入因此誅護光洛又白之時小司馬尉遲綱總統宿衛兵護乃召綱共謀廢立令綱入殿中詐呼鳯等論事既至以次執送護第並誅之綱仍罷散禁兵帝方悟無左右獨在內殿令宮人持兵自守護又遣大司馬賀蘭祥逼帝遜位遂幽於舊邸月餘日以弒崩時年十六植恆等亦遇害及武帝誅護後乃詔曰慎始敬終有國彜典事亡如存哲王通制義崇追逺禮貴尊親故略陽公至德純粹天姿秀傑屬魏祚告終寶命將改謳歌允集歷數攸歸上協蒼靈之慶下昭后祗之錫而禍生肘腋釁起蕭墻白獸噬驂蒼鷹集殿幽辱神器弒酷乘輿冤結生民毒流㝢縣今河海澄清氛沴消蕩追尊之禮宜崇徽號遣太師蜀國公迥於南郊上諡曰孝閔皇帝陵曰靜陵史臣曰孝閔承既安之業應樂推之運柴天竺物正位君臨邇無異言逺無異望雖黃初代德太始受終不之尚也然政由寧氏主懷芒刺之疑祭則寡人臣無復子之請以之速禍宜哉周書卷三
