body:
  text: 周書卷二十五唐令狐徳棻等撰列傳第十七李賢弟逺逺子基李賢字賢和其先隴西成紀人也會祖富魏太武時以子都督討两山屠各殁於陣贈寕西將軍隴西郡守祖斌襲領父兵鎭於髙平因家焉父文保早卒魏大統末以賢兄弟著勲追贈涇原東秦三州刺史司空賢幼有志節不妄舉動嘗出遊遇一老人鬚眉皓白謂之曰我年八十觀士多矣未有如卿者必為台牧卿其勉之九嵗從師受業畧觀大旨而已不尋章句或謂之曰學不精勤不如不學賢曰夫人各有志賢豈能彊學待問領徒授業耶唯當粗聞教義𥙷已不足至如忠孝之道實銘之於心問者慙服年十四遭父䘮撫訓諸弟友愛甚篤魏永安中万俟醜奴據岐涇等諸州反叛魏孝莊遣爾朱天光率兵撃破之其黨万俟道洛費連少渾猶據原州未知醜奴已敗天光遣使造賢令宻圖道洛天光率兵續進㑹賊黨万俟阿寳戰敗逃還私告賢曰醜奴已敗王師行至此阿寳以性命相投願能存濟賢因令阿寳偽為醜奴使紿道洛等曰今已破臺軍須與公計事令阿寳權守原州公宜速徃道洛等信之是日便發既出而天光至遂克原州道洛乃將麾下六千人奔于牽屯山天光見賢曰道洛之出子之力也賢又率鄉人出馬千匹以助軍天光大悦時原州亢旱天光以乏水草乃退舍城東五十里牧馬息兵令都督長孫邪利行原州事以賢為主簿道洛復乗虗忽至時賊黨千餘人在城中宻為内應引道洛入城遂殺邪利賢復率鄉人殊死拒戰道洛乃退走又有賊帥達符顯圍逼州城晝夜攻戰屢被摧衂賢間道赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕乃偽負薪與賊樵采者俱得至城下城中垂布引之賊衆方覺乃弓弩亂發射之不中遂得入城告以大軍將至賊聞之便即散走累遷威烈將軍殿中將軍髙平令賀拔岳為侯莫陳悦所害太祖西征賢與其弟逺穆等宻應侯莫陳崇以功授都督仍守原州及大軍將至秦州悦棄城走太祖令兄子導勒兵追之以賢為前驅轉戰四百餘里至牽屯山及之悦自剄於陣賢亦被重瘡馬中流矢太祖嘉之賞奴婢布帛及雜畜等授持節撫軍大將軍都督魏孝武西遷太祖令賢率騎兵迎衛時山東之衆多欲逃歸帝乃令賢以精騎三百為殿衆皆憚之莫敢亡叛封下邽縣公邑一千戸俄授左都督安東將軍還鎭原州大統二年州民豆盧狼害都督大野樹兒等據州城反賢乃招集豪傑與之謀曰賊起倉卒便誅二將其勢雖盛其志已驕然其政令莫施唯以殘剥為業夫以羇旅之賊而馭烏合之衆勢自離解今若從中撃之賊必䘮膽如吾計者指日取之衆皆從焉賢乃率敢死士三百人分為两道乗夜鼓噪而出羣賊大驚一戰而敗狼乃斬闗遁走賢輕與三騎追斬之遷原州長史尋行原州事四年莫折後熾連結賊黨所在㓂掠賢率鄉兵與行涇州事史寕討之後熾列陣以待賢謂寕曰賊聚結嵗久徒衆甚多數州之人皆為其用我若總一陣併力撃之彼既同惡相濟理必總萃於我其勢不分衆寡莫敵我便救尾無以制之今若令諸軍分為數隊多設旗鼓掎角而前以脅諸柵公别綂精兵直指後熾按甲而待莫與交鋒後熾欲前則憚公之鋭諸柵欲出則懼我疑兵令其進不得戰退不得走以候其懈撃之必破後熾一敗則衆柵不攻自拔矣寕不從屢戰頻北賢乃率數百騎徑掩後熾營收其妻子僮𨽻五百餘人并輜重等屬後熾與寕戰勝方欲追奔忽聞賢至乃棄寕與賢接戰賢手斬十餘級生獲六人賊遂大敗後熾單騎遁走師還以功賞奴婢四十口雜畜數百頭八年授原州刺史賢雖少從戎旅而頗閑政事撫導鄉里甚得民和十二年隨獨孤信征涼州平之又撫慰張掖等五郡而還俄而茹茹圍逼州城剽掠居民驅擁畜牧賢欲出戰大都督王徳猶豫未決賢固請徳乃從之賢勒兵將出賊宻知之乃引軍退賢因率騎士追撃斬二百餘級捕虜百餘人獲駞馬牛羊二萬頭財物不可勝計所掠之人還得安堵加授使持節車騎大將軍儀同三司十六年遷驃騎大將軍開府儀同三司太祖之奉魏太子西廵也至原州遂幸賢第讓齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乗輅備儀服以諸侯會遇禮相見然後幸賢第歡宴終日凡是親族頒賜有差魏恭帝元年進爵河西郡公增邑通前二千戸後以弟子植被誅賢坐除名俄授使持節車騎大將軍儀同三司時荆州羣蠻反開府潘招討之令賢與賀若敦率騎士七千别道邀截擊蠻帥文子榮大破之遂於平州北築汶陽城以鎭之尋治郢州刺史時以巴湘初附詔賢總監諸軍畧定乃遷江夏民二千餘戸以實安州并築甑山城而還保定二年詔復賢官爵仍授𤓰州刺史髙祖及齊王憲之在襁褓也以避忌不利居宮中太祖令於賢家處之六載乃還宮因賜賢妻呉姓宇文氏養為姪女賜與甚厚及髙祖西廵幸賢第詔曰朕昔冲幼爰寓此州使持節驃騎大將軍開府儀同三司大都督𤓰州諸軍事𤓰州刺史賢斯土良家勲徳兼著受委居朕輔導積年念其規弼功勞甚茂食彼桑椹尚懷好音矧兹惠矣其庸可忘今廵撫居此不殊代邑舉目依然益增舊想雖無屬籍朕處之若親凡厥昆季乃至子姪等可並豫宴賜於是令中侍上士尉遲愷徃𤓰州降璽書勞賢賜衣一襲及被褥并御所服十三環金帶一要中廏馬一匹金裝鞍勒雜綵五百叚銀錢一萬賜賢弟申國公穆亦如之子姪男女中外諸孫三十四人各賜衣一襲又拜賢甥庫狄樂為儀同賢門生昔經侍奉者二人授大都督四人授帥都督六人别將奴已免賤者五人授軍主未免賤者十二人酬㬱放之四年王師東討朝議以西道空虗慮羌渾侵擾乃授賢使持節河州總管三州七防諸軍事河州刺史河州舊非總管至是創置焉賢乃大營屯田以省運漕多設斥候以備㓂戎於是羌渾歛迹不敢向東五年宕昌㓂邉百姓失業乃於洮州置總管府以鎮遏之遂廢河州總管改授賢洮州總管七防諸軍事洮州刺史屬羌宼石門戍撤破橋道以絶援軍賢率千騎禦之前後斬𫉬數百人賊乃退走羌復引吐谷渾數千騎將入西疆賢宻知之又遣兵伏其隘路復大敗之虜遂震懾不敢犯塞俄廢洮州總管還於河州置總管府復以賢為之髙祖思賢舊恩徴拜大將軍天和四年三月卒於京師時年六十八髙祖親臨哀動左右贈使持節柱國大將軍大都督涇原秦等十州諸軍事原州刺史諡曰桓子端嗣端字永貴歴位開府儀同三司司㑹中大夫中州刺史從髙祖平齊於鄴城戰殁贈上大將軍追封襄陽公諡曰果端弟吉儀同三司吉弟崇位至太府中大夫上柱國廣宗郡公崇弟孝軌開府儀同大將軍升遷縣伯孝軌弟詢少歴顯位大象末上柱國隴西郡公賢弟逺字萬嵗幼有器局志度恢然嘗與羣兒為戰鬭之戲指麾部分便有軍陣之法郡守見而異之召使更戲羣兒懼而散走逺持杖叱之復為向勢意氣雄壯殆甚於前郡守曰此小兒必為將軍非常人也及長渉獵書𫝊畧知指趣而已魏正光末天下鼎沸勅勒賊胡琮侵逼原州其徒甚盛逺昆季率勵鄉人欲圖拒守而衆情猜懼頗有異同逺乃按劒而言曰頃年以來皇家多難匈黨乗機肆其毒螫王畧未振緩其梟夷正是忠臣立節之秋義士建功之日丈夫豈可臨難茍免當在死中求生耳諸人並世載忠貞沐浴教義今若棄同即異去順効逆雖五尺童子猶或非之將復何顔以見天下之士有異議者請以劒斬之於是衆皆股慄莫不聼命乃相與盟歃遂深壁自守而外無救援城遂陷其徒多被殺害唯逺兄弟並為人所匿得免逺乃言於賢曰今逆賊孔熾屠戮忠良逺欲間行入朝請兵救援兄晦迹和光可以免禍内伺釁隙因變立功若王師西指得復表裏相應既殉國家之急且全私室之危豈若窘廹凶威坐見夷滅賢曰是吾心也遂定東行之䇿逺乃崎嶇宼境得逹京師魏朝嘉之授武騎常侍俄轉别將賜帛千匹并弓刀衣馬等及爾朱天光西伐乃配逺精兵使為鄉導天光欽逺才望特相引接除伏波將軍長城郡守原州大中正後以應侯莫陳崇功遷髙平郡守太祖見逺與語悦之令居麾下甚見親遇及魏孝武西遷授假節銀青光禄大夫主衣都統封安定縣伯邑五百戸魏丈帝嗣位之始思享遐年以逺字可嘉令扶帝升殿遷使持節征東大將軍進爵為公增邑千戸仍領左右從征竇泰復𢎞農並有殊勲授都督原州刺史太祖謂逺曰孤之有卿若身體之有手臂之用豈可暫輟於身本州之榮乃私事耳卿若述職則孤無所寄懷於是遂令逺兄賢代行州事沙苑之役逺功居最除車騎大將軍儀同三司進爵陽平郡公邑三千戸尋從獨孤信東畧遂入洛陽為東魏將侯景等所圍太祖至乃解及河橋之戰逺與獨孤信為右軍不利而退除大丞相府司馬軍國機務逺皆參之畏避權勢若不在已時河東初復民情未安太祖謂逺曰河東國之要鎮非卿無以撫之乃授河東郡守逺敦奨風俗勸課農桑肅遏姦匪兼修守禦之備曾未朞月百姓懷之太祖嘉焉降書勞問徴為侍中驃騎大將軍開府儀同三司魏建東宮授太子少傅尋轉少師東魏北豫州刺史髙仲宻請舉州來附時齊神武屯兵河陽太祖以仲宻所據遼逺難為應接諸將皆憚此行逺曰北豫逺在賊境髙歡又屯兵河陽常理而論實難救援但兵務神速事貴合機古人有言不入獸穴安得獸子若以奇兵出其不意事或可濟脱有利鈍故是兵家之常如其顧望不行便無克定之日太祖喜曰李萬嵗所言差强人意乃授行臺尚書前驅東出太祖率大軍繼進逺乃潜師而徃拔仲宻以歸仍從太祖戰於邙山時大軍不利逺獨整所部為殿尋授都督義州𢎞農等二十一防諸軍事逺善綏撫有幹畧守戰之備無不精鋭每厚撫外人使為間諜敵中動静必先知之至有事泄被誅戮者亦不以為悔其得人心如此嘗校獵於莎柵見石於叢蒲中以為伏兎射之而中鏃入寸餘就而視之乃石也太祖聞而異之賜書曰昔李將軍廣親有此事公今復爾可謂世載其徳雖熊渠之名不能獨擅其羙東魏將叚孝先率歩騎二萬趨宜陽以送糧為名然實有窺窬之意逺宻知其計遣岳襲破之獲其輜重器械孝先遁走太祖乃賜所乗馬及金帶牀帳衣被等并雜綵二千匹拜大將軍頃之除尚書左僕射逺白太祖曰逺秦隴匹夫才藝俱爾平生念望不過一郡守耳遭逢際㑹得奉聖明主貴臣遷以至於此今位居上列爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身世但尚書僕射任居端揆今以賜授適所以重其罪責明公若欲全之乞寢此授太祖曰公勲徳兼羙朝廷欽屬𨕖衆而舉何足為辭且孤之於公義等骨肉豈容於官位之間便致退讓深乖所望也逺不得已方拜職太祖又以第十一子達令逺子之即代王也其見親待如此時太祖嫡嗣未建明帝居長已有成徳孝閔處嫡年尚幼冲乃召羣公謂之曰孤欲立子以嫡恐大司馬有疑大司馬即獨孤信明帝敬后父也衆皆黙未有言者逺曰夫立子以嫡不以長禮經明義畧陽公為世子公何所疑若以信為嫌請即斬信便拔刀而起太祖亦起曰何事至此信又自陳説逺乃止於是羣公並從逺議出外拜謝信曰臨大事不得不爾信亦謝逺曰今日賴公决此大議六官建授小司宼孝閔帝踐阼進位柱國大將軍邑千戸復鎮𢎞農逺子植在太祖時已為相府司録參軍掌朝政及晉公護執權恐不𬒳任用乃宻欲誅護語在孝閔帝紀謀頗漏泄護知之乃出植為梁州刺史尋而廢帝召逺及植還朝逺恐有變沉吟久之乃曰大丈夫寕為忠鬼安能作叛臣乎遂就徴既至京師護以逺功名素重猶欲全宥之乃引與相見謂之曰公兒遂有異謀非止屠戮護身乃是傾危宗社叛臣賊子理宜同疾公可早為之所乃以植付逺逺素鍾愛於植植又口辯乃云初無此謀逺謂為信然詰朝將植謁護護謂植已死乃曰陽平公何意乃自來也左右云植亦在門外護大怒曰陽平公不信我矣乃召入仍命逺同坐令帝與植相質於逺前植辭窮謂帝曰本為此謀欲安社稷利至尊耳今日至此何事云云逺聞之自投於牀曰若爾誠合萬死於是護乃害植并逼逺令自殺時年五十一植弟叔諧叔謙叔讓亦死餘並以年幼得免建徳元年晉公護誅乃詔曰故使持節柱國大將軍大都督陽平郡開國公逺早蒙驅任夙著勲績内參帷幄外屬藩維竭誠王室乃罹横禍言念貞良追增傷悼宜加榮寵用彰忠節贈本官加陜熊等十五州諸軍事陜州刺史諡曰忠隋開皇初追贈上柱國黎國公邑三千戸改諡曰懐植及諸弟並加贈諡植弟基字仲和幼有聲譽羙容儀善談論渉獵羣書尤工騎射太祖召見奇之乃令尚義歸公主大統十年釋褐員外散騎常侍後以父勲封建安縣公邑一千戸累遷撫軍將軍銀青光禄大夫通直散騎常侍領大丞相親信俄轉大都督進爵清河郡公太祖扶危定傾威權震主及魏廢帝即位之後猜隙彌深時太祖諸子年皆幼冲章武公導中山公護復東西作鎮唯託意諸壻以為心膂基與義城公李暉常山公于翼等俱為武衛將軍分掌禁旅帝深憚之故宻謀遂泄魏恭帝即位遷使持節車騎大將軍儀同三司加散騎常侍進爵燉煌郡公尋加侍中驃騎大將軍開府儀同三司拜陽平國世子六官建授御正中大夫孝閔帝踐阼出為海州刺史尋以兄植被收例合坐死既以主貴又為季父穆所請得免武成二年除江州刺史既𬒳譴謫常憂懼不得志保定元年卒於位年三十一申公穆尤所鍾愛每哭輒悲慟謂其所親曰好兒捨我去門戸豈是欲興宣政元年追贈使持節上開府儀同三司大將軍曹徐譙三州刺史燉煌郡公諡曰孝子威嗣威字安民起家右侍上士累遷至開府儀同三司又改襲逺爵陽平郡公從髙祖平齊以功授上開府拜軍司馬宣帝即位進授大將軍出為熊州刺史大象末位至柱國史臣曰李賢和兄弟屬亂離之際居戎馬之間志畧縱横忠勇奮發亟摧勍敵屢渉艱危而功未書於王府仕不過於州郡及逢時値主䇿名委質或使煩莫府或契闊戎行荷生成之恩蒙國士之遇俱縻好爵各著勲庸遂得任兼文武聲彰内外位髙望重光國榮家跗蕚連暉椒聊繁衍冠冕之盛當時莫比焉自周迄隋鬱為西京盛族雖金張在漢不之尚也然而太祖初崩嗣君冲幼内則功臣放命外則强㓂臨邉晉公以猶子之親膺負圖之託遂能撫寕家國開剪異端革魏興周逺安邇悦功勤已著過惡未彰李植受遇先朝宿參機務恐威權之已去懼將來之不容生此厲階成兹貝錦乃以小謀大由疎間親主無昭帝之明臣有上官之訴嫌隙既兆釁故因之啟冡宰無君之心成閔皇廢弑之禍植之由也李逺既闕義方之訓又無先見之明以是誅夷非為不幸周書卷二十五周書卷二十五考證李賢傳吉弟崇崇弟孝軌孝軌弟詢北史云吉弟孝軌孝軌弟詢詢弟崇未知孰是周書卷二十五考證
