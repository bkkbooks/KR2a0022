body:
  text: 周書卷二十七唐令狐徳棻等撰列傳第十九赫連逹韓果蔡祐常善辛威厙狄昌田𢎞梁椿梁臺宇文測弟深赫連達字朔周成樂人勃勃之後也曾祖厙多汙因避難改姓杜氏達性剛鯁有膽力少從賀㧞岳征討有功拜都將賜爵長廣鄉男遷都督及岳為侯莫陳悅所害軍中大擾趙貴建議迎太祖諸將猶豫未決達曰宇文夏州昔為左丞明畧過人一時之傑今日之事非此公不濟趙將軍議是也達請輕騎告哀仍迎之諸將或欲南追賀㧞勝或云東告朝廷逹又曰此皆逺水不救近火何足道哉貴於是謀遂定令達馳徃太祖見達慟哭問故達以實對太祖遂以數百騎南赴平凉引軍向髙平令達率騎據彈筝峽時百姓惶懼奔散者多有數村民方扶老弱驅畜牧欲入山避難軍士争欲掠之達曰逺近民黎多受制於賊今若値便掠縛何謂伐罪弔民不如因而撫之以示義師之徳乃撫以恩信民皆悦附於是迭相曉語咸復舊業太祖聞而嘉之悦平加平東將軍太祖謂諸將曰當清水公遇禍之時君等性命懸於賊手雖欲来告其路無從杜朔周昌萬死之難逺来見及遂得共盡忠節同雪讐耻雖藉衆人之力實賴杜子之功勞而不酬何以勸善乃賜馬二百匹逹固讓太祖弗許魏孝武入闗襃叙勲義以達首逆元帥匡復秦隴進爵魏昌縣伯邑五百戸從儀同李虎破曹泥除鎮南將軍金紫光禄大夫加通直散騎常侍增邑并前一千戸從復𢎞農戰沙苑皆有功又增邑八百戸除泉郡守轉帥都督加持節除濟州刺史詔復姓赫連氏以達勲望兼隆乃除雲州刺史即本州也進爵為公拜大都督尋授儀同三司從大將軍達奚武攻漢中梁宜豐侯蕭循拒守積時後乃送欵武問諸將進止之宜開府賀蘭願徳等以其食盡欲急攻取之達曰不戰而獲城䇿之上者無容利其子女貪其財帛窮兵極武仁者不為且觀其士馬猶彊城池尚固攻之縱克必將彼此俱損如其困獸猶鬭則成敗未可知况行師之道以全軍為上武曰公言是也乃命將帥各申所見於是開府楊寛等並同達議武遂受循降師還遷驃騎大將軍開府儀同三司加侍中進爵藍田縣公六官初建授左遂伯出為隴州刺史保定初遷大將軍夏州總管三州五防諸軍事達雖非文吏然性質直遵奉法度輕於鞭撻而重慎死罪性又亷儉邉境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉尋進爵樂川郡公建徳二年進位柱國薨子遷嗣大象中位至大將軍蒲州刺史韓果字阿六㧞代武川人也少驍雄善騎射賀㧞岳西征引為帳内撃万俟醜奴及其枝黨轉戰數十合並破之膂力絶倫被甲荷戈升陟峯嶺猶渉平路雖數十百日不以為勞以功授宣武將軍子都督從太祖討平侯莫陳悦遷都督賜爵邯鄲縣男魏孝武入闗進爵石縣伯邑五百戸大統初進爵為公增邑通前一千戸加通直散騎常侍果性彊記兼有權畧所行之處山川形勢備能記憶兼善伺敵虗實揣知情狀有潜匿溪谷欲為間偵者果登髙望之所疑處徃必有獲太祖由是以果為虞侯都督每從征行常領侯騎晝夜廵察畧不眠寢從襲竇泰於潼闗太祖依其規畫軍以勝返賞真珠金帶一腰帛二百匹授征虜將軍又從復𢎞農攻㧞河南城獲郡守一人論功為最破沙苑戰河橋並有功授撫軍將軍銀青光禄大夫增邑九百戸遷朔州刺史轉安州刺史加帥都督九年從戰邙山軍還除河東郡守又從大軍破稽胡於北山胡地險阻人迹罕至果進兵窮討散其種落稽胡憚果勁健號為著翅人太祖聞之笑曰著趐之名寕減飛將累遷大都督車騎大將軍儀同三司驃騎大將軍開府儀同三司出為宜州刺史録前後功進爵襃中郡公魏恭帝元年授大將軍從賀蘭祥討吐谷渾以功别封一子縣公武成二年又率軍破稽胡大獲生口賜奴婢一百口除寕州刺史保定三年拜少師進位柱國四年從尉遲迥圍洛陽軍退果所部獨全天和初授華州刺史為政寛簡吏民稱之建徳初薨子明嗣大象末位至上大將軍黎州刺史與尉遲迥同謀被誅蔡祐字承先其先陳留圉人也曾祖紹為夏州鎮將徙居髙平因家焉祖護魏景明初為陳留郡守父襲名著西州正光中万俟醜奴宼亂闗中襲乃背賊棄妻子歸洛陽拜齊安郡守及魏孝武西遷仍在闗東後始㧞難西歸賜爵平舒縣伯除岐夏二州刺史卒贈原州刺史祐性聰敏有行檢襲之背賊東歸也祐年十四事毋以孝聞及長有膂力便騎射太祖在原州召為帳下親信太祖遷夏州以祐為都督及侯莫陳悦害賀㧞岳諸將遣使迎太祖將赴夏州首望彌姐元進等隂有異計太祖㣲知之先與祐議執元進祐曰狼子野心㑹當反噬今若執縛不如殺之太祖曰汝大決也於是召元進等入計事太祖曰隴賊逆亂與諸人戮力討之觀諸人輩似有不同者太祖㣲以此言動之因目祐祐即出外衣甲持刀直入瞋目叱諸人曰與人朝謀夕異豈是人也蔡祐今日必斬姦人之頭因按劒臨之舉座皆叩頭曰願有簡擇祐乃叱元進而斬之并其黨並伏誅一坐皆戰慄不敢仰視於是與諸將結盟同心誅悦太祖以此知重之乃謂祐曰吾今以爾為子爾其父事我後從討悦破之又從迎魏孝武於潼闗以前後功封萇鄉縣伯邑五百戸大統初加寕朔將軍羽林監尋持節員外散騎常侍進爵為侯増邑一千一百戸從太祖擒竇㤗復𢎞農戰沙苑皆有功授平東將軍太中大夫又從太祖戰於河橋祐乃下馬步鬭手殺數人左右勸乗馬以備急卒祐怒曰丞相養我如子今日豈以性命為念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼遂圍之十餘重謂祐曰觀君似是勇士但弛甲來降豈慮無富貴耶祐罵之曰死卒吾今取頭自當封公何假賊之官號也乃彎弓持满四面拒之東魏人弗敢逼乃募厚甲長刀者直進取祐去祐可三十步左右勸射之祐曰吾曹性命在一矢耳豈虗發哉敵人漸進可十歩祐乃射之正中其面應弦而倒便以矟刺殺之因此戰數合唯失一人敵乃稍郤祐徐引退是戰也我軍不利太祖已還祐至𢎞農夜中與太祖相㑹太祖見祐至字之曰承先爾来吾無憂矣太祖心驚不得寢枕祐股上乃安以功進爵為公增邑三百戸授京兆郡守九年東魏豫州刺史髙仲宻舉州來附太祖率軍援之與齊神武遇戰於邙山祐時著明光鐵鎧所向無前敵人咸曰此是鐵猛獸也皆遽避之俄授青州刺史轉原州刺史加帥都督尋除大都督十三年遭父憂請終䘮紀弗許遷車騎大將軍儀同三司加驃騎大將軍開府儀同三司侍中賜姓大利稽氏進爵懐寕郡公魏恭帝二年中領軍六官建授兵部中大夫江陵初附諸蠻騷動詔祐與大將軍豆盧寕討平之三年拜大將軍給後部鼓吹以前後功增邑并前四千戸别封一子縣伯太祖不豫祐與晉公護賀蘭祥等侍疾及太祖崩祐悲慕不已遂得氣疾孝閔帝踐阼拜少保祐與尉遲綱俱掌禁兵遞直殿省時帝信任司㑹李植等謀害晉公護祐每泣諫帝不聼尋而帝廢世宗即位拜小司馬少保如故帝之為公子也與祐特相友昵至是禮遇彌隆御膳每有異味輒輟以賜祐羣臣朝宴每被别留或至昏夜列炬鳴笳送祐還宅祐以過蒙禮遇常辭疾避之至於婚姻尤不願交於勢要尋以本官權鎮原州頃之授宣州刺史未之部因先氣疾動卒於原州時年五十四祐少有大志與鄉人李穆布衣齊名嘗相謂曰大丈夫當建立功名以取富貴安能久處貧賤邪言訖各大笑穆即申公也後皆如其言及從征伐常潰圍䧟陣為士卒先軍還之日諸將爭功祐終無所競太祖乃歎之嘗謂諸將曰承先口不言勲孤當代其論叙其見知如此性節儉所得禄皆散與宗族身死之日家無餘財贈使持節柱國大將軍大都督五州諸軍事原州刺史諡曰莊子正嗣官至使持節車騎大將軍儀同三司祐弟澤頗好學有幹能起家魏廣平王參軍丞相府兼記室加宣武將軍給事中從尉遲迥平蜀授帥都督賜爵安彌縣男稍遷司輅下大夫車騎大將軍儀同三司澧州刺史在州受賂總管代王達以其功臣子弟宻奏貰之後為邙州刺史不從司馬消難被害常善髙陽人也世為豪族父安成魏正光末茹茹㓂邊以統軍從鎮將慕容勝與戰大破之時破六汗㧞陵作亂欲逼安成不從乃率所部討陵以功授伏波將軍給鼔節後與㧞陵連戰卒於陣善魏孝昌中從爾朱榮入洛授威烈將軍都督加龍驤將軍中散大夫直寢封房城縣男邑三百戸後從太祖平侯莫陳悦除天水郡守魏孝武西遷授武衛將軍進爵武始縣伯增邑二百戸大統初加平東將軍進爵為侯擒竇泰復𢎞農破沙苑累有戰功除使持節衛將軍假驃騎大將軍秦州刺史四年從戰河橋加大都督進爵為公除涇州刺史屬茹茹入冦抄掠北邊善率所部破之盡獲所掠拜車騎大將軍儀同三司遷驃騎大將軍開府儀同三司西安州刺史轉蔚州刺史頻莅三蕃頗有政績魏恭帝二年進爵永陽郡公增邑二千戸孝閔帝踐阼拜大將軍寕州總管保定二年入為小司徒四年突厥出師與隋公楊忠東伐令善應接之五年夏卒時年六十四贈使持節柱國大將軍大都督延夏塩恒燕五州諸軍事延州刺史子昇和嗣先以善勲拜儀同三司辛威隴西人也祖大汗魏渭州刺史父生河州四面大都督及威著勲追贈大將軍涼甘等五州刺史威少慷慨有志畧初從賀㧞岳征討有功假輔國將軍都督及太祖統岳之衆見威奇之引為帳内尋授羽林監封白土縣伯邑五百戸從迎魏孝武因攻回洛城功居最大統元年拜寕逺將軍增邑二百戸累遷通直散騎常侍進爵為侯增邑三百戸從擒竇泰復𢎞農戰沙苑並先鋒䧟敵勇冠一時以前後功授撫軍將軍銀青光禄大夫從于謹破襄城又從獨孤信入洛陽經河橋陣加持節進爵為公增邑八百戸五年授揚州刺史加大都督十三年遷車騎大將軍儀同三司驃騎大將軍開府儀同三司賜姓普毛氏出為鄜州刺史威時望既重朝廷以桑梓榮之遷河州刺史本州大中正頻領二鎮頗得民和閔帝踐阼拜大將軍進爵枹罕郡公增邑五千戸及司馬消難來附威與達奚武率衆援接保定初復率兵討丹州叛胡破之三年與達奚武攻陽闗㧞之明年從尉遲迥圍洛陽還拜小司馬天和初進位柱國復為行軍總管討綏銀等諸州叛胡並平之六年從齊王憲東伐㧞伏龍等五城建徳初拜大司㓂三年遷少傅出為寕州總管宣政元年進位上柱國大象二年進封宿國公增邑并前五千戸復為少傅其年冬薨時年六十九威性持重有威嚴歴官數十年未嘗有過故得以身名終兼其家門友義五世同居世以此稱之子永達嗣大象末以威勲拜儀同大將軍庫狄昌字恃徳神武人也少便騎射有膂力及長進止閑雅膽氣壯烈每以將帥自許年十八爾朱天光引為幢主加討夷將軍從天光定闗中以功拜寕逺將軍奉車都尉統軍天光敗又從賀㧞岳授征西將軍金紫光禄大夫及岳被害昌與諸將議翊戴太祖從平侯莫陳悦賜爵隂盤縣子加衛將軍右光禄大夫後從太祖迎魏孝武復潼闗改封長子縣子邑八百戸大統初進爵為公增邑一千戸從破竇泰授車騎將軍左光禄大夫又從復𢎞農戰沙苑昌皆先登䧟陣太祖嘉之授帥都督四年從戰河橋除冀州刺史後與于謹破胡賊劉平伏於上郡授馮翊郡守久之轉河北郡守十三年録前後功授大都督通直散騎常侍又從隋公楊忠破蠻賊田社清昌功為最增邑三百戸拜儀同三司尋遷開府儀同三司十六年出為東夏州刺史魏廢帝元年進爵方城郡公增邑并前四千一百戸六官建授稍伯中大夫孝閔帝踐阼拜大將軍後以疾卒田𢎞字廣畧髙平人也少慷慨志立功名膂力過人敢勇有謀畧魏永安中䧟於万俟醜奴爾朱天光入闗𢎞自原州歸順授都督及太祖初統衆𢎞求謁見及論世事深被引納即處以爪牙之任又以迎魏孝武功封鶉隂縣子邑五百戸太祖常以所著鐵甲賜𢎞云天下若定還將此甲示孤也大統三年轉帥都督進爵為公從太祖復𢎞農戰沙苑解洛陽圍破河橋陣𢎞功居多累蒙殊賞賜姓紇干氏尋授原州刺史以𢎞勲望兼至故以衣錦榮之太祖在同州文武並集乃謂之曰人人如𢎞盡心天下豈不早定即授車騎大將軍儀同三司魏廢帝元年加驃騎大將軍開府儀同三司平蜀之後梁信州刺史蕭韶等各據所部未從朝化詔𢎞討平之又討西平叛羌及鳳州叛氐等並破之𢎞每臨陣摧鋒直前身被一百餘箭破骨者九馬被十矟朝廷壯之信州羣蠻反又詔𢎞與賀若敦等平之孝閔帝踐阼進爵鴈門郡公邑通前二千七百戸保定元年出為岷州刺史𢎞雖武將而動遵法式百姓頗安之三年從隋公楊忠伐齊拜大將軍明年又從忠東伐師還乃旋所鎮吐谷渾㓂西邊宕昌羌潜相應接詔𢎞討之獲其二十五王㧞其七十二柵遂破平之天和二年陳湘州刺史華皎來附𢎞從衛公直赴援與陳人戰不利仍以𢎞為江陵總管及陳將呉明徹來㓂𢎞與梁主蕭巋退保總南令副總管髙琳拒守明徹退乃還江陵尋以𢎞為仁夀城主以逼宜陽齊將叚孝先斛律明月出軍定隴以為宜陽援𢎞與陳公純破之遂拔宜陽等九城以功增邑五百戸進位柱國大將軍建徳二年拜大司空遷少保三年出為總管襄郢昌豐唐蔡六州諸軍事襄州刺史薨于州子恭嗣少有名譽早歴顯位大象末位至柱國小司馬朝廷又追錄𢎞勲進恭爵觀國公梁椿字千年代人也祖屈朱魏昌平鎮將父提内正郎椿初以統軍從爾朱榮入洛復從榮破葛榮於滏口以軍功進授都將後從賀㧞岳討平万俟醜奴蕭寳夤等遷中堅將軍屯騎校尉子都督普泰初拜征西將軍金紫光禄大夫二年除髙平郡守封盧奴縣男邑一百戸大昌元年進授都督從太祖平侯莫陳悦拜衛將軍右光禄大夫大統初進爵欒城縣伯增邑五百戸出為隴東郡守尋進爵為公增邑五百戸遷梁州刺史從復𢎞農戰沙苑與獨孤信入洛陽從宇文貴破東魏將堯雄等累有戰功授車騎大將軍儀同三司大都督從戰河橋進爵東平郡公增邑一千戸俄遷侍中驃騎大將軍開府儀同三司七年從于謹討稽胡劉平伏椿擒其别帥劉持塞又從獨孤信討岷州羌梁企定破之除清州刺史在州雖無他政績而夷夏安之十三年從李弼赴潁川援侯景别攻閻韓鎮斬其鎮城徐衛城主卜貴洛率軍士千人降以功增邑四百戸孝閔帝踐阼除華州刺史改封清陵郡公增邑通前三千七百戸二年入為少保轉少傅保定元年拜大將軍卒於位贈恒鄜延丹寕五州諸軍事行恒州刺史諡曰烈椿性果毅善於撫納所獲賞物分賜麾下故每踐敵塲咸得其死力雅好儉素不營貲産時論以此稱焉子明魏恭帝二年以椿功襲爵豐陽縣公尋授大都督遷車騎大將軍儀同三司散騎常侍治小吏部歴小御伯御正下大夫保定五年詔襲椿爵舊封回授弟朗天和中改封樂陵郡公除上州刺史增邑并前四千三百戸梁臺字洛都長池人也父去斤魏獻文時為隴西郡守臺少果敢有志操孝昌中從爾朱天光討平闗隴一嵗之中大小二十餘戰以功授子都督賜爵隴城鄉男普泰初進授都督後隷侯莫陳悦討南秦州羣盗平之悦表臺為假節衛將軍左光禄大夫進封隴城縣男邑二百戸尋行天水郡事轉行趙平郡事頻治郡頗有聲績未幾天光追臺還引入帳内及天光敗於寒陵賀㧞岳又引為心膂岳為侯莫陳悦所害臺與諸將議翊戴太祖從討悦破之又拜天水郡守大統初復除趙平郡守又與太僕石猛破两山屠各詔增邑一百戸轉平凉郡守時莫折後熾結聚輕剽宼掠居民州刺史史寕討之歴時不克臺陳賊形勢兼論攻取之策寕善而從之遂破賊徒復與于謹破劉平伏録前後勲授頴州刺史賜姓賀蘭氏從援玉壁戰邙山授帥都督大統十五年拜南夏州刺史加通直散騎常侍本州大中正增邑二百戸魏廢帝二年遷使持節車騎大將軍儀同三司進驃騎大將軍開府儀同三司加侍中孝閔帝踐阼進爵中部縣公增邑通前一千戸武成中從賀蘭祥征洮陽先登有功别封綏安縣侯邑一千戸詔聼轉授其子元慶保定四年拜大將軍時大軍圍洛陽久而不㧞齊騎奄至齊公憲率兵禦之乃有數人為敵所執已去陣二百餘歩臺望見之憤怒單馬突入射殺兩人敵皆披靡執者遂得還齊公憲每歎曰梁臺果毅膽决不可及也五年拜鄜州刺史臺性疎通恕己待物至於蒞民處政尤以仁愛為心不過識千餘字口占書啟辭意可觀年過六十猶能被甲跨馬足不躡鐙馳射弋獵矢不虗發後以疾卒宇文測字澄鏡太祖之族子也髙祖中山曾祖豆頽祖騏驎父永仕魏位並顯達測性沉宻少篤學每旬月不窺戸牖起家奉朝請殿中侍御史累遷司徒右長史安東將軍尚宣武女陽平公主拜駙馬都尉及魏孝武疑齊神武有異圖詔測詣太祖言令宻為之備太祖見之甚歡使還封廣川縣伯邑五百戸尋從孝武西遷進爵為公太祖為丞相以測為右長史軍國政事多委任之又令測詳定宗室昭穆逺近附於屬籍除通直散騎常侍黄門侍郎大統四年拜侍中長史六年坐事免尋除使持節驃騎大將軍開府儀同三司大都督行汾州事測政存簡惠頗得民和地接東魏數相鈔竊或有獲其為宼者多縳送之測皆命解縳置之賔館然後引與相見如客禮焉仍設酒餚宴勞放還其國并給糧餼衛送出境自是東魏人大慙乃不為宼汾晉之間各安其業两界之民遂通慶弔不復為仇讐矣時論稱之方於羊叔子或有告測與外境交通懐貳心者太祖怒曰測為我安邊吾知其無貳志何為間我骨肉生此貝錦乃命斬之仍許測以便宜從事八年加金紫光禄大夫轉行綏州事每嵗河冰合後突厥即來㓂掠先是常預遣居民入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺斥候知其動静是年十二月突厥從連谷入㓂去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至測因請置戍兵以備之十年徴拜太子少保十二年十月卒於位時年五十八太祖傷悼親臨慟焉仍令水池公護監護喪事贈本官諡曰靖測性仁恕好施與衣食之外家無蓄積在洛陽之日曾被竊盗所失物即其妻陽平公主之衣服也州縣擒盗并物俱獲測恐此盗坐之以死乃不認焉遂遇赦得免盗既感恩因請為測左右及測從魏孝武西遷事極狼狽此人亦從測入闗竟無異志子該嗣歴官内外位至上開府儀同三司臨淄縣公測弟深深字奴干性鯁正有器局年數嵗便累石為營伍并折草作旌旗布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必為名將至永安初起家祕書郎時羣盗蜂𧺫深屢言時事爾朱榮雅知重之拜厲武將軍尋除車騎府主簿三年授子都督領宿衛兵卒及齊神武舉兵入洛孝武西遷既事起倉卒人多逃散深撫循所部並得入闗以功賜爵長樂縣伯太祖以深有謀畧欲引致左右圖議政事大統元年乃啟為丞相府主簿加朱衣直閤尋轉尚書直事郎中及齊神武屯蒲坂分遣其將竇泰趣潼闗髙敖曹圍洛陽太祖將襲泰諸將咸難之太祖乃隐其事陽若未有謀者而獨問䇿於深對曰竇氏歡之驍將也頑㐫而勇戰亟勝而輕敵歡每仗之以為禦侮今者大軍若就蒲坂則髙歡拒守竇泰必援之内外受敵取敗之道也不如選輕鋭之卒潜出小闗竇性躁急必來决戰髙歡持重未即救之則竇可擒也既虜竇氏歡勢自沮回師禦之可以制勝太祖喜曰是吾心也軍遂行果獲泰而齊神武亦退深又説太祖進取𢎞農復克之太祖大悦謂深曰君即吾家之陳平也是冬齊神武又率大衆度河渉洛至於沙苑諸將皆有懼色唯深獨賀太祖詰之曰賊來充斥何賀之有對曰髙歡之撫河北甚得衆心雖乏智謀人皆用命以此自守未易可圖今懸師度河非衆所欲唯歡恥失竇氏愎諫而來所謂忿兵一戰可以擒也此事昭然可見不賀何為請假深一節發王羆之兵邀其走路使無遺類矣太祖然之尋而大破齊神武軍如深所䇿四年從戰河橋六年别監李弼軍討白額稽胡並有戰功俄進爵為侯歴通直散騎常侍東雍州别駕使持節大都督東雍州刺史深為政嚴明示民以信抑挫豪右吏民懷之十七年入為雍州别駕魏恭帝二年進車騎大將軍儀同三司散騎常侍六官建拜小吏部下大夫孝閔帝受禪進位驃騎大將軍開府儀同三司遷吏部中大夫武成元年除幽州刺史改封安化縣公二年徵拜宗師大夫轉軍司馬保定初除京兆尹入為司㑹中大夫深少喪父事兄甚謹性多奇譎好讀兵書既在近侍每進籌䇿及在選曹頗獲時譽性仁愛情隆宗黨從弟神譽神慶幼孤深撫訓之義均同氣世亦以此稱焉天和三年卒於位贈使持節少師恒雲蔚三州刺史諡曰成康子孝伯自有傳史臣曰太祖屬禍亂之辰以征伐定海内大則連兵百萬繋以存亡小則轉戰邊亭不闋旬月是以人無少長士無賢愚莫不投筆要功横戈請奮若夫數將者並攀翼雲漢底績屯夷雖運移年世而名成終始羙矣哉以赫連逹之先識而加之以仁恕蔡祐之敢勇而終之以不伐斯豈企及所致乎抑亦天性也宇文測昆季政績謀猷咸有可述其當時之良臣歟周書卷二十七周書卷二十七考證田𢎞𫝊子恭嗣北史云子仁恭嗣脱一仁字周書卷二十七考證
