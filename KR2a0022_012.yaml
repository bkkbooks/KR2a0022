body:
  text: 周書卷十二唐令狐德棻等撰列傳第四齊煬王憲子貴質齊煬王憲字毗賀突太祖第五子也性通敏有度量雖在童齔而神彩凝然初封涪城縣公少與高祖俱受詩𫝊咸綜機要得其指歸太祖嘗賜諸子良馬惟其所擇憲獨取駁馬太祖問之對曰此馬色類既殊或多駿逸若從軍征伐牧圉易分太祖喜曰此兒智識不凡當成重器後從獵隴上經官馬牧太祖每見駁馬輒曰此我兒馬也命左右取以賜之魏恭帝元年進封安城郡公孝閔帝踐阼拜驃騎大將軍開府儀同三司世宗即位授大將軍武成初除益州總管益寧巴盧等二十四州諸軍事益州刺史進封齊國公邑萬户初平蜀之後太祖以其形勝之地不欲使宿將居之諸子之中欲有推擇徧問高祖已下誰能此行並未及對而憲先請太祖曰刺史當撫衆治民非爾所及以年授者當歸爾兄憲曰才用有殊不闗大小試而無効甘受靣欺太祖大悦以憲年尚幼未之遣也世宗追遵先㫖故有此授憲時年十六善於撫綏留心政術辭訟輻輳聴受不疲蜀人懐之共立碑頌德尋進位柱國保定中徵還京拜雍州牧及晉公護東伐以尉遲迥為先鋒圍洛陽憲與達奚武王雄等軍於邙山自餘諸軍各分守險要齊兵數萬奄出軍後諸軍恇駭竝各退散唯憲與王雄達奚武率衆拒之而雄為齊人所斃三軍震懼憲親自督勵衆心乃安時晉公䕶執政雅相親委賞罰之際皆得預焉天和三年以憲為大司馬治小冢宰雍州牧如故四年齊將獨孤永業来寇盜殺孔城防主能奔達以城應之詔憲與柱國李穆將兵出宜陽築崇德等五城絶其糧道齊將斛律眀月率衆四萬築壘洛南五年憲渉洛邀之眀月遁走憲追之及於安業屢戰而還是歲眀月又率大衆於汾北築城西至龍門晉公䕶謂憲曰寇賊充斥戎馬交馳遂使疆場之間生民委弊豈得坐觀屠滅而不思救之汝謂計將安出曰如憲所見兄宜暫出同州以為威勢憲請以精兵居前隨機攻取非惟邊境清寧亦當别有克獲䕶然之六年乃遣憲率衆二萬出自龍門齊將新蔡王王康德以憲兵至潛軍宵遯憲乃西歸仍掘移汾水水南堡壁復入於齊齊人謂略不及遠遂弛邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張壁克之獲其軍實夷其城壘斛律眀月時在華谷弗能救也北攻姚襄城䧟之時汾州又見圍日久糧援路絶憲遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊柏社城進軍姚襄齊人嬰城固守憲使柱國譚公㑹築石殿城以為汾州之援齊平原王叚孝先蘭陵王高長恭引兵大至憲命將士陣而待之大將軍韓歡為齊人所乘遂以奔退憲身自督戰齊衆稍却㑹日暮乃各收軍及晉公䕶誅高祖召憲入憲免冠拜謝帝謂之曰天下者太祖之天下吾嗣守鴻基常恐失墜冢宰無君凌上將圖不軌吾所以誅之以安社稷汝親則同氣休戚共之事不相渉何煩致謝乃詔憲往䕶第收兵符及諸簿書等尋以憲為大冡宰時高祖既誅宰臣親覽朝政方欲導之以政齊之以刑爰及親親亦為刻薄憲既為䕶所委任自天和之後威勢漸隆䕶欲有所陳多令憲聞奏其間或有可不憲慮主相嫌隙每曲而暢之高祖亦悉其心故得無患然猶以威名過重終不能平雖遥授冢宰寔奪其權也開府裴文舉憲之侍讀高祖常御内殿引見之謂曰晉公不臣之迹朝野所知朕所以泣而誅者安國家利百姓耳昔魏末不綱太祖匡輔元氏有周受命晉公復執威權積習生常便謂法應湏爾豈有三十歳天子而可為人所制乎且近代以来又有一弊暫經𨽻屬便即禮若君臣此乃亂代之權宜非經國之治術詩云夙夜匪解以事一人一人者止據天子耳雖陪侍齊公不得即同臣主且太祖十兒寧可悉為天子卿宜規以正道勸以義方輯睦我君臣協和我骨肉無令兄弟自致嫌疑文舉拜謝而出歸以白憲憲指心撫几曰吾之夙心公寧不悉但當盡忠竭節耳知復何言建德二年進爵為王憲友劉休徵獻王箴一首憲美之休徵後又以此箴上高祖高祖方剪削諸弟甚悦其文憲常以兵書繁廣難求指要乃自刋定為要略五篇至是表陳之高祖覽而稱善其秋髙祖幸雲陽宫遂寢疾衛王直於京師舉兵反高祖召憲謂曰衛王搆逆汝知之乎憲曰臣初不知今始奉詔直若逆天犯順此則自取滅亡高祖曰汝即為前軍吾亦續發直尋敗走髙祖至京師憲與趙王招俱入拜謝高祖曰管蔡為戮周公作輔人心不同有如其靣但愧兄弟親尋干戈於我為不足耳初直内深忌憲憲隠而容之且以帝之母弟每加友敬晉公䕶之誅也直固請及憲高祖曰齊公心迹吾自悉之不得更有所疑也及文宣皇后崩直又密啟云憲飲酒食肉與平日不異高祖曰吾與齊王異生俱非正嫡特為吾意今袒括是同汝當愧之何論得失汝親太后之子偏荷慈愛今但湏自朂無暇説人直乃止四年高祖將欲東討獨與内史王誼謀之餘人莫得知也後以諸弟才略無出於憲右遂告之憲即贊成其事及大軍將出憲表上私財以助軍費曰臣聞撫機適運理籍時来兼弱攻昧事資權道伏惟陛下繼眀作聖闡業𢎞風思順天心用恢武略方使長虵外剪宇宙大同軍民内向車書混一竊以龍旗雷動天網雲布芻粟糧餼或湏周給昔邊隅未靜卜式願上家財江海不澄衛兹請獻私粟臣雖不敏敢忘景行謹上金寳等一十六件少助軍資詔不納而以憲表示公卿曰人臣當如此朕貴其心耳寧湏物乎乃詔憲率衆二萬為前軍趣黎陽高祖親圍河隂未克憲攻㧞武濟進圍洛口收其東西二城以高祖疾班師是歳初置上柱國官以憲為之五年大舉東討憲率精騎二萬復為前鋒守雀䑕谷髙祖親圍晉州憲進兵克洪同永安二城更圖進取齊人焚橋守險軍不得進遂屯於永安齊主聞晉州見圍乃將兵十萬自来援之時柱國陳王純頓軍千里徑大將軍永昌公椿屯雞棲原大將軍宇文盛守汾水闗並受憲節度憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營不湏張幕可伐柏為菴示有形勢令兵去之後賊猶致疑也時齊主分軍萬人向千里徑又令其衆出汾水闗自率大兵與椿對陣宇文盛馳騎告急憲自以千騎救之齊人望谷中塵起相率遽退盛與柱國侯莫陳芮渉汾逐之多有斬獲俄而椿告齊衆稍逼憲又回軍赴之㑹椿被𠡠追還率兵夜返齊人果謂栢菴為帳幕也不疑軍退翌日始悟時高祖已去晉州留憲為後拒齊主自率衆来追至於高梁橋憲以精騎二千阻水為陣齊領軍叚暢直進至橋憲隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復為誰憲曰我虞侯大都督耳暢曰觀公言語不是凡人今日相見何用隠其名位陳王純梁公侯莫陳芮内史王誼等並在憲側暢固問不巳憲乃曰我天子太弟齊王也指陳王以下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚鋭憲與開府宇文忻各統精卒百騎為殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊衆乃退憲渡汾而及高祖於玉壁高祖又令憲率兵六萬還援晉州憲遂進軍營于涑水齊主攻圍晉州晝夜不息間諜還者或云巳䧟憲乃遣柱國越王盛大將軍尉遲迥開府宇文神舉等輕騎一萬夜至晉州憲進軍據蒙坑為其後援知城未䧟乃歸涑川尋而髙祖東轅次于髙顯憲率所部先向晉州眀日諸軍總集稍逼城下齊人亦大出兵陣於營南高祖召憲馳往觀之憲返命曰是易與耳請破之而後食帝悦曰如汝所言吾無憂矣憲退内史栁虯私謂憲曰賊亦不少王安得輕之憲曰憲受委前鋒情兼家國掃此逋寇事等摧枯商周之事公所知也賊兵雖衆其如我何既而諸軍俱進應時大潰其夜齊主遁走憲輕騎追之既及永安高祖續至齊人收其餘衆復據髙壁及洛女砦高祖命憲攻洛女破之眀日與大軍㑹於介休時齊主已走鄴留其從兄安德王延宗據并州延宗因僭偽號出兵拒戰高祖進圍其城憲攻其西面克之延宗遁走追而獲之以功進封第二子安城公質為河間王拜第三子賨為大將軍仍詔憲先驅趣鄴眀年進克鄴城齊任城王湝廣寧王孝珩等據守信都有衆數萬高祖復詔憲討之仍令齊主手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無不優待湝不納乃大開賞募多出金帛沙門求為戰士者亦數千人憲軍過趙州湝令間諜二人覘窺形勢候騎執以白憲憲乃集齊之舊將遍示之又謂之曰吾所爭者大不在汝等今放汝還可即充我使乃與湝書曰山川有間每深勞佇仲春戒節納履惟宜承始屆兩河仍圖三位二者交戰想無虧德昔魏厯云季海内横流我太祖撫運乘時大庇黔首皇上嗣膺下武式隆景業興稽山之㑹總盟津之師雷駭唐郊則野無横陣雲騰晉水則地靡嚴城襲偽之酋既奔竄於草澤竊號之長亦委命於旌門德義振於無垠威風被於有截彼朝宿將舊臣良家戚里俱升榮寵皆縻好爵是使臨漳之下効死爭驅營丘之前奮身畢命此豈唯人事抑亦天時宜訪之道路無俟傍説吾以不武任總元戎受命安邊路指幽冀列邑名藩莫不屈膝宣風導禮皆荷来蘇足下高氏令王英風夙著古今成敗傋諸懐抱豈不知一木不維大厦三諌可以逃身哉且殷微去商侯服周代項伯背楚賜姓漢朝去此弗圖茍狥亡轍家破身殞為天下笑又足下諜者為候騎所拘軍中情實具諸執事知以弱卒瑣甲欲抗堂堂之師縈帶汚城冀保區區之命戰非上計無待卜疑守乃下策或未相許巳勒諸軍分道並進相望非遠憑軾有期兵交命使古今通典不俟終日所望知㡬也憲至信都湝陣於城南憲登張耳冡以望之俄而湝所署領軍尉相願偽出略陣遂以衆降相願湝心腹也衆甚駭懼湝大怒殺其妻子眀日復戰遂破之俘斬三萬人擒湝及孝珩等憲謂湝曰任城王何苦至此湝曰下官神武帝子兄弟十五人幸而獨存逄宗社顚覆今日得死無愧墳陵憲壯之命歸其妻子厚加資給又問孝珩孝珩布陳國難辭淚俱下俯仰有節憲亦為之改容憲素善謀多算略尤長於撫御達於任使摧鋒䧟陣為士卒先羣下感悦咸為之用齊人夙聞威聲無不憚其勇略及并州之捷長驅敵境蒭牧不擾軍無私焉先是稽胡劉没鐸自稱皇帝又詔憲督趙王招等討平之語在稽胡𫝊憲自以威名日重潛思屏退及高祖欲親征北蕃乃辭以疾高祖變色曰汝若憚行誰為吾使憲懼曰臣陪奉鑾輿誠為本願但身嬰疹疾不堪領兵帝許之尋而高祖崩宣帝嗣位以憲屬尊望重深忌憚之時高祖未𦵏諸王在内治服司衛長孫覽總兵輔政恐諸王有異志奏令開府于智察其動靜及高祖山陵還諸王歸第帝又命智就宅候憲因是告憲有謀帝乃遣小冡宰宇文孝伯謂憲曰三公之位宜屬親賢今欲以叔為太師九叔為太傅十一叔為太保叔以為何如憲曰臣才輕位重滿盈是懼三師之任非所敢當且太祖勲臣宜膺此舉若専用臣兄弟恐乖物議孝伯反命尋而復来曰詔王晚共諸王俱至殿門憲獨被引進帝先伏壯士於别室至即執之憲辭色不撓固自陳説帝使于智對憲憲目光如炬與智相質或謂憲曰以王今日事勢何用多言憲曰我位重屬尊一旦至此死生有命寧復圖存但以老母在堂恐留兹恨耳因擲笏於地乃縊之時年三十五以于智為柱國封齊國公又殺上大將軍安邑公王興上開府獨孤熊開府豆盧紹等皆以昵於憲也帝既誅憲無以為辭故託興等與憲結謀遂加其戮時人知其冤酷咸云伴憲死也憲所生母達歩干氏茹茹人也建德三年冊為齊國太妃憲有至性事母以孝聞太妃舊患風熱屢經發動憲衣不解帶扶侍左右憲或東西從役每心驚其母必有疾乃馳使參問果如所慮憲六子貴質賨貢乾禧乾洽貴字乾福少聰敏渉獵經史尤便騎射始讀孝經便謂人曰讀此一經足為立身之本天和四年始十歳封安定郡公邑一千五百户太祖之初為丞相也始封此郡未嘗假人至是封貴焉年十一從憲獵於鹽州一圍之中手射野馬及鹿十有五頭建德二年冊拜齊國世子四年授車騎大將軍儀同三司尋出為幽州刺史貴雖出自深宫而留心庶政性聰敏過目輒記嘗道逄二人謂其左右曰此人是縣黨何因輒行左右不識貴便説其姓名莫不嗟伏白獸烽經為商人所燒𤇺帥納貨不言其罪他日此帥隨例来參貴乃問云商人燒烽何因私放𤇺帥愕然遂即首服其眀察如此五年四月卒年十七高祖甚痛惜之質字乾祐初封安城公後以憲勲進封河間郡王賨字乾禮大將軍中垻公貢出後莒莊公乾禧安城公乾洽龍涸公並與憲俱被誅史臣曰自兩漢逮乎魏晉其帝弟帝子衆矣唯楚元河間東平陳思之徒以文儒播美任城琅邪以武功馳譽何則體自尊極長於宫闈佚樂侈其心驕貴蕩其志故使竒才高行終鮮於天下之士焉齊王竒姿傑出獨牢籠於前載以介弟之地居上將之重智勇冠世攻戰如神敵國繫以存亡鼎命由其輕重比之異姓則方召韓白何以加兹挟震主之威屬道消之日斯人而嬰斯戮君子是以知周祚之不永也昔張耳陳餘賓客厮役所居皆取卿相而齊之文武僚吏其後亦多至台牧異世同符可謂賢矣周書卷十二周書卷十二考證齊煬王憲𫝊雖陪侍齊公北史云爾雖陪侍齊公此似脱一爾字時年三十五北史云時年四十周書卷十二考證
