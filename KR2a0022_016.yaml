body:
  text: 周書卷十六唐令狐德棻等撰列傳第八趙貴獨孤信侯莫陳崇弟瓊凱趙貴字元貴天水南安人也曾祖逹魏庫部尚書臨晉子祖仁以良家子鎮武川因家焉貴少頴悟有節槩魏孝昌中天下兵起貴率鄉里避難南遷屬葛榮陷中山遂被拘逼榮敗爾朱榮以貴為别将從討元顥有功賜爵燕樂縣子授伏波将軍武賁中郎將從賀拔岳平闗中賜爵魏平縣伯邑五百户累遷鎮北将軍光祿大夫都督及岳為侯莫陳悦所害将吏奔散莫有守者貴謂其黨曰吾聞仁義豈有常哉行之則為君子違之則為小人朱伯厚王叔治感意氣微恩尚能蹈履名節况吾等荷賀㧞公國士之遇寧可自同衆人乎涕泣歔欷於是從之者五十人乃詣悦詐降悦信之因請收葬岳言辭慷慨悦壮而許之貴乃收岳屍還與宼洛等糾合其衆奔平凉共圗拒悦貴首議迎太祖語在太祖紀太祖至以貴為大都督領府司馬悦平以本将軍持節行秦州事當州大都督為政清静民吏懐之齊神武舉兵向洛使其都督韓軌進據蒲坂太祖以貴為行臺與梁禦等討之未濟河而魏孝武已西入闗拜車騎大将軍儀同三司兼右衛將軍時曹泥據靈州拒守以貴為大都督與李弼等率衆討之進爵為侯増邑五百户又以預立魏文帝勲進爵為公増邑通前一千五百户尋授岐州刺史時以軍國多務藉貴力用遂不之部仍領大丞相府左長史加散騎常侍梁企定稱亂河右以貴為隴西行臺率衆討破之從太祖復𢎞農戰沙苑拜侍中驃騎大将軍開府儀同三司進爵中山郡公除雍州刺史從戰河橋貴與怡峯為左軍戰不利先還又從援玉壁齊神武遁去髙仲宻以北豫州降太祖率師迎之與東魏人戰於邙山貴為左軍失律諸軍因此竝潰坐免官以驃騎大都督領本軍尋復官爵拜御史中尉加大將軍東魏將髙岳慕容紹宗等圍王思政於潁川貴率軍援之東南諸州兵亦受貴節度東魏人遏洧水灌城軍不得至思政遂没貴乃班師尋拜柱國将軍賜姓乙弗氏茹茹宼廣武貴擊破之斬首數千級收其輜重振旅而還六官建以貴為太保大宗伯改封南陽郡公孝閔帝踐阼遷太傅大冢宰進封楚國公邑萬户初貴與獨孤信等皆與太祖等夷及孝閔帝即位晉公䕶攝政貴自以元勲佐命每懐怏怏有不平之色乃與信謀殺䕶及期貴欲發信止之尋為開府宇文盛所告被誅獨孤信雲中人也本名如願魏氏之初有三十六部其先伏留屯者為部落大人與魏俱起祖俟尼和平中以良家子自雲中鎮武川因家焉父庫者為領民酋長少雄豪有節義北州咸敬服之信羙容儀善騎射正光末與賀㧞度等同斬衛可孤由是知名以北邊䘮亂避地中山為葛榮所獲信既少年好自修飾服章有殊於衆軍中號為獨孤郎及爾朱氏破葛榮以信為别將從征韓婁信疋馬挑戰擒賊漁陽王袁肆周以功拜員外散騎侍郎尋轉驍騎将軍因鎮滏口元顥入洛榮以信為前驅與顥黨戰於河北破之拜安南将軍賜爵爰徳縣侯建明初出為荆州新野鎮將帶新野郡守尋遷荆州防城大都督帶南鄉守頻典二部皆有聲績賀㧞勝出鎮荆州乃表信為大都督從勝攻梁下溠戍破之遷武衛將軍及勝弟岳為侯莫陳悦所害勝乃令信入闗撫岳餘衆屬太祖已統岳兵信與太祖鄉里少相友善相見甚歡因令信入洛請事至雍州大使元毗又遣信還荆州尋徴信入朝魏孝武雅相委任及孝武西遷事起倉卒信單騎及之於瀍澗孝武歎曰武衛遂能辭父母捐妻子逺來從我世亂識忠良豈虚言哉即賜信御馬一疋進爵浮陽郡公邑一千户時荆州雖陥東魏民心猶戀本朝乃以信為衛大将軍都督三荆州諸軍事兼尚書右僕射東南道行臺大都督荆州刺史以招懐之信至武陶東魏遣其𢎞農郡守田八能率蠻左之衆拒信於浙陽又遣其都督張齊民以歩騎三千出信之後信謂其衆曰今我士卒不滿千人而首尾受敵若却撃齊民則敵人謂為退走必來要截未若先破八能遂奮擊八能敗而齊民亦潰信乘勝襲荆州東魏刺史辛纂勒兵出戰士庶既懐信遺惠信臨陣喻之莫不解體因而縱兵擊之纂大敗奔城趨門未及闔信都督楊忠等前驅斬纂語在忠傳於是三荆遂定就拜車騎大將軍儀同三司東魏又遣其将髙敖曹侯景等率衆奄至信以衆寡不敵遂率麾下奔梁居三載梁武帝方始許信還北信父母既在山東梁武帝問信所往信答以事君無二梁武帝深義之禮送甚厚大統三年秋至長安自以虧損國威上書謝罪魏文帝付尚書議之七兵尚書陳郡王王言等議以為邊将董戎龔行天罰喪師敗績國刑無捨荆州刺史獨孤如願任當推轂逺襲襄宛斬賊帥辛纂傳首京師論功語効實合嘉賞但庸績不終旋致淪没責成之義朝寄有違然孤軍數千後援未接賊衆我寡難以自固既經恩降理絶刑書昔秦宥孟明漢捨廣利卒能改過立功垂芳竹帛以今方古抑有成規臣等參議請赦罪復其舊職魏文帝詔曰如願荆㐮之役實展功効既屬強宼力屈道窮歸賊不可還朝路絶適事求宜未足稱過違難勾吳誠貫夷險義全終始良可嘉歎復情存謙退款心謝責寧容議及恩降止云免咎斯則事失權宜理乖通變可轉驃騎大将軍加侍中開府其使持節儀同三司浮陽郡公悉如故尋拜領軍仍從太祖復𢎞農破沙苑改封河内郡公增邑二千户時俘虜中有信親屬始得父凶問乃發䘮行服尋起為大都督率衆與馮翊王元季海入洛陽潁豫襄廣陳留之地竝相繼欵附四年東魏将侯景等率衆圍洛陽信據金墉城隨方拒守旬有餘日及太祖至瀍東景等退走信與李逺為右軍戰不利東魏遂有洛陽六年侯景宼荆州太祖令信與李弼出武闗景退以信為大使慰撫三荆尋除隴右十州大都督秦州刺史先是守宰闇弱政令乖方民有冤訟歴年不能斷決及信在州事無壅滯示以禮教勸以耕桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信七年岷州刺史赤水蕃王梁企定舉兵反詔信討之企定尋為其部下所殺而企定子弟仍收其餘衆信乃勒兵向萬年頓三交口賊併力拒守信因詭道趨稠松嶺賊不虞信兵之至望風奔潰乗勝逐北徑至城下賊竝出降加授太子太保邙山之戰大軍不利信與于謹收散卒自後撃之齊神武追騎驚擾諸軍因此得全十二年涼州刺史宇文仲和據州不受代太祖令信率開府怡峯討之仲和嬰城固守信夜令諸将以衝梯攻其東北信親帥壮士襲其西南值明剋之擒仲和虜其民六千户送於長安拜大司馬十三年大軍東討時以茹茹為宼令信移鎮河陽十四年進位柱國大將軍錄剋下溠守洛陽破岷州平涼州等功增封聽回授諸子於是第二子善封魏寜縣公第三子穆文侯縣侯第四子藏義寜縣侯邑各一千戸第五子順項城縣伯第六子陁建忠縣伯邑各五百户信在隴右嵗久啟求還朝太祖不許或有自東魏來者又告其母凶問信發喪行服屬魏太子與世祖廵北邊因至河陽弔信信陳哀苦請終禮制又不許於是追贈信父庫者司空公追封信母費連氏常山郡君十六年大軍東討信率隴右數萬人從軍至崤坂而還遷尚書令六官建拜大司馬孝閔帝踐阼遷太保大宗伯進封魏國公邑萬户趙貴誅後信以同謀坐免居無幾晉公䕶又欲殺之以其名望素重不欲顯其罪逼令自盡於家時年五十五信風度𢎞雅有竒謀大畧太祖初啟覇業唯有闗中之地以隴右形勝故委信鎮之既為百姓所懐聲振鄰國東魏將侯景之南奔梁也魏收為檄梁文矯稱信據隴右不從宇文氏仍云無闗西之憂欲以威梁人也又信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏民有戴帽者咸慕信而側帽焉其為鄰境及士庶所重如此子羅先在東魏乃以次子善為嗣及齊平羅至善卒又以羅為嗣羅字羅仁大象元年除楚安郡守授儀同大将軍善字伏陁㓜聰慧善騎射以父勲封魏寜縣公魏廢帝元年又以父勲授驃騎大將軍開府儀同三司加侍中進爵長安郡公孝閔帝踐阼除河州刺史以父負舋久廢於家保定三年乃授龍州刺史天和六年襲爵河内郡公邑二千户從髙祖東討以功授上開府尋除兗州刺史政存簡恵百姓安之卒於位年三十八贈使持節柱國定趙恒滄瀛五州諸軍事定州刺史信長女周明敬后第四女元貞皇后第七女隋文獻后周隋及皇家三代皆為外戚自古以來未之有也隋文帝踐極乃下詔曰褒德累行往代通規追逺慎終前王盛典故使持節柱國河内郡開國公信風宇髙曠獨秀生人睿哲居宗清猷映世宏謨長䇿道著於弼諧緯義經仁事深於拯濟方當宣風廊廟亮采台階而世屬艱危功髙弗賞眷言令範事切於心今景運初開椒闈肅建載懐塗山之義無忘褒紀之典可贈太師上柱國冀定相滄瀛趙恒洺貝十州諸軍事冀州刺史趙國公邑一萬户諡曰景追贈信父庫者使持節太尉上柱國定恒滄瀛平燕六州諸軍事定州刺史封趙國公邑一萬户諡曰恭信母費連氏贈太尉恭公夫人侯莫陳崇字尚樂代郡武川人其先魏之别部居庫斛真水五世祖曰太骨都侯其後世為渠帥祖允以良家子鎮武川因家焉父興殿中将軍羽林監崇少驍勇善馳射謹慤少言年十五隨賀㧞岳與爾朱榮征葛榮又從元天穆討邢杲平之以功除建威将軍别從岳破元顥於洛陽遷直寝後從岳入闗破赤水蜀時万俟醜奴圍岐州遣其将李尉遲菩薩将兵向武功崇從岳力戰破之乘勝逐北解岐州圍又赴百里細川破賊帥侯伏侯元進柵醜奴率其餘衆奔髙平崇與輕騎逐北至涇州長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後騎益集賊徒因悉逃散遂大破之岳以醜奴所乘馬及寳劍金帶賞崇除安北將軍大中大夫都督封臨涇縣侯邑八百户及岳為侯莫陳悦所害崇與諸將同謀迎太祖太祖至軍原州刺史史歸猶為悦守太祖遣崇襲歸崇潛軍夜往輕将七騎直到城下餘衆皆伏於近路歸見騎少遂不設備崇即入據城門時李逺兄弟在城内先知崇來於是中外鼓噪伏兵悉起遂擒歸斬之以崇行原州事仍從平悦轉征西将軍又遣崇慰撫秦州别封廣武縣伯邑七百户大統元年除涇州刺史加散騎常侍大都督進爵為公累遷車騎大将軍儀同三司驃騎大將軍開府儀同三司改封彭城郡公邑三千户三年從擒竇泰復𢎞農破沙苑增邑二千户四年從戰河橋崇功居多七年稽胡反崇率衆討平之尋除雍州刺史兼太子詹事十五年進位柱國大將軍轉少傅魏恭帝元年出為寜州刺史遷尚書令六官建拜大司空孝閔帝踐阼進封梁國公邑萬户加太保歴大宗伯大司徒保定二年崇從髙祖幸原州髙祖夜還京師竊怪其故崇謂所親人常昇曰吾昔聞卜筮者言晉公今年不利車駕今忽夜還不過是晉公死耳於是衆皆傳之或有𤼵其事者髙祖召諸公卿於大德殿責崇崇惶恐謝罪其夜䕶遣使将兵就崇宅逼令自殺禮葬如常儀諡曰躁䕶誅後改諡曰荘閔子芮嗣拜大將軍進位柱國從髙祖東伐率衆守太行道并州平授上柱國仍從平鄴拜大司馬崇弟瓊字世樂年八嵗䘮父飬母至孝善事諸兄内外莫不敬之以軍功封靈丘縣男邑三百户從魏孝武入闗為太祖直盪都督大統三年遷尚藥典御三年拜太子右衛率進爵為侯從獨孤信征梁企定累遷北秦州刺史十四年拜車騎大將軍儀同三司孝閔帝踐阼進爵武安縣公增邑并前二千户出為郢州刺史武成二年遷金州總管六州諸軍事金州刺史保定元年拜大將軍天和四年轉荆州總管十四州八防諸軍事荆州刺史尋進位柱國進爵同昌郡公建徳二年拜大宗伯出為秦州總管四年從髙祖東伐為後二軍總管尋改封武威郡公大象二年加上柱國瓊弟凱字敬樂性剛正頗好經史隨兄崇以軍功賜爵下蔡縣男大統元年為東宫侍書從太祖擒竇泰破沙苑陣以功拜寜逺将軍累遷羽林監東宫洗馬太子庶子進授都督十四年兄崇以平原州功賜爵靈武縣侯詔聽轉授凱累遷東宫武衛率尚書右丞轉左丞進位車騎大将軍儀同三司六官建授司門下大夫孝閔帝踐阼拜工部中大夫進位開府儀同三司轉司憲中大夫進爵為公復除工部中大夫世宗初出為宜州刺史武成二年入為禮部中大夫保定中復為陵州刺史轉丹州刺史所在頗有政績天和中入為司會中大夫建德二年為聘齊使主史臣曰蕭何文吏自愛懼秦法誅戮乃推奉漢髙李通家傳䜟術知劉氏當興遂翊戴光武終而白水復禹中陽纂堯方䇿以為羙談功臣仰其徽烈趙貴志懐忠義首倡大謀爰啟聖明克復讐恥闗中全百二之險周室定三分之業彼此一時足為連類獨孤信威申南服化洽西州信著遐方光照鄰國侯莫陳崇以勇悍之氣當戰争之利輕騎啟髙平之扉疋馬得長坑之㨗竝以宏材遠畧附鳯攀龍績著元勲位居上衮而識慙明悊咸以凶终惜哉信雖不免其身慶延於後三代外戚何其盛歟初魏孝荘帝以爾朱榮有翊戴之功拜榮柱國大將軍位在丞相上榮敗後此官遂廢大統三年魏文帝復以太祖建中興之業始命為之其後功參佐命望實俱重者亦居此職自大統十六年以前任者凡有八人太祖位總百揆督中外軍魏廣陵王欣元氏懿戚從容禁闈而已此外六人各督二大將軍分掌禁旅當爪牙禦侮之寄當時榮盛莫與為比故今之稱門閥者咸推八柱國家云今并十二大將軍錄之於左使持節太尉柱國大将軍大都督尚書左僕射隴右行臺少師隴西郡開國公李虎使持節太傅柱國大将軍大宗伯大司徒廣陵王元欣使持節太保柱國大將軍大都督大宗伯趙郡開國公李弼使持節柱國大将軍大都督大司馬河内郡開國公獨孤信使持節柱國大将軍大都督大司宼南陽郡開國公趙貴使持節柱國大将軍大都督大司空常山郡開國公于謹使持節柱國大將軍大都督少傅彭城郡開國公侯莫陳崇右與太祖為八柱國後竝改封此竝大祖時爵使持節大將軍大都督少保廣平王元贊使持節大將軍大都督淮王元育使持節大将軍大都督齊王元廓使持節大将軍大都督秦七州諸軍事秦州刺史章武郡開國公宇文導使持節大将軍大都督平原郡開國公侯莫陳順使持節大将軍大都督雍七州諸軍事雍州刺史髙陽郡開國公逹奚武使持節大將軍大都督陽平公李逺使持節大將軍大都督范陽郡開國公豆盧寜使持節大將軍大都督化政郡開國公宇文貴使持節大将軍大都督荆州諸軍事荆州刺史博陵郡開國公賀蘭祥使持節大將軍大都督陳留郡開國公楊忠使持節大將軍大都督岐州諸軍事岐州刺史武威郡開國公王雄右十二大将軍又各統開府二人每一開府領一軍兵是為二十四軍自大統十六年以前十二大將軍外念賢及王思政亦作大將軍然賢作牧隴右思政出鎮河南竝不在領兵之限此後功臣位至柱國及大將軍者衆矣咸是散秩無所統御六柱國十二大將軍之後有以位次嗣掌其事者而徳望素在諸公之下不得預於此列周書卷十六周書卷十六考證趙貴傳趙貴字元貴北史作字元寳獨孤信傳陳郡王王元等北史作陳郡王𤣥等為是第三子穆文侯縣侯北史作必要縣侯侯莫陳崇傳遣其将李尉遲菩薩將兵向武功李字下有脱字周書卷十六考證
