  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_017-1a, image: WYG0263/WYG0263-0538a.png}
body:
  text: 周書卷十七唐令狐德棻等撰列傳第九梁禦若干惠怡峯劉亮王德梁禦字善通其先安定人也後因官北邉遂家於武川改姓為紇豆陵氏高祖俟力提從魏太祖征討位至揚武將軍定陽侯禦少好學進趨詳雅及長更好弓馬爾朱天光西討知禦有志略引為左右授宣威將軍都將共平關右除鎮西將軍東益州刺史第一領民酋長封白水縣伯邑三百戶轉征西將軍金紫光祿大夫後從賀拔嶽鎮長安及嶽被害禦與諸將同謀翊戴太祖從征侯莫陳悅遷武衛將軍太祖既平秦隴方欲引兵東下雍州刺史賈顯持兩端通使於齊神武太祖微知其意以禦為大都督雍州刺史領前軍先行既與顯相見因說顯曰魏室陵遲天下鼎沸高歡志在凶逆梟夷非遠宇文夏州英姿不世算略無方方欲扶危定傾匡復京洛公不於此時建立功效乃懷猶豫恐禍不旋踵矣顯即出迎太祖禦遂入鎮雍州授車騎大將軍儀同三司大統元年轉右衛將軍進爵信都縣公邑一千戶尋授尚書右僕射從太祖復𢎞農破沙苑加侍中開府儀同三司進爵廣平郡公增邑一千五百戶出為東雍州刺史為政舉大綱而已民庶稱焉四年薨於州臨終唯以國步未康為恨言不及家贈太尉尚書令雍州刺史諡曰武昭子睿襲爵天和中拜開府儀同三司以預佐命有功進蔣國公大象末除益州總管加授柱國睿將之任而王謙舉兵拒不授代仍詔睿為行軍元帥討謙破之進位上柱國若干惠字惠保代郡武川人也其先與魏氏俱起以國為姓父樹利周從魏廣陽王深征葛榮戰沒贈兾州刺史惠年弱冠從爾朱榮征伐定河北破元皓以功拜中堅將軍復以别將從賀拔嶽西征解岐州圍擒万俟醜奴平永洛定隴右每力戰有功封北平縣男邑二百戶纍遷鎮遠將軍都督直寢征西將軍金紫光祿大夫及嶽為侯莫陳悅所害惠與寇洛趙貴等同謀翊戴太祖仍從平悅拜直閣將軍魏孝武西遷除右衛將軍大都督進爵魏昌縣伯邑五百戶出為北華州刺史加使持節驃騎將軍大統初拜儀同三司進爵為公增邑五百戶從擒竇泰復𢎞農破沙苑惠每先登陷陳加侍中開府進爵長樂郡公增邑通前二千二百戶四年魏文帝東巡洛陽與齊神武戰於河橋惠力戰破之大收降卒七年遷中領軍及高仲密舉北豫州來附太祖帥師迎之軍至洛陽齊神武於邙山將以邀我太祖乃徙輜重於瀍曲夜勒兵襲之及戰惠為右軍與中軍大破之逐北數里虜其步卒齊神武兵乃萃於左軍軍將趙貴等與戰不利諸軍因之竝退時㑹日暮齊神武兵屢來攻惠惠擊之皆披靡至夜中齊神武騎復來追惠惠徐乃下馬顧命厨人營食食訖謂左右曰長安死此中死異乎乃建旗鳴角收諸敗軍而還齊神武追騎憚惠疑有伏兵不敢逼至𢎞農見太祖陳賊形勢恨其垂成之功覆於一簣於是歔欷不能自勝太祖壯之尋拜秦州刺史未及之部遷司空惠性剛質有勇力容貌魁岸善於撫御將士莫不懷恩人思效節十二年東魏將侯景侵襄州惠率兵擊走之明年景請內附朝議欲收輯河南令惠以本官鎮魯陽以為聲援遇疾薨於軍惠於諸將年最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射惠竊歎曰親老矣何時辦此乎太祖聞之即日徙堂於惠宅其見重如此及薨太祖為之流涕者久之惠喪至又臨撫焉贈本官加秦州刺史諡曰武烈子鳳嗣鳳字達摩少沉深有識度大統末襲父爵長樂郡公尚太祖女魏廢帝二年授驃騎大將軍開府儀同三司魏恭帝三年除左宫伯尋出為洛州刺史徴拜大馭中大夫保定四年追録佐命之功封鳳徐國公增邑并前五千戶建德二年拜柱國怡峯字景阜遼西人也本姓默台因避難改焉高祖寬燕遼西郡守魏道武時率戶歸朝拜羽真賜爵長蛇公曽祖文兾州刺史峯少從征役以驍勇聞永安中假龍驤將軍為都將從賀拔嶽討万俟醜奴以功授給事中明威將軍轉征虜將軍都督賜爵蒲隂縣男及嶽被害峯與趙貴等同謀翊戴太祖進爵為伯時原州刺史史歸猶為侯莫陳悅守太祖令峯與侯莫陳崇討擒之及齊神武與魏孝武帝構隙帝頻勑太祖簡鋭卒入衛京邑太祖乃令峯與都督趙貴等率輕騎赴洛陽至潼關值魏孝武西遷峯即從太祖拔回洛復潼關拜安東將軍華州刺史尋轉大都督討曹泥有功進爵華陽縣公邑一千戶大統二年從太祖破竇泰於小關還拜散騎常侍車騎大將軍儀同三司又從復𢎞農破沙苑進爵樂陵郡公乃與元季海獨孤信復洛陽峯率竒兵至成臯入其郛收其戶口而還東魏遣行臺任祥率步騎萬餘攻潁川峯復以輕騎五百邀擊之自是威名轉盛加授開府儀同三司東魏圍洛陽峯與季海守金墉太祖至圍解即與東魏戰於河橋時峯為左軍不利與李遠先還太祖因此班師詔原其罪拜東西北三夏州諸軍事夏州刺史後與于謹討劉平伏從解玉壁圍平柏谷塢竝有功涼州刺史宇文仲和反峯與于謹討之十五年東魏圍潁川峯與趙貴赴援至南陽遇疾卒時年五十峯沉毅有膽略得士卒心當時號為驍將太祖嗟悼者久之贈華州刺史諡曰襄威子昻嗣官至開府儀同三司朝廷追録峯功封昻鄭國公昻弟光少以峯勳賜爵安平縣侯起家員外散騎常侍纍遷司土中大夫左武伯出為汾涇豳三州刺史加開府儀同三司進爵龍河縣公光弟春少知名歷官吏部下大夫儀同三司劉亮中山人也本名道德祖祐連魏蔚州刺史父持真鎮遠將軍領民酋長魏大統中以亮著勳追贈車騎大將軍儀同三司恆州刺史亮少倜儻有從橫計略姿貌魁傑見者憚之普泰初以都督從賀拔嶽西征解岐州圍擊侯伏侯元進万俟道洛万俟醜奴宿勒明達及諸賊亮常先鋒陷陳以功拜大都督封廣興縣子邑五百戶侯莫陳悅害嶽亮與諸將謀迎太祖悅平悅之黨豳州刺史孫定兒仍據州不下涇秦靈等諸州悉與定兒相應衆至數萬推定兒為主以拒義師太祖令亮襲之定兒以義兵猶遠未為之備亮乃將二十騎先豎纛於近城高嶺即馳入城中定兒方置酒高㑹卒見亮至衆皆駭愕莫知所為亮乃麾兵斬定兒縣首號令賊黨仍遙指城外纛命二騎曰出追大軍賊黨忷懼一時降服於是諸州羣賊皆即歸欵及太祖置十二軍簡諸將以將之亮領一軍每征討常與怡峯俱為騎將魏孝武西遷以迎駕功除使持節右光祿大夫左大都督南秦州刺史大統元年以復潼關功進位車騎大將軍儀同三司改封饒陽縣伯邑五百戶尋加侍中從擒竇泰復𢎞農及沙苑之役亮竝力戰有功遷開府儀同三司大都督進爵長廣郡公邑通前二千戶以母憂去職居喪毁瘠太祖嗟其至性每愛惜之俄起復本官亮以勇敢見知為時名將兼屢陳謀榮多合機宜太祖乃謂之曰卿文武兼資即孤之孔明也乃賜名亮并賜姓侯莫陳氏十年出為東雍州刺史為政清淨百姓安之在職三嵗卒於州時年四十喪還京師太祖親臨之泣而謂人曰股肱喪矣腹心何寄令鴻臚卿監護喪事追贈太尉諡曰襄配享太祖廟庭子昶尚太祖女西河長公主大象中位至柱國秦靈二州總管以亮功封彭國公邑五千戶昶弟靖天水郡守靖弟恭開府儀同三司饒陽縣伯恭弟幹上儀同三司褒中侯王德字天恩代郡武川人也少善騎射雖不經師訓而以孝悌見稱魏永安二年從爾朱榮討元皓攻河內應募先登以功除討夷將軍進爵同官縣子又從賀拔嶽討万俟醜奴平之别封深澤縣男邑二百戶加龍驤將軍中散大夫及侯莫陳悅害嶽德與寇洛等定議翊戴太祖加征西將軍金紫光祿大夫平涼郡守德雖不知書至於斷决處分良吏無以過也涇州所部五郡而德常為最及魏孝武西遷以奉迎功進封下博縣伯邑五百戶行東雍州事在州未幾百姓懷之賜姓烏丸氏大統元年拜衛將軍右光祿大夫進爵為公增邑一千戶加車騎大將軍儀同三司北雍州刺史其後常從太祖征伐纍有戰功又從破齊神武於沙苑加開府侍中進爵河間郡公增邑通前二千七百戶先是河渭間種羌屢叛以德有威名為夷民所附除河州刺史德綏撫有方羣羌率服十三年授大都督原靈顯三州五原蒲川二鎮諸軍事十四年除涇州刺史卒於州諡曰獻德性厚重廉慎言行無擇母年幾百嵗後德終子慶小名公奴性謹厚官至開府儀同三司初德喪父家貧無以葬乃賣公奴并一女以營葬事因遭兵亂不復相知及德在平涼始得之遂名曰慶史臣曰梁禦等負將率之材藴驍鋭之氣遭逢喪亂馳騖干戈艱難險阻備嘗而功名未立及殷憂啓聖豫奉興王參謀締構之初宣力經綸之始遂得連衡灌酈方駕張徐可謂遇其時也竝中年即世遠志未申惜哉惠德本以果毅知名而能率由孝道難矣圗史所歎何以加焉勇者不必有仁斯不然矣周書卷十七
