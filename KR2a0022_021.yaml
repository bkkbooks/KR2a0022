body:
  text: 周書卷二十一唐令狐德棻等撰列傳第十三尉遲迥王謙司馬消難尉遲迥字薄居羅代人也其先魏之别種號尉遲部因而姓焉父俟兜性宏裕有鑒識尚太祖姊昌樂大長公主生迥及綱俟兜病且卒呼二子撫其首曰汝等並有貴相但恨吾不見爾各宜勉之迥少聰敏美容儀及長有大志好施愛士稍遷大丞相帳內都督尚魏文帝女金明公主拜駙馬都尉從太祖復𢎞農破沙苑皆有功纍遷尚書左僕射兼領軍將軍迥通敏有幹能雖任兼文武頗允時望太祖以此深委仗焉後拜大將軍侯景之渡江梁元帝時鎮江陵既以內難方殷請修鄰好其弟武陵王紀在蜀稱帝率衆東下將攻之梁元帝大懼乃移書請救又請伐蜀太祖曰蜀可圖矣取蜀制梁在兹一舉乃與羣公㑹議諸將多有異同唯迥以為紀既盡鋭東下蜀必空虛王師臨之必有征無戰太祖深以為然謂迥曰伐蜀之事一以委汝計將安出迥曰蜀與中國隔絶百有餘年恃其山川險阻不虞我師之至宜以精甲鋭騎星夜襲之平路則倍道兼行險途則緩兵漸進出其不意衝其腹心蜀人既駭官軍之臨速必望風不守矣於是乃令迥督開府元珍乙弗亞万俟吕陵始叱奴興綦連宇文升等六軍甲士一萬二千騎萬匹伐蜀以魏廢帝二年春自散關由固道出白馬趣晉夀開平林舊道前軍臨劒閣紀安州刺史樂廣以州先降紀梁州刺史楊乾運時鎮潼州又降六月迥至潼州大饗將士引之而西紀益州刺史蕭撝不敢戰遂嬰城自守進軍圍之初紀至巴郡聞迥來侵遣譙淹回師為撝外援迥分遣元珍乙弗亞等以輕騎破之遂降撝前後戰數十合皆為迥所破撝與紀子宜都王肅及其文武官屬詣軍門請見迥以禮接之其吏人等各令復業唯收僮𨽻及儲積以賞將士號令嚴肅軍無私焉詔迥為大都督益潼等十八州諸軍事益州刺史以平蜀功封一子為公自劒閣以南得承制封拜及黜陟迥乃明賞罰布恩威綏輯新邦經略未附夷夏懷而歸之迥性至孝色養不怠身雖在外所得四時甘脆必先薦奉然後敢嘗大長公主年髙多病迥往在京師每朝退參候起居憂形於容色大長公主每為之和顔進食以寧迥之心太祖知其至性徴迥入朝以慰其母意遣大鴻臚郊勞仍賜迥衮冕之服蜀人思之立碑頌德孝閔踐阼進位柱國大將軍又以迥有平蜀之功同霍去病冠軍之義封寧蜀公進蜀公爵邑萬户宣帝即位以迥為大前疑出為相州總管宣帝崩隋文帝輔政以迥望位夙重懼為異圖乃令迥子魏安公惇齎詔書以㑹葬徴迥尋以鄖公韋孝寬代迥為總管迥以隋文帝當權將圖篡奪遂謀舉兵留惇而不受代隋文帝又使候正破六汗裒詣迥喻㫖密與總管府長史晉昶等書令為之備迥聞之殺長史及裒乃集文武士庶登城北樓而令之曰楊堅以凡庸之才藉后父之勢挾幼主而令天下威福自已賞罰無章不臣之迹暴於行路吾居將相與國舅甥同休共戚義由一體先帝處吾於此本欲寄以安危今欲與卿等糾合義勇匡國庇人進可以享榮名退可以終臣節卿等以為何如於是衆咸從命莫不感激乃自稱大總管承制署置官司于時趙王招已入朝留少子在國迥又奉以號令迥弟子勤時為青州總管亦從迥迥所管相衛黎毛洺貝趙冀瀛滄勤所統青膠光莒諸州皆從之衆數十萬榮州刺史邵國公宇文胄申州刺史李惠東楚州刺史費也利進東潼州刺史曹孝逹各據州以應迥迥又北結髙寶寧以通突厥南連陳人許割江淮之地隋文帝於是徴兵討迥即以韋孝寬為元帥惇率衆十萬入武德軍於沁東孝寬等諸軍隔水相持不進隋文帝又遣髙熲馳驛督戰惇布兵二十里麾軍小却欲待孝寬軍半度擊之孝寬因其小却鳴鼓齊進惇大敗孝寬乘勝進至鄴迥與子惇祐等又悉其卒十三萬陳於城南迥别統萬人皆緑巾錦襖號曰黃龍兵勤率衆五萬自青州赴迥以三千騎先到迥舊習軍旅雖老猶被甲臨陳其麾下千兵皆關中人為之力戰孝寬等軍失利而却鄴中士女觀者如堵髙熲與李詢整陳先犯觀者因其擾而乘之迥大敗遂入鄴迥走保北城孝寬縱兵圍之李詢賀樓子幹以其屬先登迥上樓射殺數人乃自殺勤惇祐東走并追獲之餘衆月餘皆斬之迥末年衰耄惑於後妻王氏而諸子多不睦以開府小御正崔達拏為長史餘委任亦多用齊人達拿文士無籌略舉措多失綱紀不能有所匡救迥自起兵至敗六十八日武德中迥從孫庫部員外郎耆福上表請改葬朝議以迥忠於周室有詔許之王謙字勑萬太保雄之子也性恭謹無他才能以父功纍遷驃騎大將軍開府孝閔踐祚治右小武伯雄從晉公護東討為齊人所斃朝議以謙父殞身行陳特加殊寵乃授謙柱國大將軍以情禮未終固辭不拜髙祖手詔奪情襲爵庸公邑萬户後皇太子討吐谷渾力戰有功是時髙祖東征謙又力戰進上柱國益州總管時謙令司録賀若昂奉表詣闕昂還具陳京師事勢謙以世受國恩將圖匡復遂舉兵署官司所管益潼新始龍卭青瀘戎寧汶陵遂合楚資眉普十八州及嘉渝臨渠蓬隆通興武庸十州之人多從之總管長史乙弗䖍益州刺史逹奚惎勸謙據險觀變隆州刺史阿史那瓌為謙畫三䇿曰公親率精鋭直指散關蜀人知公有勤王之節必當各思效命此上策也出兵梁漢以顧天下此中䇿也坐守劒南發兵自衛此下䇿也謙參用其中下之䇿梁睿未至大劒謙遣兵鎮始州隋文即以睿為行軍元帥便發利鳳文秦成諸州兵討之達奚惎乙弗虔等衆十萬攻利州聞睿至衆潰睿乘其弊縱兵深入惎䖍密使詣睿請為內應以贖罪謙不知之並令守成都謙先無籌略承藉父勳遂居重任初謀舉兵咸以地有江山之險進可以立功退可以自守且任用多非其才及聞睿兵奄至惶懼乃自率衆迎戰又以惎䖍之子為左右軍行數十里軍皆叛謙以二十騎奔新都縣令王寶斬之傳首京師惎䖍以成都降隋文以其首謀斬之阿史那瓌亦誅司馬消難字道融河內溫人父子如為齊神武佐命位至尚書令消難幼聰惠微涉經史好自矯飾以求名譽起家著作郎子如既當朝貴消難亦愛賓客邢子才王元景魏收陸卬崔贍等皆遊其門尋拜駙馬都尉光祿卿出為北豫州刺史齊文宣末年昏虐滋甚消難既懼禍及常有自全之謀曲意撫納頗為百姓所附屬文宣在并驛召其弟上黨王渙渙懼於屠害遂斬使者東奔數日間搜捕鄴中鄴中大擾後竟獲於濟州渙之初走朝士私相謂曰今上黨亡叛似赴成臯若與司馬北豫州連謀必為國患此言遂達於文宣文宣頗疑之消難懼密令所親裴藻間行入關請舉州來附晉公護遣逹奚武楊忠迎之消難遂與武俱入朝授大將軍滎陽公從髙祖東伐遷大後丞納女為靜帝后尋出為交州總管隋文帝輔政消難既聞蜀公迥不受代遂欲與迥合勢亦舉兵應之以開府田廣等為腹心殺總管長史侯莫陳杲䢵州刺史蔡澤等四十餘人所管䢵隨溫應士順沔環嶽九州魯山甑山沌陽應城平靖武陽上明須水八鎮並從之使其子泳質於陳以求援隋文帝命襄州總管王誼為元帥發荆襄兵以討之八月消難聞誼軍將至夜率其麾下歸於陳陳宣帝以為都督安趙九州八鎮車騎將軍司空隋公初楊忠之迎消難結為兄弟情好甚篤隋文每以叔禮事之及陳平消難至京特免死配為樂户經二旬放免猶被舊恩特蒙引見尋卒于家性貪淫輕於去就故世之言反覆者皆引消難云其妻髙氏齊神武之女在鄴敬重之後入關便相弃薄消難之赴卬州留髙及三子在京髙言於隋文曰滎陽公性多變詐今以新寵自隨必不顧妻子願防慮之消難入陳而髙母子因此獲免史臣曰尉遲迥地則舅甥職惟台衮沐恩纍葉荷眷一時居形勝之地受藩維之託顛而不扶憂責斯在及主威云謝鼎業將遷九服移心三靈改卜遂能志存赴蹈投袂稱兵忠君之勤未宣違天之禍便及校其心翟義葛誕之儔歟周書卷二十一周書卷二十一考證尉遲迥𫝊取蜀制梁梁諸本訛作勝今從北史於是乃令迥督開府元珍乙弗亞万俟吕陵始叱奴興綦連宇文升等六軍北史万俟吕陵始作侯吕陵始綦連作綦連雄遣譙淹回師為撝外援北史作遣前南梁州刺史史欣景幽州刺史趙拔扈等為撝外援與此不同撝與紀子宜都王肅北史王字下有圓字東楚州刺史費也利進北史進下有國字其麾下千兵北史無千字疑衍周書卷二十一考證
