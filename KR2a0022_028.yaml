body:
  text: 周書卷二十八唐令狐德棻等撰列傳第二十史寧陸騰賀若敦權景宣郭賢史寧字永和建康袁氏人也曾祖豫仕沮渠氏為臨松令魏平涼州祖灌隨例遷於撫寧鎮因家焉父遵初為征虜府鎧曹參軍屬杜洛周構逆六鎮自相屠陷遵遂率鄉里二千家奔恆州其後恆州為賊所敗遵復歸洛陽拜樓煩郡守及寧著勳追贈散騎常侍征西大將軍涼州刺史諡曰貞寧少以軍功拜别將遷直閣將軍都督宿衛禁中尋加持節征東將軍金紫光祿大夫賀拔勝為荆州刺史寧以本官為勝軍司率步騎一千隨勝之部值荆蠻騷動三鴉路絶寧先驅平之因撫慰蠻左翕然降附遂稅得馬一千五百匹供軍尋除南郢州刺史及勝為大行臺表寧為大都督率步騎一萬攻梁下溠戍破之封武平縣伯邑五百戶又攻拔梁齊興鎮等九城獲戶二萬而還未及論功屬魏孝武西遷東魏遣侯景率衆寇荆州寧隨勝奔梁梁武帝引寧至香磴前謂之曰觀卿風表終至富貴我當使卿衣錦還鄉寧答曰臣世荷魏恩位為列將天長喪亂本朝傾覆不能北面逆賊幸得息肩有道儻如明詔欣幸實多因涕泣橫流梁武為之動容在梁二年勝乃與寧密圖歸計寧曰朱異既為梁主所信任請往見之勝然其言寧乃見異申以投分之言微託思歸之意辭氣雅至異亦嗟挹謂寧曰桑梓之思其可忘懷當為奏聞必望遂所請耳未幾梁主果許勝等歸大統二年寧自梁歸闕進爵為侯增邑三百戶久之遷車騎將軍行涇州事時賊帥莫折後熾寇掠居民寧率州兵與行原州事李賢討破之轉通直散騎常侍東義州刺史東魏亦以故胡梨苟為東義州刺史寧僅得入州梨苟亦至寧迎擊破之斬其洛安郡守馮善道州既鄰接疆埸百姓流移寧留心撫慰咸來復業十二年轉涼州刺史寧未至而前刺史宇文仲和據州作亂詔遣獨孤信率兵與寧討之寧先至涼州為陳禍福城中吏民皆相率降附仲和仍據城不下尋亦克之加車騎大將軍儀同三司大都督涼西涼二州諸軍事散騎常侍涼州刺史十五年遷驃騎大將軍開府儀同三司加侍中進爵為公十六年宕昌叛羌獠甘作亂逐其王彌定而自立並連結傍乞鐵忽及鄭五醜等詔寧率軍與宇文貴豆盧寧等討之寧别擊獠甘而山路險阻才通單騎獠甘已分其黨立柵守險寧進兵攻之遂破其柵獠甘率三萬人逆戰寧復大破之追奔至宕昌獠甘將百騎走投生羌鞏亷玉彌定遂得復位寧以未獲獠甘密欲圖之乃揚聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌入吾術中當進兵擒之耳諸將思歸咸曰生羌聚散無常依據山谷今若追討恐引日無成且彌定還得守蕃將軍功已立矣獠甘勢弱彌定足能制之以此還師䇿之上者寧曰一日縱敵數世之患豈可捨將滅之寇更煩再舉人臣之禮知無不為以此諸君不足與計事也如更沮衆寧豈不能斬諸君邪遂進軍獠甘衆亦至與戰大破之生獲獠甘徇而斬之并執鞏亷玉送闕所得軍實悉分賞將士寧無私焉師還詔寧率所部鎮河陽寧先在涼州戎夷服其威惠遷鎮之後邊民並思慕之魏廢帝元年復除涼甘瓜三州諸軍事涼州刺史初茹茹與魏和親後更離叛尋為突厥所破殺其主阿那瓌部落逃逸者仍奉瓌之子孫抄掠河右寧率兵邀擊獲瓌子孫二人并其種落酋長自是每戰破之前後獲數萬人進爵安政郡公三年吐谷渾通使於齊寧擊獲之就拜大將軍寧後遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也時突厥木汗可汗假道涼州將襲吐渾太祖令寧率騎隨之軍至番禾吐渾已覺奔於南山木汗將分兵追之令俱會於青海寧謂木汙曰樹敦賀真二城是吐渾巢穴今若拔其本根餘種自然離散此上䇿也木汗從之即分為兩軍木汗從北道向賀真寧趣樹敦渾娑周國王率衆逆戰寧擊斬之踰山履險遂至樹敦敦是渾之舊都多諸珍藏而渾主先已奔賀真留其征南王及數千人固守寧進兵攻之退渾人果開門逐之因回兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寶盡歸諸突厥渾賀羅拔王依險為柵周回五十餘里欲塞寧路寧攻其柵破之俘斬萬計獲雜畜數萬頭木汗亦破賀真虜渾主妻子大獲珍物寧還軍於青海與木汗會木汗握寧手歎其勇決并遺所乘良馬令寧於帳前乘之木汗親自步送突厥以寧所圖必破皆畏憚之咸曰此中國神智人也及將班師木汗又遺寧奴婢一百口馬五百匹羊一萬口寧乃還州尋被徵入朝屬太祖崩寧悲慟不已乃請赴陵所盡哀并告行師克捷孝閔帝踐阼拜小司徒出為荆襄浙郢等五十二州及江陵鎮防諸軍事荆州刺史寧有識畫諳兵權臨敵指偽皆如其䇿甚得當時之譽及在荆州頗自奢縱貪濁不修法度嘗出有人訴州佐曲法寧還付被訟者治之自是有事者不復敢言聲名大損於西州保定三年卒於州諡曰烈子雄嗣雄字世武少勇敢膂力過人便弓馬有算略年十四從寧於牽屯山奉迎太祖仍從校獵弓無虗發太祖歎異之尋尚太祖女永富公主除使持節驃騎大將軍開府儀同三司纍遷駕部中大夫司馭中大夫從柱國枹罕公辛威鎮金城遂卒於軍時年二十四雄弟祥以父勳賜爵武遂縣公祥弟雲亦以父勳賜爵武平縣公歷位司織下大夫儀同大將軍雲弟威亦以父勳賜爵武當縣公陸騰字顯聖代人也髙祖俟魏征西大將軍東平王祖彌夏州刺史父旭性雅淡好老易緯候之學撰五星要訣及兩儀真圖頗得其指要太和中徵拜中書博士稍遷散騎常侍知天下將亂遂隱於太行山孝莊即位屢徵不起後贈并汾恆肆四州刺史騰少慷慨有大節解巾員外散騎侍郎司徒府中兵參軍爾朱榮入洛以騰為通直散騎侍郎帳內都督從平葛榮以功賜爵清河縣伯普泰初遷朱衣直閣尚安平主即東萊王貴平女也魏孝武幸貴平第見騰與語悅之謂貴平曰阿翁真得好壻即擢為通直散騎常侍及孝武西遷騰時使青州遂沒於鄴東魏興和初徵拜征西將軍領陽城郡守大統九年大軍東討以騰所據衝要遂先攻之時兵威甚盛長史麻休勸騰降不許拒守經月餘城陷被執太祖釋而禮之問其東間消息騰盛陳東州人物又敘述時事辭理抑揚太祖笑曰卿真不背本也即拜帳內大都督未幾除太子庶子遷武衛將軍既為太祖所知願立功效不求內職太祖嘉之十三年拜車騎大將軍儀同三司魏廢帝元年安康賊黃衆寶等作亂連結漢中衆數萬攻圍東梁州城中糧盡詔騰率軍自子午谷以援之騰乃星言就道至便與戰大破之軍還拜龍州刺史太祖謂騰曰今欲通江由路直出南奏卿宜善思經略騰曰必望臨機制變未敢預陳太祖曰此是卿取柱國之日卿其勉之即解所服金帶賜之州民李廣嗣李武等憑據巖險以為堡壁招集不逞之徒攻劫郡縣歷政不能治騰密令多造飛梯身率麾下夜往掩襲未明四面俱上遂破之執廣嗣等於鼓下其黨有任公欣者更聚徒衆圍逼州城乃語騰曰但免廣嗣及武即散兵請罪騰謂將士曰吾若不殺廣嗣等可謂隳軍實而長寇讐事之不可者也公欣𥪡子乃敢要人即斬廣嗣及武以首示之賊徒阻氣於是出兵奮擊盡獲之魏恭帝三年拜驃騎大將軍開府儀同三司轉江州刺史爵上庸縣公邑二千戶陵州木籠獠恃險粗獷每行抄劫詔騰討之獠既因山為城攻之未可拔騰遂於城下多設聲樂及諸雜伎示無戰心諸賊果棄其兵仗或擕妻子臨城觀樂騰知其無備密令衆軍俱上諸賊惶懼不知所為遂縱兵討擊盡破之斬首一萬級俘獲五千人世宗初陵眉戎江資卭新遂八州夷夏及合州民張瑜兄弟并反衆數萬人攻破郡縣騰率兵討之轉潼州刺史武成元年詔徵騰入朝世宗面勑之曰益州險逺非親勿居故令齊公作鎮卿之武略已著遐邇兵馬鎮防皆當委卿統攝於是徙隆州刺史隨憲入蜀及趙公招代憲復請留之保定元年遷隆州總管領刺史二年資州槃石民反殺郡守據險自守州軍不能制騰率軍討擊盡破斬之而蠻獠兵及所在蜂起山路險阻難得掩襲騰遂量山川形勢隨便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓溫舊道是年鐵山獠抄斷內江路使驛不通騰乃進軍討之欲至鐵山乃偽還師賊不以為虞遂不守備騰出其不意擊之應時奔潰一日下其三城斬其魁帥俘獲三千人招納降附者三萬戶帝以騰母在齊未令東討適有其親屬自東還朝者晉公護奉令偽告騰云齊為無道已誅公家母兄並從塗炭蓋欲發其怒也騰乃發哀泣血志在復讐四年齊公憲與晉公護東征請騰為副趙公招時在蜀復留之晉公護與招書曰今朝廷令齊公掃蕩河洛欲與此人同行汝彼無事且宜借吾也於是命騰馳傳入朝副憲東討五年拜司憲中大夫天和初信州蠻蛋據江峽反叛連結二千餘里自稱王侯殺刺史守令等又詔騰率軍討之騰乃先趣益州進驍勇之士兼具樓船沿外江而下軍至湯口分道奮擊所向摧破乃築京觀以旌武功語在蠻傳涪陵郡守藺休祖又據楚向臨容開信等州地方二千餘里阻兵為亂復詔騰討之初與大戰斬首二千餘級俘獲千餘人當時雖摧其鋒而賊衆既多自夏及秋無日不戰師老糧盡遂停軍集市更思方略賊見騰不出四面競前騰乃激勵其衆士皆爭奮復攻拔其魚令城大獲糧儲以充軍實又破銅盤等七柵前後斬獲四千人并船艦等又築臨州集市二城以鎮遏之騰自在龍州至是前後破平諸賊凡賞得奴婢八百口馬牛稱是於是巴蜀悉定詔令樹碑紀績焉四年遷江陵總管陳遣其將章昭逹率衆五萬船艦二千圍江陵衛王直聞有陳寇遣大將軍趙誾李遷哲等率步騎赴之並受騰節度時遷哲等守外城陳將程文季雷道勤夜來掩襲遷哲等驚亂不能抗禦騰夜遣開門出甲士奮擊大破之陳人奔潰道勤中流矢而斃虜獲二百餘人陳人又決龍川寧邦堤引水灌江陵城騰親率將士戰於西堤破之斬首數千級陳人乃遁六年進位柱國進爵上庸郡公增邑通前三千五百戶建德二年徵拜大司空尋出為涇州總管宣政元年冬薨於京師贈本官加并汾等五州刺史重贈大後丞諡曰定子玄嗣玄字士鑒騰入關時年始七嵗仕齊為奉朝請歷成平縣令齊平髙祖見玄特加勞勉即拜地官府都上士大象末為隋文相府內兵參軍玄弟融字士傾最知名少歷顯職大象中位至大將軍定陵縣公賀若敦代人也父統為東魏潁州長史大統二年執刺史田迅以州降至長安魏文帝謂統曰卿自潁川從我何日能忘即拜右衛將軍散騎常侍兗州刺史賜爵當亭縣公尋除北雍州刺史卒贈侍中燕朔恆三州刺史司空公諡曰哀敦少有氣幹善騎射統之謀執迅也慮事不果又以纍弱既多難以自拔沉吟者久之敦時年十七乃進䇿曰大人往事葛榮巳為將帥後入爾朱禮遇猶重韓陵之役屈節髙歡既非故人又無功效今日委任無異於前者正以天下未定方藉英雄之力一旦清平豈有相容之理以敦愚計恐將來有危亡之憂願思全身逺害不得有所顧念也統乃流涕從之遂定謀歸太祖時羣盜蜂起各據山谷大龜山賊張世顯潛來襲統敦挺身赴戰手斬七八人賊乃退走統大悅謂左右僚屬曰我少從軍旅戰陳非一如此兒年時膽略者未見其人非唯成我門戶亦當為國名將明年從河內公獨孤信於洛陽被圍敦彎弓三射箭不虗發信大奇之乃言於太祖太祖異之引置麾下授都督封安陵縣伯邑四百戶嘗從太祖校獵於甘泉宫時圍人不齊獸多逃逸太祖大怒人皆股戰圍內唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦棄馬步逐至山半便掣之而下太祖大悅諸將因得免責纍遷太子庶子撫軍將軍通直散騎常侍大都督車騎大將軍散騎常侍儀同三司進爵廣鄉縣侯敦既有武藝太祖恆欲以將帥任之魏廢帝二年拜右衛將軍俄加驃騎大將軍開府儀同三司進爵為公時岷蜀𥘉開民情尚梗巴西人譙淹據南梁州與梁西江州刺史王開業共為表裏扇動羣蠻太祖令敦率軍討之山路艱險人迹罕至敦身先將士攀木緣崖倍道兼行乘其不意又遣儀同扶猛破其别帥向鎮侯於白帝淹乃與開業并其黨泉玉成侯造等率衆七千口纍三萬自墊江而下就梁王琳敦邀擊破之淹復依山立柵南引蠻帥向白彪為援敦設反間離其黨與因其懈怠復破之斬淹盡俘其衆進爵武都公增邑通前一千七百戶拜典祀中大夫尋出為金州都督七州諸軍事金州刺史向白彪又與蠻帥向五子等聚衆為寇圍逼信州詔敦與開府田𢎞赴救未至而城已陷進與白彪等戰破之俘斬二千人仍進軍追討遂平信州是嵗荆州蠻帥文子榮自號仁州刺史擁逼土人據沮漳為逆復令敦與開府潘招討之擒子榮并虜其衆武成元年入為軍司馬自江陵平後巴湘之地並內屬每遣梁人守之至是陳將侯填侯安都等圍逼湘州遏絶糧援乃令敦率步騎六千度江赴救瑱等以敦孤軍深入規欲取之敦每設奇伏連戰破瑱乘勝徑進遂次湘州因此輕敵不以為虞俄而霖雨不已秋水泛溢陳人濟師江路遂斷糧援既絶人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營內多為土聚覆之以米集諸營軍士人各持囊遣官司部分若欲給糧者因召側近村民陽有所訪問令於營外遙見隨即遣之瑱等聞之良以為實乃據守要險欲曠日以老敦師敦又增修營壘造廬舍示以持久湘羅之間遂廢農業瑱等無如之何初土人亟乘輕船載米粟及籠雞鴨以餉瑱軍敦患之乃偽為土人裝船伏甲士於中瑱兵人望見謂餉船之至逆來爭取敦甲士出而擒之敦軍數有叛人乘馬投瑱者輒納之敦又别取一馬牽以趣船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人以招瑱軍詐稱投附瑱便遣兵迎接競來牽馬馬既畏船不上敦發伏掩之盡殪此後實有饋餉及亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持嵗餘瑱等不能制求借船送敦度江敦慮其或詐拒而弗許瑱復遣使謂敦曰驃騎在此既久今欲給船相送何為不去敦報云湘州是我國家之地為爾侵逼敦來之日欲相平殄既未得一決所以不去瑱後日復遣使來敦謂使者云必須我還可舍我百里當為汝去瑱等留船於江將兵去津路百里敦覘知非詐徐理舟楫勒衆而還在軍病死者十五六晉公護以敦失地無功除名為民保定二年拜工部中大夫尋出為金州總管七州諸軍事金州刺史三年從柱國楊忠引突厥破齊長城至并州而還以敦為殿别封一子順義縣公邑一千戶五年除中州刺史鎮函谷敦恃功負氣顧其流輩皆為大將軍敦獨未得兼以湘州之役全軍而反不蒙旌賞翻𬒳除名每懷怨怒屬有臺使至乃出怨言晉公護怒遂徴敦還逼令自殺時年四十九建德初追贈大將軍諡曰烈子弼有文武材略大象末位至開府儀同大將軍揚州刺史襄邑縣公敦弟誼亦知名官至柱國海陵縣公權景宣字暉逺天水顯親人也父曇騰魏隴西郡守贈秦州刺史景宣少聰悟有氣俠宗黨皆歎異之年十七魏行臺蕭寶夤見而奇之表為輕車將軍及寶夤敗景宣歸鄉里太祖平隴右擢為行臺郎中魏孝武西遷授鎮逺將軍步兵校尉加平西將軍秦州大中正大統初轉祠部郎中景宣曉兵權有智略從太祖拔𢎞農破沙苑皆先登陷陳轉外兵郎中從開府于謹援洛陽景宣督課糧儲軍以周濟時初復洛陽將修繕宫室景宣率徒三千先出採運會東魏兵至司州牧元季海等以衆少拔還屬城悉叛道路擁塞景宣將二十騎且戰且走從騎略盡景宣輕馬突圍手斬數級馳而獲免因投民家自匿景宣以久藏非計乃偽作太祖書招募得五百餘人保據宜陽聲言大軍續至東魏將假琛等率衆至九曲憚景宣不敢進景宣恐琛審其虗實乃將腹心自隨詐云迎軍因得西遁與儀同李延孫相會攻孔城洛陽以南尋亦來附太祖即留景宣守張白塢節度東南義軍東魏將王元凱入洛景宣與延孫等擊走之以功授大行臺右丞進屯宜陽攻襄城拔之獲郡守王洪顯俘斬五百餘人太祖嘉之徵入朝録前後功封顯親縣男邑三百戶除南陽郡守郡鄰敵境舊制發民守防三十五處多廢農桑而姦宄猶作景宣至並除之唯修起城樓多備器械寇盜斂迹民得肄業百姓稱之立碑頌德太祖特賞粟帛以旌其能遷廣州刺史侯景舉河南來附景宣從僕射王思政經略應接既而侯景南叛恐東魏復有其地以景宣為大都督豫州刺史鎮樂口東魏亦遣張伯德為刺史伯德令其將劉貴平率其戍卒及山蠻屢來攻逼景宣兵不滿千人隨機奮擊前後擒斬三千餘級貴平乃退走進授使持節車騎大將軍儀同三司潁川陷後太祖以樂口等諸城道路阻絶悉令拔還襄州刺史把秀以狼狽得罪景宣號令嚴明戎旅整肅所部全濟獨被優賞仍留鎮荆州委以鴉南之事初梁嶽陽王蕭察將以襄陽歸朝仍勒兵攻梁元帝於江陵察叛將杜岸乘虗襲之景宣乃率騎三千助察破岸察因是乃送其妻王氏及子嶚入質景宣又與開府楊忠取梁將柳仲禮拔安陸隨郡久之隨州城民吳士英等殺刺史黃道玉因聚為寇景宣以英等小賊可以計取之若聲其罪恐同惡者衆乃與英書偽稱道玉凶暴歸功英等英果信之遂相率而至景宣執而戮之散其黨與進攻應城拔之獲夏侯珍洽於是應禮安隨並平朝議以景宣威行南服乃授并安肆郢新應六州諸軍事并州刺史尋進驃騎大將軍開府儀同三司加侍中兼督江北司二州諸軍事進爵為伯邑五百戶唐州蠻田魯嘉自號豫州伯引致齊兵大為民患景宣又破之獲魯嘉以其地為郡轉安州刺史梁定州刺史李洪逺初欵後叛景宣惡其懷二密襲破之虜其家口及部衆洪逺脫身走免自是酋帥懾服無敢叛者燕公于謹征江陵景宣别破梁司空陸法和司馬羊亮於溳水又遣别帥攻拔魯山多造舟艦益張旗幟臨江欲度以懼梁人梁將王琳在湘州景宣遺之書諭以禍福琳遂遣長史席壑因景宣請舉州欵附孝閔帝踐阼徵為司憲中大夫尋除基鄀硤平四州五防諸軍事江陵防主加大將軍保定四年晉公護東討景宣别討河南齊豫州刺史王士良永州刺史蕭世怡並以城降景宣以開府謝徹守永州開府郭彥守豫州以士良世怡及降卒一千人歸諸京師尋而洛陽不守乃棄二州拔其將士而還至昌州而羅陽蠻反景宣回軍破之斬首千級獲生口二千雜畜千頭送闕還次灞上晉公護親迎勞之天和初授荆州總管十七州諸軍事荆州刺史進爵千金郡公陳湘州刺史華皎舉州欵附表請援兵勑景宣統水軍與皎俱下景宣到夏口陳人已至而景宣以任遇隆重遂驕傲恣縱多自矜伐兼納賄貨指麾節度朝出夕改將士憤怒莫肯用命及水軍始交一時奔北船艦器仗略無孑遺時衛公直總督諸軍以景宣負敗欲繩以軍法朝廷不忍加罪遣使就軍赦之尋遇疾卒贈河渭鄯三州刺史諡曰恭子如璋嗣位至開府膠州刺史如漳弟如玖儀同大將軍廣川縣侯景宣之去樂口南荆州刺史郭賢據魯陽以拒東魏賢字道因趙興陽州人也父雲涼州司馬賢性強記學涉經史魏正光末賊帥宿勤明達圍逼豳州刺史畢暉輔賢統軍與之拒守後為州主簿行北地郡事以征討有功授都督大統二年齊神武襲陷夏州太祖慮其南下與朝臣議之賢進曰髙歡兵士雖衆智勇已竭䇿其舉措必不敢逺來昔賀拔公初薨關中振駭而歡不能因利乘便進取雍州是其無智及鑾駕西遷六軍寡弱毛鴻賓喪敗關門不守又不能乘此危機以要一戰是其無勇今上下同心士民戮力歡志沮喪寧敢送死且豳夏荒阻千里無煙縱欲南侵資糧莫繼以此而言不來必矣齊神武後果退如賢所䇿尋加伏波將軍從王思政鎮𢎞農授使持節行義州事當州都督轉行𢎞農郡事賢質直有算略思政甚重之禦邊之謀多與賢參決十二年除輔國將軍南州刺史及侯景來附思政遣賢先出三鴉鎮於魯陽加大都督封安武縣子邑四百戶尋進車騎大將軍儀同三司加散騎常侍及潁川被圍東魏遣蠻首魯和扇動羣蠻規斷鴉路和乃遣其從弟與和為漢廣郡守率其部曲侵擾州境賢密簡士馬輕往掩襲大破之遂擒魯和既而潁川陷權景宣等並拔軍西遷自魯陽以東皆附東魏將彭樂因之遂來攻逼賢撫循將士咸為盡其力用樂不能克乃引軍退而東魏又以土民韋默兒為義州刺史鎮父城以逼賢賢又率軍攻默兒擒之轉廣州刺史後從尉遲迥伐蜀行安州事魏恭帝元年行寧蜀郡事兼益州長史以平蜀勳進爵為伯增邑五百戶轉行始州事孝閔帝踐阼進位驃騎大將軍開府儀同三司進爵為侯增邑通前一千四百戶世宗初除迎師中大夫尋出為勳州刺史鎮玉壁武成二年遷安應等十二州諸軍事安州刺史進爵樂昌縣公賢在官雖無明察之譽以亷平待物去後頗亦見思保定三年轉陜州刺史天和元年卒於位贈少保寧蔚朔三州刺史諡曰節賢衣服飲食雖以儉約自處而居家豐麗室有餘資時論譏其詐云子正嗣史臣曰昔耿恭抗徑虜於疏勒馬敦拒羣兵於汧城雖以生易死終賴王師之助其嘉聲峻節亦見稱於良史焉賀若敦志節慷慨深入敵境勍敵絶其糧道長江阻其歸塗勢危而䇿出無方事迫而雄心彌厲故能使士卒感其義敵人畏其威利涉死地全師而返非夫忘生以徇國者其孰能若此者乎俯窺元定之傳曾糞土之不若也誠宜裂地以賞之分職以授之而茂勳莫紀嚴刑已及嗟乎政之紕繆一至於此天下是以知宇文護不能終其位焉史寧權景宣並以將帥之才受內外之寵總戎薄伐著剋敵之功布政蒞民垂稱職之譽若此者豈非有國之良翰歟然而史在末年貨財虧其雅志權亦晚節矜驕喪其威聲傳曰終之實難其斯之謂矣陸騰志氣凛然雅仗名節及授戎律建藩麾席卷巴梁則功著銘典雲撤江漢則聲流帝籍身名俱劭其最優乎周書卷二十八周書卷二十八考證史寧傳遂至樹敦敦是渾之舊都北史云樹敦是渾之舊都脫一樹字寧進兵攻之退北史云寧進兵攻之偽退脫一偽字賀若敦傳復令敦與開府潘招討之潘招北史作假韶周書卷二十八考證
