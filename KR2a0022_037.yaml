body:
  text: 周書卷三十七唐令狐德棻等撰列傳第二十九寇儶韓褒趙肅徐招張軌李彥郭彥裴文舉髙賓尞允寇俊字祖俊上谷昌平人也祖讚魏南雍州刺史父臻安逺將軍郢州刺史俊性寬雅幼有識量好學強記兄祖訓祖禮及俊並有志行閨門雍睦白首同居父亡雖久而猶於平生所處堂宇備設帷帳几杖以時節列拜垂涕陳薦若宗廟焉吉凶之事必先啓告逺行往返亦如之性又廉恕不以財利為心家人曾賣物與人而剩得絹五匹俊於後知之乃曰惡木之隂不可暫息盜泉之水無容誤飲得財失行吾所不取遂訪主還之其雅志如此以選為魏孝文帝挽郎除奉朝請大乘賊起燕齊擾亂俊參護軍事東討以功授員外散騎侍郎遷尚書左民郎中以母憂不拜正光三年拜輕騎將軍遷揚烈將軍司空府功曹參軍轉主簿時靈太后臨朝減食祿官十分之一造永寧佛寺令俊典之資費巨萬主吏不能欺隱寺成又極壯麗靈太后嘉之除左軍將軍孝昌中朝議以國用不足乃置鹽池都將秩比上郡前後居職者多有侵隱乃以俊為之加龍驤將軍仍主簿永安初華州民史底與司徒楊椿訟田長史以下以椿勢貴皆言椿直欲以田給椿俊曰史底窮民楊公橫奪其地若欲損不足以給有餘見使雷同未敢聞命遂以地還史底孝莊帝後知之嘉俊守正不撓即拜司馬賜帛百匹其附椿者咸譴責焉二年出為左將軍涼州刺史民俗荒獷多為盜賊俊乃令郡縣立庠序勸其耕桑敦以禮讓數年之中風俗頓革梁遣其將曹琰之鎮魏興繼日版築琰之屢擾疆場邊人患之俊遣長史杜休道率兵攻克其城並擒琰之琰之即梁大將軍景宗之季弟也於是梁人憚焉屬魏室多故州又僻逺梁人知無外援遂遣大兵頓魏興志圖攻取俊撫勵將士人思效命梁人知其得衆心也弗之敢逼俊在州清苦不治産業秩滿其子等並徒步而還吏人送俊留連於道久之乃得出界大統二年東魏授俊洛州刺史俊因此乃謀歸闕五年將家及親屬四百餘口入關拜祕書監時軍國草創墳典散逸俊始選置令史抄集經籍四部羣書稍得周備加鎮東將軍封西安縣男邑二百户十七年除車騎大將軍儀同三司加散騎常侍俊以年老乞骸骨太祖弗許遂稱疾篤不復朝覲魏恭帝三年賜姓若口引氏孝閔帝踐祚進爵為子增邑五百户武成元年進驃騎大將軍開府儀同三司增邑並前二千户俊年齒雖邁而志識未衰教授子孫必先禮典世宗尚儒重道特欽賞之數加恩錫思與相見俊不得已乃入朝世宗與同席而坐因顧訪洛陽故事俊身長八尺鬚鬢皓然容止端詳音韻清朗帝與之談論不覺屢為前膝及俊辭還帝親執其手曰公年德俱尊朕所欽尚乞言之事所望於公宜數相見以慰虛想以御輿令於帝前乘出顧謂左右曰如此之事唯積善者可以致之何止見重於今亦將傳之萬古時人咸以為榮保定三年卒時年八十髙祖歎惜之贈本官加冀定瀛三州諸軍事冀州刺史諡曰元俊篤於仁義期功之有孤者衣食豐約俱與之同少為司徒崔光所知光命其子勵與俊結友俊每造光常清言移日小宗伯盧辨以俊業行俱崇待以師友之禮每有間暇輒詣俊宴語彌日恆謂人曰不見西安君煩憂不遣其為通人所敬重如此子奉位至儀同三司大將軍順陽郡守洵州刺史昌國縣公奉弟顒少好學最知名居喪哀毁歷官儀同大將軍掌朝布憲典祀下大夫小納言濩澤郡公韓褒字𢎞業其先潁川潁陽人也徙居昌黎祖瓌魏鎮西將軍平涼郡守安定郡公父演征虜將軍中散大夫恆州刺史褒少有志尚好學而不守章句其師怪而問之對曰文字之間常奉訓誘至於商較異同請從所好師因此大竒之及長涉獵經史深沉有逺略魏建明中起家奉朝請加強弩將軍遷大中大夫屬魏室喪亂褒避地於夏州時太祖為刺史素聞其名待以客禮及賀拔嶽為侯莫陳悅所害諸將遣使迎太祖太祖問以去留之計褒曰方今王室凌遲海內鼎沸使君天資英武恩結士心賀拔公奄及於難物情危駭寇洛自知庸懦委身而託使君若總兵權據有關中之地此天授也何疑乎且侯莫陳悅亂常速禍乃不乘勝進取平涼反自遁逃屯營洛水斯乃井中蛙耳使君往必擒之不世之勳在斯一舉時者難得而易失誠願使君圖之太祖納焉太祖為丞相引褒為録事參軍賜姓侯吕陵氏大統初遷行臺左丞賜爵三水縣伯尋轉丞相府屬加中軍將軍銀青光祿大夫二年梁人北寇商洛東魏復侵樊鄧於是以褒為鎮南將軍丞相府從事中郎出鎮浙酈居二年徴拜丞相府司馬進爵為侯出為北雍州刺史加衛大將軍州帶北山多有盜賊褒密訪之並豪右所為也而陽不之知厚加禮遇謂之曰刺史起自書生安知督盜所賴卿等共分其憂耳乃悉召桀黠少年素為鄉里患者署為主帥分其地界有盜發而不獲者以故縱論於是諸被署者莫不惶懼皆首伏曰前盜發者並某等為之所有徒侣皆列其姓名或亡命隱匿者亦悉言其所在褒乃取盜名簿藏之因大榜州門曰自知行盜者可急來首即除其罪盡今月不首者顯戮其身籍沒妻子以賞前首者旬日之間諸盜咸悉首盡褒取名簿勘之一無差異並原其罪許以自新由是羣盜屏息入為給事黃門侍郎九年遷侍中十二年除都督西涼州刺史羌胡之俗輕貧弱尚豪富豪富之家侵漁小民同於僕𨽻故貧者日削豪者益富褒乃悉募貧人以充兵士優復其家蠲免徭賦又調富人財物以振給之每西域商貨至又先盡貧者市之於是貧富漸均户口殷實十六年加大都督涼州諸軍事魏廢帝元年轉會州刺史二年進位車騎大將軍儀同三司尋加驃騎大將軍開府儀同三司進爵為公武成三年徴拜御伯中大夫保定二年轉司會三年出為汾州刺史州界北接太原當千里徑先是齊寇數入民廢耕桑前後刺史莫能防扞褒至適會寇來褒乃不下屬縣人既不及設備以故多被抄掠齊人喜相謂曰汾州不覺吾至先未集兵今者之還必莫能追躡我矣由是益懈不為營壘褒已先勒精鋭伏北山中分據險阻邀其歸路乘其衆怠縱伏擊之盡獲其衆故事獲生口者並囚送京師褒因是奏曰所獲賊衆不足為多俘而辱之但益其忿耳請一切放還以德報怨有詔許焉自此抄兵頗息四年遷河洮封三州諸軍事河州總管天和三年轉鳳州刺史尋以年老請致仕詔許之五年拜少保褒歷事三帝以忠厚見知髙祖深相敬重常以師道處之每入朝見必有詔令坐然後始與論政事七年卒贈涇岐燕三州刺史諡曰貞子繼伯嗣趙肅字慶雍河南洛陽人也世居河西及沮渠氏滅曾祖武始歸於魏賜爵金城侯祖興中書博士父申侯舉秀才後軍府主簿肅早有操行知名於時魏正光五年酈元為河南尹辟肅為主簿孝昌中起家殿中侍御史加威烈將軍奉朝請員外散騎侍郎尋除直後轉直寢永安初授廷尉天平二年轉監後以母憂去職起為廷尉正以疾免久之授征虜將軍中散大夫遷左將軍大中大夫東魏天平初除新安郡守秩滿還洛大統三年獨孤信東討肅率宗人為鄉導授司州治中轉别駕監督糧儲軍用不匱太祖聞之謂人曰趙肅可謂洛陽主人也七年加鎮南將軍金紫光祿大夫都督仍别駕領所部義徒據守大塢又兼行臺左丞東道慰勞九年行華山郡事十三年除廷尉少卿明年元日當行朝禮非有封爵者不得預焉肅時未有茅土左僕射長孫儉白太祖請之太祖乃召肅謂曰嵗初行禮豈得使卿不預然何為不早言也於是令肅自選封名肅曰河清乃太平之應竊所願也於是封清河縣子邑三百户十六年除廷尉卿加征東將軍肅久在理官執心平允凡所處斷咸得其情廉慎自居不營産業時人以此稱之十七年進位車騎大將軍儀同三司散騎常侍賜姓乙弗氏先是太祖命肅撰定法律肅積思纍年遂感心疾去職卒於家子正禮齊王憲府屬大都督新安郡守時有髙平徐招少好法律發言措筆常欲辨析秋毫歷職內外有當官之譽從魏孝武入關為給事黃門侍郎尚書右丞時朝廷播遷典章有闕至於臺閣軌儀多招所參定論者稱之尋遷侍中度支尚書大統初卒張軌字元軌濟北臨邑人也父崇髙平令軌少好學志識開朗初在洛陽家貧與樂安孫樹仁為莫逆之友每易衣而出以此見稱永安中隨爾朱榮擊元皓除討寇將軍奉朝請軌常謂所親曰秦雍之間必有王者爾朱氏敗後遂杖䇿入關賀拔嶽以軌為記室參軍典機務尋轉倉曹加鎮逺將軍時榖糴湧貴或有請貸官倉者軌曰以私害公非吾宿志濟人之難詎得相違乃賣所服衣物糴粟以賑其乏及嶽被害太祖以軌為都督從征侯莫陳恱恱平使於洛陽見領軍斛斯椿椿曰髙歡逆謀已傳行路人情西望以日為年未知宇文何如賀拔也軌曰宇文公文足經國武可定亂至於髙識逺度非愚管所測椿曰誠如卿言真可恃也太祖為行臺授軌郎中魏孝武西遷除中書舍人封夀張縣子邑三百户加左將軍濟州大中正兼著作佐郎修起居注遷給事黃門侍郎兼吏部郎中六年出為河北郡守在郡三年聲績甚著臨人治術有循吏之美大統間宰人者多推尚之入為丞相府從事中郎行武功郡事章武公導出鎮泰州以軌為長史加撫軍將軍大都督通直散騎常侍魏廢帝元年進車騎大將軍儀同三司散騎常侍二年賜姓宇文氏行南秦州事魏恭帝二年徴拜度支尚書復除隴右府長史卒於位時年五十五諡曰質軌性清素臨終之日家無餘財唯有素書數百卷子肅世宗初為宣納上士轉中外府記室參軍中山公訓侍讀早有才名性頗輕猾時人比之魏諷卒以罪考竟終李彥字彥士梁郡下邑人也祖先之魏淮南郡守父靜南青州刺史彥少有節操好學慕古為鄉閭之所敬憚孝昌中解褐奉朝請加輕車將軍從魏孝武入關兼著作佐郎修起居注加寧朔將軍進號冠軍將軍中散大夫遷平東將軍大中大夫大統初除通直散騎侍郎三年拜安東將軍銀青光祿大夫太保轉太傅長史儀曹郎中左民郎中十二年省三十六曹為十二部改授民部郎中封平陽縣子邑三百户十五年進號中軍將軍兼尚書左丞領選部大軍東討加持節大都督通直散騎常侍掌留臺事魏廢帝初拜尚書右丞轉左丞彥在尚書十有五載屬軍國草創庶務殷繁留心省閲未嘗懈怠斷決如流略無疑滯臺閣莫不歎其公勤服其明察遷給事黃門侍郎仍左丞尋進車騎大將軍儀同三司賜姓宇文氏出為鄜州刺史彥以東夏未平固辭州任詔許之拜兵部尚書加驃騎大將軍開府儀同三司仍兼著作六官建改授軍司馬進爵為伯彥性謙恭有禮節雖居顯要於親黨之間恂恂如也輕財重義好施愛士時論以此稱之然素多疾而勤於蒞職雖沉頓枕席猶理務不輟遂至於卒時年四十六諡曰敬彥臨終遺誡其子等曰昔人以窽木為櫝葛虆為緘下不亂泉上不泄臭此實吾平生之志也但事既矯枉恐為世士所譏今可斂以時服葬於墝塉之地勿用明器芻塗及儀衛等爾其念之朝廷嘉焉不奪其志子升明嗣少歷顯職大象末太府中大夫儀同大將軍郭彥太原陽曲人也其先從宦關右遂居馮翊父胤郡功曹靈武令彥少知名太祖臨雍州辟為西曹書佐尋除開府儀同主簿轉司空記室太尉府屬遷虞部郎中大統十二年初選當州首望統領鄉兵除帥都督持節平東將軍以居郎官著稱封龍門縣子邑三百户進大都督遷車騎大將軍儀同三司司農卿是時岷州羌酋傍乞鐡忽與鄭五醜等寇擾西服彥從大將軍宇文貴討平之魏恭帝元年除兵部尚書仍以本兵從柱國于謹南伐江陵進驃騎大將軍開府儀同三司增邑五百户進爵為伯六官建拜民部中大夫孝閔帝踐祚出為澧州刺史蠻左生梗未遵朝憲至於賦稅違命者多聚散無恆不營農業彥勸以耕稼禁其遊獵民皆務本家有餘糧亡命之徒咸從賦役先是以澧州糧儲乏少每令荆州遞送自彥蒞職倉庾充實無復轉輸之勞齊南安城主馮顯密遣使歸降其衆未之知也柱國宇文貴令彥率兵應接齊人先令顯率所部送糧南下彥懼其衆不從命乃於路邀之顯因得自拔其衆果拒戰彥縱兵奮擊並虜獲之以南安無備即引軍掩襲顯外兵參軍鄒紹既為彥所獲因請為鄉導彥遂夜至城下令紹詐稱顯歸門者開門待之彥引兵而入遂有其城俘獲三千餘人晉公護嘉之進爵懷德縣公邑一千户以南安懸逺尋令班師及秩滿還朝民吏號泣送彥二百餘里尋為東道大使觀省風俗除蒲州總管府長史入為工部中大夫保定四年護東討彥從尉遲迥攻洛陽迥復令彥與權景宣南出汝潁及軍次豫州彥請攻之景宣以城守既嚴卒難攻取將欲南轅更圖經略彥以奉命出師須與大軍相接若向江畔立功更非朝廷本意固執不從兼畫攻取之計會其刺史王士良妻弟董逺秀密遣送欵景宣乃從於是引軍圍之士良遂出降仍以彥鎮豫州增邑六百户尋以洛陽班師亦棄而不守屬純州刺史樊舍卒其地既東接陳境俗兼蠻左初喪州將境內騷然朝議以彥威信著於東南便令鎮撫彥至吏人畏而愛之天和元年除益州總管府長史轉隴右總管府長史四年卒於位贈小司空宜鄜丹三州刺史裴文舉字道裕河東聞喜人也祖秀業魏中散大夫天水郡守贈平州刺史父邃性方嚴為州里所推挹解褐𣪚騎常侍奉車都尉纍遷諫議大夫司空從事中郎大統三年東魏來寇邃乃糾合鄉人分據險要以自固時東魏以正平為東雍州遣其將司馬恭鎮之每遣間人扇動百姓邃密遣都督韓僧明入城喻其將士即有五百餘人許為內應期日未至恭知之乃棄城夜走因是東雍遂內屬及李弼略地東境邃為之鄉導多所降下太祖嘉之特賞衣物封澄城縣子邑三百户進安東將軍銀青光祿大夫加散騎常侍太尉府司馬除正平郡守尋卒官贈儀同三司定州刺史文舉少忠謹涉獵經史大統十年起家奉朝請遷丞相府墨曹參軍時太祖諸子年幼盛簡賓友文舉以選與諸公子遊雅相欽敬未嘗戲狎遷威烈將軍著作郎中外府參軍事魏恭帝二年賜姓賀蘭氏孝閔帝踐祚襲爵澄城縣子齊公憲初開幕府以文舉為司録世宗初纍遷帥都督寧逺將軍大都督及憲出鎮劍南復以文舉為益州總管府中郎武成二年就加使持節車騎大將軍儀同三司蜀土沃饒商販百倍或有勸文舉以利者文舉答之曰利之為貴莫若安身身安則道隆非貨之謂是以不為非惡財也憲矜其貧窶每欲資給之文舉恆自謙遜辭多受少保定三年遷絳州刺史邃之往正平也以廉約自守每行春省俗單車而已及文舉臨州一遵其法百姓美而化之總管韋孝寬特相欽重每與談論不覺膝前於席天和初進驃騎大將軍開府儀同三司尋為孝寬柱國府司馬六年入為司憲中大夫進爵為公增邑通前一千户俄轉軍司馬建德二年又增邑七百户文舉少喪父其兄又在山東唯與弟璣幼相訓養友愛甚篤璣又早亡文舉撫視遺孤逾於已子時人以此稱之初文舉叔父季和為曲沃令卒於聞喜川而叔母韋氏卒於正平縣屬東西分隔韋氏墳壠在齊境及文舉在本州每加賞募齊人感其孝義潛相要結以韋氏柩西歸竟得合葬六年除南青州刺史宣政元年卒於位子胄嗣官至大都督早卒時有髙賓者歷官內外亦以幹用見稱賔渤海蓚人也其先因官北邊遂沒於遼左祖皓以魏太和初自遼東歸魏官至安定郡守衛尉卿父季安撫軍將軍兖州刺史賔少聰潁有文武幹用仕東魏歷官至龍驤將軍諫議大夫立義都督同列有忌其能者譛之於齊神武賔懼及於難大統六年乃棄家屬間行歸闕太祖嘉之授安東將軍銀青光祿大夫稍遷通直散騎常侍撫軍將軍大都督世宗初除咸陽郡守政存簡惠甚得民和世宗聞其能賜田園於郡境賔既羈旅歸國親屬在齊常慮見疑無以取信乃於所賜田內多蒔竹木盛構堂宇並鑿池沼以環之有終焉之志朝廷以此知無二焉加使持節車騎大將軍儀同三司散騎常侍賜姓獨孤氏武成元年除御正下大夫兼小載師出為益州總管府長史保定初徴拜計部中大夫治中外府從事中郎賜爵武陽縣伯賔敏於從政果敢決斷案牘雖繁綽有餘裕轉太府中大夫齊公憲府長史天和二年除鄀州諸軍事鄀州刺史進位驃騎大將軍開府儀同三司治襄州總管府司録六年卒於州時年六十八子熲為隋文帝佐命開皇中贈賔禮部尚書武陽公諡曰簡又有安定尞允本姓牛氏亦有器幹知名於時歷官侍中驃騎大將軍開府儀同三司工部尚書臨涇縣公賜姓宇文氏失其事故不為傳允子𢎞博學洽聞宣政中內史下大夫儀同大將軍大象末復姓牛氏史臣曰寇俊委質兩朝以儒素見重韓褒奉事三帝以忠厚知名趙肅平允當官張軌循良播美李彥譽流省閣郭彥信著蠻陬歷官外內並當時之選也文舉之在絳州世載清德辭多受少有廉讓之風焉周書卷三十七周書卷三十七考證史臣論此下南北監本俱有注云附髙賔贊缺臣文淳按賔乃附傳不必有贊今削之周書卷三十七考證
