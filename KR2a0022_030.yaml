body:
  text: 周書卷三十唐令狐德棻等撰列傳第二十二竇熾兄子毅于翼李穆竇熾字光成扶風平陵人也漢大鴻臚章十一世孫章子統靈帝時為鴈門太守避竇武之難亡奔丐奴遂為部落大人後魏南徙子孫因家於代賜姓紇豆陵氏纍世仕魏皆至大官父略平逺將軍以熾著勳贈少保柱國大將軍建昌公熾性嚴明有謀略美鬚髯身長八尺二寸少從范陽祈欣受毛詩左氏春秋略通大義善騎射膂力過人魏正光末北鎮擾亂熾乃隨略避地定州因沒於葛榮榮欲官略略不受榮疑其有異志遂留略於冀州將熾及熾兄善隨軍魏永安元年爾朱榮破葛榮熾乃將家隨榮於并州時葛榮别帥韓婁郝長衆數萬人據薊城不下以熾為都督從驃騎將軍侯深討之熾手斬婁以功拜揚烈將軍三年除員外散騎侍郎遷給事中建明元年加武厲將軍魏孝武即位茹茹等諸番竝遣使朝貢帝臨軒宴之有鴟飛鳴於殿前帝素知熾善射因欲示逺人乃給熾御箭兩隻命射之鴟乃應弦而落諸番人咸歎異焉帝大悅賜帛五十匹尋率兵隨東南道行臺樊子鵠追爾朱仲逺仲逺奔梁時梁主又遣元樹入寇攻陷譙城遂據之子鵠令熾率騎兵擊破之封行唐縣子邑五百戶尋拜直閣將軍銀青光祿大夫領華騮令進爵上洛縣伯邑一千戶時帝與齊神武搆隙以熾有威重堪處爪牙之任拜閣內大都督遷撫軍將軍朱衣直閣遂從帝西遷仍與其兄善重至城下與武衛將軍髙金龍戰於千秋門敗之因入宫城取御馬四十匹并鞍勒進之行所帝大悅賜熾及善駿馬各二匹駑馬十匹大統元年以從駕功别封真定縣公除東豫州刺史加衛將軍從擒竇泰復𢎞農破沙苑皆有功增邑八百戶河橋之戰諸將退走熾時獨從兩騎為敵人所追至邙山熾乃下馬背山抗之俄而敵衆漸多三靣攻圍矢下如雨熾騎士所執弓竝為敵人所射破熾乃總收其箭以射之所中人馬皆應弦而倒敵以殺傷既多乃相謂曰得此人未足為功乃稍引退熾因其怠遂突圍得出又從太保李弼討白額稽胡破之除車騎將軍髙仲密以北豫州來附熾率兵從太祖援之至洛陽㑹東魏人據邙山為陳太祖命留輜重於瀍曲率輕騎奮擊中軍與右軍大破之悉虜其步卒熾獨追至石濟而還遷車騎大將軍儀同三司散騎常侍增邑一千戶十三年進使持節驃騎大將軍開府儀同三司加侍中增邑通前三千九百戶出為涇州刺史蒞職數年政號清净改封武安縣公進授大將軍魏廢帝元年除大都督原州刺史熾抑挫豪右申理幽滯每親巡壟畝勸民耕桑在州十載甚有政績州城之北有泉水焉熾屢經遊踐嘗與僚吏宴於泉側因酌水自飲曰吾在北州唯當飲水而已及去職之後人吏感其遺惠每至此泉者莫不懷之魏恭帝元年進爵廣武郡公屬茹茹寇廣武熾率兵與柱國趙貴分路討之茹茹聞軍至引退熾度河至麴伏川追及與戰大破之斬其酋帥郁久閭是發獲生口數千及雜畜數萬頭孝閔帝踐阼增邑二千戶武成二年拜柱國大將軍世宗以熾前朝忠勳望實兼重欲獨為造第熾辭以天下未定干戈未偃不宜輒發徒役世宗不許尋而帝崩事方得寢保定元年進封鄧國公邑一萬戶别食資陽縣一千戶收其租賦四年授大宗伯隨晉公護東征天和五年出為宜州刺史先是太祖田於渭北令熾與晉公護分射走兔熾一日獲十七頭護獲十一頭護耻其不及因以為嫌至是熾又以髙祖年長有勸護歸政之議護惡之故左遷焉及護誅徵太𫝊熾既朝之元老名位素隆至於軍國大謀常與參議嘗有疾髙祖至其第而問之因賜金石之藥其見禮如此帝於大德殿將謀伐齊熾時年已衰老乃扼腕曰臣雖朽邁請執干櫓首啓戎行得一覩誅翦鯨鯢廓清寰宇省方觀俗登嶽告成然後歸魂泉壤無復餘恨髙祖壯其志節遂以熾第二子武當公恭為左二軍總管齊平之後帝乃召熾歷觀相州宮殿熾拜賀曰陛下真不負先帝矣帝大悅賜奴婢三十人及雜繒帛千匹進位上柱國宣政元年兼雍州牧及宣帝營建東京以熾為京洛營作大監宮苑制度皆取決焉大象初改食樂陵縣邑戶如舊隋文帝輔政停洛陽宮作熾請入朝屬尉遲迥舉兵熾乃移入金墉城簡練關中軍士得數百人與洛州刺史平涼公元亨同心固守仍權行洛州鎮事相州平熾方入朝屬隋文帝初為相國百官皆勸進熾自以纍代受恩遂不肯署箋時人髙其節隋文帝踐極拜太𫝊加殊禮贊拜不名開皇四年八月薨時年七十八贈本官冀滄瀛趙衛貝魏洛八州諸軍事冀州刺史諡曰恭熾事親孝奉諸兄以悌順聞及其位望隆重而子孫皆處列位遂為當時盛族子茂嗣茂有弟十三人恭威最知名恭位至大將軍從髙祖平齊封贊國公除西兗州總管以罪賜死熾兄善以中軍大都督南城公從魏孝武西遷後仕至太僕衛尉卿汾北華瀛三州刺史驃騎大將軍開府儀同三司永富縣公諡曰忠子榮定嗣起家魏文帝千牛備身稍遷平東將軍大都督進驃騎大將軍儀同三司歷佽飛中大夫右司衛上大夫大象中位至大將軍熾兄子毅毅字天武父嶽早卒及毅著勳追贈大將軍冀州刺史毅深沉有器度事親以孝聞魏孝武初起家為員外散騎侍郎時齊神武擅朝毅慨然有殉主之志及孝武西遷遂從入關封奉髙縣子邑六百戶除符璽郎從擒竇泰復𢎞農戰沙苑皆有功拜右將軍太中大夫進爵為侯增邑一千戶纍遷持節撫軍將軍通直散騎常侍魏廢帝二年授車騎大將軍儀同三司大都督進爵安武縣公增邑一千四百戶魏恭帝元年進授驃騎大將軍開府儀同三司大都督改封永安縣公出為幽州刺史孝閔帝踐阼進爵神武郡公增邑通前五千戶保定三年徵還朝治左宮伯轉小宗伯尋拜大將軍時與齊人爭衡戎車嵗動竝交結突厥以為外援在太祖之時突厥已許納女於我齊人亦甘言重幣遣使求㛰狄固貪婪便欲有悔朝廷乃令揚荐等纍使結之往反十餘方復前好至是雖期往逆猶懼改圖以毅地兼勛戚素有威重乃命為使及毅之至齊使亦在焉突厥君臣猶有二志毅抗言正色以大義責之纍旬乃定卒以皇后歸朝議嘉之别封成都縣公邑一千戶進位柱國出為同州刺史遷蒲州總管徙金州總管加授上柱國入為大司馬隋開皇初拜定州總管纍居藩鎮咸得民和二年薨於州年六十四贈襄郢等六州刺史諡曰肅毅性溫和每以謹慎自守又尚太祖第五女襄陽公主特為朝廷所委信雖任兼出入未嘗有矜惰之容時人以此稱焉子賢嗣賢字託賢志業通敏少知名天和二年䇿拜神武國世子宣政元年授使持節儀同大將軍隋開皇中襲爵神武公除遷州刺史有二女即唐太穆皇后武德元年詔贈司空穆總管荆郢硤夔復沔嶽沅澧鄂十州諸軍事荆州刺史封把國公并追贈賢金遷房直均五州諸軍事金州刺史襲把國公又追贈賢子紹宣秦州刺史并襲賢爵紹宣無子仍以紹宣兄孝宣子德藏為嗣于翼字文若太師燕公謹之子美風儀有識度年十一尚太祖女平原公主拜員外散騎常侍封安平縣公邑一千戶大統十六年進爵郡公加大都督領太祖帳下左右禁中宿衛遷鎮南將軍金紫光祿大夫散騎常侍武衛將軍謹平江陵所贈得軍實分給諸子翼一無所取唯簡賞口內名望子弟有士風者别待遇之太祖聞之特賜奴婢二百口翼固辭不受尋授車騎大將軍儀同三司加侍中驃騎大將軍開府儀同三司六官建除左宮伯孝閔帝踐阼出為渭州刺史翼兄實先蒞此州頗有惠政翼又推誠布信事存寬簡夷夏感悅比之大小馮君焉時吐谷渾入寇河右涼鄯河三州咸被攻圍使來告急秦州都督遣翼赴援不從寮屬咸以為言翼曰攻取之術非夷俗所長此寇之來不過抄掠邊牧耳安能頓兵城下久事攻圍掠而無獲勢將自走勞師以往亦無所及翼揣之已了幸勿復言居數日問至果如翼所䇿賀蘭祥討吐谷渾翼率州兵先鋒深入以功增邑一千二百戶尋徵拜右宮伯世宗雅愛文士立麟趾學在朝有藝業者不限貴賤皆預聼焉乃至蕭撝王褒等與卑鄙之徒同為學士翼言於帝曰蕭撝梁之宗子王褒梁之公卿今與趨走同儕恐非尚賢貴爵之義帝納之詔翼定其班次於是有等差矣世宗崩翼與晉公護同受遺詔立髙祖保定元年徙軍司馬三年改封常山縣公邑二千九百戶天和初遷司㑹中大夫增邑通前三千七百戶三年皇后阿史那氏至自突厥髙祖行親迎之禮命翼總司儀制狄人雖蹲踞無節然咸憚翼之禮法莫敢違犯遭父憂去職居喪過禮為時輩所稱尋有詔起令視事髙祖又以翼有人倫之鑒皇太子及諸王等相𫝊以下竝委翼選置其所擢用皆民譽也時論僉謂得人遷大將軍總中外宿衛兵事晉公護以帝委翼腹心內懷猜忌轉為小司徒加拜柱國雖外示崇重實疏斥之及誅護帝召翼遣往河東取護子中山公訓仍代鎮蒲州翼曰冡宰無君陵上自取誅夷元惡既除餘孽宜殄然皆陛下骨肉猶謂疏不間親陛下不使諸王而使臣異姓非直物有橫議愚臣亦所未安帝然之乃遣越王盛代翼先是與齊陳二境各修邉防雖通聘好而每嵗交兵然一彼一此不能有所克獲髙祖既親萬機將圖東討詔邊城鎮竝益儲偫加戍卒二國聞之亦增修守禦翼諫曰宇文護專制之日興兵至洛不戰而敗所喪實多數十年委積一朝麋散雖為護無制勝之䇿亦由敵人之有備故也且疆場相侵互有勝敗徒損兵儲非䇿之上者不若解邊嚴減戎防繼好息民敬待來者彼必善於通和懈而少備然後出其不意一舉而山東可圖若猶習前蹤恐非蕩定之計帝納之建德二年出為安隨等六州五防諸軍事安州總管時屬大旱溳水絶流舊俗每逢亢陽禱白兆山祈雨髙祖先禁羣祀山廟已除翼遣主簿祭之即日澍雨霑洽嵗遂有年民庶感之聚㑹歌舞頌翼之德四年髙祖將東伐朝臣未有知者遣納言盧韞等前後乘驛三詣翼問䇿焉翼贊成之及軍出詔翼率荆楚兵二萬自宛葉趣襄城大將軍張光洛鄭恪等竝隸焉旬日下齊一十九城所部都督輒入民村即斬以狥由是百姓欣悅赴者如歸屬髙祖有疾班師翼亦旋鎮五年轉陜熊等七州十六防諸軍事宜陽總管翼以宜陽地非襟帶請移鎮於陜詔從之仍除陜州刺史總管如舊其年大軍復東討翼自陜入九曲攻拔造澗等諸城徑到洛陽齊洛州刺史獨狐永業開門出降河南九州三十鎮一時俱下襄城民庶等喜復見翼竝壺漿塞道尋即除洛懷等九州諸軍事河陽總管尋徙豫州總管給兵五千人馬千匹以之鎮并配開府及儀同等二十人仍勑河陽襄州安州荆州泗州總管內有武幹者任翼徵牒不限多少儀同以下官爵承制先授後聞陳將魯天念久圍光州聞翼到汝南望風退散霍州蠻首田元顯負險不賓於是送質請附陳將任蠻奴悉衆攻顯顯立柵拒戰莫有異心及翼還朝元顯便叛其得殊俗物情皆此類也大象初徵拜大司徒詔翼巡長城立亭鄣西自鴈門東至碣石創新改舊咸得其要害云仍除幽定七州六鎮諸軍事幽州總管先是突厥屢為寇掠居民失業翼素有威武兼明斥候自是不敢犯塞百姓安之及尉遲迥據相州舉兵以書招翼翼執其使并書送之于時隋文帝執政賜翼雜繒一千五百假粟麥一千五百石并珍寶服玩等進位上柱國封任國公增邑通前五千戶别食任城縣一千戶收其租賦翼又遣子讓通表勸進并請入朝隋文帝許之開皇初拜太尉或有告翼云往在幽州欲同尉遲迥者隋文召致清室遣理官按驗尋以無實見原仍復本位三年五月薨贈本官加蒲晉懷絳邵汾六州諸軍事蒲州刺史諡曰穆翼性恭儉與物無競常以滿盈自戒故能以功名終子璽官至上大將軍軍司馬黎陽郡公璽弟詮上儀同三司吏部下大夫常山公詮弟讓儀同三司尉遲迥之舉兵也河西公李賢弟穆為并州總管亦執迥子送之李穆字顯慶少明敏有度量太祖入關便給事左右深被親遇穆亦小心謹肅未嘗懈怠太祖嘉之遂處以腹心之任出入卧內當時莫與為比及侯莫陳悅害賀拔嶽太祖自夏州赴難而悅黨史歸據原州猶為悅守太祖令侯莫陳崇輕騎襲之穆先在城中與兄賢逺等據城門應崇遂擒歸以功授都督從迎魏孝武封永平縣子邑三百戶擒竇泰復𢎞農竝有戰功沙苑之捷穆又言於太祖曰髙歡今日已喪膽矣請速逐之則歡可擒也太祖不聼論前後功進爵為公河橋之戰太祖所乘馬中流矢驚逸太祖墜於地軍中大擾敵人追及之左右皆奔散穆乃以策抶太祖因大罵曰爾曹主何在爾獨住此敵人不疑是貴人也遂捨之而過穆以馬授太祖遂得俱免是日微穆太祖已不濟矣自是恩盻更隆擢授武衛將軍加大都督車騎大將軍儀同三司進爵安武郡公增邑一千七百戶前後賞賜不可勝計久之太祖美其志節乃歎曰人之所貴唯身命耳李穆遂能輕身命之重濟孤於難雖復加之以爵位賞之以玉帛未足為報也乃特賜鐵券恕以十死進驃騎大將軍開府儀同三司侍中初穆授太祖以驄馬其後中廄有此色馬者悉以賜之又賜穆世子惇安樂郡公姊一人為郡君餘姊妹竝為縣君兄弟子姪及緦麻以上親并舅氏皆霑厚賜其見褒崇如此從解玉壁圍拜安定國中尉尋授同州刺史入為太僕卿征江陵功封一子長城縣侯邑千戶尋進位大將軍賜姓拓拔氏俄除原州刺史又以賢子為平髙郡守逺子為平髙縣令竝加鼓吹穆自以叔姪一家三人皆牧宰鄉里恩遇過隆固辭不拜太祖不許後轉雍州刺史入為小冢宰孝閔帝踐阼增邑通前三千七百戶又别封一子為縣伯穆請回封賢子孝軌許之及逺子植謀害晉公護植誅死穆亦坐除名時植弟基任浙州刺史例合從坐穆頻詣護請以子惇怡等代基死辭理酸切聞者莫不動容護矜之遂特免基死世宗即位拜驃騎大將軍開府儀同三司大都督安武郡公直州刺史武成二年拜少保保定二年進位大將軍三年從隋公楊忠東伐還拜小司徒遷柱國大將軍别封一子郡公邑二千戶五年遷大司空天和二年進封申國公邑五千戶舊爵回授一子建德元年遷太保尋出為原州總管四年髙祖東征令穆率兵三萬别攻軹關及河北諸縣竝破之後以帝疾班師棄而不守六年進位上柱國除并州總管時東夏再平人情尚擾穆鎮之以靜百姓懷之大象元年遷大左輔總管如舊二年加太傅仍總管及尉遲迥舉兵穆子榮欲應之穆弗聼曰周德既衰愚智共悉天時若此吾豈能違天乃遣使謁隋文帝并上十三環金帶蓋天子之服也以微申其意時迥子誼為朔州刺史亦執送京師迥令其所署行臺韓長業攻陷潞州執刺史趙威署城民郭子勝為刺史穆遣兵討之獲子勝隋文帝嘉之以穆勞效同破鄴城第一勳加三轉聼分授其二子榮才及兄賢子孝軌榮及才竝儀同大將軍孝軌進開府儀同大將軍又别封子雄為密國公邑三千戶穆長子惇字士宇大統四年以穆功賜爵安平縣侯尋授車騎大將軍儀同三司大都督進爵為公太祖令功臣世子竝與略陽公遊處惇於時輩之中特被引接每有遐方服玩異域珍奇無不班錫俄受小武伯進爵安樂郡公天和三年遷驃騎大將軍開府儀同三司鳳州刺史卒於位贈大將軍原靈豳三州刺史史臣曰竇熾儀表魁梧器識雄逺入參朝政則嘉謀以陳出總蕃條則惠政斯洽竇毅忠肅奉上溫恭接下茂實彰於本朝義聲揚於殊俗竝以國華民望論道當官榮映一時慶流來葉及熾遲疑勸進有送故之心雖王公恨恨何以加此語曰君使臣以禮臣事君以忠然則效忠之迹或殊處臣之理斯一𣙜言指要其維致命乎是以典午擅朝葛公休為之投袂新都篡盜翟仲文所以稱兵及東郡誅夷竟速漢朝之禍淮南覆敗無救魏室之亡而烈士貞臣赴蹈不已豈忠義所感視死如歸者歟于李之送往事居有曲於此翼既功臣之子地即姻親穆乃早著勳庸深寄肺腑竝兼文武之任荷纍世之恩理宜與存與亡同休同戚加以受扞城之託總戎馬之權勢力足以勤王智能足以衛難乃宴安寵祿曾無釋位之心報使獻誠但務隨時之義𢎞名節以髙貴豈所望於二公若捨彼天時徵諸人事顯慶起晉陽之甲文若發幽薊之兵叶契岷峨約從漳滏北控沙漠西指崤函則成敗之數未可量也周書卷三十
