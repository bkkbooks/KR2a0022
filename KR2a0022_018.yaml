body:
  text: 周書卷十八唐令狐德棻等撰列傳第十王羆子慶遠孫述王思政王羆字熊羆京兆霸城人漢河南尹王遵之後世為州郡著姓羆剛直木強處物平當州郡敬憚之魏太和中除殿中將軍先是南岐東益氐羌反叛王師戰不利乃令羆領羽林五千鎮梁州討平諸賊還授右將軍西河內史辭不拜時人謂之曰西河大邦俸祿殷厚何為致辭羆曰京洛材木盡出西河朝貴營第宅者皆有求假如其私辦即力所不堪若科發民間又違法憲以此辭耳梁將曹義宗圍荆州勑羆與别將裴衍率兵赴救遂與梁人戰大破之于時諸方鼎沸所在凋殘荆州新經寇難尤藉慰撫以羆為荆州刺史進號撫軍將軍梁復遣曹義宗衆數萬圍荆州堰水灌城不沒者數板時既內外多虞未遑救援乃遺羆鐵劵云城全當授本州刺史城中糧盡羆煮粥與將士均分而食之每出戰嘗不擐甲胄大呼曰荆州城孝文皇帝所置天若不祐國家使賊箭中王羆不爾王羆須破賊屢經戰陳亦不被傷彌歷三年義宗方退進封霸城縣公尋遷車騎大將軍涇州刺史未及之部屬太祖徴兵為勤王之舉請前驅效命遂為大都督鎮華州魏孝武西遷拜驃騎大將軍加侍中開府嘗修州城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌衆已乘梯入城羆尚卧未起聞閣外洶洶有聲便袒身露髻徒跣持一白挺大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走時關中大飢徴稅民間榖食以供軍費或隱匿者令遞相告多被篣捶以是人有逃散唯羆信著於人莫有隱者得粟不少諸州而無怨讟沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道臥貆子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆冡生死在此欲死者來齊神武遂不敢攻時茹茹渡河南寇候騎已至豳州朝廷慮其深入乃徴發士馬屯守京城塹諸街巷以備侵軼左僕射周惠達召羆議之羆不應命謂其使曰若茹茹至渭北者王羆率鄉里自破之不煩國家兵馬何為天子城中遂作如此驚動由周家小兒恇怯致此羆輕侮權勢守正不回皆此類也未幾還鎮河東羆性儉率不事邉幅嘗有臺使羆為其設食使乃裂其薄餅緣羆曰耕種收穫其功已深舂爨造成用力不少乃爾選擇當是未飢命左右撤去之使者愕然大慙又有客與羆食瓜侵膚稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色性又嚴急嘗有吏挾私陳事者羆不暇命捶撲乃手自取鞾履持以擊之每至享會親自稱量酒肉分給將士時人尚其均平嗤其鄙碎大統七年卒於鎮贈太尉子慶遠弱冠以功臣子拜直閣將軍先羆卒孫述嗣述字長述少聰敏有識度年八歲太祖見而竒之曰王公有此孫足為不朽即以為鎮逺將軍拜太子舍人以祖憂去職述幼喪父為羆所鞠養及居喪深合禮度于時東西交爭金革方始羣官遭喪者卒哭之後皆起令視事述請終禮制辭理懇切太祖令中使就視知其哀毁乃特許之喪畢襲爵扶風郡公纍遷上大將軍王思政字思政太原祁人容貌魁偉有籌䇿魏正光中解褐員外散騎侍郎屬万俟醜奴宿勒明達等擾亂關右北海王皓率兵討之啓思政隨軍軍事所有謀議並與之參詳時魏孝武在藩素聞其名皓軍還乃引為賔客遇之甚厚及登大位委以心膂遷安東將軍預定策功封祁縣侯俄而齊神武濳有異圗帝以思政可任大事拜中軍大將軍大都督總宿衛兵思政乃言於帝曰高歡之心行路所共知矣洛陽四靣受敵非用武之地關中有崤函之固一人可禦萬夫且士馬精強糧儲委積進可以討除逆命退可以保據關河宇文夏州紏合同盟願立功效若聞車駕西幸必當奔走奉迎藉天府之資因已成之業一二年間習戰陳勸耕桑修舊京何慮不克帝深然之及齊神武兵至河北帝乃西遷進爵太原郡公大統之後思政雖被任委自以非相府之舊每不自安太祖曽在同州與羣公宴集出錦罽及雜綾絹數段命諸將樗蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之羣公將遍莫有得者次至思政乃斂容跪而自誓曰王思政羇旅歸朝蒙宰相國士之遇方願盡心效命上報知己若此誠有實令宰相賜知者願擲即為盧若內懷不盡神靈亦當明之使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即拔所佩刀橫於膝上攬樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受自此之後太祖期寄更深轉驃騎將軍令募精兵從獨孤信取洛陽仍共信鎮之及河橋之戰思政下馬用長矟左右橫擊一擊踏數人時陷陳既深從者死盡思政被重創悶絶會日暮敵將收軍思政久經軍旅每戰唯著破弊甲敵人疑非將帥故免有帳下督雷五安於戰處哭求思政會其已蘇遂相得乃割衣裹創扶思政上馬夜久方得還仍鎮𢎞農思政以玉壁地在險要請築城即自營度移鎮之遷并州刺史仍鎮玉壁八年東魏來寇思政守禦有備敵人書夜攻圍卒不能克乃收軍還以全城功受驃騎大將軍復命思政鎮𢎞農於是修城郭起樓櫓營田農積芻秣凡可以守禦者皆具焉𢎞農之有備自思政始也十二年加特進荆州刺史州境卑濕城塹多壞思政方命都督藺小歡督工匠繕治之掘得黃金三十斤夜中密送之至旦思政召佐吏以金示之曰人臣不宜有私悉封金送上太祖嘉之賜錢二十萬思政之去玉壁也太祖命舉代已者思政乃進所部都督韋孝寬其後東魏來寇孝寬卒能全城時論稱其知人十三年侯景叛東魏擁兵梁鄭為東魏所攻景乃請援乞師當時未即應接思政以為若不因機進取後悔無及即率荆州步騎萬餘從魯關向陽翟思政入守潁川景引兵向豫州外稱略地乃密遣送𣢾於梁思政分布諸軍據景七州十二鎮太祖乃以所授景使持節太傅大將軍兼中書令河南大行臺河南諸軍事回授思政思政並讓不受頻使敦喻唯受河南諸軍事東魏太尉高嶽行臺慕容紹宗儀同劉豐生等率步騎十萬來攻潁川城內臥鼓偃旗若無人者嶽恃其衆謂一戰可屠乃四面鼓噪而上思政選城中驍勇開門出突嶽衆不敢當引軍亂退嶽知不可卒攻乃多修營壘又隨地勢高處築土山以臨城中飛梯火車晝夜攻之思政亦作火䂎因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰嶽衆披靡其守土山人亦棄山而走齊文襄更益嶽兵堰洧水以灌城城中水泉涌溢不可防止懸釡而炊糧力俱竭慕容紹宗劉豐生及其將慕容永珍共乘樓船以望城內令善射者俯射城中俄而大風暴起船乃飄至城下城上人以長鈎牽船弓弩亂發紹宗窮急投水而死豐生浮向土山復中矢而斃生擒永珍思政謂之曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞齊文襄聞之乃率步騎十一萬來攻自至堰下督勵士卒水壯城北靣遂崩水便滿溢無措足之地思政知事不濟率左右據土山謂之曰吾受國重任本望平難立功精誠無感遂辱王命今力屈道窮計無所出唯當效死以謝朝恩因仰天大哭左右皆號慟思政西向再拜便欲自刎先是齊文襄告城中人曰有能生致王大將軍者封侯重賞若大將軍身有損傷親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得富貴亦是活一城人今高相既有此言公豈不哀城中士卒也固共止之不得引決齊文襄遣其常侍趙彥深就土山執手申意引見文襄辭氣慷慨無撓屈之容文襄以其忠於所事禮遇甚厚思政初入潁川士卒八千人城既無外援亦無叛者思政常以勤王為務不營資産嘗被賜園地思政出征後家人種桑果及還見而怒曰胸奴未滅去病辭家況大賊未平何事産業命左右拔而棄之故身陷之後家無畜積及齊受禪以為都官尚書子秉史臣曰王羆剛峭有餘𢎞雅未足情安儉率志在公平既而奮節危城抗辭勍敵梁人為之退舍高氏不敢加兵以此見稱信非虗述不隕門風亦足稱也王思政驅馳有事之秋慷慨功名之際及乎䇿名霸府作鎮潁川設縈帶之險修守禦之術以一城之衆抗傾國之師率疲乏之兵當徑勇之卒猶能亟摧大敵屢建竒功忠節冠於本朝義聲動於鄰聼雖運窮事蹙城陷身囚壯志高風亦足奮於百世矣周書卷十八周書卷十八考證王羆傳乃令羆領羽林五千鎮梁州北史作乃拜羆冠軍將軍鎮梁州持一白挺大呼而出北史此句下即載老羆當道臥貉子那得過二語下方載敵見驚退逐至東門文帝聞而壯之與此不同又通鑑從周書不從北史北史以兩事合為一事訛也貆子安得過貆北史通鑑俱作貉胡三省通鑑注云貉子曰貆臣文淳按貉子曰貆貆未可以言貉也齊神武遂不敢攻此句下北史有後移鎮河東語本傳失載臣文淳按下有未幾還鎮河東句其為遺脫無疑王羆一傳以北史較之脫訛甚多但無善本可考姑存其舊子慶遠不當另自為傳當依北史敘於羆傳之末王思政傳太原祁人北史此句下有漢司徒允之後也七字子秉北史作子康周書卷十八考證
