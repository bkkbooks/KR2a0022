body:
  text: 周書卷四唐令狐德棻等撰帝紀第四明帝世宗明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熙三年太祖臨夏州生帝於綂萬城因以名焉大綂十四年封寧都郡公十六年行華州事尋拜開府儀同三司宜州諸軍事宜州刺史魏恭帝三年授大將軍鎮隴右孝閔帝踐阼進位柱國轉岐州諸軍事岐州刺史治有美政黎民懐之及孝閔帝廢晉公䕶遣使迎帝於岐州秋九月癸亥至京師止於舊邸甲子羣臣上表勸進備法駕奉迎帝固讓羣臣固請是日即天王位大赦天下乙丑朝羣臣於延夀殿冬十月癸酉太師趙國公李弼薨己卯以大將軍昌平公尉遲綱為柱國乙酉祠圓丘丙戍祠方丘甲午祠太社柱國陽平公李遠賜死是月梁相陳霸先廢其主蕭方智而自立是為陳武帝十一月庚子祠太廟丁未祠圓丘丁巳詔曰帝王之道以寛仁為大魏政諸有輕犯未至重罪及諸村民一家有犯乃及數家而被遠配者並宜放還十二月庚午謁成陵癸酉還宮庚辰以大將軍輔城公邕為柱國戊子赦長安見囚甲午詔曰善人之後猶累世獲宥况魏氏以德讓代終豈容不加𨼆䘏元氏子女自坐趙貴等事以來所有沒入為官口者悉宜放免二年春正月乙未以大冡宰晉公䕶為太師辛亥親耕籍田癸丑立王后獨孤氏丁巳雍州置十二郡又於河東置蒲州河北置虞州𢎞農置陜州正平置絳州宜陽置熊州邵郡置邵州二月癸未詔曰王者之宰民也莫不同四海一遠近為父母而子之一物失所若納于隍賊之境土本同大化徃因時難致阻東西遂使疆場之間互相抄掠興言及此良可哀傷自元年以來有被掠入賊者悉可放免自冬不雨至於是月方大雪三月甲午齊北豫州刺史司馬消難舉州來附遣柱國髙陽公逹奚武與大將軍楊忠率衆迎之改雍州刺史為雍州牧京兆郡守為京兆尹以廣業修城二郡置康州葭蘆郡置文州戊申長安獻白雀庚申詔曰三十六國九十九姓自魏氏南徙皆稱河南之民今周室既都關中宜改稱京兆人夏四月己巳以太師晉公䕶為雍州牧庚午熒惑入軒轅辛未降死罪一等五嵗刑已下皆原之甲戍王后獨孤氏崩甲申葬敬后五月乙未以大司空梁國公侯莫陳崇為大宗伯六月癸亥囐噠遣使獻方物己巳板授髙年刺史守令恤鰥寡孤獨各有差分長安為萬年縣並治京城辛未幸昆明池壬申長安獻白烏遣使分行州郡理囚徒察風俗掩骼埋胔秋七月甲午遣柱國寧蜀公尉遲迥率衆於河南築安樂城丙申順陽獻三足烏八月甲子羣臣上表稱慶詔曰夫天不愛寶地稱表瑞莫不威鳯巢閣圗龍躍沼豈直日月珠連風雨玉燭是以鈎命决曰王者至孝則出元命苞曰人君至治所有虞舜烝烝來兹異趾周文翼翼翔此靈禽文考至德下覃遺仁爰被遠符千載降斯三足將使三方歸本九州翕定惟此大體景福在民予安敢讓宗廟之善弗宣大惠可大赦天下文武官普進二級九月辛卯以大將軍楊忠大將軍王雄並為柱國甲辰封少師元羅為韓國公以紹魏後丁未幸同州過故宅賦詩曰玊燭調秋氣金輿厯舊宮還如過白水更似入新豐霜潭漬晚菊寒井落踈桐舉盃延故老令聞歌大風冬十月辛酉還宮乙丑遣柱國尉遲迥鎭隴右長安獻白十二月辛酉突厥遣使獻方物癸亥太廟成辛巳以功臣琅琊貞獻公賀拔勝等十三人配享太祖廟庭壬午大赦天下武成元年春正月己酉太師晉公䕶上表歸政帝始親覽萬機軍旅之事護猶總焉初改都督諸州軍事為總管丙辰封大將軍章武孝公導子亮為永昌公翼為西陽公三月癸巳陳六軍帝親擐甲胄迎太白於東方秦郡公直鎮蒲州吐谷渾寇邊庚戍遣大司馬博陵公賀蘭祥率衆討之四月戊午武當郡獻赤烏甲戍雲秦州獻白馬朱鬛五月戊子詔曰皇王之迹不一因革之道已殊莫不播八政以成物兆三元而為紀是以容成創定於軒轅羲和欽若於唐世鴻範九疇大𢎞五法易曰澤中有火革君子以治厯明時故厯之為義大矣但忽微成象象極則差分積命時時積斯舛開闢至於獲麟二百七十六萬嵗晷度推移餘分盈縮南正無聞疇人靡記暑往寒來理乖攸序敬授民時何其積謬昔漢世巴郡洛下閎善治厯云後八百嵗當有聖人定之自火行至今木德應其運矣朕何讓焉可命有司傍稽六歴仰觀七曜博推古今造我周厯量定以聞己亥聽訟於正武殿辛亥以大宗伯梁國公侯莫陳崇為大司徒大司寇髙陽公逹奚武為大宗伯武陽公豆盧寧為大司寇柱國輔城公邕為大司空乙卯詔曰比屢有紏發官司赦前事此雖意在疾惡但先王制肆眚之道令天下自新若又推問自新何由哉如此之徒有司勿為推䆒惟庫廄倉廩與海内所共漢帝有云朕為天下守財耳若有侵盗公家財畜錢粟者魏朝之事年月既遠一不湏問自周有天下以來雖經赦宥而事跡可知者有司宜即推窮得實之日但免其罪徴備如法賀蘭祥攻拔洮陽洪和二城吐谷渾遁走閏月庚申髙昌遣使獻方物六月戊子大雨霖詔曰昔唐咨四嶽殷告六眚覩災興懼咸寘時雍朕撫運應圗作民父母弗敢怠荒以求民瘼而霖雨作沴害麥傷苗隤屋漂垣洎于昏墊諒朕不德蒼生何咎刑政所失罔識厥由公卿大夫士爰及牧守黎庶等今宜各上封事讜言極諫罔有所諱朕將覽察以答天譴其遭水者有司可時廵檢條列以聞庚子詔曰潁川從我是曰元勲無忘父城實起王業文考屬天地草昧造化權輿極彼横流匡兹頺運頼英賢盡力文武同心翼贊大功克隆帝業而被堅執鋭櫛風沐雨永言疇昔良用憮然至若功成名遂建國剖符予惟休也其有致死王事妻子無歸者朕甚傷之凡是從先王向夏州發夏州從來見在及薨亡者並量賜錢帛稱朕意焉是月陳武帝薨兄子蒨立是謂文帝秋八月己亥改天王稱皇帝追尊文王為帝大赦改元壬子以大將軍安城公憲為益州總管癸丑増御正四人位上大夫九月乙卯以大將軍天水公廣為梁州總管辛未進封輔城公邕為魯國公安城公憲為齊國公秦郡公直為衛國公正平公招為趙國公封皇弟儉為譙國公純為陳國公盛為越國公逹為代國公通為冀國公逌為滕國公進封天水公廣為蔡國公髙陽公逹奚武為鄭國公武陽公豆盧寧為楚國公博陵公賀蘭祥為凉國公寕蜀公尉遲迥為蜀國公化政公宇文貴為許國公陳留公楊忠為隋國公昌平公尉遲綱為吳國公武威公王雄為庸國公邑各萬戸冬十月甲午以柱國吳國公尉遲綱為涇州總管是月齊文宣帝薨子殷嗣立以柱國蜀國公尉遲迥為秦州總管二年春正月癸丑朔大㑹羣臣於紫極殿始用百戲焉三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸詔曰人生天地之間禀五常之氣天地有窮已五常有推移人安得長在是以生而有死者物理之必然處必然之理修短之間何足多恨朕雖不德性好典墳披覽聖賢餘論未嘗不以此自曉今乃命也夫復何言諸公及在朝卿大夫士軍中大小督將軍等並立勲效積有年載輔翼太祖成我周家今朕纘承大業處萬乘之上此乃上不負太祖下不負朕躬朕得啟手啟足從先帝於地下實無恨於心矣所可恨者朕享大位可謂四年矣不能使政化循理黎庶豐足九州未一二方猶梗顧此懷恨目用不瞑唯冀仁兄冢宰洎朕先正先父公卿大臣等協和為心勉力相勸勿忘太祖遺志提挈後人朕雖沒九泉形體不朽今大位虗曠社稷無主朕兒幼稚未堪當國魯國公邕朕之介弟寛仁大度海内共聞能𢎞我周家必此子也夫人貴有始終公等事太祖輔朕躬可謂有始矣若克念世道艱難輔邕以主天下者可謂有終矣哀死事生人臣大節公等思念此言令萬代稱歎朕禀生儉素非能力行菲薄每寢大布之被服大帛之衣凡是器用皆無雕刻身終之日豈容違棄此好喪事所須務從儉約歛以時服勿使有金玊之飾若以禮不可闕皆令用瓦小歛訖七日哭文武百官各權辟衰麻且以素服從事葬日選擇不毛之地因地勢為墳勿封勿樹且厚葬傷生聖人所誡朕既服膺聖人之教安敢違之凡百官司勿異朕此意四方州鎮使到各令三日哭哭訖悉權辟凶服還以素服從事待大例除非有呼召各按部自守不得輙奔赴闕庭禮有通塞隨時之義葬訖内外悉除服從吉三年之内勿禁婚娶飲食一令如平常也時事殷猥病困心亂止能及此如其事有不盡准此以類為斷死而近思古人有之朕今忍死盡此懐抱其詔即帝口授也辛丑崩於延夀殿時年二十七諡曰明皇帝廟稱世宗五月辛未葬於昭陵帝寛明仁厚敦睦九族有君人之量幼而好學博覽羣書善屬文詞彩温麗及即位集公卿已下有文學者八十餘人於麟趾殿刋校經史又捃採衆書自羲農以來訖於魏末敘為世譜凡五百卷云所著文章十卷史臣曰世宗寛仁遠度叡哲博聞處代邸之尊實文昭之長豹姿已變龍德猶潛而百辟傾心萬方注意及乎迎宣黜賀入纂大宗而禮貌功臣敦睦九族率由恭儉崇尚文儒亹亹焉其有君人之德者矣始則權臣專制政出私門終乃鴆毒潛加享年不永惜哉周書卷四周書卷四考證明帝紀以大將軍楊忠大將軍王雄並為柱國諸本王雄俱作楊雄臣文淳按楊雄至武帝時始顯又其傳中無為柱國事王雄傳云孝閔帝踐祚授少傅増邑二千户進位柱國大将軍其為王雄無疑今改正但傳云孝閔帝踐祚進柱國大將軍而本紀雄為柱國乃在明帝二年亦與傳不合死而近思北史作死而可忍文義較顯又與下文朕今忍死句句法相承宜從北史周書卷四考證
