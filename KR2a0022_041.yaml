body:
  text: 周書卷四十一唐令狐德棻等撰列傳第三十三王褒庾信王褒字子淵琅邪臨沂人也曾祖儉齊侍中太尉南昌文憲公祖騫梁侍中金紫光祿大夫南昌安侯父規梁侍中左民尚書南昌章侯並有重名於江左褒識量淵通志懷沉靜美風儀善談笑博覽史傳尤工屬文梁國子祭酒蕭子雲褒之姑夫也特善草隸褒少以姻戚去來其家遂相模範俄而名亞子雲並見重於世梁武帝喜其才藝遂以弟鄱陽王恢之女妻之起家祕書郎轉太子舍人襲爵南昌縣侯稍遷祕書丞宣成王大器簡文帝之冢嫡即褒之姑子也于時盛選僚佐乃以褒為文學尋遷安成郡守及侯景渡江建業擾亂褒輯寧所部見稱於時梁元帝承制轉智武將軍南平內史及嗣位於江陵欲待褒以不次之位褒時猶在郡敕王僧辨以禮發遣褒乃將家西上元帝與褒有舊相得甚歡拜侍中纍遷吏部尚書左僕射褒既世胄名家文學優贍當時咸相推挹故旬月之間位升端右寵遇日隆而褒愈自謙虛不以位地矜人時論稱之初元帝平侯景及擒武陵王紀之後以建業雕殘方須修復江陵殷盛便欲安之又其故府臣僚皆楚人也並願即都荆郢嘗召羣臣議之領軍將軍胡僧祐吏部尚書宗懍太府卿黃羅漢御史中丞劉玨等曰建業雖是舊都王氣已盡且與北寇鄰接止隔一江若有不虞悔無及矣臣等又嘗聞之荆南之地有天子氣今陛下龍飛纘業其應斯乎天時人事徵祥如此臣等所見遷徙非宜元帝深以為然時褒及尚書周𢎞正咸侍座乃顧謂褒等曰卿意以為何如褒性謹慎知元帝多猜忌弗敢公言其非當時唯唯而已後因清間密諫言辭甚切元帝頗納之然其意好荆楚已從僧祐等䇿明日乃於衆中謂褒曰卿昨日勸還建業不為無理褒以宣室之言豈宜顯之於衆知其計之不用也於是止不復言及大軍征江陵元帝授褒都督城西諸軍事褒本以文雅見知一旦委以總戎深自勉勵盡忠勤之節被圍之後上下猜懼元帝唯於褒深相委信朱買臣率衆出宣陽之西門與王師戰買臣大敗褒督進不能禁乃貶為護軍將軍王師攻其外柵城陷褒從元帝入子城猶欲固守俄而元帝出降褒遂與衆俱出見柱國于謹謹甚禮之褒曾作燕歌行妙盡關塞寒苦之狀元帝及諸文士並和之而競為淒切之詞至此方驗焉褒與王克劉玨宗懍殷不害等數十人俱至長安太祖喜曰昔平吳之利二陸而已今定楚之功羣賢畢至可謂過之矣又謂褒及王克曰吾即王氏甥也卿等並吾之舅氏當以親戚為情勿以去鄉介意於是授褒及克殷不害等車騎大將軍儀同三司常從容上席資餼甚厚褒等亦並荷恩眄忘其羈旅焉孝閔帝踐阼封石泉縣子邑三百户世宗即位篤好文學時褒與庾信才名最高特加親待帝每遊宴命褒等賦詩談論常在左右尋加開府儀同三司保定中除內史中大夫高祖作象經令褒注之引據該洽甚見稱賞褒有器局雅識治體既纍世在江東為宰輔高祖亦以此重之建德以後頗參朝議凡大詔册皆令褒具草東宮既建授太子少保遷小司空仍掌綸誥乘輿行幸褒常侍從初褒與梁處士汝南周𢎞讓相善及𢎞讓兄𢎞正自陳來聘高祖許褒等通親知音問褒贈𢎞讓詩並致書曰嗣宗窮途楊朱歧路征蓬長逝流水不歸舒慘殊方炎涼異節木皮春厚桂樹冬榮想攝衛惟宜動靜多豫賢兄入關敬承款曲猶依杜陵之水尚保池陽之田鏟迹幽蹊銷聲穹谷何期愈樂幸甚幸甚弟昔因多疾亟覽九仙之方晚涉世途常懷五嶽之舉同夫關令物色異人譬彼客卿服膺高士上經説道屢聽玄牝之談中藥飬神每稟丹沙之説頃年事遒盡容髮衰謝藝其黃矣零落無時還念生涯繁憂總集視隂愒日猶趙孟之徂年負杖行吟同劉琨之積慘河陽北臨空思鞏縣霸陵南望還見長安所冀書生之魂來依舊壤射聲之鬼無恨他鄉白雲在天長離别矣會見之期邈無日矣援筆攬紙龍鍾橫集𢎞讓復書曰甚矣悲哉此之為别也雲飛泥沉金鑠蘭滅玉音不嗣瑤華莫因家兄至自鎬京致書於穹谷故人之迹有如對面開題申紙流臉沾膝江南燠熱橘柚冬青渭北沍寒楊榆晚葉土風氣候各集所安餐衛適時寢興多福甚善甚善與弟分袂西陜言反東區雖保周陵還依蔣徑三薑離析二仲不歸麋鹿為曹更多悲緒丹經在握貧病莫諧芝术可求恆為採掇昔吾壯日及弟富年俱值雍熙並歡衡泌南風雅操清商妙曲絃琴促坐無乏名晨玉瀝金華冀獲難老不虞一旦翻覆波欄吾已愒隂弟非茂齒禽尚之契各在天涯永念生平難為胸臆且當視隂數箭排愁破涕人生樂耳憂戚何為豈能遽悲次房遊魂不反逺缺二字産骸柩無託但願愛玉體珍金箱保期頤享黃髮猶冀蒼膺頳鯉時傳尺素清風朗月俱寄相思子淵子淵長為别矣握管操觚聲淚俱咽尋出為宣州刺史卒於位時年六十四子鼒嗣庾信字子山南陽新野人也祖易齊徵士父肩吾梁散騎常侍中書令信幼而俊邁聰敏絶倫博覽羣書尤善春秋左氏傳身長八尺腰帶十圍容止頽然有過人者起家湘東國常侍轉安南府參軍時肩吾為梁太子中庶子掌管記東海徐摛為左衛率摛子陵及信並為抄撰學士父子在東宫出入禁闥恩禮莫與比隆既有盛才文並綺豔故世號為徐庾體焉當時後進競相模範每有一文京都莫不傳誦纍遷尚書度支郎中通直正員郎出為郢州别駕尋兼通直散騎常侍聘于東魏文章辭令盛為鄴下所稱還為東宮學士領建康令侯景作亂梁簡文帝命信率宮中文武千餘人營於朱雀航及景至信以衆先退臺城陷後信奔於江陵梁元帝承制除御史中丞及即位轉右衛將軍封武康縣侯加散騎常侍來聘于我屬大軍南討遂留長安江陵平拜使持節撫軍將軍右金紫光祿大夫大都督尋進車騎大將軍儀同三司孝閔帝踐阼封臨清縣子邑五百户除司水下大夫出為𢎞農郡守遷驃騎大將軍開府儀同三司司憲中大夫進爵義城縣侯俄拜洛州刺史信多識舊章為政簡靜吏民安之時陳氏與朝廷通好南北流寓之士各許還其舊國陳氏乃請王褒及信等十數人高祖唯放王克殷不害等信及褒並留而不遣尋徵為司宗中大夫世宗高祖並雅好文學信特蒙恩禮至於趙滕諸王周旋款至有若布衣之交羣公碑志多相請託唯王褒頗與信相埓自餘文人莫有逮者信雖位望通顯常有鄉關之思乃作哀江南賦以致其意云其辭曰粵以戊辰之年建亥之月大盜移國金陵瓦解余乃竄身荒谷公私塗炭華陽奔命有去無歸中興道消窮於甲戌三日哭於都亭三年囚於别館天道周星物極不反傅夑之但悲身世無所求生袁安之每念王室自然流涕昔桓君山之志事杜元凱之生平並有著書咸能自序潘嶽之文彩始述家風陸機之詞賦多陳世德信年始二毛即逄喪亂藐是流離至于暮齒燕歌逺别悲不自勝楚老相逢泣將何及畏南山之雨忽踐秦庭讓東海之濵遂餐周粟下亭漂泊臯橋羈旅楚歌非取樂之方魯酒無忘憂之用追為此賦聊以記言不無危苦之辭唯以悲哀為主日暮途逺人間何世將軍一去大樹飄零壯士不還寒風蕭瑟荆璧睨柱受連城而見欺載書橫階捧珠盤而不定鍾儀君子入就南冠之囚季孫行人留守西河之館申包胥之頓地碎之以首蔡威公之淚盡加之以血釣臺移柳非玉關之可望華亭唳鶴豈河橋之可聞孫䇿以天下為三分衆裁一旅項羽用江東之子弟人唯八千遂乃分裂山河宰割天下豈有百萬義師一朝卷甲芟夷斬伐如草木焉江淮無涯岸之阻亭壁無藩籬之固頭會箕斂者合從締交鉏耰棘矜者因利乘便將非江表王氣應終三百年乎是知並吞六合不免軹道之災混一車書無救平陽之禍嗚呼山嶽崩頽既履危亡之運春秋迭代必有去故之悲天意人事可以悽愴傷心者矣况復舟楫路窮星漢非乘槎可上風颷道阻蓬萊無可到之期窮者欲逹其言勞者須歌其事陸士衡聞而撫掌是所甘心張平子見而陋之固其宜矣我之掌庾承周以世功而為族經邦佐漢用論道而當官稟嵩華之玉石潤河洛之波瀾居負洛而重世邑臨河而晏安逮永嘉之艱虞始中原之乏主民枕倚於墻壁路交橫於豺虎值五馬之南奔逢三星之東聚彼凌江而建國此播遷於吾祖分南陽而賜田裂東嶽而胙土誅茅宋玉之宅穿徑臨江之府水木交運山川崩竭家有直道人多全節訓子見於純深事君彰於義烈新野有生祠之廟河南有胡書之碣况乃少微真人天山逸民階庭空谷門巷蒲輪移談講樹就簡書筠降生世德載誕貞臣文詞高於甲觀模楷盛於漳濱嗟有道而無鳯歎非時而有麟既姦回之奰匿終不悅於仁人王子洛濱之歲蘭成射策之年始含香於建禮仍矯翼於崇賢遊洊雷之講肆齒明離之胄筵既傾蠡而酌海遂側管以窺天方塘水白釣渚池圓侍戎韜於武帳聽雅曲於文絃乃解懸而通籍遂崇文而會武居笠轂而掌兵出蘭池而典午論兵於江漢之君拭圭於西河之主于時朝野歡娛池臺鐘鼓里為冠蓋門成鄒魯連茂苑於海陵跨橫塘於江浦東門則鞭石成橋南極則鑄銅為柱樹則園植萬株竹則家封千户西賮浮玉南琛沒羽吳歈越吟荆豔楚舞草木之藉春陽魚龍之得風雨五十年中江表無事王歙為和親之侯班超為定遠之使馬武無預於兵甲馮唐不論於將帥豈知山嶽暗然江湖潛沸漁陽有閭左戍卒離石有將兵都尉天子方刪詩書定禮樂設重雲之講開士林之學談劫燼之灰飛辨常星之夜落地平魚齒城危獸角臥刁斗於榮陽絆龍媒於平樂宰衡以干戈為兒戲縉紳以清談為廟略乘漬水而膠船馭奔駒以朽索小人則將及水火君子則方成猿鶴弊箄不能救鹽池之鹹阿膠不能止黃河之濁既而魴魚頳尾四郊多壘殿狎江鷗宮鳴野雉湛盧去國艅皇失水見被髮於伊川知其時為戎矣彼姦逆之熾盛久遊魂而放命大則有鯨有鯢小則為梟為獍負其牛羊之力凶其水草之性非玉燭之能調豈璿璣之可正值天下之無為尚有欲於羈縻飲其琉璃之酒賞其虎豹之皮見胡桐於大夏識鳥卯於條支豺牙密厲虺毒潛吹輕九鼎而欲問聞三川而遂窺始則王子召戎姦臣介胄既官政而離逖遂師言而泄漏望廷尉之逋囚反淮南之窮寇飛狄泉之蒼鳥起橫江之困獸地則石鼓鳴山天則金精動宿北闕龍吟東陵麟鬭爾乃桀黠構扇憑陵畿甸擁狼望於黃圖填盧山於赤縣青袍如草白馬如練天子履端廢朝單于長圍高宴兩觀當戟千門受箭白虹貫日蒼鷹擊殿競遭夏臺之禍遂視堯城之變官守無奔問之人干戚非平戎之戰陶侃則空裝米船顧榮則虛搖羽扇將軍死綏路絶重圍烽隨星落書逐鳶飛遂乃韓分趙裂鼓卧旗折失羣班馬迷輪亂轍猛士嬰城謀臣卷舌昆陽之戰象走林常山之陳蛇奔穴五郡則兄弟相悲三州則父子離别護軍慷慨忠能死節三世為將終於此滅濟陽忠壯身參末將兄弟三人義聲俱唱主辱臣死名存身喪狄人歸元三軍悽愴尚書多算守備是長雲梯可拒地道能防有齊將之閉璧無燕帥之卧墻大事去矣人之云亡申子奮發勇氣咆勃實總元戎身先士卒胄落魚門兵填馬窟屢犯通中頻遭刮骨功業夭枉身名埋沒或以隼翼鷃披虎威狐假霑漬鋒鏑脂膏原野兵弱虜強城孤氣寡聞鶴唳而虛驚聽胡笳而淚下據神亭而亡戟臨橫江而棄馬崩於巨鹿之沙碎於長平之瓦於是桂林顛覆長洲麋鹿潰潰沸騰茫茫慘黷天地離阻人神怨酷晉鄭靡依魯衛不睦競動天關爭回地軸探雀􅑹而未飽待熊蹯而詎熟乃有車側郭門筋懸廟屋鬼同曹社之謀人有秦庭之哭余乃假刻璽於關塞稱使者之酬對逢鄂坂之譏嫌值耐門之征稅乘白馬而不前䇿青騾而轉礙吹落葉之扁舟飄長帆於上遊彼鋸牙而勾爪又巡江而習流排青龍之戰艦鬭飛燕之船樓張遼臨於赤壁王濬下於巴丘乍風驚而射火或箭重而回舟未辨聲於黃蓋已先沈於杜侯落帆黃鶴之浦藏船鸚鵡之洲路已分於湘漢星猶看於斗牛若乃隂陵失路釣臺斜趣望赤岸而霑衣艤烏江而不度雷池柵浦鵲陵焚戍旅舍無煙巢禽失樹謂荆衡之杞梓庶江漢之可恃淮海維揚三千餘里過漂渚而寄食託蘆中而度水屆于七澤濵于十死嗟天保之未定見殷憂之方始本不逹於危行又無情於祿仕謬掌衛於中軍濫尸丞於御史信生世等於龍門辭親同於河洛奉立身之遺訓受成書之顧託昔三世而無慙今七葉而始落泣風雨於梁山惟枯魚之銜索入欹斜之小徑掩蓬藋之荒扉就汀洲之杜若待蘆葦之單衣于時西楚霸王劔及繁陽鏖兵金匱校戰玉堂蒼鷹赤雀鐡舳牙檣沈白馬而誓衆負黃龍而度湘海潮迎艦江萍送王戎車屯于石城戈船掩乎淮泗諸侯則鄭伯前驅盟主則荀罃暮至剖巢燻穴奔魑走魅埋長狄於駒門斬蚩尤於中冀然腹為燈飲頭為器直虹貫壘長星屬地昔之虎據龍盤加以黃旗紫氣莫不隨狐兔而窟穴與風塵而殄瘁西瞻博望北臨玄圃月榭風臺池平樹古倚弓於玉女􅐼扉繫馬於鳳凰樓柱仁夀之鏡徒懸茂陵之書空聚若夫立德立言謨明寅亮聲超於繫表道高於河上既不遇於浮丘遂無言於師曠指愛子而託人知西陵而誰望非無北闕之兵猶有雲臺之仗司徒之表裏經綸狐偃之惟王實勤橫雕戈而對霸主執金鼓而問賊臣平吳之功壯於杜元凱王室是賴深於溫太真始則地名全節終以山稱枉人南陽校書去之已逺上蔡逐獵知之何晚鎮北之負譽矜前風颷懍然水神遭箭山靈見鞭是以蟄熊傷馬浮蛟沒船才子並命俱非百年中宗之夷凶靜亂大雪冤耻去代邸而承基遷唐郊而纂祀反舊章於司隸歸餘風於正始沉猜則方逞其欲藏疾則自矜於己天下之事沒焉諸侯之心搖矣既而齊交北絶秦患西起况背關而懷楚異端委而開吳驅緑林之散卒拒驪山之叛徒營軍梁溠搜乘巴渝問諸淫昏之鬼求諸厭劾之巫荆門遭廩延之戮夏首濫逵泉之誅蔑因親於教愛忍和樂於彎弧慨無謀於肉食非所望於論都未深思於五難先自擅於二端登陽城而避險卧底柱而求安既言多於忌刻實志勇於刑殘但坐觀於時變本無情於急難地惟黑子城猶彈丸其怨則黷其盟則寒豈冤禽之能塞海非愚叟之可移山況以沴氣朝浮妖精夜殞赤鳥則三朝夾日蒼雲則七重圍軫亡吳之歲既窮入郢之年斯盡周含鄭怒楚結秦冤有南風之不競值西鄰之責言俄而梯衝亂舞冀馬雲屯棧秦車於暢轂沓漢鼓於雷門下陳倉而連弩度臨晉而橫船雖復楚有七澤人稱三户箭不麗於六麋雷無驚於九虎辭洞庭兮落木去涔陽兮極浦熾火兮焚旗貞風兮害蠱乃使玉軸揚灰龍文斫柱下江餘城長林故營徒思箝馬之秣未見燒牛之兵章曼支以轂走宮之奇以族行河無氷而馬度關未曉而雞鳴忠臣解骨君子吞聲章華望祭之所雲夢偽逰之地荒谷縊於莫敖冶父囚乎羣帥硎穽摺拉鷹鸇批㩌冤霜夏零憤泉秋沸城崩把婦之哭竹染湘妃之淚水毒秦涇山高趙陘十里五里長亭短亭飢隨蟄燕暗逐流螢秦中水黑關上泥青于時瓦解氷泮風飛電散渾然千里淄澠一亂雪暗如沙氷橫似岸逢赴洛之陸機見離家之王粲莫不聞隴水而掩泣向關山而長歎況復君在交河妾在清波石望夫而逾逺山望子而逾多才人之憶代郡公主之去清河栩陽亭有離别之賦臨江王有愁思之歌别有飄颻武威羈旅金微班超生而望反溫序死而思歸李陵之雙鳬永去蘇武之一鴈空飛昔江陵之中否乃金陵之禍始雖借人之外力實蕭墻之內起撥亂之主忽焉中興之宗不祀伯兮叔兮同見戮於猶子荆山鵲飛而玉碎隨岸蛇生而珠死鬼火亂於平林殤魂驚於新市梁故豐徙楚實秦亡不有所廢其何以昌有媯之後遂育于薑輸我神器居為讓王天地之大德曰生聖人之大寶曰位用無賴之子孫舉江東而全棄惜天下之一家遭東南之反氣以鶉首而賜秦天何為而此醉且夫天道回旋民生預焉余烈祖於西晉始流播於東川洎余身而七葉又遭時而北遷提挈老幼關河纍年死生契闊不可問天况復零落將盡靈光巋然日窮于紀歲將復始逼切危慮端憂暮齒踐長樂之神臯望宣平之貴里渭水貫於天門驪山回於地市幕府大將軍之愛客丞相平津侯之待士見鍾鼎於金張聞絃歌於許史豈知灞陵夜獵猶是故時將軍咸陽布衣非獨思歸王子大象初以疾去職卒隋文帝深悼之贈本官加荆淮二州刺史子立嗣史臣曰兩儀定位日月揚暉天文彰矣八卦以陳書契有作人文詳矣若乃墳索所紀莫得而云典謨以降遺風可述是以曲阜多才多藝鑒二代以正其本闕里性與天道修六經以維其末故能範圍天地綱紀人倫窮神知化稱首於千古經邦緯俗藏用於百代至矣哉斯固聖人之述作也逮乎兩周道喪七十義乖淹中稷下八儒三墨辨博之論蜂起漆園黍谷名法兵農宏放之詞霧集雖雅誥奧義或未盡善考其所長蓋賢逹之源流也其後逐臣屈平作離騷以敘志宏才豔發有惻隱之美宋玉南國詞人追逸轡而亞其迹大儒荀況賦禮智以陳其情含章鬱起有諷論之義賈生洛陽才子繼清景而奮其暉並陶鑄性靈組織風雅詞賦之作實為其冠自是著述滋繁體制匪一孝武之後雅尚斯文揚葩振藻者如林而二馬王楊為之傑東京之朝兹道愈扇咀徵含商者成市而班傅張蔡為之雄當塗受命尤好蟲篆金行勃興無替前烈曹王陳阮負宏衍之思挺棟幹於鄧林潘陸張左擅侈麗之才飾羽儀於鳳穴斯並高視當世連衡孔門雖時運推移質文屢變譬猶六代並湊易俗之用無爽九流競逐一致之理同歸歷選前英於兹為盛既而中州板蕩戎狄交侵僭偽相屬士民塗炭故文章黜焉其潛思於戰爭之間揮翰於鋒鏑之下亦往往而間出矣若乃魯徽杜廣徐光尹弼之儔知名於二趙宋諺封奕朱彤梁讜之屬見重於燕秦然皆迫於倉卒牽於戰爭競奏符檄則粲然可觀體物緣情則寂寥於世非其才有優劣時運然也至朔漠之地蕞爾夷俗胡義周之頌國都足稱宏麗區區河右而學者埒於中原劉延明之銘酒泉可謂清典子曰十室之邑必有忠信豈徒言哉洎乎有魏定鼎沙朔南包河淮西吞關隴當時之士有許謙崔宏崔浩高允高閭遊雅等先後之間聲實俱茂詞義典正有永嘉之遺烈焉及太和之辰雖復崇尚文雅方驂並路多乖往轍涉海登山罕值良寶其後袁翻才稱淡雅常景思摽沉鬱彬彬焉蓋一時之俊秀也周氏創業運屬陵夷纂遺文於既喪聘奇士如弗及是以蘇亮蘇綽盧柔唐瑾元偉李昶之徒咸奮鱗翼自致青紫然綽建言務存質朴遂粳粃魏晉憲章虞夏雖屬詞有師古之美矯枉非適時之用故莫能常行焉既而革車電邁渚宮雲撤爾其荆衡把梓東南竹箭備器用於廟堂者衆矣唯王褒庾信奇才秀出牢籠於一代是時世宗雅詞雲委滕趙二王雕章間發咸築宮虛館有如布衣之交由是朝廷之人閭閻之士莫不忘味於遺韻眩精於末光猶丘陵之仰嵩岱川流之宗溟渤也然則子山之文發源於宋末盛行於梁季其體以淫放為本其詞以輕險為宗故能誇目侈於紅紫蕩心逾於鄭衛昔楊子雲有言詩人之賦麗以則詞人之賦麗以淫若以庾氏方之斯又詞賦之罪人也原夫文章之作本乎情性覃思則變化無方形言則條流遂廣雖詩賦與奏議異軫銘誄與書論殊塗而撮其指要舉其大抵莫若以氣為主以文傳意考其殿最定其區域托六經百氏之英華探屈宋卿雲之祕奧其調也尚逺其旨也在深其理也貴當其辭也欲巧然後瑩金璧播芝蘭文質因其宜繁約適其變權衡輕重斟酌古今和而能壯麗而能典煥乎若五色之成章紛乎猶八音之繁會夫然則魏文所謂通才足以備體矣士衡所謂難能足以逮意矣周書卷四十一周書卷四十一考證庾信傳過漂渚而寄食日知録云漂渚當是溧渚之訛張勃吳録曰子胥乞食處在丹陽溧陽縣金陵志曰江上有渚曰瀨渚是也古溧瀨同字周書卷四十一考證
