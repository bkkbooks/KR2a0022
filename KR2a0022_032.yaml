body:
  text: 周書卷三十二唐令狐德棻等撰列傳第二十四申徽陸通弟逞柳敏子昻盧柔唐瑾申徽字世儀魏郡人也六世祖鐘為後趙司徒冉閔末中原喪亂鐘子邃避地江左曾祖爽仕宋位雍州刺史祖隆道宋北兖州刺史父明仁郡功曹早卒徽少與母居盡心孝養及長好經史性審慎不妄交遊遭母憂喪畢乃歸於魏元皓入洛以元邃為東徐州刺史邃引徽為主簿皓敗邃被檻車送洛陽故吏賔客並委去唯徽送之及邃得免乃廣集賔友歎徽有古人風尋除太尉府行參軍孝武初徽以洛陽兵難未已遂間行入關見文帝文帝與語竒之薦之於賀拔嶽嶽亦雅相敬待引為賔客文帝臨夏州以徽為記室參軍兼府主簿文帝察徽沉密有度量每事信委之乃為大行臺郎中時軍國草創幕府務殷四方書檄皆徽之辭也以迎孝武功封博平縣子本州大中正大統初進爵為侯四年拜中書舍人修起居注河橋之役大軍不利近侍之官分散者衆徽獨不離左右魏帝稱歎之十年遷給事黃門侍郎先是東陽王元榮為瓜州刺史其女壻劉彥隨焉及榮死瓜州首望表榮子康為刺史彥遂殺康而取其位屬四方多難朝廷不遑問罪因授彥刺史頻徴不奉詔又南通吐谷渾將圖叛逆文帝難於動衆欲以權略致之乃以徽為河西大使密令圖彥徽輕以五十騎行既至止於賔館彥見徽單使不以為疑徽乃遣一人微勸彥歸朝以揣其意彥不從徽又使贊成其住計彥便從之遂來至館徽先與瓜州豪右密謀執彥遂叱而縛之彥辭無罪徽數之曰君無尺寸之功濫居方嶽之重恃逺背誕不恭貢職戮辱使人輕忽詔命計君之咎實不容誅但授詔之日本令相送歸闕所恨不得申明罰以謝邊逺耳於是宣詔慰勞吏人及彥所部復云大軍續至城內無敢動者使還遷都官尚書十二年瓜州刺史成慶為城人張保所殺都督令狐延等起義逐保啓請刺史以徽信洽西土拜假節瓜州刺史徽在州五稔儉約率下邊人樂而安之十六年徴兼尚書右僕射加侍中驃騎大將軍開府儀同三司廢帝二年進爵為公正右僕射賜姓宇文氏徽性勤敏凡所居官案牘無大小皆親自省覽以是事無稽滯吏不得為姦後雖歷公卿此志不懈出為襄州刺史時南方初附舊俗官人皆通餉遺徽性廉慎乃畫楊震像於寢室以自戒及代還人吏送者數十里不絶徽自以無德於人慨然懷愧因賦詩題於清水亭長幼聞之競來就讀遞相謂曰此是申使君手迹並寫誦之明帝以御正任總絲綸更崇其秩為上大夫員四人號大御正又以徽為之歷小司空少保出為荆州刺史入為小司徒小宗伯天和六年上疏乞骸骨詔許之薨贈泗州刺史諡曰章子康嗣位瀘州刺史司織下大夫上開府康弟敦汝南郡守敦弟靜齊安郡守靜弟處上開府同昌縣侯卒陸通字仲明吳郡人也曾祖載從宋武帝平關中軍還留載隨其子義真鎮長安遂沒赫連氏魏太武平赫連氏載仕魏任中山郡守父政性至孝其母吳人好食魚北土魚少政求之常苦難後宅側忽有泉出而有魚遂得以供膳時人以為孝感所致因謂其泉為孝魚泉初從爾朱天光討伐及天光敗歸文帝文帝為行臺以政為行臺左丞原州長史賜爵中都縣伯大統中卒通少敦敏好學有志節幼從在河西遂逢寇難與政相失通乃自拔東歸從爾朱榮榮死又從爾朱兆及爾朱氏滅乃入關文帝時在夏州引為帳內督頃之賀拔嶽為侯莫陳悅所害時有傳兵軍府已亡散者文帝憂之通以為不然居數日問至果如所策自是愈見親禮遂晝夜陪侍家人罕見其面通雖處機密愈自恭謹文帝以此重之後以迎孝武功封都昌縣伯大統元年進爵為侯從禽竇泰復𢎞農沙苑之役力戰有功又從解洛陽圍軍還屬趙青雀反於長安文帝將討之以人馬疲弊不可速行又謂青雀等一時陸梁不足為慮乃云我到長安但輕騎臨之必當而縛通進曰青雀等既以大軍不利謂朝廷傾危同惡相求遂成反亂然其逆謀久定必無遷善之心且其詐言大軍敗績東寇將至若以輕騎往百姓謂為信然更沮兆庶之望大兵雖疲弊精鋭猶多以明公之威率思歸之衆以順討逆何慮不平文帝深納之因從平青雀録前後功進爵為公徐州刺史以寇難未平留不之部與于謹討劉平伏加大都督從文帝援玉壁進儀同三司九年高仲密以地來附通從若干惠戰於邙山衆軍皆退唯惠與通率所部力戰至夜中乃隂引還敵亦不敢逼進授驃騎大將軍開府儀同三司太僕卿賜姓步六孤氏進爵綏德郡公周孝閔踐阼拜小司空保定五年纍遷大司寇通性柔謹雖久處列位常清慎自守所得祿賜盡與親故共之家無餘財常曰凡人患貧而不貴不患貴而貧也建德元年轉大司馬其年薨通弟逞逞字季明初名彥字世雄魏文帝常從容謂之曰爾既溫裕何因乃字世雄且為世之雄非所宜也於爾兄弟又復不類遂改焉逞少謹密早有名譽兄通先以軍功别受茅土乃讓父爵中都縣伯令逞襲之起家羽林監文帝內親信時輩皆以驍勇自達唯逞獨兼文雅文帝由此加禮遇焉大統十四年參大丞相府軍事尋兼記室保定初纍遷吏部中大夫歷藩部御伯中大夫進驃騎大將軍開府儀同三司徙授司宗中大夫轉軍司馬逞幹識詳明歷任三府所在著績朝廷嘉之進爵為公天和三年齊遣侍中斛斯文略中書侍郎劉逖來聘初修鄰好盛選行人詔逞為使主尹公正為副以報之逞美容止善辭令敏而有禮齊人稱焉還屆近畿詔令路車飾服郊迎而入時人榮之四年除京兆尹都界有豕生數子經旬而死其家又有豶遂乳養之諸豚賴之以活時論以逞仁政所致俄遷司會中大夫出為河州刺史晉公護雅重其才表為中外府司馬頗委任之尋復為司會兼納言遷小司馬及護誅坐免官頃之起為納言又以疾不堪劇任乃除宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之武帝深嘉焉詔遂其所請以彰雅操逞在州有惠政吏人稱之東宮初建授太子太保卒贈大將軍子操嗣柳敏字白澤河東解縣人晉太常純之七世孫也父懿魏車騎大將軍儀同三司汾州刺史敏九歲而孤事母以孝聞性好學涉獵經史隂陽卜筮之術靡不習焉年未弱冠起家員外散騎侍郎纍遷河東郡丞朝議以敏之本邑故有此授敏雖統御鄉里而處物平允甚得時譽及文帝剋復河東見而器異之乃謂之曰今日不喜得河東喜得卿也即拜丞相府參軍事俄轉戶曹參軍掌記室每有四方賔客恆令接之爰及吉凶禮儀亦令監綜又與蘇綽等修撰新制為朝廷政典遷禮部郎中封武城縣子加帥都督領本鄉兵俄進大都督遭母憂居喪旬日之間鬢髮半白尋起為吏部郎中毁瘠過禮杖而後起文帝見而歎異之特加廩賜及尉遲迥伐蜀以敏為行軍司馬軍中籌略並以委之益州平進驃騎大將軍開府儀同三司加侍中遷尚書賜姓宇文氏六官建拜禮部中大夫孝閔帝踐阼進爵為公又除河東郡守尋復徴拜禮部出為郢州刺史甚得物情及將還朝夷夏士人感其惠政並齎酒肴及土産候之於路敏乃從他道而還復拜禮部後改禮部為司宗仍以敏為之敏操履方正性又恭勤每日將朝必夙興待旦又久處臺閣明練故事近儀或乖先典者皆按據舊章刋正取中遷小宗伯監修國史轉小司馬又監修律令進位大將軍出為鄜州刺史以疾不之部武帝平齊進爵武德郡公敏自建德以後寢疾積年武帝及宣帝並親幸其第問疾焉開皇元年進位上大將軍太子太保其年卒贈五州諸軍事晉州刺史臨終誠其子等喪事所須務從簡約其子等並涕泣奉行少子昻昻字千里幼聰潁有器識幹局過人武帝時為內史中大夫開府儀同三司賜爵文城郡公當途用事百寮皆出其下昻竭誠獻替知無不為謙虛自處未嘗驕物時論以此重之武帝崩受遺輔政稍被宣帝疏然不離本職隋文帝為丞相深自結納文帝以為大宗伯拜日遂得偏風不能視事文帝受禪疾愈加上開府拜潞州刺史昻見天下無事上表請勸學行禮上覽而善之優詔答昻自是天下州縣皆置博士習禮焉昻在州甚有惠政卒官子調嗣盧柔字子剛少孤為叔母所養撫視甚於其子柔盡心溫清亦同已親宗族歎重之性聰敏好學未弱冠解屬文但口吃不能持論頗使酒誕節為世所譏司徒臨淮王彧見而器之以女妻焉及魏孝武與齊神武有隙詔賀拔勝出牧荆州柔謂因此可著功績遂從勝之荆州以柔為大行臺郎中掌書記軍中機務柔多預之及勝為太保以柔為掾加冠軍將軍孝武後召勝引兵赴洛勝以問柔曰髙歡託晉陽之甲意實難知公宜席卷赴都與決勝負存沒以之此忠之上策也若北阻魯陽南并舊楚東連兗豫西接關中帶甲十萬觀釁而動亦中策也舉三荆之地通款梁國可以身免功名去矣策之下者勝輕柔年少笑而不應及孝武西遷東魏遣侯景襲穰勝敗遂南奔梁柔亦從之勝頻表梁求歸武帝覽表嘉其辭彩既知柔所製因遣舍人勞問并遺縑錦後與勝俱還行至襄陽齊神武懼勝西入遣侯景以輕騎邀之勝及柔懼乃棄船山行贏糧冒險經數百里時屬秋霖徒侣凍餒死者大半至豐陽界柔迷失道獨宿僵木之下寒雨衣濕殆至於死大統二年至長安封容城縣男邑二百戶太祖重其才引為行臺郎中加平東將軍除從事中郎與蘇綽對掌機密時沙苑之後大軍屢捷汝潁之間多舉義來附書翰往反日百餘牒柔隨機報答皆合事宜進爵為子增邑三百戶除中書舍人遷司農少卿轉郎兼著作撰起居注後拜黃門侍郎文帝知其貧解衣賜之魏廢帝元年加車騎大將軍儀同三司散騎常侍中書監孝閔帝踐阼拜小內史遷內史大夫進位開府卒於位所作詩頌碑銘檄表啓行於世者數十篇子愷嗣愷字長仁涉獵經史有當世幹能起家齊王記室歷吏部內史上士禮部下大夫尋為聘陳副使大象初拜東京吏部下大夫唐瑾字附璘父永性溫恭有器量博涉經史雅好屬文身長八尺二寸容貌甚偉年十七周文聞其名乃貽永書曰聞公有二子曰陵從橫多武略瑾雍容富文雅可並遣入朝孤欲委以文武之任因召拜尚書員外郎相府記室參軍事軍書羽檄瑾多掌之從破沙苑戰河橋並有功封姑臧縣子纍遷尚書右丞吏部郎中于時魏室播遷庶務草創朝章國典瑾並參之遷戶部尚書進位驃騎大將軍開府儀同三司賜姓宇文氏時燕公于謹勳髙望重朝野所屬白文帝言瑾學行兼修願與之同姓結為兄弟庶子孫承其餘論有益義方文帝歎異者久之更賜瑾姓萬紐于氏瑾乃深相結納敦長幼之序謹亦庭羅子孫行弟姪之敬其為朝望所宗如此進爵臨淄縣伯轉吏部尚書銓綜衡流雅有人倫之鑒以父憂去職尋起令視事時六尚書皆一時之秀周文自謂得人號為六俊然瑾尤見器重于謹南伐江陵以瑾為元帥府長史軍中謀略多出瑾焉江陵既平衣冠仕伍並沒為僕隸瑾察其才行有片善者輒議免之賴瑾獲濟者甚衆時論多焉及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或白文帝曰唐瑾大有輜重悉是梁朝珍玩文帝初不信之然欲眀其虛實密遣使檢閲之唯見墳籍而已乃歎曰孤知此人來二十許年明其不以利干義向若不令檢視恐常人有投杼之疑所以益明之耳凡受人委任當如此也論平江陵功進爵為公六官建授禮部中大夫出為蔡州刺史歷柘州硤州所在皆有德化人吏稱之轉荆州總管府長史入為吏部中大夫歷御正納言中大夫曾未十旬遂遷四職搢紳以為榮久之除司宗中大夫兼內史尋卒于位贈小宗伯諡曰方瑾性方重有風格退朝休暇恆著衣冠以對妻子遇迅雷烈風雖間夜宴寢必起冠帶端笏危坐又好施與家無餘財所得祿賜常散之宗族其尤貧者又割膏腴田宇以賑之所留遺子孫者並墝埆之地朝野以此稱之撰新儀十篇所著賦頌碑誄二十餘萬言孫大智嗣瑾次子令則性好篇章兼解音律文多輕豔為時人所傳天和中以齊馭下大夫使於陳大象中官至樂部下大夫仕隋位太子左庶子皇太子勇廢被誅周書卷三十二
