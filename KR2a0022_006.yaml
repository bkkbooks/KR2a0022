body:
  text: 周書卷六唐令狐德棻等撰帝紀第六武帝下建德四年春正月戊辰以柱國枹罕公辛威為寧州總管太原公王康為襄州總管初置營軍器監壬申詔曰今陽和布氣品物資始敬授民時義兼敦勸詩不云乎弗躬弗親庶民弗信刺史守令宜親勸農百司分番躬自率導事非機要並停至秋鰥寡孤獨不能自存者所在量加賑恤逋租懸調兵役殘功並宜蠲免癸酉行幸同州二月丙戌朔日有蝕之辛卯改置宿衛官員巳酉柱國廣德公李意有罪免三月丙辰遣小司寇淮南公元衛納言伊婁謙使於齊郡縣各省主簿一人丙寅至自同州甲戌以柱國趙王招為雍州牧夏四月甲午柱國燕國公于實有罪免丁酉初令上書者並為表於皇太子以下稱啓六月詔東南道四總管內自去年以來新附之戶給復三年秋七月丙辰行幸雲陽宮己未禁五行大布錢不得出入關布泉錢聽入而不聽出丁卯至自雲陽宮甲戌陳遣使來聘丙子召大將軍以上於大德殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼僞齊猶懷跋扈雖復戎車屢駕而大勳未集朕以寡昧纂承鴻緒往以政出權宰無所措懷自親覽萬機便圗東討惡衣菲食繕甲治兵數年已來戰備稍足而僞主昏虐恣行無道伐暴除亂斯實其時今欲數道出兵水陸兼進北拒太行之路東扼黎陽之險若攻拔河陰兖豫則馳檄可定然後養鋭享士以待其至但得一戰則破之必矣王公以為何如羣臣咸稱善丁丑詔曰髙氏因時放命據有汾漳擅假名器厯年永久朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懷惡不悛尋事侵軼背言負信竊邑藏姦往者軍下宜陽釁由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并啓來蘇之望既禍盈惡稔衆叛親離不有一戎何以大定今白藏在辰涼風戒節厲兵詰暴時事惟宜朕當親御六師龔行天罰庶憑祖宗之靈潛資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純為前一軍總管榮陽公司馬消難為前二軍總管鄭國公逹奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲率衆二萬趣黎陽隋國公楊堅廣寧侯薛回舟師三萬自渭入河柱國梁國公侯莫陳芮率衆一萬守太行道申國公李穆帥衆三萬守河陽道常山公于翼帥衆二萬出陳汝壬午上親率六軍衆六萬直指河陰八月癸卯入于齊境禁伐樹踐苗稼犯者以軍法從事丁未上親率諸軍攻河陰大城拔之進攻子城未克上有疾九月辛酉夜班師水軍焚舟而退齊王憲及于翼李穆等所在克捷降拔三十餘城皆棄而不守唯以王藥城要害令儀同三司韓正守之正尋以城降齊戊寅至自東伐己卯以華州刺史畢王賢為荆州總管冬十月戊子初置上柱國上大將軍官改開府儀同三司為開府儀同大將軍儀同三司為儀同大將軍又置上開府上儀同官甲午行幸同州閏月齊將尉相貴寇大寧延州總管王慶擊走之以柱國齊王憲蜀國公尉遲迥為上柱國柱國代王逹為益州總管大司寇滎陽公司馬消難為梁州總管詔諸畿郡各舉賢良十一月己亥改置司內官員十二月辛亥朔日有食之庚午至自同州丙子陳遣使來聘是嵗岐寧二州民饑開倉賑給五年春正月癸未行幸同州辛卯行幸河東涑川集關中河東諸軍校獵甲午還同州丁酉詔曰朕克已思治而風化未𢎞永言前古載懷夕惕可分遣大使周省四方察訟聽謠問民恤𨼆其獄犴無章侵漁黎庶隨事䆒驗條録以聞若政績有施治綱克舉及行宣圭蓽道著邱園並須撿審依名騰奏其鰥寡孤獨實可哀矜亦宜賑給務使周贍廢布泉錢戊申初令鑄錢者絞其從者遠配為民二月辛酉遣皇太子贇巡撫西土仍討吐谷渾戎事節度並宜隨機專决三月庚子月犯東井第一星壬寅至自同州文宣皇后服再期戊申祥夏四月乙卯行幸同州開府清河公宇文神舉攻拔齊陸渾等五城五月壬辰至自同州六月戊申朔日有食之辛亥祠太廟丙辰利州總管紀王康有罪賜死丁巳行幸雲陽宮月掩心後星庚午熒惑入輿鬼秋七月乙未京師旱八月戊申皇太子伐吐谷渾至伏俟城而還乙卯至自雲陽宮乙丑陳遣使來聘九月丁丑大醮於正武殿以祈東伐冬十月帝謂羣臣曰朕去嵗屬有疹疾遂不得克平逋寇前入賊境備見敵情觀彼行師殆同兒戲又聞其朝政昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔若復同往年出軍河外直為撫背未扼其喉然晉州本髙歡所起之地鎮攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乘破竹之勢鼓行而東足以窮其窟穴混同文軌諸將多不願行帝曰幾者事之微不可失矣若有沮吾軍者朕當以軍法裁之己酉帝總戎東伐以越王盛為右一軍總管杞國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇泰為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍庚戍熒惑犯太微上將戊午嵗星犯太陵癸亥帝至晉州遣齊王憲率精騎二萬守雀鼠谷陳王純步騎二萬守千里徑鄭國公逹奚震步騎一萬守統軍川大將軍韓明步騎五千守齊子嶺焉氏公尹升步騎五千守鍾鼓鎮涼城公辛韶步騎五千守蒲津關柱國趙王招步騎一萬自華谷攻齊汾州諸城柱國宇文盛步騎一萬守汾水關遣內史王誼監六軍攻晉州城帝屯於汾曲齊王憲攻洪洞永安二城並拔之是夜虹見於晉州城上首向南尾入紫微宮長十餘丈帝每日自汾曲赴城下親督戰城中惶窘庚午齊行臺左丞侯子欽出降壬申齊晉州刺史崔景嵩守城北面夜密遣使送款上開府王軌率衆應之未明登城鼓噪齊衆潰遂克晉州擒其城主特進開府海昌王尉相貴俘甲士八千人送關中甲戍以上開府梁士彥為晉州刺史加授大將軍留精兵一萬以鎮之又遣諸軍徇齊諸城鎮並相次降欵十一月己卯齊主自并州率衆來援帝以其兵新集且避之乃詔諸軍班師遣齊王憲為後拒是日齊主至晉州憲不與戰引軍度汾齊主遂圍晉州晝夜攻之齊王憲屯諸軍於涑水為晉州聲援河東地震癸巳至自東伐獻俘於太廟甲午詔曰僞齊違信背約惡稔禍盈是以親總六師問罪汾晉兵威所及莫不摧殄賊衆危惶烏栖自固暨元戎反斾方來聚結遊魂境首尚敢趦趄朕今更率諸軍應機除剪丙申放齊諸城鎮降人還丁酉帝發京師壬寅度河與諸軍合十二月戊申次於晉州初齊攻晉州恐王師卒至於城南穿塹自喬山屬於汾水庚戍帝帥諸軍八萬人置陳東西二十餘里帝乘常御馬從數人巡陳處分所至輒呼主帥姓名以慰勉之將士感見知之恩各思自厲將戰有司請換馬帝曰朕獨乘良馬何所之齊主亦于塹北列陳申後齊人填塹南引帝大喜勒諸軍擊之齊人便退齊主與其麾下數十騎走還并州齊衆大潰軍資甲仗數百里間委棄山積辛亥帝幸晉州仍率諸軍追齊主諸將固請還師帝曰縱敵患生卿等若疑朕將獨往諸將不敢言甲寅齊主遣其丞相髙阿那肱守高壁帝麾軍直進那肱望風退散丙辰師次介休齊將韓建業舉城降以為上柱國封郇國公丁巳大軍次并州齊主留其從兄安德王延宗守并州自將輕騎走鄴是日詔曰此下缺人寄喉脣之重棟梁骨鯁翦為仇讐狐趙緒餘降成皂𨽻民不見德唯虐是聞朕懷兹漏網置之度外正欲各靜封疆共紓民瘼故也爾之主相曽不是思欲構厲階反貽其梗我之率土咸求倳刃帷幄獻兼弱之謀爪牙奮干戈之勇贏糧坐甲若赴私讐是以一鼓而定晉州再舉而摧逋醜僞丞相髙阿那肱驅逼餘燼竊據高壁僞定南王韓建業作守介休規相抗擬聊示兵威應時崩潰那肱則單馬宵遁建業則面縳軍和爾之逃卒所知見也若其懷遠以德則爾難以德綏處鄰以義則爾難以義服且天與不取道家所忌攻昧侮亡兵之上術朕今親馭羣雄長驅宇內六軍舒斾萬隊啓行勢與雷電爭威氣逐風雲齊舉王師所次已逹近郊望嵗之民室家相慶來蘇之后思副厥誠僞主若妙盡人謀深逹天命牽羊道左銜璧轅門當惠以焚櫬之恩待以列侯之禮僞將相王公已下衣冠士民之族如有深識事宜建功立效官榮爵賞各有加隆若下愚不移守迷莫改則委之執憲以正刑書嗟爾庶士胡寧自棄或我之將卒逃彼逆朝無問貴賤皆從蕩滌善求多福無貽後悔璽書所至咸使聞知自是齊之將帥降者相繼封其特進開府賀拔伏恩為郜國公其餘官爵各有差戊午髙延宗僭即僞位改年德昌己未軍次并州庚申延宗擁兵四萬出城抗拒帝率諸軍合戰齊人退帝乘勝逐北率千餘騎入東門詔諸軍繞城置陳至夜延宗率其衆排陳而前城中軍却人相蹂踐大為延宗所敗死傷略盡齊人欲閉門以閽下積尸扉不得闔帝從數騎崎嶇危險僅得出門至明率諸軍更戰大破之擒延宗并州平壬戍詔曰昔天厭水運龍戰于野兩京圮隔四紀于兹朕垂拱巖廊君臨宇縣相邠民於海內混楚弓於天下一物失所有若推溝方欲德綏未服義征不譓僞主髙緯放命燕齊怠慢典刑俶擾天紀加以背惠怒鄰棄信忘義朕應天從物伐罪弔民一鼓而蕩平陽再舉而摧勍敵僞署王公相繼道左髙緯智窮數屈逃竄草間僞安德王髙延宗擾攘之間遂竊名號與僞齊昌王莫多婁敬顯等收合餘燼背城抗敵王威既振魚潰鳥離破竹更難建瓴非易延宗衆散解甲軍門根本既傾枝葉自霣幽青海岱折簡而來冀北河南傳檄可定八紘共貫六合同風方當偃伯靈臺休牛桃塞無疆之慶非獨在余漢皇約法除其苛政姬王輕典刑彼新邦思覃惠澤被之率土新舊臣民皆從蕩滌可大赦天下髙緯及王公以下若釋然歸順咸許自新諸亡入僞朝亦從寬宥官榮次序依例無失其齊僞制令即宜削除鄒魯縉紳幽并騎士一介可稱並宜銓録百年去殺雖或難希期月有成庶幾可勉丙寅出齊宮中金銀寶器珠翠麗服及宮女二千人班賜將士以柱國趙王招陳王純越王盛把國公亮梁國公侯莫陳苪庸國公王謙北平公冦紹鄭國公逹奚震並為上柱國封齊王憲子安城郡公質為河間王大將軍廣化公丘崇為潞國公神水公姬願為原國公廣業公尉遲運為盧國公諸有功者封授各有差癸酉帝率六軍趣鄴以上柱國陳王純為并州總管六年春正月乙亥齊主傳位於其太子恆改年承光自號為太上皇壬辰帝至鄴齊主先於城外掘塹豎柵癸巳帝率諸軍圍之齊人拒守諸軍奮擊大破之遂平鄴齊主先送其母并妻子於青州及城陷乃率數十騎走青州遣大將軍尉遲勤率二千騎追之是戰也於陳獲其齊昌王莫多婁敬顯帝責之曰汝有死罪者三前從并走鄴㩦妾棄母是不孝外為僞主戮力內實通啓於朕是不忠送款之後猶持兩端是不信如此用懷不死何待遂斬之是日西方有聲如雷者一甲午帝入鄴城齊任城王湝先在冀州齊主至河遣其侍中斛律孝卿送傳國璽禪位於湝孝卿未逹被執送鄴詔去年大赦班宣未及之處皆從赦例封齊開府洛州刺史獨孤永業為應國公丙申以上柱國越王盛為相州總管己亥詔曰自晉州大陳至於平鄴身殞戰場者其子即授父本官尉遲勤擒齊主及其太子恆於青州庚子詔曰僞齊之末姦佞擅權濫罰淫刑動挂羅網僞右丞相咸陽王故斛律明月僞侍中特進開府故崔季舒等七人或功髙獲罪或直言見誅朕兵以義動翦除凶暴表閭封墓事切下車宜追贈諡并窆措其見存子孫各隨蔭敘録家口田宅沒官者並還之辛丑詔曰僞齊叛渙竊有漳濵世縱淫風事窮雕飾或穿池運石為山學海或層臺纍構槩日凌雲以暴亂之心極奢侈之事有一於此未或弗亡朕菲食薄衣以𢎞風教追念生民之費尚想力役之勞方當易兹弊俗率歸節儉其東山南園及三臺可並毁撤瓦木諸物凡入用者盡賜下民山園之田各還本主二月丙午論定諸軍功勳置酒於齊太極殿㑹軍士以上班賜有差丁未齊主至帝降自阼階以賔主之禮相見髙湝在冀州擁兵未下遣上柱國齊王憲與柱國隋公楊堅率軍討平之齊定州刺史范陽王高紹義叛入突厥齊諸行臺州鎮悉降關東平合州五十五郡一百六十二縣三百八十五戶三百三十萬二千五百二十八口二千萬六千六百八十六乃於河陽幽青南兖豫徐北朔定並置總管府相并二總管各置宫及六府官癸丑詔曰無侮焭獨事顯前書哀彼矜人惠流往訓僞齊末政昏虐實繁災甚滔天毒流比屋無罪無辜係虜三軍之手不飲不食僵仆九逵之門朕為民父母職養黎人念甚泣辜誠深罪已除其苛政事屬改張宜加寬宥兼行賑恤自僞武平三年以來河南諸州之民僞齊被掠為奴婢者不問官私並宜放免其住在淮南者亦即聽還願往淮北者可隨便安置其有癃殘孤老饑餒絶食不能自存者仰刺史守令及親民長司躬自檢校無親屬者所在給其衣食務使存濟乙卯帝自鄴還京丙辰以柱國隋公楊堅為定州總管三月壬午詔山東諸州各舉明經幹治者二人若竒才異術卓爾不羣者弗拘多少夏四月乙巳至自東伐列齊主於前其王公等並從車輿旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬嵗戊申封齊主為溫國公庚戍大㑹羣臣及諸蕃客於露寢乙卯廢蒲陜涇寧四州總管己巳祠太廟詔曰東夏既平王道初被齊氏弊政餘風未殄朕劬勞萬幾念存康濟恐清净之志未形四海下民疾苦不能上逹寢興軫慮用切於懷宜分遣使人巡方撫慰觀風省俗宣揚治道有司明立條科務在𢎞益五月丁丑以柱國譙王儉為大冢宰庚辰以上柱國把國公亮為大司徒鄭國公逹奚震為大宗伯梁國公侯莫陳芮為大司馬柱國應國公獨孤永業為大司寇鄖國公韋孝寬為大司空辛巳大醮於正武殿以報功也己丑祠方丘詔曰朕欽承丕緒寢興寅畏惡衣菲食貴昭儉約上棟下宇土階茅屋猶恐居之者逸作之者勞詎可廣厦髙堂肆其嗜欲往者冡臣專任制度有違正殿别寢事窮壯麗非直雕牆峻宇深戒前王而締構𢎞敞有踰清廟不軌不物何以示後兼東夏初平民未見德率先海內宜自朕始其露寢㑹義崇信含仁雲和思齊諸殿等農隙之時悉可毁撤雕斫之物並賜貧民繕造之宜務從卑朴癸巳行幸雲陽宫戊戍詔曰京師宮殿已從撤毁并鄴二所華侈過度誠復作之非我豈容因而弗革諸堂殿壯麗並宜除蕩甍宇雜物分賜窮民三農之隙别漸營構止蔽風雨務在卑狹庚子陳遣使來聘是月青城門無故自崩六月丁未至自雲陽宮辛亥御正武殿録囚徒癸亥於河州雞鳴防置旭州甘松防置芳州廣川防置𢎞州甲子帝東巡丁卯詔曰同姓百世婚姻不通蓋惟重别周道然也而娶妻買妾有納母氏之族雖曰異宗猶為混雜自今以後悉不得娶母同姓以為妾其已定未成者即令改聘秋七月己卯封齊王憲第四子廣都公負為莒國公紹莒莊公洛生後癸未應州獻芝草丙戍行幸洛州己丑詔山東諸州舉有才者上縣六人中縣五人下縣四人赴行在所共論治政得失戊戍以上柱國庸公王謙為益州總管八月壬寅議定權衡度量頒於天下其不依新式者悉追停詔曰以刑止刑世輕世重罪不及嗣皆有定科雜役之徒獨異常憲一從罪配百世不免罰既無窮刑何以措道有沿革宜從寬典凡諸雜戶悉放為民配雜之科因之永削甲子鄭州獻九尾狐皮肉銷盡骨體猶具帝曰瑞應之來必昭有德若使五品時敘四海和平家識孝慈人知禮讓乃能致此今無其時恐非實録乃命焚之九月壬申以柱國鄧國公竇熾申國公李穆並為上柱國戊寅初令民庶已上唯聽衣綢綿綢絲布圓綾紗絹綃葛布等九種餘悉停斷朝祭之服不拘此例甲申絳州獻白雀壬辰詔東土諸州儒生明一經已上並舉送州郡以禮發遣癸卯封上大將軍上黃公王軌為郯國公吐谷渾遣使獻方物冬十月戊申行幸鄴宮戊午改葬德皇帝於冀州帝服緦哭於太極殿百官素服哭是月誅溫國公髙緯十一月庚午百濟遣使獻方物壬申封皇子充為道王兌為蔡王癸酉陳將吳明徹侵呂梁徐州總管梁士彥出軍與戰不利退守徐州遣上大將軍郯國公王軌率師討之是月稽胡反遣齊王憲率軍討平之詔自永熙三年七月已來去年十月已前東土之民被抄略在化內為奴婢者及平江陵之後良人沒為奴婢者並宜放免所在附籍一同民伍若舊主人猶須共居聽留為部曲及客女詔曰正位於中有聖通典質文相革損益不同五帝則四星之象三王制六宮之數劉曹已降等列彌繁選擇遍於生民命秩方於庶職椒房丹地有衆如雲本由嗜欲之情非關風化之義朕運當澆季思復古始無容廣集子女屯聚宮掖𢎞贊後庭事從約簡可置妃二人世婦三人御妻三人自兹以外悉宜減省己亥晦日有蝕之初行刑書要制持杖羣彊盜一匹以上不持杖羣彊盜五匹以上監臨主掌自盜二十匹以上小盜及詐僞請官物三十匹以上正長𨼆五戶及十丁以上𨼆地三頃以上者至死刑書所不載者自依律科十二月戊午吐谷渾遣使獻方物己未東夀陽土人反率衆五千襲并州城刺史東平公宇文神舉破平之庚申行幸并州宫移并州軍人四萬戶於關中丙寅以柱國滕王逌為河陽總管丁卯以柱國隋國公楊堅為南兖州總管上柱國申國公李穆為并州總管戊辰廢并州宮及六府是月北營州刺史髙寶寧據州反宣政元年春正月癸酉吐谷渾僞趙王他婁屯來降壬午行幸鄴宮分相州廣平郡置洺州清河郡置貝州黎陽郡置黎州汲郡置衛州分定州常山郡置恆州分并州上黨郡置潞州辛卯行幸懷州癸巳幸洛州詔於懷州置宮二月甲辰柱國大冢宰譙王儉薨丁已帝至自東巡乙丑以上柱國越王盛為大冢宰陳王純為雍州牧三月戊辰於蒲州置宮廢同州及長春二宮壬申突厥遣使獻方物甲戌初服常冠以皂紗為之加簪而不施纓導其制若今之折角巾也上大將軍郯國公王軌破陳師於呂梁擒其將吳明徹等俘斬三萬餘人丁亥詔柱國故豆盧寧征江南武陵南平等郡所有民庶為人奴婢者悉依江陵放免壬辰改元夏四月壬子初令遭父母喪者聽終制庚申突厥入寇幽州殺掠吏民議將討之五月己丑帝總戎北伐遣柱國原公姬願東平公宇文神舉等率軍五道俱入發關中公私驢馬悉從軍癸巳帝不豫止于雲陽宮丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乘輿時年三十六遺詔曰人肖形天地禀質五常修短之期莫非命也朕君臨宇縣十有九年未能使百姓安樂刑措罔用所以昧旦求衣分宵忘寢昔魏室將季海內分崩太祖扶危翼傾肇開王業燕趙榛蕪久竊名號朕上述先志下順民心遂與王公將帥共平東夏雖復妖氛蕩定而民勞未康每一念此如臨氷谷將欲包舉六合混同文軌今遘疾大漸氣力稍微有志不申以此歎息天下事重萬幾不易王公以下爰及庶僚宜輔導太子副朕遺意令上不負太祖下無失為臣朕雖瞑目九泉無所復恨朕平生居處每存菲薄非直以訓子孫亦乃本心所好喪事資用須使儉而合禮墓而不墳自古通典隨吉即葬葬訖公除四方士庶各三日哭妃嬪以下無子者悉放還家諡曰武皇帝廟稱髙祖己未葬於孝陵帝沉毅有智謀初以晉公護專權常自晦迹人莫測其深淺及誅護之後始親萬機克己勵精聽覽不怠用法嚴整多所罪殺號令懇惻唯屬意於政羣下畏服莫不肅然性既明察少於恩惠凡布懷立行皆欲踰越古人身衣布袍寢布被無金寶之飾諸宮殿華綺者皆撤毁之改為土階數尺不施櫨栱其雕文刻鏤錦繡纂組一皆禁斷後宮嬪御不過十餘人勞謙接下自彊不息以海內未康鋭情教習至於校兵閲武步行山谷履涉勤苦皆人所不堪平齊之役見軍士有跣行者帝親脫靴以賜之每宴㑹將士必自執杯勸酒或手付賜物至於征伐之處躬在行陳性又果决能斷大事故能得士卒死力以弱制强破齊之後遂欲窮兵極武平突厥定江南一二年間必使天下一統此其志也史臣曰自東西否隔二國爭彊戎馬生郊干戈日用兵連禍結力敵勢均疆場之事一彼一此髙祖纘業未親萬機慮遠謀深以蒙養正及英威電發朝政惟新內難既除外略方始乃苦心焦思克己勵精勞役為士卒之先居處同匹夫之儉修富民之政務彊兵之術乘讐人之有釁順大道而推亡五年之間大勳斯集攄祖宗之宿憤拯東夏之阽危盛矣哉其有成功者也若使翌日之瘳無爽經營之志獲申黷武窮兵雖見譏於良史雄圖遠略足方駕於前王者歟周書卷六周書卷六考證武帝紀下隋國公楊堅廣寧侯薛迥回舟師三萬自渭入河廣寧侯薛回北史作廣寧公侯莫陳回未知孰是封皇子充為道王通鑑云周立皇子衍為道王胡三省注云皇子當作皇孫周太子之長子臣文淳按武皇七男道王充字乾仁建德六年封王正與此合又云宣帝三子鄴王衍大象二年封王武帝時無封皇孫為王之事周書卷六考證
