body:
  text: 周書卷三十三唐令狐徳棻等撰列傳第二十五庫狄峙楊荐趙剛王慶趙昶王悦趙文表庫狄峙其先遼東人本姓段氏匹磾之後也因避難改焉後徙居代世爲豪右祖淩武威郡守父貞上洛郡守峙少以𢎞厚知名善騎射有謀略仕魏位髙陽郡守爲政仁恕百姓頗悦之孝武西遷峙乃棄官從入闗大綂元年拜中書舍人參掌機密以恭謹見稱遷黄門侍郎時與東魏爭衡戎馬不息蠕蠕乘虛屢爲邊患朝議欲結和親乃使峙徃峙狀貌魁梧善於辭令蠕蠕主雅信重之自是不復爲宼太祖謂峙曰昔魏絳和戎見稱前史以君方之彼有愧色封髙邑縣公邑八百户遷驃騎將軍岐州刺史加散騎常侍增邑二百户開府儀同三司恭帝元年徴拜侍中蠕蠕滅後突厥強盛雖與文帝通好而外連齊氏太祖又令峙銜命喻之突厥感悟即執齊使歸諸京師錄前後功拜大將軍安豐郡公邑通前二千户尋除小司空孝閔踐阼轉小司寇世宗初爲都督益潼等三十一州諸軍事益州刺史峙性寛和尚清靜甚爲夷獠所安保定四年除宣州刺史天和三年入爲少師峙以年老表乞骸骨手詔許之五年卒贈同州刺史諡曰定子嶷嗣少知名起家吏部上士歴小内史小納言授開府階遷職方中大夫爲蔡州刺史卒於官子授嗣楊荐字承略秦郡寧夷人也父寳昌平郡守荐幼孤早有名譽性廉謹喜怒不形於色魏永安中隨爾朱天光入闗討羣賊封髙邑縣男文帝臨夏州補帳内都督及平侯莫陳悦使荐入洛陽請事魏孝武帝授文帝闗西大行臺仍除荐直閣將軍時馮翊長公主婺居孝武意欲歸諸文帝乃令武衛元毘喻㫖荐歸白文帝又遣荐入洛陽請之孝武即許焉孝武欲向闗中荐贊成其計孝武曰卿歸語行臺迎我文帝又遣荐與長史宇文測出闗候接孝武至長安進爵清水縣子魏大綂元年蠕蠕請和親文帝遣荐與楊寛使并結婚而還進爵爲侯又使荐納幣於蠕蠕魏文帝郁久閭后崩文帝遣僕射趙善使蠕蠕更請婚善至夏州聞蠕蠕貳於東魏欲執使者善懼乃還文帝乃使荐徃賜黄金十斤雜綵三百疋荐至蠕蠕責其背惠食言幷論結婚之意蠕蠕感悟乃遣使隨荐報命焉及侯景來附文帝令荐與鎮遏荐知景飜覆遂求還具陳事實文帝乃遣使密追助景之兵尋而景叛十六年大軍東討文帝恐蠕蠕乘虚寇掠乃遣荐徃更論和好以安慰之進使持節驃騎大將軍開府儀同三司加侍中孝閔帝踐阼除御伯大夫進爵姚谷縣公仍使突厥結婚突厥可汗弟地頭可汗阿史􅄼庫頭居東面與齊通和説其兄欲背先約計謀已定將以荐等送齊荐知其意乃正色責之辭氣慷慨涕泗横流可汗慘然良久曰幸無所疑當共平東賊然後發遣我女乃令荐先報命仍請東討以奉使稱㫖遷大將軍保定四年又納幣於突厥還行小司馬又行大司徒從陳公純等逆女於突厥進爵南安郡公天和三年遷總管梁州刺史後以疾卒趙剛字僧慶河南洛陽人也曾祖蔚魏并州刺史祖寧髙平太守父和太平中陵江將軍南討度淮聞父喪輒還所司將致之於法和曰罔極之恩終天莫報若許安厝禮畢而即罪戮死且無恨言訖號慟悲感傍人主司以聞遂宥之喪畢除寧逺將軍大綂初追贈右將軍膠州刺史剛少機辯有幹能起家奉朝請累遷鎮東將軍銀青光禄大夫歴大行臺郎中征東將軍加金紫階領司徒府從事中郎加閣内都督及魏孝武與齊神武搆隙剛密奉㫖召東荆州刺史馮景昭率兵赴闕未及發而神武已逼洛陽孝武西遷景昭集府僚文武議其去就司馬馮道和請據州待北方處分剛曰公宜勒兵赴行在所久之更無言者剛抽刀投地曰公若爲忠臣可斬道和如欲從賊可見殺景昭感悟遂率衆赴闗右屬侯景逼穰城東荆州人楊祖歡等起兵應景以其衆邀景昭於路景昭戰敗剛遂沒於蠻後自贖免乃見東魏東荆州刺史李魔憐勸令歸闗西魔憐納之使剛至并州密觀事勢神武引剛内宴因令剛齎書申勅荆州剛還報魔憐仍説魔憐斬祖歡等以州歸西魔憐乃使剛入朝大綂初剛於霸上見太祖具陳闗東情實太祖嘉之封陽邑縣子邑三百户除車騎將軍左光禄大夫論復東荆州功進爵臨汝縣伯邑五百户初賀拔勝獨孤信以孝武西遷之後並流寓江左至是剛言於魏文帝請追而復之乃以剛爲兼給事黄門侍郎使梁魏興齎移書與其梁州刺史杜懐寳等論隣好并致請勝等移書寳即與剛盟歃受移赴建康仍遣行人隨剛報命是年又詔剛使三荆聼在所便宜從事使還稱㫖進爵武城縣侯除大丞相府帳内都督復使魏興重申前命尋而梁人禮送賀拔勝獨孤信等頃之御史中尉董紹進策請圖梁漢以紹爲行臺梁州刺史率士馬向漢中剛以爲不可而朝議已決遂出軍紹竟無功而還免爲庶人除剛潁川郡守加通直散騎常侍衞大將軍從復𢎞農進拜大都督東道軍司節度開府李延孫等七軍攻復陽城擒太守王智納轉陳留郡守東魏行臺吉寧率衆三萬攻陷郡城剛突出還保潁川重行郡事復爲侯景所破乃率餘衆赴洛陽大行臺元海遣剛還郡徴糧時景衆已入潁川剛於西界招復陽翟二萬戸轉輸送洛明年洛陽不守剛逺隔敵中連戰破東魏廣州刺史李仲偘時侯景别帥陸太潁川郡守高沖等衆八千人寇襄城等五郡剛簡歩騎五百大破沖等開府李延孫爲長史楊伯簡所害剛撃斬之又攻拔廣州進軍陽翟侯景自鄴入魯陽與剛接戰旬有三日旋軍宜陽時河南城邑一彼一此剛復出軍伊洛侯景亦度河築城剛前後下景三郡獲郡守一人别破其行臺梅遷斬首千餘級除尚書金部郎中髙仲密以北豫州來附兼大行臺左丞持節赴潁川節度義軍師還剛别破侯景前驅於南陸復獲其郡守二人時有流言傳剛東叛齊神武因設反間聲遣迎接剛乃率騎襲其下塢拔之露板言狀太祖知剛無貳乃加賞賚焉除營州刺史進爵爲公增邑二百戸加大都督車騎大將軍儀同三司散騎常侍漕州民鄭五醜構逆與叛羌傍乞鐵忽相應令剛徃鎮之將𤼵魏文帝引見内寢舉觴屬剛曰昔侯景在東爲卿所困黠羌小豎豈足勞卿謀慮也時五醜已剋定夷鎮所在立柵剛至竝攻破之散其黨與五醜於是西奔鐵忽剛又進破鐵忽僞廣寧郡屬宇文貴等西討詔以剛行渭州事資給糧餼鐵忽平所獲羌卒千人配剛軍中敎以戎旅皆盡其力用加驃騎大將軍開府儀同三司入爲光禄卿六官建拜膳部中大夫孝閔帝踐阼進爵浮陽郡公出爲利州總管利沙方渠四州諸軍事沙州氐恃險逆命剛再討服之方州生獠自此始從賦役剛以僞信州濱江負阻逺連殊俗蠻左强獷歴世不賓乃表請討之詔剛率利沙等十四州兵兼督儀同十人馬歩一萬徃經略焉仍加授渠州刺史剛初至渠帥憚其軍威相次降款後以剛師出踰年士卒疲弊尋復亡叛後遂以無功而還又與所部儀同尹才失和被徴赴闕遇疾卒於路年五十七贈忠浙涿三州刺史諡曰成子元卿嗣王慶字興慶太原祁人也父因魏靈州刺史懐徳縣公慶少開悟有才略初從文帝征伐復𢎞農破沙苑竝有戰功每獲殊賞大綂十年授殿中將軍孝閔帝踐阼晉公䕶引爲典籤慶樞機明辨漸見親待授大都督武成元年以前後功賜爵始安縣男二年行小賓部保定二年使吐谷渾與共分疆仍論和好之事渾主悦服遣所親隨慶貢獻初突厥與周和親許納女爲后而齊人知之懼成合從之勢亦遣使求婚財饋甚厚突厥貪其重賂便許之朝議以魏氏昔與蠕蠕結婚遂爲齊人離貳今者復恐改變欲遣使結之遂授慶左武伯副楊荐爲使是歲遂興入并之役慶乃引突厥騎與隋公楊忠至太原而還以齊人許送皇姑及世母朝廷遂與通和突厥聞之復致疑阻於是又遣慶徃喻之可汗感悦結好如初五年復與宇文貴使突厥逆女自此以慶信著北蕃頻歲出使後更至突厥屬其可汗暴殂突厥謂慶曰前後使來逢我國喪者皆􅋇面表哀况今二國和親豈得不行此事慶抗辭不從突厥見其守正卒不敢逼武帝聞而嘉之録慶前後使功遷開府儀同三司兵部大夫進爵爲公歴丹中二州刺史爲政嚴肅吏不敢欺大象元年授小司徒加上大將軍總管汾石二州五鎮諸軍事汾州刺史又除延州總管進位柱國開皇元年進爵平昌郡公卒于鎮贈上柱國諡曰莊子淹嗣趙昶字長舒天水南安人也曾祖襄仕魏至中山郡守因家於代祖泓廣武令父琛上洛郡守昶少聰敏有志節弱冠以材力聞孝昌中起家拜都督鎮小平津魏北中郎將髙千甚敬重之千牧兗州以昶行臨渙北梁二郡事大綂初千還鎮陜又以昶爲長史中軍都督太祖平𢎞農擢爲相府典籤大綂九年大軍失律於邙山清水氐酋李鼠仁自軍逃還憑險作亂隴右大都督獨孤信頻遣軍撃之不克太祖將討之欲先遣觀其勢顧問誰可爲左右莫對昶曰此小豎爾以公威孰不聼命太祖壯之遂令昶使焉昶見鼠仁喻以禍福羣凶聚議或從或否其逆命者復將加刃於昶而昶神色自若志氣彌厲鼠仁感悟遂相率降氐梁道顯叛攻南田太祖復遣昶慰諭之道顯等皆即款附東秦州刺史魏光因徙其豪帥四十餘人并部落於華州太祖即以昶爲都督領之先是汾州胡叛再遣昶慰勞之皆知其虛實及大軍徃討昶爲先驅遂破之以功封章武縣伯邑五百户十五年拜安夷郡守帶長虵鎮將氐族荒獷世號難治昶威懐以禮莫不悦服期歳之後樂從軍者千餘人加授帥都督時屬軍機科發切急氐情難之復相率謀叛昶又潛遣誘説離間其情因其攜貳遂輕徃臨之羣氐不知所爲咸來見昶乃收其首逆者二十餘人斬之餘衆遂定朝廷嘉之除大都督行南秦州事時氐帥蓋閙等反昶復討擒之進撫軍將軍加通直散騎常侍又與史寧破宕昌羌獠二十餘萬拜武州刺史車騎大將軍儀同三司諸州軍事魏恭帝初加驃騎大將軍開府儀同三司潭水羌叛殺武陵潭水二郡守昶率儀同駱天义等騎歩五千討平之世宗初鳯州人仇周貢魏興等反自號周公有衆八千人破廣化郡攻沒諸縣分兵西入圍廣業修城二郡廣業郡守薛爽修城郡守杜杲等請昶爲援昶遣使報杲爲周貢黨樊伏興等所獲興等知昶將至解修城圍據泥功嶺設六伏以待昶昶至遂遇其伏合戰破之廣業之圍亦解昶追之至泥陽川而還興州人叚吒及氐酋羌多復反攻沒郡縣昶討斬之語在氐傳昶自以被拔擢居將帥之任傾心下士虜獲氐羌撫而使之皆爲昶盡力太祖常曰不煩國家士馬而能威服氐羌者趙昶有之矣至是世宗録前後功進爵長道郡公賜姓宇文氏賞勞甚厚二年徴拜賓部中大夫行吏部尋以疾卒王悦字衆喜京兆藍田人也少有氣幹爲州里所稱魏永安中爾朱天光西討引悦爲其府騎兵參軍除石安令太祖初定闗隴悦率募鄉里從軍屢有戰功大綂元年除平東將軍相府刑獄參軍封藍田縣伯邑六百戸四年東魏將侯景攻圍洛陽太祖赴援悦又率鄉里千餘人從軍至洛陽將戰之夕悦罄其行資市牛饗戰士及戰悦所部盡力斬獲居多六年加通直散騎常侍遷大行臺右丞十年轉左丞久居管轄頗獲時譽十二年齊神武親率諸軍圍玉壁大都督韋孝寛拒守累旬敵方引退朝廷以寛勲重遣尚書長孫紹逺爲大使悦爲副使勞問寛等并校定勲人十三年侯景據河南來附仍請兵爲援太祖先遣韋法保賀蘭願徳等帥衆助之悦言於太祖曰侯景之於髙歡始則篤鄉黨之情末乃定君臣之契位居上將職重台司論其分義有同魚水今歡始死景便離貳豈不知君臣之道有虧忠義之禮不足蓋其所圖既大不卹小嫌然尚能背徳於髙氏豈肯盡節於朝廷今若益之以勢援之以兵非唯侯景不爲池中之物亦恐朝廷貽笑將來也太祖納之乃遣行臺郎中趙士憲追法保等而景尋叛十四年授雍州大中正帥都督加衛將軍右光禄大夫都督率所部兵從大將軍楊忠征隨郡安陸竝平之時懸兵深入悦支度路程勒其部伍節減糧食及至竟陵諸軍多有匱乏悦出稟米六百石分給之太祖聞而嘉焉尋拜京兆郡守加使持節車騎大將軍儀同三司散騎常侍遷大行臺尚書又領所部兵從達奚武征梁漢軍出武令悦説其城主楊賢悦乃貽之書曰夫惟徳是輔天道之常也見機而作人事之會也梁主内虧刑政外闕藩籬疋夫攘袂舉國傾覆非直下民離心抑亦上𤣥所棄我相公膺千齡之運創三分之業道洽區中威振方外聲敎所被風行草偃兵車所指雲除霧廓斯固天下所共聞無俟二談也大將軍髙陽公韞韜略之祕總熊羆之旅受脤廟堂威懐巴漢先附者必賞後服者必誅君兵糧既寡救援路絶欲守則城池無縈帶之險欲戰則士卒有土崩之勢以此求安未見其可昔韓信背項前典以爲美談黄權歸魏良史稱其盛烈事有變通今其則也賢於是遂降悦白武云白馬要衝是必爭之地今城守寡弱易可圖也若蜀兵更至攻之實難武然之令悦率輕騎七百徑􅃐白馬悦先示其禍福其將梁深遂以城降梁武陵王紀果遣其將任竒率歩騎六千欲先據白馬行次闕城聞已降乃還及梁州平太祖即以悦行刺史事招攜初附民吏安之魏廢帝二年徴還本任屬改行臺爲中外府尚書員廢以儀同領兵還鄉里悦既久居顯職及此之還私懐怏怏猶陵駕鄉里失宗黨之情其長子康恃悦舊望遂自驕縱所部軍人將有婚禮康乃非理凌辱軍人訴之悦及康竝坐除名仍配流逺防及于謹伐江陵令悦從軍展効因留鎮之孝閔踐阼依例復官授郢州尋拜使持節驃騎大將軍開府儀同三司大都督司水中大夫進爵藍田縣侯遷司憲中大夫賜姓宇文氏又進爵河北縣公悦性儉約不營生業雖出入榮顯家徒四壁而已世宗手勅勞勉之賜粟六百石保定元年卒於位康嗣官至司邑下大夫趙文表其先天水西人也後徙居南鄭累世爲二千石父江性方嚴有度量歴官東巴州刺史計部中大夫驃騎大將軍開府儀同三司御伯中大夫封昌國縣伯贈虞絳二州刺史諡曰貞文表少而修謹志存忠節便弓馬能左右馳射好讀左氏春秋略舉大義起家爲太祖親信魏恭帝元年從開府田𢎞征山南以功授都督復從平南巴州及信州遷帥都督又從許國公宇文貴鎮蜀行昌城郡事加中軍將軍左金紫光禄大夫保定元年除許國公府司馬轉大都督五年授畿伯下大夫又爲許國公府長史尋拜車騎大將軍儀同三司仍從宇文貴使突厥迎皇后進止儀注皆令文表典之文表斟酌而行皆合禮度及皇后將入境突厥託以馬瘦行徐文表慮其爲變遂説突厥使羅莫縁曰后自發彼藩已淹時序途經沙漠人馬疲勞且東寇每伺間隙吐谷渾亦能爲變今君以可汗之愛女結姻上國曾無防慮豈人臣之體乎莫縁然之遂倍道兼行數日至甘州以迎后功别封伯陽縣伯邑六百户天和三年除梁州總管府長史所管地名恒陵者方數百里竝生獠所居恃其險固常懐不軌文表率衆討平之遷蓬州刺史政尚仁恕夷獠懐之加驃騎大將軍開府儀同三司又進位大將軍爵爲公大象中拜吳州總管時開府于顗爲吳州刺史及隋文帝執政尉遲迥等舉兵逺近騷然人懐異望顗自以族大且爲國家肺腑懼文表圖已謀欲先之乃稱疾不出文表徃問之顗遂手刃文表因令吏人告云文表謀反仍馳啓其狀隋文以諸方未定恐顗爲變遂授顗吳州總管以安之後知文表無異志雖不罪顗而聼其子仁海襲爵周書卷三十三周書卷三十三考證王悦傳斯固天下所共聞無俟二談也二字上疑脱一字悦先示其禍福其將梁深遂以城降北史作梁將深悟果遣其將任竒任竒北史作任珍竒授郢州北史云授郢州刺史脱刺史二字趙文表傳父江北史云父汪周書卷三十三考證
