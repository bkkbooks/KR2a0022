body:
  text: 周書卷二十三唐令狐徳棻等撰列傳第十五蘇綽弟椿蘇綽字令綽武功人魏侍中則之九世孫也累世二千石父協武功郡守綽少好學博覽羣書尤善筭術從兄讓為汾州刺史太祖餞於東都門外臨别謂讓曰卿家子弟之中誰可任用者讓因薦綽太祖乃召為行臺郎中在官嵗餘太祖未深知之然諸曹疑事皆詢於綽而後定所行公文綽又為之條式臺中咸稱其能後太祖與僕射周惠達論事惠達不能對請出外議之乃召綽告以其事綽即為量定惠達入呈太祖稱善謂惠達曰誰與卿為此議者惠達以綽對因稱其有王佐之才太祖曰吾亦聞之久矣尋除著作佐郎屬太祖與公卿徃昆眀池觀漁行至城西漢故倉地顧問左右莫有知者或曰蘇綽博物多通請問之太祖乃召綽具以状對太祖大悦因問天地造化之始歴代興亡之迹綽既有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網􅅈而還遂留綽至夜問以治道太祖臥而聼之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺膝之前席語遂逹曙不厭詰朝謂周惠達曰蘇綽真竒士也吾方任之以政即拜大行臺左丞參典機密自是寵遇日隆綽始制文案程式朱出墨入及計帳戸籍之法大綂三年齊神武三道入宼諸將咸欲分兵禦之獨綽意與太祖同遂併力拒竇泰擒之於潼闗四年加衛將軍右光禄大夫封羙陽縣子邑三百戸加通直散騎常侍進爵為伯增邑二百戸十年授大行臺度支尚書領著作兼司農卿太祖方欲革易時政務𢎞彊國富民之道故綽得盡其智能贊成其事減官員置二長并置屯田以資軍國又為六條詔書奏施行之其一先治心曰凡今之方伯守令皆受命天朝出臨下國論其尊貴並古之諸侯也是以前世帝王每稱共治天下者唯良宰守耳明知百僚卿尹雖各有所司然其治民之本莫若宰守之最重也凡治民之體先當治心心者一身之主百行之本心不清浄則思慮妄生思慮妄生則見理不明見理不明則是非謬亂是非謬亂則一身不能自治安能治民也是以治民之要在清心而已夫所謂清心者非不貪貨財之謂也乃欲使心氣清和志意端静心和志静則邪僻之慮無因而作邪僻不作則凡所思念無不皆得至公之理率至公之理以臨其民則彼下民孰不從化是以稱治民之本先在治心其次又在治身凡人君之身者乃百姓之表一國之的也表不正不可求直影的不明不可責射中今君身不能自治而望治百姓是猶曲表而求直影也君行不能自修而欲百姓脩行者是猶無的而責射中也故為人君者必心如清水形如白玉躬行仁義躬行孝悌躬行忠信躬行禮讓躬行亷平躬行儉約然後繼之以無倦加之以明察行此八者以訓其民是以其人畏而愛之則而象之不待家教日見而自興行矣其二敦教化曰天地之性唯人為貴明其有中和之心仁恕之行異於木石不同禽獸故貴之耳然性無常守随化而遷化於敦樸者則質直化於澆偽者則浮薄浮薄者則衰獘之風質直者則淳和之俗衰獘則禍亂交興淳和則天下自治治亂興亡無不皆由所化也然世道彫䘮已數百年大亂滋甚且二十嵗民不見徳唯兵革是聞上無教化惟刑罰是用而中興始爾大難未平加之以師旅因之以饑饉凡百草創率多權宜致使禮讓弗興風俗未改比年稍登稔徭賦差輕衣食不切則教化可脩矣凡諸牧守令長宜洗心革意上承朝㫖下宣教化矣夫化者貴能扇之以淳風浸之以太和被之以道徳示之以朴素使百姓亹亹日遷於善邪偽之心嗜慾之性潛以消化而不知其所以然此之謂化也然後教之以孝悌使民慈愛教之以仁順使民和睦教之以禮義使民敬讓慈愛則不遺其親和睦則無怨於人敬讓則不競於物三者既備則王道成矣此之謂教也先王之所以移風易俗還淳反素垂拱而治天下以至太平者莫不由此此之謂要道也其三盡地利曰人生天地之間以衣食為命食不足則饑衣不足則寒饑寒切體而欲使民興行禮讓者此猶逆坂走丸勢不可得也是以古之聖王知其若此故先足其衣食然後教化隨之夫衣食所以足者在於地利盡地利所以盡者由於勸課有方主此教者在乎牧守令長而已民者冥也智不自周必待勸教然後盡其力諸州郡縣每至嵗首必戒敕部民無問少長但能操持農器者皆令就田墾發以時勿失其所及布種既訖嘉苗須理麥秋在野蠶停於室若此之時皆宜少長悉力男女併功若援溺救火宼盗之將至然後可使農夫不廢其業蠶婦得就其功若有遊手怠惰早歸晚出好逸惡勞不勤事業者則正長牒名郡縣守令随事加罰罪一勸百此則明宰之教也夫百畝之田必春耕之夏種之秋收之然後冬食之此三時者農之要也若失其一時則榖不可得而食故先王之戒曰一夫不耕天下必有受其饑者一婦不織天下必有受其寒者若此三時不務省事而令民廢農者是則絶民之命驅以就死然單劣之戸及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之暇又當教民種桑植果藝其菜蔬脩其園圃畜育雞豚以備生生之資以供養生之具夫為政不欲過碎碎則民煩勸課亦不容太簡簡則民怠善為政者必消息時宜而適煩簡之中故詩曰不剛不柔布政優優百禄是求如不能爾則必陷於刑辟矣其四擢賢良曰天生蒸民不能自治故必立君以治之人君不能獨治故必置臣以佐之上至帝王下及郡國置臣得賢則治失賢則亂此乃自然之理百王不能易也今刺史守令悉有僚吏皆佐治之人也刺史府官則命於天朝其州吏以下並牧守自置自昔以來州郡大吏但取門資多不擇賢良末曹小吏唯試刀筆並不問志行夫門資者乃先世之爵禄無妨子孫之愚瞽刀筆者乃身外之末材不廢性行之澆偽若門資之中而得賢良是則策騏驥而取千里也若門資之中而得愚瞽是則土牛木馬形似而用非不可以渉道也若刀筆之中而得志行是則金相玉質内外俱羙實為人寳也若刀筆之中而得澆偽是則餙畫朽木悦目一時不可以充榱椽之用也今之𨕖舉者當不限資蔭唯在得人茍得其人自可起厮養而為卿相伊尹傅説是也而况州郡之職乎苟非其人則丹朱商均雖帝王之𦙍不能守百里之封而況於公卿之胄乎由此而言觀人之道可見矣凡所求材藝者為其可以治民若有材藝而以正直為本者必以其材而為治也若有材藝而以姦偽為本者將由其官而為亂也何治之可得乎是故將求材藝必先擇志行其志行善者則舉之其志行不善者則去之而今擇人者多云邦國無賢莫知所舉此乃未之思也非適理之論所以然者古人有言明主聿興不降佐於昊天大人基命不擢才於后土常引一世之人治一世之務故殷周不待稷契之臣魏晉無假蕭曹之佐仲尼曰十室之邑必有忠信如丘者焉豈有萬家之都而云無士但求之不勤擇之不審或用之不得其所任之不盡其材故云無耳古人云千人之秀曰英萬人之英曰􅖿今之智效一官行聞一邦者豈非近英􅖿之士也但能勤而審察去虗取實各得州郡之最而用之則民無多少皆足治矣孰云無賢夫良玉未剖與瓦石相類名驥未馳與駑馬相雜及其剖而瑩之馳而試之玉石駑驥然後始分彼賢士之未用也混於凡品竟何以異要任之以事業責之以成務方與彼庸流較然不同昔呂望之屠釣百里奚之飯牛寗生之扣角管夷吾之三敗當此之時悠悠之徒豈謂其賢及升王朝登覇國積數十年功成事立始識其竒士也於是後世稱之不容於口彼瓌偉之材不世之傑尚不能以未遇之時自異於凡品況降此者哉若必待太公而後用是千載無太公必待夷吾而後任是百世無夷吾所以然者士必從㣲而至著功必積小以至大豈有未任而已成不用而先達也若識此理則賢可求士可擇得賢而任之得士而使之則天下之治何向而不可成也然善官人者必先省其官官省則善人易充善人易充則事無不理官煩則必雜不善之人雜不善之人則政必有得失故語曰官省則事省事省則民清官煩則事煩事煩則民濁清濁之由在於官之煩省案今吏員其數不少昔民殷事廣尚能克濟況今戸口減耗依員而置猶以為少如聞在下州郡尚有兼假擾亂細民甚為無理諸如此輩悉宜罷黜無得習常非直州郡之官宜須善人爰至黨族閭里正長之職皆當審擇各得一鄉之選以相監綂夫正長者治民之基基不傾者上必安凡求賢之路自非一途然所以得之審者必由任而試之考而察之起於居家至於鄉黨訪其所以觀其所由則人道明矣賢與不肖别矣率此以求則庶無愆悔矣其五䘏獄訟曰人受隂陽之氣以生有情有性性則為善情則為惡善惡既分而賞罰隨焉賞罰得中則惡止而善勸賞罰不中則民無所措手足民無所措手足則怨叛之心生是以先王重之特加戒慎夫戒慎者欲使治獄之官精心悉意推究事源先之以五聼參之以證驗妙覩情狀窮鑒隐伏使姦無所容罪人必得然後隨事加刑輕重皆當赦過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心逺明大教使獲罪者如歸此則善之上也然宰守非一不可人人皆有通識推理求情時或難盡唯當率至公之心去阿枉之志務求曲直念盡平當聼察之理必窮所見然後栲訊以法不苛不暴有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次若乃不仁恕而肆其殘暴同民木石專任捶楚巧詐者雖事彰而獲免辭弱者乃無罪而􅀍罰有如此者斯則下矣非共治所寄今之宰守當勤於中科而慕其上善如在下條則刑所不赦又當深思逺大念存徳教先王之制曰與殺無辜寕赦有罪與其害善寕其利淫明必不得中寕濫捨有罪不謬害善人也今之從政者則不然深文巧劾寕致善人於法不免有罪於刑所以然者皆非好殺人也但云為吏寕酷可免後患此則情存自便不念至公奉法如此皆姦人也夫人者天地之貴物一死不可復生然楚毒之下以痛自誣不􅀍申理遂陷刑戮者將恐徃徃而有是以自古以來設五聼三宥之法著明慎庶獄之典此皆愛民甚也凡伐木殺草田獵不順尚違時令而虧帝道況刑罰不中濫害善人寕不傷天心犯和氣也天心傷和氣損而欲隂陽調適四時順序萬物阜安蒼生悦樂者不可得也故語曰一夫吁嗟王道為之傾覆正謂此也凡百宰守可無愼乎若有深姦巨猾傷化敗俗悖亂人倫不忠不孝故為背道者殺一利百以清王化重刑可也識此二途則刑政盡矣其六均賦役曰聖人之大寳曰位何以守位曰仁何以聚人曰財明先王必以財聚人以仁守位國而無財位不可守是故三五以來皆有征税之法雖輕重不同而濟用一也今逆冦未平軍用資廣雖未遑減省以䘏民瘼然令平均使下無匱夫平均者不捨豪彊而徴貧弱不縱姦巧而困愚拙此之謂均也故聖人曰盖均無貧然財貨之生其功不易織絍紡績起於有漸非旬日之間所可造次必須勸課使預營理絹鄉先事織絍麻土早修紡績先時而備至時而輸故王賦獲供下民無困如其不預勸戒臨時廹切復恐稽緩以為已過捶扑交至取辦目前富商大賈縁兹射利有者從之貴買無者與之舉息輸税之民於是獘矣租税之時雖有大式至於斟酌貧富差次先後皆事起於正長而繫之於守令若斟酌得所則政和而民悦若檢理無方則吏姦而民怨又差𤼵徭役多不存意致令貧弱者或重徭而逺戍富彊者或輕使而近防守令用懐如此不存䘏民之心皆王政之罪人也太祖甚重之常置諸座右又令百司習誦之其牧守令長非通六條及計帳者不得居官自有晉之季文章競為浮華遂成風俗太祖欲革其獘因魏帝祭廟羣臣畢至乃命綽為大誥奏行之其詞曰惟中興十有一年仲夏庶邦百辟咸㑹於王庭柱國泰洎郡公列將罔不來朝時廼大稽百憲敷于庶邦用綏我王度皇帝曰昔堯命羲和允釐百工舜命九官庶績咸熙武丁命説克號髙宗時惟休哉朕其欽若格爾有位胥暨我太祖之庭朕將丕命女以厥官六月丁巳皇帝朝格於太廟凡厥具僚罔不在位皇帝若曰咨我元輔羣公列將百辟卿士庶尹御事朕惟寅敷祖宗之靈命稽于先王之典訓以大誥于爾在位昔我太祖神皇肇膺明命以創我皇基烈祖景宗廓開四表底定武功暨乎文祖誕敷文徳龔惟武考不霣其舊自時厥後陵夷之獘用興大難于彼東土則我黎人咸墜塗炭惟台一人纉戎下武夙夜祗畏若渉大川罔識攸濟是用稽於帝典揆於王廷拯我民瘼惟彼哲王示我􅉓訓曰天生蒸民罔克自乂上帝降鑒叡聖植元后以乂之惟時元后弗克獨乂博求明徳命百辟羣吏以佐之肆天之命辟辟之命官惟以䘏民弗惟逸豫辟惟元首庶黎惟趾股肱惟弼上下一體各勤攸司兹用克臻於皇極故其彛訓曰后克艱厥后臣克艱厥臣政廼乂今台一人膺天之嘏既陟元后股肱百辟又服我國家之命罔不咸守厥職嗟夫后弗艱厥后臣弗艱厥臣於政何弗斁嗚呼艱哉凡爾在位其敬聼命皇帝若曰柱國唯四海之不造載繇二紀天未絶我太祖列祖之命用錫我以元輔國家將墜公惟棟梁皇之弗極公作相百揆諐度公惟大錄公其允文允武克明克乂廸七徳敷九功龕暴除亂下綏我蒼生旁施於九土若伊之在商周之有呂説之相丁用保我無疆之祚皇帝若曰羣公太宰太尉司徒司空惟公作朕鼎足以弼乎朕躬宰惟天官克諧六職尉惟司武武在止戈徒惟司衆敬敷五教空惟司土利用厚生惟時三事若三階之在天惟兹四輔若四時之成嵗天工人其代諸皇帝若曰列將汝惟鷹揚作朕爪牙宼賊姦宄蠻夷猾夏汝徂征綏之以惠董之以威刑期於無刑萬邦咸寕俾八表之内莫違朕命時汝功皇帝若曰庶邦列辟汝惟守土作民父母民惟不勝其饑故先王重農不勝其寒故先王貴女功民之不率於孝慈則骨肉之恩薄弗惇於禮讓則争奪之萌生惟兹六物寔為教本嗚呼為土在寛寛則民怠齊之以禮不剛不柔稽極於道皇帝若曰卿士庶尹凡百御事王省惟嵗卿士惟月庶尹惟日御事惟時嵗月日時罔易其度百憲咸貞庶績其凝嗚呼惟若王官陶均萬國若天之有斗斟元􅂔酌隂陽弗失其和蒼生永賴悖其序萬物以傷時惟艱哉皇帝若曰惟天地之道一隂一陽禮俗之變一文一質爰自三五以迄於兹匪惟相革惟其救獘匪惟相襲惟其可久惟我有魏承乎周之末流接秦漢遺獘襲魏晉之華誕五代澆風因而未革將以穆俗興化庸可暨乎嗟我公輔庶僚列侯朕惟否徳其一心力祗慎厥艱克遵前王之丕顯休烈弗敢怠荒咨爾在位亦協乎朕心惇徳允元惟厥難是務克捐厥華即厥實背厥偽崇厥誠勿􅀢勿忘一乎三代之彛典歸於道徳仁義用保我祖宗之丕命荷天之休克綏我萬方永康我黎庶戒之哉戒之哉朕言不再柱國泰洎庶僚百辟拜手稽首曰亶聰明作元后元后作民父母惟三五之王率繇此道用臻於刑措自時厥後歴千載而未聞惟帝念功將反叔世逖致於雍庸錫降丕命于我羣臣博哉王言非言之難行之實難罔不有初鮮克有終啇書曰終始惟一徳廼日新惟帝敬厥始慎厥終以躋日新之徳則我羣臣敢不夙夜對揚休哉惟兹大誼未光於四表以邁種徳俾九域幽遐咸昭奉元后之明訓率遷於道永膺無疆之休帝曰欽哉自是之後文筆皆依此體綽性儉素不治産業家無餘財以海内未平常以天下為己任博求賢俊共𢎞治道凡所薦達皆至大官太祖亦推心委任而無間言太祖或出遊常預署空紙以授綽若湏有處分則隨事施行及還啟之而已綽嘗謂治國之道當愛民如慈父訓民如嚴師每與公卿議論自晝達夜事無巨細若􅃌諸掌積思勞倦遂成氣疾十二年卒於位時年四十九太祖痛惜之哀動左右及將葬乃謂公卿等曰蘇尚書平生謙退敦尚儉約吾欲全其素志便恐悠悠之徒有所未達如其厚加贈諡又乖宿昔相知之道進退惟谷孤有疑焉尚書令史麻瑤越次而進曰昔晏子齊之賢大夫一狐裘三十年及其死也遺車一乗齊侯不奪其志綽既操履清白謙挹自居愚謂宜從儉約以彰其羙太祖稱善因薦瑤於朝廷及綽歸葬武功唯載以布車一乗太祖與羣公皆步送出同州郭門外太祖親於車後酹酒而言曰尚書平生為事妻子兄弟不知者吾皆知之惟爾知吾心吾知爾意方欲共定天下不幸遂捨我去柰何因舉聲慟哭不覺失巵於手至𦵏日又遣使祭以太牢太祖自為其文綽又著佛性論七經論並行於世明帝二年以綽配享太祖廟庭子威嗣威少有父風襲爵羙陽伯娶晉公䕶女新興公主拜車騎大將軍儀同三司進爵懐道縣公建徳初稍遷御伯下大夫大象末開府儀同大將軍隋開皇初以綽著名前代乃下詔曰昔漢髙欽無忌之義魏武挹子幹之風前代名賢後王斯重魏故度支尚書羙陽伯蘇綽文雅政事遺跡可稱展力前王垂聲著績宜開土宇用旌善人於是追封邳國公邑二千戸綽弟椿字令欽性亷慎沉勇有决斷正光中闗右賊亂椿應募討之授盪宼將軍累功封遷奉朝請厲威將軍中散大夫賜爵羙陽子加都督持節平西將軍太中大夫大綂初拜鎮東將軍金紫光禄大夫賜姓賀蘭氏四年出為武都郡守改授西夏州長史除帥都督行𢎞農郡事椿當官彊濟特為太祖所知十四年置當州鄉帥自非鄉望允當衆心不得預焉乃令驛追椿領鄉兵其年破槃頭氏有功除散騎常侍加大都督十六年征隨郡軍還除武功郡守既為本邑以清儉自居小大之政必盡忠恕尋授使持節車騎大將軍儀同三司進爵為侯武成二年進位驃騎大將軍開府儀同三司大都督保定三年卒子植嗣史臣曰書云惟后非賢弗乂惟賢非后罔食是以知人則哲有國之所先用之則行為下之常道若乃庖厨胥靡種徳㣲管之臣罕聞於世黜魯逐荆抱闗執㦸之士無乏於時斯固典謩所以昭則風雅所以興刺也誠能監前事之得䘮勞虗已於吐握其知賢也必用其授爵也勿疑則舜禹湯武之徳可連衡矣稷契伊呂之流可比肩矣太祖提劍而起百度草創施約法之制於競逐之辰脩治定之禮於鼎峙之日終能斵彫為朴變奢從儉風化既被而下肅上尊疆場屢擾而内親外附斯盖蘇令綽之力也名冠當時慶流後嗣宜哉周書卷二十三周書卷二十三考證蘇綽傅柱國泰洎羣公列將罔不來朝柱國泰諸本作柱國諱北史作柱國泰下文同臣文淳按李虎亦為柱國但虎位周文之下誥詞似舉周文以統百官今依北史改正逖致於雍北史作逖至於雍熙此脱一熙字周書卷二十三考證
