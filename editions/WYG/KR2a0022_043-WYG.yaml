  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_043-1a, image: WYG0263/WYG0263-0776c.png}
body:
  text: 周書卷四十三唐令狐德棻等撰列傳第三十五李延孫韋祐韓雄陳忻魏𤣥李延孫伊川人也祖伯扶魏太和末從征懸瓠有功為汝南郡守父長夀性雄豪有武藝少與蠻酋結託屢相招引侵滅闗南孝昌中朝議恐其為亂乃以長夀為防蠻都督給其鼓節以慰其意長夀冀因此遂得任用亦盡其智力防遏羣蠻伊川左右冦盗為之稍息永安之後盗賊蜂起長夀乃招集叛亡徒侣日盛魏帝藉其力用因而撫之乃授持節大都督轉鎮張白塢後為河北郡守轉河内郡守所歴之處咸以猛烈聞討捕諸賊頻有功授衛大將軍北華州刺史賜爵清河郡公及魏孝武西遷長夀率勵義士拒東魏孝武嘉之復授潁川郡守遷廣州刺史東魏遣行臺侯景率兵攻之長夀衆少城陷遂遇害大綂元年追贈太尉使持節侍中驃騎大將軍冀定等十二州諸軍事定州刺史延孫亦雄武有將帥才略少從長夀征討以勇敢聞初為直閤將軍賀㧞勝為荆州刺史表延孫為都督肅清鵶路頗有功力焉及長夀􅀍害延孫乃還收集其父之衆自魏孝武西遷之後朝士流亡廣陵王忻録尚書長孫稚潁川王斌之安昌王子均及建寧江夏隴東諸王幷百官等擕持妻子來投延孫者延孫即率衆衞送幷贈以珍玩咸逹闗中齊神武深患之遣行臺慕容紹宗等數道攻之延孫奨勵所部出戰遂大破之臨陣斬其揚州刺史薛喜於是義軍更振乃授延孫京南行臺節度河南諸軍事廣州刺史尋進車騎大將軍儀同三司大都督賜爵華山郡公延孫既荷重委每以剋清伊洛為已任頻以少擊衆威振敵境大統四年為其長史楊伯蘭所害後贈司空冀定等六州刺史子人傑有祖父風官至開府儀同三司和州刺史改封潁川郡公延孫弟義孫亦官至開府儀同三司韋祐字法保京兆山北人也少以字行於世世為州郡著姓祖駢雍州主簿舉秀才拜中書愽士父義前將軍上洛郡守魏大統時以法保著勲追贈秦州刺史法保少好遊俠而質直少言所與交遊皆輕猾亡命人有急難投之者多保存之雖屢被追捕終不改其操父没事母兄以孝敬聞慕李長夀之為人遂娶長夀女因寓居關南正光末四方雲擾王公避難者或依之多得全濟以此為貴遊所德乃拜員外散騎侍郎加輕車將軍及魏孝武西遷法保從山南赴行在所除右將軍太中大夫封固安縣男邑二百户及長夀被害其子延孫收長夀餘衆守禦東境朝廷恐延孫兵少不能自固乃除法保東洛州刺史配兵數百人以援延孫法保至潼闗𢎞農郡守韋孝寛謂法保曰恐子此役難以吉還也法保曰古人稱不入虎穴不得虎子安危之事未可預量縱為國殞身亦非所恨遂倍道兼行東魏陜州刺史劉貴以歩騎千餘邀之法保命所部為圓陣且戰且前數日得與延孫兵接乃并勢置柵於伏流未幾太祖追法保與延孫率衆還朝賞勞甚厚乃授法保大都督四年除河南尹及延孫被害法保乃率所部據延孫舊柵頻與敵人交兵每身先士卒單馬陷陣是以戰必被傷嘗至闗南與東魏人戰流矢中頸從口中出當時氣絶輿至營久之乃蘓九年拜車騎大將軍儀同三司鎮九曲城及侯景以豫州來附法保率兵赴景景欲畱之法保疑其有貳心乃固辭還所鎮十五年加驃騎大將軍開府儀同三司尋進爵為公㑹東魏遣軍送糧饋宜陽法保濳邀之轉戰數十里兵少不敵為流矢所中卒於陣謚曰莊子初嗣建德末位至開府儀同大將軍閻韓防主韓雄字木蘭河南東垣人也祖景魏孝文時為赭陽郡守雄少敢勇膂力絶人工騎射有將率材略及魏孝武西遷雄便慷慨有立功之志大統初遂與其屬六十餘人於洛西舉兵數日間衆至千人與河南行臺楊琚共為犄角每抄掠東魏所向剋獲徒衆日盛州縣不能禦之東魏洛州刺史韓賢以狀聞鄴乃遣其軍司慕容紹宗率兵與賢合勢討雄戰數十合雄兵略盡兄及妻子皆為賢所獲將以為戮乃遣人告雄曰若雄至皆免之雄與其所親謀曰奮不顧身以立功名者本望上申忠義下榮親戚今若􅃘而不赴人謂我何既免之後更思其計未為晚也於是遂詣賢軍即隨賢還洛乃濳引賢黨謀欲襲之事泄遁免時太祖在𢎞農雄至上謁太祖嘉之封武陽縣侯邑八百户遣雄還鄉里更圖進取雄乃招集義衆進逼洛州東魏洛州刺史元湛委州奔河陽其長史孟產舉城欵附俄而領軍獨孤信大軍繼至雄遂從信入洛陽時東魏將侯景等圍蓼塢雄擊走之又從太祖戰於河橋軍還仍鎮洛西拜假平東將軍東郡守遷北中郎將邙山之役太祖命雄率衆邀齊神武於隘道神武怒命三軍併力取雄雄突圍得免除東徐州刺史太祖以雄劬勞積年乃徴入朝屢加賞勞復遣還州東魏東雍州刺史郭叔略與雄接境頗為邊患雄密圖之乃輕將十騎夜入其境伏於道側遣都督韓仕於略城東服東魏人衣服詐若自河陽叛投闗西者略出馳之雄自後射之再發咸中遂斬略首除河南尹進爵為公加車騎大將軍儀司三司大都督散騎常侍尋進驃騎大將軍開府儀同三司侍中河南邑中正孝閔帝踐阼進爵新義郡公增邑通前三千八百户賜姓宇文氏世宗二年除使持節都督中徐虞洛四州諸軍事中州刺史雄久在邊具知敵人虛實每率衆深入不避艱難前後經四十五戰雖時有勝負而雄志氣益壮東魏深憚之天和三年卒于鎮贈大將軍中華宜義和五州諸軍事中州刺史諡曰威子禽嗣陳忻字永怡宜陽人也少驍勇有氣俠姿貎魁岸同類咸敬憚之魏孝武西遷之後忻乃於辟惡山招集勇敢少年數十人宼掠東魏仍密遣使歸附大統二年授持節伏波將軍羽林監立義大都督賜爵霸城縣男三年太祖復𢎞農東魏揚州刺史叚琛拔城遁走忻率義徒於九曲道邀之殺傷甚衆擒其新安令張祗太祖嘉其忠欵使行新安縣事及獨孤信入洛忻舉李延孫為前鋒仍從信守金墉城及河橋戰不利隨軍西還復行新安縣事東魏遣土人牛道恒為揚州刺史忻率兵擊破之進爵為子常隨崤東諸將鎮遏伊洛間每有功効九年與李逺迎高仲密仍從戰邙山及大軍西還復與韓雄等依山合勢破東魏三城斬其金門郡守方臺洛增邑六百户尋行宜陽郡事東魏復遣劉盆生為金門郡守忻又斬之除鎮逺將軍魏郡守俄授使持節平東將軍顯州刺史太祖以忻威著敵境仍畱靜邊弗令之任十年侯景築九曲城忻率衆邀之擒其宜陽郡守趙嵩金門郡守樂敬賔十三年從李逺平九曲城授帥都督東魏將爾朱渾願率精騎三千來向宜城忻與諸將輕兵邀之願遂退走十五年除宜陽郡守加大都督撫軍將軍十六年進車騎大將軍儀同三司散騎常侍與齊將東方老戰於石泉破之俘獲甚衆時東魏每嵗遣兵送米饋宜陽忻輙與諸軍邀擊之每多尅獲魏恭帝元年又與開府斛斯璉等共齊將叚孝先戰于九曲大破之二年進位驃騎大將軍開府儀同三司加侍中其年授宜陽邑大中正賜姓尉遲氏太祖以忻著績累載贈其祖昆及父興孫俱為儀同三司昆齊州刺史興孫徐州刺史東魏洛州刺史獨孤永業號有智謀徃來境上􅀝伏難測忻與韓雄等恒令間諜覘其動靜齊兵每至輙擊破之故永業深憚忻等不敢為宼孝閔帝踐阼徵忻入朝進爵為伯尋又進爵許昌郡公增邑一千户武成元年除熊州刺史增邑通前二千六百户又與開府敕勒慶破齊將王鸞嵩仍從柱國陸通復石泉城天和元年卒於位忻與韓雄里閈姻婭少相親昵俱縂兵境上三十餘載每有禦扞二人相赴常若影響故得數對勍敵而常保功名雖竝有武力至於挽彊射中忻不如雄散財施惠得士衆心則雄不如忻身死之日將吏荷其恩德莫不感慟焉子萬敵嗣朝廷以忻雅得士心還令萬敵領其部曲魏𤣥字僧智任城人也六世祖休仕晉為魯郡守永嘉南遷遂居江左父承祖魏景明中自梁歸魏家於新安𤣥少慷慨有膽略普泰中除奉朝請頻從軍與梁人交戰永安􅀄以功授征虜將軍中散大夫及魏孝武西遷東魏北徙人情騷動各懷去就𤣥遂率募鄉曲立義於闗南即從韋法保與東魏司徒髙敖曹戰於闗口及獨孤信入洛陽隸行臺楊琚防馬渚復與高敖曹接戰自是每率鄉兵抗拒東魏前後十餘戰皆有功邙山之役大軍不利宜陽洛州皆為東魏守崤東立義者咸懷異望而𤣥母及弟竝在宜陽𤣥以為忠孝不兩立乃率義徒還闗南鎮撫太祖手書勞之除洛陽令封廣宗縣子邑四百户十三年與開府李義孫攻拔伏流城又剋孔城即與義孫鎮之尋移鎮伏流十四年授帥都督東平郡守轉河南郡守加大都督十六年洛安民雍方雋據郡外叛率歩騎一千自號行臺攻破郡縣囚執守令𤣥率𢎞農九曲孔城伏流四城士馬討平之魏恭帝二年拜車騎大將軍儀同三司孝閔帝踐阼進爵為伯增邑通前九百户保定元年移鎮蠻谷四年進位驃騎大將軍開府儀同三司徙鎮閻韓仍從尉遲迥圍洛陽天和元年陜西總管尉遲綱遣𤣥率儀同宇文能趙乾等歩騎五百於鹿盧交南邀擊東魏洛州刺史獨孤永業永業有衆二萬餘人𤣥輕將五騎行前覘之卒與之遇便即交戰殺傷數十人獲馬并甲矟等永業遂退二年進爵為侯除白超防主三年遷熊州刺史政存簡惠百姓悅之四年轉和州刺史伏流防主進爵為公五年齊將斛律明月率衆向宜陽兵威甚盛𤣥率兵禦之每戰輙剋後以疾卒於位史臣曰二國爭彊四郊多壘鎮守要害義屬武臣李延孫等以勇略之姿受扞城之寄灌𤓰贈藥雖有愧於昔賢禦侮折衝足方駕於前烈用能觀兵伊洛保據崤函齊人沮西略之謀周朝緩東顧之慮皆數將之力也周書卷四十三周書卷四十三考證陳忻傳及獨孤信入洛忻舉李延孫為前􅄡舉疑當作與臣文淳此事李延孫傳不載當是史有遺漏也周書卷四十三考證
