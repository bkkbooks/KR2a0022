  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_024-1a, image: WYG0263/WYG0263-0594c.png}
body:
  text: 周書卷二十四唐令狐徳棻等撰列傳第十六盧辯盧辯字景宣范陽涿人累世儒學父靖太常丞辯少好學博通經籍舉秀才為太學博士以大戴禮未有解詁辯乃注之其兄景裕為當時碩儒謂辯曰昔侍中注小戴今爾注大戴庶纂前修矣及帝入闗事起倉卒辯不及至家單馬而從或問辯曰得辭家不辯曰門外之治以義斷恩復何辭也孝武至長安授給事黄門侍郎領著作太祖以辯有儒術甚禮之朝廷大議常召顧問趙青雀之亂魏太子出居渭北辯時隨從亦不告家人其執志敢決皆此類也尋除太常卿太子少傅魏太子及諸王等皆行束修之禮受業於辯進爵范陽公轉少師自魏末離亂孝武西遷朝章禮度湮墜咸盡辯因時制宜皆合軌度性彊記黙契能斷大事凡所創制處之不疑累遷尚書右僕射世宗即位進位大將軍帝嘗與諸公􅄑其第儒者榮之出為宜州刺史薨配食太祖廟庭子慎初太祖欲行周官命蘇綽專掌其事未幾而綽卒乃令辯成之於是依周禮建六官置公卿大夫士并􅁧次朝儀車服器用多依古禮革漢魏之法事竝施行今録辯所述六官著之於篇天官府管冢宰等衆職地官府領司徒等衆職春官府領宗伯等衆職夏官府領司馬等衆職秋官府領司宼等衆職冬官府領司空等衆職史雖具載文多不録辯所述六官太祖以魏恭帝三年始命行之自兹厥後世有損益宣帝嗣位事不師古官員班品隨意變革至如初置四輔官及六府諸司復置中大夫并御正内史增置上大夫等則載於外史餘則朝出夕改莫能詳録于時雖行周禮其内外衆職又兼用秦漢等官今略舉其名號及命數附之於左其紀傳内更有餘官而於此不載者亦史闕文也柱國大將軍大將軍右正九命驃騎車騎等大將軍開府儀同三司雍州牧右正九命驃騎車騎等將軍左右光禄大夫戸三萬以上州刺史右正八命征東征西征南征北中軍鎮軍撫軍等將軍左右金紫光禄大夫大都督戸二萬以上州刺史京兆尹右八命平東平西平南平北前後將軍左右將軍左右銀青光禄大夫帥都督戸一萬以上刺史柱國大將軍府長史司馬司録右正七命冠軍輔國等將軍太中中散等大夫都督戸五千以上刺史戸一萬五千以上郡守右七命鎭逺建忠等將軍諫議誠議等大夫别將開府長史司馬司録戸一萬以上郡守大呼藥右正六命中堅寕朔等將軍左右中郎將儀同府正八命州長史司馬司録戸五千以上郡守小呼藥右六命寕逺揚烈伏波等將軍左右員外常侍綂軍驃騎車騎府八命州長史司馬司録柱國大將軍府中郎掾戸一千以上郡守長安萬年縣令右正五命輕車將軍奉車奉騎等都尉四征中鎮撫軍府正七命州長史司馬司録開府府中郎掾屬戸不滿千以下郡守戸七千以上縣令正八命州呼藥右五命宣威明威等將軍武賁冗從等給事儀同府中郎掾屬柱國大將軍府列曹參軍四平前後左右將軍府七命州長史司馬司録正八命州别駕戸四千以上縣令八命州呼藥右正四命襄威厲威將軍給事中奉朝請軍主開府府列曹參軍冠軍輔國府正六命州長史司馬司録正七命州别駕正八命州治中七命郡丞戸二千以上縣令正七命州呼藥右四命威烈討㓂將軍左右員外侍郎幢主儀同府正八命州列曹參軍柱國府參軍鎮逺建忠中堅寕朔府長史司錄正六命州别駕正七命州治中正六命郡丞戸五百以上縣令七命州呼藥右正三命蕩宼蕩難將軍武騎常侍侍郎開府府參軍驃騎車騎府八命州列曹參軍寕逺揚烈伏波輕車府長史正六命州治中六命郡丞戸不滿五百以下縣令戌主正六命州呼藥右三命殄宼殄難將軍彊弩司馬四征中鎮撫府正七命州列曹參軍正五命郡丞右正二命掃宼掃難將軍武威司馬四平前後左右府七命州列曹參軍戌副五命郡丞右二命曠野横野將軍殿中員外二司馬冠軍輔國府正六命州列曹參軍右正一命武威武牙將軍淮海山林二都尉鎮逺建忠中堅寕朔寕逺揚烈伏波輕車府列曹參軍右一命周制封郡縣五等爵者皆加開國授柱國大將軍開府儀同者並加使持節大都督其開府又加車騎大將軍散騎常侍其授總管刺史則加使持節諸軍事以此為常大象元年詔總管刺史及行兵者加持節餘悉罷之建徳四年增置上柱國大將軍改儀同三司為儀同大將軍周書卷二十四周書卷二十四考證盧辯傳庶纂前修矣此下北史有節閔帝立云云臣文淳按下文云及帝入闗帝謂孝武也作史者若不載節閔帝即位事則當云及孝武入闗不當云帝入闗也以北史校之知此明有遺脱子慎北史云子慎嗣隋開皇初以辯前代名德追封沈國公此脱其開府又加車騎大將軍散騎常侍北史云其開府又加驃騎大將軍侍中其儀同又加車騎大將軍散騎常侍此亦脱訛周書卷二十四考證
