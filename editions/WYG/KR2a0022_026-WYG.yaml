  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_026-1a, image: WYG0263/WYG0263-0606c.png}
body:
  text: 周書卷二十六唐令狐徳棻等撰列傳第十八長孫儉長孫紹逺弟澄兄子兕斛斯徵長孫儉河南洛陽人也本名慶明其先魏之枝族姓拓拔氏孝文遷洛改為長孫五世祖嵩魏太尉北平王儉少方正有操行狀貌魁梧神彩嚴肅雖在私室終日􅌂然性不妄交非其同志雖貴遊造門亦不與相見孝昌中起家員外散騎侍郎從爾朱天光破隴右太祖臨夏州以儉為録事深器敬之賀拔岳被害太祖赴平涼凡有經綸謀䇿儉皆參預從平侯莫陳悦留儉為秦州長史時西夏州仍未内屬而東魏遣許和為刺史儉以信義招之和乃舉州歸附即以儉為西夏州刺史總統三夏州時荆襄初附太祖表儉功績尤羙宜委東南之任授荆州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推治獲實儉即大集僚屬而謂之曰此由刺史教誨不明信不被物是我之愆非泉璨之罪遂於廰事前肉袒自罰捨璨不問於是屬城肅勵莫敢犯法魏文帝璽書勞之太祖又與儉書曰近行路傳公以部内縣令有罪遂自杖三十用肅羣下吾昔聞王臣蹇蹇匪躬之故盖謂憂公忘私知無不為而已未有如公刻身罰已以訓羣僚者也聞之嘉歎荆蠻舊俗少不敬長儉殷勤勸導風俗大革務廣耕桑兼習武事故得邉境無虞民安其業吏民表請為儉構淸徳樓樹碑刻頌朝議許焉在州遂歴二載徵授大行臺尚書兼相府司馬嘗與羣公侍坐於太祖及退太祖謂左右曰此公閑雅孤每與語嘗肅然畏敬恐有所失他日太祖謂儉曰名實理須相稱尚書既志安貧素可改名儉以彰雅操又除行臺僕射荆州刺史時梁嶽陽王蕭詧内附初遣使入朝至荆州儉於廰事列軍儀具戎服與使人以賔主禮相見儉容貌魁偉音聲如鐘大為鮮卑語遣人𫝊譯以問客客惶恐不敢仰視日晚儉乃著帬􅃭紗帽引客宴於别齋因序梁國䘮亂朝廷招擕之意發言可觀使人大悦出曰吾所不能測也及梁元帝嗣位於江陵外敦隣睦内懷異計儉宻啟太祖陳攻取之謀於是徴儉入朝問其經畧儉對曰今江陵既在江北去我不逺湘東即位已渉三年觀其形勢不欲東下骨肉相殘民厭其毒荆州軍資器械儲積已久若大軍西討必無匱乏之慮且兼弱攻昧武之善經國家既有蜀土若更平江漢撫而安之收其貢賦以供軍國天下不足定也太祖深然之乃謂儉曰如公之言吾取之晚矣令儉還州宻為之備尋令柱國燕公于謹總戎衆伐江陵平以儉元謀賞奴婢三百口太祖與儉書曰本圖江陵由公畫計今果如所言智者見未萌何其妙也但呉民離散事藉招懐南服重鎮非公莫可遂令儉鎮江陵進爵昌寕公遷大將軍移鎭荆州總管五十二州儉舊嘗詣闕奏事時値大雪遂立於雪中待報自旦逹暮竟無惰容其奉公勤至皆此類也三年以疾還京為夏州總管薨遺啟世宗請葬於太祖陵側并以官所賜之宅還官詔皆從之追封鄶公荆民儀同趙超等七百人感儉遺愛詣闕請為儉立廟樹碑詔許之詔曰昔叔敖辭沃壤之地蕭何就窮僻之鄉以古方今無慙曩哲言尋嘉尚弗忘于懷而有司未逹大體遽以其第即便給外今還其妻子子隆長孫紹逺字師河南洛陽人少名仁父稚魏太師録尚書上黨王紹逺性寛容有大度望之􅌂然朋儕莫敢䙝狎雅好墳籍聪慧過人時稚作牧夀春紹逺幼年甫十三稚管記王碩聞紹逺彊記心以為不然遂白稚曰伏承世子聰慧之姿發於天性目所一見誦之於口此既歴世罕有竊願騐之於是命紹逺試焉讀月令數紙纔一徧誦之若流自是碩乃歎服魏孝武初累遷司徒右長史及齊神武稱兵而帝西遷紹逺隨稚奔赴又累遷殿中尚書録尚書事太祖每謂羣公曰長孫公任使之處令人無反顧憂漢之蕭宼何足多也然其容止堂堂足為當今模楷六官建拜大司樂孝閔踐阼封上黨公初紹逺為太常廣召工人創造樂器土木絲竹各得其宜為黄鍾不調紹逺每以為意嘗因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合宫調取而配奏方始克諧紹逺乃啟世宗行之紹逺所奏樂以八為數故梁黄門侍郎裴正上書以為昔者大舜欲聞七始下洎周武爰創七音持林鐘作黄鐘以為正調之首詔與紹逺詳議徃復於是遂定以八為數焉授小司空髙祖讀史書見武王克殷而作七始又欲廢八而懸七并除黄鐘之正宫用林鐘為調首紹逺奏云天子懸八肇自先民百王共軌萬世不易下逮周武甫修七始之音詳諸經義又無廢八之典且黄鐘為君天子正位今欲廢之未見其可後髙祖竟廢七音屬紹逺遘疾未獲靣陳慮有司遽損樂器乃書與樂部齊樹之缺後疾甚乃上遺表又陳之而卒帝省表涕零深痛惜之澄字士亮年十嵗司徒李琰之見而奇之遂以女妻焉十四從征討有䇿謀勇冠諸將及長容貌魁岸風儀温雅魏孝武初除征東將軍渭州刺史魏文帝嘗與太祖及羣公宴從容言曰孝經一卷人行之本諸公宜各引要言澄應聲曰夙夜匪懈以事一人座中有人次曰匡救其惡既而出閤太祖深歎澄之合機而譴其次荅者後從太祖援玉壁又從戰邙山進位驃騎大將軍開府孝閔踐阼拜大將軍封義門公為玉壁總管卒自喪初至及𦵏世宗三臨之典祀中大夫宇文容諫曰君臨臣喪自有節制今乗輿屢降恐乖禮典世宗不從澄操履清約家無餘財太祖嘗謂曰我於公間志無所惜公有所須宜即具道澄曰澄自頂至足皆是明公恩造即如今者實無所須雅對賓客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸每勅中厨别進異饌留之止兕字若汗性機辯彊記愽聞雅重賔遊尤善談論從魏孝武西遷天和初累遷驃騎大將軍開府遷絳州刺史斛斯徵字士亮河南洛陽人父椿太傅尚書令徴幼聰頴五嵗誦孝經周易識者異之及長博渉羣書尤精三禮兼解音律有至性居父喪朝夕共一溢米以父勲累遷太常卿自魏孝武西遷雅樂廢缺徴博採遺逸稽諸典故創新改舊方始備焉又樂有錞于者近代絶無此器或有自蜀得之皆莫之識徴見之曰此錞于也衆弗之信徴遂依干寳周禮注以芒筒捋之其聲極振衆乃歎服徴乃取以合樂焉六官建拜司樂中大夫進位驃騎大將軍開府後髙祖以徴治經有師法詔令教授皇太子宣帝時為魯公與諸皇子等咸服青衿行束修之禮受業於徴仍並呼徴為夫子儒者榮之宣帝嗣位遷上大將軍大宗伯時髙祖初崩梓宫在殯帝意欲速𦵏令朝臣議之徵與内史宇文孝伯等固請依禮七月帝竟不許帝之為太子也宫尹鄭譯坐不能以正道調護被讁除名而帝雅親愛譯至是拜譯内史中大夫甚委任之譯乃獻新樂十二月各一笙每一笙用十六管帝令與徴議之徵駮而奏帝頗納焉及髙祖山陵還帝欲作樂復令議其可不徵曰孝經云聞樂不樂聞尚不樂其况作乎鄭譯曰既云聞樂明即非無止可不樂何容不奏帝遂依譯議譯因此銜之帝後肆行非度昬虐日甚徵以荷髙祖重恩嘗備位師傅若生不能諫死何以見髙祖乃上疏極諫指陳帝失帝不納譯因譛之遂下徴獄獄卒張元哀之乃以佩刀穿獄牆遂出之元卒被拷而終無所言徵遇赦得免隋文踐極例復官除太子太傅詔修撰樂書開皇初薨子諺徵所􅁧樂典十卷周書卷二十六周書卷二十六考證長孫儉傳總戎衆伐江陵平以儉元謀賞奴婢三百口北史平字上有事字此處脱去遽以其第即便給外今還其妻子子隆給外北史作外給又云夫追善念功先王令典豈得遂其謙挹致乖懲勸今以本宅還其妻子俾清風逺播無替聿修次子隆位司金中大夫從長潮公元定伐陳􅃿江南卒隆弟平最知名臣文淳按此書詔文無刪節之例此獨不全子隆句文􅂔不完其為遺脱無疑長孫紹逺傳父稚北史云父承業又北史長孫冀歸傳云孝文以其幼承家業賜名幼字承業臣文淳按北魏書髙祖以其幼承家業賜名稚字承業幼與稚同義唐人諱治髙宗諱也北史上于髙宗時故李延夀改稚為幼此書成于貞觀時故不諱嫌名也乃書與樂部齊樹之缺此句下北史叙次甚詳本傳所缺宜以北史補之又北史傳末有重贈柱國大將軍諡曰獻號樂祖配饗廟廷子覽嗣二十字此亦脱去周書卷二十六考證
