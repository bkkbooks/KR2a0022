body:
  text: 周書卷十五唐令狐德棻等撰列傳第七寇洛李弼弟㯹于謹子寔寇洛上谷昌平人也累世為將吏父延壽和平中以良家子鎭武川因家焉洛性明辨不拘小節正光末以北邉賊起遂率鄉親避地於并肆因從爾朱榮征討及賀㧞岳西征洛與之鄉里乃募從入闗破赤水蜀以功拜中堅将軍屯騎校尉别将封臨邑縣男邑二百戸又從岳𫉬賊帥尉遲菩薩於渭水破侯伏侯元進於百里細川擒万俟醜奴於長坑洛每力戰並有功加龍驤将軍都督進爵安鄉縣子累遷征北将軍衛將軍於平涼以洛為右都督侯莫陳悦既害岳欲并其衆時初喪元帥軍中惶擾洛於諸將之中最為舊齒素為衆所信乃收集將士志在復讐共相紏合遂全衆而反既至原州衆咸推洛為盟主統岳之衆洛復自以非才乃固辭與趙貴等議迎太祖魏帝以洛有全師之功除武衞將軍太祖至平涼以洛為右大都督從討侯莫陳悦平之拜涇州刺史魏孝武西遷進爵臨邑縣伯邑五百戸尋進位驃騎大將軍儀同三司進爵為公増邑五百戸大統初魏文帝詔曰徃者侯莫陳悦遠同逆賊潛害故清水公岳志在兼并當時造次物情驚駭使持莭驃騎大將軍儀同三司前涇州刺史大都督臨邑縣開國公宼洛忠欵自心勲誠早立遂能紏合義軍以待大丞相見危授命推賢而奉此而不賞何以勸勵將来可加開府進爵京兆郡公封洛母宋氏為襄城郡君又轉領軍將軍三年出為華州刺史加侍中與獨孤信復洛陽移鎮𢎞農四年從太祖與東魏戰於河橋軍還洛率所部鎮東雍五年卒於鎮時年五十三贈使持節侍中都督雍華豳涇原三秦二岐十州諸軍事太尉尚書令驃騎大將軍雍州刺史諡曰武子和嗣世宗二年録勲舊以洛配享太祖廟庭賜和姓若口引氏改封松陽郡公後至開府儀同三司賔部中大夫洛弟紹位至上柱國北平郡公李弼字景和遼東襄平人也六世祖根慕容垂黄門侍郎祖貴醜平州刺史父永太中大夫贈涼州刺史弼少有大志膂力過人屬魏室䘮亂語所親曰丈夫生死㑹須履鋒刃平寇難安社稷以取功名安能碌碌依階資以求榮位乎魏永安元年爾朱天光辟為别将從天光西討破赤水蜀以功拜征虜将軍封石門縣伯邑五百戸又與賀拔岳討万俟醜奴万俟道洛王慶雲皆破之弼恒先鋒陷陣所向披靡賊咸畏之曰莫當李將軍前也天光赴洛弼因𨽻侯莫陳悦為大都督加通直散騎常侍太昌初受清水郡守恒州大中正尋除南秦州刺史隨悦征討屢有尅㨗及悦害賀拔岳軍停隴上太祖自平涼進軍討悦弼諫悦曰岳既無罪而公害之又不能撫納其衆使無所歸宇文夏州收而用之得其死力咸云為主将報讐其意固不小也今宜解兵謝之不然恐必受禍悦惶惑計無所出弼知悦必敗乃謂所親曰宇文夏州才略冠世德義可宗侯莫陳公智小謀大豈能自保吾等若不為計恐與之同至族滅㑹太祖軍至悦乃棄秦州南出㩀險以自固翌日弼密通使太祖許背悦来降夜弼乃勒所部云侯莫陳公欲還秦州汝等何不束裝弼妻悦之姨也特為悦所親委衆咸信之人情驚擾不可復定皆散走爭趣秦州弼乃先馳㩀城門以慰輯之遂擁衆以歸太祖悦由此遂敗太祖謂弼曰公與吾同心天下不足平也破悦得金寳奴婢悉以好者賜之仍令弼以本官鎮原州尋拜秦州刺史太祖率兵東下徴弼為大都督領右軍攻潼闗及㢠廻洛城剋之大統初進位儀同三司雍州刺史尋又進位驃騎大將軍開府儀同三司從平竇泰先鋒陷敵斬獲居多太祖以所乘騅馬及竇泰所著牟甲賜弼又從平𢎞農與齊神武戰於沙苑弼率軍居右而左軍為敵所乘弼呼其麾下六十騎身先士卒横截之賊遂為三因大破以功拜特進爵趙郡公増邑一千戸又與賀拔勝攻剋河東略定汾綘四年從太祖東討洛陽弼為前驅東魏將莫多婁貸文率衆數千奄至榖城弼倍道而前遣軍士鼓噪曵柴揚塵貸文以為大軍至遂遁走弼追躡之虜其衆斬貸文傳首大軍所翌日又從太祖與齊神武戰於河橋每入深陷陣身被七創遂為所𫉬圍守數重弼佯若創重殞絶於地守者稍懈弼睨其旁有馬因躍上西馳得免五年遷司空六年侯景㩀荆州弼與獨孤信禦之景乃退走九年從戰邙山轉太尉十三年侯景率河南六州来附東魏遣其將韓軌圍景於潁川太祖遣弼率軍援景諸将咸受弼節度弼至軌退王思政又進㩀潁川弼乃引還十四年北稽胡反弼討平之遷太保加柱國大將軍魏廢帝元年賜姓徒河氏太祖西廵令弼居守後事皆諮禀焉六官建拜太傅大司徒屬茹茹為突厥所逼舉國請降弼率前軍迎之給前後部羽葆鼔吹賜雜綵六千段及晉公護執政朝之大事皆與于謹及弼等參議孝閔帝踐阼除太師進封趙國公邑萬戸前後賞賜累巨萬弼每率兵征討朝受令夕便引路不問私事亦未嘗宿於家其憂國忘身類皆如此兼復性沉雄有深識故能以功名終元年十月薨於位年六十四世宗即日舉哀比𦵏三臨其喪發卒穿冢給大輅龍旂陳軍至于墓所諡曰武尋追封魏國公配食太祖廟庭子耀次子輝尚太祖女義安長公主遂以為嗣輝大統中起家員外散騎侍郎賜爵義城郡公歴撫軍将軍大都督鎮南将軍散騎常侍輝常臥疾朞年太祖憂之日賜錢一千供其藥石之費及魏廢帝有異謀太祖乃授輝武衞将軍總宿衛事尋而帝廢除車騎大將軍儀同三司魏恭帝二年加驃騎大將軍儀同三司出為岐州刺史從太祖西巡率公卿子弟别為一軍孝閔帝踐阼除荆州刺史尋襲爵趙國公改魏國公保定中年加将軍天和六年進位柱國建徳元年出為總管梁洋等十州諸軍事梁州刺史時渠􅅾二州生獠積年侵暴輝至州綏撫竝來歸附璽書勞之耀既不得為嗣朝廷以弼功重乃封耀邢國公位至開府子寛大象末大將軍蒲山郡公輝弟衍大象末大將軍眞鄉郡公衍弟綸最知名有文武才用以功臣子少居顯職歴吏部内史下大夫竝獲當官之譽位至司㑹中大夫開府儀同三司封河陽郡公為聘齊使主早卒子長雅嗣綸弟宴建德中開府儀同三司大将軍趙郡公從高祖平齊殁於并州子璟以宴死王事即襲其爵弼弟㯹㯹字靈傑長不盈五尺性果決有膽氣少事爾朱榮魏永安元年以兼别将從榮破元顥拜討逆将軍及榮被害㯹從爾朱世隆奉榮妻奔河北又隨爾朱兆入洛賜爵淝城郡男遷都督普泰元年元樹自梁入㩀譙城㯹從行臺樊子鵠撃破之遷右將軍魏孝武西遷㯹從大都督元斌之與齊神武戰於成臯兵敗遂與斌之奔梁梁主待以賔禮後得逃歸大統元年授撫軍将軍進封晉陽縣子邑四百戸尋為大祖帳内都督從復𢎞農破沙苑㯹跨馬運矛衝鋒陷陣隠身鞍甲之中敵人見之皆曰避此小兒不知㯹之形貎正自如是太祖初亦聞㯹驍悍未見其能至是方嗟歎之謂㯹曰但使膽決如此何必須要八尺之軀也以功進爵為公増邑四百戸尋從宇文貴與東魏将任祥堯雄等戰於潁川皆破之徴為太子中庶子九年從戰邙山遷持節大都督十三年拜車騎大将軍儀同三司又從弼討稽胡㯹功居多除幽州刺史増邑三百戸十五年拜驃騎大将軍開府儀同三司魏廢帝初從趙貴征茹茹論功為最改封封山縣公増邑并前二千一百戸孝閔帝踐阼進位大將軍武成初又從豆盧寕征稽胡大獲而還進爵汝南郡公出為總管延綏丹三州諸軍事延州刺史四年卒於鎮贈恒朔等五州刺史㯹無子以弼子椿嗣先以㯹勲功封魏平縣子大象末開府儀同三司大将軍右宫伯改封河東郡公于謹字思敬河南洛陽人也小名巨彌曽祖婆魏懐荒鎮將祖安定平涼郡守高平郡将父提隴西郡守荏平縣伯保定二年以謹著勲追贈使持節柱國大将軍太保建平郡公謹性沉深有識量略窺經史尤好孫子兵書屏居閭里未有仕進之志或有勸之者謹曰州郡之職昔人所鄙台鼎之位須待時来吾所以優游郡邑聊以卒嵗耳太宰元穆見之歎曰王佐材也及破六汗拔陵首亂北境引茹茹為援大行臺僕射元纂率衆討之宿聞謹名辟為鎧曹參軍事從軍北伐茹茹聞大軍之逼遂逃出塞纂令謹率二千騎追之至郁對原前後十七戰盡降其衆後率輕騎出塞覘賊屬鐵勒數千騎奄至謹以衆寡不敵退必不免乃散其衆騎使匿叢薄之間又遣人升山指麾若分部軍衆者賊望見雖疑有伏兵既恃其衆不以為慮乃進軍逼謹謹以常乘駿馬一紫一騧賊先所識乃使二人各乘一馬突陣而出賊以為謹也皆爭逐之謹乃率餘軍撃之其追騎遂奔走因得入塞正光四年行臺廣陽王元深治兵北伐引謹為長流參軍特相禮接所有謀議皆與謹參之乃使其子佛陁拜焉其見待如此遂與廣陽王破賊主斛律野榖禄等時魏末亂羣盗蜂起謹乃從容謂廣陽王曰自正光以後海内沸騰郡國荒殘農商廢業今殿下奉義行誅遠臨關塞然醜類蟻聚其徒實繁若極武窮兵恐非計之上者謹願禀大王之威略馳徃喻之必不勞兵甲可致清蕩廣陽王然之謹兼解諸國語乃單騎入賊示以恩信於是西部鐵勒酋長乜列河等領三萬餘戸並欵附相率南遷廣陽王欲與謹至折敷嶺迎接之謹曰破六汗拔陵兵衆不少聞乜列河等歸附必來要撃彼若先㩀險要則難與爭鋒今以乜列河等餌之當競来抄掠然後設伏以待必指掌破之廣陽然其計拔陵果來要擊破乜列河於嶺上部衆皆殁謹伏兵𤼵賊遂大敗悉收得乜列河之衆魏帝嘉之除積射将軍孝昌元年又隨廣陽王征鮮于脩禮軍次白牛邏㑹章武王為脩禮所害遂停軍中山侍中元宴宣言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智略過人為其謀主風塵之隙恐非陛下之純臣矣靈太后深納之詔於尚書省門外立牓募能獲謹者許重賞謹聞之乃謂廣陽曰今女主臨朝取信讒佞脱不明白殿下素心便􅂲禍至無日謹請束身詣闕歸罪有司披露腹心自免殃禍廣陽許之謹遂到牓下曰吾知此人衆人共詰之謹曰我即是也有司以聞靈太后引見之大怒謹傋論廣陽忠欵兼陳停軍之狀靈后意稍解遂捨之尋加别將二年梁将曹義宗㩀守穰城數為邉患乃令謹與行臺尚書辛纂率兵討之相持累年經數十戰進拜都督宣威將軍冗從僕射孝莊帝即位除鎮遠將軍尋轉直寢又隨太宰元天穆討葛榮平邢杲拜征虜将軍從爾朱天光破万俟醜奴封石城縣伯邑五百戸普泰元年除征北大將軍金紫光禄大夫散騎常侍又隨天光平宿勤明逹别討夏州賊賀遂有伐等平之授大都督從天光與齊神武戰於韓陵山天光既敗謹遂入闗賀㧞岳表謹留鎮除衛将軍咸陽郡守太祖臨夏州以謹為防城大都督兼夏州長史及岳被害太祖赴平涼謹乃言於太祖曰魏祚陵遲權臣擅命羣盜蜂起黔首嗷然明公仗超世之姿懐濟時之略四方遠近咸所歸心願早建良圗以副衆望太祖曰何以言之謹對曰闗右秦漢舊都古稱天府將士驍勇厥壤膏腴西有巴蜀之饒北有羊馬之利今若據其要害招集英雄養卒勸農足觀時變且天子在洛逼廹羣兇若陳明公之懇誠算時事之利害請都闗右帝必嘉而西遷然後挾天子而令諸侯奉王命以討暴亂桓文之業千載一時也太祖大悦㑹有勑追謹為闗内大都督謹因進都闗中之䇿魏帝納之尋而齊神武逼洛陽謹從魏帝西遷仍從太祖征潼闗破廻洛城授使持節車騎大将軍儀同三司北雍州刺史進爵藍田縣公邑一千戸大統元年拜驃騎大将軍開府儀同三司其年夏陽人王遊浪聚據楊氏壁謀逆謹討擒之是嵗大軍東伐謹為前鋒至盤豆東魏将高叔禮守險不下攻破之拔虜其卒又因此拔𢎞農擒東魏陜州刺史李徴伯齊神武至沙苑謹從太祖與諸将力戰破之進爵常山郡公増邑一千戸又從戰河橋拜大丞相府長史兼大行臺尚書稽胡帥夏州刺史劉平叛謹率衆討平之除大都督恒并燕肆雲五州諸軍事大将軍恒州刺史入為太子太師九年復從太祖東征别攻柏谷塢拔之邙山之戰大軍不利謹率其麾下偽降立於路左齊神武軍乘勝逐北不以為虞追騎過盡謹乃自後撃之敵人大駭獨孤信又集兵士於後奮擊齊神武軍遂亂以此大軍得全十二年拜尚書左僕射領司農卿及侯景欵附請兵為援太祖命李弼率兵應之謹諫曰侯景少習兵權情實難測且宜厚其禮秩以觀其變即欲遣兵良用未可太祖不聼尋復兼大行臺尚書丞相府長史率兵鎮潼闗加授華州刺史贈秬鬯一卣圭瓚副焉俄拜司空増邑四百戸十五年進位柱國大将軍齊氏稱帝太祖征之以謹為後軍大都督别封一子鹽亭縣侯邑一千戸魏恭帝元年除雍州刺史初梁元帝平侯景之後於江陵嗣位密與齊氏通使将謀侵軼其兄子岳陽王詧時為雍州刺史以梁元帝殺兄譽遂結讐隙據襄陽來附仍請王師乃令謹率衆出討太祖餞於青泥谷長孫儉問謹曰為蕭繹之計将欲如何謹曰耀兵漢沔席卷渡江直㩀丹陽是其上䇿移郭内居民退保子城峻其陴堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用下䇿儉曰彼棄上而用下何也對曰蕭氏保據江南綿歴數紀屬中原多故未遑外略又以我有齊氏之患必謂力不能分且繹愞而無謀多疑少斷愚民難與慮始皆戀邑居既惡遷移當保羅郭所以用下䇿也謹乃令中山公䕶及大將軍楊忠等率精騎先據江津斷其走路梁人竪木柵於外城廣輪六十里尋而謹至悉衆圍之梁王屢遣兵於城南出戰輙為謹所破旬有六日外城遂陷梁主退保子城翌日率其太子以下靣縛出降尋殺之虜其男女十餘萬人收其府庫珍寳得宋渾天儀梁日晷銅表魏相風烏銅蟠螭跌大玉徑四尺圍七尺及諸轝輦法物以獻軍無私焉立蕭詧為梁主振旅而旋太祖親至其第宴語極歡賞謹奴婢一千口及梁之寳物并金石絲竹樂一部别封新野郡公邑二千戸謹固辭太祖不許又令司樂作常山公平梁歌十首使工人歌之謹自以久當權勢位望隆重功名既立願保優閑乃上先所乘駿馬及所著鎧甲等太祖識其意乃曰今巨猾未平公豈得便爾獨善遂不受六官建拜大司徒及太祖崩孝閔帝尚幼中山公護雖受顧命而名位素下羣公各圖執政莫相率服䕶深憂之密訪於謹謹曰夙蒙丞相殊睠情深骨肉今日之事必以死爭之若對衆定䇿公必不得辭讓明日羣公㑹議謹曰昔帝室傾危人圖問鼎丞相志在匡救投袂荷戈故得國祚中興羣生遂性今上天降禍奄棄庶寮嗣子雖幼而中山公親則猶子兼受顧託軍國之事理須歸之辭色抗厲衆皆悚動䕶曰此是家事素雖庸昧何敢有辭謹既太祖等夷䕶每申禮敬至是謹乃趨而言曰公若統理軍國謹等便有所依遂再拜羣公廹於謹亦再拜因是衆議始定孝閔帝踐阼進封燕國公邑萬戸遷太傅大宗伯與李弼侯莫陳崇等參議朝政及賀蘭祥討吐谷渾也謹遥統其軍授以方略保定二年謹以年老上表乞骸骨詔報曰昔師尚父年踰九十召公奭㡬将百歳皆勤王家自彊不息今元惡未除九州不一将以公為舟檝𢎞濟於艱難豈容忘二公之雅操而有斯請朕用恧焉公若更執謙沖有司宜斷啓三年四月詔曰樹以元首主乎敎化率民孝悌置之仁壽是以古先明后咸若斯典立三老五更躬自袒割朕以眇身處兹南靣何敢遺此黄髮不加尊敬太傅燕國公謹執德淳固為國元老饋以乞言朝野所屬可為三老有司具禮擇日以聞謹上表固辭詔答不許又賜延年杖高祖幸太學以食之三老入門皇帝迎拜門屏之間三老答拜有司設三老席於中楹南向太師晉國公護升階設几施席三老升席南靣憑凡而坐以師道自居大司馬楚國公寕升階正舄皇帝升階立於斧扆之前西靣有司進饌皇帝跪設醬豆親自袒割三老食訖皇帝又親跪授爵以酳有司撤訖皇帝北􅆕立而訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老答曰木受䋲則正后從諫則聖自古明王聖主皆虚心納諫以知得失天下乃安唯陛下念之又曰為國之本在乎忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必須有法法者國之綱紀綱紀不可不正所正在於賞罰若有功必賞有罪必罰則有善者日益為惡者日止若有功不賞有罪不罰則天下善惡不分下民無所措其手足矣又曰言行者立身之基言出行隨誠宜相顧願陛下三思而言九慮而行若不思不慮必有過失天子之過事無大小如日月之蝕莫不知者願陛下慎之三老言畢皇帝再拜受之三老答拜焉禮成而出及晉公䕶東伐謹時老病䕶以其宿将舊臣猶請與同行詢訪戎略軍還賜鐘磬一部天和二年又賜安車一乘尋授雍州牧三年薨於位年七十六高祖親臨詔譙王儉監䕶䘮事賜繒綵千段粟麥五千斛贈本官加使持節太師雍恒等二十州諸軍事雍州刺史諡曰文及葬王公已下咸送出郊外配享於太祖廟庭謹有智謀善於事上名位雖重愈存謙挹每朝參徃来不過從兩三騎而已朝廷凡有軍國之務多與謹決之謹亦竭其智能弼諧帝室故功臣之中特見委信始終若一人無間言每敎訓諸子務存静退加以年齒遐長禮遇隆重子孫繁衍皆至顯逹當時莫與為比焉子寔嗣寔字賔實少和厚年未弱冠入太祖幕府從征潼闗及􅂞洛城大統三年又從復𢎞農戰沙苑以前後功封萬年縣子邑五百戸授主衣都統河橋之役先鋒陷陣軍還寔又為内殿除通直散騎常侍轉太子右衞率加都督又從太祖戰於邙山十一年詔寔侍講東宫侯景来附遣寔與諸軍援之平九曲城進大都督遷儀同三司加散騎常侍十四年除尚書是歳太祖與魏太子西廵寔時從太祖刻石於隴山之上録功臣位以次鐫勒預以寔為開府儀同三司至十五年方授之尋除滑州刺史特給鼓吹一部進爵為公増邑二百戸魏恭帝二年羌東念姐率部落反結連吐谷渾每為邉患遣大将軍豆盧寕討之踰時不尅又令寔徃遂破之太祖手書勞問賜奴婢一百口馬一百疋孝閔帝踐阼授民部中大夫進爵延夀郡公邑二千戸又進位大将軍除勲州刺史入為小司冦天和二年延州蒲川賊郝三郎等反攻逼丹州遣寔率衆討平之斬三郎首𫉬雜畜萬餘頭乃除延州刺史五年襲爵燕國公進位柱國以罪免尋復本官除涼州總管大象二年加上柱國拜大左輔隋開皇元年薨贈司空諡曰安子顗大象末上開府吳州總管新野郡公顗弟仲文大将軍延夀郡公仲文弟象賢儀同三司尚高祖女寔弟翼自有傳翼弟義上柱國潼州總管建平郡公義弟禮上大将軍趙州刺史安平郡公禮弟智初為開府以受宣帝㫖告齊王憲反遂封齊國公尋拜柱國涼州總管大司空智初弟紹上開府綏州刺史華陽郡公紹弟弼上儀同平恩縣公弼弟蘭上儀同襄陽縣公蘭弟曠上儀同贈恒州刺史史臣曰賀拔岳變起倉卒侯莫陳悦意在兼并于時将有離心士無固志洛撫緝散亂抗禦仇讐全師而還敵人絶覬覦之望度徳而處霸王建匡合之謀此功固不細也李弼于謹懐佐時之略逢啓聖之運綢繆顧遇締構艱難帷幄盡其謨猷方􅆕宣其庸績擬巨川之舟艥為大厦之棟梁非惟攀附成名抑亦材謀自取及謹以耆年碩德譽重望高禮備上庠功歌司樂常以滿盈為戒覆折是憂不有君子何以能國周書卷十五周書卷十五考證李弼𫝊遼東襄平人也北史作隴西成紀人翌日弼宻通使太祖翌日北史作是日于謹𫝊曽祖婆魏懐荒鎮将祖安定平凉郡守髙平郡将臣文淳按北史于栗殚𫝊魏書外戚𫝊俱云栗殚孫勁勁弟天恩子仁生仁生子安定平原郡守髙平郡将是謹之曽祖乃仁生無所謂婆者又按謹父提魏書入節義𫝊本𫝊亦失載廣平王欲與謹至折敷嶺迎接之折敷嶺北史作折廓嶺智初弟紹按齊王憲𫝊及通鑑皆作于智此云智初因上文禮弟智初為開府初字連讀而訛耳周書卷十五考證
