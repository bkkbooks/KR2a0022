body:
  text: 周書卷三十一唐令狐徳棻等撰列𫝊第二十三韋孝寛韋夐梁士彦韋叔裕字孝寛京兆杜陵人也少以字行世為三輔著姓祖直善魏馮翊扶風二郡守父旭武威郡守建義初為大行臺右丞加輔國將軍雍州大中正永安二年拜右將軍南幽州刺史時氐賊數為抄竊旭随機招撫竝即歸附尋卒官贈司空冀州刺史諡曰文惠孝寛沉敏和正渉獵經史弱冠屬蕭寳夤作亂闗右乃詣闕請為軍前驅朝廷嘉之即拜統軍随馮翊公長孫承業西征每戰有功拜國子博士行華隂郡事屬侍中楊侃為大都督出鎮潼闗引孝寛為司馬侃竒其才以女妻之永安中授宣威將軍給事中尋賜爵山北縣男普泰中以都督從荆州刺史源子恭鎮襄城以功除浙陽郡守時獨孤信為新野郡守司荆州與孝寛情好款密政術俱美荆部吏人號為聨璧孝武初以都督鎮城文帝自原州赴雍州命孝寛随軍及剋潼闗即授𢎞農郡守從擒竇泰兼左丞節度宜陽兵馬事仍與獨孤信入洛陽城守復與宇文貴怡峯應接潁州義徒破東魏將任祥堯雄於潁川孝寛又進平樂口下豫州獲刺史馮邕又從戰於河橋時大軍不利邊境騷然乃令孝寛以大將軍行宜陽郡事尋遷南兗州刺史是嵗東魏將叚琛堯傑復據宜陽遣其揚州刺史牛道恒扇誘邊民孝寛深患之乃遣諜人訪獲道恒手迹令善學書者偽作道恒與孝寛書論歸款意又為落燼燒迹若火下書者還令諜人送於琛營琛得書果疑道恒其所欲經略皆不見用孝寛知其離阻日出竒兵掩襲擒道恒及琛等崤澠遂清大統五年進爵為侯八年轉晉州刺史尋移鎮玉壁兼攝南汾州事先是山胡負險屢為劫盗孝寛示以威信州境肅然進授大都督十二年齊神武傾山東之衆志圖西入以玉壁衝要先命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩髙樓孝寛更縳木接之命極髙峻多積戰具以禦之齊神武使謂城中曰縱爾縳樓至天我㑹穿城取爾遂於城南鑿地道又於城北起土山攻具晝夜不息孝寛復掘長塹要其地道仍飭戰士屯塹城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有伏地道内者便下柴火以皮韛吹之火氣一衝咸即灼爛城外又造攻車車之所及莫不摧毁雖有排楯莫之能抗孝寛乃縫布為縵随其所向則張設之布既懸於空中其車竟不能壊城外又縛松於竿灌油加火規以燒布并欲焚樓孝寛復長作鐵鈎利其鋒刃火竿來以鈎遙割之松麻俱落外又於城四面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壊孝寛又随崩處堅木柵以扞之敵不得入城外盡其攻撃之術孝寛咸拒破之神武無如之何乃遣倉曹參軍祖孝徴謂曰未聞救兵何不降也孝寛報云我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間已須救援適憂爾衆有不反之危孝寛闗西男子必不為降將軍也俄而孝徴復謂城中人曰韋城主受彼榮禄或復可爾自外軍士何事相随入湯火中耶乃射募格於城中云能斬城主降者拜太尉封開國郡公邑萬戸賞帛萬疋孝寛手題書背反射城外云若有斬髙歡者一依此賞孝寛弟子遷先在山東又鎻至城下臨以白刃云若不早降便行大戮孝寛慷慨激揚略無顧意士卒莫不感勵人有死難之心神武苦戰六旬傷及病死者十四五智力俱困因而發疾其夜遁去後因此忿恚遂殂魏文帝嘉孝寛功令殿中尚書長孫紹逺左丞王悦至玉壁勞問授驃騎大將軍開府儀同三司進爵建忠郡公廢帝二年為雍州刺史先是路側一里置一土候經雨頽毁每須修之自孝寛臨州乃勒部内當候處植槐樹代之既免修復行旅又得庇廕周文後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州夾道一里種一樹十里種三樹百里種五樹焉恭帝元年以大將軍與燕國公于謹伐江陵平之以功封穰縣公還拜尚書右僕射賜姓宇文氏二年周文北廵命孝寛還鎮玉壁周孝閔帝踐阼拜小司徒眀帝初參麟趾殿學士考校圖籍保定初以孝寛立勲玉壁遂於玉壁置勲州仍授勲州刺史齊人遣使至玉壁求通互市晉公護以其相持日久絶無使命一日忽來求交易疑别有故又以皇姑皇世母先沒在彼因其請和之際或可致之遂令司門下大夫尹公正至玉壁共孝寛詳議孝寛乃於郊盛設供帳令公正接對使人兼論皇家親屬在東之意使者辭色甚悦時又有汾州胡抄得闗東人孝寛復放東還並致書一牘具陳朝廷欲敦隣好遂以禮送皇姑及䕶母等孝寛善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寛金貨遥通書疏故齊動静朝廷皆先知時有主帥許盆孝寛托以心膂命守一戍盆乃以城東入孝寛怒遣諜取之俄而斬首而還其能致物情如此汾州之北離石以南悉是生胡抄掠居人阻斷河路孝寛深患之而地入於齊無方誅剪欲當其要處置一大城乃於河西徴役徒十萬甲士百人遣開府姚岳監築之岳色懼以兵少為難孝寛曰計成此城十日即畢既去晉州四百餘里一日創手二日偽境始知設令晉州徴兵二日方集謀議之間自稽三日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至南首疑有大軍乃停留不進其夜又令汾水以南傍介山稷山諸村所在縱火齊人謂是軍營遂收兵自固版築克就卒如其言四年進位柱國時晉公䕶將東討孝寛遣長史辛道憲啓陳不可䕶不納既而大軍果不利後孔城遂陷宜陽被圍孝寛乃謂其將帥曰宜陽一城之地未能損益然兩國爭之勞師數載彼多君子寧乏謀猷若棄崤東來圖汾北我之疆界必見侵擾今宜於華谷及長秋速築城以杜賊志脱其先我圖之實難於是畫地形具陳其狀晉公䕶令長史叱羅協謂使人曰韋公子孫雖多數不滿百汾北築城遣誰固守事遂不行天和五年進爵鄖國公增邑通前一萬户是嵗齊人果解宜陽之圍經略汾北遂築城守之其丞相斛律眀月至汾東請與孝寛相見眀月云宜陽小城久勞戰爭今既入彼欲於汾北取償幸勿怪也孝寛荅曰宜陽彼之要衝汾北我之所棄我棄彼圖取償安在且君輔翼幼主位重望隆理宜調隂陽撫百姓焉用極武窮兵搆怨連禍且滄瀛大水千里無烟復欲使汾普之間横屍暴骨茍貪尋常之地塗炭疲弊之人竊為君不取孝寛參軍曲巖頗知卜筮謂孝寛曰來年東朝必大相殺戮孝寛因令巖作謠歌曰百升飛上天眀月照長安百升斛也又言髙山不摧自崩槲樹不扶自􅆆令諜人多齎此文遺之於鄴祖孝徴既聞更潤色之眀月竟以此誅建徳之後武帝志在平齊孝寛乃上疏陳三䇿其第一䇿曰臣在邊積年頗見間隙不因際㑹難以成功是以徃嵗出軍徒有勞費功績不立由失機會何者長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之齊人歴年赴救喪敗而反内離外叛計盡力窮傳不云乎讐有釁焉不可失也今大軍若出軹闗方軌而進兼與陳氏共為掎角并令廣州義旅出自三鵶又募山南驍鋭沿河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募闗河之外勁勇之士厚其爵賞使為前驅岳動川移雷駭電激百道俱進竝趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其第二䇿曰若國家更為後圖未即大舉宜與陳人分其兵勢三鵶以北萬春以南廣事屯田預為貯積募其驍悍立為部伍彼既東南有敵戎馬相持我出竒兵破其疆場彼若興師赴援我則堅壁清野待其去遠還復出師常以邊外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境熬然不勝其弊以此而觀覆亡可待然後乘間電掃事等摧枯其第三䇿曰竊以大周土宇跨據闗河蓄席卷之威持建瓴之勢太祖受天明命與物更新是以二紀之中大功克舉南清江漢西龕巴蜀塞表無虞河右底定唯彼趙魏獨為榛梗者正以有事三方未遑東略遂使漳滏遊魂更存餘晷昔勾踐亡吳尚期十載武王取亂猶煩再舉今若更存遵養且復相時臣謂宜還崇隣好申其盟約安人和衆通商惠工蓄銳養威觀釁而動斯則長策逺馭坐自兼并也書奏武帝遣小司寇淮南公元衞開府伊婁謙等重幣聘齊爾後遂大舉再駕而定山東卒如孝寛之策孝寛每以年迫懸車屢請致仕帝以海内未平優詔弗許至是復稱疾乞骸骨帝曰徃已面申本懐何煩重請也五年帝東伐過幸玉壁觀禦敵之所深歎羡之移時乃去孝寛自以習練齊人虚實請為先驅帝以玉壁要衝非孝寛無以鎮之乃不許及趙王招率兵出稽胡與大軍掎角乃􅎁孝寛為行軍總管圍守華谷以應接之孝寛克其四城武帝平晉州復令孝寛還舊鎮及帝凱還復幸玉壁從容謂孝寛曰世稱老人多智善為軍謀然朕唯共少年一舉平賊公以為何如孝寛對曰臣今衰耄唯有誠心而已然昔在少壯亦曾輸力先朝以定闗右帝大笑曰實如公言乃詔孝寛随駕還京拜大司空出為延州總管進位上柱國大象元年除徐兗等十一州十五鎮諸軍事徐州總管又為行軍元帥狥地淮南乃分遣杞公宇文亮攻黄城郕公梁士彦攻廣陵孝寛率衆攻壽陽竝拔之初孝寛到淮南所在皆密送誠款然彼五門尤為險要陳人若開塘放水即津濟路絶孝寛遽令分兵據守之陳刺史吳文育果遣決堰已無及於是陳人退走江北悉平軍還至豫州宇文亮舉兵反潛以數百騎襲孝寛營時亮圉官茹寛密白其狀孝寛有備亮不得入遁走孝寛追獲之詔以平淮南之功别封一子滑國公及宣帝崩隋文帝輔政時尉遲迥先為相州總管詔孝寛代之又以小司徒叱列長文為相州刺史先令赴鄴孝寛續進至朝歌㢠遣大都督賀蘭貴齎書候孝寛孝寛留貴與語以察之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之既到湯隂逢長文奔還孝寛兄子魏郡守藝又棄郡南走孝寛審訐其狀乃馳還所經橋道皆令毁撤驛馬悉擁以自隨又勒騎將曰蜀公將至可多備餚酒及芻粟以待之迥果遣儀同梁子康將數百騎追孝寛驛司供設豐厚所經之處皆輒停留由是不及時或勸孝寛以為洛京虛弱素無守備河陽鎮防悉是闗東鮮卑迥若先徃據之則為禍不小乃入保河陽河陽城内舊有鮮卑八百人家竝在鄴見孝寛輕來謀欲應迥孝寛知之遂密造東京官司詐稱遣行分人詣洛陽受賜既至洛陽竝留不遣因此離解其謀不成六月詔發闗中兵以孝寛為元帥東伐七月軍次河陽迥所署儀同薛公禮等圍逼懐州孝寛遣兵撃破之進次懐縣永城橋之東南其城既在要衝雉堞牢固迥已遣兵據之諸將士以此城當路請先攻取孝寛曰城小而固若攻而不拔損我兵威今破其大軍此亦何能為也於是引軍次于武陟大破迥子惇惇輕騎奔鄴軍次於鄴西門豹祠之南迥自出戰又破之迥窮迫自殺兵士在小城中者盡坑於遊豫園諸有未服皆随機討之闗東悉平十月凱還京師十一月薨時年七十二贈太傅十二州諸軍事雍州牧諡曰襄孝寛在邊多載屢抗強敵所有經略布置之初人莫之解見其成事方乃驚服雖在軍中篤意文史政事之餘每自披閱末年患眼猶令學士讀而聼之又早喪父母事兄嫂甚謹所得俸禄不入私房親族有孤遺者必加振贍朝野以此稱焉長子諶年已十嵗魏文帝欲以女妻之孝寛辭以兄子世康年長帝嘉之遂以妻世康孝寛有六子總壽霽津知名韋夐字敬逺志尚夷簡澹於榮利弱冠被召拜雍州中從事非其好也遂謝疾去職前後十見徴辟皆不應命屬太祖經綸王業側席求賢聞夐養髙不仕虚心敬悦遣使辟之備加禮命雖情諭甚至而竟不能屈彌以重之亦弗之奪也所居之宅枕帶林泉夐對翫琴書蕭然自樂時人號為居士焉至有慕其閑素者或載酒從之敻亦為之盡歡接對忘倦明帝即位禮敬逾厚乃為詩以貽之曰六爻貞遯世三辰光少㣲潁陽讓逾逺滄州去不歸香動秋蘭佩風飄蓮葉衣坐石窺仙洞乘槎下釣磯嶺松千仞直巖泉百丈飛聊登平樂觀逺望首陽薇詎能同四隠來參余萬機敻荅帝詩願時朝謁帝大悦敕有司日給河東酒一斗號之曰逍遥公時晉公䕶執政廣營第宅嘗召敻至宅訪以政事敻仰視其堂徐而歎曰酣酒嗜音峻宇雕牆有一於此未或弗亡䕶不悦有識者以為知言陳遣其尚書周𢎞正來聘素聞敻名請與相見朝廷許之𢎞正乃造夐談謔盈日恨相遇之晚後請敻至賓舘敻時赴𢎞正仍贈詩曰徳星猶未動真車詎肯來其為時所欽挹如此武帝嘗與敻夜宴大賜之縑帛令侍臣數人負以送出夐唯取一疋示承恩㫖而已帝以此益重之孝寛為延州總管敻至州與孝寛相見將還孝寛以所乘馬及轡勒與夐敻以其華飾心弗欲之笑謂孝寛曰昔人不棄遺簪墜屨者惡與之同出不與同歸吾雖不逮前烈然捨舊録新亦非吾志也於是乃乘舊馬以歸武帝又以佛道儒三敎不同詔敻辨其優劣敻以三敎雖殊同歸於善其迹似有深淺其致理殆無等級乃著三敎序奏之帝覽而稱善時宣帝在東宮亦遺敻書并令以帝所乘馬迎之問以立身之道敻對曰傳不云乎儉為徳之恭侈為惡之大欲不可縱志不可滿竝聖人之訓也願殿下察之敻子瓘行隨州刺史因疾物故孝寛子總復於并州戰歿一日之中凶問俱至家人相對悲慟而敻神色自若謂之曰死生命也去來常事亦何足悲援琴撫之如舊敻又雅好名義虛襟善誘雖耕夫牧竪有一介可稱者皆接引之特與族人處𤣥及安定梁曠為放逸之友少愛文史留情著述手自抄録數十萬言晚年虛靜唯以體道㑹真為務舊所製述咸削其藁故文筆多竝不存建徳中敻以年老預戒其子等曰昔士安以蘧蒢束體王孫以布囊繞尸二賢髙達非庸才能繼吾死之日可歛舊衣勿更新造使棺足周尸牛車載柩墳髙四尺壙深一丈其餘煩雜悉無用也朝晡奠食於事彌煩吾不能頓絶汝軰之情可朔望一奠而已仍薦素蔬勿設牲牢親友欲以物弔祭者竝不得為受吾常恐臨終恍惚故以此言預戒汝軰瞑目之日勿違吾志也宣政元年二月卒於家時年七十七武帝遣使祭賻賵有加其喪制葬禮諸子等竝遵其遺戒子世康梁士彦字相如安定烏氏人也少任俠好讀兵書頗渉經史周武帝將平東夏聞其勇決自扶風郡守除為九曲鎮將進位上開府封建威縣公齊人甚憚之後以熊州刺史從武帝拔晉州進位大將軍除晉州刺史及帝還齊後主親攻圍之樓堞皆盡短兵相接士彦慷慨自若謂將士曰死在今日吾為爾先於是勇猛齊奮號聲動天無不一當百齊兵少却乃令妻及軍人子女晝夜修城三日而就武帝大軍亦至齊師圍解士彦見帝捋帝鬚泣帝亦為之流涕時帝欲班師士彦叩馬諌帝從之執其手曰朕有晉州為平齊之基宜善守之及齊平封郕國公位上柱國雍州總管宣帝即位除徐州總管與烏丸軌禽陳將吳明徹裴忌於呂梁略定淮南地隋文帝作相轉亳州總管尉遲迥反為行軍總管及韋孝寛撃之令家僮梁黙等為前􅄡士彦繼之所當皆破及迥平除相州刺史深見忌乃代還京師閑居無事恃功懐怨與宇文忻劉昉等謀反將率僮僕候上享廟之際以發機復欲於蒲州起事略取河北捉黎陽闗塞河陽路劫調布為牟甲募盜賊為戰士其甥裴通知而奏之帝未發其事授晉州刺史欲觀其志士彦欣然謂昉等曰天也又請儀同薛摩兒為長史帝從之後與公卿朝謁帝令執士彦忻昉等於行間詰之狀猶不伏捕薛摩兒至對之摩兒具論始末云第二子剛垂泣苦諌第三子叔諧曰作猛獸須成班士彦失色顧曰汝殺我於是伏誅年七十二有子五人操字孟徳位上開府義鄉縣公早卒剛字永固位大將軍通政縣公涇州刺史以諌父獲免徙𤓰州叔諧坐士彦誅梁黙者士彦之蒼頭也驍武絶人士彦每從征伐常與黙陷陣仕周位開府開皇末以行軍總管從楊素征突厥進位大將軍又從平楊諒授柱國大業五年從煬帝征吐谷渾力戰死之贈光禄大夫周書卷三十一周書卷三十一考證韋孝寛傳時獨孤信為新野郡守司荆州北史云同隸荆川司字疑同字之訛并脱一隸字城外又縳松於竿通鑑云縳松麻于竿臣文淳按下文有松麻俱落句知此脱一麻字北史亦脱周文後見下文云周文北廵又云周孝閔帝踐阼臣文淳按北史總記數代之事故皆書國號以别之此書祗紀北周不應復加周字周書卷三十一考證
