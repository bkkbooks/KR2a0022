body:
  text: 周書卷二十九唐令狐徳棻等撰列𫝊第二十一王傑王勇宇文虬宇文盛弟丘耿豪髙琳李和伊婁穆楊紹王雅達奚寔劉雄侯植王傑金城直城人也本名文達髙祖萬國魏伏波將軍燕州刺史父巢龍驤將軍榆中鎮將傑少有壯志每以功名自許善騎射有膂力魏孝武初起家子都督後從西遷賜爵都昌縣子太祖奇其才擢授揚烈將軍羽林監尋加都督太祖嘗謂諸將曰王文達萬人敵也但恐勇決太過耳復潼闗破沙苑争河橋戰邙山皆以勇敢聞親待日隆賞賜加於倫等於是賜姓宇文氏除岐州刺史加撫軍將軍銀青光禄大夫進爵為公邑八百戸累遷大都督車騎大將軍儀同三司侍中驃騎大將軍開府儀同三司魏恭帝元年從于謹圍江陵時柵内有人善用長矟戰士將登者多為所斃謹令傑射之應弦而倒登者乃得入餘衆􅁇進遂拔之謹喜曰濟我大事者在公此箭也孝閔帝踐阼進爵張掖郡公增邑一千戸出為河州刺史朝廷以傑勲望俱重故授以本州保定三年進爵大將軍三年詔傑與隋公楊忠自漢北伐齊至并州而還天和三年除宜州刺史增邑通前三千六百戸六年從齊公憲東禦齊將斛律明月進位柱國建徳初除涇州總管傑少從軍旅雖不習吏事所歴州府咸以忠恕為心以是頗為百姓所慕宣帝即位拜上柱國大象元年薨時年六十五贈河鄯鄧延洮宕翼七州諸軍事河州刺史追封鄂國公諡曰威子孝僊大象末位至開府儀同大將軍王勇代武川人也本名胡仁少雄健有膽決便弓馬膂力過人魏永安中万俟醜奴等寇亂闗隴勇占募隨軍討之以功授寕朔將軍奉車都尉又數從侯莫陳悦賀拔岳征討功每居多拜别將及太祖為丞相引為帳内直盪都督加後將軍太中大夫封包信縣子邑三百戸大綂初增邑四百戸進爵為侯從擒竇泰復𢎞農戰沙苑氣盖衆軍所當必破太祖歎其勇敢賞賜特隆進爵為公邑一千五百戸拜鎮南將軍授帥都督從討趙青雀平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛率邙山之戰勇率敢死之士三百人竝執短兵大呼直進出入衝撃殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文達耿令貴三人力戰皆有殊功太祖於是賞帛一千疋令自分之軍還皆拜上州刺史以雍州岐州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文達得岐州令貴得北雍州仍賜勇名為勇令貴名豪文達名傑以彰其功十三年授大都督遷使持節車騎大將軍儀同三司十五年進侍中驃騎大將軍開府儀同三司魏恭帝元年從柱國趙貴征茹茹破之勇追撃獲雜畜數千頭進爵新陽郡公增邑通前二千戸仍賜姓庫汗氏六官建拜稍伯中大夫又論討茹茹功别封永固縣伯邑五百戸時有别封者例聼回授次子勇獨請封兄子元興時人義之尋進位大將軍世宗初岷山羌豪鞏亷俱和叛勇帥師討平之勇性雄猛為當時驍將然矜功伐善好揚人之惡時論亦以此鄙之柱國侯莫陳崇勲髙望重與諸將同謁晉公護聞勇數論人之短乃於衆中折辱之勇遂慙恚因疽發背而卒子昌嗣官至大將軍宇文虬字樂仁代武川人也性驍悍有膽畧少從軍征討累有戰功魏永安中除征虜將軍中散大夫加都督魏孝武初從獨孤信在荆州破梁人於下溠遂平歐陽鄼城虬俘獲甚多又攻南陽廣平二城擒郡守一人以功加安西將軍銀青光禄大夫員外直閤將軍閤内都督封南安縣侯邑九百戸及孝武西遷以獨孤信為行臺信引虬為帳内都督破田八能及擒東魏荆州刺史辛纂虬功居多尋随信奔梁大綂三年歸闕朝廷論前後功增邑四百戸進爵為公擒竇泰復𢎞農及沙苑河橋之戰皆有功增邑八百戸進車騎將軍左光禄大夫七年除漢陽郡守又從獨孤信討梁企定破之十一年出為南秦州刺史加車騎大將軍儀同三司進驃騎大將軍開府儀同三司追論斬辛纂功增邑一千戸十七年與大將軍王雄征上津魏興等竝平之又於白馬與武陵王蕭紀將楊乾運戰破之虬每經行陣必身先卒伍故上下同心戰無不克尋而魏興復叛虬又與王雄討平之俄除金州刺史進位大將軍後以疾卒宇文盛字保興代人也曾祖伊與敦祖長夀父文孤竝為沃野鎮軍主盛志力驍雄初為太祖帳内從破侯莫陳悦授威烈將軍封漁陽縣子邑三百戸大綂三年兼都督從擒竇泰復𢎞農破沙苑授都督平逺將軍歩兵校尉進爵為公增邑八百戸除馮翊郡守加帥都督西安州大中正通直散騎常侍撫軍將軍增邑三百戸累遷大都督車騎大將軍儀同三司驃騎大將軍開府儀同三司塩州刺史及楚公趙貴謀為亂盛宻赴京告之貴誅授大將軍進爵忠城郡公除涇州都督賜甲一領奴婢二百口馬五百疋牛羊及莊田什物等稱是仍從賀蘭祥平洮陽供和二城别封一子甘棠縣公轉延州總管進位柱國天和五年入為大宗伯六年與柱國王傑從齊公憲東討時汾州被圍日久憲遣盛運粟以給之仍赴姚襄城受憲節度齊將叚孝先率兵大至盛力戰拒之孝先退乃築大寕城而還建徳二年授少師五年從髙祖東伐率歩騎一萬守汾水闗宣帝即位拜上柱國增邑通前四千六百戸大象中薨子述嗣大象末上柱國濮陽公盛弟丘丘字胡奴起家襄威將軍奉朝請都督賜爵臨邑縣子稍遷輔國將軍大都督預告趙貴謀拜車騎大將軍儀同三司進爵安義縣侯邑一千戸加驃騎大將軍開府儀同三司進爵為公除咸陽郡守遷汾州刺史入為左宫伯進位大將軍出為延綏丹三州三防諸軍事延州刺史轉凉甘𤓰三州諸軍事涼州刺史加柱國大將軍建徳元年薨時年六十贈柱國宜鄜等州刺史子隴嗣耿豪鉅鹿人也本名令貴其先避劉石之亂居遼東因仕於燕曾祖超率衆歸魏遂家於神武川豪少麄獷有武藝好以􅂔凌人賀拔岳西征引為帳内岳被害歸太祖以武勇見知豪亦自謂所事得主從討侯莫陳悦及迎魏孝武録前後功封平原縣子邑三百戸除寕朔將軍奉車都尉遷征虜將軍加通直散騎常侍進爵為侯增邑七百戸從擒竇泰復𢎞農豪先鋒䧟陣加前將軍中散大夫沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以為驗不須更論級數也於是進爵為公增邑通前一千五百戸除鎮北將軍金紫光禄大夫南郢州刺史九年從太祖戰於邙山豪謂所部曰大丈夫見賊須右手拔刀左手把矟直刺直斫慎莫皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刀而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不爾若不能殺賊又不為人所傷何異逐坐人也太祖嘉之拜北雍州刺史十三年論前後戰功進授車騎大將軍儀同三司增邑通前一千八百戸十五年賜姓和稽氏進位侍中驃騎大將軍開府儀同三司豪性凶悍言多不遜太祖惜其驍勇每優容之豪亦自謂意氣冠羣終無所屈李穆蔡祐初與豪同時開府後竝居豪之右豪意不平謂太祖曰外間物議謂豪勝李穆蔡祐太祖曰何以言之豪曰世言李穆蔡祐丞相臂膞耿豪王勇丞相咽項以咽項在上故為勝也豪之麄猛皆此類十六年卒時年四十五太祖痛惜之贈以本官加朔州刺史子雄嗣位至大將軍髙琳字季珉其先髙句麗人也六世祖欽為質於慕容廆遂仕於燕五世祖宗率衆歸魏拜第一領民酋長賜姓羽真氏祖明父遷仕魏咸亦顯達琳母嘗袚禊泗濱遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有若仙者謂其母曰夫人向所將來之石是浮磬之精若能寳持必生令子其母驚寤便舉身流汗俄而有娠及生因名琳字季珉焉魏正光初起家衛府都督從元天穆討邢杲破梁將沈慶之以功轉綂軍又從爾朱天光破万俟醜奴論功為最除寕朔將軍奉車都尉後隨天光敗於韓陵山琳因留洛陽魏孝武西遷從入闗至溱水為齊神武所追拒戰有功封鉅野縣子邑三百戸大綂初進爵為侯增邑四百戸轉龍驤將軍頃之授直閤將軍遷平西將軍加通直散騎常侍三年從太祖破齊神武於沙􅁐轉安西將軍進爵為公增邑八百戸累遷衛將軍銀青光禄大夫右光禄大夫四年從擒莫多婁貸文仍戰河橋琳先驅奮撃勇冠諸軍太祖嘉之謂之曰公即我之韓白也拜太子左庶子尋以本官鎮玉壁復從太祖戰邙山除正平郡中正加大都督增邑三百戸齊將東方老來㓂琳率衆禦之老恃其勇健直前趣琳短兵接琳撃之老中數瘡而退謂其左右曰吾經陣多矣未見如此健兒後乃宻使人勸琳東歸琳斬其使以聞進使持節車騎大將軍儀同三司散騎常侍除鄜州刺史加驃騎大將軍開府儀同三司侍中孝閔帝踐阼進爵犍為郡公邑一千戸武成初從賀蘭祥征吐谷渾以勲别封一子許昌縣公邑一千戸除延州刺史又從柱國豆盧寕討稽胡郝阿保劉桑徳等破之二年文州氐酋反詔琳率兵討平之師還帝宴羣公卿士仍命賦詩言志琳詩末章云寄言竇車騎為謝霍將軍何以報天子沙漠静妖氛帝大悦曰獯獫陸梁未時欵塞卿言有驗國之福也保定初授梁州總管十州諸軍事天和二年徙丹州刺史三年遷江陵總管時陳將呉明徹來㓂總管田𢎞與梁主蕭巋出保紀南城唯琳與梁僕射王操固守江陵三城以抗之晝夜拒戰凢經十旬明徹退去巋表言其狀帝乃優詔追琳入朝親加勞問進授大將軍仍副衛公直鎮襄州六年進位柱國建徳元年薨時年七十六贈本官加冀定齊滄州五州諸軍事冀州刺史諡曰襄子儒少以父勲賜爵許昌郡公拜左侍上士後襲爵犍為郡公位至儀同大將軍李和本名慶和其先隴西犾道人也後徙居朔方父僧養以累世雄豪善於綂御為夏州酋長和少敢勇有識度狀貌魁偉為州里所推賀拔岳作鎮闗中乃引和為帳内都督以破諸賊功稍遷征北將軍金紫光禄大夫賜爵思陽公尋除漢陽郡守治存寛簡百姓稱之至大綂初加車騎將軍左光禄大夫都督累遷使持節車騎大將軍儀同三司散騎常侍侍中驃騎大將軍開府儀同三司夏州刺史賜姓宇文氏太祖嘗謂諸將曰宇文慶和智畧明贍立身恭謹累經委任每稱吾意遂賜名意焉改封永豐縣公邑一千戸保定二年除司憲中大夫進爵義城郡公尋又改封徳廣郡公出為洛州刺史和前在夏州頗留遺惠及有此授啇洛父老莫不想望徳音和至州以仁恕訓物獄訟為之簡静天和三年進位大將軍拜延綏丹三州武安伏夷安民三防諸軍事延州刺史六年進柱國大將軍建徳元年改授延綏銀三州文安伏夷安民周昌梁和五防諸軍事以罪免尋復柱國隋開皇元年遷上柱國和立身剛簡老而逾勵諸子趨事若奉嚴君以意是太祖賜名市朝已革慶和則父之所命義不可違至是遂以和為名二年薨贈本官加司徒公徐兗邳沂海泗六州刺史諡曰肅子徹嗣伊婁穆字奴干伐人也父靈善騎射為太祖所知太祖嘗謂之曰昔伊尹保衡於殷致主堯舜卿既姓伊庶卿不替前緒於是賜名尹焉歴金紫光禄大夫衛將軍隆州刺史賜爵盧奴縣公穆弱冠為太祖内親信以機辯見知授奉朝請常侍左右邙山之役力戰有功拜子都督丞相府參軍事轉外兵參軍累遷帥都督平東將軍中散大夫歴中書舍人尚書駕部郎中撫軍將軍大都督通直散騎常侍嘗入白事太祖望見悦之字之曰奴干作儀同靣見我矣於是拜車騎大將軍儀同三司賜封安陽縣伯邑五百戸轉大丞相府掾遷從事中郎除給事黄門侍郎魏廢帝二年穆使於蜀屬伍城郡人趙雄傑與梓潼郡人王令公鄧朏等搆逆衆三萬餘人阻涪水立柵進逼潼州穆遂與刺史叱羅協率兵破之增邑五百戸孝閔帝踐阼拜兵部中大夫治御正進爵為侯增邑五百戸尋進位驃騎大將軍開府儀同三司保定初授軍司馬進爵為公四年除金州總管八州諸軍事金州刺史天和二年增邑二千一百戸又為民部中大夫衛公直出鎮襄州以穆為長史郢州城民王道骨反襲據州城直遣穆率百餘騎馳徃援之穆至城下頻破骨衆㑹大將軍髙琳率衆軍繼進􅇧等乃降唐州山蠻恃險逆命穆率軍討之蠻酋等保據石窟一十四處穆分軍進討旬有四日竝破之虜獲六千五百人六年進位大將軍建徳初授荆州復以穆為總管府長史穆頻貳戚藩甚得匡賛之譽入為小司馬從柱國李穆平軹闗等城賞布帛三百疋粟三百石田三十頃五年從皇太子討吐谷渾還穆殿為渾人圍㑹劉雄救至乃得解後以疾卒楊紹字子安𢎞農華隂人也祖興魏新平郡守父國中散大夫紹少慷慨有志畧屢從征伐力戰有功魏永安中授廣武將軍屯騎校尉直盪别將普泰初封平鄉男邑一百戸加征西將軍金紫光禄大夫魏孝武初遷衛將軍右光禄大夫進爵冠軍縣伯邑百戸大綂元年進爵為公增邑六百戸累遷車騎將軍通直散騎常侍驍衛將軍左光禄大夫四年出為鄜城郡守紹性恕直兼有威惠百姓安之稽胡恃衆與險屢為抄竊紹率郡兵從侯莫陳崇討之疋馬先登破之於黙泉之上加帥都督驃騎常侍朔州大中正十三年録前後功增邑通前二千二百戸除燕州刺史累遷大都督車騎大將軍儀同三司復從大將軍逹奚武征漢中時梁宜豐侯蕭循固守梁州紹以為懸軍敵境圍守堅城曠日持久糧饟不繼城中若致死於我懼不能歸請為計以誘之乃頻至城下挑戰設伏待之循初不肯出紹又遣人罵辱之循怒果出兵紹率衆偽退城降以功授輔國將軍中散大夫聼回授一子又從柱國燕國公于謹圍江陵紹鬭於枇杷門流矢中股而力戰不衰事平賞奴婢一百口進驃騎大將軍開府儀同三司除衡州刺史賜姓叱利氏孝閔帝踐阼進位大將軍保定二年卒贈成文等八州刺史諡曰信子雄嗣大象末上柱國邽國公王雅字度容闡熙新固人也少而沈毅木訥寡言有膽勇善騎射太祖聞其名召入軍累有戰功除都督賜爵居康縣子東魏將竇泰入㓂雅從太祖擒之於潼闗沙苑之戰雅謂所部曰彼軍殆有百萬今我不滿萬人以常理論之實難與敵但相公神武命世股肱王室以順討逆豈計衆寡丈夫若不以此時破賊何用生為乃擐甲歩戰所向披靡太祖壯之又從戰邙山時大軍不利為敵所乗諸將皆引退雅獨廻騎拒之敵人見其無繼歩騎競進雅左右奮撃頻斬九級敵衆稍却雅乃還軍太祖歎曰王雅舉身悉是膽也録前後功進爵為伯除帥都督鄜城郡守政尚簡易吏人安之遷大都督延州刺史轉夏州刺史加車騎大將軍儀同三司進驃騎大將軍開府儀同三司世宗初除汾州刺史勵精為治人庶悦而附之自逺至者七百餘家保定初復為夏州刺史卒于州子世積嗣少倜儻有文武幹畧大象末上大將軍宜陽郡公逹奚寔字什伏代河南洛陽人也髙祖涼州魏征西將軍山陽公父顯相武衛將軍寔少修立有幹局起家給事中加冠軍將軍魏孝武初授都督鎮𢎞農後從西遷封臨汾縣伯邑六百戸遷大行臺郎中仍與行臺郎神鎮潼闗及潼闗失守即與大都督陽山武戰於闗東魏人甚憚之從太祖擒竇泰復𢎞農破沙苑皆力戰有功增邑三百戸加車騎將軍左光禄大夫十三年又授大行臺郎中相府掾轉從事中郎寔性嚴重太祖深器之累遷大都督持節通直散騎常侍魏廢帝二年除中外府司馬大軍伐蜀以寔行南岐州事兼都軍糧先是山氐生獷不供賦役歴世羈縻莫能制御寔導之以政氐人感悦竝從賦税於是大軍糧餼咸取給焉尋徵還仍為司馬六官建拜蕃部中大夫加驃騎大將軍開府儀同三司進爵平陽縣公武成二年授御正中大夫治民部兼晉公護司馬保定元年出為文州刺史卒於州時年四十九贈文康二州刺史諡曰恭子豐嗣劉雄字猛雀臨洮子城人也少機辯慷慨有大志大綂中起家為太祖親信尋授綂軍宣威將軍給事中除子城令加都督輔國將軍中散大夫兼中書舍人賜姓宇文氏孝閔帝踐阼加大都督歴司市下大夫齊右下大夫治小駕部進車騎大將軍儀同三司保定四年治中外府屬從征洛陽天和二年遷駕部中大夫四年兼齊公憲府掾從憲出宜陽築安義等城五年齊相斛律明月率衆築通闗城以援宜陽先是國家與齊通好約言各保境息民不相侵擾至是憲以齊人失信令雄使於明月責其背約雄辭義辯直齊人憚焉使還兼中府外掾尋加驃騎大將軍開府儀同三司封周昌縣伯邑六百戸齊人又於姚襄築伏龍等五城以處戍卒雄從齊公憲攻之五城皆拔憲復遣雄與柱國宇文盛於齊長城已西連營防禦齊將叚孝先等率衆圍盛營外先有長塹大將軍韓歡與孝先交戰不利雄身負排率所部二十餘人據塹力戰孝先等乃止軍還遷軍司馬進爵為侯邑一千四百戸建徳初授納言轉軍正復為納言二年轉内史中大夫除候正髙祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣令復有此授鄉里榮之四年從柱國李穆出軹闗攻邵州等城拔之以功獲賞五千皇太子西征吐谷渾雄自涼州從滕王逌率軍先入渾境去伏俟城二百餘里逌遣雄先至城東舉火與大軍相應渾洮王率七百餘騎逆戰雄時所部數百人先竝分遣斥候在左右者二十許人雄即率與交戰斬首七十餘級雄亦亡其三騎自是從逌連戰之雄功居多賞物甚厚及軍還伊婁穆殿為賊所圍皇太子命雄救之雄率騎一千解穆圍增邑三百戸加上開府儀同三司其年大軍東討雄從齊王憲拔洪洞下永安軍還仍與憲廻援晉州未至齊後主已率大兵親自攻圍晉州垂陷憲遣雄先徃察其軍勢雄乃率歩騎千人鳴皷角遥報城中尋而髙祖兵至齊主遁走從平并州拜上大將軍進爵趙郡公邑二千戸舊封迥授一子明年從平鄴城進柱國其年從齊王憲總北討稽胡軍還出鎮幽州宣政元年四月突厥冦幽州擁畧居民雄出戰為突厥所圍臨陣戰殁贈亳州總管七州諸軍事亳州刺史子昇嗣以雄死王事大象末授儀同大將軍侯植字仁幹上谷人也燕散騎常侍龕之八世孫髙祖恕魏北地郡守子孫因家于北地之三水遂為州郡冠族父欣秦州刺史奉義縣公植少倜儻有大節容貌奇偉武藝絶倫正光中起家奉朝請尋而天下喪亂羣盜蜂起植乃散家財率募勇敢討賊以功拜綂軍遷清河郡守後從賀拔岳討方俟醜奴等每有戰功除義州刺史在州甚有政績為夷夏所懐及齊神武逼洛陽植從魏孝武西遷大綂元年授驃騎將軍都督賜姓侯伏侯氏從太祖破沙苑戰河橋進大都督加左光禄大夫涼州刺史宇文仲和據州作逆植從開府獨孤信討擒之拜車騎大將軍儀同三司封肥城縣公邑一千戸又賜姓賀屯魏恭帝元年從于謹平江陵進驃騎大將軍開府儀同三司賜奴婢一百口别封一子汧源縣伯六官建拜司倉下大夫孝閔帝踐阼進爵郡公增邑通前二千戸時帝幼冲晉公護執政植從兄龍恩為護所親任及護誅趙貴而諸宿將等多不自安植謂龍恩曰今主上春秋既富安危繋於數公共為唇齒尚憂不濟況以纎介之間自相夷滅植恐天下之人因此解體兄既受人任使安得知而不言龍恩竟不能用植又乗間言於䕶曰君臣之分情均父子理須同其休戚期之始終明公以骨肉之親當社稷之寄與存與亡在於兹日願公推誠王室擬迹伊周使國有泰山之安家傳世禄之盛則率土之濱莫不􅄑甚䕶曰我蒙太祖厚恩且屬當猶子誓將以身報國賢兄應見此心卿今有是言豈謂吾有他志耶又聞其先與龍恩言乃隂忌之植懼不免禍遂以憂卒贈大將軍正陽光三州諸軍事平州刺史諡曰節子定嗣及䕶伏誅龍恩與其弟大將軍武平公萬夀竝預其禍髙祖治䕶事知植忠於朝廷乃特免其子孫定後位至車騎大將軍儀同三司史臣曰王傑王勇宇文虬之徒咸以果毅之姿效節於擾攘之際終能屠堅執鋭立禦侮之功裂膏壤據勢位固其宜也仲尼稱無求備於一人信矣夫文士懐温恭之操其弊也愞弱武夫禀剛烈之質其失也敢悍故有使酒不遜之禍拔劒争功之尤大則莫全其生小則僅而𫉬免耿豪王勇不其然乎周書卷二十九周書卷二十九考證王傑傳子孝僊北史作孝遷周書卷二十九考證
