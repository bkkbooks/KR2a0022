body:
  text: 周書卷十唐令狐德棻等撰列𫝊第二邵惠公顥子什肥導子廣導亮䕶翼什肥子胄椿衆把簡公連莒莊公洛生子菩提虞國公仲子興興子洛邵惠公顥太祖之長兄也德皇帝娶樂浪王氏是為德皇后生顥次把簡公連次莒莊公洛生次太祖顥性至孝德皇后崩哀毁過禮鄉黨咸敬異焉德皇帝與衛可孤戰於武川南河臨陣墜馬顥與數騎奔救擊殺數十人賊衆披靡德皇帝乃得上馬引去俄而賊追騎大至顥遂戰殁保定初追贈太師柱國大將軍大冢宰大都督恒朔等十州諸軍事恒州刺史封邵國公邑萬户諡曰惠顥三子什肥導䕶䕶别有傳什肥年十五而惠公殁自傷早孤事母以孝聞永安中太祖入闗什肥不能離母遂留晉陽及太祖定秦隴什肥為齊神武所害保定初追贈大將軍小冢宰大都督冀定等州諸軍事冀州刺史襲爵邵國公諡曰景子胄嗣胄少而孤貧頗有幹略景公之見害也以年幼下􅁞室保定初詔以晉公䕶子㑹紹景公封天和中與齊通好胄始歸闗中授大將軍開府儀同三司襲爵邵公尋除宗師中大夫進位大將軍出為原州刺史轉榮州刺史大象末隋文帝輔政胄舉州兵應尉遲迥與清河公楊素戰敗遂走追獲於石濟遂斬之國除㑹字乾仁幼好學聰慧魏恭帝二年以護平江陵之功賜爵江陵縣公保定初紹景公後拜驃騎大將軍開府儀同三司二年除蒲州潼闗六防諸軍事蒲州刺史胄至自齊改封譚國公尋進位柱國建德初與䕶同伏誅三年五月追贈復封舊爵導字菩薩少雄豪有仁恵太祖愛之初與諸父在葛榮軍中榮敗遷晉陽及太祖隨賀拔岳入闗導從而西常從征伐太祖討侯莫陳悦以導為都督鎭原州及悦敗北走出故塞導率騎追之至牽屯山及悦斬之𫝊首京師以功封饒陽縣侯邑五百户拜冠軍將軍加通直散騎常侍魏文帝即位以定䇿功進爵為公增邑五百户拜使持節散騎常侍車騎大將軍左光禄大夫三年太祖東征導入宿衛拜領軍將軍大都督齊神武渡河侵馮翊太祖自𢎞農引軍入闗導督左右禁旅㑹於沙苑與齊神武戰大破之進位儀同三司眀年魏文帝東征留導為華州刺史及趙青雀于伏德慕容思慶等作亂導自華州率所部兵擊之擒伏德斬思慶進屯渭橋㑹太祖軍事平進爵章武郡公增邑并前二千户尋加侍中開府驃騎大將軍太子少保髙仲密以北豫降太祖率諸將輔魏皇太子東征復以導為大都督華東雍二州諸軍事行華州刺史導治兵訓卒得守捍之方及大軍不利東魏軍追至稠桑知闗中有備乃退㑹侯景舉河南來附遣使請援朝議將應之乃徵為隴右大都督秦南等十五州諸軍事秦州刺史及齊氏稱帝太祖發闗中兵討之魏文帝遣齊王廓鎮隴右徵導還朝拜大將軍大都督三雍二華等二十三州諸軍事屯咸陽大軍還乃旋舊鎮導性寛眀善於撫御凡所引接人皆盡誠臨事敬慎常若弗及太祖每出征討導恒居守深為吏民所附朝廷亦以此重之魏恭帝元年十二月薨於上邽年四十四魏帝遣侍中漁陽王繩監䕶喪事贈本官加尚書令秦州刺史諡曰孝朝議以導撫和西戎威恩顯著欲令世鎮隴右以彰厥德乃葬於上邽城西無疆原華戎㑹葬有萬餘人奠祭於路悲號滿野皆曰我君捨我乎大小相率負土成墳髙五十餘尺周廻八十餘歩為官司所止然後泣辭而去其遺愛見思如此天和五年重贈太師柱國豳國公導五子廣亮翼椿衆亮椿並出後於把廣字乾歸少方嚴好文學初封永昌郡公孝閔帝踐阼改封天水郡公世宗即位授驃騎大將軍開府儀同三司出為秦州刺史武成初進位大將軍遷梁州總管進封蔡國公增邑萬户保定初入為小司寇尋以本官鎭蒲州兼知潼闗等六防諸軍事三年除秦州總管十三州諸軍事秦州刺史廣性眀察善綏撫民庶畏而悦之時晉公䕶諸子及廣弟把國公亮等服玩侈靡踰越制度廣獨率由禮則又折節待士朝野以是稱焉曾侍食於髙祖所食𤓰美持以奉進髙祖悦之四年進位柱國廣以晉公䕶久擅威權勸令挹損䕶不能納天和三年除陜州總管以病免及孝公追封豳國公詔廣襲爵初廣母李氏以廣患彌年憂而成疾因此致没廣既居喪更加綿篤乃以毁薨世稱母為廣病廣為母亡慈孝之道極於一門高祖素服親臨百僚畢集其故吏儀同李充信等上表曰臣聞資孝成忠生民髙義旌德樹善有國常規竊惟故豳國公臣廣懿親令望具瞻攸在道冠羣后功懋維城受脤建斾威行秦隴班條驅𫝊化溢崤函比腠理舛和奉詔還闕藥石所及沉痾漸愈而災釁仍集丁此窮憂至性過人遂增舊疾因兹毁頓以至薨殂尋繹貫切不能自已臣等接事每承餘論仰之平昔約已立身位極上公賦兼千乘所獲禄秩周贍無餘器用服玩取給而已每言及終始尤存簡素非秦政而褒吴禮譏石椁而美厚薪今卜兆有期先遠方及誠恐一從朝露此志莫伸伏惟陛下𢎞不世之慈垂霈然之澤留情既往降愍幽魂爰敕有司申其宿志窀穸之禮庶存儉約詔曰省充信等表但增哀悼豳國公廣藩屏令望宗室表儀言著身文行成士則方憑懿戚用匡朝政奄丁荼蓼便致毁滅啟手歸全無忘雅操言念既往震于厥心昔河間才藻追叙於中尉東海謙約見稱於身後可斟酌前典率由舊章使易簀之言得申遺志黜殯之請無虧令終於是贈本官加太保𦵏於隴西所司一遵詔㫖竝存儉約子洽嗣大定中隋文輔政以宗室被害國除亮字乾德武成初封永昌郡公後襲烈公爵除開府儀同三司梁州總管天和末拜宗師中大夫進位大將軍豳國公薨以亮為秦州總管廣之所部悉以配焉亮在州甚無政績尋進位柱國晉公䕶誅後亮心不自安唯縱酒而已高祖手勑讓之建德中高祖東伐以亮為右第二軍總管并州平進位上柱國仍從平鄴遷大司徒宣帝即位出為安州總管大象初詔以亮為行軍總管與元帥鄖國公韋孝寛等伐陳亮自安陸道攻拔黄城輒破江側民村掠其生口以賜士卒軍還至豫州亮宻謂長史杜士峻曰主上淫縱滋甚社稷將危吾既忝宗枝不忍坐見傾覆今若襲取鄖國公而并其衆推諸父為主鼔行而前誰敢不從遂夜將數百騎襲孝寛營㑹亮國官茹寛知其謀先以馳告孝寛乃設備亮不克遯走孝寛追斬之子眀坐亮誅詔以亮弟椿為烈公後翼字乾宜武成初封西陽郡公早薨諡曰昭無子以杞國公亮子温為嗣後坐亮反誅國除椿字乾夀初封永昌郡公保定中授開府儀同三司宗師中大夫建德初加大將軍尋除岐州刺史四年闗中民饑椿表陳其狀璽書勞慰因令所在開倉賑䘏四年髙祖東伐椿與齊王憲攻拔武濟等五城五年高祖出晉州椿率衆屯棲雞原宣帝即位拜大司寇亮誅後詔令紹烈公封尋進位上柱國轉大司徒大定初為隋文帝所害并其五子西陽公道宗本仁隣武子禮獻衆字乾道保定初封天水郡公少而不慧語黙不常人莫能測隋文帝踐極初欲封為介公後復誅之并二子仲和孰倫杞簡公連幼而謹厚臨敵果毅隨德皇帝遇定州軍於唐河遂俱殁保定初追贈使持節太傅柱國大將軍大司徒大都督定冀等十州諸軍事定州刺史封杞國公邑五千户諡曰簡子光寳為齊神武所害保定初追贈大將軍小司徒都督幽燕等六州諸軍事幽州刺史襲爵把國公諡曰烈以章武公導子亮嗣莒莊公洛生少任俠尚武藝及壯有大度好施愛士北州賢俊皆與之遊而才能多出其下及葛榮破鮮于修禮乃以洛生為漁陽王仍領徳皇帝餘衆時人皆呼為洛生王洛生善將士帳下多驍勇至於攻戰莫有當其􅄡者是以克獲常冠諸軍爾朱榮定山東收諸豪傑遷於晉陽洛生時在虜中榮雅聞其名心憚之尋為榮所害保定初追贈使持節太保柱國大將軍大冢宰大宗伯大都督并肆等十州諸軍事并州刺史封莒國公邑五千户諡曰莊子菩提為齊神武所害保定初追贈大將軍小宗伯大都督肆恒等六州諸軍事肆州刺史襲爵莒國公諡曰穆以晉公䕶子至為嗣至字乾附初封崇業公後襲穆公爵建德初父䕶誅詔以衛王直子賔為穆公後三年追復至爵賔字乾瑞尋坐直誅建德六年更以齊王憲子廣都公眞襲爵眞字乾禎宣帝初被誅國除虞國公仲德皇帝從父兄也卒於代保定初追贈使持節太傅柱國大將軍大司徒大都督燕平等十州諸軍事燕州刺史封虞國公邑三千户子興嗣興生兵亂與仲相失年又冲幼莫知其戚屬遠近與太祖兄弟初不相識齊神武寇沙苑興預在行間軍敗被虜隨例散配諸軍興性𢎞厚有志度雖流離世故而風範可觀魏恭帝二年舉賢良除本郡丞徙長􅀈縣令保定二年詔仲子興始附屬籍高祖以興宗戚近屬尊禮之甚厚拜使持節驃騎大將軍開府儀同三司都督封大寧郡公尋除宗師中大夫四年出為涇州刺史五年又徵拜宗師加大將軍襲爵虞國公天和二年薨高祖親臨慟焉詔大司空申國公李穆監䕶喪事贈使持節柱國大將軍大都督恒幽等六州諸軍事恒州刺史諡曰靖子洛嗣洛字永洛九歳命為虞國公世子天和四年詔襲興爵建德初拜使持節車騎大將軍儀同三司及靜帝崩隋文帝以洛為介國公為隋室賔云史臣曰自古受命之君及守文之主非獨異姓之輔也亦有骨肉之助焉其茂親有魯衛梁楚其疎屬有凡蔣荆燕咸能飛聲騰實不冺於百代之後至若豳孝公之勲烈而加之以善政蔡文公之純孝而飾之以儉約峩峩焉足以轥轢於前載矣當隋氏之起乘天威而服海内將相王侯莫不隳肝膽以効款援符命以頌德胄以葭莩之親據一州而叶義舉可謂忠而能勇功業不遂悲夫亮實庸才圖非常於巨逆古人稱不度德不量力者其斯之謂歟周書卷十周書卷十考證邵恵公顥子導𫝊導治兵訓卒得守捍之方舊本俱作定捍之方依北史改晉公䕶子至𫝊建德初父䕶誅北史作後坐父䕶誅此脱一坐字周書卷十考證
