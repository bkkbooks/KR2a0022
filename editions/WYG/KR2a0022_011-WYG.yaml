body:
  text: 周書卷十一唐令狐德棻等撰列𫝊第三晉蕩公䕶叱羅協馮遷晉蕩公䕶字薩保太祖之兄邵恵公顥之少子也幼方正有志度特為徳皇帝所愛異於諸兄年十一恵公薨隨諸父在葛榮軍中榮敗遷晉陽太祖之入闗也䕶以年小不從普泰初自晉陽至平凉時年十七太祖諸子並幼遂委䕶以家務内外不嚴而肅太祖嘗歎曰此兒志度類我及出臨夏州留䕶事賀㧞岳岳之被害太祖至平凉以䕶為都督從征侯莫陳悦破之後以迎魏帝功封水池縣伯邑五百户大統初加通直散騎常侍征虜將軍以預定筞勲進爵為公增邑通前一千户從太祖擒竇泰復𢎞農破沙苑戰河橋並有功遷鎭東將軍大都督八年進車騎大將軍儀同三司邙山之役䕶率衆先􅄡為敵人所圍都督侯伏侯龍恩挺身扞禦方得免是時趙貴等軍亦退太祖遂班師䕶坐免官尋復本位十二年加驃騎大將軍開府儀同三司進封中山公增邑四百户十五年出鎭河東遷大將軍與于謹征江陵䕶率輕騎為先􅄡晝夜兼行乃遣裨將攻梁臨邊城鎭並㧞之并擒其候騎進兵徑至江陵城下城中不意兵至惶窘失圖䕶又遣騎二千斷江津收舟艦以待大軍之至圍而克之以功封子㑹為江陵公初襄陽蠻帥向天保等萬有餘落恃險作梗及師還䕶率軍討平之初行六官拜小司空太祖西廵至牽屯山遇疾馳驛召䕶䕶至涇州見太祖而太祖疾已綿篤謂䕶曰吾形容若此必是不濟諸子幼小寇賊未寧天下之事屬之於汝宜勉力以成吾志䕶涕泣奉命行至雲陽而太祖崩䕶祕之至長安乃發喪時嗣子冲弱彊寇在近人情不安䕶綱紀内外撫循文武於是衆心乃定先是太祖常云我得胡力當時莫曉其㫖至是人以䕶字當之尋拜柱國太祖山陵畢䕶以天命有歸遣人諷魏帝遂行禪代之事孝閔帝踐阼拜大司馬封晉國公邑一萬户趙貴獨狐信等謀襲䕶䕶因貴入朝遂執之黨與皆伏誅拜大冢宰時司㑹李植軍司馬孫恒等在太祖之朝久居權要見䕶執政恐不見容乃密要宫伯乙弗鳯張光洛賀拔提元進等為腹心説帝曰䕶誅朝貴以来威權日盛謀臣宿將爭往附之大小政事皆決於䕶以臣觀之將不守臣節恐其滋蔓願早圖之帝然其言鳯等又曰以先王之聖眀猶委植恒以朝政今若左提右挈何向不成且晉公常云我今夾輔陛下欲行周公之事臣聞周公攝政七年然後復子眀辟陛下今日豈能七年若此乎深願不疑帝愈信之數將武士於後園講習為執縳之勢䕶微知之乃出植為梁州刺史恒為潼州刺史欲遏其謀後帝思植等每欲召之䕶諌曰天下至親不過兄弟若兄弟自搆嫌隙他人何易可親太祖以陛下富於春秋顧命托臣以後事臣既情兼家國寔願竭其股肱若使陛下親覽萬機威加四海臣死之日猶生之年但恐除臣之後姦回得逞其欲非唯不利陛下亦恐社稷危亡臣所以勤勤懇懇干觸天威者但不負太祖之顧託保安國家之鼎祚耳不意陛下不照愚臣款誠忽生疑阻且臣既為天子兄復為國家宰輔知更何求而懐冀望伏願陛下有以明臣無惑讒人之口因泣涕久之乃止帝猶猜之鳯等益懼密謀滋甚遂尅日將召羣公入醼執䕶誅之光洛具以其前後謀告䕶䕶乃召柱國賀蘭祥小司馬尉遲綱等以鳯謀告之祥等竝勸䕶廢帝時綱總領禁兵䕶乃遣綱入宫召鳯等議事及出以次執送䕶第因罷散宿衛兵遣祥逼帝幽於舊邸於是召諸公卿畢集䕶流涕謂曰先王起自布衣躬親行陣勤勞王業三十餘年寇賊未平奄棄萬國寡人地則猶子親受顧命以略陽公既居正嫡與公等立而奉之革魏興周為四海主自即位以來荒淫無度昵近羣小疎忌骨肉大臣重將咸欲誅夷若此謀遂行社稷必致傾覆寡人若死將何靣目以見先王今日寧負略陽不負社稷爾寜都公年德兼茂仁孝聖慈四海歸心萬方注意今欲廢昏立眀公等以為如何羣臣咸曰此公之家事敢不唯命是聴於是斬鳯等於門外并誅植恒等尋亦弑帝迎世宗於岐州而立之二年拜太師賜輅車冕服封子至為崇業郡公初改雍州刺史為牧以䕶為之并賜金石之樂武成元年䕶上表歸政帝許之軍國大事尚委於䕶帝性聰睿有識量䕶深憚之有李安者本以鼎爼得寵於䕶稍被升擢位至膳部下大夫至是䕶乃密令安因進食於帝加以毒藥帝遂寢疾而崩䕶立髙祖百官總已以聴於䕶自太祖為丞相立左右十二軍總屬相府太祖崩後皆受䕶處分凡所徵發非䕶書不行䕶第屯兵禁衛盛於宫闕事無巨細皆先斷後聞保定元年以䕶為都督中外諸軍事令五府總於天官或有希䕶㫖云周公德重魯立文王之廟以䕶功比周公宜用此禮於是詔於同州晉國第立德皇帝别廟使䕶祭焉三年詔曰大冢宰晉國公智周萬物道濟天下所以克成我帝業安養我蒼生况親則懿昆任當元輔而可同班羣品齊位衆臣自今詔誥及百司文書並不得稱公名以彰殊禮䕶抗表固讓初太祖創業即與突厥和親謀為掎角共圖髙氏是年乃遣柱國楊忠與突厥東伐破齊長城至并州而還期後年更舉南北相應齊主大懼先是䕶母閻姬與皇第四姑及諸戚屬並没在齊皆被幽縶䕶居宰相之後每遣間使尋求莫知音息至是並許還朝且請和好四年皇姑先至齊主以䕶既當權重乃留其母以為後圖仍令人為閻作書報䕶曰天地隔塞子母異所三十餘年存亡斷絶肝腸之痛不能自勝想汝悲思之懐復何可處吾自念十九入汝家今已八十矣既逄喪亂備嘗艱阻恒冀汝等長成得見一日安樂何期罪釁深重存没分離吾凡生汝軰三男三女今日目下不覩一人興言及此悲纒肌骨賴皇齊恩䘏差安衰暮又得汝楊氏姑及汝叔母紇干汝嫂劉新婦等同居頗亦自適但為微有耳疾大語方聞行動飲食幸無多悉今大齊聖德遠被特降鴻慈既許歸吾於汝又聴先致音耗積稔長悲豁然𫉬展此乃仁侔造化將何報德汝與吾别之時年尚幼小以前家事或不委曲昔在武川鎭生汝兄弟大者屬鼠次者屬汝身屬蛇鮮于修禮起日吾之闔家大小先在博陵郡住相將欲向左入成行至唐河之北被定州官軍打敗汝祖及二叔時俱戰亡汝叔母賀拔及兒元寳汝叔母紇干及兒菩提并吾與汝六人同被擒捉入定州城未㡬間將吾及汝送與元寳掌賀㧞紇干各别分散寳掌見汝云我識其祖翁形狀相似時寳掌營在唐城内經停三日寳掌所掠得男夫婦女可六七十人悉送向京吾時與汝同被送限至定州城南夜宿同鄉人姬庫根家茹茹奴望見鮮于修禮營火語吾云我今走向本軍既至營遂告吾軰在此眀旦日出汝叔將兵邀截吾及汝等還得向營汝時年十二共吾並乘馬隨軍可不記此事縁由也於後吾共汝在夀陽住時元寳菩提及汝姑兒賀蘭盛洛并汝身四人同學博士姓成為人嚴惡汝等四人謀欲加害吾共汝叔母等聞之各捉其兒打之唯盛洛無母獨不被打其後尒朱天柱亡歳賀拔阿斗泥在闗西遣人迎家累時汝叔亦遣奴来富迎汝及盛洛等汝時著緋綾袍銀裝帶盛洛著紫織成纈通身袍黄綾裏竝乘騾同去盛洛小於汝汝等三人竝呼吾作阿摩敦如此之事當分眀記之耳今又寄汝小時所著錦袍表一領至宜檢看知吾含悲戚多厯年祀屬千載之運逄大齊之德矜老開恩許得相見一聞此言死猶不朽況如今者勢必聚集禽獸草木母子相依吾有何罪與汝分離今復何福還望見汝言此悲喜死而更蘇世間所有求皆可得母子異國何處可求假汝貴極王公富過山海有一老母八十之年飄然千里死亡旦夕不得一朝蹔見不得一日同處寒不得汝衣饑不得汝食汝雖窮榮極盛光耀世間汝何用為於吾何益吾今日之前汝既不得申其供養事往何論今日以後吾之殘命唯繫於汝爾戴天履地中有鬼神勿云㝠昧而可欺負汝楊氏姑今雖炎暑猶能先發闗河阻遠隔絶多年書依常體慮汝致惑是以每存款質兼亦載吾姓名當識此理不以為怪䕶性至孝得書悲不自勝左右莫能仰視報書曰區宇分崩遭遇災禍違離膝下三十五年受形禀氣皆知母子誰同薩保如此不孝宿殃積戾唯應賜鍾豈悟網羅上嬰慈母但立身立行不負一物明神有識宜見哀憐而子為公侯母為俘𨽻熱不見母熱寒不見母寒衣不知有無食不知饑飽泯如天地之外無由暫聞晝夜悲號繼之以血分懐寃酷終此一生死若有知冀奉見於泉下爾不謂齊朝觧網恵以德音摩敦四姑並許矜放初聞此㫖魂爽飛越號天叩地不能自勝四姑即䝉禮送平安入境以今月十八日於河東拜見遥奉顔色崩動肝腸但離絶多年存亡阻隔相見之始口未忍言唯叙齊朝寛𢎞每存大德云與摩敦雖處宫禁常䝉優禮今者来鄴恩遇彌隆矜哀聴許摩敦垂敕曲盡悲酷備述家事伏讀未周五情屠割書中所道無事敢忘摩敦年尊又加憂苦常謂寢膳貶損或多遺漏伏奉論述次第分眀一則以悲一則以喜當鄉里破敗之日薩保年已十餘歲隣曲舊事猶自記憶况家門禍難親戚流離奉辭時節先後慈訓刻肌刻骨常纒心腑天長喪亂四海横流太祖乘時齊朝撫運兩河三輔各値神機原其事跡非相負背太祖升遐未定天保薩保屬當猶子之長親受顧命雖身居重任職當憂責至於歳時稱慶子孫在庭顧視悲摧心情斷絶胡顔履戴負媿神眀霈然之恩既以霑洽愛敬之至施及旁人草木有心禽魚感澤况在人倫而不銘戴有家有國信義為本伏度来期已應有日一得奉見慈顔永畢生願生死肉骨豈過今恩負山戴岳未足勝荷二國分隔理無書信主上以彼朝不絶子母之恩亦賜許奉荅不期今日得通家問伏紙嗚咽言不宣心䝉寄薩保别時所留錦袍表年歳雖久宛然猶識抱此悲戚至于拜見事歸忍死知復何心齊朝不即發遣更令與䕶書要䕶重報往返再三而母竟不至朝議以其失信令有司移齊曰夫有義則存無信不立山岳猶輕兵食非重故言誓弗違重耳所以享國祝史無媿隨㑹所以為盟未有司牧生民君臨有國可以忘義而多食言者也自數屬屯夷時鍾圯隔皇家親戚淪䧟三紀仁姑世母望絶生還彼朝以去夏之初德音爰發已送仁姑許歸世母乃稱煩暑指尅來秋謂其信必由衷嘉言無爽今落木戒候氷霜行及方為世母虚設詭詞未議言歸更徵酬荅子女玉帛既非所湏保境寧民又云匪報詳觀此意全乖本圖愛人以禮豈為姑息要子責誠質親求報實傷和氣有悖天經我之周室太祖之天下也焉可捐國顧家殉名虧實不害所養斯曰仁人卧鼔潛鋒孰非深計若令迭爭尺寸兩競錐刀瓦震長平則趙分為二兵出函谷則韓裂為三安得猶全謂無損益大冢宰位隆將相情兼家國銜悲茹血分畢寃魂豈意噬指可尋倚門應至徒聞善始卒無令終百辟震驚三軍憤惋不為孝子當作忠臣去歳北軍深入數俘城下雖曰班師餘功未遂今兹馬首南向更期重入晉人角之我之職矣聞諸道路早已戒嚴非直北拒又將南略儻欲自送此之願也如或嬰城未能求敵詰朝請見與君周旋為恵不終祗增深怨愛親無慢垂訓尼父矜恤窮老貽則周文環玦之義事不由此自應内省豈宜有間移書未送而母至舉朝慶悦大赦天下䕶與母暌隔多年一旦聚集凡所資奉窮極華盛每四時伏臘高祖率諸親戚行家人之禮稱觴上夀榮貴之極振古未聞是年也突厥復率衆赴期䕶以齊氏初送國親未欲即事征討復慮失信蕃夷更生邊患不得已遂請東征九月詔曰神若軒皇尚云三戰聖如姬武且曰一戎弧矢之威干戈之用帝王大器誰能去兵太祖丕受天眀造我周室日月所照罔不率從高氏乘釁跋扈竊有并冀世濟其惡腥穢彰聞皇天震怒假手突厥驅略汾晉掃地無遺季孟勢窮伯珪日蹙坐待滅亡鑒之愚智故突厥班師仍屯彼境更集諸部傾國齊至星流電擊數道俱進期在仲冬同㑹并鄴大冡宰晉公朕之懿昆任隆伊吕平一宇宙惟公是屬朕當親執斧鉞廟庭祗受有司宜勒衆軍量程赴集進止遲速委公處分於是徵二十四軍及左右廂散隸及秦隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟庭授護斧鉞出軍至潼闗乃遣柱國尉遲迥率精兵十萬為前鋒大將軍權景宣率山南之兵出豫州少師楊􅎎出軹闗䕶連營漸進屯軍𢎞農迥攻圍洛陽柱國齊公憲鄭國公達奚武等營於邙山䕶性無戎略且此行也又非其本心故師出雖久無所克𫉬䕶本令壍斷河陽之路遏其救兵然後同攻洛陽使其内外隔絶諸將以為齊兵必不敢出唯斥候而已值連日隂霧齊騎直前圍洛之軍一時潰散唯尉遲迥率數十騎扞敵齊公憲又督邙山諸將拒之乃得全軍而返權景宣攻克豫州尋以洛陽圍觧亦引軍退楊􅎎於軹闗戰没䕶於是班師以無功與諸將稽首請罪帝弗之責也天和二年䕶母薨尋有詔起令視事四年䕶廵厯北邊城鎭至靈州而還五年又詔曰光宅曲阜魯用郊天之樂地處參墟晉有大蒐之禮所以言時計功昭德紀行使持節太師都督中外諸軍事柱國大將軍大冡宰晉國公體道居貞含和誕德地居戚右才表棟隆國歩艱難寄深夷險皇綱締構事均休戚故以迹㝠殆庶理契如仁今文軌尚隔方隅猶阻典䇿未備聲名多闕宜賜軒懸之樂六佾之舞䕶性甚寛和然暗於大體自恃建立之功久當權軸凡所委任皆非其人兼諸子貪殘僚屬縱逸恃護威勢莫不蠧政害民上下相䝉曾無疑慮高祖以其㬥慢密與衛王直圖之七年三月十八日䕶自同州還帝御文安殿見䕶訖引䕶入含仁殿朝皇太后先是帝於禁中見䕶常行家人之禮䕶謁太后太后必賜之坐帝立侍焉至是䕶將入帝謂之曰太后春秋既尊頗好飲酒不親朝謁或廢引進喜怒之間時有乖爽比雖犯顔屢諌未䝉垂納兄今既朝拜願更啟請因出懐中酒誥以授䕶曰以此諌太后䕶既入如帝所戒讀示太后未訖帝以玉珽自後擊之䕶踣於地又令宦者何泉以御刀斫之泉惶懼斫不能傷時衛王直先匿於户内乃出斬之初帝欲圖䕶王軌宇文神舉宇文孝伯頗豫其謀是日軌等並在外更無知者殺䕶訖乃召宫伯長孫覽等告之即令收䕶子柱國譚國公㑹大將軍莒國公至崇業公靜正平公乾嘉及乾基乾光乾蔚乾祖乾威等并柱國侯伏侯龍恩龍恩弟大將軍萬夀大將軍劉勇中外府司録尹公正袁傑膳部下大夫李安等於殿中殺之齊王憲白帝曰李安出自皂隸所典唯庖厨而已既不預時政未足加戮高祖曰公不知耳世宗之崩安所為也十九日詔曰君親無將將而必誅太師大冡宰晉公䕶地實宗親義兼家國爰初草創同濟艱難遂任總朝權寄深國命不能竭其誠効罄以心力盡事君之節申送往之情朕兄故略陽公英風秀遠神機頴悟地居聖𦙍禮歸當璧遺訓在耳忍害先加永尋摧割貫切骨髓世宗眀皇帝聰眀神武缺二字蔵智䕶内懐凶悖外託尊崇凡厥臣民誰亡怨憤朕纂承洪基十有三載委政師輔責成宰司䕶志在無君義違臣節懐兹蠆毒逞彼狼心任情誅暴肆行威福朋黨相扇賄貨公行所好加羽毛所惡生瘡痏朕約已菲躬情存庶政每思施寛恵下􅂺抑而不行遂使户口凋殘征賦勞劇家無日給民不聊生且三方未定邊隅尚阻疆場待戎旗之備武夫資扞城之力侯伏龍恩萬夀劉勇等未効庸勲先居上將高門峻宇甲第彫墻寔繁有徒同惡相濟民不見德唯利是眎百姓嗷嗷道路以目含生業業相顧鉗口常恐七百之基忽焉顛墜億兆之命一旦阽危上累祖宗之靈下負蒼生之責今肅正典刑䕶已即罪其餘凶黨咸亦伏誅氛霧既清遐邇同慶朝政惟新兆民更始可大赦天下改天和七年為建德元年䕶世子訓為蒲州刺史其夜遣柱國越國公盛乘傳往蒲州徵訓赴京師至同州賜死䕶長史代郡叱羅協司録𢎞農馮遷及所親任者皆除名䕶子昌城公深使突厥遣開府宇文德齎璽書就殺之三年詔復䕶及諸子先封諡䕶曰蕩並改葬之叱羅協本名與髙祖諱同後改焉少寒微嘗為州小吏以恭謹見知恒州刺史楊鈞擢為從事及魏末六鎭搔擾客於冀州冀州為葛榮所圍刺史以協為統軍委以守禦俄而城陷協没於榮榮敗事汾州刺史爾朱兆頗被親遇補録事參軍兆為天柱大將軍轉司馬兆與齊神武初戰不利還上黨令協在建州督軍糧後使協至洛陽與其諸叔計事謀討齊神武兆等軍敗還并州令協治肆州刺史兆死遂事竇泰泰甚禮之泰為御史中尉以協為治書侍御史泰向潼闗協為監軍泰死協亦見獲太祖以其在闗歳久授大丞相府東閤祭酒撫軍將軍銀青光禄大夫轉録事參軍遷主簿加通直散騎常侍攝大行臺郎中累遷相府屬從事中郎協厯仕二京詳練故事又深自克勵太祖頗委任之然猶以其家屬在東疑其有戀本之望及河橋戰不利協隨軍而還太祖知協不貳封冠軍縣男邑二百户尋加車騎將軍左光禄大夫九年除直閤將軍恒州大中正加都督進爵為伯增邑八百户尋遷大都督儀同三司初太祖欲經略漢中令協行南岐州刺史并節度東益州戎馬事魏廢帝元年即授南岐州刺史時東益州刺史楊辟邪據州反二年協率所部兵討之軍次涪水㑹有氐賊一千人斷道破橋協遣儀同仇買等行前擊之賊開路協乃領所部漸進又有氐賊一千人邀協協乃將兵四百人守硤道與賊短兵接戰賊乃退避辟邪棄城走協追斬之羣氐皆伏以功授開府仍為大將軍尉遲迥長史率兵伐蜀既入劒閤迥令協行潼州事時有五城郡氐酋趙雄傑等扇動新潼始三州民反叛聚結二萬餘人在州南三里隔涪水據槐林山置柵拒守梓潼郡民鄧朏王令公等招誘鄉邑萬餘人復在州東十里涪水北置柵以應之同逼州城城中糧少軍人乏食協撫安内外咸無異心遣儀同伊婁訓大都督司馬裔等將歩騎千餘人夜渡涪水擊雄傑一戰破之令公以雄傑敗亦棄柵走還本郡復與鄧朏等更率萬餘人於郡東南隔水置柵斷絶驛路協遣儀同楊長樂與司馬裔等率師討之復遣大都督裴孟嘗領百姓繼進為其聲勢孟嘗既至梓潼值水漲不得即渡而王令公鄧朏見孟嘗騎少乃將三千餘人圍之數重孟嘗以衆寡不敵各棄馬短兵接戰從辰至午於陣斬令公及朏等賊徒既失渠帥遂即散走其徒黨仍據舊柵而孟嘗方得渡水與長樂合即勒兵攻柵經三日賊乃請降此後數有反叛協輒遣兵討平之魏恭帝三年太祖徵協入朝論蜀中事乃賜姓宇文氏増邑通前一千五百户晉公䕶既殺孫恒李植等欲委腹心於司㑹栁慶司憲令狐整等慶整並辭不堪俱薦協語在慶整𫝊䕶遂徵協入朝既至䕶引與同宿深寄託之協欣然承奉誓以軀命自効䕶大悦以為得協之晚即授軍司馬委以兵事尋轉治御正又授䕶府長史進爵為公増邑一千户常在䕶側陳説時事多被納用世宗知其材識庸淺每折之數謂之曰汝何知也猶以䕶所親任難即屏黜每含容之及世宗崩便授協司㑹中大夫中外府長史協形貎瘦小舉措褊急既以得志每自矜高朝士有来請事者輒云汝不解吾今教汝及其所言多乖事衷當時莫不笑之保定二年追論平蜀功别封一子縣侯又於蜀中食邑一千户入其租賦之半晉公䕶以協竭忠於己每提奬之頻考上中賞以粟帛遷少保轉少傅進位大將軍爵南陽郡公兼營作副監宫室既成以功賜爵洛邑縣公回授一子協既受䕶重委冀得婚連帝室乃求復舊姓叱羅氏䕶為奏請高祖許之又進位柱國䕶以協年老許其致仕而協貪榮未肯告退䕶誅協除名建德三年高祖以協宿齒授儀同三司賜爵南陽郡公時與論説舊事是歳卒年七十六子金嗣馮遷字羽化父漳州從事及遷官達追贈儀同三司陕州刺史遷少修謹有幹能州辟從事魏神龜中刺史楊鈞引為中兵參軍事轉定襄令尋為并州水曹參軍所歴之職咸以勤恪著稱及魏孝武西遷乃棄官與直閤將軍馮靈豫入闗即從魏孝武復潼闗定回洛除給事中後從太祖擒竇泰復𢎞農戰沙苑皆有功授都督龍驤將軍羽林監封獨顯縣伯邑六百户及洛陽之戰遷先登䧟陣遂中重瘡僅得不死以功加輔國將軍軍師都督進爵為侯久之出為廣漢郡守時蜀土初平人情擾動遷政存簡恕夷俗頗安之魏恭帝二年就加車騎將軍大都督通直散騎常侍鎭樊城尋拜漢東郡守孝閔帝踐阼入為晉公䕶府􅁺加車騎大將軍儀同三司進爵臨高縣公尋遷䕶府司録進授驃騎大將軍開府儀同三司遷性質直小心畏愼雖居樞要不以勢位加人兼眀練時事善於斷决每校閲文簿孜孜不倦從辰逮夕未嘗休止以此甚為䕶所委任後以其朝之舊齒欲以衣錦榮之乃授陕州刺史進爵隆山郡公増邑并前二千户遷本寒微不為時軰所重一旦刺舉本州唯以謙恭接待鄉邑人無怨者復入為司録轉工部中大夫厯軍司馬遷小司空自天和已後遷以年老委任稍衰及䕶誅猶除名建德末卒於家時年七十八子恕位至儀同三司伏夷鎭將平寇縣伯䕶所委信者又有朔方邊平位至大將軍軍司馬䕶府司馬䕶敗亦除名史臣曰仲尼有言可與適道未可與權夫道者率禮之謂也權者反經之謂也率禮由乎正理易以成佐世之功反經繫乎非常難以定匡時之業故得其人則治伊尹放太甲周旦相孺子是也不得其人則亂新都遷漢鼎晉氏傾魏族是也是以先王眀上下之序聖人重君臣之分委質同於股肱受爵均其休戚當其親受顧託位居宰衡雖復承利劒臨沸鼎不足以讋其慮據帝圖君海内不足以回其心若斯人者固以功與山嶽爭其髙名與穹壤齊其久矣有周受命之始宇文䕶寔預艱難及太祖崩殂諸子冲幼羣公懐等夷之志天下有去就之心卒能變魏為周俾危獲乂者䕶之力也向使加之以禮讓繼之以忠貞桐宫有悔過之期未央終天年之數則前史所載焉足以道哉然䕶寡於學術昵近羣小威福在已征伐自出有人臣無君之心為人主不堪之事忠孝大節也違之而不疑廢弑至逆也行之而無悔終於身首横分妻孥為戮不亦宜乎周書卷十一周書卷十一考證晉蕩公䕶𫝊侯伏龍恩萬夀劉勇等上文云并柱國侯伏侯龍恩此疑脱一侯字周書卷十一考證
