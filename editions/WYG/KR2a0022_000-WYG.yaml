  text: 欽定四庫全書史部一
  hash: sha256:4fc343c1c4715a8de75d4eb74f65eae0b7a2d5b689508f203b2457159ed64a3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_000-1a, image: WYG0263/WYG0263-0391a.png}
body:
  text: 周書目錄正史類本紀八卷列傳四十二卷凡五十卷本紀周書卷一本紀第一文帝上姓宇文氏諱㤗周書卷二本紀第二文帝下周書卷三本紀第三孝閔帝諱覺周書卷四本紀第四明帝諱毓周書卷五本紀第五武帝上諱邕周書卷六本紀第六武帝下周書卷七本紀第七宣帝諱贇周書卷八本紀第八靜帝諱衍列𫝊周書卷九列傳第一皇后周書卷十列傳第二邵恵公顥子什肥導子廣導亮護翼什肥子胄椿衆杞簡公連莒莊公洛生子菩提虞國公仲子興興子洛周書卷十一列傳第三晉蕩公護叱羅協馮遷周書卷十二列𫝊第四齊煬王憲子貴質周書卷十三列傳第五文閔明武宣諸子周書卷十四列傳第六賀拔勝弟岳兄􅁢念賢周書卷十五列傳第七冦洛李弼弟檦于謹子寔周書卷十六列傳第八趙貴獨孤信侯莫陳崇弟瓊凱周書卷十七列傳第九梁禦若干惠怡峯劉亮王德周書卷十八列傳第十王羆子慶逺孫述王思政周書卷十九列傳第十一逹奚武子震侯莫陳順豆盧寜宇文貴楊忠王雄周書卷二十列傳第十二王盟賀蘭祥尉遲綱叱列伏龜閻慶周書卷二十一列傳第十三尉遲迥王謙司馬消難周書卷二十二列傳第十四周惠逹馮景楊寛兄穆儉栁慶子機帶𢎞鷟子韋兄鷟周書卷二十三列傳第十五蘇綽弟椿周書卷二十四列傳第十六盧辯周書卷二十五列傳第十七李賢弟逺逺子基周書卷二十六列傳第十八長孫儉長孫紹逺弟澄兕兄子斛斯徴周書卷二十七列傳第十九赫連逹韓果蔡祐常善辛威厙狄昌田𢎞梁椿梁臺宇文測弟深周書卷二十八列傳第二十史寜陸騰賀若敦權景宣郭賢周書卷二十九列傳第二十一王傑王勇宇文虬宇文盛弟丘耿豪髙琳李和伊婁穆楊紹王雅達奚寔劉雄侯植周書卷三十列傳第二十二竇熾兄子毅于翼李穆周書卷三十一列傳第二十三韋孝寛韋夐梁士彦周書卷三十二列傳第二十四申徽陸通弟逞栁敏子昻盧柔唐瑾周書卷三十三列傳第二十五厙狄峙楊荐趙剛王慶趙昶王悦趙文表周書卷三十四列傳第二十六趙善元定揚㯹韓盛裴寛弟漢尼鴻楊敷周書卷三十五列傳第二十七鄭孝穆子譯崔謙弟訦崔猷裴俠薛端子胄弟裕薛善弟慎敬祥敬珎周書卷三十六列傳第二十八鄭偉族人頂楊纂叚永王士良崔彦穆令狐整子熙弟休司馬裔子偘裴果劉志周書卷三十七列傳第二十九寇儁韓褒趙肅徐招張軌李彦郭彦裴文舉髙賓尞允周書卷三十八列傳第三十蘇亮弟湛湛弟景恕栁虬呂思禮崔騰董紹薛憕薛寘李昶檀翥元偉周書卷三十九列傳第三十一韋瑱梁昕弟榮皇甫璠辛慶之族子昻仲景昻族人王子直杜杲周書卷四十列傳第三十二尉遲運王軌宇文神舉宇文孝伯顔之儀樂運周書卷四十一列傳第三十三王褒庾信周書卷四十二列傳第三十四蕭撝子濟蕭世怡蕭圓肅蕭大圜宗懔劉璠子祥栁霞子靖莊周書卷四十三列傳第三十五李延孫韋祐韓雄陳忻魏𤣥周書卷四十四列傳第三十六泉企子元禮仲遵李遷哲楊乾運扶猛陽雄席固子世雅任果周書卷四十五列傳第三十七儒林盧誕盧光沈重樊深熊安生樂遜周書卷四十六列傳第三十八孝義李棠栁檜杜叔毗荆可秦族弟榮先皇甫遐張元周書卷四十七列傳第三十九藝術冀儁蔣昇姚僧垣子最􅀺景熙趙文深禇該强練衛元嵩周書卷四十八列傳第四十蕭􅊫子巋岑巋子琮巋子瓛􅊫子嶚蔡大寶巖寶岌大業大弟王操敬魏益徳成尹正盈許孝甄𤣥劉薛睴方岑善傅准王㳬宗如周沈蕭欣范迪君游栁洋袁敞徐岳周書卷四十九列傳第四十一異域上髙麗百濟蠻獠宕昌鄧至白蘭氐稽胡厙莫奚周書卷五十列傳第四十二異域下突厥吐谷渾髙昌鄯善焉耆龜兹于闐囐噠粟特安息波斯臣等謹案後周書五十卷唐令狐徳棻等撰唐􅁱梁陳齊周隋五史本自徳棻𤼵之徳棻與岑文本崔仁師專成周書議者謂其書本於牛宏宏之為史尤務清言徳棻因之多非實録宋仁宗時出太清樓本合史館秘閣本又募取夏竦李巽家本下館閣是正其文字即今所傳本是也乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周書本紀八列傳四十二合五十篇唐令狐徳棻請撰次而詔徳棻與陳叔達庾儉成之仁宗時出太清樓本合史舘祕閣本又募天下獻書而取夏竦李巽家本下舘閣是正其文字今既鏤板以傳學官而臣等始預其是正又序其目錄一篇曰周之六帝當四海分裂之時形勢劫束毅然有志合天下於一而材足以有為者特文帝而已文帝召蘇綽於稠人之中始知之未盡也卧予之言既當其意遂起并晝夜諮諏酬酢知其果可以斷安危治亂之謀而詘己以聽之考於書唯府兵之設歛千嵗已散之民而係之於兵庶幾得三代之遺意能不駭人視聽以就其事而效見於後世文帝嘗患文章浮薄使綽為大誥以勸而卒能變一時士大夫之制作然則勢在人上而欲鼓舞其下者奚患不成雖然非文帝之智内有以得於已而蘇綽之守外不詘於人則未可必其能然也以彼君臣之相遭非以先王之道而猶且懇懇以誘之言又况無所待之豪傑可易以畜哉夫以徳力行仁所以為王霸之異而至於詘己任人則未始不同然而君能畜臣者天下之至難傳曰取人以身脩身以道脩道以仁蓋道極於不可知之神而人有其質推之為天下國家之用者以其粗爾然非致其精於己則其粗亦不能以為人惟能自愛其身則内不欺其心内不欺其心則外不蔽於物然後好惡無所作而尚何有已哉能無已始可以得已而足以揆天下之理知人之言而邪正無以廋其實尚有患乎論之不一哉於是賢能任使之盡其方而無所省者以天下之耳目而小人不能託忠以誣君子又從而為之勸禁則小人忿欲之心已黜於冥冥之際君子樂以其類進而摩厲其俗凜然有耻君臣相與謀于上因敝以新法度而令能者馳騖於下有忠信之守而無傅㑹遷就之患則法度有怫於民而下不以情赴上者乎蓋虛然後能受天下之實約然後能操天下之煩垂纓攝袵俯仰廟堂無為以應萬幾者致其思而已矣夫思之為王者事君臣一也而君之勢則異焉世獨頌堯舜之無為而安知夫人主自宜無為而思則不可一日已也書曰思曰睿揚雄曰於道則勞其不然歟蓋夫法度善矣非以道作其人則不能為之守而民之多寡物之豐殺法度有視時而革者必待人而後謀則是可不致其思乎茍未能此而徒欲法度之革者是豈先王為治之序哉彼區區之周何足以議徒取其能因一時君臣之致好猶足以見其效又况慨然行先王之道而得大冇為之勢乎是固不宜無論也臣燾臣安國臣希昧死謹上
