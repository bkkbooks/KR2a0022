body:
  text: 周書卷四十唐令狐德棻等撰列傳第三十二尉遲運王軌宇文神舉宇文孝伯顏之儀樂運尉遲運大司空吳國公綱之子也少彊濟志在立功魏大統十六年以父勲封安喜縣侯邑一千户孝閔帝踐阼授使持節車騎大將軍儀同三司俄而帝廢朝議欲尊立世宗乃令運奉迎於岐州以預定䇿勲進爵周城縣公增邑五百户保定元年進驃騎大將軍開府儀同三司三年從楊忠攻齊之幷州以功别封第二子端保城縣侯邑一千户四年出為隴州刺史地帶汧渭民俗難治運垂情撫納甚得時譽天和五年入為小右武伯六年遷左武伯中大夫尋加軍司馬武伯如故運既職兼文武甚見委任齊將斛律明月宼汾北運從齊公憲禦之攻拔其伏龍城進爵廣業郡公增邑八百户建德元年授右侍伯轉右司衞時宣帝在東宫親狎謟佞數有罪失高祖於朝臣内選忠諒鯁正者以匡弼之於是以運為右宮正二年帝幸雲陽宮又令運以本官兼司武與長孫覽輔皇太子居守俄而衞刺王直作亂率其黨襲肅章門覽懼走行在所運時偶在門中直兵奄至不暇命左右乃手自闔門直黨與運爭門斫傷運手指僅而得閉直既不得入乃縱火燒門運懼火盡直黨得進乃取宫中材木及牀等以益火更以膏油灌之火勢轉熾乆之直不得進乃退運率留守兵因其退以擊之直大敗而走是日微運宮中已不守矣高祖嘉之授大將軍賜以直田宅妓樂金帛車馬及什物等不可勝數四年出為同州蒲津潼闗等六防諸軍事同州刺史高祖將伐齊召運參議東夏底定頗有力焉五年拜柱國進爵盧國公邑五千户宣政元年轉司武上大夫總宿衞軍事高祖崩於雲陽宮祕未發䘮運總侍衞兵還京師宣帝即位授上柱國運之為宮正也數進諫於帝帝不能納反疎忌之時運又與王䡄宇文孝伯等皆為高祖所親待軌屢言帝失於高祖帝謂運預其事愈更銜之及軌被誅運懼及於禍問計於宇文孝伯語在孝伯傳尋而得出為秦州總管秦渭等六州諸軍事秦州刺史然運至州猶懼不免大象元年二月遂以憂薨於州時年四十一贈大後丞秦渭河鄯成洮文等七州諸軍事秦州刺史諡曰忠子靖嗣大象末儀同大將軍王軌太原祁人也小名沙門漢司徒允之後世為州郡冠族累葉仕魏賜姓烏丸氏父光少雄武有將相才略每從征討頻有戰功太祖知其勇决遇之甚厚位至驃騎大將軍開府儀同三司平原縣公䡄性質直慷慨有逺量臨事彊正人不敢干起家事輔城公及高祖即位授前侍下士俄轉左侍上士頗被識顧累遷内史上士内史下大夫加授儀同三司自此親遇彌重遂處腹心之任時晉公護專政高祖密欲圖之以䡄沉毅有識度堪屬以大事遂問以可否䡄贊成之建德初轉内史中大夫加授開府儀同三司又拜上開府儀同大將軍封上黃縣公邑一千户軍國之政皆參預焉五年高祖總戎東伐六軍圍晉州刺史崔景嵩守城北面夜中密遣送款詔令䡄率衆應之未明士皆登城鼔噪齊人駭懼因即退走遂克晉州擒其城主特進海昌王尉相貴俘甲士八千人於是遂從平幷鄴以功進位上大將軍進爵郯國公邑三千户及陳將吳明徹入宼呂梁徐州總管梁士彦頻與戰不利乃退保州城不敢復出明徹遂堰清水以灌之列船艦於城下以圖攻取詔以䡄為行軍總管率諸軍赴救䡄濳於清水入淮口多􅆆大木以鐵鏁貫車輪橫截水流以斷其船路方欲密決其堰以斃之明徹知之懼乃破堰遽退冀乗決水之勢以得入淮比至清口川流已闊水勢亦衰船艦竝礙於車輪不復得過䡄因率兵圍而蹙之唯有騎將蕭摩訶以二千騎先走得免明徹及將士三萬餘人幷器械輜重竝就俘獲陳之銳卒於是殲焉高祖嘉之進位柱國仍拜徐州總管七州十五鎮諸軍事䡄性嚴重多謀略兼有吕梁之㨗威振敵境陳人甚憚之宣帝之征吐谷渾也高祖令䡄與宇文孝伯竝從軍中進取皆委䡄等帝仰成而已時宮尹鄭譯王端等竝得幸帝帝在軍中頗有失德譯等皆預焉軍還䡄等言之於高祖高祖大怒乃撻帝除譯等名仍加捶楚帝因此大銜之䡄又嘗與小内史賀若弼言及此事且言皇太子必不克負荷弼深以為然勸䡄陳之䡄後因侍坐乃謂高祖曰皇太子仁孝無聞復多涼德恐不了陛下家事愚臣短暗不足以論是非陛下恒以賀若弼有文武奇才識度宏逺而弼比每對臣深以此事為慮高祖召弼問之弼乃詭對曰皇太子飬德春宮未聞有過未審陛下何從得聞此言既退䡄誚弼曰平生言論無所不道今者對揚何得乃爾翻覆弼曰此公之過也皇太子國之儲副豈易攸言事有蹉跌便至滅門之禍本謂公密陳臧否何得遂至昌言䡄黙然久之乃曰吾專心國家遂不存私計向者對衆良寔非宜後䡄因内宴上夀又捋高祖鬚曰可愛好老公但恨後嗣弱耳高祖深以為然但漢王次長又不才此外諸子竝幼故不能用其說及宣帝即位追鄭譯等復為近侍䡄自知必及於禍謂所親曰吾昔在先朝寔申社稷至計今日之事斷可知矣此州控帶淮南隣接彊冦欲為身計易同反掌但忠義之節不可虧違況荷先帝厚恩每思以死自効豈以獲罪於嗣主便欲背德於先朝止可於此待死義不為他計冀千載之後知吾此心大象元年帝令内史杜䖍信就徐州殺䡄御正中大夫顔之儀切諌帝不納遂誅之䡄立朝忠恕兼有大功忽以無罪被戮天下知與不知無不傷惜宇文神舉太祖之族子也高祖晉陵曾祖求男仕魏位竝顯逹祖金殿魏鎮逺將軍兖州刺史安吉縣侯父顯和少而襲爵性矜嚴頗渉經史膂力絶人彎弓數百斤能左右馳射魏孝武之在藩也顯和早蒙眷遇時屬多難嘗問計於顯和顯和具陳宜杜門晦迹相時而動孝武深納焉及即位擢授冠軍將軍閤内都督封城陽縣公邑五百户孝武以顯和藩邸之舊遇之甚厚時顯和所居宅隘陋乃撤殿省賜為寢室其見重如此及齊神武專政帝每不自安謂顯和曰天下洶洶將若之何對曰當今之計莫若擇善而從之因誦詩云彼美人兮西方之人兮帝曰是吾心也遂定入闗之䇿帝以顯和母老家累又多令預為計對曰今日之事忠孝不可竝立然臣不密則失身安敢預為私計帝愴然改容曰卿即我之王陵也遷朱衣直閤閤内大都督改封長廣縣公邑一千五百户從帝入闗至溱水太祖素聞其善射而未之見也俄而水傍有一小鳥顯和射而中之太祖笑曰我知卿工矣其後引為帳内大都督俄出為持節衞將軍東夏州刺史以疾去職深為吏民所懷尋進位車騎大將軍儀同三司加散騎常侍魏恭帝元年卒時年五十七太祖親臨之哀動左右建德二年追贈使持節驃騎大將軍開府儀同三司延丹綏三州諸軍事延州刺史神舉早歲而孤有夙成之量族兄安化公深器異之及長神情倜儻志略英贍眉目疎朗儀貌魁梧有識欽之莫不許以逺大世宗初起家中侍上士世宗留意翰林而神舉雅好篇什帝每有遊幸神舉恒得侍從保定元年襲爵長廣縣公邑二千三百户尋授帥都督遷大都督使持節車騎大將軍儀同三司拜右大夫四年進驃騎大將軍開府儀同三司治小宮伯天和元年遷右宮伯中大夫進爵清河郡公增邑一千户高祖將誅晉公護也神舉得預其謀建德元年遷京兆尹三年出為熊州刺史神舉威名素重齊人甚憚之五年攻㧞齊陸渾等五城及高祖東伐詔神舉從軍幷州平即授幷州刺史加上開府儀同大將軍州既齊氏别都控帶要重平定甫爾民俗澆訛豪右之家多為姦猾神舉勵精為治示以威恩旬月之間逺邇悅服尋加上大將軍改封武德郡公增邑二千户俄進柱國大將軍改封東平郡公增邑通前六千九百户所部東夀陽縣土人相聚為盗率其黨五千人來襲州城神舉以州兵討平之宣政元年轉司武上大夫高祖親戎北伐令神舉與原國公如願等率兵五道俱入高祖至雲陽疾甚乃班師幽州人盧昌期祖英伯等聚衆據范陽反詔神舉率兵擒之齊黃門侍郎盧思道亦在反中賊平見獲解衣將伏法神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此屬稽胡反叛入宼西河神舉又率衆與越王盛討平時突厥與稽胡連和遣騎赴救神舉以奇兵擊之突厥敗走稽胡於是款服即授幷潞肆石等四州十二鎮諸軍幷州總管初神舉見待於高祖遂處腹心之任王䡄宇文孝伯等屢言皇太子之短神舉亦頗與焉及宣帝即位荒淫無度神舉懼及於禍懐不自安初定范陽之後威聲甚振帝亦忌其名望兼以宿憾遂使人齎鴆酒賜之薨於馬邑時年四十八神舉偉風儀善辭令愽渉經史性愛篇章尤工騎射臨戎對㓂勇而有謀莅職當官每著聲績兼好施愛士以雄豪自居故得任兼文武聲彰中外百僚無不仰其風則先軰舊齒至于今而稱之子同嗣位至儀同大將軍神舉弟神慶少有壮志武藝絶倫大象末位至柱國汝南郡公宇文孝伯字胡三吏部安化公深之子也其生與高祖同日太祖甚愛之飬於第内及長又與高祖同學武成元年拜宗師上士時年十六孝伯性沉正謇諤好直言高祖即位欲引置左右時政在冢臣不得專制乃託言少與孝伯同業受經思相啓發由是晉公護弗之猜也得入為右侍上士恒侍讀書天和元年遷小宗師領右侍儀同及遭父憂詔令於服中襲爵高祖嘗從容謂之曰公之於我猶漢高之與盧綰也乃賜以十三環金帶自是恒侍左右出入卧内朝之機務皆得預焉孝伯亦竭心盡力無所㢠廻避至於時政得失及外間細事皆以奏間高祖深委信之當時莫與為比及高祖將誅晉公護密與衛王直圖之唯孝伯及王䡄宇文神舉等頗得參預護誅授開府儀同三司歴司㑹中大夫左右小宮伯東宮左宮正建德之後皇太子稍長既無令德唯昵近小人孝伯白高祖曰皇太子四海所屬而德聲未聞臣忝宮官實當其責且春秋尚少志業未成請妙選正人為其師友調護聖質猶望日就月將如或不然悔無及矣帝歛容曰卿世載鯁直竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難也深願陛下思之帝曰正人豈復過君於是以尉遲運為右宮正孝伯仍為左宮正尋拜宗師中大夫及吐谷渾入宼詔皇太子征之軍中之事多決於孝伯俄授京兆尹入為左宮伯轉右宮伯嘗因侍坐帝問之曰我兒比來漸長進不答曰皇太子比懼天威更無罪失及王䡄因内宴捋帝鬚言太子之不善帝罷酒責孝伯曰公常語我云太子無過今䡄有此言公為誑矣孝伯再拜曰臣聞父子之際人所難言臣知陛下不能割情忍愛遂爾結舌帝知其意黙然久之乃曰朕已委公矣公其勉之五年大軍東討拜内史下大夫令掌留臺事軍還帝曰居守之重無忝戰功於是加授大將軍進爵廣陵郡公邑三千户幷賜金帛及女妓等六年復為宗師每車駕巡幸常令居守其後高祖北討至雲陽宮遂寢疾驛召孝伯赴行在所帝執其手曰吾自量必無濟理以後事付君是夜授司衞上大夫總宿衞兵馬事又令馳驛入京鎮守以備非常宣帝即位授小冢宰帝忌齊王憲意欲除之謂孝伯曰公能為朕圖齊王當以其官位相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下之叔父戚近功高社稷重臣棟梁所寄陛下若妄加刑戮微臣又順旨曲從則臣為不忠之臣陛下為不孝之子也帝不懌因漸疎之乃與于智王端鄭譯等密圖其事後令智告憲謀逆遣孝伯召憲入遂誅之帝之西征也在軍有過行鄭譯時亦預焉軍還孝伯及王䡄盡以白高祖怒撻帝數十仍除譯名至是譯又被帝親昵帝既追憾被杖乃問譯曰我脚上杖痕誰所為也譯答曰事由宇文孝伯及王䡄譯又因說王䡄捋鬚事帝乃誅䡄尉遲運懼私謂孝伯曰吾徒必不免禍為之奈何孝伯對曰今堂上有老母地下有武帝為臣為子知欲何之且委質事人本狥名義諫而不入將焉逃死足下若為身計宜且逺之於是各行其志運尋出為秦州總管然帝荒淫日甚誅戮無度朝章弛紊無復綱紀孝伯又頻切諫皆不見從由是益疎斥之後稽胡反令孝伯為行軍總管從越王盛討平之及軍還帝將殺之乃託以齊王之事誚之曰公知齊王謀反何以不言孝伯對曰臣知齊王忠於社稷為羣小媒孽加之以罪臣以言必不用所以不言且先帝付囑微臣唯令輔導陛下今諫而不從寔負顧託以此為罪是所甘心帝大慙俛首不語乃命將出賜死于家時年三十六及隋文帝踐極以孝伯及王䡄忠而獲罪竝令收葬復其官爵又嘗謂高熲曰宇文孝伯寔有周之良臣若使此人在朝我軰無措手處也子歆嗣顔之儀字子升琅邪臨沂人也晉侍中含九世孫祖見逺齊御史治書正色立朝有當官之稱及梁武帝執政遂以疾辭尋而齊和帝暴崩見逺慟哭而絶梁武帝深恨之謂朝臣曰我自應天從人何預天下人事而顔見逺乃至於此當時嘉其忠烈咸稱歎之父恊以見逺蹈義忤時遂不仕進梁元帝為湘東王引恊為其府記室參軍恊不得已乃應命梁元帝後著懷舊志及詩竝稱贊其美之儀幼穎悟三歲能讀孝經及長愽渉羣書好為詞賦嘗獻神州頌辭致雅贍梁元帝手勑報曰枚乘二葉俱得遊梁應貞兩世竝稱文學我求才子鯁慰良深江陵平之儀隨例遷長安世宗以為麟趾學士稍遷司書上士高祖初建儲宮盛選師傅以之儀為侍讀太子後征吐谷渾在軍有過行鄭譯等竝以不能匡弼坐譴唯之儀以累諫獲賞即拜小宮尹封平陽縣男邑二百户宣帝即位遷上儀同大將軍御正中大夫進爵為公增邑一千户帝後刑政乖僻昏縱日甚之儀犯顔驟諌雖不見納终亦不止深為帝所忌然以恩舊每優容之及帝殺王䡄之儀固諫帝怒欲幷致之於法後以其諒直無私乃舍之宣帝崩劉昉鄭譯等矯遺詔以隋文帝為丞相輔少主之儀知非帝旨拒而弗從昉等草詔署記逼之儀連署之儀厲聲謂昉等曰主上升遐嗣子沖幼阿衡之任宜在宗英方今賢戚之内趙王最長以親以德合膺重寄公等備受朝恩當思盡忠報國奈何一旦欲以神器假人之儀有死而已不能誣罔先帝於是昉等知不可屈乃代之儀署而行之隋文帝後索符璽之儀又正色曰此天子之物自有主者宰相何故索之於是隋文帝大怒命引出將戮之然以其民之望也乃止出為西疆郡守隋文帝踐極詔徵還京師進爵新野郡公開皇五年拜集州刺史在州清靜夷夏悅之明年代還遂優遊不仕十年正月之儀隨例入朝隋文帝望而識之命引至御坐謂之曰見危授命臨大節而不可奪古人所難何以加卿乃賜錢十萬米一百石十一年冬卒年六十九有文集十卷行於世時京兆郡丞樂運亦以直言數諫於帝運字承業南陽淯陽人晉尚書令廣之八世孫祖文素齊南郡守父均梁義陽郡守運少好學渉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍而運積年為人慵保皆贖免之又事母及寡嫂甚謹由是以孝義聞梁故都官郎琅邪王澄美之為次其行事為孝義傳性方直未嘗求媚於人天和初起家夏州總管府倉曹參軍轉柱國府記室參軍尋而臨淄公唐瑾薦為露門學士前後犯顔屢諫高祖多被納用建德二年除萬年縣丞抑挫豪右號稱彊直高祖嘉之特許通籍事有不便於時者令巨細奏聞高祖嘗幸同州召運赴行在所既至高祖謂運曰卿來日見太子不運曰臣來日奉辭高祖曰卿言太子何如人運曰中人也時齊王憲以下竝在帝側高祖顧謂憲等曰百官佞我皆云太子聰明睿知唯運獨云中人方驗運之忠直耳於是因問運中人之状運對曰班固以齊桓公為中人管仲相之則霸竪貂輔之則亂謂可與為善亦可與為惡也高祖曰我知之矣遂妙選宮官以匡弼之仍超拜運京兆郡丞太子聞之意甚不悅及高祖崩宣帝嗣位葬訖詔天下公除帝及六宮便議即吉運上疏曰三年之䘮自天子逹于庶人先王制禮安可誣之禮天子七月而葬以俟天下畢至今葬期既促事訖便除文軌之内奔赴未盡隣境逺聞使猶未至若以䘮服受弔不可既吉更凶如以𤣥冠對使未知此出何禮進退無據愚臣竊所未安書奏帝不納自是德政不修數行赦宥運又上疏曰臣謹案周官曰國君之過市刑人赦此謂市者交利之所君子無故不遊觀焉若遊觀則施惠以悅之也尚書曰𤯝災肆赦此謂過誤為害罪雖大當緩赦之呂刑云五刑之疑有赦此謂赦疑從罰罰疑從免論語曰赦小過舉賢才謹尋經典未有罪無輕重溥天大赦之文逮茲末葉不師古始無益於治未可則之故管仲曰有赦者奔馬之委轡不赦者痤疽之礪石又曰惠者民之仇讐法者民之父母吳漢遺言猶云唯願無赦王符著論亦云赦者非明世之所宜豈可數施非常之惠以肆姦宄之惡乎帝亦不納而昏暴滋甚運乃輿櫬詣朝堂陳帝八失一曰内史御正職在弼諧皆須參議共治天下大尊比來小大之事多獨斷之堯舜至聖尚資輔弼比大尊未為聖主而可專恣已心凡諸刑罰爵賞爰及軍國大事請參諸宰輔與衆共之二曰内作色荒古人重誡大尊初臨四海德惠未洽先搜天下美女用實後宮又詔儀同以上女不許輙嫁貴賤同怨聲溢朝野請姬媵非幸御者放還本族欲嫁之女勿更禁之三曰天子未明求衣日旰忘食猶恐萬機不理天下擁滯大尊比來一入後宮數日不出所須聞奏多附内豎傳言失實是非可懼事由宦者亡國之徵請准高祖居外聽政四曰變故易常乃為政之大忌嚴刑酷罰非致治之𢎞規若罰無定刑則天下皆懼政無常法則民無適從豈有削嚴刑之詔未及半祀便即追改更嚴前制政令不定乃至於是今宿衛之官有一人夜不直者罪至削除因而逃亡者遂便籍沒此則大逆之罪與十杖同科雖為法愈嚴恐人情愈散一人心散尚或可止若天下皆散將如之何秦網密而國亡漢章踈而祚永請遵輕典竝依大律則億兆之民手足有所措矣五曰高祖斵雕為朴本欲傳之萬世大尊朝夕􅃐庭親承聖旨豈有崩未逾年而遽窮奢麗成父之志義豈然乎請興造之制務從卑儉雕文刻鏤一切勿營六曰都下之民徭賦稍重必是軍國之要不敢憚勞豈容朝夕徵求唯供魚龍爛漫士民從役祗為俳優角觝紛紛不已財力俱竭業業相顧無復聊生凡此無益之事請竝停罷七曰近見有詔上書字誤者即治其罪假有忠讜之人欲陳時事尺有所短文字非工不密失身義無假手脫有舛謬便陷嚴科嬰徑尺之鱗其事非易下不諱之詔猶懼未來更加刑戮能無鉗口大尊縱不能採誹謗之言無宜杜獻書之路請停此詔則天下幸甚八曰昔桑榖生朝殷王因之獲福今𤣥象􅂷誡此亦興周之祥大尊雖減膳撤懸未盡銷譴之理誠願諮諏善道修布德政解兆民之愠引萬方之罪則天變可除鼎業方固大尊若不革茲八事臣見周廟不血食矣帝大怒將戮之内史元巖紿帝曰樂運知書奏必死所以不顧身命者欲取後世之名陛下若殺之乃成其名也帝然之因而獲免翌日帝頗感悟召運謂之曰朕昨夜思卿所奏寔是忠臣先皇明聖卿數有規諫朕既昏暗卿復能如此乃賜御食以賞之朝之公卿初見帝盛怒莫不為運寒心後見獲宥皆相賀以為幸免虎口内史鄭譯嘗以私事請托運而弗之許因此銜之及隋文帝為丞相譯為長史遂左遷運為廣州滍陽令開皇五年轉毛州高唐令頻歴二縣竝有聲績運常願處一諫官從容諷議而性訐直為人所排抵遂不被任用乃發憤録夏殷以來諫諍事集而部之凡六百三十九條合四十一卷名曰諫苑奏上之隋文帝覽而嘉焉史臣曰士有不因學藝而重不待爵禄而貴者何亦云忠孝而已若乃竭力以奉其親者人子之行也致身以事其君者人臣之節也斯固彌綸三極囊括百代當宣帝之在東朝凶德方兆王䡄宇文孝伯神舉志惟無隱盡言於父子之間淫刑既逞相繼夷滅隋文之將登庸人懷去就顔之儀風烈懍然正辭以明節崎嶇雷電之下僅而獲濟斯數子者豈非社稷之臣歟或人以為不忠則天下莫之信也自古以外戚而居重任多藉一時之恩至若尉遲運者可謂位以才升爵由功進美矣哉周書卷四十周書卷四十考證史臣論孝伯神舉臣文淳按當云神舉孝伯蓋神舉於孝伯為族父傳又在孝伯前敘次當爾周書卷四十考證
