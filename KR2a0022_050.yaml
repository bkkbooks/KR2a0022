body:
  text: 周書卷五十唐令狐德棻等撰列傳第四十二異域下突厥吐谷渾髙昌鄯善焉耆龜兹于闐囐噠粟特安息波斯突厥者蓋胸奴之别種姓阿史那氏别為部落後為鄰國所破盡滅其族有一兒年且十嵗兵人見其小不忍殺之乃刖其足棄草澤中有牝狼以肉飼之及長與狼合遂有孕焉彼王聞此兒尚在重遣殺之使者見狼在側并欲殺狼狼遂逃于髙昌國之北山山有洞穴穴內有平壤茂草周回數百里四靣俱山狼匿其中遂生十男十男長大外託妻孕其後各有一姓阿史那即一也子孫蕃育漸至數百家經數世相與出穴臣於茹茹居金山之陽為茹茹鐵工金山形似兜鍪其俗謂兜鍪為突厥遂因以為號焉或云突厥之先出於索國在胸奴之北其部落大人曰阿謗步兄弟十七人其一曰伊質泥師都狼所生也謗步等性並愚癡國遂被滅泥師都既别感異氣能徴召風雨娶二妻云是夏神冬神之女也一孕而生四男其一變為白鴻其一國於阿輔水劍水之間號為契骨其一國於處折水其一居踐斯處折施山即其大兒也山上仍有阿謗步種類並多寒露大兒為出火溫飬之咸得全濟遂共奉大兒為主號為突厥即訥都六設也訥都六有十妻所生子皆以母族為姓阿史那是其小妻之子也訥都六死十母子內欲擇立一人乃相率於大樹下共為約曰向樹跳躍能最高者即推立之阿史那子年幼而跳最高者諸子遂奉以為主號阿賢設此説雖殊然終狼種也其後曰土門部落稍盛始至塞上市繒絮願通中國大統十一年太祖遣酒泉胡安諾槃陀使焉其國皆相慶曰今大國使至我國將興也十二年土門遂遣使獻方物時鐵勒將伐茹茹土門率所部邀擊破之盡降其衆五萬餘落恃其強盛乃求婚於茹茹茹茹主阿那瓌大怒使人罵辱之曰爾是我煆奴何敢發是言也土門亦怒殺其使者遂與之絶而求婚於我太祖許之十七年六月以魏長樂公主妻之是嵗魏文帝崩土門遣使來弔贈馬二百匹魏廢帝元年正月土門發兵擊茹茹大破之於懷荒北阿那瓌自殺其子菴羅辰奔齊餘衆復立阿那瓌叔父鄧叔子為主土門遂自號伊利可汗猶古之單于也號其妻為可賀敦亦猶古之閼氏也土門死子科羅立科羅號乙息記可汗又破叔子於沃野北木賴山二年三月科羅遣使獻馬五萬匹科羅死弟俟斤立號木汗可汗俟斤一名燕都狀貌多竒異靣廣尺餘其色甚赤眼若琉璃性剛暴務於征伐乃率兵擊鄧叔子滅之叔子以其餘燼來奔俟斤又西破囐噠東走契丹北并契骨威服塞外諸國其地東自遼海以西西至西海萬里南自沙漠以北北至北海五六千里皆屬焉其俗被髮左袵穹廬氈帳隨水草遷徙以畜牧射獵為務賤老貴壯寡亷耻無禮義猶古之胸奴也其主初立近侍重臣等輿之以氈隨日轉九回每一回臣下皆拜拜訖乃扶令乘馬以帛絞其頸使才不至絶然後釋而急問之曰你能作幾年可汗其主既神情瞀亂不能詳定多少臣下等隨其所言以驗修短之數大官有葉護次沒次特勒次俟利發次吐屯發及餘小官凡二十八等皆世為之兵器有弓矢鳴鏑甲矟刀劍其佩飾則兼有伏突旗纛之上施金狼頭侍衛之士謂之附離夏言亦狼也蓋本狼生志不忘舊其徴發兵馬科稅雜畜輒刻木為數并一金鏃箭蠟封印之以為信契其刑法反叛殺人及姦人之婦盜馬絆者皆死姦人女者重責財物即以其女妻之鬭傷人者隨輕重輸物盜馬及雜物者各十餘倍徴之死者停尸於帳子孫及諸親屬男女各殺羊馬陳於帳前祭之統帳走馬七匝一詣帳門以刀𠢐靣且哭血淚俱流如此者七度乃止擇日取亡者所乘馬及經服用之物并尸俱焚之收其餘灰待時而葬春夏死者候草木黃落秋冬死者候華葉榮茂然始坎而瘞之葬之日親屬設祭及走馬𠢐靣如初死之儀葬訖於墓所立石建標其石多少依平生所殺人數又以祭之羊馬頭盡懸挂於標上是日也男女咸盛服飾會於葬所男有恱愛於女者歸即遣人娉問其父母多不違也父伯叔死者子弟及姪等妻其後母世叔母及嫂惟尊者不得下淫雖移徙無常而各有地分可汗恆處於都斤山牙帳東開蓋敬日之所出也每嵗率諸貴人祭其先窟又以五月中旬集他人水拜祭天神於都斤四五百里有髙山回出上無草樹謂其為勃登凝黎夏言地神也其書字類胡而不知年歷惟以草青為記俟斤部衆既盛乃遣使請誅鄧叔子等太祖許之收叔子以下三千人付其使者殺之於青門外三年俟斤襲擊吐谷渾破之語在吐谷渾傳明帝二年俟斤遣使來獻方物保定元年又三輩遣使貢其方物時與齊人交爭戎車嵗動故每連結之以為外援初魏恭帝世俟斤許進女於太祖契未定而太祖崩尋而俟斤又以他女許髙祖未及結納齊人亦遣求婚俟斤貪其幣厚將悔之至是詔遣涼州刺史楊荐武伯王慶等往結之慶等至諭以信義俟斤遂絶齊使而定婚焉仍請舉國東伐語在荐等傳三年詔隋公楊忠率衆一萬與突厥伐齊忠軍度陘嶺俟斤率騎十萬來會明年正月攻齊主於晉陽不尅俟斤遂縱兵大掠而還忠言於髙祖曰突厥甲兵惡爵賞輕首領多而無法令何謂難制馭正由比者使人妄道其強盛欲令國家厚其使者身往重取其報朝廷受其虗言將士望風畏懾但虜態詐健而實易與耳今以臣觀之前後使人皆可斬也髙祖不納是嵗俟斤復遣使來獻更請東伐詔楊忠率兵出沃野晉公護趣洛陽以應之會護戰不利俟斤引還五年詔陳公純大司徒宇文貴神武公竇毅南安公楊荐等往逆女天和二年俟斤又遣使來獻陳公純等至俟斤復二於齊會有風雷變乃許純等以后歸語在皇后傳四年俟斤又遣使獻馬俟斤死弟他鉢可汗立自俟斤以來其國富強有凌轢中夏志朝廷既與和親嵗給繒絮錦綵十萬假突厥在京師者又待以優禮衣錦食肉者常以千數齊人懼其寇掠亦傾府藏以給之他鉢彌復驕傲至乃率其徒屬曰但使我在南兩箇兒孝順何憂無物邪建德二年他鉢遣使獻馬及齊滅齊定州刺史范陽王髙紹義自馬邑奔之他鉢立紹義為齊帝召集所部云為之復讐宣政元年四月他鉢遂入冦幽州殺略居民柱國劉雄率兵拒戰兵敗死之髙祖親總六軍將北伐會帝崩乃班師是冬他鉢復寇邉圍酒泉大掠而去大象元年他鉢復請和親帝册趙王招女為千金公主以嫁之并遣執紹義送闕他鉢不奉詔仍寇并州大象二年始遣使奉獻且逆公主而紹義尚留不遣帝又令賀若誼往諭之始送紹義云吐谷渾本遼東鮮卑慕容廆之庶兄也初吐谷渾馬與廆馬鬭而廆馬傷廆遣讓之吐谷渾怒率其部落去之止於枹罕自為君長及孫葉延頗視書傳以古有王父字為氏遂以吐谷渾為氏焉自吐谷渾至伏連籌一十四世伏連籌死子夸吕立始自號為可汗治伏俟城在青海西十五里雖有城郭而不居之恆處穹廬隨水草畜牧其地東西三千里南北千餘里官有王公僕射尚書及即中將軍之號夸呂椎髻眊珠以皂為帽坐金師子牀號其妻為恪尊衣織成裙披錦大袍辮髮於後首戴金花其俗丈夫衣服略同於華夏多以羃㒿為冠亦以繒為帽婦人皆貫珠束髮以多為貴兵器有弓刀甲矟國無常賦須則稅富室商人以充用焉其刑罰殺人及盜馬者死餘則徴物量事決杖刑人必以氈蒙頭持石從髙擊殺之父兄亡後妻後母及嫂等與突厥俗同至於婚姻貧不能偹財物者輒盜女將去死者亦皆埋殯其服制葬訖則除之性貪婪忍於殺害好射獵以肉酪為糧亦知種田然其北界氣候多寒惟得蕪菁大麥故其俗貧多富少青海周回千餘里海內有小山每冬氷合後以良牝馬置此山至來冬收之馬皆有孕所生得駒號為龍種必多駿異世傳青海驄者也土出犛牛鳥多鸚鵡大統中夸呂再遣使獻馬及羊牛等然猶寇抄不止緣邉多被其害魏廢帝二年太祖勒大兵至姑臧夸吕震懼遣使貢方物是嵗夸吕又通使於齊氏涼州刺史史寧覘知其還率輕騎襲之於州西赤泉獲其僕射乞伏觸扳將軍翟潘密啇胡二百四十人駝騾六百頭雜綵絲絹以萬計魏恭帝二年史寧又與突厥术汗可汗襲擊夸吕破之虜其妻子大獲珍物及雜畜語在史寧傳武成初夸吕復寇涼州刺史是云寶戰沒詔賀蘭祥宇文貴率兵討之夸吕遣其廣定王鐘留王拒戰祥等破之廣定等遁走又攻拔其洮陽洪和二城置洮州以還保定中夸呂前後三輩遣使獻方物天和初其龍涸王莫昌率衆降以其地為扶州二年五月復遣使來獻建德五年其國大亂高祖詔皇太子征之軍渡青海至伏俟城夸呂遁走虜其餘衆而還明年又再遣奉獻宣政初其趙王他婁屯來降自是朝獻遂絶髙昌者車師前王之故地東去長安四千九百里漢西域長史及戊巳校尉並治於此晉以其地為髙昌郡張軌吕光沮渠蒙遜據河西皆置太守以統之其後有闞爽及沮渠無諱並自署為太守無諱死茹茹殺其弟安周以闞伯周為髙昌王高昌之稱王自此始也伯周之從子首歸為高車所滅次有張孟明馬儒相繼王之並為國人所害乃更推立麴嘉為王嘉字靈鳯金城榆中人本為儒右長史魏太和末立嘉死子竪立其地東西三百里南北五百里國內總有城一十六官有令尹一人比中夏相國次有公二人皆其王子也一為交河公一為田地公次有左右衛次有八長史曰吏部祠部庫部倉部主客禮部民部兵部等長史也次有建武威逺陵江殿中伏波等將軍次有八司馬長史之副也次有侍郎校書郎主簿從事階位相次分掌諸事次有省事専掌導引其大事決之於王小事則世子及二公隨狀斷決平章録記事訖即除籍書之外無久掌文按官人雖有列位並無曹府惟每旦集於牙門評議衆事諸城各有户曹水曹田曹每城遣司馬侍郎相監檢校名為城令服飾丈夫從胡法婦人略同華夏兵器有弓箭刀楯甲矟文字亦同華夏兼用胡書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆為胡語賦稅則計輸銀錢無者輸麻布其刑法風俗婚姻喪葬與華夏小異而大同地多石磧氣候溫暖榖麥再熟宜蠶多五果有草曰羊刺其上生蜜焉自嘉以來世修藩職於魏大統十四年詔以其世子玄喜為王恭帝二年又以其田地公茂嗣位武成元年其王遣使獻方物保定初又遣使來貢自燉煌向其國多沙磧道里不可準記惟以人畜骸骨及駝馬糞為驗又有魍魎怪異故商旅來往多取伊吾路云鄯善古樓蘭國也東去長安五千里所治城方一里地多沙鹵少水草北即白龍堆路魏太武時為沮渠安周所攻其王西奔且末西北有流沙數百里夏日有熱風為行旅之患風之欲至惟老駝知之即鳴而聚立埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻口其風迅駛斯須過盡若不防者必至危斃大統八年其兄鄯米率衆內附焉耆國在白山之南七十里東去長安五千八百里其王姓龍即前涼張軌所封龍熙之􅏷所治城方二里部內凡有九城國小民貧無綱紀法令兵有弓刀甲矟婚姻略同華夏死亡者皆焚而後葬其服制滿七日則除之丈夫並剪髮以為首飾文字與婆羅門同俗事天神並崇信佛法尤重二月八日四月八日是日也其國咸依釋教齋戒行道焉氣候寒土田良沃榖有稻粟菽麥畜有駝馬牛羊養𧖟不以為絲惟充綿纊俗尚蒲桃酒兼愛音樂南去海十餘里有魚鹽蒲葦之饒保定四年其王遣使獻名馬龜兹國在白山之南一百七十里東去長安六千七百里其王姓白即後涼吕光所立白震之後所治城方五六里其刑法殺人者死劫賊則斷其一臂并刖一足賦稅準地徴租無田者則稅銀錢婚姻喪葬風俗物産與焉支略同惟氣候少溫為異又出細氈麖皮氍毺鐃多鹽緑雌黃胡粉及良馬封牛等東有輪臺即漢二師將軍李廣利所屠其南三百里有大水東流號計戍水即黃河也保定元年其王遣使來獻于闐國在蔥嶺之北二百餘里東去長安七千七百里所治城方八九里部內有大城五小城數十其刑法殺人者死餘罪各隨輕重懲罰之自外風俗物産與龜兹略同俗重佛法寺塔僧尼甚衆王尤信向每設齋日必親自灑掃饋食焉城南五十里有贊摩寺即昔羅漢比丘比盧旃為其王造覆盆浮圗之所石上有辟支佛趺處雙迹猶存自高昌以西諸國人等多深目髙昌以東此一國貌不甚胡頗類華夏城東二十里有大水北流號樹枝水即黃河也城西十五里亦有大水名逹利水與樹枝俱北流同會於計戍建德三年其王遣使獻名馬囐噠國大月氐之種類在于闐之西東去長安一萬百里其王治拔底延城蓋王舍城也其城方十餘里刑法風俗與突厥略同其俗又兄弟共娶一妻夫無兄弟者其妻戴一角帽若有兄弟者依其多少之數更加帽角焉其人凶悍能戰鬪于闐安息等大小二十餘國皆役屬之大統十二年遣使獻其方物魏廢帝二年明帝二年並遣使來獻後為突厥所破部落分散職貢遂絶粟特國在蔥嶺之西蓋古之庵蔡一名溫那沙治於大澤在康居西北保定四年其王遣使獻方物安息國在蔥嶺之西治蔚搜城北與康居西與波斯相接東去長安一萬七百五十里天和二年其王遣使來獻波斯國大月氐之别種治蘇利城古條支國也東去長安一萬五千三百里城方十餘里户十餘萬王姓波斯氐坐金羊牀戴金花冠衣錦袍織成帔皆飾以珍珠寶物其俗丈夫剪髮戴白皮帽貫頭衫兩廂近下開之并有巾帔緣以織成婦女服大衫披大帔其髮前為髻後被之飾以金銀華仍貫五色珠絡之於膊王於其國內别有小牙十餘所猶中國之離宫也每年四月出遊處之十月乃還王即位以後擇諸子內賢者密書其名封之於庫諸子及大臣皆莫之知也王死乃衆共發書視之其封內有名者即立以為王餘子各出就邉任兄弟更不相見也國人號王曰翳囋妃曰防步率王之諸子曰殺野大官有摸胡壇掌國內獄訟泥忽汗掌庫藏關禁地卑勃掌文書及衆務次有遏羅訶地掌王之內事薩波勃掌四方兵馬其下皆有屬官分統其事兵器有甲矟圎排劍弩弓箭戰並乘象每象百人隨之其刑法重罪懸諸竿上射而殺之次則擊獄新王立乃釋之輕罪則劓刖若髠或翦半鬚及繫排於項上以為耻辱犯強盜者禁之終身姦貴人妻者男子流婦人割其耳鼻賦稅則準地輸銀錢俗事火祅神婚合亦不擇尊卑諸夷之中最為醜穢矣民女年十嵗以上有姿貌者王收養之有功勳人即以分賜死者多棄尸於山一月治服城外有人别居惟知喪葬之事號為不淨人若入城市搖鈴自别以六月為嵗首尤重七月七日十二月一日其日民庶以上各相命召設會作樂以極歡娛又以每年正月二十日各祭其先死者氣候暑熱家自藏氷地多沙磧引水溉灌其五榖及禽獸等與中夏略同惟無稻及黍秫土出名馬及駝富室至有數千頭者又出白象師子大鳥卵珍珠離珠頗黎珊瑚琥珀琉璃馬瑙水晶瑟瑟金銀鍮石金剛火齊鑌鐵銅錫朱沙水銀綾錦白疊毼氍毹翕毛㲪赤麞皮及薰六鬱金蘇合青木等香胡椒蓽撥石蜜千牛棗香附子訶梨勒無食子鹽緑雌黃等物魏廢帝二年其王遣使來獻方物史臣曰四夷之為中國患也久矣而北狄尤甚焉昔嚴尤班固咸以周及秦漢未有得其上䇿雖通賢之宏議而史臣嘗以為疑夫步驟之來綿自今古澆淳之變無隔華戎是以反道德棄仁義凌替之風嵗廣至涇陽入北地充斥之釁日深爰自金行逮乎水運戎夏離錯風俗混并夷裔之情偽中國畢知之矣中國之得失夷裔備聞之矣若乃不與約誓不就攻伐來而禦之去而守之夫然則敵有餘力我無寧嵗將士疲於奔命疆場苦其交侵欲使偃伯靈臺歐世仁夀其可得乎是知秩宗之雅旨護軍之誠説實有會於當時而未允於後代也然則易稱見幾而作傳云相時而動夫時者得失之所繫幾者吉凶之所由况乎諸夏之朝治亂之運代有戎狄之地強弱之勢無恆若使臣畜之與羈縻和親之與征伐因其時而制變觀其幾而立權則舉無遺䇿謀多上算獸心之虜革靣匪難沙幕之北雲撤何逺安有周秦漢魏優劣在其間哉周書卷五十周書卷五十考證囐噠魏書作嚈噠波斯國傳王姓波斯氐魏書西域傳王姓波氏名斯周書卷五十考證
