body:
  text: 周書卷四十四唐令狐德棻等撰列傳第三十六泉企子元禮仲遵李遷哲楊乾運扶猛陽雄席固子世雅任果泉企字思道上洛豐陽人也世雄商洛曾祖景言魏建節將軍假宜陽郡守世襲本縣令封丹水侯父安志復為建節將軍宜陽郡守領本縣令降爵為伯企九歲喪父哀毁類於成人服闋襲爵年十二鄉人皇平陳合等三百餘人詣州請企為縣令州為申上時吏部尚書郭祚以企年少未堪宰民請别選遣終此一限令企代之魏宣武帝詔曰企向成立且為本鄉所樂何為捨此世襲更求一限遂依所請企雖童幼而好學恬靜百姓安之尋以母憂去職縣中父老復表請殷勤詔許之起復本任加討寇將軍孝昌初又加龍驤將軍假節防洛州别將尋除上洛郡守及蕭寶夤反遣其黨郭子恢襲據潼關企率鄉兵三千人拒之連戰數日子弟死者二十許人遂大破子恢以功拜征虜將軍寶夤又遣兵萬人趣青泥誘動巴人圖取上洛上洛豪族泉杜二姓密應之企與刺史董紹宗潛兵掩襲二姓散走寶夤軍亦退遷左將軍浙州刺史别封涇陽縣伯邑五百户永安中梁將王𤣥真入寇荆州加企持節都督率衆援之遇𤣥真於順陽與戰大破之除撫軍將軍使持節假鎮南將軍東雍州刺史進爵為侯部民楊羊皮太保椿之從弟恃託椿勢侵害百姓守宰多被其凌侮皆畏而不敢言企收而治之將加極法於是楊氏慚懼宗族詣閣請恩自此豪右屏迹無敢犯者性又清約纖毫不擾於民在州五年每於鄉里運米以自給梁魏興郡與洛州接壤表請與屬詔企為行臺尚書以撫納之大行臺賀拔嶽以企昔蒞東雍為吏民所懷乃表企復為刺史詔許之蜀民張國雋聚黨剽劫州郡不能制企命收而戮之闔境清肅魏孝武初加車騎大將軍左光祿大夫及齊神武專政魏帝有西顧之心欲委企以山南之事乃除洛州刺史當州都督未幾帝西遷齊神武率衆至潼關企遣其子元禮督鄉里五千人北出大谷以禦之齊神武不敢進上洛人都督泉嶽其弟猛略與順陽人杜窋等謀翻洛州以應東軍企知之殺嶽及猛略等傳首詣闕而窋亡投東魏録前後勳授車騎大將軍儀同三司大統初加開府儀同三司兼尚書右僕射進爵上洛郡公增邑通前千户企志尚廉慎每除一官憂見顔色至是頻讓魏帝手詔不許三年高敖曹率衆圍逼州城杜窋為其鄉導企拒守旬餘矢盡援絶城乃陷焉企謂敖曹曰泉企力屈志不服也及竇泰被擒敖曹退走遂執企而東以窋為刺史企臨發密誡子元禮仲遵曰吾生平志願不過令長耳幸逄聖運位亞台司今爵祿既隆年齒又暮前途夷險抑亦可知汝等志業方彊堪立功效且忠孝之道不可兩全宜各為身計勿相隨寇手但得汝等致力本朝吾無餘恨不得以我在東遂虧臣節也爾其勉之乃揮涕而訣餘無所言聞者莫不憤歎尋卒於鄴元禮少有志氣好弓馬頗間草隸有士君子之風釋褐奉朝請本州别駕纍遷員外散騎侍郎洛州大中正員外散騎常侍安東將軍持節都督賜爵臨洮縣伯進征東將軍金紫光祿大夫加散騎常侍及洛州陷與企俱𬒳執而東元禮於路逃歸時杜窋雖為刺史然巴人素輕杜而重泉及元禮至與仲遵相見感父臨别之言潛與豪右結託信宿之間遂率鄉人襲州城斬窋傳首長安朝廷嘉之拜衛將軍車騎大將軍世襲洛州刺史從太祖戰於沙苑為流矢所中遂卒子貞嗣官至儀同三司仲遵少謹實涉獵經史年十三州辟主簿十四為本縣令及長有武藝遭世離亂每從父兄征討以勇决聞高敖曹攻洛州企令仲遵率五百人出戰時以衆寡不敵乃退入城復與企力戰拒守矢盡以杖棒扞之遂為流矢中目不堪復戰及城陷士卒歎曰若二郎不傷豈至於此企之東也仲遵以被傷不行後與元禮斬窋以功封豐陽縣伯邑五百户加授征東將軍豫州刺史及元禮於沙苑戰沒復以仲遵為洛州刺史仲遵宿稱幹略為鄉里所歸及為本州頗得嘉譽東魏北豫州刺史高仲密舉成臯入附太祖率軍應之别遣仲遵隨于謹攻柏谷塢仲遵力戰先登擒其將王顯明柏谷既拔復㑹大軍戰於邙山十三年王思政改鎮潁川以仲遵行荆州刺史事十五年加授大都督俄進車騎大將軍儀同三司梁司州刺史柳仲禮每為邉寇太祖令仲遵率鄉兵從開府楊忠討之梁隨郡守桓和拒守不降忠謂諸將曰本圖仲禮不在隨郡如即攻守恐引日勞師今若先取仲禮則桓和可不攻自服諸君以為何如仲遵對曰蜂蠆有毒何可輕也若棄和深入遂擒仲禮和之降不尚未可知如仲禮未獲和為之援首尾受敵此危道也若先攻和指麾可剋剋和而進更無反顧之憂忠從之仲遵以計由已出乃率先登城遂擒和仍從忠擊仲禮又獲之進驃騎大將軍開府儀同三司領本州大中正復為三荆二廣南雍平信江隨二郢浙等十三州諸軍事行荆州刺史尋遭母憂請終喪制不許大將軍王雄南征上津魏興仲遵率所部兵從雄討平之遂於上津置南洛州以仲遵為刺史仲遵留情撫接百姓安之流民歸附者相繼而至初蠻帥杜清和自稱巴州刺史以州入附朝廷因其所據授之仍𨽻東梁州都督清和以仲遵善於撫御請𨽻仲遵朝議以山川非便弗之許也清和遂結安康酋帥黃衆寶等舉兵共圍東梁州復遣王雄討平之改巴州為洵州𨽻於仲遵先是東梁州刺史劉孟良在職貪婪民多背叛仲遵以廉簡處之羣蠻率服仲遵雖出自巴夷而有方雅之操歷官之處皆以清白見稱朝廷又以其父臨危抗節乃令襲爵上洛郡公舊封聽回授一子魏恭帝初徵拜左衛將軍尋出為都督金興等六州諸軍事金州刺史武成初卒官時年四十五贈大將軍華洛等三州刺史諡曰莊子暅嗣起家本縣令入為左侍上士保定中授帥都督纍遷儀同三司出為純州防主建德末位至開府儀同大將軍李遷哲字孝産安康人也世為山南豪族仕於江左祖方逹齊末為本州治中父元真仕梁歷東宮左衛率東梁衡二州刺史散騎常侍沌陽侯遷哲少修立有識度慷慨善謀畫起家文德主帥轉直閣將軍武賁中郎將及其父為衡州留遷哲本鄉監統部曲事時年二十撫馭羣下甚得其情大同二年除安康郡守三年加超武將軍太清二年移鎮魏興郡都督魏興上庸等八郡諸軍事襲爵沌陽侯邑一千五百户四年遷持節信武將軍散騎常侍都督東梁洵興等七州諸軍事東梁州刺史及侯景篡逆諸王爭帝遷哲外禦邉寇自守而已大統十七年太祖遣逹奚武王雄等略地山南遷哲率其所部拒戰軍敗遂降於武然猶意氣自若武乃執送京師太祖謂之曰何不早歸國家乃勞師旅今為俘虜不亦愧乎答曰世荷梁恩未有報效又不能死節實以此為愧耳太祖深嘉之即拜使持節車騎大將軍散騎常侍封沌陽縣伯邑千户魏恭帝初直州人樂熾洋州人田越金州人黃國等連結為亂太祖遣雁門公田𢎞出梁漢開府賀若敦趣直谷熾聞官軍至乃燒絶棧道據守直谷敦衆不得前太祖以遷哲信著山南乃令與敦同往經略熾等或降或獲尋竝平蕩仍與賀若敦南出狥地遷哲先至巴州入其郛郭梁巴州刺史牟安民惶懼開門請降安民子宗徹等猶據琵琶城招諭不下遷哲攻而尅之斬獲九百餘人軍次鹿城城主遣使請降遷哲謂其衆曰納降如受敵吾觀其使視瞻猶高得無詐也遂不許之梁人果於道左設伏以邀遷哲遷哲進擊破之遂屠其城虜獲千餘口自此巴濮之民降欵相繼軍還太祖嘉之以所服紫袍玉帶及所乘馬以賜之並賜奴婢三十口加授侍中驃騎大將軍開府儀同三司除直州刺史即本州也仍給軍儀鼓節令與田𢎞同討信州魏恭帝三年正月軍次並州梁並州刺史杜滿各望風送欵進圍疊州尅之獲刺史冉助國等遷哲每率驍勇為前鋒所在攻戰無不身先士卒凡下十八州拓地三千餘里時信州為蠻酋向五子王等所圍𢎞又遣遷哲赴援比至信州已陷五子王等聞遷哲至狼狽遁走遷哲入據白帝賀若敦等復至遂共追擊五子王等破之及田𢎞旋軍太祖令遷哲留鎮白帝更配兵千人馬三百匹信州先無倉儲軍糧匱之遷哲乃收葛根造粉兼米以給之遷哲亦自取供食時有異膳即分賜兵士有疾患者又親加醫藥以此軍中感之人思效命黔陽蠻田烏度田都唐等每抄掠江中為百姓患遷哲隨機出討殺獲甚多由是諸蠻畏威各送糧餼又遣子弟入質者千有餘家遷哲乃於白帝城外築城以處之並置四鎮以靜峽路自此寇抄頗息軍糧贍給焉世宗初授都督信臨等七州諸軍事信州刺史時蠻酋蒲微為鄰州刺史舉兵反遷哲將討之諸將以途路阻逺竝不欲行遷哲怒曰蒲微蕞爾之賊勢何能為擒獲之略已在吾度中矣諸君見此小寇便有憚心後遇大敵將何以戰遂率兵七千人進擊之拔其五城虜獲二千餘口二年進爵西城縣公增邑通前二千五百户武成元年朝於京師世宗甚禮之賜甲第一區及莊田等保定中授平州刺史天和三年進位大將軍四年詔遷哲率金上等諸州兵鎮襄陽五年陳將章昭逹攻逼江陵梁主蕭巋告急於襄州衛公直令遷哲往救焉遷哲率其所部守江陵外城與陳將程文季交戰兵稍却遷哲乃親自陷陳手殺數人㑹江陵總管陸騰出助之陳人乃退陳人又因水泛長壞龍川寧朔隄引水灌城城中驚擾遷哲乃先塞北堤以止水又募驍勇出擊之頻有斬獲衆心稍定俄而敵入郭內焚燒民家遷哲自率騎出南門又令步兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊於城西堞以梯登者已數百人遷哲又率驍勇扞之陳人復潰俄而大風暴起遷哲乘暗出兵擊其營陳人大亂殺傷甚衆陸騰復破之於西隄陳人乃遁建德二年進爵安康郡公三年卒於襄州時年六十四贈金州總管諡曰壯武遷哲纍世雄豪為鄉里所率服性復華侈能厚自奉養妾媵至有百數男女六十九人緣漢千餘里間第宅相次姬人之有子者分處其中各有僮僕侍婢奄閽守之遷哲每鳴笳導從往來其間縱酒飲宴盡生平之樂子孫參見或忘其年名者披簿以審之長子敬仁先遷哲卒第六子敬猷嗣還統父兵起家大都督建德六年從譙王討稽胡有功進爵儀同大將軍遷哲弟顯位至上儀同大將軍楊乾運字𤣥邈儻城興勢人也為方隅豪族父天興齊安康郡守乾運少雄武為鄉閭所信服弱冠州辟主簿孝昌初除宣威將軍奉朝請尋為本州治中轉别駕除安康郡守大統初梁州民皇甫圓姜晏聚衆南叛梁將蘭欽率兵應接之以是漢中遂陷乾運亦入梁梁大同元年除飄武將軍西益潼刺史尋轉信武將軍黎州刺史太清末遷潼南梁二州刺史加鼓吹一部及達奚武圍南鄭武陵王蕭紀遣乾運率兵援之為武所敗紀時已稱尊號以乾運威服巴渝欲委方靣之任乃拜車騎將軍十三州諸軍事梁州刺史鎮潼州封萬春縣公邑四千户時紀與其兄湘東王繹爭帝遂連兵不息乾運兄子略說乾運曰自侯景逆亂江左沸騰今大賊初平生民離散理宜同心戮力保國寧民今乃兄弟親尋取敗之道也可謂朽木不雕世衰難佐古人有言危邦不入亂邦不居又云見機而作不俟終日今若適彼樂土送欵關中必當功名兩全貽慶於後乾運深然之乃令略將二千人鎮劒閣又遣其壻樂廣鎮安州仍誡略等曰吾欲歸附關中但未有由耳若有使來即宜盡禮迎接會太祖令乾運孫法洛及使人牛伯友等至略即夜送乾運乃令使人李若等入關送欵太祖乃密賜乾運鐵劵授使持節驃騎大將軍開府儀同三司侍中梁州刺史安康郡公及尉遲迥令開府侯呂陵始為前軍至劒南略即退就樂廣謀欲翻城恐其軍將任電等不同先執之然後出城見始始乃入據安州令廣略等往報乾運乾運遂降迥迥因此進軍成都數旬尅之魏廢帝三年乾運至京師太祖嘉其忠欵禮遇隆渥尋卒於長安贈本官加直巴集三州刺史尚書右僕射子端嗣朝廷以乾運歸附之功即拜端梁州刺史車騎大將軍儀同三司略亦以歸附功拜車騎大將軍儀同三司頻從征討建德末位至開府儀同大將軍封上庸縣伯樂廣亦授車騎大將軍儀同三司安州刺史封安康縣公邑一千户扶猛字宗略上甲黃土人也其種落號曰獸蠻世為渠帥猛梁大同中以直後出為持節厲鋒將軍青州刺史轉上庸新城二郡守南洛北司二州刺史封宕渠縣男及侯景作亂猛乃擁衆自守未有所從魏大統十七年大將軍王雄拓定魏興猛率其衆據險為堡時遣使微通餉饋而已魏廢帝元年魏興叛雄擊破之猛遂以衆降太祖以其世據本鄉乃厚加撫納授車騎大將軍儀同三司加散騎常侍復爵宕渠縣男割二郡為羅州以猛為刺史令率所部千人從開府賀若敦南討信州敦令猛别道直趣白帝所由之路人跡不通猛乃梯山捫葛備歷艱阻雪深七尺糧運不繼猛奬勵士卒兼夜而行遂至白帝城刺史向鎮侯列陳拒猛猛與戰破之乘勝而進遂入白帝城撫慰民夷莫不悅附譙淹與官軍戰敗率舟師浮江東下欲歸於梁猛與敦等邀擊破之語在敦傳師還以功進開府儀同三司俄而信州蠻反猛復從賀若敦討平之又率水軍破蠻帥文子榮於汶陽進爵臨江縣公增邑一千户武成中陳將侯瑱等逼湘州又從賀若敦赴救除武州刺史後隨敦自拔還復為羅州刺史保定三年轉綏州刺史從衛公直援陳將華皎時大軍不利唯猛所部獨全又從田𢎞破漢南諸蠻前後十餘戰每有功進位大將軍後以疾卒陽雄字元略上洛邑陽人也世為豪族祖斌上庸太守父猛魏正光中万俟醜奴作亂關右朝廷以猛商洛首望乃擢為襄威將軍大谷鎮將帶胡城令以禦醜奴及元皓入洛魏孝莊帝度河范陽王誨脫身投猛猛保藏之及孝莊反正由是知名俄而廣陵王恭僞瘖疾復來歸猛猛亦深相保護魏孝武即位甚嘉之授征虜將軍行河北郡守尋轉安西將軍華山郡守頻典三郡頗有聲績及孝武西遷猛率所領移鎮潼關封郃陽縣伯邑七百户俄而潼關不守猛於善渚谷立柵收集義徒授征東將軍揚州刺史大都督武衛將軍仍鎮善渚大統三年為竇泰所襲猛脫身得免太祖以衆寡不敵弗之責也仍配兵千人守牛尾堡尋而太祖擒竇泰猛亦别獲東魏𢎞農郡守淳于業後以疾卒贈華洛揚三州刺史雄起家奉朝請纍遷至都督直後明威將軍積射將軍從于謹攻盤豆柵復從李遠經沙苑陳並力戰有功封安平縣侯邑八百户加冠軍將軍中散大夫賞賜甚厚後入洛陽戰河橋解玉壁圍迎高仲密援侯景竝預有戰功前後增邑四百五十户世襲邑陽郡守從大將軍宇文虬攻剋上津遷通直散騎常侍大都督進儀同三司陳將侯方兒潘純陀寇江陵雄從豆盧寧擊走之除洵州刺史俗雜賨渝民多輕猾雄威惠相濟夷夏安之蠻帥文子榮竊據荆州之汶陽郡又侵陷南郡之當陽臨沮等數縣詔遣開府賀若敦潘招等討平之即以其地置平州以雄為刺史進爵玉城縣公增邑通前一千六百户加驃騎大將軍開府儀同三司時寇亂之後户多逃散雄在所慰撫民並安輯徵為載師中大夫遷西寧州總管以疾不拜除通洛防主雄處疆場務在保境息民接待敵人必推誠仗信齊洛州刺史獨孤永業深相欽尚移書稱美之入為京兆尹尋拜民部中大夫進位大將軍俄轉中外府長史遷江陵總管四州五防諸軍事改封魯陽縣公宣政元年卒於鎮大象初追封魯陽郡公邑三千五百户贈陳曹莒汴四州刺史諡曰懷雄善附會能自謀身故得任兼出納保全爵祿子長寬嗣官至儀同大將軍席固字子堅其先安定人也高祖衡因後秦之亂寓居於襄陽仕晉為建威將軍遂為襄陽者姓固少有逺志內明敏而外質朴梁大同中為齊興郡守屬侯景渡江梁室大亂固久居郡職士多附之遂有親兵千餘人梁元帝嗣位江陵遷興州刺史於是軍民慕從者至五千餘人固遂欲自據一州以觀時變後懼王師進討方圖內屬密謂其腹心曰今梁氏失政揚都覆沒湘東不能復讐雪恥而骨肉相殘宇文丞相創啓霸基招擕以禮吾欲决意歸之與卿等共圖富貴左右聞固言未有應者固更諭以禍福諸人然後同之魏大統十六年以地來附是時太祖方欲南取江陵西定蜀漢聞固之至甚禮遇之乃遣使就拜使持節驃騎大將軍開府儀同三司大都督侍中豐州刺史封新豐縣公邑二千户後轉湖州刺史固以未經朝謁遂蒙榮授心不自安啓求入覲太祖許之及固至太祖與之歡宴賞賜甚厚進爵靜安郡公增邑並前三千三百户尋拜昌歸憲三州諸軍事昌州刺史固居家孝友為州里所稱蒞官之處頗有聲績保定四年卒於州時年六十一贈大將軍襄唐豐郢復五州刺史諡曰肅仍敕襄州賜其墓田子世雅嗣世雅字産文性方正少以孝聞初以固功授車騎大將軍儀同三司除贊城郡守纍遷開府儀同三司順直二州刺史大象末位至大將軍世雅弟世英亦以固功授儀同三司後至上開府儀同大將軍任果字靜鸞南安人也世為方隅豪族仕於江左祖安東梁益州别駕新巴郡守閬中伯父褒龍驤將軍新巴南安廣漢三郡守沙州刺史新巴縣公果性勇决志在立功魏廢帝元年率所部來附太祖嘉其逺至待以優禮果因靣陳取蜀之䇿太祖深納之乃授使持節車騎大將軍儀同三司大都督散騎常侍沙州刺史南安縣公邑一千户及尉遲迥伐蜀果時在京師乃遣其弟岱及子悛從軍太祖以益州未下復令果乘傳歸南安率鄉兵二千人從迥征蜀尋進授驃騎大將軍開府儀同三司蕭紀遣趙拔扈等率衆三萬來援成都果從大軍擊破之及成都平除始州刺史在任未久果請入朝太祖許之以其方隅首望早立忠節乃進爵安樂郡公賜以鐵劵聽世相傳襲並賜路車駟馬及儀衛等以光寵之尋為刺客所害時年五十六史臣曰古人稱仁義豈有常蹈之則為君子背之則為小人信矣泉企長自山谷素無月旦之譽而臨難慷慨有人臣之節豈非蹈仁義歟元禮仲遵聿遵其志卒成功業庶乎克負荷矣李遷哲楊乾運席固之徒屬方隅擾攘咸翻然而委質遂享爵位以保終始觀遷哲之對太祖有尚義之辭乾運受任武陵乖事人之道若乃校長短比優劣故不可同年而語矣陽雄任兼文武聲著中外抑亦志能之士乎周書卷四十四周書卷四十四考證李遷哲傳緣漢千餘里間第宅相次北史同千字當是十字之訛席固傳子世雅嗣北史作子雅又下文世雅弟世英北史亦作雅弟英俱無世字臣文淳按北史避唐諱故去世字猶韓禽虎作韓禽也然此書作於文皇時不知何以不避豈亦後人所加耶周書卷四十四考證
