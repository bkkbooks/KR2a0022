body:
  text: 周書卷八唐令狐德棻等撰帝紀第八靜帝靜皇帝諱衍後改為闡宣帝長子也母曰朱皇后建德二年六月生於東宫大象元年正月癸卯封魯王戊午立為皇太子二月辛巳宣帝於鄴宫𫝊位授帝居正陽宫二年夏五月乙未宣帝寢疾詔帝入宿於露門學已酉宣帝崩帝入居天臺廢正陽宫大赦天下停洛陽宫作庚戌上天無上皇太后尊號為太皇太后天無聖皇太后李氏為太帝太后天元大皇后楊氏為皇太后天大皇后朱氏為帝太后其天中大皇后陳氏天右大皇后元氏天左大皇后尉遲氏竝出俗為尼柱國漢王贊為上柱國右大丞相上柱國揚州總管隋國公楊堅為假黃鉞左大丞相柱國秦王贄為上柱國帝居諒暗百官總已以聽於左大丞相壬子以上柱國鄖國公韋孝寬為相州總管罷入市稅錢六月戊午以柱國許國公宇文善神武公竇毅修武公侯莫陳瓊大安公閻慶竝為上柱國趙王招陳王純越王達代王盛滕王逌來朝庚申復行佛道二教舊沙門道士精誠自守者簡令入道辛酉以柱國把國公椿燕國公于實郜國公賀拔伏恩竝為上柱國甲子相州總管尉遲迥舉兵不受代詔發關中兵即以孝寬為行軍元帥率軍討之上柱國畢王賢以謀執政被誅以上柱國秦王贄為大冡宰杞國公椿為大司徒己巳詔南定北光衡巴四州民為宇文亮抑為奴婢者竝免為民復其本業甲戍有赤氣起西方漸東行遍天庚辰罷諸魚池及山澤公禁者與百姓共之以柱國蔣國公梁睿為益州總管秋七月甲申突厥送齊范陽王高紹義庚寅申州刺史李慧起兵辛卯月掩氐東南星甲午月掩南斗第六星庚子詔趙陳越代滕五王入朝不趨劒履上殿榮州刺史邵國公宇文胄舉兵遣大將軍清河公楊素討之青州總管尉遲勤舉兵丁未隋公楊堅為都督內外諸軍事己酉䢵州總管司馬消難舉兵以柱國楊國公王誼為行軍元帥率軍討之壬子歲星與太白合於張有流星大如斗出五軍東北流光眀燭地趙王招越王盛以謀執政被誅癸丑封皇弟術為鄴王衎為郢王是月豫州荆州襄州三總管內諸蠻各率種落反焚燒村驛攻亂郡縣八月庚申益州總管王謙舉兵不受代即以梁睿為行軍元帥率軍討之丁卯封上柱國枹罕公辛威為宿國公開府怡昂為鄯國公庚午韋孝寬破尉遲迥於鄴城迥自殺相州平移相州於安陽其鄴城及邑居皆毁廢之分相州陽平郡置毛州昌黎郡置魏州丙子以漢王贊為太師上柱國并州總管申國公李穆為大𫝊宋王實為大前疑秦王贄為大右弼燕國公于實為大左輔己卯詔曰朕祗承洪業二載於兹藉祖考之休憑宰輔之力經天緯地四海晏如逆賊尉遲迥才質凡庸志懷姦慝因緣戚屬位冠朝倫屬上天降禍先皇晏駕萬國深鼎湖之痛四海窮遏密之悲獨幸天災欣然放命稱兵擁衆便懷問鼎乃詔六師肅兹九伐而凶徒孔熾充原蔽野諸將肆雷霆之威壯士縱貔貅之勢芟夷縈拂所在如莽直指漳濵擒斬元惡羣醜喪魄咸集鼓下順髙秋之氣就上天之誅兩河妖孽一朝清蕩自朝及野喜抃相趨昔上皇之時不言為治聖人宰物有教而已未戢干戈實深慚德思𢎞寬簡之政用副億兆之心可大赦天下其共迥元謀執迷不悟及迥子姪逆人司馬消難王謙等不在赦例庚辰司馬消難擁其衆以魯山甑山二鎮奔陳遣大將軍宋安公元景山率衆追擊俘斬五百餘人䢵州平沙州氐帥開府楊永安聚衆應王謙遣大將軍樂寧公達奚儒討之楊素破宇文胄於滎州斬胄於石濟以上柱國神武公竇毅為大司馬齊國公于智為大司空廢相青荆金晉梁六州總管九月甲申熒惑與歲星合於翼丙戌廢河陽總管為鎮隸洛州以小宗伯竟陵公陽慧為大宗伯壬辰廢皇后司馬氏為庶人甲午熒惑入太微戊戌以柱國楊國公王誼為上柱國辛丑分潼州管內新遂普合及瀘州管內瀘戎六州竝隸信州總管府己酉熒惑犯左執法庚戌以柱國常山公于翼化政公宇文欣竝為上柱國進封翼為任國公欣為英國公壬子丞相去左右之號隋公楊堅為大丞相冬十月甲寅日有蝕之乙酉有流星大如五斗出張南流光眀燭地壬戌陳王純以怨執政被誅大丞相隋國公楊堅加大冡宰五府總於天官戊寅梁睿破王謙於劒南追斬之傳首京師益州平十一月甲辰達奚儒破楊永安於沙州沙州平乙巳歲星守太微丁未上柱國鄖國公韋孝寬薨十二月壬子以柱國蔣國公梁睿為上柱國癸丑熒惑入氐丁巳以柱國䢴國公楊雄為普安公賀蘭謨郕國公梁士彥上大將軍新安公叱列長文武鄉公崔𢎞度大將軍中山公宇文恩濮陽公宇文述渭原公和干子任城公王景漁陽公楊鋭上開府廣宗公李崇隴西公李詢竝為上柱國庚申以柱國楚國公豆盧績為上柱國癸亥詔曰詩稱不如同姓傳曰異姓為後蓋眀辨親踈皎然不雜太祖受命龍德猶濳籙表革代之文星垂除舊之象三分天下志扶魏室多所改作冀允上𤣥文武羣官賜姓者衆本殊國邑實乖胙土不歆非類異骨肉而共蒸嘗不愛其親在行路而叙昭穆且神徵革姓本為厯數有歸天命在人推讓終而弗獲故君臨區㝢纍世於兹不可仍遵謙挹之㫖久行權宜之制諸改姓者悉宜復舊甲子大丞相隋國公楊堅進爵為王以十郡為國辛未代王達滕王逌竝以謀執政被誅壬申以大將軍長寧公楊勇為上柱國大司馬小冢宰始平公元孝矩為大司寇大定元年春正月壬午詔曰朕以不天夙遭極罰光隂遄速遽及此辰窮慕纒綿言增號絶踰祀革號憲章前典可改大象三年為大定元年乙酉歲星逆行守右執法熒惑掩房北第一星丙戍詔曰帝王設官惟才是務人臣報國薦賢為重去歲已來屢有妖寇宰臣英算咸得清蕩逆亂之後兵車始朅遐邇勞役生民未康居官之徒致治者寡斯故上失其道以至於兹亦由下有幽人未展其力今四海寧一八表無塵元輔執鈞垂風揚化若使天下英傑盡升於朝銓衡陟降量才而處垂拱無為庶幾可至於是遣戎秩上開府以上職事下大夫以上外官刺史以上各舉清平勤幹者三人被舉之人居官三年有功過者所舉之人隨加賞罰以大司馬長寧公楊勇為洛州總管二月庚申大丞相隋王楊堅為相國總百揆更封十郡通前二十郡劒履上殿入朝不趨贊拜不名備九錫之禮加璽鉞遠遊冠相國印緑綟綬位在諸王上又加冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴宫懸王后王子爵命之號竝依魏晉故事甲子隋王楊堅稱尊號帝遜于别宫隋氏奉帝為介國公邑萬户車服禮樂一如周制上書不為表答表不稱詔有其文事竟不行開皇元年五月壬申崩時年九歲隋志也諡曰靜皇帝葬恭陵史臣田靜帝越自幼冲紹兹衰緒內相挾孫劉之詐戚藩無齊代之彊隋氏因之遂遷龜鼎雖復岷峨投袂翻成陵奪之威漳滏勤王無救宗周之殞嗚呼以太祖之克隆景業未踰二紀不祀忽諸斯蓋宣帝之餘殃非孺子之罪戾也周書卷八周書卷八考證靜帝紀封皇弟術為鄴王衎為郢王按通鑑周主封其弟衍為葉王術為郢王與此互異又按諸王𫝊宣帝五子朱皇后生靜皇帝王姬生鄴王衍皇甫姬生郢王術是衍為兄術為弟今本紀乃以術為兄衍為弟而王號亦互異此本紀訛也又衍本紀作衎靜帝初既名衍則其弟焉得復以衍為名此諸王𫝊訛也周書卷八考證
