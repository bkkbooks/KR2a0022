body:
  text: 周書卷三十八唐令狐德棻等撰列傳第三十蘇亮弟湛湛弟景恕栁蚪呂思禮崔騰董紹薛憕薛真李昶檀翥元偉蘇亮字景順武功人也祖權魏中書侍郎玉門郡守父祐泰山郡守亮少通敏博學好屬文善章奏初舉秀才至洛陽遇河內常景景深器之退而謂人曰秦中才學可以抗山東者將此人乎魏齊王蕭寶夤引為參軍後寶夤開府復為其府主簿從寶夤西征轉記室參軍寶夤遷大將軍仍為之掾寶夤雅知重亮凡有文檄謀議皆以委之尋行武功郡事甚著聲績寶夤作亂以亮為黃門侍郎亮善處人間與物無忤及寶夤敗從之者遇禍唯亮獲全及長孫稚爾朱天光等西討竝以亮為郎中專典文翰纍遷鎮軍將軍光祿大夫散騎常侍岐州大中正賀拔嶽為關西行臺引亮為左丞典機密魏孝武西遷除吏部郎中加衛將軍右光祿大夫大統二年拜給事黃門侍郎領中書舍人魏文帝子宜都王式為秦州刺史以亮為司馬帝謂亮曰黃門侍郎豈可為秦州司馬直以朕愛子出蕃故以心腹相委勿以為恨臨辭賜以御馬七年復為黃門郎加驃騎將軍八年遷都官尚書使持節行北華州刺史封臨涇縣子邑三百戶除中書監領著作修國史亮有機辨善談笑太祖甚重之有所籌議率多會旨記人之善忘人之過薦逹後進常如弗及故當世敬慕焉十四年除祕書監車騎大將軍儀同三司尋拜大行臺尚書出為岐州刺史朝廷以其作牧本州特給路車鼓吹先還其宅並給騎士三千列羽儀逰鄉黨經過故人歡飲旬日然後入州世以為榮十七年徵拜侍中卒於位贈本官亮少與從弟綽俱知名然綽文章少不逮亮至於經畫進趣亮又減之故世稱二蘇焉亮自大統以來無歲不轉官一年或至三遷僉曰才至不怪其速也所著文筆數十篇頗行於世子師嗣以亮名重於時起家為黃門侍郎亮弟湛字景俊少有志行與亮俱著名西土年二十餘舉秀才除奉朝請領侍御史加員外散騎侍郎蕭寶夤西討以湛為行臺郎中深見委任及寶夤將謀叛逆湛時卧疾於家寶夤乃令湛從母弟天水姜儉謂湛曰吾不能坐受死亡今便為身計不復作魏臣也與卿死生榮辱方當共之故以相報湛聞之舉聲大哭儉遽止之曰何得便爾湛曰闔門百口即時屠滅云何不哭哭數十聲徐謂儉曰為我白齊王王本以窮而歸人賴朝廷假王羽翼遂得榮寵至此既屬國步多虞不能竭誠報德豈可乘人間隙便有問鼎之心乎今魏德雖衰天命未改王之恩義未洽於民破亡之期必不旋踵蘇湛終不能以積世忠貞之基一旦為王族滅也寶夤復令儉謂湛曰此是救命之計不得不爾湛復曰凡舉大事當得天下奇士今但共長安博徒小兒輩為此計豈有辦哉湛不忍見荆棘生王户庭也願賜骸骨還舊里庶歸全地下無愧先人寶夤素重之知必不為已用遂聽還武功寶夤後果敗孝莊帝即位徵拜尚書郎帝嘗謂之曰聞卿答蕭寶夤甚有美辭可為我說之也湛頓首謝曰臣自惟言辭不如伍被逺矣然始終不易竊謂過之但臣與寶夤周旋契濶言得盡心而不能令其守節此臣之罪也孝莊大悅加授散騎侍郎尋遷中書侍郎孝武初以疾還鄉里終於家贈散騎常侍鎮西將軍雍州刺史湛弟讓字景恕幼聰敏好學頗有人倫鑒識初為本州主簿稍遷别駕武都郡守鎮逺將軍金紫光祿大夫及太祖為丞相引為府屬甚見親待出為衛將軍南汾州刺史治有善政尋卒官贈車騎大將軍儀同三司涇州刺史柳虯字仲蟠司㑹慶之兄也年十三便專精好學時貴逰子弟就學者竝車服華盛唯虯不事容飾遍授五經略通大義兼博涉子史雅好屬文孝昌中揚州刺史李憲舉虯秀才兖州刺史馮俊引虯為府主簿既而樊子鵠為吏部尚書其兄義為揚州治中加鎮逺將軍非其好也遂棄官還洛陽屬天下喪亂乃退耕於陽城有終焉之志大統三年馮翊王元季海領軍獨孤信鎮洛陽于時舊京荒廢人物罕存唯有虯在陽城裴諏在潁川信等乃俱徵之以虯為行臺郎中諏為都督府屬竝掌文翰時人為之語曰北府裴諏南省柳虯時軍旅務殷虯勵精從事或通夜不寢季海嘗云柳郎中判事我不復重看四年入朝太祖欲官之虯辭母老乞侍醫藥太祖許焉久之為獨孤信開府從事中郎信出鎮隴右因為秦州刺史以虯為二府司馬雖處元僚不綜府事唯在信左右談論而已因使見太祖被留為丞相府記室追論歸朝功封美陽縣男邑二百户虯以史官密書善惡未足懲勸乃上疏曰古者人君立史官非但記事而已蓋所以為監誡也動則左史書之言則右史書之彰善疸惡以樹風聲故南史抗節表崔杼之罪董狐書法明趙盾之愆是知直筆於朝其來久矣而漢魏已還密為記注徒間後世無益當時非所謂將順其美匡救其惡者也且著述之人密書其事縱能直筆人莫之知何止物生橫議亦自異端互起故班固致受金之名陳夀有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知准的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言諸史官記事者請皆當朝顯言其狀然後付之史閣庶令是非明著得失無隱使聞善者日修有過者知懼敢以愚管輕冒上聞乞以瞽言訪之衆議事遂施行十四年除祕書丞祕書雖領著作不參史事自虯為丞始令監掌焉十六年遷中書侍郎修起居注仍領丞事時人論文體者有古今之異虯又以為時有今古非文有今古乃為文質論文多不載魏廢帝初遷祕書監加車騎大將軍儀同三司虯脫略人間不事小節弊衣踈食未嘗改操人或譏之虯曰衣不過適體食不過充饑孜孜營求徒勞思慮耳魏恭帝元年冬卒時年五十四贈兖州刺史諡曰孝有文章數十篇行於世子鴻漸嗣呂思禮東平夀張人也性溫潤不雜交遊年十四受學於徐遵明長於論難諸生為之語曰講書論易其鋒難敵十九舉秀才對䇿髙第除相州功曹參軍葛榮圍鄴思禮有守禦勳賜爵平陸縣伯除欒城令普泰中僕射司馬子如薦為尚書二千户郎中尋以地寒被出兼國子博士乃求為關西大行臺賀拔嶽所重專掌機密甚得時譽嶽為侯莫陳悅所害趙貴等議遣赫連逹迎太祖思禮預其謀及太祖為關西大都督以思禮為府長史尋除行臺右丞以迎魏孝武功封汝陽縣子邑四百戶加冠軍將軍拜黃門侍郎魏文帝即位領著作郎除安東將軍都官尚書兼七兵殿中二曹事從擒竇泰進爵為侯邑八百户大統四年以謗訕朝政賜死思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升沙苑之捷命為露布食頃便成太祖歎其工而且速所為碑誄表頌竝傳於世七年追贈車騎大將軍定州刺史子亶嗣大象末位至駕部下大夫時有博陵崔騰新蔡董紹竝早有名譽歷職清顯騰為丞相府長史紹為御史丞俱以投書謗議賜死薛憕字景猷河東汾隂人也曾祖𢎞敞值赫連之亂率宗人避地襄陽憕早喪父家貧躬耕以飬祖母有暇則覽文籍時人未之奇也江表取人多以世族憕既羇旅不被擢用然負才使氣未嘗趣世祿之門左中郎將京兆韋潛度謂憕曰君門地非下身材不劣何不􅗓裾數參吏部憕曰世胄躡高位英俊沉下僚古人以為歎息竊所未能也潛度告人曰此年少極慷慨但不遭時耳孝昌中杖䇿還洛陽先是憕從祖真度與族祖安都擁徐兖歸魏其子懷俊見憕甚相親善屬爾朱榮廢立遂還河東止懷俊家不交人物終日讀書手自抄略將二百卷唯郡守元襲時相要屈與之抗禮懷俊每曰汝還鄉里不營産業不肯取妻豈復欲南乎憕亦恬然自處不改其舊普泰中拜給事中加伏波將軍及齊神武起兵憕乃東遊陳梁間謂族人孝通曰高歡阻兵陵上喪亂方始關中形勝之地必有霸王居之乃與孝通俱逰長安侯莫陳悅聞之召為行臺郎中除鎮遠將軍步兵校尉及悅害賀拔嶽軍人咸相慶慰憕獨謂所親曰悅才略本寡輒害良將敗亡之事其則不遠吾屬今即為人所虜何慶慰之有乎聞者以憕言為然乃有憂色尋而太祖平悅引憕為記室參軍魏孝武西遷授征虜將軍中散大夫封夏陽縣男邑二百户魏文帝即位拜中書侍郎加安東將軍增邑百户進爵為伯大統四年宣光清徽殿初成憕為之頌魏文帝又造二欹器一為二仙人共持一鉢同處一盤鉢蓋有山山有香氣一仙人又持金瓶以臨器上以水灌山則出於瓶而注乎器煙氣通發山中謂之仙人欹器一為二荷同處一盤相去盈尺中有蓮下垂器上以水注荷則出於蓮而盈乎器為鳬鴈蟾蜍以飾之謂之水芝欹器二盤各處一牀鉢圓而牀方中有人言三才之象也皆置清徽殿前器形似觥而方滿則平溢則傾憕各為作頌大統初儀制多闕太祖令憕與盧辨檀翥等參定之自以流離世故不聽音樂雖幽室獨處嘗有戚容後坐事死子舒嗣官至禮部下大夫儀同大將軍聘陳使副薛置河東汾隂人也祖遵彥魏平逺將軍河東郡守安邑侯父又尚書吏部郎清河廣平二郡守置幼覽篇籍好屬文年未弱冠為州主簿郡功曹起家奉朝請稍遷左將軍太中大夫從魏孝武西遷封郃陽縣子邑四百户進號中軍將軍魏廢帝元年領著作佐郎修國史尋拜中書侍郎修起居注遷中書令車騎大將軍儀同三司燕公于謹征江陵以置為司録軍中謀略置竝參之江陵平進爵為伯增邑五百户朝廷方改物創制欲行周禮乃令置與小宗伯盧辨斟酌古今共詳定之六官建授內史下大夫孝閔帝踐阼進爵為侯增邑五百户轉御正中大夫時前中書監盧柔學業優深文藻華贍而置與之方駕故世號曰盧薛焉久之進位驃騎大將軍開府儀同三司出為浙州刺史卒於位吏民哀惜之贈虞州刺史諡曰理所著文筆二十餘卷行於世又撰西京記三卷引據該洽世稱其博聞焉置性至孝雖年齒已衰職務繁廣至於溫凊之禮朝夕無違當時以此稱之子明嗣大象末儀同大將軍清水郡守李昶頓丘臨黃人也小名那祖彪名重魏朝為御史中尉父遊亦有才行為當世所稱遊兄志為南荆州刺史遊隨從至州屬爾朱之亂與志俱奔江左昶性峻急不雜交遊幼年已解屬文有聲洛下時洛陽創置明堂昶年十數歲為明堂賦雖優洽未足而才制可觀見者咸曰有家風矣初謁太祖太祖深奇之厚加資給令入太學太祖每見學生必問才行於昶昶神情清悟應對明辨太祖每稱歎之綏德公陸通盛選僚寀請以昶為司馬太祖許之昶雖年少通特加接待公私之事咸取決焉又兼二千石郎中典儀注纍遷都官郎中相州大中正丞相府東閣祭酒中軍將軍銀青光祿大夫昶雖處郎官太祖恆欲以書記委之於是以昶為丞相府記室參軍著作郎修國史轉大行臺郎中中書侍郎頃之轉黃門侍郎封臨黃縣伯邑五百户太祖嘗謂昶曰卿祖昔在中朝為御史中尉卿操尚貞固理應不墜家風但孤以中尉彈劾之官愛憎所在故未即授卿耳然此職久曠無以易卿乃奏昶為御史中尉歲餘加使持節車騎大將軍儀同三司賜姓宇文氏六官建拜內史下大夫進爵為侯增邑五百户遷內史中大夫世宗初拜御伯中大夫武成元年除中外府司録保定初進驃騎大將軍開府儀同三司二年轉御正中大夫時以近侍清要盛選國華乃以昶及安昌公元則中都公陸逞臨淄公唐瑾等竝為納言尋進爵為公增邑通前一千三百户五年出為昌州刺史在州遇疾啓求入朝詔許之還未至京卒於路時年五十贈相瀛二州刺史昶於太祖世已當樞要兵馬處分專以委之詔冊文筆皆昶所作也及晉公護執政委任如舊昶常曰文章之事不足流於後世經邦致治庶及古人故所作文筆了無藁草唯留心政事而已又以父在江南身寓關右自少及終不飲酒聽樂時論以此稱焉子丹嗣時有高平檀翥字鳳翔好讀書善屬文能鼓瑟早為琅邪王誦所知年十九為魏孝明帝挽郎其後司州牧城陽王元徽以翥為從事非其好也尋謝病客逰三輔時毛遁為行臺鎮北雍州表翥為行臺郎中㑹爾朱天光東拒齊神武翥隨赴洛除西兖州録事參軍歷司空田曹參軍加鎮逺將軍兼殿中侍御史臺中表奏皆翥為之尋副毛鴻賓鎮潼關加前將軍大中大夫魏孝武西遷賜爵高唐縣子兼中書舍人修國史加鎮軍將軍後坐談論輕躁為黃門侍郎徐招所駁死於廷尉獄元偉字猷道河南洛陽人也魏昭成之後曾祖忠尚書左僕射陽城王祖盛通直散騎常侍陽城公父順以左衛將軍從魏孝武西遷拜中書監雍州刺史開府儀同三司封濮陽王偉少好學有文雅弱冠授員外散騎侍郎以侍從之勞賜爵高陽縣伯大統初拜伏波將軍度支郎中領太子舍人十一年遷太子庶子領兵部郎中尋拜東南道行臺右丞十六年進位車騎大將軍儀同三司以魏氏宗室進爵南安郡王邑五百户十七年除幽州都督府長史及尉遲迥伐蜀以偉為司録書檄文記皆偉之所為蜀平以功增邑五百户六官建拜師氏下大夫爵隨例降改封淮南縣公孝閔帝踐祚除晉公護府司録世宗初拜師氏中大夫受詔於麟趾殿刋正經籍尋除隴右總管府長史加驃騎大將軍開府儀同三司保定二年遷成州刺史偉政尚清靜百姓悅附流民復業者三千餘口天和元年入為匠師中大夫轉司宗中大夫六年出為隨州刺史偉辭以母老不拜還為司宗尋以母憂去職建德二年復為司宗轉司㑹中大夫兼民部中大夫遷小司寇四年以偉為使主報聘于齊是秋高祖親戎東討偉遂為齊人所執六年齊平偉方見釋高祖以其久被幽縶加授上開府大象二年除襄州刺史進位大將軍偉性溫柔好虛靜居家不治生業篤學愛文政事之暇未嘗棄書謹慎小心與物無忤時人以此稱之初自鄴還也庾信贈其詩曰虢亡垂棘反齊平寶鼎歸其為辭人所重如此後以疾卒太祖天縱寬仁性罕猜忌元氏戚屬竝保全之內外任使布於列職孝閔踐祚無替前緒明武纘業亦遵先志雖天厭魏德鼎命已遷枝葉榮茂足以逾於前代矣然簡牘散亡事多湮沒今録其名位可知者附於此云柱國大將軍太傅大司徒廣陵王元欣柱國大將軍特進尚書令少師義陽王元子孝尚書僕射馮翊王元季海七兵尚書陳郡王元𤣥大將軍淮安王元育大將軍梁王元儉大將軍尚書令少保小司徒廣平郡公元贊大將軍納言小司空荆州總管安昌郡公元則侍中驃騎大將軍開府儀同三司少師韓國公元羅侍中驃騎大將軍開府儀同三司吏部尚書魯郡公元正侍中驃騎大將軍開府儀同三司中書監洵州刺史宜都郡公元顔子侍中驃騎大將軍開府儀同三司鄯州刺史安樂縣公元夀侍中驃騎大將軍開府儀同三司武衛將軍遂州刺史房陵縣公元審史臣曰太祖除暴寧亂創業開基昃食求賢共康庶政既焚林而訪阮亦榜道以求孫可謂野無遺才朝多君子蘇亮等竝學稱該博文擅雕龍或揮翰鳳池或著書麟閣咸居祿位各逞琳琅擬彼陳徐慙後生之可畏論其任遇實當時之良選也魏文帝有言古今文人類不護細行其呂思禮薛憕之謂也周書卷三十八周書卷三十八考證蘇亮傳祖權北史作祖雅字天祜呂思禮傳乃求為關西大行臺賀拔嶽所重北史云乃求為關西大行臺郎中與姚幼瑜茹文就俱入關為行臺賀拔嶽所重此脫十五字周書卷三十八考證
