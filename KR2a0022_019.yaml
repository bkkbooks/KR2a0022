body:
  text: 周書卷十九唐令狐德棻等撰列傳第十一達奚武子震侯莫陳順豆盧寧宇文貴楊忠王雄達奚武字成興代人也祖眷魏懷荒鎮將父長汧城鎮將武少倜儻好馳射為賀㧞岳所知岳征闗右引為别將武遂委心事之以戰功拜羽林監子都督及岳為侯莫陳悦所害武與趙貴收岳屍歸平凉同翊戴太祖從平悦除中散大夫都督封須昌縣伯邑三百户魏孝武入闗授直寢轉大丞相府中兵參軍大統初出為東秦州刺史加散騎常侍進爵為公齊神武與竇泰高敖曹三道来侵太祖欲并兵擊竇泰諸將多異議唯武及蘇綽與太祖意同遂擒之齊神武乃退太祖進圖𢎞農遣武從兩騎覘候動靜武與其候騎遇即便交戰斬六級獲三人而反齊神武趣沙苑太祖復遣武覘之武從三騎皆衣敵人衣服至日暮去營百歩下馬濳聽得其軍號因上馬歴營若警夜者有不如法者往往撻之具知敵之情狀以告太祖太祖深嘉焉遂從破之除大都督進爵高陽郡公拜車騎大將軍儀同三司四年太祖援洛陽武率騎一千為前鋒至榖城與李弼破莫多婁貸文進至河橋武又力戰斬其司徒高敖曹遷侍中驃騎大將軍開府儀同三司出為北雍州刺史復戰邙山時大軍不利齊神武乘勝進至陜武率兵禦之乃退久之進位大將軍十七年詔武率兵三萬經畧漢川梁將楊贒以武興降梁深以白馬降武分兵守其城梁梁州刺史宜豐侯蕭循固守南鄭武圍之數旬循乃請服武為解圍㑹梁武陵王蕭紀遣其將楊乾運等將兵萬餘人救循循於是更據城不出恐援軍之至表裏受敵乃簡精騎三千逆擊乾運於白馬大破之乾運退走武乃陳蜀軍俘級於城下循知援軍被破乃降率所部男女三萬口入朝自劒以北悉平明年武振旅還京師朝議初欲以武為柱國武謂人曰我作柱國不應在元子孝前固辭不受以大將軍出鎮玊壁武乃量地形勝立樂昌胡營新城三防齊將高茍子以千騎攻新城武邀擊之悉虜其衆孝閔帝踐阼拜柱國大司冦齊北豫州刺史司馬消難舉州来附詔武與楊忠迎消難以歸武成初轉大宗伯進封鄭國公邑萬户齊將斛律敦侵汾絳武以萬騎禦之敦退武築栢壁城留開府權嚴薛羽生守之保定三年遷太保其年大軍東伐隋公楊忠引突厥自北道武以三萬騎自東道期會晉陽武至平陽後期不進而忠已還武尚未知齊將斛律明月遺武書曰鴻鶴已翔於寥廓羅者猶視於沮澤也武覽書乃班師出為同州刺史明年從晉公䕶東伐時尉遲迥圍洛陽為敵所敗武與齊王憲於邙山禦之至夜收軍憲欲待明更戰武欲還固爭未決武曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅乆矣備見形勢大王少年未經事豈可將數營士衆一旦棄之乎憲從之遂全軍而返天和三年轉太傅武賤時奢侈好華飾及居重位不持威儀行常單馬左右止一兩人而已外門不施戟恒晝掩一扉或謂武曰公位冠羣后功名蓋世出入儀衞須稱具瞻何輕率若是武曰子之言非吾心也吾在布衣豈望富貴不可頓忘疇昔且天下未平國恩未報安可過事威容乎言者慙而退武之在同州也時屬天旱高祖勑武祀華岳岳廟舊在山下常所禱祈武謂僚屬曰吾備位三公不能爕理隂陽遂使盛農之月久絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峯展誠尋其靈奥岳既高峻千仭壁立巖路險絶人跡罕通武年踰六十唯將數人攀藤援枝然後得上於是稽首祈請陳百姓懇誠晚不得還即於岳上藉草而宿夢見一白衣人来執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近霑洽高祖聞之璽書勞武曰公年尊徳重弼諧朕躬比以隂陽愆序時雨不降命公求祈止言廟所不謂公不憚危險遂乃逺陟高峰但神道聰明無幽不燭感公至誠甘澤斯應聞之嘉賞無忘于懷今賜公雜綵百疋公其善思嘉猷匡朕不逮念坐而論道之義勿復更煩筋力也武性貪恡其為大司㓂也在庫有萬釘金帶當時寶之武因入庫乃取以歸主者白晉公䕶以武勲不彰其過因而賜之時論深鄙焉五年十月薨年六十七贈太傅十五州諸軍事同州刺史諡曰桓子震嗣震字猛畧少驍勇便騎射走及奔馬膂力過人大統初起家員外散騎常侍太祖嘗於渭北校獵時有兎過太祖前震與諸將競射之馬倒而墜震足不傾躓因歩走射之一發中兎顧馬纔起遂回身騰上太祖喜曰非此父不生此子賜武雜綵一百叚十六年封昌邑縣公一千户累遷撫軍將軍銀青光禄大夫通直散騎常侍車騎大將軍儀同三司散騎常侍世宗初拜司右中大夫加驃騎大將軍開府儀同三司改封普寧縣公武成初進爵廣平郡公除華州刺史震雖生自膏腴少習武藝然導民訓俗頗有治方秩滿還朝為百姓所戀保定四年大軍東討諸將皆奔退震與敵交戰軍遂獨全天和元年進位大將軍率衆征稽胡破之六年拜柱國建徳初襲爵鄭國公出為金州總管十一州九防諸軍事金州刺史四年從高祖東伐為前三軍總管五年又從東伐率歩騎一萬守統軍川攻克義寧烏蘇二鎮破并州進位上柱國仍從平鄴賜妾二人女樂一部及珍玩等拜大宗伯震父嘗為此職時論榮之宣政中出為原州總管三州二鎮諸軍事原州刺史尋罷歸隋開皇初薨於家震弟惎車騎將軍渭南縣子大象末為益州刺史與王謙據蜀起兵尋敗被誅侯莫陳順太保梁國公崇之兄也少豪俠有志度初事爾朱榮為統軍後從賀拔勝鎮井陘武泰初討葛榮平邢杲征韓婁皆有功拜輕車將軍羽林監又從破元顥進寧朔將軍越騎校尉普泰元年除持節征西將軍封木門縣子邑三百户尋加散騎常侍千牛備身衞將軍閤内大都督從魏孝武入闗順與太祖同里閈素相友善且其弟崇先在闗中太祖見之甚歡乃進爵彭城郡公邑一千户大統元年拜衞尉卿授儀同三司及梁企定圍逼河州以順為大都督與趙貴討破之即行河州事後從太祖破沙苑以功增邑千户四年魏文帝東討與太尉王盟僕射周惠達等留鎮長安時趙青雀反盟及惠達奉魏太子出次渭北順於渭橋與賊戰頻破之賊不敢出魏文帝還親執順手曰渭橋之戰卿有殊力便解所服金鏤玉梁帶賜之南岐州氐苻安夀自號太白王攻破武都州郡騷動復以順為大都督往討之而賊屯兵要險軍不得進順乃設反間離其腹心立信賞誘其徒屬安夀知勢窮廹遂率部落一千家赴軍款附時順弟崇又封彭城郡公封順河間郡公明年加驃騎大將軍開府儀同三司行西夏州事安平郡公十六年拜大將軍出為􅍮州總管山南道五十二州諸軍事􅍮州刺史孝閔帝踐阼拜少師進位柱國其年薨豆盧寧字永安昌黎徒何人其先本姓慕容氏前燕之支庶也高祖勝以燕皇始初歸魏授長樂郡守賜姓豆盧氏或云避難改焉父長柔𤣥鎮將有威重見稱於時武成初以寧著勲追贈柱國大將軍少保涪陵郡公寧少驍果有志氣身長八尺美容儀善騎射永安中以别將隨爾朱天光入闗加授都督又以破万俟醜奴功賜爵靈夀縣男嘗與梁企定遇於平凉川相與肄射乃於百歩懸莎草以射之七發五中定服其能贈遺甚厚天光敗後侯莫陳悦反太祖討悦寧與李弼率衆歸太祖魏孝武西遷以奉迎勲封河陽縣伯邑五百户大統元年除前將軍進爵為侯增邑三百户遷顯州刺史顯州大中正尋拜撫軍將軍銀青光祿大夫進爵為公增邑五百户授鎮東將軍金紫光祿大夫從太祖擒竇泰復𢎞農破沙苑除武衞大將軍兼大都督尋進車騎大將軍儀同三司增邑八百户拜北華州刺史在州未幾以亷平著稱加散騎常侍七年從于謹破稽胡帥劉平伏於上郡及梁企定反以寧為軍司監隴右諸軍事賊平進位侍中使持節驃騎大將軍開府儀同三司九年從太祖迎高仲密與東魏戰於邙山遷左衞將軍進爵范陽郡公增邑四百户十六年拜大將軍羌帥傍乞鐵忽及鄭五醜等反叛寧率衆討平之魏恭帝二年改封武陽郡公遷尚書右僕射梁將王琳遣其將侯方兒潘純陁㓂江陵寧與蔡祐鄭永等討之方兒等遁走三年武興氐及固查氐魏大王等相應反叛寧復討平之孝閔帝踐阼授柱國大將軍武成初出為同州刺史復督諸軍討稽胡郝阿保劉桑徳等破之軍還遷大司㓂進封楚國公邑萬户别食鹽亭縣一千户收其租賦保定四年授岐州刺史屬大兵東討寧輿疾從軍五年薨於同州時年六十六贈太保同鄜等十州諸軍事同州刺史諡曰昭初寧未有子養弟永恩子勣及生子讚親屬皆請讚為嗣寧曰兄弟之子猶子也吾何擇焉遂以勣為世子世以此稱之及寧薨勣襲爵少歴顯位大象末上柱國利州總管讚以寧勲建徳初賜爵華陽縣侯累遷開府儀同大將軍進爵武陽郡公永恩少有識度為時軰所稱初隨寧事侯莫陳悦後與寧俱歸太祖授殄㓂將軍以迎魏孝武功封新興縣伯邑五百户屢逢征討皆有功拜龍驤將軍中散大夫大統八年除直寢右親信都督尋轉都督加通直散騎常侍十六年拜使持節車騎大將軍儀同三司魏廢帝元年進位驃騎大將軍開府儀同三司二年出為成州刺史魏恭帝元年進爵龍来縣侯三年大將軍安政公史寧隨突厥可汗入吐谷渾令永恩率騎五千鎮河鄯二州以為邉防孝閔帝踐阼授鄯州刺史改封沃野縣公增邑一千户尋轉隴右總管府長史武成元年遷都督利沙文三州諸軍事利州刺史時文州蠻叛永恩率兵擊破之保定元年入為司會中大夫二年復出為隴右總管府長史寧以佐命元勲封楚國公請以先封武陽郡三千户益沃野之封詔許焉又增邑并前四千五百户尋卒官年四十八贈少保幽冀等五州諸軍事幽州刺史諡曰敬子通嗣宇文貴字永貴其先昌黎大棘人也徙居夏州父莫豆干保定中以貴著勲追贈柱國大將軍少傅夏州刺史安平郡公貴母初孕貴夢有老人抱一兒授之曰賜爾是子俾夀且貴及生形類所夢故以永貴字之貴少從師受學嘗輟書歎曰男兒當提劒汗馬以取公侯何能如先生為博士也正光末破六汗拔陵圍夏州刺史源子雍嬰城固守以貴為統軍救之前後數十戰軍中咸服其勇後送子雍還賊帥叱干麒麟薛崇禮等處處屯聚出兵邀截貴每奮擊輒破之除武騎常侍又從子雍討葛榮軍敗奔鄴為榮所圍賊屢来攻貴每縋而出戰賊莫敢當其鋒然兇徒寔繁圍乆不解貴乃於地道濳出北見爾朱榮陳賊兵勢榮深納之因從榮擒葛榮於滏口加别將又從元天穆平邢杲轉都督元顥入洛貴率鄉兵從爾朱榮焚河橋力戰有功加征虜將軍封革融縣侯邑一千户除郢州刺史入為武衞將軍闗内大都督從魏孝武西遷進爵化政郡公大統初遷右衞將軍貴善騎射有將率才太祖又以宗室甚親委之三年進車騎大將軍儀同三司與獨孤信入洛陽東魏潁州刺史賀若統據潁川来降東魏遣其將堯雄趙育是云寶率衆二萬攻潁貴自洛陽率歩騎二千救之軍次陽翟雄等已度馬橋去潁川三十里東魏行臺任祥又率衆四萬餘與雄合諸將咸以彼衆我寡不可爭鋒貴曰兵機倚伏固不可以常理論古人能以寡制衆者皆由預覩成敗决必然之策耳吾雖闇於成事然謂進與賀若合勢為計之上者請為諸軍説之堯雄等必以為潁川孤危勢非其敵又謂吾寡弱獨進若悉力以攻潁必指掌可破既陷潁川便與任祥軍合同惡相濟為害更甚吾今屯兵陽翟便是入其數内若賀若一䧟吾軰坐此何為進據潁川有城可守雄見吾入城出其不意進則狐疑退則不可然後與諸軍盡力撃之何往不克願勿疑也遂入潁川雄等稍前貴率千人背城為陳與雄合戰貴馬中流矢乃短兵歩鬭士衆用命雄大敗輕走趙育於陳降獲其輜重俘萬餘人盡放令還任祥聞雄敗遂不敢進尋而儀同怡峯率騎五百赴貴貴乘勝逼祥祥退保宛陵追及之會日暝結陳相持明旦合戰俘斬甚多祥軍既敗是云寶亦降師還魏文帝在天遊園以金巵置侯上命公卿射中者即以賜之貴一發而中帝笑曰由基之妙正當爾耳進侍中驃騎大將軍開府儀同三司歴夏岐二州刺史十六年遷中外府左長史進位大將軍宕昌王梁彌定為宗人獠甘所逐來奔又有羌酋傍乞鐵忽因梁企定反後據有渠株川擁種類數千家與渭州民鄭五醜扇惑諸羗同反憑險置柵者十餘所太祖令貴與豆盧寜史寧討之貴等擒斬鐵忽及五醜史寧又别擊獠甘破之乃納彌定并於渠株川置岷州朝廷美其功遂於粟坂立碑以紀其績魏廢帝初出為岐州刺史二年授大都督興西蓋等六州諸軍事興州刺史先是興州氐反自貴至州人情稍定貴表請於梁州置屯田數州豐足三年詔貴代尉遲迥鎮蜀時隆州人開府李光賜反於鹽亭與其黨帛玉成宼食堂譙淹蒲皓馬術等攻圍隆州州人李祏亦聚衆反開府張遁舉兵應之貴乃命開府叱奴興救隆州又令開府成亞擊祏及遁勢蹙遂降執送京師除都督益潼等八州諸軍事益州刺史就加小司徒先是蜀人多刼盗貴乃召任俠傑健者署為遊軍二十四部令其督捕由是頗息孝閔帝踐阼進位柱國拜御正中大夫武成初與賀蘭祥討吐谷渾軍還進封許國公邑萬户舊爵廻封一子遷大司空治小冢宰歴大司徒遷太保貴好音樂耽奕碁留連不倦然好施愛士時人頗以此稱之保定之末使突厥迎皇后天和二年還至張掖薨贈太傅諡曰穆子善嗣歴位開府儀同三司大將軍柱國洛州刺史以罪免尋復本官除大宗伯大象末進位上柱國善弟忻少以父軍功賜爵化政郡公驍勇絶倫有將帥才畧大象末位至上柱國進封英國公忻弟愷少好學頗解屬文雜藝多通尤精巧思亦以父軍功賜爵雙泉縣伯尋襲祖爵安平郡公起家右侍上士稍遷御正中大夫保定中位至上開府是云寶趙育旣至初並拜車騎大將軍儀同三司寶後累遷至大將軍都督凉甘𤓰州諸軍涼州刺史賜爵洞城郡公世宗時吐谷渾侵逼涼州寶與戰不利遂殁於陣楊忠𢎞農華隂人也小名奴奴高祖元夀魏初為武川鎮司馬因家於神武樹頽焉祖烈龍驤將軍太原郡守父禎以軍功除建逺將軍屬魏末䘮亂避地中山結義徒以討鮮于脩禮遂死之保定中以忠勲追贈柱國大將軍少保興城郡公忠美髭髯身長七尺八寸狀貎瓌偉武藝絶倫識量沉深有將帥之畧年十八客遊泰山會梁兵攻郡䧟之遂被執至江左在梁五年從北海王顥入洛除直閤將軍顥敗爾朱度律召為帳下統軍及爾朱兆以輕騎自并州入洛陽忠時預焉賜爵昌縣伯拜都督又别封小黄縣伯從獨孤信破梁下溠戌平南陽並有功及齊神武舉兵内侮忠時随信在洛遂從魏孝武西遷進爵為侯仍從平潼闗破回洛城除安西將軍銀青光祿大夫東魏􅍮州刺史辛纂據穰城忠從獨孤信討之纂戰敗退走信令忠與都督康洛兒元長生為前驅馳至其城叱門者曰今大軍已至城中有應爾等求活何不避走門者盡散忠與洛兒長生乘城而入彎弓大呼纂兵衞百餘人莫之敢禦斬纂以狥城中懾服居半歲以東魏之逼與信奔梁梁武帝深竒之以為大徳主帥闗外侯大統三年與信俱歸闕太祖召居帳下嘗從太祖狩於龍門忠獨當一猛獸左挾其腰右拔其舌太祖壯之北臺謂猛獸為揜于因以字之從擒竇泰破沙苑遷征西將軍金紫光祿大夫進爵襄城縣公河橋之役忠與壯士五人力戰守橋敵人遂不敢進以功除左光祿大夫雲州刺史兼大都督又與李逺破黑水稽胡并與怡峯解玉壁圍轉洛州刺史邙山之戰先登䧟陳除大都督進車騎大將軍儀同三司散騎常侍追封母蓋氏為北海郡君尋除都督朔燕顯蔚四州諸軍事朔州刺史加侍中驃騎大將軍開府儀同三司及東魏圍潁川蠻帥日柱清據險為亂忠率兵討平之時侯景渡江梁武䘮敗其西義陽郡守馬伯符以下溠城降朝廷因之將經畧漢沔乃授忠都督三荆二襄二廣南雍平信隨江二郢浙十五州諸軍事鎮穰城以伯符為鄉導攻梁齊興郡及昌州皆克之梁雍州刺史岳陽王蕭詧雖稱藩附而尚有貳心忠自樊城觀兵於漢濵易旗遞進實騎二千詧登樓望之以為三萬也懼而服焉梁司州刺史柳仲禮留其長史馬岫守安陸自率兵騎一萬寇襄陽初梁竟陵郡守孫暠以其郡来附太祖命大都督符貴往鎮之及仲禮至暠乃執貴以降仲禮又進遣其將王叔孫與暠同守太祖怒乃令忠率衆南伐攻梁随郡克之獲其守將桓和所過城戍望風請服忠乃進圍安陸仲禮聞随郡䧟恐安陸不守遂馳歸赴援諸將恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可卒㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮回師在近路吾出其不意以竒兵襲之彼怠我奮一舉必克則安陸不攻自拔諸城可𫝊檄而定也於是選騎二千衘枚夜進遇仲禮於淙頭忠親自陷陳擒仲禮悉俘其衆馬岫以安陸降王叔孫斬孫暠以竟陵降皆如忠所策梁元帝遣使送子方畧為質并送載書請魏以石城為限梁以安陸為界乃旋師進爵陳留郡公十七年梁元帝逼其兄邵陵王綸綸北度與其前西陵郡守羊思達要隨陸土豪段珍寳夏侯珍洽合謀送質於齊欲来宼掠汝南城主李素綸故吏也開門納焉梁元帝密報太祖太祖乃遣忠督衆討之詰旦陵城日昃而尅擒蕭綸數其罪而殺之并獲其安樂侯昉亦殺之初忠之擒柳仲禮遇之甚厚仲禮至京師乃譖忠於太祖言其在軍大取金寳珍玩等太祖欲覆按之惜其功高乃出忠忠忿恚悔不殺仲禮故至此獲綸等竝加戮焉忠間歲再舉盡定漢東之地寛以御衆甚得新附之心魏恭帝初賜姓普六如氏行同州事及于謹伐江陵忠為前軍屯江津遏其走路梁人束刃於象鼻以戰忠射之二象反走及江陵平朝廷立蕭詧為梁王令忠鎮穰城以為犄角之勢别討沔曲諸蠻皆克之孝閔帝踐阼入為小宗伯齊人宼東境忠出鎮蒲坂及司馬消難請降忠與柱國達奚武援之於是共率騎士五千人兼馬一疋從間道馳入齊境五百里前後遣三使報消難而皆不反命去豫州三十里武疑有變欲還忠曰有進死無退生獨以千騎夜趨城下四面峭絶徒聞擊柝之聲武親来麾數百騎以西忠勒餘騎不動候門開而入乃馳遣召武時齊鎮城伏敬遠勒甲士二千人據東陴舉烽嚴警武憚之不欲保城乃多取財帛以消難及其屬先歸忠以三千騎為殿到洛南皆解鞍而臥齊衆來追至於洛北忠謂將士曰但飽食今在死地賊必不敢渡水當吾鋒齊兵陽若渡水忠馳將撃之齊兵不敢逼遂徐引而還武歎曰逹奚武自是天下健兒今日服矣進位柱國大將軍武成元年進封隨國公邑萬户别食竟陵縣一千户收其租賦尋治御正中大夫保定二年遷大司空時朝議將與突厥伐齊公卿咸曰齊氏地半天下國富兵强若從漠北入并州極為險阻且大將斛律明月未易可當今欲探其巢窟非十萬不可忠獨曰師克在和不在衆萬騎足矣明月竪子亦何能為三年乃以忠為元帥大將軍楊纂李穆王傑爾朱敏及開府元壽田𢎞慕容延等十餘人皆𨽻焉又令逹奚武帥歩騎三萬自南道而進期㑹晉陽忠乃留敏據什賁遊兵河上忠出武川過故宅祭先人饗將士席卷二十餘鎮齊人守陘嶺之隘忠縱竒兵奮擊大破之又留楊纂屯靈丘為後拒突厥木汗可汗控也頭可汗歩雖可汗等以十萬騎來會四年正月朔攻晉陽是時大雪數旬風寒慘烈齊人乃悉其精鋭鼓噪而出突厥震駭引上西山不肯戰衆皆失色忠令其衆曰事勢在天無以衆寡為意乃率七百人歩戰死者十四五以武後期不至乃班師齊人亦不敢逼突厥於是縱兵大掠自晉陽至欒城七百餘里人畜無孑遺俘斬甚衆高祖遣使迎勞忠於夏州及至京師厚加宴賜高祖將以忠為太傅晉公䕶以其不附已難之乃拜總管涇幽靈雲鹽顯六州諸軍事涇州刺史是嵗大軍又東伐晉公䕶出洛陽令忠出沃野以應接突厥時軍糧既少諸將憂之而計無所出忠曰當權以濟事耳乃招誘稽胡諸首領咸令在坐使王傑盛軍容鳴鼓而至忠陽怪而問之傑曰大冢宰已平洛陽天子聞銀夏之間生胡擾動故使傑就公討之又令突厥使者馳至而告曰可汗更入并州留兵馬十餘萬在長城下故遣問公若有稽胡不服欲來共公破之坐者皆懼忠慰喻而遣之於是諸胡相率歸命饋輸填積屬晉公䕶先退忠亦罷兵還鎮又以政績可稱詔賜錢三十萬布五百疋榖二千斛天和三年以疾還京髙祖及晉公䕶屢臨視焉尋薨年六十二贈太保同朔等十三州諸軍事同州刺史本官如故諡曰桓子堅嗣弟整建德中開府陳留郡公從高祖平齊殁於并州以整死王事詔其子智積襲其官爵整弟惠大象末大宗伯竟陵縣公惠弟嵩以忠勲賜爵興城郡公早卒嵩弟逹亦以忠勲爵周郡公王雄字胡布頭太原人也父崙以雄著勲追贈柱國大將軍少傅安康郡公雄儀貎魁梧少有謀略永安末從賀㧞岳入闗除征西將軍金紫光禄大夫魏孝武西遷授都督封臨貞縣伯邑五百户大統初進爵為公増邑二百户拜武衞將軍加驃騎將軍増邑八百户進大都督尋拜儀同三司増邑三百户遷開府儀同三司加侍中出為岐州刺史進爵武威郡公進位大將軍行同州事十七年雄率軍出子午谷圍梁上津魏興明年克之以其地為東梁州尋而復叛又令雄討之魏恭帝元年賜姓可頻氏孝閔帝踐阼授少𫝊増邑二千户進位柱國大將軍武成初進封庸國公邑萬户尋出為涇州總管諸軍事涇州刺史保定四年從晉公䕶東征雄在途遇病乃自力而進至邙山與齊將斛律明月接戰雄馳馬衝之殺三人明月退走雄追之明月左右皆散矢又盡惟餘一奴一矢在焉雄按矟不及明月者丈餘曰惜爾不殺但生將爾見天子明月乃射雄中額抱馬退走至營而薨時年五十八贈使持節太保同華等二十州諸軍事同州刺史諡曰忠子謙嗣自有傳史臣曰太祖接喪亂之際乘戰争之餘發迹平凉撫征闗右于時外虞孔熾内難方殷羽檄交馳戎軒屢駕終能蕩清逋孽克固鴻基雖禀筭於廟謨實責成於將帥逹奚武等竝兼資勇畧感㑹風雲或効績中權或立功方面均分休慼同濟艱難可謂國之爪牙朝之禦侮者也而武協規太祖得儁小間周瑜赤壁之謀賈詡烏巢之䇿何能以尚一言興邦斯近之矣周書卷十九周書卷十九考證逹奚武傳加散騎常侍進爵為公北史無進爵為公四字太祖復遣武覘之覘諸本訛作追今依北史改正宇文貴傳時隆州人開府李光賜賜北史作義開府張遁舉兵應之遁北史作道周書卷十九考證
