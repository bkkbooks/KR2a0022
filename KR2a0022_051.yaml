body:
  text: 編修今授奉天錦州府知府臣文淳謹言北周書五十卷本紀列𫝊四十二唐祕書丞令狐德棻等撰當武德時棻建言近代無正史即詔與諸臣論撰歷年不能成而罷貞觀二年復詔德棻與岑文本崔仁師撰次周書陳叔逹唐儉共成之宋仁宗時出太清樓本合史館祕閣本又募天下書而取夏竦李巽家本下館閣正其文字其後王安國林希始上焉當周隋時桞蚪牛𢎞各有撰述德棻等撰次不外栁牛兩家然其中頗有可議者蚪為周臣多諱周惡𢎞入隋代便文隋過在蚪與𢎞初無足怪德棻等身居異代而史不直書其失甚矣宇文氏建國倣周禮為六官府兵之制開唐一代良法而是書不為紀録使後人無從參考識小遺大識者譏焉臣等奉敕校勘南北監本字句錯訛悉為改正但宋版不可得見文義可疑祗以北史參訂北史之文既與是書不同未便𥙷入故字有不同從其是者文之遺脫祗加詳注不妄參入以附於闕文之義云臣謹識
