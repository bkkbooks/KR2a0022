body:
  text: 編脩今授奉天錦州府知府臣文淳謹言北周書五十卷本紀列𫝊四十二唐秘書丞令狐徳棻䓁撰當武徳時棻建言近代無正史即詔與諸臣論撰歴年不能成而罷貞觀二年復詔徳棻與岑文本崔仁師撰次周書陳叔逹唐儉共成之宋仁宗時出太清樓本合史館秘閣本又募天下書而取夏竦李巽家本下館閣正其文字其後王安國林希始上焉當周隋時桞蚪牛𢎞各有撰述徳棻䓁撰次不外栁牛両家然其中頗有可議者蚪為周臣多諱周惡𢎞入隋代便文隋過在蚪與𢎞初無足怪徳棻等身居異代而史不直書其失甚矣宇文氏建國倣周禮為六官府兵之制開唐一代良法而是書不為紀録使後人無從参考識小遺大識者譏焉臣䓁奉勅校勘南北監本字句錯訛悉為改正但宋版不可得見文義可疑祗以北史参訂北史之文既與是書不同未便𥙷入故字有不同從其是者文之遺脫祗加詳注不妄参入以附於闕文之義云臣謹識
