body:
  text: 周書卷四十八唐令狐徳棻等撰列傳第四十蕭察子巋子巋子琮八察長子嶚第第五子巖蔡第六岌第子岑巋三子瓛大寳薛大寳弟大業正暉許孝敬王操成魏益徳甄元劉盈尹岑善方王傅准范宗如周君蕭欣袁栁洋岳㳬廸沈游敞徐蕭察字理孫蘭陵人也梁武帝之孫昭明太子統之第三子㓜而好學善屬文尤長佛義特為梁武帝所嘉賞梁普通六年封曲江縣公中大通三年進封岳陽郡王歴官宣惠将軍知石頭戍事琅邪彭城二郡太守東揚州刺史初昭明卒梁武帝舍察兄弟而立簡文内常愧之寵亞諸子以㑹稽人物殷阜一都之會故有此授以慰其心察既以其昆弟不得為嗣常懐不平又以梁武帝衰老朝多秕政有敗亡之漸遂蓄聚貨財交通賔客招募輕俠折節下之其勇敢者多歸附左右遂至數千人皆厚加資給中大同元年除持節都督雍梁東益南北秦五州郢州之竟陵司州之隨郡諸軍事西中郎将領寧蠻校尉雍州刺史察以㐮陽形勝之地又是梁武創基之所時平足以樹根本世亂可以圗霸功遂克己勵節樹恩於百姓務修刑政志存綏養乃下教曰昔之善為政者不獨師所見藉聼衆賢則所聞自逺資鑒外物故在矚致明是以龎参䘏民蓋訪言於髙逸馬援居政每責成於掾史王沉爰加厚賞吕䖍功有所由故能顯美政於當年流芳塵於後代吾以陋識来牧盛藩每慮徳不被民政道或紊中宵拊枕對案忘饑思納良謨以匡弗逮雍州部内有不便於民不利於政長吏貪殘戍将愞弱闗市恣其裒刻豪猾多所苞藏並宻以名聞當加釐正若刺史治道之要弛張未允循酷乖理任用違才或愛狎邪佞或斥廢忠謇彌思啓告用祛未悟鹽梅舟檝允屬良規苦口藥石想勿余隐并廣示鄉閭知其欵意於是境内稱治太清二年梁武帝以察兄河東王譽為湘州刺史徙湘州刺史張纘為雍州以代察纘恃其才望志氣矜驕輕譽少年州府迎侯有闕譽深銜之及至鎮遂託疾不與纘相見後聞侯景作亂頗凌蹙纘纘懼為所擒乃輕舟夜遁将之雍部復慮察拒之梁元帝時鎮江陵與纘有舊纘将因之以斃察兄弟㑹梁元帝與譽及信州刺史桂陽王慥各率所領入援金陵慥下峡至江津譽次江口梁元帝屆郢州之武成屬侯景已請和梁武帝詔罷援軍譽自江口将旋湘鎮慥欲俟梁元帝至謁督府方還州纘時在江陵乃貽梁元帝書曰河東載檣上水欲襲江陵岳陽在雍共謀不逞江陵遊軍主朱榮又遣使報云桂陽住此欲應譽察梁元帝信之乃鑿船沉米斬纜而歸至江陵収慥殺之令其子方等王僧辯等相繼攻譽於湘州譽又告急於察察聞之大怒初梁元帝将援建業令所督諸州並發兵下赴國難察遣府司馬劉方貴領兵為前軍出漢口及将發元帝又使諮議参軍劉㲄喻察令自行詧辭頗不順元帝又怒而方貴先與察不協潛與元帝相知尅期襲察未及發㑹詧以他事召方貴方貴疑謀泄遂據樊城拒命察遣使魏益徳杜岸等衆軍攻之方貴窘急令其子遷超乞師於江陵元帝乃厚資遣纘若将述職而宻援方貴纘次大隄樊城已䧟察擒方貴兄弟及黨與並斬之纘因進至州察遷延不受代乃以西城居之待之以禮軍民之政猶歸於察察以搆其兄弟事始於纘将宻圗之纘懼請元帝召之元帝乃徴纘於察察留不遣杜岸兄弟紿纘曰民觀岳陽殿下勢不仰容不如且徃西山以避此禍使君既得物情逺近必當歸集以此義舉事無不濟纘深以為然因與岸等結盟誓纘又要雍州人席引等於西山聚衆纘乃服婦人衣乗青布轝與親信十餘人出奔引等與杜岸馳告察詧令中兵参軍尹正共岸等率兵追討並擒之纘懼不免因請為沙門詧時以譽危急乃留諮議参軍蔡大寳守㐮陽率衆二萬騎千匹伐江陵以救之于時江陵立栅周遶郭邑而北面未就察因攻之元帝大懼乃遣参軍庾㚟謂察曰正徳肆亂天下崩離汝復效尤将欲何謂吾蒙先帝愛顧以汝兄弟見屬今以姪伐叔逆順安在察謂㚟曰家兄無罪累被攻圍同氣之情豈可坐觀成敗七父若顧先恩豈應若是如能退兵湘水吾便旋斾㐮陽察既攻栅不尅退而築城又盡鋭攻之㑹大雨暴至平地水四尺察軍中霑漬衆頗離心其将杜岸岸弟㓜安及其兄子龕懼察不振以其屬降於江陵察衆大駭其夜遁歸㐮陽器械輜重多没於湕水初察囚張纘於軍至是先殺纘而後退焉杜岸之降也請以五百騎襲㐮陽去城三十里城中覺之蔡大寳乃輔察母保林龔氏登陴閉門拒戰㑹詧夜至襲氏不知其敗謂為賊也至曉見察乃納之岸等以察至遂奔其兄瓛於廣平察遣将尹正薛暉等攻拔之獲瓛岸等并其母妻子女並於㐮陽北門殺之盡誅諸杜宗族親者其㓜稚踈屬下𧖟室又發掘其墳墓燒其骸骨灰而揚之察既與江陵搆隙恐不能自固大統十五年乃遣使稱藩請為附庸太祖令丞相府東閤祭酒榮權使焉察大悦是嵗梁元帝令柳仲禮率衆進圗㐮陽察懼乃遣其妻王氏及世子嶚為質以請救太祖又令榮權報命仍遣開府楊忠率兵援之十六年楊忠擒仲禮平漢東察乃獲安時朝議欲令詧發喪嗣位察以未有璽命辭不敢當榮權時在詧所乃馳還具言其状太祖遂令假散騎常侍鄭穆及榮權持節䇿命察為梁王察乃於襄陽置百官承制封拜十七年察留蔡大寳居守乃自襄陽来朝太祖謂察曰王之来此頗由榮權王欲見之乎詧曰幸甚太祖乃召權與察相見仍謂之曰榮權吉士也寡人與之從事未嘗見其失信察曰榮常侍通二國之言無私故察今者得歸誠魏闕耳魏恭帝元年太祖令柱國于謹伐江陵察以兵會之及江陵平太祖立察為梁主居江陵東城資以江陵一州之地其㐮陽所統盡歸於我察乃稱皇帝於其國年號大定追尊其父統為昭明皇帝廟號髙宗統妃蔡氏為昭徳皇后又尊其所生母龔氏為皇太后立妻王氏為皇后子巋為皇太子其慶賞刑威官方制度並同王者惟上䟽則稱臣奉朝廷正朔至於爵命其下亦依梁氏之舊其戎章勲級則又兼用柱國等官又追贈叔父邵陵王綸太宰諡曰壯武贈兄河東王譽丞相諡曰武桓太祖乃置江陵防主統兵居於西城名曰助防外示助察備禦内實兼防察也初江陵滅梁元帝将王琳㨿湘州志圖匡復及察立琳乃遣其将潘純陁侯方兒来冦察出師禦之純陁等退歸夏口詧之四年察遣其大将軍王操率兵畧取王琳之長沙武陵南平等郡五年王琳又遣其将雷又柔襲陷監利郡太守蔡大有死之尋而琳與陳人相持稱藩乞師於察察許之師未出而琳軍敗附於齊是嵗其太子巋来朝京師詧之六年夏震其前殿崩壓殺二百餘人初江陵平察将尹徳毅説察曰臣聞人主之行與匹夫不同匹夫者飾小行競小廉以取名譽人主者定天下安社稷以成大功今魏虜貪惏罔顧弔民伐罪之義必欲肆其殘忍多所誅夷俘囚士庶並為軍實然此等戚屬咸在江東念其充餌豺狼見拘異域痛心疾首何日能忘殿下方清宇宙紹兹鴻緒悠悠之人不可門到户説其塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讐也誰與為國但魏之精鋭盡萃於此犒師之禮非無故事若殿下為設享㑹因請于謹等為歡彼無我虞當相率而至預伏武士因而斃之分命果毅掩其營壘斬馘逋醜俾無遺噍江陵百姓撫而安之文武官寮随即銓授既荷更生之恵孰不忻戴聖明魏人懾息未敢送死王僧辯之徒折簡可致然後朝服濟江入踐皇極纘堯復禹萬世一時晷刻之間大功可立古人云天與不取反受其咎時至不行反受其殃願殿下恢𢎞逺畧勿懐匹夫之行察不從謂徳毅曰卿之此䇿非不善也然魏人待我甚厚未可背徳若遽為卿計則鄧祁侯所謂人将不食吾餘也既而闔城長㓜被虜入闗又失㐮陽之地詧乃追悔曰恨不用尹徳毅之言以至於是又見邑居殘毁干戈日用恥其威畧不振常懐憂憤乃著愍時賦以見意其詞曰嗟余命之舛薄實賦運之逢屯既殷憂而彌嵗復坎壇以相隣晝營營而至晚夜耿耿而通晨望否極而云泰何杳杳而無津悲晉璽之遷趙痛漢鼎之移新無田范之明畧愧夷齊之得仁遂胡顔而茍免謂小屈而或申豈妖沴之無已何國歩之長淪恨少生而輕弱夲無志於爪牙謝兩章之雄勇恧二東之英華豈三石於杜鄠異五馬於琅邪直受性而好善類蓬生之在麻冀無咎而霑慶将保静而蠲邪何昊穹之弗惠值上帝之紆奢神州鞠為茂草赤縣遶於長虵徒仰天而太息空撫襟而咨嗟惟古人之有懐尚或感於知己况託萼於霄極寵渥流於無已或小善而必襃時片言而見美昔待罪於禹川歴三考而無紀𫉬免戾於明時遂超隆於宗子始觧印於稽山即驅傳於湘水彼南陽之舊國實天漢之嘉祉既川岳之形勝復龍躍之基趾此首賞之謬及謂維城之足恃值諸侯之攜貳遂留滯於樊川等勾踐之絶望同重耳之終焉望南枝而灑泣或東顧而潺湲歸歟之情何極首丘之思邈然忽值魏師入討于彼南荆既車徒之赩赫遂一鼓而陵城同寤生之舍許等小白之全邢伊社稷之不泯實有感於恩靈矧吾人之固陋逈飄薄於流萍忽沉滯於兹土復朞月而無成昔方千而畿甸今七里而磐縈寡田邑而可賦闕丘井而求兵無河内之資待同滎陽之未平夜騷騷而擊柝晝孑孑而揚旌烽凌雲而逈照馬伏櫪而悲鳴既有懐於斯日亦焉得而云寧彼雲夢之舊都乃標竒於昔者驗徃記而瞻今何名髙而實寡寂寥井邑荒涼原野徒揄揚於宋玉空稱嗟於司馬南方卑而歎屈長沙濕而悲賈余家國之一匡庶興周而祀夏忽縈憂而北屈豈年華之天假加以狗盗䑕竊蜂蠆狐狸羣圉隷而為寇聚臧𫉬而成師窺覦津渚跋扈江眉屢征肇於殷嵗頻戰起於軒時有扈興於夏典採芑著於周詩方叔振於蠻貊伯禽㨗於淮夷在逋穢其能幾㑹斬馘而搴旗彼積惡之必稔豈天靈之我欺交川路之云擁理惆悵而未怡察在位八載年四十四保定二年二月薨其羣臣等𦵏之於平陵諡曰宣皇帝廟號中宗察少有大志不拘小節雖多猜忌而知人善任使撫将士有恩能得其死力性不飲酒安於儉素事其母以孝聞又不好聲色尤惡見婦人雖相去数歩遇聞其臭經御婦人之衣不復更着又惡見人髪白事者必方便以避之其在東揚州頗放誕省覧簿領好為戲論之言以此獲譏於世篤好文義所著文集十五卷内典華嚴般若法華金光明義䟽四十六卷並行於世察疆土既狹居常怏怏每誦老馬伏櫪志在千里烈士暮年壮心不已未嘗不盱衡扼腕歎咤者乆之遂以憂憤發背而殂髙祖又命其太子巋嗣位年號天保巋字仁逺察之第三子也機辯有文學善於撫御能得其下歡心嗣位之元年尊其祖母龔太后曰太皇太后嫡母王皇后曰皇太后所生曹貴嬪曰皇太妃其年五月其太皇太后薨諡曰元太后九月其太妃又薨諡曰孝皇太妃二年皇太后薨諡曰宣静皇后五年陳湘州刺史華皎巴州刺史戴僧朔並来附皎送其子𤣥響為質於巋仍請兵伐陳巋上言其状髙祖詔衛公直督荆州總管權景宣大将軍元定等赴之巋亦遣其柱國王操率水軍二萬會皎於巴陵既而與陳将吳明徹等戰於沌口直軍不利元定遂没巋大将軍李廣等亦為陳人所虜長沙巴陵並䧟於陳衛公直乃歸罪於巋之柱國殷亮巋雖以退敗不獨在亮然不敢違命遂誅之吳明徹乗勝攻尅巋河東郡獲其守将許孝敬明年明徹進寇江陵引江水灌城巋出頓紀南以避其鋭江陵副總管髙琳與其尚書僕射王操拒守巋馬軍主馬武吉徹等擊明徹敗之明徹退保公安巋乃還江陵巋之八年陳又遣其司空章昭逹来冦江陵總管陸騰及巋之将士擊走之昭逹又寇章陵之青泥巋令其大将軍許世武赴援大為昭逹所破初華皎戴僧朔從衛公直與陳人戦敗率其麾下數百人歸於巋巋以皎為司空封江夏郡公以僧朔為車騎將軍封吳興縣侯巋之十年皎来朝至襄陽請衛公直曰梁主既失江南諸郡民少國貧朝廷興亡繼絶理宜資贍豈使齊桓楚莊獨擅救衛復陳之美望借數州以裨梁國直然之乃遣使言状髙祖髙祖許之詔以基平鄀三州歸之於巋及髙祖平齊巋朝於鄴髙祖雖以禮接之然未之重也巋知之後因宴承間乃陳其父荷太祖拯救之恩幷敘二國艱虞唇齒犄角之事詞理辯暢因涕泗交流髙祖亦為之歔欷自是大加賞異禮遇日隆後髙祖復與之宴齊氏故臣吒列長又亦預焉髙祖指謂巋曰是詧陴罵朕者也巋曰長乂未能輔桀飜敢吠堯髙祖大笑及酒酣髙祖又命琵琶自弹之仍謂巋曰當為梁主盡歡巋乃起請舞髙祖曰梁主乃能為朕舞乎巋曰陛下既親撫五絃臣何敢不同百獸髙祖大悦賜雜繒萬叚良馬數十匹并賜齊後主妓妾及常所乗五百里駿馬以遺之及隋文帝執政尉遲迥王謙司馬消難等各起兵時巋將帥皆宻請興師與迥等為連衡之勢進可以盡節於周氏退可以席卷山南巋固以為不可俄而消難奔陳迥等相次破滅隋文帝既踐極恩禮彌厚遣使賜金三百兩銀一千兩布帛萬叚馬五百匹開皇二年隋文帝備禮納巋女為晋王妃又欲以其子瑒尚蘭陵公主由是罷江陵總管巋專制其國四年巋来朝長安隋文帝甚敬待之詔巋位在王公之上賜縑萬匹珍玩稱是及還親執其手謂之曰梁主乆滯荆楚未復舊都故鄉之念良軫懐抱朕當振旅長江相送旋反耳巋在位二十三載年四十四五年五月薨其羣臣𦵏之於顯陵諡曰孝文皇帝廟號世宗巋孝悌慈仁有君人之量四時祭享未嘗不悲慕流涕性尤儉約御下有方境内稱治所著文集及孝經周易義記及大小乗幽㣲並行於世隋文帝又命其太子蕭琮嗣位年號廣運琮字温文性倜儻不羈博學有文義兼善弓馬初封東陽王尋立為皇太子及嗣位隋文帝徴琮叔父岑入朝因留不遣復置江陵總管以監之琮之二年隋文帝又徴琮入朝琮率其臣下二百餘人朝於長安隋文帝仍遣武鄉公崔𢎞度将兵戍江陵軍至鄀州琮叔父􅑐及弟巚等懼𢎞度掩襲之遂虜居民奔於陳隋文帝於是廢梁國曲赦江陵死罪給民復十年梁二主各給守墓十戸尋拜琮為柱國封莒國公自察初即位嵗在乙亥至是嵗在丁未凡三十有三嵗矣察子嶚追諡孝恵太子􅑐封安平王岌東平王岑河間王後改封吳郡王巋子瓛義興王瑑晋陵王璟臨海王珣南海王瑒義安王瑀新安王察之在藩及居帝位以蔡大寳為股肱王操為腹心魏益徳尹正薛暉許孝敬薛宣為爪牙甄𤣥成劉盈岑善方傅准禇珪蔡大業典衆務張綰以舊齒處顯位沈重以儒學蒙厚禮自餘多所奨拔咸盡其噐能及巋纂業親賢並用将相則華皎殷亮劉忠義宗室則蕭欣蕭翼民望則蕭確謝温栁洋王湜徐岳外戚則王凝王誦殷璉文章則劉孝勝范迪沈君游君公栁信言政事則袁敞柳莊蔡延夀甄詡皇甫兹故能保其疆土而和其民人焉今載察子嶚等及蔡大寳以下尤著者附於左其在梁陳隋已有傳及巋諸子未任職者則不兼録嶚字道逺察之長子也母曰宣静皇后㓜聰敏有成人之量察之為梁主立為世子尋病卒及察稱帝追諡焉􅑐字義逺察第五子也性仁厚善於撫接歴侍中荆州刺史尚書令太尉太傅入陳授平東将軍東揚州刺史及陳亡百姓推􅑐為主以禦隋師為總管宇文述所破伏法於長安岌察第六子也性淳和幼而好學位至侍中中衞将軍巋之五年卒贈侍中司空諡曰孝岑字智逺察第八子也位至太尉性簡貴御下嚴整及琮嗣位自以望重屬尊頗有不法故隋文徴入朝拜大将軍封懐義郡公瓛字欽文巋第三子也㓜有令譽能屬文特為巋所愛位至荆州刺史初隋師至鄀州梁之百寮咸恐懼計無所出唯瓛建議南奔入陳授侍中安東将軍吳州刺史及陳亡吳人推為主以禦隋師戰而敗與巖同時伏法蔡大寳字敬位濟陽考城人祖履齊尚書祠部郎父點梁尚書儀曹郎南兖州别駕大寳少孤而篤學不倦善屬文初以明經對策第一觧褐武陵王國左常侍嘗以書干僕射徐勉大為勉所賞異乃令與其子遊處所有墳籍盡以給之遂博覽羣書學無不綜察初出第勉仍薦大寳為侍讀兼掌記室尋除尚書儀曹郎出鎮㑹稽大寳為記室領長流察蒞襄陽遷諮議参軍及梁元帝與河東王譽結隙詧令大寳使江陵以觀之梁元帝素知大寳見之甚悦乃示所制𤣥覽賦令注觧焉三日而畢元帝大嗟賞之贈遺甚厚大寳還白察云湘東必有異圗禍亂将作不可下援臺城察納之及為梁主除中書侍郎兼吏部掌大選事領㐮陽太守遷員外散騎常侍吏部郎俄轉吏部尚書軍國之事咸委決焉加授大将軍遷尚書僕射進號輔國将軍又除使持節宣惠将軍雍州刺史察於江陵稱帝徴為侍中尚書令参掌選事又加雲麾将軍荆州刺史進位柱國軍師将軍領太子少傅轉安前将軍封安豊縣侯邑一千戸從巋入朝領太子少傅巋嗣位册授司空中書監中權大将軍領吏部尚書固讓司空許之加特進巋之三年卒巋哭之慟自卒及𦵏三臨其喪贈司徒進爵為公諡曰文凱配食察廟大寳性嚴整有智謀雅逹政事文詞贍速察之章表書記教令詔册並大寳專掌之詧推心委任以為謀主時人以察之有大寳猶劉先主之有孔明焉所著文集三十卷及尚書義䟽並行於世有四子次子延夀有器識博渉經籍尤善當世之務尚察女宣成公主歴中書郎尚書右丞吏部郎御史中丞從琮入隋授開府儀同三司祕書丞終於成州刺史大寳弟大業大業字敬道有至行父没居喪過禮性寛恕學渉經史有将命材屢充使詣闕初以西中郎府参軍隨察之鎮察稱帝歴尚書左丞開逺将軍監利郡守散騎常侍衞尉卿巋嗣位遷都官尚書除貞毅将軍漳川太守入為左民尚書太常卿巋之七年卒贈金紫光禄大夫諡曰簡有五子允恭最知名起家著作佐郎太子舍人梁滅入陳拜尚書庫部郎陳亡入隋授起居舍人王操字子髙其先太原晉陽人也察母龔氏之外弟也祖靈慶海鹽令父景休臨川内史操性敦厚有籌畧博渉經史在公恪勤初為察外兵参軍親任亞於蔡大寳察承制除尚書左丞及稱帝遷五兵尚書大将軍郢州刺史尋進位柱國封新康縣侯巋嗣位授鎮右将軍尚書僕射及吳明徹為寇巋出頓紀南操撫循將士莫不用命明徹既退江陵獲全操之力也遷侍中中衞将軍尚書令開府儀同三司参掌選事領荆州刺史操既位居朝右每自挹損深得當時之譽巋之十四年卒巋舉哀於朝堂流涕謂其羣臣曰天不使吾平蕩江表何奪吾賢相之速也及𦵏親祖於瓦官門贈司空進爵為公諡曰康節有七子次子衡最知名有才學起家祕書郎歴太子洗馬中書黄門侍郎魏益徳襄陽人也有才幹膽勇過人數從軍征討以功累遷至郡守詧莅㐮陽以益徳為其府司馬察承制拜将軍尋加大將軍及察稱帝進位柱國封上黄縣侯邑千户加車騎将軍察之二年卒贈司空諡曰忠壮進爵為公巋之五年以益徳配食察廟尹正其先天水人察莅雍州正為其府中兵参軍擒張纘𫉬杜岸皆正之力察承制以為将軍尋拜大将軍及稱帝除護軍將軍進位柱國封新野縣侯邑千戸察之三年卒贈開府儀同三司諡曰剛巋之五年以正配食察廟子徳毅多權畧位至大将軍後以見疑賜死薛暉河東人也有才畧身長八尺形貎甚偉嘗督禁旅為察爪牙當禦侮之任與尹正攻𫉬杜岸於南陽察承制拜将軍尋加大将軍進位柱國除領軍将軍巋之二年卒贈開府儀同三司有六子子建子尚知名許孝敬吳人小名洞兒勁勇過人為詧驍将以大将軍守河東既無救援為吳明徹所擒遂戮於建康市贈車騎大将軍子世武嗣少襲父大将軍好勇不拘行檢重賔客施與不節資産既盡欝欝不得志遂謀奔陳事覺伏誅又有大将軍李廣㑹稽人早事詧以敢勇聞沌口之役先登力戦及華皎軍敗為吳明徹所擒将降之廣辭色不屈遂被害贈太尉追封建興縣公諡曰忠武甄𤣥成字敬平中山人博逹經史善屬文少為簡文所知以録事参軍隨察鎮㐮陽轉中記室参軍掌書記頗参政事以江陵甲兵殷盛遂懐貳心密書與梁元帝申其誠欵遂有得其書者進之於察察深信佛法常願不殺誦法華經人𤣥成素誦法華經遂以此𫉬免詧後見之常曰甄公好得法華經力歴位中書侍郎御史中丞祠部尚書吏部尚書詧之六年卒贈侍中護軍将軍有文集二十卷子詡少沈敏閑習政事歴中書舍人尚書右丞從琮入隋授開府儀同三司終於太府少卿劉盈彭城人以西中郎府録事参軍隨察之鎮有器度勤於在公察之軍國經謀頗得参預歴黄門郎中書監雍州刺史尚書僕射巋之七年卒贈本官第三子然于時頗知名隋鷹擊郎将岑善方字思義南陽棘陽人漢征南大将軍彭之後也祖恵甫給事中父昶散騎侍郎善方有器局博綜經史善於辭令以刑獄参軍隨察至㐮陽察初請内附以善方兼記室充使詣闕應對閑敏深為太祖所嘉自此徃来凡數十反魏恭帝二年授驃騎大将軍開府儀同三司封長寕縣公察之承制也授中書舍人遷襄陽郡守及稱帝徴為太府卿領中書舍人轉太府領舍人如故尋遷散騎常侍起部尚書善方性清慎有當世幹能故察委以機宻詧之七年卒贈太常卿諡曰敬所著文集十卷有七子並有操行之元之利之象最知名之元太子舍人早卒髙祖録善方充使之功追之利之象入朝授之利帥都督代王記室参軍後仕隋歴安固令郴義江三州司馬零陵郡丞之象掌式中士隋文帝相府参軍事後仕隋歴尚書虞部員外郎邵陵上宜渭南邯郸四縣令傅准北地人祖照金紫光禄大夫父諝湘東王外兵参軍准有文才善詞賦以西中郎参軍隨察之鎮官至度支尚書巋之七年卒贈太常卿諡曰敬康所著文集二十卷有二子曰秉曰執並材兼文史秉尚書右丞執中書舍人尚書左丞宗如周南陽人有才學容止詳雅以府僚隨察歴黄門散騎列卿後至度支尚書巋之九年卒如周面狹長以法華經云聞經隨喜面不狹長嘗戲之曰卿何為謗經如周踧踖自陳不謗察又謂之如初如周懼出告蔡大寳大寳知其㫖笑謂之曰君當不謗餘經政應不信法華耳如周乃悟又嘗有人訴事於如周謂為經作如州官也乃曰某有屈滯故来訴如州官如周曰爾何小人敢呼我名其人慙謝曰秪言如州官作如州不知如州官名如周早知如州官名如周不敢喚如州官作如周如周乃笑曰命卿自責見侮反深衆咸服其寛雅有七子希顔希華知名希顔有文學仕至中書舍人希華博通經術為荆楚儒宗蕭欣梁武帝弟安成康王秀之孫煬王機之子也㓜聰警博綜墳籍善屬文察踐位以欣襲機封歴侍中中書令尚書僕射尚書令巋之二十三年卒贈司空欣與柳信言當巋之世俱為一時文宗有集三十卷又著梁史百卷遭亂失本柳洋河東觧人祖惔尚書左僕射父昭中書侍郎洋少有文學以禮度自拘與王湜俱以風範方正為當時所重位至吏部尚書出為上黄郡守梁國廢以郡歸隋授開府儀同三司尋卒徐岳東海人尚書左僕射開府儀同三司簡肅公勉之少子也少方正博通經史初為東陽王琮師琮為皇太子授詹事及嗣位除侍中左民尚書俄遷尚書僕射從琮入隋授上開府儀同三司終於陳州刺史子凱祕書郎岳兄矩有文學善吏事頗黷於貨賄位至度支尚書子敬鴻臚卿王㳬琅邪臨沂人祖琳侍中太府卿父錫侍中㳬少有令譽尚察妹廬陵長公主歴祕書郎太子舍人宣成王友廬陵内史察踐位授侍中吏部尚書巋之四年使詣闕卒於賔館贈侍中右光禄大夫子瓘有文詞黄門侍郎㳬弟湜方雅有器識位至都官尚書巋之二十年卒子懐祕書郎隋沔陽令范迪順陽人祖縝尚書左丞父胥鄱陽内史迪少機辯善屬文歴中書黄門侍郎尚書右丞散騎常侍巋之十七年卒有文集十卷子裒迪弟遹文采劣於迪而經術過之位至中衞東平王長史沈君游吳興人祖僧畟左民尚書父廵東陽太守君游博學有詞采位至散騎常侍巋之十二年卒有文集十卷弟君公有幹局美風儀文章典正特為巋所重歴中書黄門侍郎御史中丞自都官尚書為義興王瓛師從瓛奔陳授侍中太子詹事隋平陳以瓛同謀度江伏誅袁敞陳郡人祖昂司空父士俊安成内史敞少有器量博渉文史以吏部郎使詣闕時主者以敞班在陳使之後敞固不從命主者詰之敞對曰昔陳之祖父乃梁諸侯之下吏也棄忠與義盗有江東今大周朝宗萬國招攜以禮若使梁之行人在陳人之後便恐彛倫失序豈使臣之所望焉主者不能屈遂以状奏髙祖善之乃詔敞與陳使異日而進還以稱㫖遷侍中轉左民尚書從琮入隋授開府儀同三司終於譙州刺史子謐謙史臣曰梁主任術好謀知賢飬士蓋有英雄之志覇王之畧焉及淮海板蕩骨肉猜貳擁衆自固稱藩内欵終能據有全楚中興頽運雖土宇殊於舊邦而位號同於曩日貽厥自逺享國數世可不謂賢哉嗣子纂承舊業増修遺構賞罰得衷舉厝有方密邇寇讐則威畧具舉朝宗上國則聲猷逺振豈非繼世之令主乎周書卷四十八
