body:
  text: 周書卷三十四唐令狐德棻等撰列傳第二十六趙善元定楊􅎎韓盛裴寬弟漢尼鴻楊敷趙善字僧慶太傅楚國公貴之從祖兄也祖國魏龍驤將軍洛州刺史父更安樂太守善少好學涉獵經史美容儀沉毅有逺量永安初爾朱天光為肆州刺史辟為主簿深器重之天光討邢杲及万俟醜奴以善為長史軍中謀議每參預之天光為關右行臺表善為行臺左丞加都督征虜將軍普泰初賞平關隴之功拜驃騎將軍大行臺散騎常侍封山北縣伯邑五百戶俄除持節東雍州諸軍事雍州刺史天光東拒齊神武於韓令陵善又以長史從及天光敗見殺善請收葬其尸齊神武義而許之賀拔嶽總關中兵乃遣迎善復以為長史嶽為侯莫陳悅所害善共諸將翊戴太祖仍從平悅魏孝武西遷除都官尚書改封襄城縣伯增邑五百戶頃之為北道行臺與儀同李虎等討曹泥克之遷車騎大將軍儀同三司尚書右僕射進爵為公增邑并前一千五百户大統三年轉左僕射兼侍中監著作領太子詹事善性溫恭有器局雖位居端右而逾自謙退其職務克舉則曰某官之力若有罪責則曰善之咎也時人稱其公輔之量太祖亦雅敬重焉九年從戰邙山屬大軍不利善為敵所獲遂卒於東魏建德初朝廷與齊通好齊人乃歸其柩其子絢表請贈諡詔贈大將軍大都督岐宜寧豳四州諸軍事岐州刺史諡曰敬子度字幼濟車騎大將軍儀同三司度弟絢字會績驃騎大將軍開府儀同三司浙資二州刺史元定字願安河南洛陽人也祖比頽魏安西將軍務州刺史父道龍征虜將軍巨鹿郡守定惇厚少言內沉審而外剛毅永安初從爾朱天光討關隴羣賊並破之除襄虜將軍及賀拔嶽被害定從太祖討侯莫陳悅以功拜平逺將軍步兵校尉魏孝武西遷封髙邑縣男邑二百户從擊潼關拔回洛城進爵為伯增邑三百户加前將軍太中大夫從擒竇泰復𢎞農破沙苑戰河橋定皆先鋒當其前者無不披靡以前後功纍遷都督征東將軍金紫光祿大夫帥都督增邑三百户邙山之役敵人如堵定奮矟衝之殺傷甚衆無敢當者太祖親觀之論功為最賞物甚厚十三年授河北郡守加大都督通直散騎常侍增邑通前一千户定有勇略每戰必陷陳然未嘗自言其功太祖深重之諸將亦稱其長者十五年遷使持節車騎大將軍開府儀同三司進爵為公魏廢帝二年以宗室進封建城郡王二年行周禮爵隨例改封長湖郡公世宗初拜岷州刺史威恩兼濟甚得羌豪之情先時生羌據險不賓者至是並出山谷從征賦焉及定代還羌豪等感戀之保定中授左宮伯中大夫久之轉左武伯中大夫進位大將軍天和二年陳湘州刺史華皎舉州歸梁梁主欲因其隙更圖攻取乃遣使請兵詔定從衛公直率衆赴之梁人與華皎皆為水軍定為陸軍直總督之俱至夏口而陳郢州堅守不下直令定率步騎數千圍之陳遣其將淳于量徐度吳明徹等水陸來拒量等以定已度江勢分遂先與水軍交戰而華皎所統之兵更懷疑二遂為陳人所敗皎得脫身歸梁定既孤軍懸隔進退路絶陳人乘勝水陸逼之定乃率所部斫竹開路且行且戰欲趣湘州而湘州已陷徐度等知定窮迫遣使偽與定通和重為盟誓許放還國定疑其詭許欲力戰死之而定長史孫隆及諸將等多勸定和定乃許之於是與度等刑牲歃血解仗就船遂為度等所執衆軍亦被囚虜送詣丹陽居數月憂憤發病卒子樂嗣楊􅎎字顯進正平髙涼人也祖貴父猛並為縣令􅎎少豪俠有志氣魏孝昌中爾朱榮殺害朝士大司馬城陽王元徽逃難投􅎎􅎎藏而免之孝莊帝立徽乃出復為司州牧由是􅎎以義烈聞擢拜伏波將軍給事中元皓入洛孝莊欲往晉陽就爾朱榮詔􅎎率其宗人收船馬渚􅎎未至帝已北度太行􅎎遂匿所收船不以資敵及爾朱榮奉帝南討至馬渚􅎎乃具船以濟王師皓平封肥如五百户加鎮逺將軍步兵校尉行濟北郡事進都督平東將軍太中大夫從魏孝武入關進爵為侯增邑八百戶加撫軍銀青光祿大夫時東魏遷鄴太祖欲知其所為乃遣􅎎間行詣鄴以觀察之使還稱旨授通直散騎常侍車騎將軍稽胡恃險不賓屢行抄竊以􅎎兼黃門侍郎往慰撫之􅎎頗有權略能得邊情誘化酋渠多來款附乃有隨􅎎入朝者時𢎞農為東魏守􅎎從太祖攻拔之然自河以北猶附東魏􅎎父猛先為邵郡白水令􅎎與其豪右相知請微行詣邵郡奉兵以應朝廷太祖許之􅎎遂行與土豪王覆憐等隂謀舉事密相應會者三千人內外俱發遂拔邵郡擒郡守程保及令四人並斬之衆議推􅎎行郡事􅎎以因覆憐成事遂表覆憐為邵郡守以功授大行臺左丞率義徒更為經略於是遣諜人誘説東魏城堡旬月之間正平河北南涉二絳建州大寧等城並有請為內應者大軍因攻而拔之以􅎎行正平郡事左丞如故齊神武敗於沙苑其將韓軌潘洛可朱渾元等為殿􅎎分兵要截殺傷甚衆東雍州刺史馬恭懼􅎎威聲棄城遁走􅎎遂移據東雍州太祖以􅎎有謀略堪委邊任乃表行建州事時建州逺在敵境三百餘里然􅎎威恩夙著所經之處多並贏糧附之比至建州衆已一萬東魏刺史車折於洛出兵逆戰􅎎擊敗之又破其行臺斛律俱步騎二萬於州西大獲甲仗及軍資以給義士由是威名大振東魏遣太保侯景攻陷正平復遣行臺薛循義率兵與斛律俱相會於是敵衆漸盛􅎎以孤軍無援且腹背受敵謀欲拔還恐義徒背叛遂偽為太祖書遣人若從外送來者云已遣軍四道赴援因令人漏泄使所在知之又分土人義首令領所部四出抄掠擬供軍費􅎎分遣訖遂於夜中拔還邵郡朝廷嘉其權以全軍即授建州刺史時東魏以正平為東雍州遣薛榮祖鎮之􅎎將謀取之乃先遣竒兵急攻汾橋榮祖果盡出城中戰士於汾橋拒守其夜􅎎率步騎二千從他道濟遂襲克之進驃騎將軍既而邵郡民以郡東叛郡守郭武安脫身走免􅎎又率兵攻而復之轉正平郡守又擊破東魏南綘郡虜其郡守屈僧珍録前後功别封郃陽縣伯邑五百戶邙山之戰􅎎攻拔柏谷塢因即鎮之及大軍不利􅎎亦拔還而東魏將侯景率騎追􅎎􅎎與儀同韋法保同心抗禦且前經十數里景乃引退太祖嘉之賜帛三百匹復授建州刺史鎮車箱􅎎久從軍役未及葬父至是表請還葬詔贈其父車騎大將軍儀同三司晉州刺史贈其母夏陽縣君並給儀衛州里榮之及齊神武圍玉壁别令侯景趣齊子嶺􅎎恐入寇邵郡率騎禦之景聞􅎎至斫木斷路者六十餘里猶驚而不安遂退還河陽其見憚如此十二年進授大都督加晉建二州諸軍事又攻破蓼塢獲魏將李顯進儀同三司尋遷開府復除建州邵郡河內汲郡黎陽等諸軍事領邵郡十六年大軍東討授大行臺尚書率義衆先驅敵境攻其四戍拔之時以齊軍不出乃追􅎎還併肥如郃陽二邑合一千八百户改封華陽縣侯又於邵郡置邵州以􅎎為刺史率所部兵鎮之保定四年遷少師其年大軍圍洛陽詔􅎎率義兵萬餘人出軹關然􅎎自鎮東境二十餘年數與齊人戰每常克獲以此遂有輕敵之心時洛陽未下而􅎎深入敵境又不設備齊人奄至大破􅎎軍􅎎以衆敗遂降於齊􅎎之立勳也有慷慨壯烈之志及軍敗遂就虜以求茍免時論以此鄙之朝廷猶録其功不以為罪令其子襲爵􅎎之敗也新平郡守韓盛亦於洛陽戰沒盛字文熾南陽渚陽人也五世祖逺為鄭縣令因徙居京兆之渭南焉曾祖良舉秀才奉朝請姑臧令祖與魏儻城郡守贈直州刺史父先藻安夷鄜城二郡守贈鎮逺將軍義州刺史盛幼有操行涉獵經史兼善騎射膂力過人魏大統初起家開府行參軍轉參軍事從李逺積年征討每有戰功纍遷至都督輔國將軍中散大夫帥都督持節平東將軍太中大夫銀青光祿大夫大都督明帝二年封臨湍縣子邑三百户保定四年授使持節車騎大將軍儀同三司虞部下大夫出為新平郡守居官清靜嚴而不殘矜恤孤貧抑挫豪右賊盜止息郡治肅然尋以本官從晉公護東討於洛陽戰沒贈浙洛義三州刺史諡曰壯子謙嗣官至大都督盛二兄德輿仲恭德輿姿貌魁傑有異常人歷官持節車騎大將軍儀同三司通洛慈澗防主邵州刺史任城縣男仲恭美容儀淡於榮利郡纍辟為功曹中正仲恭答曰第五之號豈減驃騎乎後歷廣原靈原新豐三縣令所在皆有聲績有八子並有志操少子紉約後最知名裴寬字長寬河東聞喜人也祖德歡魏中書郎河內郡守父靜慮銀青光祿大夫贈汾州刺史寬儀貌瓌偉博涉羣書弱冠為州里所稱與二弟漢尼是和知名親歿撫弟以篤友聞滎陽鄭孝穆常謂從弟文直曰裴長寬兄弟天倫篤睦人之師表吾愛之重之汝可與之遊處年十三以選為魏孝明帝挽郎釋褐員外散騎侍郎魏孝武末除廣陵王府直兵參軍加寧朔將軍員外散騎常侍及孝武西遷寬謂其諸弟曰權臣擅命乘輿播越戰爭方始當何所依諸弟咸不能對寬曰君臣逆順大義昭然今天子西幸理無東面以虧臣節乃將家屬避難於大石巖獨孤信鎮洛陽始出見焉時汾州刺史韋子粲降於東魏子粲兄弟在關中者咸己從坐其季弟子爽先在洛窘急乃投寬寬開懷納之遇有大赦或傳子爽合免因爾遂出子爽卒以伏法獨孤信召而責之寬曰窮來見歸義無執送今日獲罪是所甘心以經赦宥罪得不坐大統五年授都督同軌防長史加征虜將軍十三年從防主韋法保向潁川解侯景圍景密圖南叛軍中頗有知者以其事計未成外示無二往來諸軍間侍從寡少軍中名將必躬自造至於法保尤被親附寬謂法保曰侯景狡猾必不肯入關雖託款於公恐未可信若仗兵以斬之亦一時之計也如曰不然便須深加嚴警不得信其誑誘自貽後悔法保納之然不能圖景但自固而已十四年與東魏將彭樂恂戰於新城因傷被擒至河隂見齊文襄寬舉止詳雅善於占對文襄甚賞異之謂寬曰卿三河冠蓋材識如此我必使卿富貴關中貧校何足可依勿懷異圖也因解鎖付館厚加其禮寬乃裁臥氊夜縋而出因得遁還見於太祖太祖顧謂諸公曰被堅執鋭或有其人疾風徑草歲寒方驗裴長寬為髙澄如此厚遇乃能冒死歸我雖古之竹帛所載何以加之乃手書署寬名下授持節帥都督封夏陽縣男邑三百户并賜馬一匹衣一襲即除孔城城主十六年遷河南郡守仍鎮孔城尋加撫軍大都督通直散騎常侍魏廢帝元年進使持節車騎大將軍儀同三司散騎常侍孝閔帝踐阼進爵為子寬在孔城十三年與齊洛州刺史獨孤永業相對永業有計謀多譎詐或聲言春發秋乃出兵掩蔽消息倐忽而至寬每揣知其情用兵邀擊無不克之永業常戒其所部曰但好鎮孔城自外無足慮其見憚如此齊伊川郡守梁鮓常在境首抄掠太祖患之命寬經略焉鮓行過妻家椎牛宴飲既醉之後不復自防寬密知之遣兵往襲遂斬之太祖嘉焉賜奴婢金帶粟帛等武成二年徴拜司士中大夫保定元年出為汾州刺史尋轉魯山防主四年加驃騎大將軍開府儀同三司天和二年行復州事三年除溫州刺史初陳氏與國通和每修聘好自華皎附後乃圖寇掠汾州既接敵境事資守備於是復以寬為汾州刺史而州城埤狹器械又少寬知其難守深以為憂又恐秋水暴長陳人得乘其便即白襄州總管請戍兵并請移城於羊蹄山權以避水總管府許增兵守禦不許遷移城寬乃量度年常水至之處豎大木於岸以備船行襄州所遣兵未至陳將程靈洗已率衆至於城下遂分布戰艦四面攻之水勢猶小靈洗未得近城寬每簡募驍兵令夜掩擊頻挫其鋭相持旬日靈洗無如之何俄而雨水暴長所豎木上皆通船過靈洗乃以大艦臨逼拍干打樓應即摧碎弓弩大石晝夜攻之苦戰三十餘日死傷過半女垣崩盡陳人遂得上城短兵相拒猶經二日外無繼援力屈城陷之後水便退縮陳人乃執寬至揚州尋被送嶺外經數載後還建業遂卒於江左時年六十七子義宣後從御正杜杲使於陳始得將寬柩還開皇元年隋文帝詔贈襄郢二州刺史義宣起家譙王儉府記室轉司金二命士合江令寬弟漢漢字仲霄操尚𢎞雅聰敏好學嘗見人作百字詩一覽便誦魏孝武初解褐員外散騎侍郎大統五年除大丞相府士曹行參軍補墨曹參軍漢善尺牘尤便簿領理識明贍決斷如流相府為之語曰日下粲爛有裴漢十一年李逺出鎮𢎞農啓漢為司馬逺特相器遇尋加安東將軍銀青光祿大夫成都上士尋轉司車路下大夫與工部郭彥大府髙賓等參議格令每較量時事必有條理彥等咸敬異之加帥都督天和中復與司宗孫恕典祀薛慎同為八使巡察風俗五年加車騎大將軍儀同三司漢少有宿疾恆帶虛羸劇職煩官非其好也時晉公護擅權搢紳等多諂附之以圖仕進唯漢直道固守八年不徙職性不飲酒而雅好賓遊每良辰美景必招引時彥宴賞留連間以篇什當時人物以此重之自寬沒後遂斷絶遊從不聼琴瑟歲時伏臘哀慟而已撫養兄弟子情甚篤至借人異書必躬自録本至于疹疾彌年亦未嘗釋卷建德元年卒時年五十九贈晉州刺史子鏡民少聰敏涉獵經史為大將軍談公會記室參軍後歷宋王實侍讀轉記室遷司録宣政初吏部上士大象末春官府都上士漢弟尼尼字景尼性𢎞雅有器局起家奉朝請除梁王東閣祭酒遷從事中郎加通直散騎常侍隴西李際范陽盧誕並有髙名於世與尼結忘年之交魏恭帝元年以本官從于謹平江陵大獲軍實謹恣諸將校取之餘人皆競取珍玩尼唯取梁元帝素琴一張而已謹深歎美之六官建拜御正下大夫尋以疾卒贈輔國將軍隨州刺史子之隱趙王招府記室參軍之隱弟師民好學有識度見稱於時起家秦王贇府記室參軍仍兼侍讀寬族弟鴻鴻少恭謹有幹略歷官內外孝閔帝踐阼拜輔城公司馬加儀同三司為普公護雍州治中纍遷御正中大夫進位開府儀同三司轉民部中大夫保定末出為中州刺史九曲城主鎮守邊鄙甚有扞禦之能衛公直出鎮襄州以鴻為襄州司馬天和初拜郢州刺史轉襄州總管府長史賜爵髙邑縣侯從直南征軍敗遂沒尋卒於陳朝廷哀之贈豐資遂三州刺史楊敷字文衍華山公寬之兄子也父暄字景和性朗悟有識學弱冠拜奉朝請歷員外散騎侍郎華州别駕尚書右中兵郎中輔國將軍諫議大夫以别將從魏廣陽王深征葛榮為榮所害贈殿中尚書華夏二州諸軍事鎮西將軍華州刺史敷少有志操重然諾每覽書傳見忠臣烈士之事常慨然景慕之魏建義初襲祖鈞爵臨貞縣伯邑四百戶除員外羽林監大統元年拜奉車都尉歷尚書左士郎中祠部郎中大丞相府墨曹參軍帥都督平東將軍太中大夫加撫軍將軍通直散騎常侍魏恭帝二年遷廷尉少卿所斷之獄號稱平允孝閔帝踐阼進爵為侯增邑并前八百戶除小載師下大夫使北豫州迎司馬消難還授使持節蒙州諸軍事蒙州刺史先是蠻左等多受齊假署數為亂逆敷推誠布信隨方慰撫蠻左等感之相率歸附敷乃送其首四十餘人赴闕請因齊所假而授之諸蠻等愈更感悅州境獲寧特降璽書勞問加車騎大將軍儀同三司保定中徴為司水中大夫夷夏吏民及荆州總管長孫儉並表請留之時議欲東討將委敷以舟艦轉輸之事故弗許焉陳公純鎮陜西以敷為總管長史五年轉司木中大夫軍器副監敷明習吏事所在以勤察著名每歲奏課居最纍獲優賞進位驃騎大將軍開府儀同三司天和六年出為汾州諸軍事汾州刺史進爵為公增邑一千五百户齊將假孝先率衆五萬來寇梯衝地道晝夜攻城敷親當矢石隨事扞禦拒守纍旬孝先攻之愈急時城中兵不滿二千戰死者已十四五糧儲又盡公私窮蹙齊公憲總兵赴救憚孝先不敢進軍敷知必陷沒乃召其衆謂之曰吾與卿等俱在邊鎮實願同心戮力破賊全城但強寇四面攻圍日久吾等糧食已盡救援斷絶守死窮城非丈夫也今勝兵之士猶數百人欲突圍出戰死生一決儻或得免猶冀生還受罪闕庭孰與死於寇乎吾計決矣於諸君意何如衆咸涕泣從命敷乃率見兵夜出擊殺齊軍數十人齊軍衆稍却俄而孝先率諸軍盡鋭圍之敷殊死戰矢盡為孝先所擒齊人方欲任用之敷不為之屈遂以憂懼卒於鄴髙祖平齊贈使持節大將軍淮廣復三州諸軍事三州刺史諡曰忠壯葬於華隂舊塋子素有文武材略大象末上柱國清河郡公史臣曰自三方鼎峙羣雄競逐俊能馳騖各吠非主爭奮厲其智勇思赴蹈於仁義臨危不顧前哲所難趙善等或行彰於孝友或誠顯於忠槩咸躬志力俱徇功名兵凶戰危城孤援絶楊敷趙善類龎德之勢窮元定裴寬同黃權之無路王旅不振非其罪也敷少而慷慨終能立節仁而有勇其最優乎楊􅎎屢有竒功狃於數勝輕敵無備兵破身囚未能逺謀良可嗟矣易曰師出以律否臧凶傳曰不備不虞不可以師其楊􅎎之謂也周書卷三十四周書卷三十四考證楊􅎎傳加撫軍北史云加撫軍將軍脫將軍二字周書卷三十四考證
