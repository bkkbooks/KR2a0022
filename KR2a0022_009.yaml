body:
  text: 周書卷九唐令狐德棻等撰列𫝊第一皇后文帝元皇后文宣叱奴皇后孝閔帝元皇后眀帝獨孤皇后武帝阿史那皇后武帝李皇后宣帝楊皇后宣帝朱皇后宣帝陳皇后宣帝元皇后宣帝尉遲皇后靜帝司馬皇后書紀有虞之德載釐降二女詩述文王之美稱刑于寡妻是知婚姻之道男女之别實有國有家者之所愼也自三代迄於魏晉興衰之數得失之迹備乎𫝊記故其詳可得聞焉若娉納以德防閑以禮大義正於宫闈王化行於邦國則坤儀式固而鼎命惟永矣至於邪僻既進法度莫修冶容迷其主心私謁橐其朝政則風化凌替而宗社不守矣夫然者豈非皇王之龜鑑與周氏率由姫制内職有序太祖創基修衽席以儉約髙祖嗣厯節情欲於矯枉宫闈有貫魚之美戚里無私溺之尤可謂得人君體也宣皇外行其志内逞其欲溪壑難滿採擇無厭恩之所加莫限厮皂榮之所及無隔險詖於是升蘭殿而正位踐椒庭而齊體者非一人焉階房帷而拖青紫承恩倖而擁玉帛者非一族焉雖辛癸之荒淫趙李之傾惑曽未足比其髣髴也民厭苛政弊事實多太祖之祚忽諸特由於此故叙其事以為皇后𫝊云文帝元皇后魏孝武帝之妹初封平原公主適開府張歡歡性貪殘遇后無禮又嘗殺后侍婢后怒訴之於帝帝乃執歡殺之改封后為馮翊公主以配太祖生孝閔帝大統七年薨魏恭帝三年十二月合𦵏成陵孝閔帝踐祚追尊為王后武成初又追尊為皇后文宣叱奴皇后代人也太祖為丞相納后為姬生高祖天和元年六月尊為皇太后建德二年三月癸酉崩四月丁巳葬固陵孝閔帝元皇后名胡摩魏文帝第五女初封晉安公主帝之為略陽公也尚焉及踐祚立為王后帝被廢后出俗為尼建德初髙祖誅晉國公䕶上帝尊號為孝閔帝以后為孝閔皇后居崇義宫隋氏革命后出居里第大業十二年殂眀帝獨孤皇后太保衛國公信之長女帝之在藩也納為夫人二年正月立為王后四月崩𦵏昭陵武成初追崇為皇后世宗崩與后合葬武帝阿史那皇后突厥木扞可汗俟斤之女突厥滅茹茹之後盡有塞表之地控弦數十萬志陵中夏太祖方與齊人爭衡結以為援俟斤初欲以女配帝既而悔之髙祖即位前後累遣使要結乃許歸后於我保定五年二月詔陳國公純許國公宇文貴神武公竇毅南陽公揚存等奉備皇后文物及行殿并六宫以下百二十人至俟斤牙帳所迎后俟斤又許齊人以婚將有異志純等在彼累載不得反命雖諭之以信義俟斤不從㑹大雷風起飄壊其穹廬等旬日不止俟斤大懼以為天譴乃備禮送后及純等設行殿列羽儀奉之以歸天和三年三月后至髙祖行親迎之禮后有姿貌善容止髙祖深敬焉宣帝即位尊為皇太后大象元年二月改為天元皇太后二年二月又尊為天元上皇太后册曰天元皇帝臣贇奉璽綬册謹上天元皇太后尊號曰天元上皇太后伏惟窮神盡智含𢎞載物道洽萬邦儀刑四海聖慈訓誘恩深眀德雖册徽號未極尊嚴是用增奉鴻名光縟常禮俾誠敬有展歡慰在兹福祉無疆億兆斯賴宣帝崩靜帝尊為太皇太后隋開皇二年殂年三十二隋文帝詔有司備禮册袝葬於孝陵武帝李皇后名娥姿楚人也于謹平江陵后家被籍没至長安太祖以后賜髙祖後稍得親幸大象元年二月改為天元帝太后七月又尊為天皇太后二年尊為天元聖皇太后册曰天元皇帝臣贇奉璽綬册謹上天皇太后尊號曰天元聖皇太后伏惟月精効祉坤靈表貺瑞肇丹陵慶流華渚雖率由令典夙奉徽號而因心盡敬未極尊名是用思𢎞稱首上昭聖德敢竭誠敬永綏福履顯揚慈訓貽厥孫謀宣帝崩靜帝尊為太帝太后隋開皇元年三月出俗為尼改名常悲八年殂年五十三以尼禮葬于京城南宣帝楊皇后名麗華隋文帝長女帝在東宫髙祖為帝納后為皇太子妃宣政元年閏六月立為皇后帝後自稱天元皇帝號后為天元皇后尋又立天皇后及左右皇后與后為四皇后焉二年詔曰帝降二女后德所以儷君天列四星妃象於焉垂耀朕取法上𤣥稽諸令典爰命四后内正六宫庶𢎞贊柔德廣修粢盛比殊禮雖降稱謂曷宜其因天之象增錫嘉名於是后與三皇后並加太焉帝遣使持節冊后為天元太皇后曰咨爾含章載德體順居貞肅恭享祀儀則邦國是用嘉兹顯號式暢徽音爾其敬踐厥猷寅荅靈命對揚休烈可不愼與尋又立為天中太皇后與后為五皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏曓滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓帝大怒遂賜后死逼令引訣后母獨孤氏聞之詣閤陳謝叩頭流血然後得免帝崩靜帝尊后為皇太后居𢎞聖宫初宣帝不豫詔后父入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后初雖不預謀然以嗣主幼冲恐權在他族不利於已聞昉譯已行此詔心甚悦之後知其父有異圖意頗不平形於言色及行禪代憤惋逾甚隋文帝既不能譴責内甚愧之開皇六年封后為樂平公主後又議奪其志后誓不許乃止大業五年從煬帝幸張掖殂於河西年四十九煬帝還京詔有司備禮袝葬后於定陵宣帝朱皇后名滿月吴人也其家坐事没入東宫帝之為太子后被選掌帝衣服帝年少召而幸之遂生靜帝大象元年立為天元帝后尋改為天皇后二年又改為天大皇后冊曰咨爾彌宣四德訓範六宫軒庭列序堯門表慶嘉稱既降盛典宜膺爾其飾性履道無愆禮正永固休祉可不愼歟后本非良家子又年長於帝十餘歳踈賤無寵以靜帝故特尊崇之班亞楊皇后焉宣帝崩靜帝尊為帝太皇后隋開皇元年出俗為尼名法净六年殂年四十以尼禮葬京城宣帝陳皇后名月儀自云潁川人大將軍山提第八女也大象元年六月以選入宫拜為德妃月餘立為天左皇后二年二月改天左大皇后冊曰咨爾儀範柔閑操履凝潔淑問彰於遠近令則冠於宫闈是用申彼寵章加兹徽號爾其復禮問詩披圖顧史永隆嘉命可不愼歟三月又詔曰正内之重風化之基嘉耦之制代多殊典軒嚳繼軌次妃並四虞舜受命厥娶猶三禮非相襲隨時不無朕祗承寳圖載𢎞徽號自我改作超革先古曰天元居極五帝所以仰崇王者稱尊列后於焉上儷且坤儀比德土數惟五既縟恒典宜取斯儀四太皇后外可增置天中大皇后一人天中大皇后爰主粢盛徽音日躋肇建嘉名宜膺顯冊於是以后為天中大皇后帝崩后出家為尼改名華光后父山提本髙氏之𨽻仕齊官至特進開府東兗州刺史謝陽王髙祖平齊拜大將軍封浙陽郡公大象元年以后父超授上柱國進封鄅國公除大宗伯宣帝元皇后名樂尚河南洛陽人也開府晟之第二女年十五被選入宫拜為貴妃大象元年七月立為天右皇后二年二月改為天右太皇后冊曰咨爾資靈姜水載德塗山懿淑内融徽音潛暢是用加兹寵數式光踐禮爾其聿修儀範肅膺顯冊祗承休命可不愼歟帝崩后出俗為尼改名華勝初后與陳后同時被選入宫俱拜為妃及升后位又同日受冊帝寵遇二后禮數均等年齒復同特相親愛及為尼後李朱及尉遲后等並相繼殞没而二后于今尚存后父晟少以元氏宗室拜開府大象元年七月以后父進位上柱國封翼國公宣帝尉遲皇后名熾繁蜀國公迥之孫女有美色初適把國公亮子西陽公温以宗婦例入朝帝逼而幸之及亮謀逆帝誅温進后入宫拜為長貴妃大象二年三月立為天左太皇后冊曰咨爾門膺積善躬表靈貺徽音茂德朕實嘉之是用𢎞兹盛典申彼寵章爾其克愼厥猷寅荅景命永承休烈可不愼歟帝崩后出俗為尼改名華首隋開皇十五年殂年三十靜帝司馬皇后名令姬柱國滎陽公消難之女大象元年二月宣帝𫝊位於帝七月為帝納為皇后冊曰坤道成形厚德於焉載物隂精迭運重光所以麗天在昔皇王膺乾御厯内政為助昭被圖篆惟爾門積慶靈家韜休烈徽音令範無背一時是用命爾作儷皇極爾其克勵婉心肅膺盛典追皇英之逸軌庶任姒之芳塵禕翟有光粢盛無怠雖休勿休以隆嘉祚二年九月隋文帝以后父擁衆奔陳廢后為庶人後嫁為隋司州刺史李丹妻于今尚存史臣曰孔子稱夷狄之有君不如諸夏之亡也是以周納狄后富辰謂之禍階晉升戎女卜人以為不吉斯固非謬焉自周氏受命逮乎髙祖年逾三紀世厯四君業非草昧之辰事殊權宜之日乃弃同即異以夷亂華捐婚姻之彝序求豺狼之外利既而報者倦矣施者無厭向之所謂和親未㡬已成讐敵竒正之道有異於斯于時髙祖雖受制於人未親庶政而謀士韞竒直臣鉗口過矣哉厯觀前載以外戚而居宰輔者多矣申吕則曠代無聞吕霍則與時俱盛傾漢室者王族喪周祚者楊氏何滅亡之禍合若符契焉斯魏文所以發一槩之詔也已周書卷九周書卷九考證宣帝楊皇后𫝊尋又立為天中太皇后臣文淳按天中太皇后陳月儀也楊后本冊立為天元太皇后未嘗改冊為天中太皇后北史立下無為字於文義為協宣帝陳皇后𫝊改名華光此句下北史有永徽初終四字諸𫝊同此獨不載又父山提本髙氏之𨽻北史作本爾朱兆之𨽻未知孰是宣帝元皇后𫝊改為天右太皇后天右舊本俱訛作天元靜帝司馬皇后𫝊後嫁為隋司州刺史李丹妻司州諸本俱訛為司隸今據北史改正周書卷九考證
