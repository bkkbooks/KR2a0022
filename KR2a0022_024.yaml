  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0022_WYG_024-1a, image: WYG0263/WYG0263-0594c.png}
body:
  text: 周書卷二十四唐令狐德棻等撰列傳第十六盧辨盧辨字景宣范陽涿人纍世儒學父靖太常丞辨少好學博通經籍舉秀才為太學博士以大戴禮未有解詁辨乃注之其兄景裕為當時碩儒謂辨曰昔侍中注小戴今爾注大戴庶纂前修矣及帝入關事起倉卒辨不及至家單馬而從或問辨曰得辭家不辨曰門外之治以義斷恩復何辭也孝武至長安授給事黃門侍郎領著作太祖以辨有儒術甚禮之朝廷大議常召顧問趙青雀之亂魏太子出居渭北辨時隨從亦不告家人其執志敢決皆此類也尋除太常卿太子少傅魏太子及諸王等皆行束修之禮受業於辨進爵范陽公轉少師自魏末離亂孝武西遷朝章禮度湮墜咸盡辨因時制宜皆合軌度性強記默契能斷大事凡所創制處之不疑纍遷尚書右僕射世宗即位進位大將軍帝嘗與諸公幸其第儒者榮之出為宜州刺史薨配食太祖廟庭子慎初太祖欲行周官命蘇綽專掌其事未幾而綽卒乃令辨成之於是依周禮建六官置公卿大夫士并撰次朝儀車服器用多依古禮革漢魏之法事並施行今録辨所述六官著之於篇天官府管冢宰等衆職地官府領司徒等衆職春官府領宗伯等衆職夏官府領司馬等衆職秋官府領司寇等衆職冬官府領司空等衆職史雖具載文多不録辨所述六官太祖以魏恭帝三年始命行之自兹厥後世有損益宣帝嗣位事不師古官員班品隨意變革至如初置四輔官及六府諸司復置中大夫并御正內史增置上大夫等則載於外史餘則朝出夕改莫能詳録于時雖行周禮其內外衆職又兼用秦漢等官今略舉其名號及命數附之於左其紀傳內更有餘官而於此不載者亦史闕文也柱國大將軍大將軍右正九命驃騎車騎等大將軍開府儀同三司雍州牧右正九命驃騎車騎等將軍左右光祿大夫戶三萬以上州刺史右正八命征東征西征南征北中軍鎮軍撫軍等將軍左右金紫光祿大夫大都督戶二萬以上州刺史京兆尹右八命平東平西平南平北前後將軍左右將軍左右銀青光祿大夫帥都督戶一萬以上刺史柱國大將軍府長史司馬司録右正七命冠軍輔國等將軍太中中散等大夫都督戶五千以上刺史戶一萬五千以上郡守右七命鎮逺建忠等將軍諫議誠議等大夫别將開府長史司馬司録戶一萬以上郡守大呼藥右正六命中堅寧朔等將軍左右中郎將儀同府正八命州長史司馬司録戶五千以上郡守小呼藥右六命寧逺揚烈伏波等將軍左右員外常侍統軍驃騎車騎府八命州長史司馬司録柱國大將軍府中郎掾戶一千以上郡守長安萬年縣令右正五命輕車將軍奉車奉騎等都尉四征中鎮撫軍府正七命州長史司馬司録開府府中郎掾屬戶不滿千以下郡守戶七千以上縣令正八命州呼藥右五命宣威明威等將軍武賁冗從等給事儀同府中郎掾屬柱國大將軍府列曹參軍四平前後左右將軍府七命州長史司馬司録正八命州别駕戶四千以上縣令八命州呼藥右正四命襄威厲威將軍給事中奉朝請軍主開府府列曹參軍冠軍輔國府正六命州長史司馬司録正七命州别駕正八命州治中七命郡丞戶二千以上縣令正七命州呼藥右四命威烈討寇將軍左右員外侍郎幢主儀同府正八命州列曹參軍柱國府參軍鎮逺建忠中堅寧朔府長史司録正六命州别駕正七命州治中正六命郡丞戶五百以上縣令七命州呼藥右正三命蕩寇蕩難將軍武騎常侍侍郎開府府參軍驃騎車騎府八命州列曹參軍寧逺揚烈伏波輕車府長史正六命州治中六命郡丞戶不滿五百以下縣令戌主正六命州呼藥右三命殄寇殄難將軍強弩司馬四征中鎮撫府正七命州列曹參軍正五命郡丞右正二命掃寇掃難將軍武威司馬四平前後左右府七命州列曹參軍戌副五命郡丞右二命曠野橫野將軍殿中員外二司馬冠軍輔國府正六命州列曹參軍右正一命武威武牙將軍淮海山林二都尉鎮逺建忠中堅寧朔寧逺揚烈伏波輕車府列曹參軍右一命周制封郡縣五等爵者皆加開國授柱國大將軍開府儀同者並加使持節大都督其開府又加車騎大將軍散騎常侍其授總管刺史則加使持節諸軍事以此為常大象元年詔總管刺史及行兵者加持節餘悉罷之建德四年增置上柱國大將軍改儀同三司為儀同大將軍周書卷二十四周書卷二十四考證盧辨傳庶纂前修矣此下北史有節閔帝立云云臣文淳按下文云及帝入關帝謂孝武也作史者若不載節閔帝即位事則當云及孝武入關不當云帝入關也以北史校之知此明有遺脫子慎北史云子慎嗣隋開皇初以辨前代名德追封沈國公此脫其開府又加車騎大將軍散騎常侍北史云其開府又加驃騎大將軍侍中其儀同又加車騎大將軍散騎常侍此亦脫訛周書卷二十四考證
