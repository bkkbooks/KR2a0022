body:
  text: 周書卷四十五唐令狐德棻等撰列𫝊第三十七儒林盧誕盧光沈重樊深熊安生樂遜自書契之興先哲可得而紀者莫不備乎經𫝊若乃選君德於列辟觀遺烈於風聲帝莫髙於堯舜王莫顯於文武是以聖人祖述其道垂文於六學憲章其教作範於百王自兹以降三微驟遷五紀遞襲損益異術治亂殊塗秦承纍世之基任刑法而殄滅漢無尺土之業崇經術而長久雕蟲是貴魏道所以陵夷𤣥風既興晉綱於焉大壞考九流之殿最校四代之興衰正君臣明貴賤美教化移風俗莫尚於儒故皇王以之致刑措而反淳朴賢逹以之鏤金石而雕竹素儒之時義大矣哉自有魏道消海內板蕩􅉓倫攸斁戎馬生郊先王之舊章往聖之遺訓掃地盡矣及太祖受命雅好經術求闕文於三古得至理於千載黜魏晉之制度復姬旦之茂典盧景宣學通羣藝修五禮之缺長孫紹逺才稱洽聞正六樂之壞由是朝章漸備學者向風世宗纂厯敦尚學藝內有崇文之觀外重成均之職握素懷鉛重席解頤之士間出於朝廷圓冠方領執經負笈之生著録於京邑濟濟焉足以踰於向時矣洎髙祖保定三年乃下詔尊太傅燕公為三老帝於是服袞冕乘碧輅陳文物備禮容清蹕而臨太學袒割以食之奉觴以酳之斯固一世之盛事也其後命輶軒以致玉帛徴沈重於南荆及定山東降至尊而勞萬乘待熊生以殊禮是以天下慕嚮文教逺覃衣儒者之服挾先王之道開黌舍延學徒者比肩勵從師之志守専門之業辭親戚甘勤苦者成市雖遺風盛業不逮魏晉之辰而風移俗變抑亦近代之美也其儒者自有别傳及終於隋之中年者則不兼録自餘撰於此篇云盧誕范陽涿人也本名恭祖曽祖晏博學善𨽻書有名於世仕燕為給事黃門侍郎營丘成周二郡守祖夀太子洗馬燕滅入魏為魯郡守父叔仁年十八州辟主簿舉秀才除員外郎以親老乃辭歸就養父母既殁哀毁六年躬營墳壟遂有終焉之志魏景明中被徴入洛授威逺將軍武賁中郎將非其好也尋除鎮逺將軍通直散騎常侍並稱􅍚不朝乃出為幽州司馬又辭歸鄉里當時咸稱其髙尚焉誕幼而通亮博學有詞彩郡辟功曹州舉秀才不行起家侍御史纍遷輔國將軍太中大夫幽州别駕北豫州都督府長史時刺史髙仲密以州歸朝朝廷遣大將軍李逺率軍赴援誕與文武二千餘人奉候大軍以功授鎮東將軍金紫光祿大夫封固安縣伯邑五百户尋加散騎侍郎拜給事黃門侍郎魏帝詔曰經師易求人師難得朕諸兒稍長欲令卿為師於是親幸晉王第敇晉王以下皆拜之於帝前因賜名曰誕加征東將軍散騎常侍太祖又以誕儒宗學府為當世所推乃拜國子祭酒進車騎大將軍儀同三司魏恭帝二年除祕書監後以􅍚卒盧光字景仁小字伯范陽公辨之弟也性溫謹博覽羣書精於三禮善隂陽解鐘律又好𤣥言孝昌初釋褐司空府參軍事稍遷明威將軍員外侍郎及魏孝武西遷光於山東立義遙授大都督晉州刺史安西將軍銀青光祿大夫大統六年携家西入太祖深禮之除丞相府記室參軍賜爵范陽縣伯俄拜行臺郎中専掌書記十年改封安息縣伯邑五百户遷行臺右丞出為華州長史尋徴拜將作大匠魏廢帝元年加車騎大將軍儀同三司除京兆郡守遷侍中六官建授小匠師下大夫進授開府儀同三司匠師中大夫進爵為侯增邑五百户轉工部中大夫大司馬賀蘭祥討吐谷渾以光為長史進爵燕郡公武成二年詔光監營宗廟既成增邑四百户出為虞州刺史尋治陜州總管府長史重論討渾之功增邑并前一千九百户天和二年卒時年六十二髙祖少時嘗受業於光故贈賻有加恆典贈少傅諡曰簡光性崇佛道至誠信敬嘗從太祖狩於檀臺山時獵圍既合太祖遙指山上謂羣公等曰公等有所見不咸曰無所見光獨曰見一桑門太祖曰是也即解圍而還令光於桑門立處造浮圖掘基一丈得瓦鉢錫杖各一太祖稱歎因立寺焉及為京兆而郡舍先是數有妖怪前後郡將無敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乘馬忽升㕔事登牀南首而立又食器無故自破光並不以介懷其精誠守正如此撰道德經章句行於世子賁嗣大象中開府儀同大將軍沈重字德厚吳興武康人也性聰悟有異常童弱嵗而孤居喪合禮及長専心儒學從師不逺千里遂博覽羣書尤明詩禮及左氏春秋梁大通三年起家王國常侍梁武帝欲髙置學官以崇儒教中大通四年乃革選以重補國子助教大同二年除五經博士梁元帝之在藩也甚歎異之及即位乃遣主書何武迎重西上及江陵平重乃留事梁主蕭察除中書侍郎兼中書舍人纍遷員外散騎侍郎廷尉卿領江陵令還拜通直散騎常侍都官尚書領羽林監察又令重於合歡殿講周禮髙祖以重經明行修乃遣宣納上士栁裘至梁徵之仍致書曰皇帝問梁都官尚書沈重觀夫八聖六君七情十義殊方所以㑹軌異代於是率由莫不趣大順之遙塗履中和之盛致及青緗起熖素篆從風文逐世疏義隨運舛大禮存於玉帛之間至樂形於鐘鼓之外雖分蛇聚緯郁郁之辭蓋闕當塗典午抑抑之㫖無聞有周開基爰蹤聖哲拯蒼生之已淪補文物之將墜天爵具修人紀咸理朕寅奉神器恭惟寶闕常思復禮殷周之年遷化唐虞之世懼三千尚乖於治俗九變未叶於移風欲定畫一之文思杜二家之說知卿學冠儒宗行標士則卞寶復潤於荆隂隨照更明於漢浦是用寤寐增勞瞻望軫念爰致束帛之聘命翹車之招所望鳯舉鴻翻俄而萃止明斯隱滯合彼異同上庠弗墜於微言中經罔闕於逸義近取無獨善之譏逺應有兼濟之美可不盛歟昔申涪鮐背方辭東國公孫黃髮始造西京遂使道為藝基功參治本今者一徴諒兼其二若居形聲而去影響尚迷邦而忘觀國非所謂也又敕襄州總管衛公直敦喻遣之在途供給務從優厚保定末重至于京師詔令討論五經并校定鐘律天和中復於紫極殿講三教義朝士儒生桑門道士至者二千餘人重辭義優洽樞機明辨凡所解釋咸為諸儒所推六年授驃騎大將軍開府儀同三司露門博士仍於露門館為皇太子講論建德末重自以入朝既久且年過時制表請還梁髙祖優詔答之曰開府漢南把梓每軫虛襟江東竹箭亟疲延首故束帛聘申蒲輪徴伏加以梁朝舊齒結綬三世沐浴榮光秪承寵渥不忘戀本深足嘉尚而楚材晉用豈無先哲方事求賢義乖來肅重固請乃許焉遣小司門上士楊注送之梁主蕭巋拜重散騎常侍太常卿大象二年來朝京師開皇三年卒年八十四隋文帝遣舍人蕭子寶祭以少牢贈使持節上開府儀同三司許州刺史重學業該博為當世儒宗至於隂陽圖緯道經釋典靡不畢綜又多所撰述咸得其指要其行於世者周禮義三十一卷儀禮義三十五卷禮記義三十卷毛詩義二十八卷喪服經義五卷周禮音一卷儀禮音一卷禮記音二卷毛詩音二卷樊深字文深河東猗氏人也早喪母事繼母甚謹弱冠好學負書從師於三河講習五經晝夜不倦魏永安中隨軍征討以功除蕩冦將軍纍遷伏波征虜將軍中散大夫嘗讀書見吾丘子遂歸侍養魏孝武西遷樊王二姓舉義為東魏所誅深父保周叔父歡周並被害深因避難墜崖傷足絶食再宿於後遇得一簞餅欲食之然念繼母年老患痺或免虜掠乃弗食夜中匍匐尋母偶得相見因以饋母還復遁去改易姓名逰學於汾晉之間習天文及算厯之術後為人所告囚送河東屬魏將韓軌長史張曜重其儒學延深至家因是更得逃隱太祖平河東贈保周南郢州刺史歡周儀同三司深歸葬其父負土成墳尋而于謹引為其府參軍令在館教授子孫除撫軍將軍銀青光祿大夫遷開府屬轉從事中郎謹拜司空以深為咨議大統十五年行下邽縣事太祖置學東館教諸將子弟以深為博士深經學通贍每解書嘗多引漢魏以來諸家義而說之故後生聽其言者不能曉悟皆背而譏之曰樊生講書多門户不可解然儒者推其博物性好學老而不怠朝暮還往常據鞍讀書至馬驚墜地損折支體終亦不改後除國子博士賜姓萬紉于氏六官建拜太學助教遷博士加車騎大將軍儀同三司天和二年遷縣伯中大夫加開府儀同三司建德元年表乞骸骨詔許之朝廷有疑議常召問焉後以􅍚卒深既專經又讀諸史及蒼雅篆籕隂陽卜筮之書學雖博贍訥於辭辨故不為當時所稱撰孝經喪服問疑各一卷撰七經異同說三卷義經略論并月録三十一卷並行於世熊安生字植之長樂阜城人也少好學勵精不倦初從陳逹受三傳又從房虬受周禮並通大義後事徐遵明服膺厯年東魏天平中受禮於李寶鼎遂博通五經然專以三禮教授弟子自逺方至者千餘人乃討論圖緯捃托異聞先儒所未悟者皆發明之齊河清中陽休之特奏為國子博士時朝廷既行周禮公卿以下多習其業有宿疑礩滯者數十條皆莫能詳辨天和三年齊請通好兵部尹公正使焉與齊人語及周禮齊人不能對乃令安生至賓館與公正言公正有口辨安生語所未至者便撮機要而驟問之安生曰禮義𢎞深自有條貫必欲升堂覩奧寧可汨其先後但能留意當為次第陳之公正於是具問所疑安生皆為一一演說咸究其根本公正深所嗟服還具言之於髙祖髙祖大欽重之及髙祖入鄴安生遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我矣俄而髙祖幸其第詔不聼拜親執其手引與同坐謂之曰朕未能去兵以此為愧安生曰黃帝尚有阪泉之戰况陛下龔行天罰乎髙祖又曰齊氏賦役繁興竭民財力朕救焚拯溺思革其弊欲以府庫及三臺雜物散之百姓公以為何如安生曰昔武王克商散鹿臺之財發巨橋之粟陛下此詔異代同美髙祖又曰朕何如武王安生曰武王伐紂縣首白旗陛下平齊兵不血刃愚謂聖略為優髙祖大悅賜帛三百匹米三百石宅一區并賜象笏及九環金帶自餘什物稱是又詔所司給安車駟馬隨駕入朝并敕所在供給至京敕令於大乘佛寺參議五禮宣政元年拜露門學博士下大夫其時年已八十餘尋致仕卒於家安生既學為儒宗當時受其業擅名於後者有馬榮伯張黑奴竇士榮孔籠劉焯劉炫等皆其門人焉所撰周禮義疏二十卷禮記義疏四十卷孝經義疏一卷並行於世樂遜字遵賢河東猗氏人也年在幼童便有成人之操弱冠為郡主簿魏正光中聞碩儒徐遵明領徒趙魏乃就學孝經喪服論語詩書禮易左氏春秋大義尋而山東冦亂學者散逸遜於擾攘之中猶志道不倦永安中釋褐安西府長流參軍大統七年除子都督九年太尉李弼請遜教授諸子既而太祖盛選賢良授以守令相府户曹栁敏行臺郎中盧光河東郡丞辛粲相繼舉遜稱有牧民之才弼請留不遣十六年加授建忠將軍左中郎將遷輔國將軍中散大夫都督歷弼府西閣祭酒功曹咨議參軍魏廢帝二年太祖召遜教授諸子在館六年與諸儒分授經業遜講孝經論語毛詩及服䖍所注春秋左氏傳魏恭帝二年授太學助教孝閔帝踐阼以遜有理務材除秋官府上士其年治太學博士轉治小師氏下大夫自譙王儉以下並束修行弟子之禮遜以經術教授甚有訓導之方及衛公直鎮蒲州以遜為直府主簿加車騎將軍左光祿大夫武成元年六月以霖雨經時詔百官上封事遜陳時宜一十四條其五條切於政要其一崇治方曰竊惟今之在官者多求清身克濟不至惠民愛物何者比來守令年期既促嵗責有成蓋謂猛濟為賢未甚優養此政既代後者復然夫政之於民過急則刻薄傷緩則弛慢是以周失舒緩秦敗急酷民非赤子當以赤子遇之宜在舒疾得𠂻不使勞擾頃承魏之衰政人習逋違先王朝憲備行民咸識法但可宣風正俗納民軌訓而已自非軍旅之中何用過為迫切至於興邦致治事由德教漸以成之非在倉卒竊謂姬周盛德治興文武政穆成康自斯厥後不能無事昔申侯將奔楚子誨之曰無適小國言以政狹法峻將不汝容敬仲入齊稱曰幸若獲宥及於寬政然關東諸州淪陷日久人在塗炭當慕息肩若不布政優優聞諸境外將何以使彼勞民歸就樂土其二省造作曰頃者魏都洛陽一時殷盛貴勢之家各營第宅車服器玩皆尚奢靡世逐浮競人習澆薄終使禍亂交興天下喪敗比來朝貢器服稍華百工造作務盡竒巧臣誠恐物逐好移有損政俗如此等事頗宜禁省記言無作淫巧以蕩上心傳稱宫室崇侈民力雕弊漢景有云黃金珠玉饑不可食寒不可衣雕文刻鏤傷農事者也錦繡纂組害女功者也以二者為饑寒之本源矣然國家非為軍戎器用時事要須而造者皆徒費功力損國害民未如廣勸農桑以衣食為務使國儲豐積大功易舉其三明選舉曰選曹賞録勳賢補擬官爵必宜與衆共之有明揚之授使人得盡心如覩白日其材有升降其功有厚薄祿秩所加無容不審即如州郡選置猶集鄉閭况天下選曹不取物以下缺州郡自可內除此外付曹銓者既非機事何足可密人生處世以榮祿為重修身履行以纂身為名然逄時既難失時為易其選置之日宜令衆心明白然後呈奏使功勤見知品物稱悅其四重戰伐曰魏祚告終天眷在德而髙洋稱僣先迷未敗擁逼山東事切肘腋譬猶棊劫相持爭行先後若一行非當或成彼利誠應捨小營大先保封域不宜貪利在邊輕為興動捷則勞兵分守敗則所損已多國家雖彊洋不受弱詩云德則不競何憚於病唯德可以庇民非恃彊也夫力均勢敵則進德者勝君子道長則小人道消故昔之善戰者先為不可勝以待敵之可勝彼行暴戾我則寬仁彼為刻薄我必惠化使德澤旁流人思有道然後觀釁而作可以集事其五禁奢侈曰按禮人有貴賤物有等差使用之有節品類之有度馬后為天下母而身服大練所以率下也季孫相三君矣家無衣帛之妾所以勵俗也比來富貴之家為意稍廣無不資裝婢隸作車後容儀服飾華美昡曜街衢仍使行者輟足路人傾蓋論其輸力公家未若介胄之士然其坐受優賞自踰攻戰之人縱令不惜功費豈不有虧厥德必有儲蓄之餘孰與務恤軍士魯莊公有云衣食所安不敢愛也必以分人詩言豈曰無衣與子同袍皆所以取人力也又陳事上議之徒亦應不少當有上徹天聼者未聞是非陛下雖念存物議欲盡天下之情而天下之情猶為未盡何者取人受言貴在顯用若納而不顯是而不用則言之者或寡矣保定二年以訓導有方頻加賞賜遷遂伯中大夫授驃騎將軍大都督四年進車騎大將軍儀同三司五年詔魯公贇畢公賢等俱以束修之禮同受業焉天和元年岐州刺史陳公純舉遜為賢良五年遜以年在懸車上表致仕優詔不許於是賜以粟帛及錢等授湖州刺史封安邑縣子邑四百户民多蠻左未習儒風遜勸勵生徒加以課試數年之間化洽州境蠻俗生子長大多與父母别居遜每加勸導多革前弊在任數載頻被褒錫秩滿還朝拜皇太子諫議復在露門教授皇子增邑一百户宣政元年進位上儀同大將軍大象初進爵崇業郡公增邑通前二千户又為露門博士二年進位開府儀同三司大將軍出為汾隂郡守遜以老病固辭詔許之乃改授東揚州刺史仍賜安車衣服及奴婢等又於本郡賜田十頃儒者以為榮隋開皇元年卒於家年八十二贈本官加蒲陜二州刺史遜性柔謹寡於交游立身以忠信為本不自矜尚每在衆中言論未嘗為人之先學者以此稱之所著孝經論語毛詩左氏春秋序論十餘篇又著春秋序義通賈服說發杜氏違辭理並可觀史臣曰前世通六藝之士莫不兼逹政術故云拾青紫如地芥近代守一經之儒多暗於時務故有貧且賤之恥雖通塞有命而大抵皆然嘗論之曰夫金之質也至剛鑄之可以成器水之性也柔弱壅之可以壞山况乎肖天地之貌含五常之德朱藍易染薰蕕可變固以隨鄒俗而好長纓化齊風而貴紫服若乃進趣矜尚中庸之常情髙秩厚禮上智之所欲是以兩漢之朝重經術而輕律令其聰明特逹者咸勵精於專門以通賢之質挾黼藻之美大則必至公卿小則不失守令近代之政先法令而後經術其沉默孤微者亦篤志於章句以先王之道飾腐儒之姿逹則不過侍講訓胄窮則終於弊衣簞食由斯言之非兩漢棟梁之所育近代薪樗之所産哉蓋好尚之道殊遭遇之時異也史臣每聞故老稱沈重所學非止六經而已至於天官律厯隂陽緯候流略所載釋老之典靡不博綜窮其幽賾故能馳聲海內為一代儒宗雖前世徐廣何承天之儔不足過也周書卷四十五周書卷四十五考證沈重傳沈重字德厚北史云字子厚熊安生傳並行於世北史安生傳末尚有數十行此書不載周書卷四十五考證
