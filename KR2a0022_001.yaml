body:
  text: 周書卷一唐令狐德棻等撰帝紀第一文帝上太祖文皇帝姓宇文氏諱泰字黒獺代武川人也其先出自炎帝神農氏為黄帝所滅子孫遯居朔野有葛烏菟者雄武多算略鮮卑慕之奉以為主遂總十二部落世為大人其後曰普回因狩得玉璽三紐有文曰皇帝璽普回心異之以為天授其俗謂天曰宇謂君曰文因號宇文國并以為氏焉普回子莫那自陰山南徙始居遼西是曰獻侯為魏舅生之國九世至侯豆歸為慕容晃所滅其子陵仕燕拜駙馬都尉封𤣥菟公魏道武將攻中山陵從慕容寶禦之寶敗陵率甲騎五百歸魏拜都牧主賜爵安定侯天興初徙豪傑於代都陵隨例遷武川焉陵生系系生韜並以武略稱韜生肱肱任俠有氣幹正光末沃野鎮人破六汗拔陵作亂遠近多應之其偽署王衛可孤徒黨最盛肱乃糺合郷里斬可孤其衆乃散後避地中山遂陷於鮮于修禮修禮令肱還統其部衆後為定州軍所破殁於陣武成初追尊曰德皇帝太祖德皇帝之少子也母曰王氏孕五月夜夢抱子昇天纔不至而止寤而告德皇帝德皇帝喜曰雖不至天貴亦極矣生而有黒氣如蓋下覆其身及長身長八尺方顙廣額美鬚髯髪長委地垂手過膝背有黒子宛轉若龍盤之形面有紫光人望而敬畏之少有大度不事家人生業輕財好施以交結賢士大夫少隨德皇帝在鮮于修禮軍及葛榮殺修禮太祖時年十八榮遂任以將帥太祖知其無成與諸兄謀欲逃避計未行㑹爾朱榮擒葛榮定河北太祖隨例遷晉陽榮以太祖兄弟䧺傑懼或異已遂託以他罪誅太祖第三兄洛生復欲害太祖太祖自理家冤辭旨慷慨榮感而免之益加敬待孝昌二年燕州亂太祖始以統軍從榮征之先是北海王顥奔梁梁人立為魏主令率兵入洛魏孝莊帝出居河内以避之榮遣賀拔岳討顥仍迎孝莊帝太祖與岳有舊乃以别將從岳及孝莊帝反正以功封寧都子邑三百戸遷鎮遠將軍步兵校尉万俟醜奴作亂關右孝莊帝遣爾朱天光及岳等討之太祖遂從岳入關先鋒破偽行䑓尉遲菩薩等及平醜奴定隴右太祖功居多遷征西將軍金紫光祿大夫増邑三百戸加直閣將軍行原州事時關隴寇亂百姓凋殘太祖撫以恩信民皆悅服咸喜曰早値宇文使君吾等豈從逆亂太祖嘗從數騎於野忽聞簫鼔之音以問從人皆云莫之聞也普泰二年爾朱天光東拒齊神武留弟顯夀鎮長安秦州刺史侯莫陳悅為天光所召將軍衆東下岳知天光必敗欲留悅共圖顯夀而計無所出太祖謂岳曰今天光尚邇悅未有二心若以此事告之恐其驚懼然悦雖為主將不能制物若先說其衆必人有留心進失爾朱之期退恐人情變動乘此説悅事無不遂岳大喜即令太祖入悦軍説之悦遂不行乃相率襲長安令太祖輕騎為前鋒太祖䇿顯夀怯懦聞諸軍將至必當東走恐其遠遁乃倍道兼行顯夀果已東走追至華山擒之太昌元年岳為關西大行臺以太祖為左丞領岳府司馬加散騎常侍事無巨細皆委決焉齊神武既破爾朱遂專朝政太祖請往觀之既至并州齊神武問岳軍事太祖口對䧺辯齊神武以為非常人欲留之太祖跪陳忠款乃得反命遂星言就道齊神武果遣追之至關不及太祖還謂岳曰髙歡非人臣也逆謀所以未發者憚公兄弟耳然凡欲立大功匡社稷未有不因地勢總英雄而能克成者也侯莫陳悦本實庸材遭逄際㑹遂叨任委既無憂國之心亦不為髙歡所忌但為之備圖之不難今費也頭控弦之騎不下一萬夏州刺史斛拔彌俄突勝兵之士三千餘人及靈州刺史曹泥並恃其僻遠常懷異望河西流民紇豆陵伊利等戸口富實未奉朝風今若移軍近隴扼其要害示之以威服之以徳即可收其士馬以實吾軍西輯氐羌北撫沙塞還軍長安匡輔魏室此桓文舉也岳大悅復遣太祖詣闕請事密陳其狀魏帝深納之加太祖武衛將軍還令報岳岳遂引軍西次平凉謀於其衆曰夏州鄰接寇賊須加綏撫安得良刺史以鎮之衆皆曰宇文左丞即其人也岳曰左丞吾之左右手也如何可廢沈吟累日乃從衆議於是表太祖為使持節武衛將軍夏州刺史太祖至州伊利望風款附而曹泥猶通使於齊神武魏永熙三年春正月岳欲討曹泥遣都督趙貴至夏州與太祖計事太祖曰曹泥孤城阻遠未足為憂侯莫陳悦怙衆密邇貪而無信必將為患願早圖之岳不聽遂與悦俱討泥二月至於河曲岳果為悦所害其士衆散還平凉唯大都督趙貴率部曲收岳屍還營於是三軍未有所屬諸將以都督寇洛年最長相與推洛以總兵事洛素無雄略威令不行乃謂諸將曰洛智能本闕不宜統御近者廹於羣議推相攝領今請避位更擇賢材於是趙貴言於衆曰元帥忠公盡節暴於朝野勲業未就奄罹凶酷豈唯國喪良宰固亦衆無所依必欲紏合同盟復讐雪恥須擇賢者總統諸軍舉非其人則大事難集雖欲立忠建義其可得乎竊觀宇文夏州英恣不世雄謨冠時遠邇歸心士卒用命加以法令齊肅賞罰嚴明真足恃也今若告喪必來赴難因而奉之則大事集矣諸將皆稱善乃命赫連逹馳至夏州告太祖曰侯莫陳悦不顧盟誓棄恩背德賊害忠良羣情憤惋控告無所公昔居管轄恩信著聞今無小無大咸願推奉衆之思公引日成嵗願勿稽留以慰衆望也太祖將赴之夏州吏民咸泣請曰聞悦今在永洛去平凉不遠若已有賀抜公之衆則圗之實難願且停留以觀其變太祖曰悦既害元帥自應乘勢直據平涼而反趦趄屯兵永洛吾知其無能為也且難得易失者時也不俟終日者幾也今不早赴將恐衆心自離都督彌姐元進規欲應悦密圖太祖事發斬之太祖乃率帳下輕騎馳赴平涼時齊神武遣長史侯景招引岳衆太祖至安定遇之謂景曰賀拔公雖死宇文㤗尚存卿何為也景失色對曰我猶箭耳隨人所射安能自裁景於此即還太祖至平涼哭岳甚慟將士且悲且喜曰宇文公至無所憂矣於時魏孝武帝將圗齊神武聞岳被害遣武衞將軍元毗宣㫖慰勞追岳軍還洛陽毗到平涼㑹諸將已推太祖侯莫陳悦亦被勅追還悦既附齊神武不肯應召太祖謂諸將曰侯莫陳悦枉害忠良復不應詔命此國之大賊豈可容之乃命諸軍戒嚴將以討悦及元毗還太祖表於魏帝曰臣前以故關西大都督臣岳竭誠奉國横罹非命三軍喪氣朝野痛惜都督寇洛等銜冤茹慼志雪讐恥以臣昔同幕府苦賜要結臣便以今月十四日輕來赴軍當發之時已有别表既為衆情所逼權掌兵事詔召岳軍入京此乃為國良䇿但髙歡之衆已至河東侯莫陳悦猶在永洛况此軍士多是關西之人皆戀鄉邑不願東下今逼以上命悉令赴關悦躡其後歡邀其前首尾受敵其勢危矣臣殞身王事誠所甘心恐敗國殄人所損更大乞少停緩更思後圗徐事誘導漸就東引太祖志在討悦而未測朝㫖且兵衆未集假此為詞因與元毗及諸將刑牲盟誓同奨王室初賀拔岳營於河曲有軍吏獨行忽見一老翁鬚眉皓素謂之曰賀拔岳雖復據有此衆然終無所成當有一宇文家從東北來後必大盛言訖不見此吏恒與所親言之至是方驗魏帝詔太祖曰賀拔岳既殞士衆未有所歸卿可為大都督即相統領知欲漸就東下良不可言今亦徴侯莫陳悦士馬入京若其不來朕當親自致罰宜體此意不過淹留太祖又表曰侯莫陳悦違天逆理酷害良臣自以專戮罪重不恭詔命阻兵永洛彊梁秦隴臣以大宥既班忍抑私憾頻問悦及都督可朱渾元等歸闕早晚而悦並維縶使人不聽反報觀其指趣勢必異圗臣正為此未敢自抜兼順衆情乞少停緩太祖乃與悦書責之曰頃者正光之末天下沸騰塵飛河朔霧塞荆沔故將軍賀拔公攘𬒮勃起志寧㝢縣授戈南指拯皇靈於已墜擁旄西邁濟百姓於淪胥西顧無憂繄公是頼勲茂賞隆遂征關右此乃行路所知不藉一二談也君實名微行薄本無遠量故將軍降遷髙之志篤彚征之理乃申啓朝廷薦君為隴右行臺朝議以君功名闕然未之許也遂頻煩請謁至於再三天子難違上將便相聽許是亦遐邇共知不復煩之翰墨縱使木石為心猶當知感况在生靈安能無愧加以王室多故髙氏專權主上虚心寄隆晉鄭君復與故將軍同受密旨屢結盟約期於畢力共匡時難而貎恭心狠妬勝嫉賢口血未乾匕首已發協黨國賊共危本朝孤恩負誓有靦面目豈不上畏於天下慚於地吾以弱才猥當藩牧䝉朝廷拔擢之恩荷故將軍國士之遇聞問之日魂守驚馳便陳啓天朝暫來奔赴衆情所推遂當戎重比有敕㫖召吾還闕亦有别詔令君入朝雖操行無聞而年齒已宿今日進退唯君是視君若督率所部自山隴東邁吾亦總勒師徒北道還闕共追廉藺之迹同慕寇賈之風如其首䑕両端不時奉詔專戮違旨國有常刑枕戈坐甲指日相見幸圖利害無貽噬臍悦既懼太祖謀已詐為詔書與秦州刺史万俟普撥令與悦為黨援普撥疑之封詔以呈太祖太祖表之曰臣自奉詔總平涼之師責重憂深不遑啓處訓兵秣馬唯思竭力前以人戀本土侯莫陳悦窺窬進退量度且宜住此今若召悦授以内官臣列斾東轅匪朝伊夕朝廷若以悦堪為邊扞乞處以𤓰涼一藩不然則終致猜虞於事無益初原州刺史史歸為岳所親任河曲之變反為悦守悦遣其黨王伯和成次安將兵二千人助歸鎮原州太祖遣都督侯莫陳崇率輕騎一千襲歸擒之并𫉬次安伯和等送於平涼太祖表崇行原州事万俟普撥又遣其將叱干保洛領二千騎來從軍三月太祖進軍至原州衆軍悉集諭以討悦之意士卒莫不懐憤太祖乃表曰臣聞誓死酬恩覆宗報主人倫所急赴蹈如歸自大都督臣岳殁後臣頻奉詔還闕秣馬戒途志不俟旦直以督將已下咸稱賀拔公視我如子今讐恥未報亦何面目以處世間若得一雪冤酷萬死無恨且悦外附彊臣内違朝㫖臣今上思逐惡之志下遂節士之心冀仗天威為國除害小違大順實在兹辰克定之後伏待斧鉞夏四月引兵上隴留兄子導為都督鎮原州太祖軍令嚴肅秋毫無犯百姓大悦識者知其有成軍出木峽關大雨雪平地二尺太祖知悦怯而多猜乃倍道兼行出其不意悦果疑其左右有異志者左右亦不安衆遂離貳聞大軍且至退保略陽留一萬餘人據守永洛太祖至永洛命圍之城降太祖即率輕騎數百趣略陽以臨悦軍悦大懼乃召其部將議之皆曰此鋒不可當勸悦退保上邽以避之時南秦州刺史李弼亦在悦軍乃間道遣使請為内應其夜悦出軍軍中自驚潰將卒或相率來降太祖縱兵奮撃大破之虜獲萬餘人馬八千匹悦與其子弟及麾下數十騎遁走太祖曰悦本與曹泥應接不過走向靈州乃令原州都督導邀其前都督賀拔潁等追其後導至牽屯山追及悦斬之太祖入上邽收悦府庫財物山積皆以賞士卒毫釐無所取左右竊一銀鏤甕以歸太祖知而罪之即剖賜將士衆大悦時凉州刺史李叔仁為其民所執舉州騷擾宕昌羌梁企定引吐谷渾寇金城渭州及南秦州氐羌連結所在蜂起南岐至於𤓰鄯跨州據郡者不可勝數太祖乃令李弼鎮原州夏州刺史拔也惡蚝鎮南秦州渭州刺史可朱渾元還鎮渭州衛將軍趙貴行秦州事徴豳涇東秦岐四州粟以給軍齊神武聞秦隴克㨗乃遣使於太祖甘言厚禮深相倚結太祖拒而不納時齊神武已有異志故魏帝深仗太祖乃徴二千騎鎮東雍州助為聲援仍令太祖稍引軍而東太祖乃遣大都督梁禦率步騎五千鎮河渭合口為圗河東之計太祖之討悦也悦遣使請援於齊神武神武使其都督韓軌將兵一萬據蒲坂而雍州刺史賈顯送船與軌請軌兵入關太祖因梁禦之東乃逼召顯赴軍禦遂入雍州魏帝遣著作郎姚幼瑜持節勞軍進太祖侍中驃騎大將軍開府儀同三司關西大都督略陽縣公承制封拜使持節如故於是以寇洛為涇州刺史李弼為秦州刺史前略陽郡守張獻為南岐州刺史盧待伯拒代遣輕騎襲擒之待伯自殺時魏帝方圗齊神武又遣徴兵太祖乃令前秦州刺史駱超為大都督率輕騎一千赴洛進授太祖兼尚書僕射關西大行臺餘官封如故太祖乃傳檄方鎮曰盖聞陰陽遞用盛衰相襲茍當百六無間三五皇帝創厯陶鑄蒼生保安四海仁育萬物運距孝昌屯沴屢起隴兾騷動燕河狼顧雖靈命重啓蕩定有期而乘釁之徒因生羽翼賊臣髙歡器識庸下出自輿皂罕聞禮義直以一介鷹犬効力戎行靦冐恩私遂階榮寵不能竭誠盡節專挾姦回乃勸爾朱榮行兹簒逆及榮以專政伏誅世隆以凶黨外叛歡苦相敦勉令取京師又勸吐萬兒復為弑虐暫立建明以令天下假推普泰欲竊威權並歸廢斥俱見酷害於是稱兵河北假討爾朱亟通表奏云取讒賊既行廢黜遂將簒弑以人望未改恐鼎鑊交及乃求宗室權允人心天方與魏必將有主翊戴聖明誠非歡力而歡阻兵安忍自以為功廣布腹心跨州連郡端揆禁闥莫非親黨皆行貪虐窫窳生人而舊將名臣正人直士横生瘡痏動挂網羅故武衛將軍伊琳清貞剛毅禁旅攸屬直閣將軍鮮于康仁忠亮驍傑爪牙斯在歡收而戮之曽无聞奏司空髙乾是其黨與每相影響謀危社稷但以姦志未從恐先洩漏乃密白朝廷使殺髙乾方哭對其弟稱天子横戮孫騰任祥歡之心膂並使入居樞近伺國閒隟知歡逆謀將發相繼逃歸歡益加撫待亦無陳白然歡入洛之始本有姦謀令親人蔡儶作牧河濟厚相恩贍以為東道主人故關西大都督清水公賀拔岳勲德隆重興亡攸寄歡好亂樂禍深相忌毒乃與侯莫陳悦陰圖陷害幕府以受律專征便即討戮歡知逆状已露稍懷旅距遂遣蔡儶拒代令竇泰佐之又遣侯景等云向白馬輔世珍等徑趣石濟髙隆之疋婁昭等屯據壼關韓軌之徒擁衆蒲坂於是上書天子數論得失訾毁乘輿威侮朝廷藉此微庸兾兹大寳谿壑可盈禍心不測或言徑赴荆楚開疆於外或言分詣伊洛取彼讒人或言欲來入關與幕府决戰今聖明御運天下清夷百寮師師四隩來暨人盡忠良誰為君側而歡威福自己生是亂階緝構南箕指鹿為馬包蔵凶逆伺我神器是而可忍孰不可容幕府折衝宇宙親當受脤鋭師百萬彀騎千羣裹糧坐甲唯敵是俟義之所在糜軀匪恡况頻有詔書班告天下稱歡逆亂徴兵致伐今便分命將帥應機進討或趣其要害或襲其窟宅電繞蛇撃霧合星羅而歡違負天地毒𬒳人鬼乘此掃蕩易同俯拾歡若渡河稍逼宗廟則分命諸將直取并州幕府躬自東轅電赴伊洛若固其巢穴未敢發動亦命羣帥百道俱前轘裂賊臣以謝天下其州鎭郡縣率土人黎或州鄉冠冕或勲庸世濟並宜捨逆歸順立效軍門封賞之科已有别格凡百君子可不勉歟太祖謂諸將曰髙歡雖智不足而詐有餘今聲言欲西其意在入洛吾欲令寇洛率馬步萬餘自涇州東引王羆率甲士一萬先據華州歡若西來王羆足得抗拒如其入洛寇洛即襲汾晉吾便速駕直赴京邑使其進有内顧之憂退有被躡之勢一舉大定此為上䇿衆咸稱善秋七月太祖帥衆發自髙平前軍至於𢎞農而齊神武稍逼京邑魏帝親總六軍屯於河橋令左衛元斌之領軍斛斯椿鎮武牢遣使告太祖太祖謂左右曰髙歡數日行八九百里曉兵者所忌正須乘便擊之而主上以萬乘之重不能决戰方緣津據守且長河萬里扞禦為難若一處得度大事去矣即以大都督趙貴為别道行臺自蒲坂濟趣并州遣大都督李賢將精騎一千赴洛陽㑹斌之與斛斯椿爭權不協斌之遂棄椿還紿帝云高歡兵至七月丁未帝遂從洛陽率輕騎入關太祖備儀衛奉迎謁見東陽驛太祖免冠泣涕謝曰臣不能式遏寇虐遂使乘輿遷幸請拘司敗以正刑書帝曰公之忠節曝於朝野朕以不德負乘致寇今日相見深用厚顔責在朕躬無勞謝也乃奉帝都長安披草萊立朝廷軍國之政咸取太祖决焉仍加授大將軍雍州刺史兼尚書令進封略陽郡公别置二尚書隨機處分解尚書僕射餘如故太祖固讓詔敦諭乃受初魏帝在洛陽許以馮翊長公主配太祖未及結納而帝西遷至是詔太祖尚之拜駙馬都尉八月齊神武襲陷潼關侵華陰太祖率諸軍屯霸上以待之齊神武留其將薛瑾守關而退太祖乃進軍討瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見為主徙都於鄴是為東魏十一月遣儀同李虎與李弼趙貴等討曹泥於靈州虎引河灌之明年泥降遷其豪帥于咸陽閏十二月魏孝武帝崩太祖與羣公定䇿尊立魏南陽王寶炬為嗣是為文皇帝周書卷一周書卷一考證文帝紀上其偽署王衞可孤北史作衞可瓌通鑑作衞可孤考異云從周書也雍州刺史賈顯通鑑作賈顯度下文乃逼召顯赴軍通鑑作乃逼顯度赴軍高隆之疋婁昭等疋北史作及王羆率甲士一萬下文云王羆足相抗拒監本俱作王羅臣文淳按王羆本傳云屬太祖徴兵為勤王之舉請前驅効命遂為大都督鎮華州正與此合今改正齊神武留其將薛瑾守關而退薛瑾通鑑作薛瑜遣儀同李虎與李弼趙貴等討曹泥於靈州虎北史作諱臣文淳按李虎唐髙祖諱也唐人諱虎字皆作武或作獸令狐德棻等作史不應直書李虎盖後人刋刻時妄改又髙祖父李昞故南北八書凡丙字皆作景字太宗諱世民凡世字皆作代字民字皆作人字此書間有存其舊者然已改十之七八矣大約八書惟南北史多存其舊他若晉書太宗自撰而景子景寅之類俱無一存者其為後人妄改者多矣周書卷一考證
